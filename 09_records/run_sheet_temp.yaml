run_sheet:
  date: "2026-01-29"        # TODO
  operator: "gongbaoming"
  location: "sl lab"       # TODO
  active_branches:
    - "RUN01_A"
    - "RUN02_A"
    - "RUN03_A"
    - "RUN04_A"
  goal: >


  # =====================
  # 1. 样品映射表（核心）
  # =====================
  samples:
    - branch: "RUN01_A"
      condition: "basal"
      destination: "RNA"
      sample_ids:
        - "S0001~S0010"
        - "S0021~S0040"

    - branch: "RUN02_A"
      condition: "PI3Ki"
      destination: "protein"
      sample_ids:
        - "S0041~S0076"

    - branch: "RUN03_A"
      condition: "PI3Ki"
      destination: "RNA"
      sample_ids:
        - "S0001~S0010"
        - "S0001~S0020"

    - branch: "RUN04_A"
      condition: "PI3Ki"
      destination: "RNA"
      sample_ids:
        - "S0077~S0096"


  # =====================
  # 2. 执行步骤（时间线）
  # =====================
  steps:
    - action: 造模，注射肉汤
      run: 
        - "RUN01_A"
        - "RUN02_A"
        - "RUN03_A"
        - "RUN04_A"
      day: 1
      status: done

    - action: 取细胞
      run: 
        - "RUN01_A"
        - "RUN02_A"
        - "RUN03_A"
        - "RUN04_A"
      day: 4
      status: active

    - action: 种12孔板*1，(WT*5+HO*5)*2
      run: 
        - "RUN01_A"
        - "RUN03_A"
      day: 4
      status: todo

    - action: 种12孔板*3，(WT*1+HO*1)*6*3个不同样品
      run: 
        - "RUN02_A"
      day: 4
      status: todo

    - action: 种12孔板*1，(WT*5+HO*5)*2
      run: 
        - "RUN04_A"
      day: 4
      status: todo

    - action: pi3k抑制剂过夜刺激？ # 找到货号，查说明书
      run: 
        - "RUN03_A"
        - "RUN04_A"
      day: 4
      status: todo

    - action: NAO染色
      run: 
        - "RUN04_A"
      day: 5
      status: todo

    - action: 药物处理，血清饥饿后使用 FBS 刺激，于0、2、5、10、20、40分钟收样
      run: 
        - "RUN02_A"
      day: 5
      status: todo

    - action: "RNA 收样"
      run: 
        - "RUN01_A"
        - "RUN03_A"
      day: 5
      status: todo

    - action: 拍摄照片
      run: 
        - "RUN04_A"
      day: 5
      status: todo

    - action: WB 实验做胶、一抗
      run: 
        - "RUN02_A"
      day: 6
      status: todo

    - action: "qPCR 实验"
      run: 
        - "RUN01_A"
        - "RUN03_A"
      offset days: 1
      day: 6
      status: todo

    - action: WB 实验二抗、曝光
      run: 
        - "RUN02_A"
      day: 7
      status: todo



  # =====================
  # 3. 输出与路径
  # =====================
  outputs:
    raw_data_dir: "/Volumes/.../MVP_run/raw/"     # TODO
    processed_dir: "/Volumes/.../MVP_run/processed/"  # TODO
    expected:
      - "qPCR Ct table"
      - "NAO raw images"

  # =====================
  # 4. 最小 QC 判定
  # =====================
  qc:
    qPCR:
      - "melt curve 单峰"
      - "内参稳定"
    NAO:
      - "成像参数固定"
      - "每组有效细胞数 ≥ N"
