  figure_legend_en: '(a,b) qPCR analysis of transcriptional priming markers in primary peritoneal macrophages following LPS
    stimulation, comparing WT and EphB1-deficient cells.


    (c) TNF-α secretion in supernatants from primary peritoneal macrophages following LPS stimulation, comparing WT and EphB1-deficient
    cells.


