  figure_legend_en: 'Figure 3 | EphB1 loss diminishes GSDMD-NT engagement and enrichment on mitochondria

    (i) Cytosolic mtDNA release dynamics in WT and EphB1-deficient primary peritoneal macrophages following NLRP3 inflammasome
    activation, quantified by rapid subcellular fractionation and qPCR. (Cytosolic 16S mtDNA (time course; peak at 7.5 min)).
    LPS priming (100 ng/mL, 4 h) followed by nigericin (10 μM) and rapid fractionation at 0, 7.5, 15, 30, and 60 min after
    stimulation 0–60 min time course with early peak comparison at 7.5 min. Readout: mtDNA abundance (16S and ND1) in cytosolic,
    mitochondrial, and total fractions (Subcellular fractionation followed by qPCR quantification of mtDNA (16S, ND1)). Normalization:
    qPCR ΔCt values were calculated for each fraction and normalized using total mtDNA (16S/ND1) as the reference; fold changes
    were expressed relative to the WT mean using ΔΔCt (log2FC). n: n ≥ 2 per group; replicated in ≥3 independent batches;
    stats: two-tailed unpaired t-test. Total mtDNA measurements serve as an internal control for baseline mtDNA abundance
    and to separate cytosolic release from changes in overall mtDNA content.

    (j) Cytosolic mtDNA release dynamics in WT and EphB1-deficient primary peritoneal macrophages following NLRP3 inflammasome
    activation, quantified by rapid subcellular fractionation and qPCR. (Cytosolic ND1 mtDNA (time course; peak at 7.5 min)).
    LPS priming (100 ng/mL, 4 h) followed by nigericin (10 μM) and rapid fractionation at 0, 7.5, 15, 30, and 60 min after
    stimulation 0–60 min time course with early peak comparison at 7.5 min. Readout: mtDNA abundance (16S and ND1) in cytosolic,
    mitochondrial, and total fractions (Subcellular fractionation followed by qPCR quantification of mtDNA (16S, ND1)). Normalization:
    qPCR ΔCt values were calculated for each fraction and normalized using total mtDNA (16S/ND1) as the reference; fold changes
    were expressed relative to the WT mean using ΔΔCt (log2FC). n: n ≥ 2 per group; replicated in ≥3 independent batches;
    stats: two-tailed unpaired t-test. Total mtDNA measurements serve as an internal control for baseline mtDNA abundance
    and to separate cytosolic release from changes in overall mtDNA content.

    (k) Early mitochondrial enrichment of GSDMD-NT during NLRP3 inflammasome activation in WT and Ephb1−/− primary peritoneal
    macrophages, with mitochondrial abundance controls assessed in parallel. (Mitochondrial-fraction GSDMD-NT time course
    (0, 7.5, 15, 30, 60 min); Total-lysate GSDMD cleavage control (GSDMD-NT / FL)). LPS priming (100 ng/mL, 4 h) followed
    by nigericin (10 μM), with rapid collection at 0, 7.5, 15, 30, and 60 min for mitochondrial fractionation and total lysate
    analysis 0–60 min after nigericin; 7.5 min corresponds to the WT peak enrichment time point. Readout: GSDMD-NT abundance
    in mitochondrial fractions versus total lysates; mitochondrial abundance controls (Immunoblotting of GSDMD-NT in total
    lysates and mitochondrial fractions across time points; HK2 protein (immunoblot) and mitochondrial 16S rRNA (qPCR) as
    mitochondrial abundance controls). Normalization: Immunoblot band intensities were quantified by densitometry and normalized
    to loading controls; mitochondrial enrichment was evaluated at the WT peak time point (7.5 min). n: n ≥ 3 per genotype;
    results reproduced in ≥3 independent batches; stats: two-tailed unpaired t-test. Comparisons focus on mitochondrial GSDMD-NT
    enrichment at the peak time point, while total-lysate cleavage controls exclude differences in substrate generation. HK2
    and mitochondrial 16S rRNA are used to assess mitochondrial abundance and exclude organelle-quantity confounding.

    (s3_d) Cytosolic mtDNA release dynamics in WT and EphB1-deficient primary peritoneal macrophages following NLRP3 inflammasome
    activation, quantified by rapid subcellular fractionation and qPCR. (Total 16S mtDNA (time course control)). LPS priming
    (100 ng/mL, 4 h) followed by nigericin (10 μM) and rapid fractionation at 0, 7.5, 15, 30, and 60 min after stimulation
    0–60 min time course with early peak comparison at 7.5 min. Readout: mtDNA abundance (16S and ND1) in cytosolic, mitochondrial,
    and total fractions (Subcellular fractionation followed by qPCR quantification of mtDNA (16S, ND1)). Normalization: qPCR
    ΔCt values were calculated for each fraction and normalized using total mtDNA (16S/ND1) as the reference; fold changes
    were expressed relative to the WT mean using ΔΔCt (log2FC). n: n ≥ 2 per group; replicated in ≥3 independent batches;
    stats: two-tailed unpaired t-test. Total mtDNA measurements serve as an internal control for baseline mtDNA abundance
    and to separate cytosolic release from changes in overall mtDNA content.

    (s3_f) Cytosolic mtDNA release dynamics in WT and EphB1-deficient primary peritoneal macrophages following NLRP3 inflammasome
    activation, quantified by rapid subcellular fractionation and qPCR. (Total ND1 mtDNA (time course control)). LPS priming
    (100 ng/mL, 4 h) followed by nigericin (10 μM) and rapid fractionation at 0, 7.5, 15, 30, and 60 min after stimulation
    0–60 min time course with early peak comparison at 7.5 min. Readout: mtDNA abundance (16S and ND1) in cytosolic, mitochondrial,
    and total fractions (Subcellular fractionation followed by qPCR quantification of mtDNA (16S, ND1)). Normalization: qPCR
    ΔCt values were calculated for each fraction and normalized using total mtDNA (16S/ND1) as the reference; fold changes
    were expressed relative to the WT mean using ΔΔCt (log2FC). n: n ≥ 2 per group; replicated in ≥3 independent batches;
    stats: two-tailed unpaired t-test. Total mtDNA measurements serve as an internal control for baseline mtDNA abundance
    and to separate cytosolic release from changes in overall mtDNA content.

    (s3_g) Cytosolic mtDNA release dynamics in WT and EphB1-deficient primary peritoneal macrophages following NLRP3 inflammasome
    activation, quantified by rapid subcellular fractionation and qPCR. (Mitochondrial fraction mtDNA (16S/ND1; time course
    control)). LPS priming (100 ng/mL, 4 h) followed by nigericin (10 μM) and rapid fractionation at 0, 7.5, 15, 30, and 60
    min after stimulation 0–60 min time course with early peak comparison at 7.5 min. Readout: mtDNA abundance (16S and ND1)
    in cytosolic, mitochondrial, and total fractions (Subcellular fractionation followed by qPCR quantification of mtDNA (16S,
    ND1)). Normalization: qPCR ΔCt values were calculated for each fraction and normalized using total mtDNA (16S/ND1) as
    the reference; fold changes were expressed relative to the WT mean using ΔΔCt (log2FC). n: n ≥ 2 per group; replicated
    in ≥3 independent batches; stats: two-tailed unpaired t-test. Total mtDNA measurements serve as an internal control for
    baseline mtDNA abundance and to separate cytosolic release from changes in overall mtDNA content.

    (s3e) Early mitochondrial enrichment of GSDMD-NT during NLRP3 inflammasome activation in WT and Ephb1−/− primary peritoneal
    macrophages, with mitochondrial abundance controls assessed in parallel. (HK2 protein abundance (immunoblot); Mitochondrial
    16S rRNA content (qPCR)). LPS priming (100 ng/mL, 4 h) followed by nigericin (10 μM), with rapid collection at 0, 7.5,
    15, 30, and 60 min for mitochondrial fractionation and total lysate analysis 0–60 min after nigericin; 7.5 min corresponds
    to the WT peak enrichment time point. Readout: GSDMD-NT abundance in mitochondrial fractions versus total lysates; mitochondrial
    abundance controls (Immunoblotting of GSDMD-NT in total lysates and mitochondrial fractions across time points; HK2 protein
    (immunoblot) and mitochondrial 16S rRNA (qPCR) as mitochondrial abundance controls). Normalization: Immunoblot band intensities
    were quantified by densitometry and normalized to loading controls; mitochondrial enrichment was evaluated at the WT peak
    time point (7.5 min). n: n ≥ 3 per genotype; results reproduced in ≥3 independent batches; stats: two-tailed unpaired
    t-test. Comparisons focus on mitochondrial GSDMD-NT enrichment at the peak time point, while total-lysate cleavage controls
    exclude differences in substrate generation. HK2 and mitochondrial 16S rRNA are used to assess mitochondrial abundance
    and exclude organelle-quantity confounding.'
