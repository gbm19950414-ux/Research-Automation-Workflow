  figure_legend_en: '(a) Conceptual diagram illustrating an RNA-first X–M–Z framework linking Ephb1 status, downstream signaling
    module scores, and the membrane-context axis, with independent lipid phenotypes used for directional concordance validation.


    (b) Curated reference table defining EphB1 downstream signaling modules and their expected relationships to cardiolipin-related
    mechanistic axes for pathway-level prioritization.


    (c) Pathway-level transcriptional response scores derived from RNA-seq across three independent batches, showing batch-specific
    z_pathway shifts and cross-batch meta Z effects for curated EphB1 downstream signaling modules.


    (d) Cross-batch ranking of Ephb1 downstream signaling modules based on genotype-associated transcriptional shifts and
    their coupling robustness with the membrane-context axis assessed by within-batch regression and pooled leave-one-out
    refitting.


    (e) Sample-level relationships between membrane-context axis scores and pathway mediator scores across independent RNA-seq
    batches, showing genotype-dependent clustering patterns for representative prioritized pathways.


    Panels (a,b) are conceptual or reference panels and do not present quantitative experimental comparisons or formal significance
    testing. Panels (c–e) summarize RNA-seq–based analyses from unstimulated WT and Ephb1-deficient primary murine peritoneal
    macrophages across 3 independent batches. In panel (c), pathway-level transcriptional scores were standardized within
    batch and integrated across batches as meta Z values to summarize directional consistency and effect magnitude. In panel
    (d), module prioritization was based on batch-level transcriptional shifts together with within-batch regression and pooled
    leave-one-out refitting; n denotes independent RNA-seq batches or samples, as specified, and no multiple-comparison correction
    was applied because the analysis is intended for candidate ranking rather than formal inferential testing. In panel (e),
    each point represents one RNA-seq sample; quantitative prioritization incorporated transcriptional shifts, correlation,
    and leave-one-out stability, whereas fitted lines are shown for visualization only. Unless otherwise indicated, significance
    notation is not applied in this figure because panels (c–e) are intended for pathway ranking, coupling assessment, and
    structural visualization rather than formal hypothesis testing of a single endpoint.'
