  figure_legend_en: 'Figure 1 | EphB1 loss constrains inflammasome-triggered pyroptosis and IL-1β release

    (a) Schematic overview of the genetic screening strategy used to identify regulators of inflammasome-associated pyroptotic
    output.. LPS priming followed by nigericin-induced NLRP3 activation Defined stimulation window under standardized conditions.
    Readout: IL-1β release as a functional readout of pyroptotic output (Conceptual workflow schematic (no quantitative assay)).
    Normalization: Not applicable. n: Not applicable; stats: Not applicable. This schematic illustrates experimental design
    and decision logic only and does not present quantitative data.

    (b) Normalized IL-1β release across multiple pb genetic backgrounds following nigericin-induced inflammasome activation,
    highlighting strains with pronounced genotype-dependent differences.. Nigericin stimulation (10 μM) Supernatants collected
    after inflammasome activation. Readout: IL-1β release in culture supernatants (ELISA). n: n ≥ 3 per group; stats: two-tailed
    Welch’s t-test. Each point represents an individual genetic background, with WT and HO comparisons performed within the
    same background.

    (c) IL-1β release from primary peritoneal macrophages following activation of distinct inflammasome pathways via different
    secondary stimuli.. LPS priming followed by nigericin (NLRP3), cytosolic flagellin delivery (NLRC4), or cytosolic poly(dA:dT)
    delivery (AIM2) Supernatants collected after the indicated secondary stimulation periods. Readout: IL-1β release in culture
    supernatants (ELISA). Normalization: ELISA signals were background-subtracted (blank wells and 480 nm) and normalized
    to cell number based on MTT measurements. n: n ≥ 3 per group; results reproduced in ≥3 independent experiments; stats:
    two-tailed unpaired t-test.

    (d) LDH release from WT and EphB1-deficient primary peritoneal macrophages following activation of NLRP3, NLRC4, or AIM2
    inflammasomes under the indicated conditions.. Nigericin stimulation to activate NLRP3 (1 h and 8 h), cytosolic flagellin
    delivery to activate NLRC4 (2 h), or cytosolic poly(dA:dT) delivery to activate AIM2 (8 h) Supernatants collected at the
    indicated time points after inflammasome activation. Readout: LDH release as a measure of pyroptotic cell lysis (CytoTox
    96® LDH release assay). Normalization: LDH values were background-subtracted using blank wells and normalized to total
    lysis controls to account for batch-to-batch variability. n: n ≥ 4 per group; results reproduced in ≥3 independent experiments;
    stats: two-tailed unpaired t-test.'
