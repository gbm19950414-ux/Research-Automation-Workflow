  figure_legend_en: '(a) Conceptual diagram defining six cardiolipin-related mechanistic axes within an ER–mitochondria-centered
    framework for interpretation of transcriptomic and lipidomic changes.


    (b) Curated reference table assigning representative lipid readouts and key genes to the six cardiolipin-related mechanistic
    axes, with predefined directionality conventions and within-axis weights for axis-level scoring.


    (c) Integrated workflow summarizing batch-aware processing of RNA-seq, untargeted lipidomics, and targeted cardiolipin
    datasets into mechanistic axis scores and cardiolipin-related indicators for downstream multi-omics integration.


    (d) Batch-level effect_z matrix from RNA-seq and lipidomics datasets showing the direction and magnitude of EphB1 deficiency-associated
    changes across six mechanistic axes.


    (e) Integrated multi-omics Z scores for six predefined mechanistic axes derived from batch-level RNA-seq and lipidomics
    axis scores by Stouffer meta-analysis.


    (f) Cross-batch regression relating mechanistic axis combined Z scores to batch-matched differences in total cardiolipin
    abundance to assess whether axis-level effects predict cardiolipin content across batches.


    Panels (a–c) are conceptual or reference panels and do not present quantitative experimental comparisons or significance
    testing. Panels (d–f) summarize batch-level and integrated multi-omics analyses derived from WT and Ephb1-deficient primary
    murine peritoneal macrophage datasets. In panel (d), effect_z values represent within-batch directional effect sizes and
    are interpreted by directional consistency across RNA-seq and lipidomics batches rather than by formal significance testing.
    In panel (e), batch-level axis scores were combined by Stouffer meta-analysis within and across omics layers; n denotes
    independent experimental batches (RNA-seq, 3 batches; lipidomics, 3–4 batches), and two-sided P values were derived from
    combined Z scores. In panel (f), each point represents one independent experimental batch; matched HO–WT contrasts were
    evaluated by linear regression / correlation analysis, and Pearson r and two-sided P values are reported. Unless otherwise
    indicated, significance is denoted as *P < 0.05, **P < 0.01, ***P < 0.001; ns, not significant.'
