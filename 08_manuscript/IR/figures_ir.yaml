    per group, and each point represents one biological replicate. Statistical significance was assessed using two-tailed
    unpaired t-tests. In panels (a,b), transcript levels were normalized to GAPDH and expressed relative to unstimulated controls;
    in panel (c), ELISA signals were background-subtracted and normalized to cell number; and in panels (e–g), lysate and
    supernatant or soluble and insoluble fractions were analyzed in parallel. *P < 0.05, **P < 0.01, ***P < 0.001; ns, not
    significant.'
