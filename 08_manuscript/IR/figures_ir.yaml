    stats: two-tailed unpaired t-test; genotype × dose interaction assessed by two-way ANOVA. DMSO-treated cells served as
    vehicle controls; AD treatment did not induce detectable cytotoxicity as assessed by MTT.

    (s4c) IL-1β release from WT and Ephb1−/− primary peritoneal macrophages following LPS and nigericin stimulation under
    increasing doses and durations of BEL treatment.. BEL pretreatment (1, 2, or 4 μM for 4 h or 16 h), followed by LPS priming
    (100 ng/mL, 4 h) and nigericin stimulation (10 μM, 1 h) Supernatants collected after 1 h of nigericin stimulation. Readout:
    IL-1β release in culture supernatants (ELISA). Normalization: ELISA signals were background-subtracted using blank wells
