  figure_legend_en: 'Figure 4 | Cardiolipin availability mediates EphB1-dependent limitation of inflammasome output

    (a) NAO-associated fluorescence in WT and Ephb1−/− primary peritoneal macrophages was quantified by fixed-exposure microscopy
    and time-resolved plate-reader measurements to estimate the NAO-detectable cardiolipin pool under conditions without nigericin
    stimulation. (Representative NAO fluorescence images (fixed exposure); Imaging-based NAO intensity quantification). NAO
    staining (200 nM, 30 min); no nigericin Microscopy at 30 min; plate-reader acquisition at 0, 5, 10, 24, and 48 min. Readout:
    NAO fluorescence as a readout of the NAO-detectable cardiolipin pool (Fixed-exposure fluorescence imaging and plate-reader
    fluorescence measurement). Normalization: Imaging quantification used identical exposure/gain and unified ImageJ thresholding;
    plate-reader signals were background-subtracted using no-dye wells. Where indicated, NAO signals were additionally expressed
    as NAO/Δψm using matched Δψm measurements.. n: n ≥ 3 per group; results reproduced in ≥3 independent experiments; stats:
    two-tailed unpaired t-test.

    (a) Pharmacological inhibition of iPLA2 with BEL reduces NAO-associated fluorescence and collapses genotype-dependent
    differences in WT and Ephb1−/− primary peritoneal macrophages. (Representative NAO fluorescence images (±BEL) under fixed
    exposure; Imaging-based NAO intensity quantification in WT (±BEL)). BEL pretreatment (10 μM, 16 h), followed by LPS priming
    and nigericin stimulation, then NAO staining (200 nM, 30 min) NAO imaging performed after staining under fixed exposure
    conditions. Readout: NAO fluorescence intensity as a readout of the NAO-accessible cardiolipin pool (Fixed-exposure fluorescence
    microscopy with ImageJ-based quantification). Normalization: Images were acquired using identical exposure/gain settings;
    fluorescence quantification used a unified ImageJ thresholding workflow with background subtraction. n: n ≥ 3 per group;
    results reproduced in ≥3 independent experiments; stats: two-tailed unpaired t-test.

    (b) NAO-associated fluorescence in WT and Ephb1−/− primary peritoneal macrophages was quantified by fixed-exposure microscopy
    and time-resolved plate-reader measurements to estimate the NAO-detectable cardiolipin pool under conditions without nigericin
    stimulation. (Plate-reader NAO fluorescence time course (0–48 min); Background-subtracted NAO signal (and NAO/Δψm if shown)).
    NAO staining (200 nM, 30 min); no nigericin Microscopy at 30 min; plate-reader acquisition at 0, 5, 10, 24, and 48 min.
    Readout: NAO fluorescence as a readout of the NAO-detectable cardiolipin pool (Fixed-exposure fluorescence imaging and
    plate-reader fluorescence measurement). Normalization: Imaging quantification used identical exposure/gain and unified
    ImageJ thresholding; plate-reader signals were background-subtracted using no-dye wells. Where indicated, NAO signals
    were additionally expressed as NAO/Δψm using matched Δψm measurements.. n: n ≥ 3 per group; results reproduced in ≥3 independent
    experiments; stats: two-tailed unpaired t-test.

    (b) Pharmacological inhibition of iPLA2 with BEL reduces NAO-associated fluorescence and collapses genotype-dependent
    differences in WT and Ephb1−/− primary peritoneal macrophages. (NAO intensity comparison across WT/KO × ±BEL; Genotype-wise
    difference in NAO signal before and after BEL treatment). BEL pretreatment (10 μM, 16 h), followed by LPS priming and
    nigericin stimulation, then NAO staining (200 nM, 30 min) NAO imaging performed after staining under fixed exposure conditions.
    Readout: NAO fluorescence intensity as a readout of the NAO-accessible cardiolipin pool (Fixed-exposure fluorescence microscopy
    with ImageJ-based quantification). Normalization: Images were acquired using identical exposure/gain settings; fluorescence
    quantification used a unified ImageJ thresholding workflow with background subtraction. n: n ≥ 3 per group; results reproduced
    in ≥3 independent experiments; stats: two-tailed unpaired t-test.

    (c) LC–MS/MS lipidomics quantification of total cardiolipin abundance and molecular species composition in resting WT
    and Ephb1−/− primary peritoneal macrophages. (Total CL abundance (nmol per 10^6 cells) in WT vs Ephb1−/−). Resting (unstimulated)
    condition; samples extracted immediately with BHT-containing MTBE/MeOH Single endpoint (baseline, no inflammasome stimulation).
    Readout: Total cardiolipin (CL) content and abundance of individual CL molecular species (LC–MS/MS lipidomics (positive/negative
    ion modes with MS/MS confirmation of CL species)). Normalization: Absolute abundances normalized to cell number using
    internal standards (nmol per 10^6 cells). n: n ≥ 3 per group; reproduced in ≥2 independent experimental batches; stats:
    two-tailed unpaired t-test. Species-level fold changes were calculated relative to WT; broad downregulation across the
    CL species pool was evaluated using abundance-weighted summaries.

    (d) LC–MS/MS lipidomics quantification of total cardiolipin abundance and molecular species composition in resting WT
    and Ephb1−/− primary peritoneal macrophages. (Fold-change distribution across detected CL molecular species (e.g., 113
