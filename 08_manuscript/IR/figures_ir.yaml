  figure_legend_en: 'Figure 2 | EphB1 loss preserves upstream NLRP3 activation yet constrains GSDMD pore–driven execution

    (a) Transcriptional priming responses to LPS stimulation in WT and EphB1-deficient primary peritoneal macrophages. (Tnf
    mRNA). LPS stimulation (100 ng/mL) Cells harvested at the indicated time points after LPS treatment. Readout: Transcriptional
    priming markers (qPCR). Normalization: Transcript levels were normalized to GAPDH and expressed as fold change relative
    to the unstimulated control using the ΔCt–ΔΔCt method. n: n ≥ 3 per group; results reproduced in ≥3 independent experiments;
    stats: two-tailed unpaired t-test.

    (a) Time-resolved changes in cytosolic ROS, mitochondrial ROS, and mitochondrial membrane potential in WT and EphB1-deficient
    primary peritoneal macrophages during NLRP3 inflammasome activation and under unstimulated baseline conditions. (H2DCHA
    fluorescence). LPS priming (100 ng/mL, 4 h) followed by nigericin stimulation (10 μM), or unstimulated conditions for
    baseline measurements 0–120 min after stimulation, with continuous fluorescence acquisition. Readout: Cytosolic ROS, mitochondrial
    ROS, and mitochondrial membrane potential (Live-cell fluorescence measurements using H2DCHA, MitoSOX, and TMRM). Normalization:
    All fluorescence signals were normalized to the first time point immediately before nigericin addition to allow comparison
    of dynamic changes. n: n ≥ 3 independent experiments; stats: two-tailed unpaired t-test on area-under-the-curve or endpoint
    values.

    (b) Transcriptional priming responses to LPS stimulation in WT and EphB1-deficient primary peritoneal macrophages. (Il1b
    mRNA). LPS stimulation (100 ng/mL) Cells harvested at the indicated time points after LPS treatment. Readout: Transcriptional
    priming markers (qPCR). Normalization: Transcript levels were normalized to GAPDH and expressed as fold change relative
    to the unstimulated control using the ΔCt–ΔΔCt method. n: n ≥ 3 per group; results reproduced in ≥3 independent experiments;
    stats: two-tailed unpaired t-test.

    (b) Time-resolved changes in cytosolic ROS, mitochondrial ROS, and mitochondrial membrane potential in WT and EphB1-deficient
    primary peritoneal macrophages during NLRP3 inflammasome activation and under unstimulated baseline conditions. (MitoSOX
    fluorescence). LPS priming (100 ng/mL, 4 h) followed by nigericin stimulation (10 μM), or unstimulated conditions for
    baseline measurements 0–120 min after stimulation, with continuous fluorescence acquisition. Readout: Cytosolic ROS, mitochondrial
    ROS, and mitochondrial membrane potential (Live-cell fluorescence measurements using H2DCHA, MitoSOX, and TMRM). Normalization:
    All fluorescence signals were normalized to the first time point immediately before nigericin addition to allow comparison
    of dynamic changes. n: n ≥ 3 independent experiments; stats: two-tailed unpaired t-test on area-under-the-curve or endpoint
    values.

    (c) TNF-α and IL-6 secretion from WT and EphB1-deficient primary peritoneal macrophages following LPS stimulation at defined
    time points.. LPS stimulation (100 ng/mL) Supernatants collected at 2 h for IL-6 and 4 h for TNF-α after stimulation.
    Readout: TNF-α and IL-6 release in culture supernatants (ELISA). Normalization: ELISA signals were background-subtracted
    using blank wells and 480 nm readings and normalized to cell number based on MTT measurements. n: n ≥ 3 per group; results
    reproduced in ≥3 independent experiments; stats: two-tailed unpaired t-test.

    (c) Time-resolved changes in cytosolic ROS, mitochondrial ROS, and mitochondrial membrane potential in WT and EphB1-deficient
    primary peritoneal macrophages during NLRP3 inflammasome activation and under unstimulated baseline conditions. (TMRM
    fluorescence). LPS priming (100 ng/mL, 4 h) followed by nigericin stimulation (10 μM), or unstimulated conditions for
    baseline measurements 0–120 min after stimulation, with continuous fluorescence acquisition. Readout: Cytosolic ROS, mitochondrial
    ROS, and mitochondrial membrane potential (Live-cell fluorescence measurements using H2DCHA, MitoSOX, and TMRM). Normalization:
    All fluorescence signals were normalized to the first time point immediately before nigericin addition to allow comparison
    of dynamic changes. n: n ≥ 3 independent experiments; stats: two-tailed unpaired t-test on area-under-the-curve or endpoint
    values.

    (d) IL-1β release from WT and EphB1-deficient primary peritoneal macrophages following NLRP3 activation with increasing
    doses of nigericin.. LPS priming followed by nigericin stimulation at 0, 10, or 20 μM Supernatants collected at the endpoint
    of the standard NLRP3 activation protocol. Readout: Mature IL-1β release in culture supernatants (ELISA). Normalization:
    ELISA signals were background-subtracted and quantified as pg/mL according to the manufacturer’s standard curve. n: n
    = 3 per group; stats: two-tailed unpaired t-test. Each data point represents one biological replicate; comparisons were
    performed between genotypes at each nigericin dose.

    (d) Time-resolved changes in cytosolic ROS, mitochondrial ROS, and mitochondrial membrane potential in WT and EphB1-deficient
    primary peritoneal macrophages during NLRP3 inflammasome activation and under unstimulated baseline conditions. (H2DCHA
    AUC (0–120 min)). LPS priming (100 ng/mL, 4 h) followed by nigericin stimulation (10 μM), or unstimulated conditions for
    baseline measurements 0–120 min after stimulation, with continuous fluorescence acquisition. Readout: Cytosolic ROS, mitochondrial
    ROS, and mitochondrial membrane potential (Live-cell fluorescence measurements using H2DCHA, MitoSOX, and TMRM). Normalization:
    All fluorescence signals were normalized to the first time point immediately before nigericin addition to allow comparison
    of dynamic changes. n: n ≥ 3 independent experiments; stats: two-tailed unpaired t-test on area-under-the-curve or endpoint
    values.

    (e) ASC oligomerization in WT and EphB1-deficient primary peritoneal macrophages following NLRP3 inflammasome activation..
    LPS priming (100 ng/mL, 4 h) followed by nigericin (10 μM, 45–60 min) Cells lysed immediately after nigericin treatment
    for fractionation and crosslinking. Readout: ASC oligomers, dimers, and monomers in soluble and insoluble fractions (Biochemical
    fractionation (S-Lys./Pel.), DSS crosslinking of Pel., and immunoblotting for ASC). Normalization: Densitometry normalized
    to GAPDH; soluble/insoluble fractions processed in parallel to minimize fractionation variability. n: n ≥ 3 per group;
    results reproduced in ≥3 independent experiments; stats: two-tailed unpaired t-test.

    (e) Time-resolved changes in cytosolic ROS, mitochondrial ROS, and mitochondrial membrane potential in WT and EphB1-deficient
    primary peritoneal macrophages during NLRP3 inflammasome activation and under unstimulated baseline conditions. (MitoSOX
    AUC (0–120 min)). LPS priming (100 ng/mL, 4 h) followed by nigericin stimulation (10 μM), or unstimulated conditions for
    baseline measurements 0–120 min after stimulation, with continuous fluorescence acquisition. Readout: Cytosolic ROS, mitochondrial
    ROS, and mitochondrial membrane potential (Live-cell fluorescence measurements using H2DCHA, MitoSOX, and TMRM). Normalization:
    All fluorescence signals were normalized to the first time point immediately before nigericin addition to allow comparison
    of dynamic changes. n: n ≥ 3 independent experiments; stats: two-tailed unpaired t-test on area-under-the-curve or endpoint
    values.

    (f) Pro-caspase-1 and cleaved caspase-1 p20 levels in total cell lysates and corresponding supernatants from WT and EphB1-deficient
    primary peritoneal macrophages following NLRP3 inflammasome activation.. LPS priming (100 ng/mL, 4 h) followed by nigericin
    (10 μM, 45–60 min) Total lysates and supernatants collected immediately after nigericin treatment. Readout: Pro-caspase-1
    (45 kDa) and cleaved caspase-1 p20 in lysate versus supernatant (Immunoblotting of total lysate and supernatant fractions).
    Normalization: Band intensities were quantified by densitometry and normalized to GAPDH. n: n ≥ 3 per group; results reproduced
    in ≥3 independent experiments; stats: two-tailed unpaired t-test. Lysate and supernatant fractions were processed in parallel
    to compare intracellular activation with extracellular release.

    (f) Time-resolved changes in cytosolic ROS, mitochondrial ROS, and mitochondrial membrane potential in WT and EphB1-deficient
    primary peritoneal macrophages during NLRP3 inflammasome activation and under unstimulated baseline conditions. (TMRM
    AUC (0–120 min)). LPS priming (100 ng/mL, 4 h) followed by nigericin stimulation (10 μM), or unstimulated conditions for
    baseline measurements 0–120 min after stimulation, with continuous fluorescence acquisition. Readout: Cytosolic ROS, mitochondrial
    ROS, and mitochondrial membrane potential (Live-cell fluorescence measurements using H2DCHA, MitoSOX, and TMRM). Normalization:
    All fluorescence signals were normalized to the first time point immediately before nigericin addition to allow comparison
    of dynamic changes. n: n ≥ 3 independent experiments; stats: two-tailed unpaired t-test on area-under-the-curve or endpoint
    values.

    (g) GSDMD and IL-1β processing in total cell lysates versus corresponding supernatants from WT and Ephb1−/− primary peritoneal
    macrophages following NLRP3 inflammasome activation.. LPS priming (100 ng/mL, 4 h) followed by nigericin (10 μM, 45–60
    min) Total lysates and supernatants collected immediately after nigericin treatment. Readout: GSDMD (pro and NT) and IL-1β
    (pro/p31 and mature/p17) in total lysate and supernatant fractions, with cleavage and maturation indices quantified by
    densitometry (Immunoblotting of total lysate and supernatant fractions). Normalization: Densitometry was normalized to
    GAPDH; cleavage index was calculated as GSDMD-NT/(pro+NT), and IL-1β maturation index was calculated as p17/(p31+p17).
    n: n ≥ 3 per group; results reproduced in ≥3 independent experiments; stats: two-tailed unpaired t-test. Total lysate
    and supernatant fractions were processed in parallel to distinguish intracellular processing from extracellular export.

    (g) Time-resolved changes in cytosolic ROS, mitochondrial ROS, and mitochondrial membrane potential in WT and EphB1-deficient
    primary peritoneal macrophages during NLRP3 inflammasome activation and under unstimulated baseline conditions. (Baseline
    TMRM fluorescence (unstimulated)). LPS priming (100 ng/mL, 4 h) followed by nigericin stimulation (10 μM), or unstimulated
    conditions for baseline measurements 0–120 min after stimulation, with continuous fluorescence acquisition. Readout: Cytosolic
    ROS, mitochondrial ROS, and mitochondrial membrane potential (Live-cell fluorescence measurements using H2DCHA, MitoSOX,
    and TMRM). Normalization: All fluorescence signals were normalized to the first time point immediately before nigericin
    addition to allow comparison of dynamic changes. n: n ≥ 3 independent experiments; stats: two-tailed unpaired t-test on
    area-under-the-curve or endpoint values.

    (h) Time-resolved changes in cytosolic ROS, mitochondrial ROS, and mitochondrial membrane potential in WT and EphB1-deficient
    primary peritoneal macrophages during NLRP3 inflammasome activation and under unstimulated baseline conditions. (Baseline
    TMRM AUC (unstimulated)). LPS priming (100 ng/mL, 4 h) followed by nigericin stimulation (10 μM), or unstimulated conditions
    for baseline measurements 0–120 min after stimulation, with continuous fluorescence acquisition. Readout: Cytosolic ROS,
    mitochondrial ROS, and mitochondrial membrane potential (Live-cell fluorescence measurements using H2DCHA, MitoSOX, and
    TMRM). Normalization: All fluorescence signals were normalized to the first time point immediately before nigericin addition
    to allow comparison of dynamic changes. n: n ≥ 3 independent experiments; stats: two-tailed unpaired t-test on area-under-the-curve
    or endpoint values.'
