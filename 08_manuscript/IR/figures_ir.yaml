    extracted immediately with BHT-containing MTBE/MeOH Single endpoint (baseline, no inflammasome stimulation). Readout:
    Total cardiolipin (CL) content and abundance of individual CL molecular species (LC–MS/MS lipidomics (positive/negative
    ion modes with MS/MS confirmation of CL species)). Normalization: Absolute abundances normalized to cell number using
    internal standards (nmol per 10^6 cells). n: n ≥ 3 per group; reproduced in ≥2 independent experimental batches; stats:
    two-tailed unpaired t-test. Species-level fold changes were calculated relative to WT; broad downregulation across the
    CL species pool was evaluated using abundance-weighted summaries.

    (e) Pharmacological inhibition with alexidine dihydrochloride (AD) reduces NAO-associated fluorescence and collapses genotype-dependent
    differences in WT and Ephb1−/− primary peritoneal macrophages. (Representative NAO fluorescence images (±AD) under fixed
    exposure; Imaging-based NAO intensity quantification in WT (±AD)). AD pretreatment (10 μM, 16 h) followed by LPS priming
    and nigericin stimulation, then NAO staining (200 nM, 30 min) NAO imaging performed after staining under fixed exposure
    conditions. Readout: NAO fluorescence intensity as a readout of the NAO-accessible cardiolipin pool (Fixed-exposure fluorescence
    microscopy with ImageJ-based quantification). Normalization: Images were acquired using identical exposure/gain settings;
    fluorescence quantification used a unified ImageJ thresholding workflow with background subtraction. n: n ≥ 3 per group;
    results reproduced in ≥3 independent experiments; stats: two-tailed unpaired t-test.

    (f) Pharmacological inhibition with alexidine dihydrochloride (AD) reduces NAO-associated fluorescence and collapses genotype-dependent
    differences in WT and Ephb1−/− primary peritoneal macrophages. (NAO intensity comparison across WT/KO × ±AD; Genotype-wise
    difference in NAO signal before and after AD treatment). AD pretreatment (10 μM, 16 h) followed by LPS priming and nigericin
    stimulation, then NAO staining (200 nM, 30 min) NAO imaging performed after staining under fixed exposure conditions.
    Readout: NAO fluorescence intensity as a readout of the NAO-accessible cardiolipin pool (Fixed-exposure fluorescence microscopy
    with ImageJ-based quantification). Normalization: Images were acquired using identical exposure/gain settings; fluorescence
    quantification used a unified ImageJ thresholding workflow with background subtraction. n: n ≥ 3 per group; results reproduced
    in ≥3 independent experiments; stats: two-tailed unpaired t-test.

    (g) IL-1β release from WT and Ephb1−/− primary peritoneal macrophages following LPS and nigericin stimulation in the presence
    of increasing doses and durations of alexidine dihydrochloride (AD).. AD pretreatment (1, 2, or 4 μM for 4 h or 16 h),
    followed by LPS priming (100 ng/mL, 4 h) and nigericin stimulation (10 μM, 1 h) Supernatants collected after 1 h of nigericin
    stimulation. Readout: IL-1β release in culture supernatants (ELISA). Normalization: ELISA signals were background-subtracted
