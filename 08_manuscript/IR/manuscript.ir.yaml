  sections:
  - id: abstract
    title: Abstract
    blocks:
    - type: paragraph
      text: Inflammasome activation does not necessarily translate into pyroptotic output and proportional IL-1β release. Emerging evidence suggests that mitochondrial membrane context, particularly cardiolipin status, influences inflammasome output, yet the upstream mechanisms remain unclear. We asked whether EphB1 loss alters cardiolipin-linked mitochondrial membrane context to raise the threshold for gasdermin D execution and thereby attenuate inflammasome-induced lytic output. Using primary murine peritoneal macrophages, we combined genetic and pharmacological perturbations with functional mapping and integrative multi-omics to test links between upstream signaling, membrane context, and terminal output. EphB1 deficiency consistently reduced IL-1β release and cell lysis across multiple inflammasome stimuli while leaving transcriptional priming, ASC assembly, and caspase-1 activation intact, localizing the defect to the execution stage. This phenotype was accompanied by reduced mitochondrial
        enrichment of GSDMD-NT, coordinated decreases in cardiolipin abundance, and phenocopying by pharmacological disruption of cardiolipin state. These findings support a cardiolipin-mediated model in which EphB1-dependent signaling remodels cardiolipin to shift the threshold for GSDMD-dependent execution, helping explain how inflammasome activation can be uncoupled from output intensity.
  - id: introduction
    title: Introduction
    blocks:
    - type: paragraph
      text: 'Over the past two decades, the global disease burden has shifted increasingly toward chronic non-communicable diseases driven in part by persistent inflammation, making inflammatory dysregulation a major public-health challenge. In 2021, cardiovascular diseases, cancer, chronic respiratory diseases, and diabetes together accounted for approximately 43 million deaths, representing nearly three quarters of all non-pandemic-related deaths. {doi:10.5334/aogh.4649} Beyond chronic inflammatory disease, severe systemic inflammatory syndromes such as sepsis also remain major contributors to global mortality. {doi:10.1016/s0140-6736(19)32989-7} {doi:10.1016/s2214-109x(25)00356-0} At the molecular level, the NLRP3 inflammasome is widely regarded as a convergence point for diverse acute and chronic inflammatory pathologies. {doi:10.1038/s41577-019-0165-0} Although regulatory frameworks have been described for NLRP3 priming, assembly, and execution, therapeutic strategies still largely
        focus on suppressing activation or other upstream steps. {doi:10.1038/s41577-019-0165-0} {doi:10.1038/nrd.2018.97} This therapeutic emphasis raises a central mechanistic question: can inflammatory output be limited without fully suppressing inflammasome activation?'
      paragraph_group: field_importance
      section_heading: Inflammasome output imbalance and immunopathological consequences
      source_pids:
      - 1.1.1.p1
      - 1.1.1.p2
      - 1.1.1.p3
      selected_sids:
      - 1.1.1.p1s1
      - 1.1.1.p1s2
      - 1.1.1.p2s1
      - 1.1.1.p3s3
      - 1.1.1.p3s4
      - 1.1.1.p3.bridge
    - type: paragraph
      text: Pyroptosis can be viewed as three linked but separably regulated stages—priming, inflammasome assembly/caspase activation, and terminal execution—each of which can independently influence inflammatory output. Priming sets the readiness of inflammasome components, assembly governs whether inflammasomes form and caspases activate, and execution determines the magnitude and form of the ensuing inflammatory output. In canonical pathways, inflammatory caspases cleave GSDMD to expose an N-terminal fragment that oligomerizes into pores, enabling cytokine release and promoting osmotic lysis. {doi:10.1038/nature15514} {doi:10.1038/nature15541} Structural and functional studies suggest that the efficiency of GSDMD-NT pore formation helps determine the threshold at which inflammatory output shifts from a controlled state to lytic rupture. {doi:10.1038/nature18629} {doi:10.1073/pnas.1607769113} GSDMD-NT does not insert indiscriminately into all lipid membranes; it preferentially targets
        negatively charged phospholipids, particularly membranes enriched in cardiolipin (CL). {doi:10.1038/nature18629} {doi:10.1038/nature18590} This lipid dependence suggests that membrane composition may help set the threshold for pyroptotic execution.
      paragraph_group: known_mechanism
      section_heading: Layered thresholds and membrane-environment constraints
      source_pids:
      - 1.1.2.p1
      - 1.1.2.p2
      - 1.1.2.p3
      - 1.1.2.p4
      selected_sids:
      - 1.1.2.p1s1
      - 1.1.2.p1s2
      - 1.1.2.p2s1
      - 1.1.2.p3s1
      - 1.1.2.p4s1
      - 1.1.2.p4.bridge
    - type: paragraph
      text: Before the plasma membrane, GSDMD-NT can rapidly damage both inner and outer mitochondrial membranes. {doi:10.1016/j.immuni.2023.10.004} Mitochondria may also feed back to shape inflammasome signaling, because their functional state influences sensitivity to NLRP3 activation cues. {doi:10.1038/s41590-022-01185-3} If pore formation is sensitive to lipid context, dynamically remodeled mitochondrial lipids become plausible mediators linking upstream signals to divergence at the execution stage. Cardiolipin is a mitochondria-enriched phospholipid that links membrane architecture to bioenergetic function and is therefore a plausible mediator of execution-stage membrane behavior. {doi:10.3390/cells8070728} In addition, CL provides a lipid environment that supports the assembly and membrane association of inner-membrane protein complexes, including processes involved in respiratory-chain biogenesis. {doi:10.1242/jcs.240374} CL is not a static background lipid but undergoes regulated
        changes under stress and immune activation, linking mitochondrial membrane state to inflammatory signaling. {doi:10.1016/j.immuni.2013.08.001} {doi:10.4161/auto.27191} {doi:10.1016/j.celrep.2024.114237} CL oxidation has been associated with membrane damage and inflammatory amplification in relevant stress contexts. {doi:10.1016/j.celrep.2024.114237} Rather than viewing mitochondrial status as a dispersed set of signals such as ROS, mtDNA, and membrane potential, CL state may offer a more execution-proximal link between mitochondrial condition and pore-forming efficiency. This unresolved link motivates the search for an upstream receptor-level mechanism that connects extracellular cues to CL-dependent execution thresholds.
      paragraph_group: mechanistic_focus
      section_heading: Layered thresholds and membrane-environment constraints
      source_pids:
      - 1.1.2.p5
      - 1.1.2.p6
      - 1.1.2.p7
      - 1.1.3.p1
      - 1.1.3.p2
      - 1.1.3.p3
      selected_sids:
      - 1.1.2.p5s2
      - 1.1.2.p6s1
      - 1.1.2.p7s1
      - 1.1.3.p1s1
      - 1.1.3.p1s4
      - 1.1.3.p2s1
      - 1.1.3.p2s4
      - 1.1.3.p3s1
      - 1.1.3.p3.bridge
    - type: paragraph
      text: 'Current evidence supports a connection between CL dynamics and inflammatory execution. By contrast, a key unresolved question lies upstream: which receptor-level signals reshape CL state through downstream pathways and thereby alter terminal inflammatory output? Because Eph–ephrin signaling converts cell–cell contact into downstream programs that shape adhesion, cytoskeletal organization, and microenvironmental responses, it offers a plausible receptor-level route linking extracellular context to pyroptotic execution. Whether Ephb1 participates in inflammasome and pyroptotic execution is itself unresolved, and, if so, whether its mitochondrial effects can be linked to measurable membrane-state readouts such as CL remains unknown. However, Eph family functions are pleiotropic, and even closely related EphB subtypes can have opposing effects across tissues, limiting inference from family membership alone. These gaps motivate a falsifiable model in which Ephb1 influences pyroptotic
        execution through downstream pathways that reshape CL state.'
      paragraph_group: knowledge_gap
      section_heading: Cardiolipin as a membrane-environment readout and interface
      source_pids:
      - 1.1.3.p3
      - 1.2.5.p1
      - 1.2.5.p3
      selected_sids:
      - 1.1.3.p3s2
      - 1.1.3.p3s3
      - 1.2.5.p1s2
      - 1.2.5.p3s1
      - 1.2.5.p3s3
      - 1.2.5.p3.bridge
    - type: paragraph
      text: 'A central question is whether Ephb1 itself participates in terminal inflammasome execution and, if so, whether it does so through downstream pathways that reshape CL state. Current evidence does not yet establish Ephb1 as a regulator of inflammasome or pyroptotic execution, nor does it provide a systems-level framework for linking receptor-level signals to integrated changes in CL state. We therefore approached the problem in a staged manner: first asking whether Ephb1 alters inflammasome output, then localizing the point of divergence within the pathway, and finally testing whether membrane-state changes could account for the phenotype. Rather than assuming that phenotypic differences simply reflect stronger or weaker upstream activation, we asked which layer differs and whether execution thresholds or output amplitude can be tuned. This strategy led us to examine a membrane-mediated explanation in which CL state functions as an integrated mitochondrial readout linking upstream
        signaling to execution output. Accordingly, the study tests whether changes in CL state are sufficient to explain divergence in execution output without requiring complete molecular resolution of every intermediate step.'
      paragraph_group: hypothesis
      section_heading: Scientific question, hypotheses, and study objectives
      source_pids:
      - 1.3.p4
      - 1.3.p5
      - 1.3.p6
      selected_sids:
      - 1.3.p4s1
      - 1.3.p4s3
      - 1.3.p5s1
      - 1.3.p6s1
      - 1.3.p6s2
      - 1.3.p6s3
  - id: methods
    title: Methods
    blocks:
    - type: heading
      level: 2
      text: Animals
    - type: paragraph
      text: All experiments were performed using mice on a C57BL/6J genetic background. Ephb1 mutant mice and wild-type littermates were used in this study. Ephb1 mutant mice were obtained from the piggyBac (PB) transposon-based mouse mutant library at the Institute of Developmental Biology and Molecular Medicine, Fudan University. Mice were housed under specific pathogen-free (SPF) conditions with controlled temperature, humidity, and a 12 h light/12 h dark cycle. Animals had ad libitum access to sterilized standard chow and acidified drinking water. Genotypes were confirmed by PCR-based analysis, and mice aged 6-10 weeks were used for experiments. All animal procedures were approved by the Institutional Animal Care and Use Committee of Fudan University and conducted in accordance with relevant guidelines and regulations.
    - type: heading
      level: 2
      text: Primary peritoneal macrophage isolation
    - type: paragraph
      text: Primary peritoneal macrophages were isolated from 6–10-week-old C57BL/6J wild-type and Ephb1-deficient mice. To elicit macrophage recruitment, mice were intraperitoneally injected with 2 mL of sterile 4% thioglycollate medium. Three days after injection, peritoneal exudate cells were harvested by lavage with pre-warmed phosphate-buffered saline (PBS). Recovered cells were collected by centrifugation and subjected to red blood cell lysis when necessary. Cells were resuspended in RPMI 1640 medium supplemented with 10% fetal bovine serum and antibiotics, counted, and seeded at the indicated densities. After 1–2 h of incubation, non-adherent cells were removed by gentle washing with PBS, and adherent macrophages were cultured overnight before downstream stimulation and assay procedures.
    - type: heading
      level: 2
      text: Cell culture and inflammasome stimulation
    - type: paragraph
      text: Primary peritoneal macrophages were subjected to defined inflammasome priming and activation protocols, with Ephb1-Fc perturbation applied where indicated. For inflammasome priming, cells were treated with lipopolysaccharide (LPS) at a final concentration of 1–10 ng/mL for 4 h. NLRP3 inflammasome activation was induced by treatment with either nigericin or ATP, NLRC4 activation was triggered by cytosolic delivery of flagellin, and AIM2 activation was induced by transfection of poly(dA:dT). For NLRP3 activation, cells were stimulated with nigericin (10 µg/mL) for 7.5–120 min or ATP (5 mM) for 2 h. For NLRC4 activation, cells were transfected with flagellin (0.5 ng/mL) using Lipofectamine 2000 and incubated for 2 h. For AIM2 activation, cells were transfected with poly(dA:dT) (0.1 ng/mL) using Lipofectamine 2000 and incubated for 8 h. Where indicated, cells were co-treated with Ephb1-Fc fusion protein to modulate ephrin-B/EphB signaling during inflammasome activation. To generate
        higher-order Ephb1-Fc clusters, Ephb1-Fc was pre-incubated with anti-human IgG Fc-specific antibody at a 10:1 ratio for 30 min at room temperature with gentle rotation. Ephb1-Fc complexes were prepared at final concentrations of 5, 0.5, 0.05, or 0.005 µg/mL in complete RPMI 1640 medium. Pre-formed Ephb1-Fc complexes were added to cell cultures together with the indicated inflammasome stimuli. At the end of stimulation, culture plates were immediately placed on ice, and supernatants and cell lysates were collected for downstream analyses.
    - type: heading
      level: 2
      text: Inflammasome assembly assays
    - type: paragraph
      text: Inflammasome assembly was assessed by detecting ASC oligomerization using a chemical crosslinking-based assay. Primary peritoneal macrophages were stimulated to activate the NLRP3 inflammasome under the indicated stimulation conditions. Following stimulation, cells were lysed with Triton X-100-containing buffer to separate soluble and detergent-insoluble fractions. The detergent-insoluble pellet fraction, enriched for ASC specks, was collected for crosslinking analysis. ASC oligomers in the insoluble fraction were chemically crosslinked using disuccinimidyl suberate (DSS). Crosslinking reactions were terminated by SDS-mediated denaturation prior to sample processing. Crosslinked samples were analyzed by SDS-PAGE followed by Western blotting to detect high-molecular-weight ASC oligomers. ASC oligomerization patterns in crosslinked insoluble fractions were compared with corresponding soluble lysate fractions.
    - type: heading
      level: 2
      text: Inflammasome output and cell death assays
    - type: paragraph
      text: Inflammasome-associated cell death and cytokine release were quantitatively assessed following pharmacological or genetic perturbations. Primary peritoneal macrophages were seeded in 96-well plates at a density of 1 × 10^5 cells per well and cultured overnight to allow metabolic stabilization. Cells were subjected to inflammasome activation or control treatments as described above under a final volume of 100 µL per well. For maximal LDH release controls, cells were treated with lysis solution 45 min prior to sample collection. Following treatment, culture supernatants were collected for lactate dehydrogenase (LDH) release measurements. LDH activity in culture supernatants was determined using the CytoTox 96® Non-Radioactive Cytotoxicity Assay according to the manufacturer’s instructions. Absorbance was measured at 490–492 nm using a multimode microplate reader. Percent cytotoxicity was calculated by normalizing LDH release from treated samples to maximal LDH release controls
        after background subtraction. Levels of secreted cytokines in culture supernatants were measured using mouse TNF-α, IL-6, and IL-1β uncoated ELISA kits. Cytokine concentrations were calculated from standard curves generated using serially diluted recombinant standards. To distinguish inflammasome-associated output from non-pyroptotic cell death, apoptosis control assays were performed separately under matched culture conditions. Apoptosis was induced by treating cells with staurosporine at a final concentration of 1 µM for 4 h, with vehicle-treated cells serving as controls. Apoptotic signaling was evaluated by immunoblot detection of cleaved caspase-3. Data were obtained from at least three independent experiments and analyzed using the statistical procedures described below.
    - type: heading
      level: 2
      text: Mitochondrial functional assays
    - type: paragraph
      text: Cellular and mitochondrial reactive oxygen species (ROS) production and mitochondrial membrane potential were assessed using fluorescent probe-based assays. H2DCFDA was used to monitor total intracellular ROS, MitoSOX Red was used to detect mitochondrial superoxide, and tetramethylrhodamine methyl ester (TMRM) was used to assess mitochondrial membrane potential. Experiments were performed sequentially, including LPS priming, probe loading, inflammasome activation, and fluorescence measurement. Cells were primed with lipopolysaccharide (LPS) for 4 h prior to fluorescent probe loading. For probe loading, cells were incubated with H2DCFDA, MitoSOX Red, and TMRM in serum-free medium during the final 45 min of LPS priming. Inflammasome activation was triggered by treatment with nigericin at a final concentration of 10 µg/mL. Fluorescence signals were recorded immediately after stimulation using a temperature-controlled multimode microplate reader. Fluorescence intensity was measured
        at excitation/emission wavelengths of approximately 488/525 nm for H2DCFDA, 510/580 nm for MitoSOX Red, and 550/576 nm for TMRM. Kinetic measurements were performed at 2.5-min intervals for up to 2 h following nigericin stimulation. Fluorescence signals were quantified and compared across experimental conditions to assess changes in cellular ROS, mitochondrial superoxide, and mitochondrial membrane potential.
    - type: heading
      level: 2
      text: Cardiolipin accessibility and imaging assays
    - type: paragraph
      text: Mitochondrial cardiolipin content was assessed using 10-N-nonyl acridine orange (NAO) staining. NAO was used at low nanomolar concentrations to semi-quantitatively monitor cardiolipin-associated fluorescence signals in mitochondria. Following experimental treatments, cells were incubated with NAO at a final concentration of 200 nM for 30 min at 37 °C. After staining, fluorescence signals were acquired using either a multimode microplate reader or fluorescence microscopy. NAO fluorescence was measured at excitation/emission wavelengths of approximately 519/555 nm. Changes in NAO fluorescence intensity were used to compare cardiolipin-associated signals across experimental conditions. In parallel with plate-based NAO quantification, microscopy-based imaging was performed to assess the subcellular distribution of cardiolipin-associated signals. Confocal microscopy of NAO-stained primary macrophages was performed to visualize cardiolipin-associated subcellular signals. Primary peritoneal
        macrophages were cultured on glass coverslips and subjected to the indicated treatments prior to fixation. Cells were fixed and, where indicated, permeabilized prior to staining. For imaging, cells were stained with NAO to visualize cardiolipin-associated mitochondrial signals, with DAPI counterstaining applied where indicated. Fluorescence images were acquired using an Olympus SpinSR super-resolution confocal microscope. Multichannel images were collected using identical laser power, detector gain, and exposure settings for all experimental groups. For each condition, multiple randomly selected fields of view were imaged, and a minimum of 100 cells per group were analyzed. NAO fluorescence was quantified by applying consistent intensity thresholding and particle/region-of-interest analysis to derive signal intensity and/or area metrics. Image quantification was performed using ImageJ software with consistent analysis parameters applied across all samples.
    - type: heading
      level: 2
      text: Mitochondrial isolation and mtDNA release analysis
    - type: paragraph
      text: Mitochondria were isolated to assess mitochondrial integrity and cytosolic release of mitochondrial DNA (mtDNA) following inflammasome activation. Primary peritoneal macrophages were stimulated with lipopolysaccharide followed by nigericin prior to subcellular fractionation. Mitochondria were isolated using a commercial mitochondria isolation kit based on differential centrifugation under cold conditions. Differential centrifugation was used to obtain mitochondrial fractions, cytosolic fractions, and corresponding total cell lysates for comparison. Isolated mitochondrial pellets were either maintained in storage buffer for functional analyses or lysed for downstream protein or nucleic acid extraction. The purity of mitochondrial fractions was evaluated by quantitative PCR analysis of mitochondrial-encoded and nuclear-encoded DNA markers. Cytosolic mtDNA release was quantified by comparing mtDNA abundance in cytosolic fractions relative to total cellular mtDNA. DNA was extracted
        from total, mitochondrial, and cytosolic fractions, and mtDNA levels were quantified by real-time PCR. Relative mtDNA release was calculated using ΔCt-based normalization of cytosolic mtDNA to total mtDNA within each sample. Analyses were performed using samples from at least three independent biological replicates and evaluated using the statistical procedures described below.
    - type: heading
      level: 2
      text: Immunoblot analysis
    - type: paragraph
      text: Protein expression was analyzed by Western blotting. Cells were lysed in Laemmli sample buffer supplemented with protease and phosphatase inhibitors, followed by heat denaturation. Protein samples were separated by SDS-PAGE using gels of appropriate acrylamide concentrations based on target protein molecular weight. Separated proteins were transferred onto polyvinylidene fluoride (PVDF) membranes under cold conditions. Membranes were blocked and incubated with primary antibodies overnight at 4 °C, followed by incubation with HRP-conjugated secondary antibodies. Protein signals were visualized using enhanced chemiluminescence reagents and captured with a digital imaging system. Band intensities were quantified by densitometric analysis and normalized to GAPDH as a loading control. Immunoblot quantification data were obtained from at least three independent experiments and analyzed using the statistical procedures described below.
    - type: heading
      level: 2
      text: Quantitative PCR analysis
    - type: paragraph
      text: Gene expression was quantified by real-time quantitative PCR (qPCR). Total RNA was extracted from primary peritoneal macrophages using TRIzol reagent according to standard protocols. Complementary DNA (cDNA) was synthesized using a two-step reverse transcription protocol with genomic DNA removal. Quantitative PCR was performed using SYBR Green-based detection chemistry on a real-time PCR system. Gene expression levels were normalized to the geometric mean of GAPDH and HPRT1 as reference genes. Amplification specificity was confirmed by melt curve analysis, and technical replicates with excessive Ct variation were excluded. Relative gene expression was calculated using the ΔΔCt method with wild-type samples serving as calibrators. Each mouse was treated as an independent biological replicate, and data were analyzed using the statistical procedures described below.
    - type: heading
      level: 2
      text: Lipidomics
    - type: paragraph
      text: Lipidomic analyses were performed to characterize global and pathway-specific lipid alterations in primary peritoneal macrophages following Ephb1 deficiency. Cellular lipids were extracted using a modified methyl tert-butyl ether (MTBE)-based method. Untargeted lipidomics was conducted to enable broad-spectrum detection and identification of lipid species. Lipid extracts were analyzed by liquid chromatography coupled to high-resolution mass spectrometry with polarity switching and data-dependent MS/MS acquisition. Lipid species were identified based on accurate mass measurements and MS/MS fragmentation patterns using dedicated lipidomics analysis software. Targeted lipidomics was performed to quantitatively validate selected lipid species of interest identified in the untargeted analysis. Quantification was achieved using internal standards and calibration curves, and lipid abundances were expressed as relative or absolute quantities as appropriate. Lipidomic data were normalized
        and scaled prior to statistical analysis to reduce technical variation and improve comparability across samples. Differential lipid abundance was assessed using univariate statistical testing and multivariate analyses, including principal component analysis. Quality control samples were included throughout the analytical workflow to monitor instrument stability, reproducibility, and data reliability.
    - type: heading
      level: 2
      text: Transcriptomics
    - type: paragraph
      text: RNA sequencing (RNA-seq) was performed to characterize global transcriptomic changes in primary peritoneal macrophages. Total RNA was extracted from macrophages, and RNA integrity and purity were assessed to ensure suitability for library construction. Strand-specific RNA-seq libraries were prepared following mRNA enrichment or rRNA depletion using standard protocols. Libraries were sequenced on an Illumina high-throughput sequencing platform using paired-end reads. Raw sequencing reads were subjected to quality control to remove adaptor sequences and low-quality reads prior to downstream analysis. Clean reads were aligned to the reference mouse genome, and gene-level expression counts were generated using standard alignment and quantification pipelines. Differentially expressed genes were identified using statistical models based on normalized read counts with multiple testing correction. Functional annotation and enrichment analyses were performed to identify biological processes
        and pathways associated with differentially expressed genes.
    - type: heading
      level: 2
      text: Statistical analysis
    - type: paragraph
      text: Statistical analyses were performed to compare experimental groups and evaluate the significance and consistency of observed effects. Data analysis and visualization were conducted using R and Python. Data distributions were assessed for normality prior to statistical testing, and appropriate parametric or non-parametric tests were selected accordingly. Two-group comparisons were performed using two-tailed Student’s t-tests or non-parametric alternatives, while multi-group comparisons were analyzed using analysis of variance (ANOVA) with appropriate post hoc tests. Data are presented as mean ± SD unless otherwise indicated, with individual data points shown where appropriate. All statistical tests were two-sided, and P values less than 0.05 were considered statistically significant. Detailed information on sample size, statistical tests, and significance values is provided in the corresponding figure legends.
    - type: heading
      level: 2
      text: Data availability and reproducibility
    - type: paragraph
      text: Data management and analysis were performed in accordance with standard practices to ensure data integrity, traceability, and reproducibility. Raw experimental data were securely stored and backed up throughout the study. Data processing and statistical analyses were conducted using documented workflows, and analysis parameters were recorded to support reproducibility. Key experimental findings were validated using independent biological replicates across separate experiments. Data supporting the findings of this study are available from the corresponding author upon reasonable request.
  - id: results
    title: Results
    blocks:
    - type: heading
      level: 2
      text: Ephb1 deficiency reduces pyroptosis and IL-1β release
    - type: paragraph
      text: To identify regulators of inflammasome output, we subjected primary macrophages from multiple PiggyBac (PB) genetic backgrounds to standardized NLRP3 inflammasome activation and used IL-1β release as the screening readout (Fig. 1a). Across the 10 screened strains, most showed little or no genotype-dependent difference in IL-1β release after nigericin stimulation, and only two reached statistical significance in within-strain comparisons (Fig. 1b). The Ephb1-associated strain (081230020-HRB) showed a pronounced reduction in IL-1β release in EphB1-deficient macrophages (~41% relative to WT; P≈0.034), representing the strongest statistically significant effect in the screen and nominating Ephb1 for mechanistic analysis.
      source: figure_1_a_000.yaml,figure_1_b_001.yaml
      panel_id: 1a,1b
    - type: paragraph
      text: We next tested whether this phenotype extended beyond a single inflammasome agonist. Across all three activation routes, Ephb1-deficient macrophages released significantly less IL-1β than WT controls (Fig. 1c). These data indicate that the reduced IL-1β output in EphB1-deficient macrophages is not limited to a single activation route, supporting a role for EphB1 downstream of receptor-specific triggering. We next tested whether Ephb1 loss also constrains lytic execution across distinct inflammasome sensors. Across all inflammasome activation conditions, Ephb1-deficient macrophages consistently showed reduced LDH release relative to WT controls (Fig. 1d). These findings indicate that EphB1 deficiency broadly attenuates pyroptotic lysis downstream of distinct inflammasome receptors, consistent with a role in a shared execution step.
      source: figure_1_c_v2.yaml,figure_1_d_v2.yaml
      panel_id: 1c,1d
    - type: paragraph
      text: We therefore asked whether the defect in Ephb1-deficient macrophages reflects impaired upstream priming or assembly, or instead a restriction at the terminal GSDMD-dependent execution stage.
      source: opening_and_trans.yaml
      panel_id: ''
    - type: heading
      level: 2
      text: Ephb1 deficiency reduces pyroptotic execution
    - type: paragraph
      text: To localize the Ephb1-dependent defect within the inflammasome pathway, we compared responses triggered by NLRP3 in WT and Ephb1-deficient macrophages.
      source: opening_and_trans.yaml
      panel_id: ''
    - type: paragraph
      text: LPS stimulation induced robust and comparable increases in Tnf, Il6, and Il1b mRNA in WT and Ephb1-deficient macrophages (Fig. 2a,b; Fig. S1a). Together, these data indicate that Ephb1 deficiency does not impair TLR4–NF-κB–dependent transcriptional priming. To assess whether secretion was broadly impaired, we measured conventional cytokine release. LPS stimulation induced comparable TNF-α and IL-6 release in WT and Ephb1-deficient macrophages, with no significant genotype-dependent differences (Fig. 2c; Fig. S1b). Thus, Ephb1 deficiency does not measurably impair TLR4-driven secretion of TNF-α or IL-6, arguing against a generalized secretory defect as the basis for reduced inflammasome output.
      source: figure_2_a+b.yaml,figure_2_c_v2.yaml
      panel_id: 2a/b,2c
    - type: paragraph
      text: We then tested whether the Ephb1-dependent difference in IL-1β release persisted across different levels of inflammasome stimulation. While IL-1β release increased with higher nigericin doses in both genotypes, Ephb1-deficient macrophages consistently released less IL-1β than WT controls at each dose (Fig. 2d). These results indicate that Ephb1 deficiency limits mature IL-1β release across the tested range of NLRP3 activation, consistent with a defect at a late execution or export step. We then tested whether the defect arose at the level of ASC inflammasome assembly. Under NLRP3 activation conditions, Ephb1-deficient macrophages showed ASC oligomer, dimer, and monomer levels comparable to those in WT controls (Fig. 2e). These data indicate that Ephb1 deficiency does not disrupt ASC oligomerization during NLRP3 activation, arguing against defective inflammasome assembly as the cause of reduced downstream output.. We then tested whether caspase-1 activation was preserved. Caspase-1
        activation, as reflected by intracellular p20 levels, was comparable between WT and Ephb1-deficient macrophages (Fig. 2f). These results localize the Ephb1-dependent defect to a step downstream of caspase-1 activation. We then tested whether the canonical caspase-1 substrates, pro-IL-1β and GSDMD, were processed normally. Caspase-1–dependent cleavage of GSDMD and pro–IL-1β occurred efficiently in Ephb1-deficient macrophages, with cleavage and maturation levels comparable to those in WT cells (Fig. 2g). Together, these results show that Ephb1 deficiency does not impair caspase-1 substrate cleavage but selectively limits extracellular release of mature inflammasome products, localizing the defect to a late execution or export step.
      source: figure_2_d.yaml,figure_2_e.yaml,figure_2_f.yaml,figure_2_g.yaml
      panel_id: 2d,2e,2f,2g
    - type: paragraph
      text: We therefore asked whether the Ephb1-dependent defect specifically affects the early interaction of GSDMD-NT with mitochondria before pore function and organelle injury.
      source: opening_and_trans.yaml
      panel_id: ''
    - type: heading
      level: 2
      text: Ephb1 deficiency reduces mitochondrial enrichment of GSDMD
    - type: paragraph
      text: To investigate how Ephb1 regulates pyroptotic execution, we examined mitochondrial integrity and GSDMD localization during NLRP3 activation in WT and Ephb1-deficient macrophages.
      source: opening_and_trans.yaml
      panel_id: ''
    - type: paragraph
      text: Upon inflammasome activation, Ephb1-deficient macrophages showed reduced cytosolic ROS accumulation and less mitochondrial depolarization than WT cells. By contrast, mitochondrial ROS levels measured by MitoSOX did not differ significantly between genotypes, and TMRM measurements showed comparable basal mitochondrial membrane potential prior to inflammasome activation, arguing against baseline mitochondrial differences as the source of the phenotype (Fig. 3a,b,c,d,e,f,g,h). Together, these results indicate that Ephb1 promotes mitochondrial rupture. In WT macrophages, inflammasome activation induced a rapid, transient pulse of cytosolic mtDNA that peaked at 7.5 min, whereas this peak was markedly reduced in Ephb1-deficient macrophages (Fig. 3i,j; Fig. S2a; Fig. S2c; Fig. S2d). Together, these results indicate that Ephb1 deficiency reduces inflammasome-induced release of mitochondrial DNA into the cytosol without altering total mtDNA abundance. In WT macrophages, GSDMD-NT accumulated
        in the mitochondrial fraction at approximately 7.5 min after inflammasome activation, whereas this early mitochondrial enrichment was markedly reduced in Ephb1-deficient macrophages (Fig. 3k; Fig. S2b). Together, these results indicate that EphB1 promotes early mitochondrial enrichment of GSDMD-NT during inflammasome activation.
      source: figure_3_a+b+c+d+e+f+g+h.yaml,figure_3_i+j+s3_d+f+g.yaml,figure_3_k+s3_e.yaml
      panel_id: 3a/b/c/d/e/f/g/h,3/i/j,3k
    - type: paragraph
      text: We therefore asked whether cardiolipin abundance at the mitochondrial membrane accounts for the reduced mitochondrial engagement of GSDMD-NT.
      source: opening_and_trans.yaml
      panel_id: ''
    - type: heading
      level: 2
      text: Ephb1 deficiency reduces cardiolipin abundance
    - type: paragraph
      text: To determine whether mitochondrial membrane composition contributes to the Ephb1-dependent phenotype, we quantified cardiolipin abundance in WT and Ephb1-deficient macrophages.
      source: opening_and_trans.yaml
      panel_id: ''
    - type: paragraph
      text: Ephb1-deficient macrophages displayed significantly lower NAO fluorescence than WT cells, indicating a reduced NAO-detectable cardiolipin pool (Fig. 4a,b). Lipidomic analysis was then used to determine whether total cardiolipin abundance was also altered. Compared with WT cells, Ephb1-deficient macrophages showed a significant reduction in total cardiolipin abundance, to approximately 70% of WT levels (Fig. 4c,d). Together, these data show that Ephb1 deficiency reduces both the NAO-accessible cardiolipin pool and total cardiolipin abundance.
      source: figure_4_a+b.yaml,figure_4_c+d.yaml
      panel_id: 4a/b,4c/d
    - type: paragraph
      text: We then tested whether pharmacological inhibition of cardiolipin biosynthesis reduced cardiolipin abundance. AD treatment markedly reduced NAO fluorescence in WT macrophages, indicating that pharmacological inhibition of cardiolipin biosynthesis reduces the NAO-detectable cardiolipin pool (Fig. 4e,f). We then tested whether reduced cardiolipin abundance affected inflammasome-mediated IL-1β release. AD treatment markedly suppressed LPS- and nigericin-induced IL-1β release in macrophages (Fig. 4g). These results indicate that pharmacological reduction of cardiolipin is sufficient to suppress inflammasome-induced IL-1β release.
      source: figure_4_e+f.yaml,figure_4_g.yaml
      panel_id: 4e/f,4g
    - type: paragraph
      text: BEL treatment led to a marked reduction in NAO fluorescence intensity, indicating that pharmacological interference with cardiolipin remodeling reduces the NAO-detectable cardiolipin pool (Fig. S3a,b). Together, these results show that both reduced cardiolipin content and disrupted cardiolipin remodeling can lower NAO staining. Across both perturbation strategies, reduced cardiolipin availability consistently decreased LPS- and nigericin-induced IL-1β release (Fig. S3c). These results suggest that cardiolipin abundance and state are important determinants of inflammasome-mediated IL-1β release.
      source: figure_4_sa+b.yaml,figure_4_sc.yaml
      panel_id: s3a/b,s3c
    - type: heading
      level: 2
      text: Membrane context is the dominant cardiolipin-related axis perturbed by Ephb1 deficiency
    - type: paragraph
      text: To identify cellular processes associated with cardiolipin variation, we constructed cardiolipin-centered biological process axes and evaluated their associations with cardiolipin abundance across batches.
      source: opening_and_trans.yaml
      panel_id: ''
    - type: paragraph
      text: The resulting framework comprised six functional axes—synthesis, remodeling, transport, supply, oxidation, and membrane context—each represented by genes and lipid readouts derived from transcriptomic and lipidomic datasets (Fig. 5a). For each axis, representative genes and lipid features were specified using predefined weighting and inclusion rules (Fig. 5b). For each omics layer, raw data underwent quality control, normalization, and batch-aware modeling, followed by aggregation into predefined axis-level Z scores used for multi-omics integration (Fig. 5c).
      source: figure_5_a.yaml,figure_5_b.yaml,figure_5_c.yaml
      panel_id: 5a,5b,5c
    - type: paragraph
      text: Across three RNA-seq batches and four lipidomics batches, only the membrane context axis showed a consistent positive effect across both omics layers (Fig. 5d). These results identify membrane context as the only axis consistently perturbed by Ephb1 deficiency across datasets. Among the six axes, membrane context showed the largest deviation from zero, with a multi-omics Z score of approximately +2.6 (Fig. 5e). These results identify membrane context as the dominant cardiolipin-related axis perturbed by Ephb1 deficiency. Among all axes, the membrane context axis showed the strongest negative association with sum_CL, such that higher combined Z scores corresponded to lower total cardiolipin levels, whereas all other axes showed weak or near-zero correlations (Fig. 5f). These results indicate that total cardiolipin abundance closely tracks membrane context axis perturbation across batches.
      source: figure_5_d.yaml,figure_5_e.yaml,figure_5_f.yaml
      panel_id: 5d,5e,5f
    - type: paragraph
      text: We therefore asked which downstream Ephb1-associated signaling pathways correlate most strongly with the membrane context axis.
      source: opening_and_trans.yaml
      panel_id: ''
    - type: heading
      level: 2
      text: PI3K–AKT–mTOR signaling correlates with the membrane-context axis
    - type: paragraph
      text: To identify Ephb1 downstream signaling pathways associated with the membrane context axis, we constructed Ephb1-related pathway gene sets and evaluated their transcriptional changes across batches and their correlation with the membrane context axis.
      source: opening_and_trans.yaml
      panel_id: ''
    - type: paragraph
      text: We used an RNA-based framework to evaluate how Ephb1-dependent pathway scores associate with the membrane context axis (Fig. 6a). Candidate Ephb1 downstream signaling gene sets were then defined for pathway-level analysis. Each gene set represented an Ephb1-associated signaling pathway with predefined gene membership and scoring directionality (Fig. 6b). Across three RNA-seq batches, Ephb1 deficiency consistently reduced PI3K–AKT–mTOR pathway scores (KO < WT). NF-κB/ROS and JAK–STAT modules showed weaker or batch-dependent reductions, whereas cytoskeleton-related pathways showed positive shifts (Fig. 6c).
      source: figure_6_a.yaml,figure_6_b.yaml,figure_6_c_v2.yaml
      panel_id: 6a,6b,6c
    - type: paragraph
      text: We then asked which pathways showed the largest overall shifts across batches. Across pathways, PI3K–AKT–mTOR and JAK–STAT modules showed the largest downward shifts in Ephb1-deficient macrophages, whereas cytoskeleton/adhesion pathways (FAK–Src–Rho) showed positive shifts (Fig. 6d). Together, these results prioritize PI3K–AKT–mTOR as the most robust Ephb1-associated downstream signaling candidate. We then asked whether these pathway shifts correlated with the membrane context axis. Notably, the PI3K–AKT–mTOR pathway showed coordinated shifts along both axes, with KO samples displaced toward lower M and higher Z values, whereas WT samples occupied the opposite quadrant. In contrast, the JAK–STAT and FAK–Src–Rho pathways separated primarily along the Z axis while largely overlapping along the M axis (Fig. 6e). These results show that reduced PI3K–AKT–mTOR signaling is consistently associated with increased membrane context axis scores.
      source: figure_6_d_v2.yaml,figure_6_e_v2.yaml
      panel_id: 6d,6e
  - id: discussion
    title: Discussion
    blocks:
    - type: paragraph
      text: 'The inflammasome field often treats upstream readouts—priming-dependent transcription, ASC speck formation, and caspase-1 activation—as near-equivalent proxies for inflammatory strength. In practice, a recurring structural paradox appears across models: upstream activation/assembly can look similar, yet lytic IL-1β release and membrane rupture diverge markedly. This activation–output decoupling is consistent with an execution-layer threshold or cap operating after assembly, shaping the magnitude and timing of output and whether rupture occurs at all. This paradox can be reduced to a falsifiable minimal chain in which signal input is translated through a membrane-state mediator into pore output. Our findings support this framework by localizing the phenotype to the execution layer and, in turn, to a threshold model of terminal output. Across a canonical LPS-priming–nigericin NLRP3 paradigm, as well as additional inflammasome settings, Ephb1-deficient macrophages showed blunted
        lytic output and reduced IL-1β release, without evidence that priming, assembly, or caspase activation was globally disabled. Instead, the divergence is better localized to the execution layer: pyroptosis is not a binary switch, but a graded process shaped by pore formation efficiency, pore stability and conductance, and a sublytic ceiling imposed by membrane repair.'
      source: discussion_outline_en.yaml
      paragraph_group: study_summary
      source_para_ids:
      - D1
      - D2
      selected_sids:
      - D1s1
      - D1s2
      - D1s3
      - D1s5
      - D2s1
      - D2s2
      - D2s3
    - type: paragraph
      text: The execution-threshold model can be interpreted mechanistically in terms of membrane repair, terminal rupture, and membrane-environment mediation. Notably, terminal rupture is separable from pore formation and can be amplified by dedicated rupture factors such as NINJ1, creating scope for activation without proportional rupture. At present, our strongest support is for necessity and layer-localization; sufficiency requires dedicated rescue and pathway-validation experiments. In this framework, the membrane lipid environment—not upstream assembly—serves as the mediator layer translating signal input into execution output. Within this mediator layer, cardiolipin (CL) is best viewed as a quantifiable metabolic and biophysical state, rather than merely a binding-site concept, that can shift pore permissiveness. In this framework, Ephb1 acts as an upstream signal entry point whose loss propagates through downstream signaling networks to remodel the mitochondrial membrane environment,
        thereby shifting the threshold and ceiling of GSDMD pore output.
      source: discussion_outline_en.yaml
      paragraph_group: mechanistic_interpretation
      source_para_ids:
      - D2
      - D3
      selected_sids:
      - D2s4
      - D2s5
      - D2s8
      - D3s1
      - D3s2
      - D3s3
    - type: paragraph
      text: 'Because complex systems often produce modest and distributed omics shifts, we avoid prematurely focusing on a single enzyme node and instead use cross-batch mechanism axes to capture reproducible membrane-environment phenotypes. We then use mediation decomposition to prioritize candidate downstream pathways that best explain how Ephb1 perturbs these axes and to generate a testable roadmap for targeted validation. This mediator-first framework provides an interpretable way to explain activation–output decoupling: similar upstream activation can yield divergent lytic outputs if membrane-environment thresholds shift.'
      source: discussion_outline_en.yaml
      paragraph_group: integration_with_literature
      source_para_ids:
      - D3
      selected_sids:
      - D3s4
      - D3s5
      - D3s7
    - type: paragraph
      text: A practical implication of an execution-layer cap is that inflammatory signaling could, in principle, be modulated without fully shutting down upstream inflammasome activation, thereby preserving host defense while limiting lytic damage below a pathological threshold. Ephb1 acts upstream to remodel the membrane environment, captured here by CL state, and thereby shifts the threshold and ceiling of GSDMD pore output, explaining why activation readouts can remain similar while lytic outputs diverge. Framing pyroptosis in threshold terms—through pore formation, repair capping, and rupture separability—turns activation–output decoupling from an empirical observation into a testable model for interpreting inflammasome outputs.
      source: discussion_outline_en.yaml
      paragraph_group: biological_implication
      source_para_ids:
      - D5
      selected_sids:
      - D5s1
      - D5s5
      - D5s6
    - type: paragraph
      text: 'Our central claim is deliberately scoped: the data most strongly support an execution-threshold model with membrane environment/CL as a high-priority mediator, whereas full sufficiency of the Ephb1→pathway→CL→pore chain remains to be established. We do not argue that upstream activation is irrelevant; rather, it is necessary but insufficient to predict lytic output magnitude, which also depends on execution-layer parameters such as pore efficiency and stability, repair engagement, and rupture probability. We also do not infer a direct Ephb1–GSDMD structural interaction or precise in situ CL accessibility or binding constants; instead, the framework is designed to explain relative threshold shifts using experimentally aligned readouts rather than absolute physical constants. Several alternative explanations remain testable, including ROS-first versus CL-first causality, dominance of repair or rupture pathways, and tool- or energetics-related confounds affecting CL-linked readouts.
        Accordingly, internal validity is constrained by measurement specificity, tool specificity, and batch structure, whereas external validity is limited by cell type, stimulation paradigm, and metabolic contexts in which nonlinear responses may dominate. Importantly, these boundaries do not negate the model; they define where the model should be expected to hold and what falsifiable predictions would overturn it. Taken together, the model provides a layer-localized explanation for decoupling and defines concrete experiments to test sufficiency and pathway priority. To close the causal loop, a first priority is to test mediator-level sufficiency by comparing ROS lowering with direct CL restoration in Ephb1-deficient macrophages and asking whether CL rescue restores early GSDMD-NT engagement and lytic IL-1β release. A second priority is to test mediation-prioritized pathways by asking whether pathway perturbation first shifts CL/axis states and then alters early pore/output readouts without
        materially changing priming or assembly. Together, these experiments will determine whether the proposed chain is merely a correlated scaffold or a mechanistically sufficient route.'
      source: discussion_outline_en.yaml
      paragraph_group: limitations_future
