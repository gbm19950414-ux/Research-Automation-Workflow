  sections:
  - id: abstract
    title: Abstract
    blocks:
    - type: paragraph
      text: Inflammasome activation does not necessarily translate into proportional IL-1β release and pyroptotic output, yet the upstream mechanisms that constrain terminal execution remain unclear. Increasing evidence implicates mitochondrial membrane context, particularly cardiolipin status, as a critical but poorly understood regulator of inflammasome output. We asked whether loss of the receptor EphB1 reshapes mitochondrial cardiolipin-dependent membrane context to shift the execution threshold of gasdermin D and thereby attenuate inflammasome-induced lytic output. Using primary murine peritoneal macrophages, we combined genetic perturbation, layered functional positioning of inflammasome signaling, lipid accessibility profiling, pharmacological modulation of cardiolipin state, and integrative multi-omics analyses to dissect causal links between upstream signaling, membrane context, and terminal output. EphB1 deficiency consistently reduced IL-1β release and cell lysis across multiple
        inflammasome stimuli without affecting transcriptional priming, ASC assembly, or caspase-1 activation, localizing the defect to the execution stage. This was associated with impaired mitochondrial enrichment of GSDMD-NT and a coordinated reduction in cardiolipin abundance and accessibility, phenocopied by pharmacological disruption of cardiolipin state. These findings support a membrane-mediated model in which EphB1-dependent signaling remodels cardiolipin-centered membrane context to tune the functional threshold of GSDMD pore formation and limit inflammasome output, providing a mechanistic framework for dissociating activation from output intensity.
  - id: introduction
    title: Introduction
    blocks:
    - type: paragraph
      text: Pyroptosis can be conceptualized as three connected but differentially regulatable stages—priming, inflammasome assembly/caspase activation, and terminal execution—each of which can shape phenotypic outputs. Priming determines the preparedness of inflammasome components, assembly determines whether inflammasomes form and caspases activate, and execution determines the magnitude and form of inflammatory output. Thus, even with comparable NLRP3 activation, final phenotypes such as IL-1β/IL-18 release, membrane permeability, and lytic rupture are not necessarily equivalent, suggesting that divergence may largely reside in execution thresholds.
      pid: 1.1.2.p1
      section_heading: Layered thresholds and membrane-environment constraints
    - type: paragraph
      text: Structural and functional studies indicate that pore-forming efficiency of GSDMD-NT is a decisive step that can switch outputs from controlled release to uncontrolled lysis once a threshold is crossed. Once the execution stage crosses a threshold, outputs can rapidly transition from regulated release to uncontrolled lytic rupture. Accordingly, pore formation can be viewed as a core bottleneck of terminal pyroptotic execution. {doi:10.1038/nature18629} {doi:10.1073/pnas.1607769113}
      pid: 1.1.2.p3
      section_heading: Layered thresholds and membrane-environment constraints
    - type: paragraph
      text: GSDMD-NT does not insert indiscriminately into all lipid membranes; it preferentially targets negatively charged phospholipids, particularly membranes enriched in phosphoinositides (PIPs) and cardiolipin (CL). In model-membrane systems, inclusion of such anionic lipids can markedly enhance pore formation and membrane leakage. Thus, the same GSDMD-NT fragment can exhibit different execution outcomes depending on lipid context, with membrane composition functioning as an adjustable ‘execution-gain’ knob that shapes amplitude and timing. {doi:10.1038/nature18629} {doi:10.1038/nature18590}
      pid: 1.1.2.p4
      section_heading: Layered thresholds and membrane-environment constraints
    - type: paragraph
      text: If pore formation is highly sensitive to lipid context, key mitochondrial-coupled and remodelable lipids are prime candidates for translating upstream signals into execution-stage divergence. Among such lipids, cardiolipin (CL) emerges as a particularly prominent candidate.
      pid: 1.1.2.p7
      section_heading: Layered thresholds and membrane-environment constraints
    - type: paragraph
      text: 'Importantly, CL is not a static background lipid: it undergoes observable and regulatable dynamics under stress and immune activation, interfacing with inflammatory signaling. Mitochondrial CL has been reported to participate directly in NLRP3 recruitment and activation, including CL–NLRP3 binding and effects of perturbing CL synthesis on inflammasome activation. In damage contexts, CL externalization can serve as a quality-control ‘tag’, for example via LC3 binding to trigger mitophagy. CL oxidation and membrane damage/inflammatory amplification are frequently co-observed. Closer to the execution layer, GSDMD-N has been suggested in specific pathological contexts to recognize CL to form mitochondrial pores, amplifying mitochondrial ROS and inflammatory cascades. {doi:10.1016/j.immuni.2013.08.001} {doi:10.4161/auto.27191} {doi:10.1016/j.celrep.2024.114237}'
      pid: 1.1.3.p2
      section_heading: Cardiolipin as a membrane-environment readout and interface
    - type: paragraph
      text: 'A working inference follows: rather than treating mitochondrial status as a collection of dispersed signals (ROS, mtDNA, membrane potential), CL state may act as a more execution-proximal integrated readout that helps translate mitochondrial conditions into pore-forming efficiency and thresholds. Current consensus more robustly supports coupling between CL and inflammatory execution and the plasticity of CL dynamics. By contrast, the major knowledge gap lies upstream: which receptors or recognition signals, through which downstream pathways and mechanistic axes, can transmit extracellular cues to mitochondrial membrane lipids to systematically reshape CL state and thereby alter terminal outputs. In other words, the mid-to-early segment of a chain—‘receptor signal → downstream pathway/mechanistic axis → CL metabolism → mitochondrial inflammatory features → pore threshold and lytic cytokine release’—still lacks a broadly accepted systems model.'
      pid: 1.1.3.p3
      section_heading: Cardiolipin as a membrane-environment readout and interface
    - type: paragraph
      text: Eph receptors and their ephrin ligands form a contact-dependent bidirectional signaling system and constitute the largest receptor tyrosine kinase subfamily, making them conceptually suitable candidates for translating spatial microenvironmental context into intracellular state and effector outputs. The Eph/ephrin system was originally recognized for roles in development and spatial patterning, with a core feature of shaping adhesion, morphology, and migration through contact-dependent signal exchange. Increasing evidence extends Eph/ephrin biology into immune contexts, including immune-cell development, activation, migration, and tissue residence, and modulation of how immune cells communicate with endothelium/stroma or neighboring immune cells within inflammatory microenvironments. From a signaling architecture perspective, Eph downstream outputs are not a single linear pathway and can intersect major metabolic/growth networks, with mechanistic support for interactions and
        feedback with PI3K–Akt–mTOR signaling in multiple family members. Thus, Eph family signaling is positioned to extend plasma-membrane contact cues into deeper cellular homeostasis modules, including mitochondrial-related processes and membrane environment, albeit in a context-dependent manner across members, cell types, and stimuli. {doi:10.1016/s1357-2725(02} {doi:10.3389/fimmu.2019.01473} {doi:10.1016/j.ccr.2009.04.009} {doi:10.4161/cc.9.11.11925}
      pid: 1.1.3.p4
      section_heading: Cardiolipin as a membrane-environment readout and interface
    - type: paragraph
      text: 'If EphB1 signaling can engage downstream pathways or mechanistic axes that alter mitochondrial membrane environment—captured by CL abundance, species composition, or oxidation—it may shift the threshold and efficiency of pore formation and thereby achieve amplitude-limiting control of inflammasome outputs. A potential advantage of this strategy is that it targets output form and intensity (for example, a threshold window for lytic cytokine release) rather than being equivalent to fully disabling the inflammasome, which may better balance tissue protection with host defense in principle. Accordingly, this work adopts a working framework: receptor kinase (EphB1) → downstream pathway/mechanistic axis → mitochondrial membrane environment/CL readouts → terminal inflammasome execution outputs.'
      pid: 1.1.3.p5
      section_heading: Cardiolipin as a membrane-environment readout and interface
    - type: paragraph
      text: 'The central gap can therefore be stated as a falsifiable linkage: how an upstream receptor signal engages downstream pathways/mechanistic axes to reshape CL metabolism and membrane environment, and thereby translates into terminal inflammasome execution-output differences. Existing literature provides interface clues that gasdermins can interact with CL-related membrane environments to affect mitochondrial integrity, mtDNA release, and inflammatory amplification, coupling mitochondria to inflammasome outputs. Yet evidence largely remains at the level of ‘interface exists’ and ‘correlated coupling’, lacking a systems framework for how an upstream entry signal drives integrated CL metabolic changes. For EphB1 specifically, the key unknown is not whether it affects a single enzyme or event, but whether EphB1 signaling can, via downstream pathways/mechanistic axes, produce reproducible CL-state changes that are sufficient to explain changes in execution thresholds and efficiency.
        {doi:10.1016/j.immuni.2023.10.004} {doi:10.1038/s41467-019-09397-2}'
      pid: 1.3.p4
      section_heading: Scientific question, hypotheses, and study objectives
    - type: paragraph
      text: 'To address this question, the study adopts a closed-loop ‘discover–localize–validate’ design that decomposes the chain into three executable and falsifiable task modules with aligned readouts throughout. Input: genetic manipulation of EphB1 (e.g., KO/intervention) as the receptor-level entry variable under a unified inflammasome activation model and time-resolved sampling for comparability. Process: identify candidate downstream pathways from multi-omics/bioinformatics and prioritize ‘pathway/mechanistic axis as mediator’ using statistical mediation logic; then quantify CL-state and execution outputs in parallel with stratified priming/assembly markers to localize the layer of divergence. Output: complete causal tests with genetic plus pharmacologic masking/rescue or equivalent stratified strategies to validate whether perturbing a candidate pathway or correcting a candidate metabolic state coherently shifts CL readouts and execution outputs.'
      pid: 1.3.p5
      section_heading: Scientific question, hypotheses, and study objectives
  - id: methods
    title: Methods
    blocks:
    - type: heading
      level: 2
      text: Animals
    - type: paragraph
      text: All experiments were performed using mice on a C57BL/6J genetic background. Ephb1 mutant mice and wild-type littermates were used in this study. Mice were housed under specific pathogen-free (SPF) conditions with controlled temperature, humidity, and a 12 h light/12 h dark cycle. Animals had ad libitum access to sterilized standard chow and acidified drinking water. Ephb1 mutant mice were obtained from the piggyBac (PB) transposon-based mouse mutant library at the Institute of Developmental Biology and Molecular Medicine, Fudan University. Genotypes were confirmed by PCR-based analysis, and mice aged 6 weeks or older were used for experiments. All animal procedures were approved by the Institutional Animal Care and Use Committee of Fudan University and conducted in accordance with relevant guidelines and regulations.
    - type: heading
      level: 2
      text: Primary peritoneal macrophage isolation
    - type: paragraph
      text: Primary peritoneal macrophages were isolated from 6–10-week-old C57BL/6J wild-type and Ephb1-deficient mice. To elicit macrophage recruitment, mice were intraperitoneally injected with 1–2 mL of sterile 4% thioglycollate medium. Three days after injection, peritoneal exudate cells were harvested by lavage with pre-warmed phosphate-buffered saline (PBS). Recovered cells were collected by centrifugation and subjected to red blood cell lysis when necessary. Cells were resuspended in RPMI 1640 medium supplemented with 10% fetal bovine serum and antibiotics, counted, and seeded at the indicated densities. After 1–2 h of incubation, non-adherent cells were removed by gentle washing with PBS, and adherent macrophages were cultured overnight prior to subsequent experiments.
    - type: heading
      level: 2
      text: Cell culture and treatments
    - type: paragraph
      text: For inflammasome priming, cells were treated with lipopolysaccharide (LPS) at a final concentration of 1–10 ng/mL for 4 h. NLRP3 inflammasome activation was induced by treatment with either nigericin or ATP, NLRC4 activation was triggered by cytosolic delivery of flagellin, and AIM2 activation was induced by transfection of poly(dA:dT). For NLRP3 activation, cells were stimulated with nigericin (10 µg/mL) for 7.5–120 min or ATP (5 mM) for 2 h. For NLRC4 activation, cells were transfected with flagellin (0.5 ng/mL) using Lipofectamine 2000 and incubated for 2 h. For AIM2 activation, cells were transfected with poly(dA:dT) (0.1 ng/mL) using Lipofectamine 2000 and incubated for 8 h. Where indicated, cells were co-treated with Ephb1-Fc fusion protein to modulate ephrin-B/EphB signaling during inflammasome activation. To generate higher-order Ephb1-Fc clusters, Ephb1-Fc was pre-incubated with anti-human IgG Fc-specific antibody at a 10:1 ratio for 30 min at room temperature with gentle
        rotation. Ephb1-Fc complexes were prepared at final concentrations of 5, 0.5, 0.05, or 0.005 µg/mL in complete RPMI 1640 medium. Pre-formed Ephb1-Fc complexes were added to cell cultures together with the indicated inflammasome stimuli. At the end of stimulation, culture plates were immediately placed on ice, and supernatants and cell lysates were collected for downstream analyses.
    - type: heading
      level: 2
      text: Inflammasome activation assays
    - type: paragraph
      text: Inflammasome assembly was assessed by detecting ASC oligomerization using a chemical crosslinking-based assay. Primary peritoneal macrophages were stimulated to activate the NLRP3 inflammasome as described above. Following stimulation, cells were lysed with Triton X-100-containing buffer to separate soluble and detergent-insoluble fractions. The detergent-insoluble pellet fraction, enriched for ASC specks, was collected for crosslinking analysis. ASC oligomers in the insoluble fraction were chemically crosslinked using disuccinimidyl suberate (DSS). Crosslinking reactions were terminated by SDS-mediated denaturation prior to sample processing. Crosslinked samples were analyzed by SDS-PAGE followed by Western blotting to detect high-molecular-weight ASC oligomers. ASC oligomerization patterns in crosslinked insoluble fractions were compared with corresponding soluble lysate fractions.
    - type: heading
      level: 2
      text: Mitochondrial functional assays
    - type: paragraph
      text: Cellular and mitochondrial reactive oxygen species (ROS) production and mitochondrial membrane potential were assessed using fluorescent probe-based assays. H2DCFDA was used to monitor total intracellular ROS, MitoSOX Red was used to detect mitochondrial superoxide, and tetramethylrhodamine methyl ester (TMRM) was used to assess mitochondrial membrane potential. Experiments were performed sequentially, including LPS priming, probe loading, inflammasome activation, and fluorescence measurement. Cells were primed with lipopolysaccharide (LPS) for 4 h prior to fluorescent probe loading. For probe loading, cells were incubated with H2DCFDA, MitoSOX Red, and TMRM in serum-free medium during the final 45 min of LPS priming. Inflammasome activation was triggered by treatment with nigericin at a final concentration of 10 µg/mL. Fluorescence signals were recorded immediately after stimulation using a temperature-controlled multimode microplate reader. Fluorescence intensity was measured
        at excitation/emission wavelengths of approximately 488/525 nm for H2DCFDA, 510/580 nm for MitoSOX Red, and 550/576 nm for TMRM. Kinetic measurements were performed at 2.5-min intervals for up to 2 h following nigericin stimulation. Fluorescence signals were analyzed to evaluate changes in cellular and mitochondrial ROS levels and mitochondrial membrane potential under the indicated experimental conditions. Mitochondrial cardiolipin content was assessed using 10-N-nonyl acridine orange (NAO) staining. NAO was used at low nanomolar concentrations to semi-quantitatively monitor cardiolipin abundance and oxidation status in mitochondria. Following experimental treatments, cells were incubated with NAO at a final concentration of 200 nM for 30 min at 37 °C. After staining, fluorescence signals were acquired using either a multimode microplate reader or fluorescence microscopy. NAO fluorescence was measured at excitation/emission wavelengths of approximately 519/555 nm. Changes in NAO
        fluorescence intensity were used to evaluate dynamic alterations in mitochondrial cardiolipin levels under different experimental conditions.
    - type: heading
      level: 2
      text: Cell death assays
    - type: paragraph
      text: Pyroptotic cell death were quantitatively assessed following pharmacological or genetic perturbations. Primary peritoneal macrophages were seeded in 96-well plates at a density of 1 × 10^5 cells per well and cultured overnight to allow metabolic stabilization. Cells were subjected to inflammasome activation or control treatments as described above under a final volume of 100 µL per well. For maximal LDH release controls, cells were treated with lysis solution 45 min prior to sample collection. Following treatment, culture supernatants were collected for lactate dehydrogenase (LDH) release measurements. LDH activity in culture supernatants was determined using the CytoTox 96® Non-Radioactive Cytotoxicity Assay according to the manufacturer’s instructions. Absorbance was measured at 490–492 nm using a multimode microplate reader. Percent cytotoxicity was calculated by normalizing LDH release from treated samples to maximal LDH release controls after background subtraction. Apoptosis
        was induced by treating cells with staurosporine at a final concentration of 1 µM for 4 h, with vehicle-treated cells serving as controls. Apoptotic signaling was evaluated by immunoblot detection of cleaved caspase-3. Data were obtained from at least three independent experiments and analyzed using standard statistical methods as described below.
    - type: heading
      level: 2
      text: Protein analysis
    - type: paragraph
      text: Protein expression and secretion were analyzed by Western blotting and enzyme-linked immunosorbent assay (ELISA). Cells were lysed in Laemmli sample buffer supplemented with protease and phosphatase inhibitors, followed by heat denaturation. Protein samples were separated by SDS-PAGE using gels of appropriate acrylamide concentrations based on target protein molecular weight. Separated proteins were transferred onto polyvinylidene fluoride (PVDF) membranes under cold conditions. Membranes were blocked and incubated with primary antibodies overnight at 4 °C, followed by incubation with HRP-conjugated secondary antibodies. Protein signals were visualized using enhanced chemiluminescence reagents and captured with a digital imaging system. Band intensities were quantified by densitometric analysis and normalized to GAPDH as loading controls. Levels of secreted cytokines in culture supernatants were measured using mouse TNF-α, IL-6, and IL-1β uncoated ELISA kits. ELISA assays were
        performed according to the manufacturer’s instructions using 96-well high-binding plates. Cytokine concentrations were calculated from standard curves generated using serially diluted recombinant standards. Protein quantification data were obtained from at least three independent experiments and analyzed using appropriate statistical methods as described below.
    - type: heading
      level: 2
      text: RNA analysis
    - type: paragraph
      text: Gene expression was quantified by real-time quantitative PCR (qPCR). Total RNA was extracted from primary peritoneal macrophages using TRIzol reagent according to standard protocols. Complementary DNA (cDNA) was synthesized using a two-step reverse transcription protocol with genomic DNA removal. Quantitative PCR was performed using SYBR Green-based detection chemistry on a real-time PCR system. Gene expression levels were normalized to the geometric mean of GAPDH and HPRT1 as reference genes. Amplification specificity was confirmed by melt curve analysis, and technical replicates with excessive Ct variation were excluded. Relative gene expression was calculated using the ΔΔCt method with wild-type samples serving as calibrators. Each mouse was considered an independent biological replicate, and statistical analyses were performed as described below.
    - type: heading
      level: 2
      text: Confocal microscopy and image analysis
    - type: paragraph
      text: Confocal microscopy was performed to examine the subcellular distribution of cardiolipin using NAO staining in primary macrophages. Primary peritoneal macrophages were cultured on glass coverslips and subjected to the indicated treatments prior to fixation. Cells were fixed and, where indicated, permeabilized prior to staining. Cells were stained with 10-N-nonyl acridine orange (NAO) to visualize mitochondrial cardiolipin, with nuclei counterstained using DAPI where indicated. Fluorescence images were acquired using an Olympus SpinSR super-resolution confocal microscope. Multichannel images were collected using identical laser power, detector gain, and exposure settings for all experimental groups. For each condition, multiple randomly selected fields of view were imaged, and a minimum of 100 cells per group were analyzed. NAO fluorescence was quantified by applying consistent intensity thresholding and particle/region-of-interest analysis to derive signal intensity and/or area
        metrics. Image quantification was performed using ImageJ software with consistent analysis parameters applied across all samples.
    - type: heading
      level: 2
      text: Mitochondrial isolation and analysis
    - type: paragraph
      text: Mitochondria were isolated to assess mitochondrial integrity and cytosolic release of mitochondrial DNA (mtDNA) following inflammasome activation. Primary peritoneal macrophages were stimulated with lipopolysaccharide followed by nigericin prior to subcellular fractionation. Mitochondria were isolated using a commercial mitochondria isolation kit based on differential centrifugation under cold conditions. Differential centrifugation was used to obtain mitochondrial fractions, cytosolic fractions, and corresponding total cell lysates for comparison. Isolated mitochondrial pellets were either maintained in storage buffer for functional analyses or lysed for downstream protein or nucleic acid extraction. The purity of mitochondrial fractions was evaluated by quantitative PCR analysis of mitochondrial-encoded and nuclear-encoded DNA markers. Cytosolic mtDNA release was quantified by comparing mtDNA abundance in cytosolic fractions relative to total cellular mtDNA. DNA was extracted
        from total, mitochondrial, and cytosolic fractions, and mtDNA levels were quantified by real-time PCR. Relative mtDNA release was calculated using ΔCt-based normalization of cytosolic mtDNA to total mtDNA within each sample. Analyses were performed using samples from at least three independent biological replicates and evaluated using appropriate statistical methods as described below.
    - type: heading
      level: 2
      text: Lipidomics
    - type: paragraph
      text: Lipidomic analyses were performed to characterize global and pathway-specific lipid alterations in primary peritoneal macrophages following Ephb1 deficiency. Cellular lipids were extracted using a modified methyl tert-butyl ether (MTBE)-based method. Untargeted lipidomics was conducted to enable broad-spectrum detection and identification of lipid species. Lipid extracts were analyzed by liquid chromatography coupled to high-resolution mass spectrometry with polarity switching and data-dependent MS/MS acquisition. Lipid species were identified based on accurate mass measurements and MS/MS fragmentation patterns using dedicated lipidomics analysis software. Targeted lipidomics was performed to quantitatively validate selected lipid species of interest identified in the untargeted analysis. Quantification was achieved using internal standards and calibration curves, and lipid abundances were expressed as relative or absolute quantities as appropriate. Lipidomic data were normalized
        and scaled prior to statistical analysis to reduce technical variation and improve comparability across samples. Differential lipid abundance was assessed using univariate statistical testing and multivariate analyses, including principal component analysis. Quality control samples were included throughout the analytical workflow to monitor instrument stability, reproducibility, and data reliability.
    - type: heading
      level: 2
      text: RNA-seq analysis
    - type: paragraph
      text: RNA sequencing (RNA-seq) was performed to characterize global transcriptomic changes in primary peritoneal macrophages. Total RNA was extracted from macrophages, and RNA integrity and purity were assessed to ensure suitability for library construction. Strand-specific RNA-seq libraries were prepared following mRNA enrichment or rRNA depletion using standard protocols. Libraries were sequenced on an Illumina high-throughput sequencing platform using paired-end reads. Raw sequencing reads were subjected to quality control to remove adaptor sequences and low-quality reads prior to downstream analysis. Clean reads were aligned to the reference mouse genome, and gene-level expression counts were generated using standard alignment and quantification pipelines. Differentially expressed genes were identified using statistical models based on normalized read counts with multiple testing correction. Functional annotation and enrichment analyses were performed to identify biological processes
        and pathways associated with differentially expressed genes.
    - type: heading
      level: 2
      text: Statistical analysis
    - type: paragraph
      text: Statistical analyses were performed to assess differences between experimental groups and evaluate the reliability of observed effects. Data analysis and visualization were conducted using R and python statistical computing environment. Data distributions were assessed for normality prior to statistical testing, and appropriate parametric or non-parametric tests were selected accordingly. Two-group comparisons were performed using two-tailed Student’s t-tests or non-parametric alternatives, while multi-group comparisons were analyzed using analysis of variance (ANOVA) with appropriate post hoc tests. Data are presented as mean ± SEM unless otherwise indicated, with individual data points shown where appropriate. All statistical tests were two-sided, and P values less than 0.05 were considered statistically significant. Detailed information on sample size, statistical tests, and significance values is provided in the figure legends.
    - type: heading
      level: 2
      text: Data availability
    - type: paragraph
      text: Data management and analysis were performed in accordance with standard practices to ensure data integrity, traceability, and reproducibility. Raw experimental data were securely stored and backed up throughout the study. Data processing and statistical analyses were conducted using documented workflows to enable reproducibility. Key experimental findings were validated by independent biological replicates. Data supporting the findings of this study are available from the corresponding author upon reasonable request.
  - id: results
    title: Results
    blocks:
    - type: heading
      level: 2
      text: EphB1 deficiency reduces pyroptosis and IL-1β release
    - type: paragraph
      text: To identify regulators of inflammasome, we performed a genetic screening strategy in primary macrophages from PB genetic backgrounds using IL-1β release as the functional readout.
      source: opening_and_trans.yaml
      panel_id: ''
    - type: paragraph
      text: A standardized workflow was designed in which primary macrophages from multiple genetic backgrounds were subjected to uniform NLRP3 inflammasome activation and assessed using IL-1β release as the functional readout (Fig. 1a). This framework provides the experimental basis for the screening results.
      source: figure_1_a_000.yaml
      panel_id: 1a
    - type: paragraph
      text: Having outlined the genetic-screening strategy, we next sought to identify, across the full panel of perturbations, a candidate signal that is both reproducible and sufficiently prominent to prioritize for mechanistic dissection. Across the 10 screened strains, most genetic backgrounds showed little or no genotype-dependent difference in IL-1β release following Nigericin stimulation, whereas only two strains reached nominal statistical significance in within-strain comparisons (Fig. 1b). Notably, the Ephb1-associated strain (081230020-HRB) exhibited a pronounced reduction in IL-1β release in HO cells (~41% decrease relative to WT; P≈0.034), representing the strongest statistically significant genotype-dependent phenotype observed in the screen and prioritizing Ephb1 for subsequent mechanistic investigation.
      source: figure_1_b_001.yaml
      panel_id: 1b
    - type: paragraph
      text: Having prioritized EphB1 from the screen, we next asked whether the phenotype generalizes beyond a single inflammasome agonist, thereby arguing against a stimulus-specific artifact. Across all three activation routes, Ephb1 pb/pb macrophages released significantly less IL-1β than WT controls (Fig. 1c). These data indicate that the diminished IL-1β output in Ephb1 pb/pb macrophages is not restricted to a single receptor pathway, supporting a role for EphB1 in receptor downstream pathway.
      source: figure_1_c_v2.yaml
      panel_id: 1c
    - type: paragraph
      text: Having established cross-agonist consistency within inflammasome, we next asked whether EphB1 loss broadly constrains lytic execution across distinct inflammasome sensors. Across all inflammasome activation conditions, EphB1-deficient macrophages exhibited consistently reduced LDH release compared with WT controls (Fig. 1d). These findings indicate that EphB1 deficiency broadly attenuates pyroptotic cell lysis downstream of distinct inflammasome receptors, consistent with a role in a shared execution step rather than pathway-specific signaling.
      source: figure_1_d_v2.yaml
      panel_id: 1d
    - type: heading
      level: 2
      text: EphB1 deficiency reduces pyroptotic execution
    - type: paragraph
      text: To determine where EphB1 functions within the inflammasome pathway, we compared inflammasome activation across NLRP3, AIM2, and NLRC4 stimuli in WT and Ephb1-deficient macrophages.
      source: opening_and_trans.yaml
      panel_id: ''
    - type: paragraph
      text: LPS stimulation induced robust and comparable increases in Tnf, Il6, and Il1b transcripts in WT and EphB1-deficient macrophages across all examined time points (Fig. 2a,b). Together, these data indicate that EphB1 deficiency does not impair TLR4–NF-κB–dependent transcriptional priming, excluding defective first-signal activation as the cause of reduced inflammasome output.
      source: figure_2_a+b.yaml
      panel_id: 2a/b
    - type: paragraph
      text: Having established that transcriptional priming is preserved, we next asked whether conventional cytokine secretion is also intact, thereby separating inflammasome output from a global secretion defect. LPS stimulation induced robust increases in both TNF-α and IL-6 in WT and EphB1-deficient macrophages, with no significant genotype-dependent differences observed (Fig. 2c). Thus, EphB1 deficiency does not measurably impair TLR4-driven classical secretion of TNF-α or IL-6, excluding a generalized secretory defect as the basis for reduced inflammasome-associated outputs.
      source: figure_2_c_v2.yaml
      panel_id: 2c
    - type: paragraph
      text: Having excluded a generalized secretion impairment, we next asked whether the EphB1-dependent difference manifests specifically in inflammasome-triggered IL-1β release across stimulus strength. While IL-1β release increased with higher Nigericin doses in both genotypes, EphB1-deficient macrophages consistently released less IL-1β than WT controls at each stimulatory dose (Fig. 2d). These results demonstrate that EphB1 deficiency limits mature IL-1β release in a dose-independent manner across the tested range of NLRP3 activation, supporting a selective defect at the inflammasome-specific execution or export stage rather than impaired priming.
      source: figure_2_d.yaml
      panel_id: 2d
    - type: paragraph
      text: Having confirmed an inflammasome-specific output defect, we next asked whether this arises from impaired inflammasome assembly at the ASC platform. Under NLRP3 activation conditions, EphB1-deficient macrophages displayed levels of ASC oligomers, dimers, and monomers comparable to those observed in WT controls (Fig. 2e). These data indicate that EphB1 deficiency does not disrupt ASC oligomerization during NLRP3 inflammasome activation, excluding defective inflammasome assembly as the basis for reduced downstream outputs.
      source: figure_2_e.yaml
      panel_id: 2e
    - type: paragraph
      text: Having found no evidence for altered ASC oligomerization, we next asked whether caspase-1 activation itself is preserved, further narrowing the bottleneck toward execution. Caspase-1 activation, as reflected by intracellular p20 levels, was comparable between WT and EphB1-deficient macrophages (Fig. 2f). These results localize the effect of EphB1 deficiency to a post-activation step, indicating that caspase-1 is efficiently activated.
      source: figure_2_f.yaml
      panel_id: 2f
    - type: paragraph
      text: Having established that caspase-1 activation is largely preserved, we next asked whether its canonical substrates—pro-IL-1β and GSDMD—are processed normally, thereby excluding impaired substrate cleavage as the source of the EphB1-dependent defect. Caspase-1–dependent cleavage of GSDMD and pro–IL-1β occurred efficiently in EphB1-deficient macrophages, yielding cleavage and maturation degree comparable to those in WT cells (Fig. 2g). Together, these results demonstrate that EphB1 deficiency does not compromise caspase-1 substrate cleavage per se but selectively limits the extracellular release of mature inflammasome products, thereby localizing the defect to a late execution or export step.
      source: figure_2_g.yaml
      panel_id: 2g
    - type: heading
      level: 2
      text: EphB1 deficiency reduces recruitment of GSDMD to mitochondria
    - type: paragraph
      text: To investigate how EphB1 regulates pyroptotic execution, we examined mitochondrial integrity and GSDMD recruitment to mitochondria during NLRP3 inflammasome activation in WT and Ephb1-deficient macrophages.
      source: opening_and_trans.yaml
      panel_id: ''
    - type: paragraph
      text: Upon inflammasome activation, Ephb1−/− macrophages exhibited attenuated accumulation of cytosolic ROS and a smaller loss of mitochondrial membrane potential compared with WT cells, whereas mitochondrial ROS signals measured by MitoSOX showed no significant genotype-dependent difference in overall magnitude (Fig. 3a,b,c,d,e,f,g,h). Together, these results indicate that EphB1 deficiency does not cause an intrinsic alteration in mitochondrial membrane potential at baseline but limits ROS accumulation and membrane depolarization during inflammasome activation, supporting a model in which mitochondrial damage is attenuated during the execution phase.
      source: figure_3_a+b+c+d+e+f+g+h.yaml
      panel_id: 3a/b/c/d/e/f/g/h
    - type: paragraph
      text: Having delineated the kinetics of mitochondrial stress during inflammasome activation, we next defined the key time window for early interface events, so that subsequent readouts can be anchored to the appropriate temporal regime and we can test whether a more direct mitochondrial-content–release readout likewise shows an EphB1-dependent constraint consistent with a mitochondria-stage bottleneck. In WT macrophages, inflammasome activation induced a rapid and transient pulse of cytosolic mtDNA, peaking at early time points, whereas this cytosolic mtDNA peak was markedly reduced in Ephb1−/− cells (Fig. 3i,j,s3,d,f,g). Together, these results indicate that EphB1 deficiency selectively limits inflammasome-induced release of mitochondrial DNA into the cytosol without reducing total mtDNA content, localizing the effect to diminished mitochondrial membrane disruption during the execution phase.
      source: figure_3_i+j+s3_d+f+g.yaml
      panel_id: 3/i/j/s3/d/f/g
    - type: paragraph
      text: Having further reinforced the early mitochondrial-stage signature, we next asked whether an independent protein-level time-course can pinpoint the same peak window and, in doing so, whether EphB1 loss selectively diminishes GSDMD-NT enrichment on mitochondria—thereby placing the bottleneck at interface engagement/enrichment rather than upstream proteolytic activation. In WT macrophages, GSDMD-NT transiently accumulated in the mitochondrial fraction with a pronounced peak at approximately 7.5 minutes after inflammasome activation, whereas this early mitochondrial enrichment of GSDMD-NT was markedly reduced in Ephb1−/− cells (Fig. 3k,s3e). Together, these data localize the effect of EphB1 deficiency to the early mitochondrial enrichment of GSDMD-NT during inflammasome activation, indicating that EphB1 promotes efficient GSDMD–mitochondria association at the execution stage.
      source: figure_3_k+s3_e.yaml
      panel_id: 3k/s3e
    - type: heading
      level: 2
      text: EphB1 deficiency reduces Cardiolipin level
    - type: paragraph
      text: To test whether altered mitochondrial membrane composition contributes to the EphB1-dependent phenotype, we quantified cardiolipin levels in WT and Ephb1-deficient macrophages.
      source: opening_and_trans.yaml
      panel_id: ''
    - type: paragraph
      text: Across both imaging- and plate-based readouts, Ephb1−/− macrophages displayed significantly lower NAO fluorescence than WT cells, consistent with a reduced NAO-detectable cardiolipin pool (Fig. 4a,b). Together, these results show that EphB1 deficiency is associated with a significant reduction in NAO fluorescence, indicating a decreased NAO-detectable cardiolipin pool in the mitochondrial membrane under conditions where baseline mitochondrial membrane potential is unchanged.
      source: figure_4_a+b.yaml
      panel_id: 4a/b
    - type: paragraph
      text: Having observed a change in an accessibility-proxy readout, we next asked whether independent chemical quantification supports a shift in cardiolipin abundance and/or species composition. Compared with WT cells, Ephb1−/− macrophages exhibited a significant reduction in total cardiolipin abundance, reaching approximately 70% of WT levels, accompanied by broad downregulation across a majority of cardiolipin molecular species (Fig. 4c,d). Together, these lipidomic data show that EphB1 deficiency not only reduces the NAO-accessible cardiolipin pool but also decreases total cardiolipin abundance, providing a quantitative membrane lipid basis for the attenuated mitochondrial damage observed in EphB1-deficient peritoneal macrophages.
      source: figure_4_c+d.yaml
      panel_id: 4c/d
    - type: paragraph
      text: Having established a lipid-state framework, we next asked whether an independent upstream pharmacologic perturbation can experimentally and controllably tune the NAO-defined accessible cardiolipin pool, providing a manipulable entry point for causal testing. AD treatment markedly reduced NAO fluorescence in WT macrophages, indicating that pharmacological inhibition of cardiolipin biosynthesis decreases the NAO-accessible cardiolipin pool (Fig. 4e,f). Together, these results demonstrate that pharmacological inhibition of cardiolipin biosynthesis alone is sufficient to reduce the NAO-accessible cardiolipin pool in WT macrophages, supporting cardiolipin abundance as a key determinant of NAO-detectable cardiolipin availability.
      source: figure_4_e+f.yaml
      panel_id: 4e/f
    - type: paragraph
      text: Having implemented a lipid-state perturbation, we next asked whether inflammasome output shifts in the predicted direction—specifically, whether reduced accessible cardiolipin is sufficient to lower IL-1β release—thereby linking cardiolipin accessibility to terminal execution strength. AD treatment markedly suppressed LPS- and Nigericin-induced IL-1β release in macrophages in a dose- and time-dependent manner (Fig. 4g). Together, these results demonstrate that pharmacological reduction of cardiolipin availability is sufficient to suppress inflammasome-mediated IL-1β release, supporting a causal role for cardiolipin accessibility in controlling inflammasome output.
      source: figure_4_g.yaml
      panel_id: 4g
    - type: paragraph
      text: Having linked one perturbation axis to functional output, we next asked whether a mechanistically distinct perturbation converges on the same accessible-cardiolipin logic, reducing single-agent interpretive risk. BEL treatment led to a marked reduction in NAO fluorescence intensity, indicating that pharmacological interference with cardiolipin remodeling is sufficient to decrease the NAO-accessible cardiolipin pool (Fig. S4a,b). Together with perturbations targeting cardiolipin abundance, these results show that both manipulation of cardiolipin content and interference with cardiolipin remodeling can reduce NAO staining, indicating that changes in the NAO-accessible cardiolipin pool can arise through multiple mechanisms beyond alterations in total cardiolipin levels.
      source: figure_4_sa+b.yaml
      panel_id: s4a/b
    - type: paragraph
      text: Having established a second, independent lipid-state manipulation, we next asked whether its functional consequence on inflammasome output aligns with the same lipid-gate model. Across these perturbations, reduction of cardiolipin availability consistently led to a marked decrease in LPS- and Nigericin-induced IL-1β release, indicating convergent suppression of inflammasome terminal output (Fig. S4c). Together, these results demonstrate that diverse perturbations of cardiolipin regulation—whether affecting cardiolipin abundance or remodeling—converge on attenuation of inflammasome-mediated IL-1β release, supporting cardiolipin availability as a common limiting factor for terminal inflammasome output.
      source: figure_4_sc.yaml
      panel_id: s4c
    - type: heading
      level: 2
      text: Membrane context perturbation dominates the cardiolipin metabolic axis
    - type: paragraph
      text: To identify cellular processes associated with cardiolipin variation, we defined a set of biological process axes centered on cardiolipin metabolism, each represented by corresponding lipidomic indicators and gene sets, and evaluated their perturbation magnitude and association with cardiolipin abundance across batch.
      source: opening_and_trans.yaml
      panel_id: ''
    - type: paragraph
      text: This framework defines six functional axes—synthesis, remodeling, transport, supply, oxidation, and membrane context—and assigns to each axis representative genes and lipid readouts that can, in principle, be extracted from transcriptomic and lipidomic datasets (Fig. 5a). Together, this conceptual model serves as a mechanistic coordinate system for organizing cardiolipin-related pathways and readouts, providing a common reference for the multi-omics analyses presented in subsequent figures.
      source: figure_5_a.yaml
      panel_id: 5a
    - type: paragraph
      text: Having introduced the mechanistic-axis conceptual framework, we next specified the concrete gene and lipid features that instantiate each axis, together with directionality and weighting rules. For each axis (supply, transport, synthesis, remodeling, oxidation, and membrane context), we define minimal feature records that specify axis assignment, biological meaning, quantitative formulae for lipid metrics, directionality conventions (bottleneck_sign), and within-axis weights, together with tiered inclusion rules (Tier-1 executors, Tier-2 proximal components, and Tier-3 conditional contributors) and cross-axis exclusion criteria (Fig. 5b). Together, this table serves as an interpretable lookup resource that links the six-axis cardiolipin framework to concrete gene and lipid features, thereby supporting Fig. 6A and guiding subsequent axis-based multi-omics analyses.
      source: figure_5_b.yaml
      panel_id: 5b
    - type: paragraph
      text: Having fixed axis definitions a priori, we next asked how heterogeneous multi-batch omics measurements can be normalized and projected into comparable axis-level scores. For each omics layer, raw data underwent modality-specific quality control, normalization, and batch-aware modeling, followed by feature aggregation into predefined mechanistic indicators and axis-level Z scores that serve as standardized inputs for multi-omics integration (Fig. 5c). Together, this processing pipeline provides a transparent and reproducible foundation for deriving mechanistic axis scores and cardiolipin phenotypes from heterogeneous multi-omics datasets, thereby enabling the integrative analyses presented in subsequent panels.
      source: figure_5_c.yaml
      panel_id: 5c
    - type: paragraph
      text: Having established the scoring pipeline, we next asked whether axis effects are directionally concordant across omics layers and batches, providing the first-pass structure of the perturbation landscape. Across three RNA-seq batches and four lipidomics batches, only the Membrane context axis displayed a consistent positive effect in both omics layers, with stable directionality and the largest absolute effect sizes among all axes (Fig. 5d). Together, this cross-omics effect matrix identifies Membrane context as the only mechanistic axis that is robustly and reproducibly perturbed by EphB1 deficiency, distinguishing it from other axes that are variably influenced by batch or omics-specific factors.
      source: figure_5_d.yaml
      panel_id: 5d
    - type: paragraph
      text: Having surveyed batch-by-omics concordance, we next asked whether equal-weight evidence aggregation yields a coherent, axis-level summary of EphB1-dependent perturbation. Among the six axes, the Membrane context axis exhibited the strongest and most pronounced deviation from zero, with a positive multi-omics Z score of approximately +2.6, representing the largest absolute effect across all mechanistic axes (Fig. 5e). Together, these results identify Membrane context as the sole mechanistic axis that is robustly and significantly perturbed by EphB1 deficiency at the integrated multi-omics level, supporting the presence of a dominant membrane-related bottleneck rather than a distributed multi-axis imbalance.
      source: figure_5_e.yaml
      panel_id: 5e
    - type: paragraph
      text: Having obtained aggregated axis-level deviations, we next asked how these deviations relate to predefined cardiolipin phenotypic indicators, providing an interpretable bridge between axes and lipid outcome space. Among all axes, the Membrane context axis showed the strongest negative association with sum_CL, with higher combined Z scores corresponding to lower total cardiolipin levels, whereas all other axes displayed weak or near-zero correlations (Fig. 5f). Together, these results indicate that total cardiolipin abundance (sum_CL) is not a sensitive or robust readout for capturing mechanistic axis effects across batches, thereby excluding sum_CL as a primary quantitative proxy for axis-level perturbations and motivating the use of more informative cardiolipin accessibility or composition-based metrics.
      source: figure_5_f.yaml
      panel_id: 5f
    - type: heading
      level: 2
      text: PI3K–AKT–mTOR signaling tracks membrane-context impairment
    - type: paragraph
      text: To identify signaling pathways downstream of EphB1 associated with membrane context axis, we constructed EphB1 downstream pathway gene sets and evaluated their perturbation magnitude, consistency across samples, and covariation with the membrane context axis.
      source: opening_and_trans.yaml
      panel_id: ''
    - type: paragraph
      text: In this framework, EphB1 status is treated as an exogenous variable (X), downstream Eph-related signaling modules are quantified as RNA-based pathway scores (M), and the RNA membrane context axis score serves as a transcriptional proxy (Z) for lipid membrane phenotypes, while lipid readouts are used only for direction-concordance validation (Fig. 6a). Together, this RNA-first X–M–Z framework provides a transparent and reproducible strategy for ranking EphB1 downstream signaling modules most likely coupled to membrane context perturbation, thereby guiding subsequent experimental validation without over-interpreting limited cross-omics mediation.
      source: figure_6_a.yaml
      panel_id: 6a
    - type: paragraph
      text: Having defined the X–M–Z inference scaffold and the role of orthogonal lipid alignment, we next specified a minimal, literature-anchored set of EphB1-linked candidate signaling programs and their scoring rules. Each table row corresponds to one EphB1 downstream signaling gene set. Columns specify a unique pathway ID, a human-readable module label, network category (EphB1_signaling), the targeted cardiolipin mechanistic axes, module size (n_genes), and the full gene list annotated with gene_effect_sign to standardize directionality for module scoring (Fig. 6b). Together, this module dictionary provides the standardized building blocks used in Fig. 7A–7D, allowing readers and reviewers to trace how each EphB1 downstream pathway was defined and how it was linked to cardiolipin axes for subsequent quantitative analyses.
      source: figure_6_b.yaml
      panel_id: 6b
    - type: paragraph
      text: 'Having defined candidate programs and scoring directionality, we next asked which programs show reproducible EphB1-dependent shifts across RNA batches, qualifying them as plausible mediators (X→M). Across three RNA-seq batches, EphB1 deficiency induced reproducible directional shifts in multiple signaling modules: PI3K–AKT–mTOR pathways showed consistent negative responses (KO < WT), NF-κB/ROS and JAK–STAT was overall reduced with batch-dependent reversals, cytoskeleton-related modules were shifted in a positive direction, and other pathways exhibited weaker or inconsistent effects (Fig. 6c). Together, these analyses provide an overview of the transcriptional response state of EphB1 downstream signaling at the time of sampling, identifying PI3K–AKT–mTOR and JAK–STAT as the most consistently downregulated modules and prioritizing them as candidate pathways for subsequent coupling analyses with membrane context perturbation.'
      source: figure_6_c_v2.yaml
      panel_id: 6c
    - type: paragraph
      text: Having filtered candidates by cross-batch X→M consistency, we next asked which programs are mechanistically coupled to the prioritized membrane-context axis within RNA (M↔Z), strengthening chain coherence. Cross-batch aggregation revealed that most EphB1 downstream modules showed negative ΔM in EphB1-deficient cells, with the largest decreases observed for PI3K–AKT–mTOR and JAK–STAT, whereas cytoskeleton/adhesion modules (FAK–Src–Rho) displayed positive ΔM; correspondingly, PI3K–AKT–mTOR and JAK–STAT scores were negatively coupled to the Membrane context axis, while FAK–Src–Rho showed a positive coupling (Fig. 6d). Together, these analyses prioritize PI3K–AKT–mTOR and JAK–STAT as the most robust EphB1 downstream candidates whose transcriptional attenuation is consistently associated with increased membrane context barrier scores, while distinguishing cytoskeleton/adhesion modules as oppositely coupled pathways.
      source: figure_6_d_v2.yaml
      panel_id: 6d
    - type: paragraph
      text: 'Having identified RNA-internal coupling candidates, we next asked whether the prioritized RNA axis aligns with lipid phenotypic space in independent repeats, providing orthogonal support without relying on paired-sample mediation. Across all five lipid indicators, EphB1 deficiency was consistently associated with increased pathway scores (a>0), while the direction of the pathway–lipid association (b) diverged by readout: positive for CL fraction and membrane CL, but negative for mitochondrial lipid mass, membrane PC, and membrane PE, yielding opposite-signed indirect effects (Fig. 6e). Together, these analyses indicate that the EphB1-dependent mediation structure observed at the membrane context axis level is recapitulated across multiple concrete lipid indicators, with pathway effects manifesting as coordinated but directionally distinct changes in cardiolipin-related versus PC/PE-dominated lipid readouts.'
      source: figure_6_e.yaml
      panel_id: 6e
  - id: discussion
    title: Discussion
    blocks:
    - type: paragraph
      text: 'The inflammasome field often treats upstream readouts—priming-dependent transcription, ASC speck formation, and caspase-1 activation—as near-equivalent proxies for “inflammatory strength.” In practice, a recurring structural paradox appears across models: upstream activation/assembly can look similar, yet lytic IL-1β release and membrane rupture diverge markedly. This activation–output decoupling implies an execution-layer threshold/cap that operates after assembly, deciding how much can be released, when rupture occurs, and whether rupture occurs at all. Accordingly, our Discussion shifts the question from “does NLRP3 activate?” to “how is the terminal output capped/thresholded when activation is comparable?” To make the paradox adjudicable, we compress the gap into a falsifiable minimal chain: signal input → membrane-environment mediator → pore functional output. In this framing, upstream activation remains necessary, but it is not sufficient to predict the magnitude of lytic
        output.'
      source: discussion_outline_en.yaml
      para_id: D1
    - type: paragraph
      text: 'Our evidence can be read as a compact chain from phenotype to layer-localization to a threshold model. Across a canonical LPS-priming–nigericin NLRP3 paradigm (and additional inflammasome settings), Ephb1-deficient macrophages show blunted lytic outputs and reduced IL-1β release, yet these output changes do not automatically imply that priming, assembly, or caspase activation is globally disabled. Instead, the divergence is better localized to the execution layer: pyroptosis is not a binary switch, but a parameterized process shaped by pore formation efficiency, pore stability and conductance, and a sub-lytic ceiling imposed by membrane repair. Mechanistically, ESCRT-mediated repair can cap membrane catastrophe and keep cells in a sub-lytic regime, altering the ratio between cytokine release and terminal lysis. Conversely, terminal rupture is separable from pore formation and can be amplified by dedicated rupture factors (e.g., NINJ1), creating structural space for activation
        without proportional rupture. On this basis, an execution-threshold/cap model is both plausible and testable. To move beyond correlation, we organize causal adjudication around three criteria: hierarchical masking (downstream membrane-environment manipulations should override upstream differences), same-level rescue (planned; restoring the membrane mediator should partially recover output in Ephb1 loss), and dose–response (graded membrane shifts should produce graded or threshold-like output changes). At present, our strongest support is for necessity and layer-localization; sufficiency requires dedicated rescue and pathway-validation experiments.'
      source: discussion_outline_en.yaml
      para_id: D2
    - type: paragraph
      text: 'We place the membrane lipid environment—not upstream assembly—as the mediator layer that translates signal input into execution output. Within this layer, cardiolipin (CL) is treated not as an abstract “binding-site” concept but as a quantifiable metabolic and biophysical state (amount, remodeling spectrum, oxidation state, and an operationally defined accessibility pool) that can shift pore permissiveness. In this organization, Ephb1 is an upstream signal entry point whose loss propagates through downstream signaling networks to remodel the mitochondrial/membrane environment, thereby shifting the functional threshold and ceiling of GSDMD pore output. Because complex systems often yield modest, distributed omics shifts, we avoid prematurely converging on a single enzyme node; instead, we use cross-batch “mechanism axes” to summarize supply/transport/synthesis/remodeling/oxidation/membrane-environment coordinates as reproducible phenotype endpoints. We then use mediation decomposition
        (X–M–Y) to prioritize candidate downstream pathways that best explain how Ephb1 perturbs these axes, producing a testable roadmap rather than a mechanistic proof. Crucially, mediation here is a ranking tool: it nominates pathways for targeted perturbation along a three-step logic (pathway → CL/axis state → pore/output) without claiming direct biochemical sufficiency. This mediator-first framework provides an interpretable way to rationalize activation–output decoupling: similar upstream activation can yield divergent lytic outputs if membrane-environment thresholds are shifted.'
      source: discussion_outline_en.yaml
      para_id: D3
    - type: paragraph
      text: 'Our central claim is deliberately scoped: the data most strongly support an execution-threshold model with membrane environment/CL as a high-priority mediator, whereas full sufficiency of the entire Ephb1→pathway→CL→pore loop remains to be closed. We do not claim that upstream activation is irrelevant; we claim it is necessary but insufficient to predict lytic output magnitude, and that execution-layer parameters (pore efficiency/stability, repair engagement, and rupture probability) provide the missing explanatory degrees of freedom. We also do not claim a direct Ephb1–GSDMD structural interaction or precise in situ CL accessibility/binding constants; our framework is built to explain relative threshold shifts using experimentally aligned readouts rather than absolute physical constants. Key alternative explanations remain adjudicable: (i) ROS-first causality (Ephb1→ROS→CL) versus CL-first or ROS-independent CL remodeling can be separated by ROS-clamping versus CL rescue in
        Ephb1-deficient cells; (ii) dominance of repair/rupture axes (ESCRT/NINJ1) can be tested by perturbing repair or rupture factors and asking whether they override the CL–output association; (iii) tool/energetic confounds (e.g., BEL stereochemistry, off-target hydrolase inhibition, ΔΨm effects influencing NAO) require enantiomer-aware dosing, covariate control (ΔΨm/mitochondrial mass), and orthogonal lipidomics validation. Internal validity is therefore bounded by measurement specificity (NAO vs LC–MS, ΔΨm covariates), tool specificity, and batch structure, while external validity is bounded by species/cell type (C57 peritoneal macrophages), stimulation paradigm (acute LPS+nigericin), and metabolic/ROS regimes where nonlinearity may dominate. Importantly, these boundaries do not negate the model; they define where the model should be expected to hold and what falsifiable predictions would overturn it. Thus, the Discussion aims to be maximally informative without over-claiming: we provide
        a layer-localized, mediator-based explanation for decoupling and specify the concrete experiments that can confirm or refute sufficiency and pathway priority.'
      source: discussion_outline_en.yaml
      para_id: D4
    - type: paragraph
      text: 'A practical implication of an execution-layer cap is that inflammatory signaling could, in principle, be modulated without fully shutting down upstream inflammasome activation—potentially preserving host defense while keeping lytic damage below a pathological threshold. To close the causal loop, the first priority is to test sufficiency at the mediator level: in Ephb1-deficient macrophages, compare ROS lowering versus direct CL restoration (with matched covariate control) and ask whether CL rescue can recover early GSDMD-NT membrane engagement and IL-1β lytic release even when ROS is not the sole driver. Second, we need to validate the mediation-prioritized downstream pathways using a strict hierarchy-consistent workflow: pathway perturbation should first shift CL/axis coordinates, then shift early pore/output readouts, while minimally affecting priming/assembly metrics. Together, these experiments will determine whether the proposed chain is merely a correlated scaffold or
        a mechanistically sufficient route. Take-home, in two sentences: Ephb1 acts as an upstream signal input that remodels the membrane environment (captured by CL metabolic state) to shift the functional threshold and ceiling of GSDMD pore output, thereby explaining why activation readouts can be similar while lytic outputs diverge. Framing pyroptosis in threshold terms—pore formation, repair capping, and rupture separability—turns activation–output decoupling from an empirical observation into a testable, portable model for interpreting inflammasome outputs.'
      source: discussion_outline_en.yaml
      para_id: D5
