  - id: methods
    title: Methods
    blocks:
    - type: heading
      level: 2
      text: Animals
    - type: paragraph
      text: All experiments were performed using mice on a C57BL/6J genetic background. Ephb1 mutant mice and wild-type littermates were used in this study. Ephb1 mutant mice were obtained from the piggyBac (PB) transposon-based mouse mutant library at the Institute of Developmental Biology and Molecular Medicine, Fudan University. Mice were housed under specific pathogen-free (SPF) conditions with controlled temperature, humidity, and a 12 h light/12 h dark cycle. Animals had ad libitum access to sterilized standard chow and acidified drinking water. Genotypes were confirmed by PCR-based analysis, and mice aged 6 weeks or older were used for experiments. All animal procedures were approved by the Institutional Animal Care and Use Committee of Fudan University and conducted in accordance with relevant guidelines and regulations.
    - type: heading
      level: 2
      text: Primary peritoneal macrophage isolation
    - type: paragraph
      text: Primary peritoneal macrophages were isolated from 6–10-week-old C57BL/6J wild-type and Ephb1-deficient mice. To elicit macrophage recruitment, mice were intraperitoneally injected with 1–2 mL of sterile 4% thioglycollate medium. Three days after injection, peritoneal exudate cells were harvested by lavage with pre-warmed phosphate-buffered saline (PBS). Recovered cells were collected by centrifugation and subjected to red blood cell lysis when necessary. Cells were resuspended in RPMI 1640 medium supplemented with 10% fetal bovine serum and antibiotics, counted, and seeded at the indicated densities. After 1–2 h of incubation, non-adherent cells were removed by gentle washing with PBS, and adherent macrophages were cultured overnight before downstream stimulation and assay procedures.
    - type: heading
      level: 2
      text: Cell culture and inflammasome stimulation
    - type: paragraph
      text: Primary peritoneal macrophages were subjected to defined inflammasome priming and activation protocols, with Ephb1-Fc perturbation applied where indicated. For inflammasome priming, cells were treated with lipopolysaccharide (LPS) at a final concentration of 1–10 ng/mL for 4 h. NLRP3 inflammasome activation was induced by treatment with either nigericin or ATP, NLRC4 activation was triggered by cytosolic delivery of flagellin, and AIM2 activation was induced by transfection of poly(dA:dT). For NLRP3 activation, cells were stimulated with nigericin (10 µg/mL) for 7.5–120 min or ATP (5 mM) for 2 h. For NLRC4 activation, cells were transfected with flagellin (0.5 ng/mL) using Lipofectamine 2000 and incubated for 2 h. For AIM2 activation, cells were transfected with poly(dA:dT) (0.1 ng/mL) using Lipofectamine 2000 and incubated for 8 h. Where indicated, cells were co-treated with Ephb1-Fc fusion protein to modulate ephrin-B/EphB signaling during inflammasome activation. To generate
        higher-order Ephb1-Fc clusters, Ephb1-Fc was pre-incubated with anti-human IgG Fc-specific antibody at a 10:1 ratio for 30 min at room temperature with gentle rotation. Ephb1-Fc complexes were prepared at final concentrations of 5, 0.5, 0.05, or 0.005 µg/mL in complete RPMI 1640 medium. Pre-formed Ephb1-Fc complexes were added to cell cultures together with the indicated inflammasome stimuli. At the end of stimulation, culture plates were immediately placed on ice, and supernatants and cell lysates were collected for downstream analyses.
    - type: heading
      level: 2
      text: Inflammasome assembly assays
    - type: paragraph
      text: Inflammasome assembly was assessed by detecting ASC oligomerization using a chemical crosslinking-based assay. Primary peritoneal macrophages were stimulated to activate the NLRP3 inflammasome under the indicated stimulation conditions. Following stimulation, cells were lysed with Triton X-100-containing buffer to separate soluble and detergent-insoluble fractions. The detergent-insoluble pellet fraction, enriched for ASC specks, was collected for crosslinking analysis. ASC oligomers in the insoluble fraction were chemically crosslinked using disuccinimidyl suberate (DSS). Crosslinking reactions were terminated by SDS-mediated denaturation prior to sample processing. Crosslinked samples were analyzed by SDS-PAGE followed by Western blotting to detect high-molecular-weight ASC oligomers. ASC oligomerization patterns in crosslinked insoluble fractions were compared with corresponding soluble lysate fractions.
    - type: heading
      level: 2
      text: Inflammasome output and cell death assays
    - type: paragraph
      text: Inflammasome-associated cell death and cytokine release were quantitatively assessed following pharmacological or genetic perturbations. Primary peritoneal macrophages were seeded in 96-well plates at a density of 1 × 10^5 cells per well and cultured overnight to allow metabolic stabilization. Cells were subjected to inflammasome activation or control treatments as described above under a final volume of 100 µL per well. For maximal LDH release controls, cells were treated with lysis solution 45 min prior to sample collection. Following treatment, culture supernatants were collected for lactate dehydrogenase (LDH) release measurements. LDH activity in culture supernatants was determined using the CytoTox 96® Non-Radioactive Cytotoxicity Assay according to the manufacturer’s instructions. Absorbance was measured at 490–492 nm using a multimode microplate reader. Percent cytotoxicity was calculated by normalizing LDH release from treated samples to maximal LDH release controls
        after background subtraction. Levels of secreted cytokines in culture supernatants were measured using mouse TNF-α, IL-6, and IL-1β uncoated ELISA kits. Cytokine concentrations were calculated from standard curves generated using serially diluted recombinant standards. To distinguish inflammasome-associated output from non-pyroptotic cell death, apoptosis control assays were performed separately under matched culture conditions. Apoptosis was induced by treating cells with staurosporine at a final concentration of 1 µM for 4 h, with vehicle-treated cells serving as controls. Apoptotic signaling was evaluated by immunoblot detection of cleaved caspase-3. Data were obtained from at least three independent experiments and analyzed using the statistical procedures described below.
    - type: heading
      level: 2
      text: Mitochondrial functional assays
    - type: paragraph
      text: Cellular and mitochondrial reactive oxygen species (ROS) production and mitochondrial membrane potential were assessed using fluorescent probe-based assays. H2DCFDA was used to monitor total intracellular ROS, MitoSOX Red was used to detect mitochondrial superoxide, and tetramethylrhodamine methyl ester (TMRM) was used to assess mitochondrial membrane potential. Experiments were performed sequentially, including LPS priming, probe loading, inflammasome activation, and fluorescence measurement. Cells were primed with lipopolysaccharide (LPS) for 4 h prior to fluorescent probe loading. For probe loading, cells were incubated with H2DCFDA, MitoSOX Red, and TMRM in serum-free medium during the final 45 min of LPS priming. Inflammasome activation was triggered by treatment with nigericin at a final concentration of 10 µg/mL. Fluorescence signals were recorded immediately after stimulation using a temperature-controlled multimode microplate reader. Fluorescence intensity was measured
        at excitation/emission wavelengths of approximately 488/525 nm for H2DCFDA, 510/580 nm for MitoSOX Red, and 550/576 nm for TMRM. Kinetic measurements were performed at 2.5-min intervals for up to 2 h following nigericin stimulation. Fluorescence signals were quantified and compared across experimental conditions to assess changes in cellular ROS, mitochondrial superoxide, and mitochondrial membrane potential.
    - type: heading
      level: 2
      text: Cardiolipin accessibility and imaging assays
    - type: paragraph
      text: Mitochondrial cardiolipin content was assessed using 10-N-nonyl acridine orange (NAO) staining. NAO was used at low nanomolar concentrations to semi-quantitatively monitor cardiolipin-associated fluorescence signals in mitochondria. Following experimental treatments, cells were incubated with NAO at a final concentration of 200 nM for 30 min at 37 °C. After staining, fluorescence signals were acquired using either a multimode microplate reader or fluorescence microscopy. NAO fluorescence was measured at excitation/emission wavelengths of approximately 519/555 nm. Changes in NAO fluorescence intensity were used to compare cardiolipin-associated signals across experimental conditions. In parallel with plate-based NAO quantification, microscopy-based imaging was performed to assess the subcellular distribution of cardiolipin-associated signals. Confocal microscopy of NAO-stained primary macrophages was performed to visualize cardiolipin-associated subcellular signals. Primary peritoneal
        macrophages were cultured on glass coverslips and subjected to the indicated treatments prior to fixation. Cells were fixed and, where indicated, permeabilized prior to staining. For imaging, cells were stained with NAO to visualize cardiolipin-associated mitochondrial signals, with DAPI counterstaining applied where indicated. Fluorescence images were acquired using an Olympus SpinSR super-resolution confocal microscope. Multichannel images were collected using identical laser power, detector gain, and exposure settings for all experimental groups. For each condition, multiple randomly selected fields of view were imaged, and a minimum of 100 cells per group were analyzed. NAO fluorescence was quantified by applying consistent intensity thresholding and particle/region-of-interest analysis to derive signal intensity and/or area metrics. Image quantification was performed using ImageJ software with consistent analysis parameters applied across all samples.
    - type: heading
      level: 2
      text: Mitochondrial isolation and mtDNA release analysis
    - type: paragraph
      text: Mitochondria were isolated to assess mitochondrial integrity and cytosolic release of mitochondrial DNA (mtDNA) following inflammasome activation. Primary peritoneal macrophages were stimulated with lipopolysaccharide followed by nigericin prior to subcellular fractionation. Mitochondria were isolated using a commercial mitochondria isolation kit based on differential centrifugation under cold conditions. Differential centrifugation was used to obtain mitochondrial fractions, cytosolic fractions, and corresponding total cell lysates for comparison. Isolated mitochondrial pellets were either maintained in storage buffer for functional analyses or lysed for downstream protein or nucleic acid extraction. The purity of mitochondrial fractions was evaluated by quantitative PCR analysis of mitochondrial-encoded and nuclear-encoded DNA markers. Cytosolic mtDNA release was quantified by comparing mtDNA abundance in cytosolic fractions relative to total cellular mtDNA. DNA was extracted
        from total, mitochondrial, and cytosolic fractions, and mtDNA levels were quantified by real-time PCR. Relative mtDNA release was calculated using ΔCt-based normalization of cytosolic mtDNA to total mtDNA within each sample. Analyses were performed using samples from at least three independent biological replicates and evaluated using the statistical procedures described below.
    - type: heading
      level: 2
      text: Immunoblot analysis
    - type: paragraph
      text: Protein expression was analyzed by Western blotting. Cells were lysed in Laemmli sample buffer supplemented with protease and phosphatase inhibitors, followed by heat denaturation. Protein samples were separated by SDS-PAGE using gels of appropriate acrylamide concentrations based on target protein molecular weight. Separated proteins were transferred onto polyvinylidene fluoride (PVDF) membranes under cold conditions. Membranes were blocked and incubated with primary antibodies overnight at 4 °C, followed by incubation with HRP-conjugated secondary antibodies. Protein signals were visualized using enhanced chemiluminescence reagents and captured with a digital imaging system. Band intensities were quantified by densitometric analysis and normalized to GAPDH as a loading control. Immunoblot quantification data were obtained from at least three independent experiments and analyzed using the statistical procedures described below.
    - type: heading
      level: 2
      text: Quantitative PCR analysis
    - type: paragraph
      text: Gene expression was quantified by real-time quantitative PCR (qPCR). Total RNA was extracted from primary peritoneal macrophages using TRIzol reagent according to standard protocols. Complementary DNA (cDNA) was synthesized using a two-step reverse transcription protocol with genomic DNA removal. Quantitative PCR was performed using SYBR Green-based detection chemistry on a real-time PCR system. Gene expression levels were normalized to the geometric mean of GAPDH and HPRT1 as reference genes. Amplification specificity was confirmed by melt curve analysis, and technical replicates with excessive Ct variation were excluded. Relative gene expression was calculated using the ΔΔCt method with wild-type samples serving as calibrators. Each mouse was treated as an independent biological replicate, and data were analyzed using the statistical procedures described below.
    - type: heading
      level: 2
      text: Lipidomics
    - type: paragraph
      text: Lipidomic analyses were performed to characterize global and pathway-specific lipid alterations in primary peritoneal macrophages following Ephb1 deficiency. Cellular lipids were extracted using a modified methyl tert-butyl ether (MTBE)-based method. Untargeted lipidomics was conducted to enable broad-spectrum detection and identification of lipid species. Lipid extracts were analyzed by liquid chromatography coupled to high-resolution mass spectrometry with polarity switching and data-dependent MS/MS acquisition. Lipid species were identified based on accurate mass measurements and MS/MS fragmentation patterns using dedicated lipidomics analysis software. Targeted lipidomics was performed to quantitatively validate selected lipid species of interest identified in the untargeted analysis. Quantification was achieved using internal standards and calibration curves, and lipid abundances were expressed as relative or absolute quantities as appropriate. Lipidomic data were normalized
        and scaled prior to statistical analysis to reduce technical variation and improve comparability across samples. Differential lipid abundance was assessed using univariate statistical testing and multivariate analyses, including principal component analysis. Quality control samples were included throughout the analytical workflow to monitor instrument stability, reproducibility, and data reliability.
    - type: heading
      level: 2
      text: Transcriptomics
    - type: paragraph
      text: RNA sequencing (RNA-seq) was performed to characterize global transcriptomic changes in primary peritoneal macrophages. Total RNA was extracted from macrophages, and RNA integrity and purity were assessed to ensure suitability for library construction. Strand-specific RNA-seq libraries were prepared following mRNA enrichment or rRNA depletion using standard protocols. Libraries were sequenced on an Illumina high-throughput sequencing platform using paired-end reads. Raw sequencing reads were subjected to quality control to remove adaptor sequences and low-quality reads prior to downstream analysis. Clean reads were aligned to the reference mouse genome, and gene-level expression counts were generated using standard alignment and quantification pipelines. Differentially expressed genes were identified using statistical models based on normalized read counts with multiple testing correction. Functional annotation and enrichment analyses were performed to identify biological processes
        and pathways associated with differentially expressed genes.
    - type: heading
      level: 2
      text: Statistical analysis
    - type: paragraph
      text: Statistical analyses were performed to compare experimental groups and evaluate the significance and consistency of observed effects. Data analysis and visualization were conducted using R and Python. Data distributions were assessed for normality prior to statistical testing, and appropriate parametric or non-parametric tests were selected accordingly. Two-group comparisons were performed using two-tailed Student’s t-tests or non-parametric alternatives, while multi-group comparisons were analyzed using analysis of variance (ANOVA) with appropriate post hoc tests. Data are presented as mean ± SEM unless otherwise indicated, with individual data points shown where appropriate. All statistical tests were two-sided, and P values less than 0.05 were considered statistically significant. Detailed information on sample size, statistical tests, and significance values is provided in the corresponding figure legends.
    - type: heading
      level: 2
      text: Data availability and reproducibility
    - type: paragraph
      text: Data management and analysis were performed in accordance with standard practices to ensure data integrity, traceability, and reproducibility. Raw experimental data were securely stored and backed up throughout the study. Data processing and statistical analyses were conducted using documented workflows, and analysis parameters were recorded to support reproducibility. Key experimental findings were validated using independent biological replicates across separate experiments. Data supporting the findings of this study are available from the corresponding author upon reasonable request.
  - id: results
    title: Results
    blocks:
    - type: heading
      level: 2
      text: EphB1 deficiency reduces pyroptosis and IL-1β release
    - type: paragraph
      text: To identify regulators of inflammasome,
      source: opening_and_trans.yaml
      panel_id: ''
    - type: paragraph
      text: Primary macrophages from multiple PiggyBac (PB) genetic backgrounds were subjected to standardized NLRP3 inflammasome activation, and IL-1β release was used as the functional screening readout (Fig. 1a). Having outlined the genetic-screening strategy, we next sought to identify, a candidate strain to prioritize for mechanistic dissection.
      source: figure_1_a_000.yaml
      panel_id: 1a
    - type: paragraph
      text: Across the 10 screened strains, most genetic backgrounds showed little or no genotype-dependent difference in IL-1β release following Nigericin stimulation, whereas only two strains reached statistical significance in within-strain comparisons (Fig. 1b). Notably, the Ephb1-associated strain (081230020-HRB) exhibited a pronounced reduction in IL-1β release in EphB1-deficient macrophages (~41% decrease relative to WT; P≈0.034), representing  the most statistically significant reduction observed in the screen and prioritizing Ephb1 for subsequent mechanistic investigation.
      source: figure_1_b_001.yaml
      panel_id: 1b
    - type: paragraph
      text: Having prioritized Ephb1 from the screen, we next asked whether the phenotype generalizes beyond a single inflammasome agonist, thereby arguing against a stimulus-specific artifact. Across all three activation routes, Ephb1-deficient macrophages released significantly less IL-1β than WT controls (Fig. 1c). These data indicate that the diminished IL-1β output in EphB1-deficient macrophages is not restricted to a single receptor pathway, supporting a role for EphB1 at a receptor-downstream step.
      source: figure_1_c_v2.yaml
      panel_id: 1c
    - type: paragraph
      text: Having established cross-agonist consistency within inflammasome, we next asked whether Ephb1 loss broadly constrains lytic execution across distinct inflammasome sensors. Across all inflammasome activation conditions, EphB1-deficient macrophages exhibited consistently reduced LDH release compared with WT controls (Fig. 1d). These findings indicate that EphB1 deficiency broadly attenuates pyroptotic cell lysis downstream of distinct inflammasome receptors, consistent with a role in a shared execution step rather than pathway-specific signaling.
      source: figure_1_d_v2.yaml
      panel_id: 1d
    - type: paragraph
      text: Having established a output-limited inflammasome phenotype upon Ephb1-deficiency macrophages,  we next asked whether the defect reflects impaired upstream priming/assembly  or instead a restriction at the terminal, GSDMD pore–driven pyroptotic execution.
      source: opening_and_trans.yaml
      panel_id: ''
    - type: heading
      level: 2
      text: EphB1 deficiency reduces pyroptotic execution
    - type: paragraph
      text: To map the position of Ephb1 within the inflammasome pathway,  we compared inflammasome responses triggered by NLRP3, AIM2, and NLRC4 in WT and Ephb1-deficient macrophages.
      source: opening_and_trans.yaml
      panel_id: ''
    - type: paragraph
      text: LPS stimulation induced robust and comparable increases in Tnf, Il6, and Il-1β mRNA in WT and EphB1-deficient macrophages across all examined time points (Fig. 2a,b). Together, these data indicate that EphB1 deficiency does not impair TLR4–NF-κB–dependent transcriptional priming, arguing against defective first-signal activation as the cause of reduced inflammasome output.
      source: figure_2_a+b.yaml
      panel_id: 2a/b
    - type: paragraph
      text: We next asked whether conventional cytokine secretion was preserved, which would argue against a generalized secretory defect. LPS stimulation induced comparable increases in TNF-α and IL-6 in WT and EphB1-deficient macrophages, with no significant genotype-dependent differences (Fig. 2c). Thus, EphB1 deficiency does not measurably impair TLR4-driven secretion of TNF-α or IL-6, arguing against a generalized secretory defect as the basis for reduced inflammasome-associated outputs.
      source: figure_2_c_v2.yaml
      panel_id: 2c
    - type: paragraph
      text: We next asked whether the Ephb1-dependent difference specifically affects inflammasome-triggered IL-1β release across different levels of stimulation. While IL-1β release increased with higher nigericin doses in both genotypes, EphB1-deficient macrophages consistently released less IL-1β than WT controls at each stimulatory dose (Fig. 2d). These results indicate that EphB1 deficiency limits mature IL-1β release across the tested range of NLRP3 activation, supporting a defect at a late inflammasome execution or export step rather than impaired priming.
      source: figure_2_d.yaml
      panel_id: 2d
    - type: paragraph
      text: We next examined whether this defect reflects impaired inflammasome assembly at the ASC platform. Under NLRP3 activation conditions, EphB1-deficient macrophages displayed levels of ASC oligomers, dimers, and monomers comparable to those observed in WT controls (Fig. 2e). These data indicate that EphB1 deficiency does not disrupt ASC oligomerization during NLRP3 inflammasome activation, arguing against defective inflammasome assembly as the basis for reduced downstream outputs.
      source: figure_2_e.yaml
      panel_id: 2e
    - type: paragraph
      text: We next examined whether caspase-1 activation itself is preserved. Caspase-1 activation, as reflected by intracellular p20 levels, was comparable between WT and EphB1-deficient macrophages (Fig. 2f). These results localize the EphB1-dependent defect to a step downstream of caspase-1 activation.
      source: figure_2_f.yaml
      panel_id: 2f
    - type: paragraph
      text: We next examined whether the canonical caspase-1 substrates—pro-IL-1β and GSDMD—are processed normally. Caspase-1–dependent cleavage of GSDMD and pro–IL-1β occurred efficiently in EphB1-deficient macrophages, yielding levels of cleavage and maturation comparable to those in WT cells (Fig. 2g). Together, these results demonstrate that EphB1 deficiency does not compromise caspase-1 substrate cleavage per se but selectively limits the extracellular release of mature inflammasome products, thereby localizing the defect to a late execution or export step.
      source: figure_2_g.yaml
      panel_id: 2g
    - type: paragraph
      text: Having mapped the bottleneck pyroptotic execution,  we next asked whether Ephb1 specifically gates the early engagement of GSDMD-NT with mitochondria that precedes pore function and organelle injury.
      source: opening_and_trans.yaml
      panel_id: ''
    - type: heading
      level: 2
      text: EphB1 deficiency reduces mitochondrial enrichment of GSDMD
    - type: paragraph
      text: To investigate how Ephb1 regulates pyroptotic execution, we examined mitochondrial integrity and GSDMD localization during NLRP3 inflammasome activation in WT and Ephb1-deficient macrophages.
      source: opening_and_trans.yaml
      panel_id: ''
    - type: paragraph
      text: Upon inflammasome activation, EphB1-deficient macrophages exhibited reduced accumulation of cytosolic ROS and a smaller loss of mitochondrial membrane potential compared with WT cells. In contrast, mitochondrial ROS levels measured by MitoSOX showed no significant genotype-dependent difference (Fig. 3a,b,c,d,e,f,g,h). Together, these results indicate that EphB1 deficiency does not cause an intrinsic alteration in mitochondrial membrane potential at baseline but limits ROS accumulation and mitochondrial depolarization during inflammasome activation, suggesting reduced mitochondrial damage.
      source: figure_3_a+b+c+d+e+f+g+h.yaml
      panel_id: 3a/b/c/d/e/f/g/h
    - type: paragraph
      text: We therefore examined early mitochondrial events during inflammasome activation to determine whether Ephb1 deficiency affects mitochondrial content release. In WT macrophages, inflammasome activation induced a rapid and transient pulse of cytosolic mtDNA, peaking at 7.5min, whereas this cytosolic mtDNA peak was markedly reduced in EphB1-deficient macrophages (Fig. 3i,j,s3,d,f,g). Together, these results indicate that EphB1 deficiency reduces inflammasome-induced release of mitochondrial DNA into the cytosol without altering total mtDNA abundance.
      source: figure_3_i+j+s3_d+f+g.yaml
      panel_id: 3/i/j/s3/d/f/g
    - type: paragraph
      text: We next examined whether GSDMD recruitment to mitochondria follows a similar temporal pattern during inflammasome activation. In WT macrophages, GSDMD-NT accumulated in the mitochondrial fraction at approximately 7.5 min after inflammasome activation, whereas this early mitochondrial enrichment of GSDMD-NT was markedly reduced in Ephb1-deficient macrophages (Fig. 3k,s3e). Together, these results indicate that EphB1 promotes early mitochondrial enrichment of GSDMD-NT during inflammasome activation.
      source: figure_3_k+s3_e.yaml
      panel_id: 3k/s3e
    - type: paragraph
      text: Having localized the execution defect to the GSDMD–mitochondria interface,  we next asked whether a defined lipid gate at the mitochondrial membrane—cardiolipin abundance—accounts for the altered engagement efficiency.
      source: opening_and_trans.yaml
      panel_id: ''
    - type: heading
      level: 2
      text: EphB1 deficiency reduces cardiolipin abundance
    - type: paragraph
      text: To determine whether mitochondrial membrane composition contributes to the Ephb1-dependent phenotype, we quantified cardiolipin abundance in WT and Ephb1-deficient macrophages.
      source: opening_and_trans.yaml
      panel_id: ''
    - type: paragraph
      text: Ephb1-deficient macrophages displayed significantly lower NAO fluorescence than WT cells, indicating a reduced NAO-detectable cardiolipin pool (Fig. 4a,b).
      source: figure_4_a+b.yaml
      panel_id: 4a/b
    - type: paragraph
      text: We next examined whether lipidomic analysis confirms changes in cardiolipin abundance. Compared with WT cells, Ephb1-deficient macrophages exhibited a significant reduction in total cardiolipin abundance(~70% of WT levels) (Fig. 4c,d). Together, these lipidomic data show that EphB1 deficiency not only reduces the NAO-accessible cardiolipin pool but also decreases total cardiolipin abundance, providing a quantitative membrane lipid basis for the attenuated mitochondrial damage observed in EphB1-deficient macrophages.
      source: figure_4_c+d.yaml
      panel_id: 4c/d
    - type: paragraph
      text: We next tested whether pharmacological inhibition of cardiolipin biosynthesis alters  cardiolipin abundance. AD treatment markedly reduced NAO fluorescence in WT macrophages, pharmacological inhibition of cardiolipin biosynthesis decreases the cardiolipin abundance (Fig. 4e,f).
      source: figure_4_e+f.yaml
      panel_id: 4e/f
    - type: paragraph
      text: We next examined whether reduced cardiolipin abundance affects inflammasome-mediated IL-1β release. AD treatment markedly suppressed LPS and Nigericin induced IL-1β release in macrophages (Fig. 4g). These results indicate that pharmacological reduction of cardiolipin abundant suppresses inflammasome-induced IL-1β release.
      source: figure_4_g.yaml
      panel_id: 4g
    - type: paragraph
      text: We next tested whether perturbation of cardiolipin remodeling produces a similar effect. BEL treatment led to a marked reduction in NAO fluorescence intensity, indicating that pharmacological interference with cardiolipin remodeling decrease the cardiolipin abundance (Fig. S4a,b). Together with perturbations targeting cardiolipin abundance, these results show that both manipulation of cardiolipin content and interference with cardiolipin remodeling can reduce NAO staining, indicating that changes in the NAO-accessible cardiolipin pool can arise through multiple mechanisms beyond alterations in total cardiolipin levels.
      source: figure_4_sa+b.yaml
      panel_id: s4a/b
    - type: paragraph
      text: We next examined whether this perturbation similarly affects inflammasome-mediated IL-1β release. Across these perturbations, reduced cardiolipin abundant consistently decreased LPS and Nigericin induced IL-1β release (Fig. S4c). Together, these results show that perturbations affecting cardiolipin abundance or remodeling consistently reduce inflammasome-mediated IL-1β release.
      source: figure_4_sc.yaml
      panel_id: s4c
    - type: heading
      level: 2
      text: Membrane context is the dominant cardiolipin-related axis perturbed by EphB1 deficiency
    - type: paragraph
      text: To identify cellular processes associated with cardiolipin variation, we defined biological process axes centered on cardiolipin metabolism, each represented by lipidomic indicators and gene sets, and evaluated their association with cardiolipin abundance across batches.
      source: opening_and_trans.yaml
      panel_id: ''
    - type: paragraph
      text: This framework defines six functional axes—synthesis, remodeling, transport, supply, oxidation, and membrane context—and assigns to each axis representative genes and lipid readouts derived from transcriptomic and lipidomic datasets (Fig. 5a).
      source: figure_5_a.yaml
      panel_id: 5a
    - type: paragraph
      text: We next defined the specific gene and lipid features assigned to each axis. For each axis, we defined representative genes and lipid features together with predefined weighting and inclusion rules (Fig. 5b).
      source: figure_5_b.yaml
      panel_id: 5b
    - type: paragraph
      text: We next normalized multi-batch omics datasets and computed comparable axis-level scores. For each omics layer, raw data underwent quality control, normalization, and batch-aware modeling, followed by aggregation into predefined axis-level Z scores used for multi-omics integration (Fig. 5c).
      source: figure_5_c.yaml
      panel_id: 5c
    - type: paragraph
      text: We next examined whether axis effects are consistent across omics layers and batches. Across three RNA-seq batches and four lipidomics batches, only the membrane context axis displayed a consistent positive effect in both omics layers, with stable directionality (Fig. 5d). These results identify the membrane context axis as the only axis consistently perturbed by Ephb1 deficiency across omics layers.
      source: figure_5_d.yaml
      panel_id: 5d
    - type: paragraph
      text: We next integrated evidence across batches to obtain aggregated axis-level scores. Among the six axes, the membrane context axis showed the largest deviation from zero, with a multi-omics Z score of approximately +2.6 (Fig. 5e). These results identify membrane context as the primary axis perturbed by EphB1 deficiency.
      source: figure_5_e.yaml
      panel_id: 5e
    - type: paragraph
      text: We next examined the relationship between axis scores and cardiolipin abundance. Among all axes, the membrane context axis showed the strongest negative association with sum_CL, with higher combined Z scores corresponding to lower total cardiolipin levels, whereas all other axes displayed weak or near-zero correlations (Fig. 5f). These results indicate that total cardiolipin abundance (sum_CL) consistently capture membrane context axis perturbations across batches.
      source: figure_5_f.yaml
      panel_id: 5f
    - type: paragraph
      text: We next examined which Ephb1 downstream signaling pathways correlate most strongly with the membrane context axis.
      source: opening_and_trans.yaml
      panel_id: ''
    - type: heading
      level: 2
      text: PI3K–AKT–mTOR signaling correlates with the membrane-context axis
    - type: paragraph
      text: To identify Ephb1 downstream signaling pathways associated with the membrane context axis, we constructed Ephb1-related pathway gene sets and evaluated their transcriptional changes and correlation with the membrane context axis.
      source: opening_and_trans.yaml
      panel_id: ''
    - type: paragraph
      text: We applied an RNA-based analysis framework in which Ephb1 status was treated as the upstream variable and downstream signaling pathway scores were evaluated for association with the membrane context axis (Fig. 6a).
      source: figure_6_a.yaml
      panel_id: 6a
    - type: paragraph
      text: We next defined candidate EphB1 downstream signaling gene sets for pathway-level analysis. Each gene set represents an EphB1-associated signaling pathway with predefined gene members and scoring directionality (Fig. 6b).
      source: figure_6_b.yaml
      panel_id: 6b
    - type: paragraph
      text: We next examined which pathways show consistent EphB1-dependent transcriptional changes across RNA batches. Across three RNA-seq batches, EphB1 deficiency induced consistent decreases in PI3K–AKT–mTOR pathway scores (KO < WT). NF-κB/ROS and JAK–STAT modules showed weaker or batch-dependent reductions, whereas cytoskeleton-related pathways displayed positive shifts (Fig. 6c).
      source: figure_6_c_v2.yaml
      panel_id: 6c
    - type: paragraph
      text: We next examined which pathways show the strongest change across batchs. Across pathways, PI3K–AKT–mTOR and JAK–STAT modules showed the largest decreases in EphB1-deficient macrophages, whereas cytoskeleton/adhesion pathways (FAK–Src–Rho) displayed positive shifts (Fig. 6d). Together, these results prioritize PI3K–AKT–mTOR as the most robust EphB1 downstream signaling candidate.
      source: figure_6_d_v2.yaml
      panel_id: 6d
    - type: paragraph
      text: We next examined whether these pathways correlate with the membrane context axis. Notably, the PI3K–AKT–mTOR pathway shows coordinated shifts along both axes, with KO samples displaced toward lower M and higher Z values, whereas WT samples occupy the opposite quadrant. In contrast, JAK–STAT inflammatory and FAK–Src–Rho cytoskeleton pathways separate primarily along the Z axis while largely overlapping along the M axis (Fig. 6e). These results show that reduced PI3K–AKT–mTOR signaling is consistently associated with increased membrane context axis scores.
      source: figure_6_e_v2.yaml
      panel_id: 6e
  - id: discussion
    title: Discussion
    blocks:
    - type: paragraph
      text: 'The inflammasome field often treats upstream readouts—priming-dependent transcription, ASC speck formation, and caspase-1 activation—as near-equivalent proxies for “inflammatory strength.” In practice, a recurring structural paradox appears across models: upstream activation/assembly can look similar, yet lytic IL-1β release and membrane rupture diverge markedly. This activation–output decoupling is consistent with an execution-layer threshold or cap operating after assembly, shaping how much output is released, when rupture occurs, and whether rupture occurs at all. Accordingly, the central question is not simply whether NLRP3 activates, but how terminal output is capped or thresholded when upstream activation appears comparable. This paradox can be reduced to a falsifiable minimal chain in which signal input is translated through a membrane-environment mediator into pore functional output. In this framing, upstream activation remains necessary, but it is not sufficient to
        predict the magnitude of lytic output. Our findings support this framework by linking the phenotype to execution-layer localization and, in turn, to a threshold model of terminal output. Across a canonical LPS-priming–nigericin NLRP3 paradigm (and additional inflammasome settings), Ephb1-deficient macrophages show blunted lytic outputs and reduced IL-1β release, yet these output changes do not automatically imply that priming, assembly, or caspase activation is globally disabled. Instead, the divergence is better localized to the execution layer: pyroptosis is not a binary switch, but a parameterized process shaped by pore formation efficiency, pore stability and conductance, and a sub-lytic ceiling imposed by membrane repair.'
      source: discussion_outline_en.yaml
      paragraph_group: study_summary
      source_para_ids:
      - D1
      - D2
      selected_sids:
      - D1s1
      - D1s2
      - D1s3
      - D1s4
      - D1s5
      - D1s6
      - D2s1
      - D2s2
      - D2s3
    - type: paragraph
      text: 'The execution-threshold model can be mechanistically interpreted through repair, rupture, and membrane-environment mediation. Conversely, terminal rupture is separable from pore formation and can be amplified by dedicated rupture factors (e.g., NINJ1), creating structural space for activation without proportional rupture. On this basis, an execution-threshold/cap model is both plausible and testable. To move beyond correlation, this model can be evaluated through three criteria: hierarchical masking, same-level rescue, and dose–response behavior. At present, our strongest support is for necessity and layer-localization; sufficiency requires dedicated rescue and pathway-validation experiments. We place the membrane lipid environment—not upstream assembly—as the mediator layer that translates signal input into execution output. Within this mediator layer, cardiolipin (CL) is considered a quantifiable metabolic and biophysical state—rather than merely an abstract binding-site concept—that
        can shift pore permissiveness. In this organization, Ephb1 is an upstream signal entry point whose loss propagates through downstream signaling networks to remodel the mitochondrial/membrane environment, thereby shifting the functional threshold and ceiling of GSDMD pore output.'
      source: discussion_outline_en.yaml
      paragraph_group: mechanistic_interpretation
      source_para_ids:
      - D2
      - D3
      selected_sids:
      - D2s4
      - D2s5
      - D2s6
      - D2s7
      - D2s8
      - D3s1
      - D3s2
      - D3s3
    - type: paragraph
      text: 'Because complex systems often yield modest and distributed omics shifts, we avoid prematurely converging on a single enzyme node and instead use cross-batch mechanism axes to capture reproducible membrane-environment phenotypes. We then use mediation decomposition to prioritize candidate downstream pathways that best explain how Ephb1 perturbs these axes, yielding a testable roadmap rather than direct mechanistic proof. Here, mediation is used as a ranking tool: it prioritizes pathways for targeted perturbation along a pathway → CL/axis state → pore/output logic without implying direct biochemical sufficiency. This mediator-first framework provides an interpretable way to rationalize activation–output decoupling: similar upstream activation can yield divergent lytic outputs if membrane-environment thresholds are shifted.'
      source: discussion_outline_en.yaml
      paragraph_group: integration_with_literature
      source_para_ids:
      - D3
      selected_sids:
      - D3s4
      - D3s5
      - D3s6
      - D3s7
    - type: paragraph
      text: 'A practical implication of an execution-layer cap is that inflammatory signaling could, in principle, be modulated without fully shutting down upstream inflammasome activation—potentially preserving host defense while keeping lytic damage below a pathological threshold. Take-home, in two sentences: Ephb1 acts as an upstream signal input that remodels the membrane environment (captured by CL metabolic state) to shift the functional threshold and ceiling of GSDMD pore output, thereby explaining why activation readouts can be similar while lytic outputs diverge. Framing pyroptosis in threshold terms—pore formation, repair capping, and rupture separability—turns activation–output decoupling from an empirical observation into a testable, portable model for interpreting inflammasome outputs.'
      source: discussion_outline_en.yaml
      paragraph_group: biological_implication
      source_para_ids:
      - D5
      selected_sids:
      - D5s1
      - D5s5
      - D5s6
    - type: paragraph
      text: 'Our central claim is deliberately scoped: the data most strongly support an execution-threshold model with membrane environment/CL as a high-priority mediator, whereas full sufficiency of the entire Ephb1→pathway→CL→pore loop remains to be closed. We do not claim that upstream activation is irrelevant; we claim it is necessary but insufficient to predict lytic output magnitude, and that execution-layer parameters (pore efficiency/stability, repair engagement, and rupture probability) provide the missing explanatory degrees of freedom. We also do not claim a direct Ephb1–GSDMD structural interaction or precise in situ CL accessibility/binding constants; our framework is built to explain relative threshold shifts using experimentally aligned readouts rather than absolute physical constants. Several alternative explanations remain testable, including ROS-first versus CL-first causality, dominance of repair or rupture pathways, and tool- or energetics-related confounds affecting
        CL-linked readouts. Accordingly, internal validity is constrained by measurement specificity, tool specificity, and batch structure, whereas external validity is limited by cell type, stimulation paradigm, and metabolic contexts in which nonlinear behavior may dominate. Importantly, these boundaries do not negate the model; they define where the model should be expected to hold and what falsifiable predictions would overturn it. Taken together, the model provides a layer-localized, mediator-based explanation for decoupling while defining concrete experiments to test sufficiency and pathway priority. To close the causal loop, a first priority is to test mediator-level sufficiency by comparing ROS lowering with direct CL restoration in Ephb1-deficient macrophages and asking whether CL rescue can recover early GSDMD-NT engagement and lytic IL-1β release. A second priority is to test mediation-prioritized pathways by asking whether pathway perturbation first shifts CL/axis states and
        then alters early pore/output readouts while minimally affecting priming and assembly metrics. Together, these experiments will determine whether the proposed chain is merely a correlated scaffold or a mechanistically sufficient route.'
      source: discussion_outline_en.yaml
      paragraph_group: limitations_future
      source_para_ids:
      - D4
      - D5
      selected_sids:
      - D4s1
      - D4s2
      - D4s3
      - D4s4
      - D4s5
      - D4s6
      - D4s7
