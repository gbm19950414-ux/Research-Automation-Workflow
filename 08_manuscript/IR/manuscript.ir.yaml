  sections:
  - id: abstract
    title: Abstract
    blocks:
    - type: paragraph
      text: Inflammasome activation does not necessarily translate into proportional IL-1β release and pyroptotic output, yet the upstream mechanisms that constrain terminal execution remain unclear. Increasing evidence implicates mitochondrial membrane context, particularly cardiolipin status, as a critical but poorly understood regulator of inflammasome output. We asked whether loss of the receptor EphB1 reshapes mitochondrial cardiolipin-dependent membrane context to shift the execution threshold of gasdermin D and thereby attenuate inflammasome-induced lytic output. Using primary murine peritoneal macrophages, we combined genetic perturbation, layered functional positioning of inflammasome signaling, lipid accessibility profiling, pharmacological modulation of cardiolipin state, and integrative multi-omics analyses to dissect causal links between upstream signaling, membrane context, and terminal output. EphB1 deficiency consistently reduced IL-1β release and cell lysis across multiple
        inflammasome stimuli without affecting transcriptional priming, ASC assembly, or caspase-1 activation, localizing the defect to the execution stage. This was associated with impaired mitochondrial enrichment of GSDMD-NT and a coordinated reduction in cardiolipin abundance and accessibility, phenocopied by pharmacological disruption of cardiolipin state. These findings support a membrane-mediated model in which EphB1-dependent signaling remodels cardiolipin-centered membrane context to tune the functional threshold of GSDMD pore formation and limit inflammasome output, providing a mechanistic framework for dissociating activation from output intensity.
  - id: introduction
    title: Introduction
    blocks:
    - type: paragraph
      text: Over the past two decades, the global disease landscape has shifted toward chronic inflammation-associated non-communicable diseases (NCDs), making immune imbalance a central public-health challenge. Cardiovascular diseases, cancer, chronic respiratory diseases, and diabetes together accounted for approximately 43 million deaths in 2021, representing roughly three quarters of non-pandemic-related deaths. A substantial fraction of these deaths occurred before age 70 and disproportionately affected low- and middle-income countries, highlighting the societal burden of chronic inflammation and immune dysregulation. {doi:10.5334/aogh.4649}
      pid: 1.1.1.p1
      section_heading: Inflammasome output imbalance and immunopathological consequences
    - type: paragraph
      text: Acute systemic inflammation remains a major source of mortality, exemplified by sepsis. A Global Burden of Disease (GBD) 2017 systematic analysis estimated approximately 48.9 million sepsis events and 11.0 million sepsis-related deaths in 2017, accounting for about one fifth of global deaths. A subsequent GBD 2021 analysis suggested that the burden in 2021 could be even higher (on the order of 166 million events and 21.4 million deaths), emphasizing the potential rebound or worsening of systemic inflammatory risk in the context of pandemics and aging. {doi:10.1016/s0140-6736(19} {doi:10.1016/s2214-109x(25}
      pid: 1.1.1.p2
      section_heading: Inflammasome output imbalance and immunopathological consequences
    - type: paragraph
      text: From a global burden perspective, modifiable risk factors intersect inflammation and metabolic imbalance, suggesting value in identifying true rate-limiting steps that enable amplitude-limited immune control. GBD 2023 highlighted that a substantial proportion of deaths and disability are attributable to modifiable risk factors, many of which intersect with inflammation, metabolic dysregulation, and immune imbalance. At the molecular level, the NLRP3 inflammasome is often viewed as a convergence node for diverse acute and chronic inflammatory pathologies. While extensive frameworks and regulatory networks have been developed for NLRP3 priming, assembly, and execution, many therapeutic strategies continue to focus on suppressing activation or upstream steps. {doi:10.1016/s0140-6736(25} {doi:10.1038/s41577-019-0165-0} {doi:10.1038/nrd.2018.97}
      pid: 1.1.1.p3
      section_heading: Inflammasome output imbalance and immunopathological consequences
    - type: paragraph
      text: Pyroptosis can be conceptualized as three connected but differentially regulatable stages—priming, inflammasome assembly/caspase activation, and terminal execution—each of which can shape phenotypic outputs. Priming determines the preparedness of inflammasome components, assembly determines whether inflammasomes form and caspases activate, and execution determines the magnitude and form of inflammatory output. Thus, even with comparable NLRP3 activation, final phenotypes such as IL-1β/IL-18 release, membrane permeability, and lytic rupture are not necessarily equivalent, suggesting that divergence may largely reside in execution thresholds.
      pid: 1.1.2.p1
      section_heading: Layered thresholds and membrane-environment constraints
    - type: paragraph
      text: In canonical pathways, inflammatory caspases cleave GSDMD to expose an N-terminal fragment that oligomerizes to form pores, enabling cytokine release and driving osmotic imbalance toward lytic death. Inflammatory caspases (caspase-1/4/5/11) cleave GSDMD, generating the pore-forming GSDMD-NT fragment. GSDMD-NT oligomerizes on membranes to form transmembrane pores that promote IL-1β/IL-18 release and alter ionic and water flux. As pore burden and osmotic imbalance accumulate, cells progress toward lytic death. {doi:10.1038/nature15514} {doi:10.1038/nature15541}
      pid: 1.1.2.p2
      section_heading: Layered thresholds and membrane-environment constraints
    - type: paragraph
      text: Structural and functional studies indicate that pore-forming efficiency of GSDMD-NT is a decisive step that can switch outputs from controlled release to uncontrolled lysis once a threshold is crossed. Once the execution stage crosses a threshold, outputs can rapidly transition from regulated release to uncontrolled lytic rupture. Accordingly, pore formation can be viewed as a core bottleneck of terminal pyroptotic execution. {doi:10.1038/nature18629} {doi:10.1073/pnas.1607769113}
      pid: 1.1.2.p3
      section_heading: Layered thresholds and membrane-environment constraints
    - type: paragraph
      text: GSDMD-NT does not insert indiscriminately into all lipid membranes; it preferentially targets negatively charged phospholipids, particularly membranes enriched in phosphoinositides (PIPs) and cardiolipin (CL). In model-membrane systems, inclusion of such anionic lipids can markedly enhance pore formation and membrane leakage. Thus, the same GSDMD-NT fragment can exhibit different execution outcomes depending on lipid context, with membrane composition functioning as an adjustable ‘execution-gain’ knob that shapes amplitude and timing. {doi:10.1038/nature18629} {doi:10.1038/nature18590}
      pid: 1.1.2.p4
      section_heading: Layered thresholds and membrane-environment constraints
    - type: paragraph
      text: Temporal evidence suggests mitochondria are not merely passive damage targets during pyroptosis but can act as a regulatory hub for terminal execution. Beyond the plasma membrane, GSDMD-NT can rapidly damage both inner and outer mitochondrial membranes. Mitochondrial injury can occur after GSDMD cleavage but before overt plasma-membrane rupture, promoting early changes in membrane potential, ROS, release of mitochondrial contents, and quality-control responses. These events can accelerate and amplify the overall pyroptotic process. {doi:10.1016/j.immuni.2023.10.004}
      pid: 1.1.2.p5
      section_heading: Layered thresholds and membrane-environment constraints
    - type: paragraph
      text: Mitochondria can also amplify inflammasome signaling, as mitochondrial functional states modulate sensitivity to NLRP3 activation cues. Mitochondria-associated events such as ROS, changes in membrane permeability, and mtDNA release can promote inflammasome assembly and IL-1β production. Conversely, enhancing mitochondrial renewal/clearance capacity or maintaining respiratory-chain function can alter inflammasome flux and output intensity. {doi:10.1016/j.immuni.2012.01.009} {doi:10.1038/s41590-022-01185-3}
      pid: 1.1.2.p6
      section_heading: Layered thresholds and membrane-environment constraints
    - type: paragraph
      text: If pore formation is highly sensitive to lipid context, key mitochondrial-coupled and remodelable lipids are prime candidates for translating upstream signals into execution-stage divergence. Among such lipids, cardiolipin (CL) emerges as a particularly prominent candidate.
      pid: 1.1.2.p7
      section_heading: Layered thresholds and membrane-environment constraints
    - type: paragraph
      text: Cardiolipin is a signature tetra-acyl phospholipid enriched in the mitochondrial inner membrane and widely viewed as a key structural–functional coupling factor linking membrane architecture to bioenergetic performance. At the molecular level, CL contributes to stabilization and organization of respiratory-chain complexes and supercomplexes. CL also influences ATP synthase oligomerization and maintenance of high-curvature cristae structures. In addition, CL provides a lipid environment supporting assembly and membrane association of inner-membrane protein complexes, including membrane-proximal processes such as mitoribosome association and insertion/formation of nascent respiratory-chain components. Accordingly, shifts in CL abundance, acyl-chain composition, or oxidation state can jointly rewrite metabolic efficiency, membrane structural stability, and permeability thresholds, a view that has reached a relatively stable consensus at the review level. {doi:10.1074/jbc.m308366200}
        {doi:10.1016/j.bpj.2011.03.031} {doi:10.1242/jcs.240374} {doi:10.3390/cells8070728}
      pid: 1.1.3.p1
      section_heading: Cardiolipin as a membrane-environment readout and interface
    - type: paragraph
      text: 'Importantly, CL is not a static background lipid: it undergoes observable and regulatable dynamics under stress and immune activation, interfacing with inflammatory signaling. Mitochondrial CL has been reported to participate directly in NLRP3 recruitment and activation, including CL–NLRP3 binding and effects of perturbing CL synthesis on inflammasome activation. In damage contexts, CL externalization can serve as a quality-control ‘tag’, for example via LC3 binding to trigger mitophagy. CL oxidation and membrane damage/inflammatory amplification are frequently co-observed. Closer to the execution layer, GSDMD-N has been suggested in specific pathological contexts to recognize CL to form mitochondrial pores, amplifying mitochondrial ROS and inflammatory cascades. {doi:10.1016/j.immuni.2013.08.001} {doi:10.4161/auto.27191} {doi:10.1016/j.celrep.2024.114237}'
      pid: 1.1.3.p2
      section_heading: Cardiolipin as a membrane-environment readout and interface
    - type: paragraph
      text: 'A working inference follows: rather than treating mitochondrial status as a collection of dispersed signals (ROS, mtDNA, membrane potential), CL state may act as a more execution-proximal integrated readout that helps translate mitochondrial conditions into pore-forming efficiency and thresholds. Current consensus more robustly supports coupling between CL and inflammatory execution and the plasticity of CL dynamics. By contrast, the major knowledge gap lies upstream: which receptors or recognition signals, through which downstream pathways and mechanistic axes, can transmit extracellular cues to mitochondrial membrane lipids to systematically reshape CL state and thereby alter terminal outputs. In other words, the mid-to-early segment of a chain—‘receptor signal → downstream pathway/mechanistic axis → CL metabolism → mitochondrial inflammatory features → pore threshold and lytic cytokine release’—still lacks a broadly accepted systems model.'
      pid: 1.1.3.p3
      section_heading: Cardiolipin as a membrane-environment readout and interface
    - type: paragraph
      text: Eph receptors and their ephrin ligands form a contact-dependent bidirectional signaling system and constitute the largest receptor tyrosine kinase subfamily, making them conceptually suitable candidates for translating spatial microenvironmental context into intracellular state and effector outputs. The Eph/ephrin system was originally recognized for roles in development and spatial patterning, with a core feature of shaping adhesion, morphology, and migration through contact-dependent signal exchange. Increasing evidence extends Eph/ephrin biology into immune contexts, including immune-cell development, activation, migration, and tissue residence, and modulation of how immune cells communicate with endothelium/stroma or neighboring immune cells within inflammatory microenvironments. From a signaling architecture perspective, Eph downstream outputs are not a single linear pathway and can intersect major metabolic/growth networks, with mechanistic support for interactions and
        feedback with PI3K–Akt–mTOR signaling in multiple family members. Thus, Eph family signaling is positioned to extend plasma-membrane contact cues into deeper cellular homeostasis modules, including mitochondrial-related processes and membrane environment, albeit in a context-dependent manner across members, cell types, and stimuli. {doi:10.1016/s1357-2725(02} {doi:10.3389/fimmu.2019.01473} {doi:10.1016/j.ccr.2009.04.009} {doi:10.4161/cc.9.11.11925}
      pid: 1.1.3.p4
      section_heading: Cardiolipin as a membrane-environment readout and interface
    - type: paragraph
      text: 'If EphB1 signaling can engage downstream pathways or mechanistic axes that alter mitochondrial membrane environment—captured by CL abundance, species composition, or oxidation—it may shift the threshold and efficiency of pore formation and thereby achieve amplitude-limiting control of inflammasome outputs. A potential advantage of this strategy is that it targets output form and intensity (for example, a threshold window for lytic cytokine release) rather than being equivalent to fully disabling the inflammasome, which may better balance tissue protection with host defense in principle. Accordingly, this work adopts a working framework: receptor kinase (EphB1) → downstream pathway/mechanistic axis → mitochondrial membrane environment/CL readouts → terminal inflammasome execution outputs.'
      pid: 1.1.3.p5
      section_heading: Cardiolipin as a membrane-environment readout and interface
    - type: paragraph
      text: Beyond asking whether inflammasomes are activated, a more consequential question is how the execution layer determines the magnitude, timing, and form of inflammatory outputs. In canonical pathways, pathogen infection activates inflammasomes and caspase-1/-4/-5, cleaving GSDMD to generate an N-terminal fragment that oligomerizes into plasma-membrane pores to release IL-1β and other pro-inflammatory factors. In addition to lytic rupture, GSDMD pores can enable selective cytokine release under ‘sub-lytic’ states, while membrane-rupture machinery such as NINJ1 can cooperate to amplify death and content release. In apoptotic pathways, caspase-3 cleavage of GSDME can similarly induce plasma-membrane permeabilization and strong inflammatory responses. {doi:10.1038/nature15514} {doi:10.1038/nature15541} {doi:10.1038/nature18629} {doi:10.1038/nrmicro2070} {doi:10.1038/s41586-021-03478-3} {doi:10.1016/j.celrep.2021.108998} {doi:10.1038/s41586-021-03218-7} {doi:10.1038/ncomms14128} {doi:10.1038/nature22393}
      pid: 1.2.1.p1
      section_heading: Consensus and gaps in inflammasome output control
    - type: paragraph
      text: 'Mitochondria are widely recognized as coordinators of cell-death and stress signaling and participate in inflammatory and non-inflammatory death programs via modular control of membrane permeabilization. Mitochondrial outer membrane permeabilization (MOMP) is a core event in intrinsic apoptosis and can intersect immune and inflammatory pathways through release of mtDNA or dsRNA to engage cGAS–STING and MAVS signaling. A modular view of mitochondrial permeabilization highlights multiple layers: signal coupling via transcription factors, pore-forming proteins (including BCL-2 family and gasdermins), membrane lipids (especially CL) as a physicochemical basis, post-translational modifications, outer-membrane interactors, and mitochondrial dynamics and membrane potential that feed back on vulnerability. Notably, permeabilization can be incomplete, allowing survival with selective release of intermembrane-space proteins and remodeling-dependent release of apoptotic factors. As a pro-inflammatory
        signaling hub, mitochondria can integrate pyroptosis, necroptosis, and ferroptosis-related processes, including gasdermin–CL interactions that promote mitochondrial permeabilization and release of inflammatory mediators. {doi:10.1101/cshperspect.a006080} {doi:10.1038/cdd.2017.186} {doi:10.1038/nchembio727} {doi:10.1371/journal.pbio.1000298} {doi:10.1126/science.1219855} {doi:10.1016/j.bbamcr.2010.11.011} {doi:10.1091/mbc.e09-07-0649} {doi:10.15252/embj.201899238} {doi:10.1126/science.aao6047} {doi:10.1038/s41467-023-37146-z} {doi:10.1038/s41586-018-0363-0} {doi:10.1016/j.cell.2014.11.036} {doi:10.1016/j.cell.2014.11.037} {doi:10.1038/ncb3596} {doi:10.1016/j.molcel.2015.01.018} {doi:10.1016/j.cell.2007.03.045} {doi:10.1073/pnas.1417253111} {doi:10.1016/j.immuni.2023.10.004} {doi:10.1016/j.celrep.2018.09.071} {doi:10.1096/fj.202100085r} {doi:10.1016/j.jbc.2023.102908} {doi:10.1016/j.cell.2022.06.038}'
      pid: 1.2.1.p2
      section_heading: Consensus and gaps in inflammasome output control
    - type: paragraph
      text: Across regulated death modalities, pore formation and permeabilization often depend on specific membrane lipids—particularly anionic phospholipids—indicating that membrane composition sets boundary conditions for insertion, oligomerization, and pore stability. Mechanistically distinct pore systems (gasdermins, MLKL, BAX/BAK) nevertheless commonly exhibit selective binding and insertion into anionic phospholipids. Multiple gasdermin family members can directly bind mitochondrial CL, inducing inner and outer membrane permeabilization and promoting release of mtDNA and proteins to amplify inflammation. GSDMD/E N-terminal fragments can induce mitochondrial rupture and cytochrome c release, and BAX/BAK-mediated MOMP can in turn activate NLRP3 inflammasomes and GSDME, amplifying inflammatory cascades. {doi:10.1016/j.str.2014.07.014} {doi:10.1016/j.immuni.2023.10.004} {doi:10.1016/j.celrep.2018.09.071} {doi:10.1096/fj.202100085r} {doi:10.1016/j.jbc.2023.102908} {doi:10.1038/s41467-019-09397-2}
        {doi:10.1016/j.immuni.2021.04.012} {doi:10.1016/j.celrep.2018.10.103} {doi:10.1016/j.celrep.2018.10.087}
      pid: 1.2.2.p1
      section_heading: Consensus and gaps in inflammasome output control
    - type: paragraph
      text: Lipid constraints extend beyond pyroptosis, suggesting a shared membrane-interface principle across necroptosis and ferroptosis-related vulnerability. In necroptosis, MLKL can bind mitochondrial CL and interact with factors such as PGAM5 and DRP1 to influence mitochondrial fission, while structural and reconstitution studies indicate MLKL N-terminal bundles insert into anionic lipid-containing membranes (including CL) to cause leakage. Ferroptosis, although not a canonical ‘pore protein’ process, is driven by iron-dependent lipid peroxidation and displays strong dependence on membrane oxidation substrates and membrane-environment status; mitochondrial dysfunction and VDAC1/2 engagement by erastin are associated with mitochondrial shrinkage and ATP decline in relevant contexts. Targeting mitochondria with antioxidants can suppress ferroptosis only in specific cellular settings, implying context-dependent mitochondrial contributions. {doi:10.1016/j.cell.2009.05.021} {doi:10.1073/pnas.1408987111}
        {doi:10.1038/s41467-018-04714-7} {doi:10.1016/j.molcel.2014.03.003} {doi:10.1038/cddis.2013.531} {doi:10.1038/s41419-021-03418-z} {doi:10.1016/j.immuni.2013.06.018} {doi:10.1016/j.celrep.2013.10.034} {doi:10.1016/j.str.2014.07.014} {doi:10.1016/j.cell.2012.03.042} {doi:10.1083/jcb.202105043} {doi:10.1038/ncb3064} {doi:10.1016/j.molcel.2018.10.042} {doi:10.1016/j.freeradbiomed.2018.01.019}
      pid: 1.2.2.p2
      section_heading: Consensus and gaps in inflammasome output control
    - type: paragraph
      text: Despite consensus that membrane lipids can influence pore formation, a unifying framework remains lacking for how upstream signals systematically reshape lipid composition/oxidation in vivo to produce execution-layer output divergence. Most studies establish causal fragments—‘lipids affect pore formation’—without a systems model linking upstream receptors, downstream pathways/mechanistic axes, membrane lipid remodeling, and execution outputs.
      pid: 1.2.2.p3
      section_heading: Consensus and gaps in inflammasome output control
    - type: paragraph
      text: Mitochondrial signals are widely observed in NLRP3 priming and assembly contexts, but their causal position is often stimulus- and time-dependent, requiring stratified interpretation. Inflammatory stimuli can drive NLRP3 or adaptor enrichment at mitochondria or mitochondria-associated membranes, suggesting spatial platforms for assembly. Mitochondria-derived signals such as mtROS, cytosolic mtDNA, and membrane potential changes can enhance inflammasome activity in multiple models. However, these signals are better viewed as context-dependent background factors rather than a single necessary causal trigger, because in some settings they precede and amplify assembly whereas in others they may reflect downstream consequences of execution events. Mitochondrial injury spans a continuum rather than an all-or-none state; limited perturbations may support assembly or cytokine release, whereas accumulation beyond thresholds is more likely to promote widespread permeabilization and lytic
        death. {doi:10.1016/j.immuni.2013.08.001} {doi:10.4049/jimmunol.1301490}
      pid: 1.2.3.p1
      section_heading: Consensus and gaps in inflammasome output control
    - type: paragraph
      text: CL is a signature anionic lipid whose distribution, oxidation, and externalization can influence mitochondrial permeabilization thresholds and multiple pore-forming events, positioning it as a candidate execution-interface readout. Under stress and pathology, CL can externalize or become exposed on the outer membrane, promoting membrane association and insertion of key proteins (tBID, BAX, cytochrome c, and gasdermins), shaping curvature and pore formation/stability. CL externalization has been proposed as a membrane-interface signal relevant to inflammasome-associated pathways. {doi:10.1126/science.aao6047} {doi:10.1016/j.bbalip.2016.08.005} {doi:10.1016/j.immuni.2013.08.001}
      pid: 1.2.4.p1
      section_heading: Consensus and gaps in inflammasome output control
    - type: paragraph
      text: Direct evidence suggests GSDMD-NT can couple to mitochondrial membrane lipid environment and trigger mitochondrial damage before plasma-membrane lysis, strengthening the notion of CL as an execution-interface candidate. Gasdermins (notably GSDMD) can directly bind mitochondrial CL, induce mitochondrial inner and outer membrane permeabilization, and promote release of mtDNA and proteins to amplify inflammation. Disease models further highlight coupling between mitochondrial injury and pore events, consistent with membrane-environment amplification of execution. In apoptosis, CL is also implicated in tBID-mediated BAX activation and subsequent cytochrome c release, indicating that CL’s interface role is not confined to a single death modality. At the same time, evidence strength varies across putative receptor–CL axes, leaving mechanistic chains to be systematically established. {doi:10.1016/j.immuni.2023.10.004} {doi:10.1016/j.celrep.2018.09.071} {doi:10.1096/fj.202100085r} {doi:10.1016/j.jbc.2023.102908}
        {doi:10.1016/j.cell.2022.06.038} {doi:10.1038/s41467-019-09397-2} {doi:10.1038/2503} {doi:10.1016/j.neuron.2023.02.019} {doi:10.1016/j.immuni.2021.04.012} {doi:10.1016/j.celrep.2018.10.103} {doi:10.1016/j.celrep.2018.10.087} {doi:10.1016/j.chemphyslip.2013.12.002} {doi:10.1016/j.bbrc.2008.01.055}
      pid: 1.2.4.p2
      section_heading: Consensus and gaps in inflammasome output control
    - type: paragraph
      text: Eph receptors are contact-dependent bidirectional RTKs that translate spatial microenvironmental interactions into cellular behaviors, positioning them at key immune interfaces relevant to inflammatory output control. Eph–ephrin activation occurs at cell–cell contact interfaces and triggers both forward (receptor-side) and reverse (ligand-side) signaling cascades, coupling spatial proximity and localization to migration, adhesion, cytoskeletal remodeling, and microenvironmental organization. In immunopathological contexts, Eph–ephrin signaling has been repeatedly implicated in immune-cell migration, tissue entry, adhesion coordination, and spatial organization of intercellular communication within inflammatory microenvironments.
      pid: 1.2.5.p1
      section_heading: Consensus and gaps in inflammasome output control
    - type: paragraph
      text: 'Existing work suggests Eph signaling can intersect PI3K–Akt and MAPK branches and influence mitochondrial integrity, ROS, dynamics, and cell-fate thresholds in a context-dependent manner. In acute injury models such as myocardial ischemia–reperfusion, Eph stimulation is associated with protective changes in mitochondrial ultrastructure and function and correlates with indicators such as mPTP opening and cristae stability. In vascular or endothelial settings, loss of specific Eph subtypes coincides with decreased membrane potential, increased ROS, and impaired antioxidant/biogenesis axes. Mechanistic evidence supports Eph–PI3K/Akt contributions to maintaining mitochondrial outer-membrane stability and anti-apoptotic capacity, and Eph–ERK effects on DRP1 phosphorylation, mitochondrial fragmentation, and death sensitivity. In neural injury contexts, Eph-related axes have been linked to iron homeostasis and antioxidant networks with ferroptosis-like phenotypes. Together, these examples
        support an abstract consensus: Eph signaling can span ‘plasma-membrane spatial cues → mitochondrial homeostasis/membrane structure → fate thresholds and output forms’, with strong dependency on subtype, cell type, and microenvironment. {doi:10.1016/j.lfs.2021.119954} {doi:10.1016/j.fct.2019.110960} {doi:10.18632/oncotarget.12838} {doi:10.4103/1673-5374.369118}'
      pid: 1.2.5.p2
      section_heading: Consensus and gaps in inflammasome output control
    - type: paragraph
      text: Major gaps remain in mapping EphB1 to inflammasome/pyroptosis execution, and in coupling EphB1-driven mitochondrial effects to quantifiable membrane-environment readouts such as CL state. First, much of the literature emphasizes ‘Eph–mitochondria–apoptosis/metabolism’ rather than inflammasome–pyroptosis execution, and mitochondrial readouts (ΔΨm, ROS, dynamics) are often difficult to place causally as upstream triggers versus downstream amplification. Second, Eph family functions are pleiotropic, and even closely related EphB subtypes can show opposing effects across tissues, limiting inference by family membership. Third, and most directly relevant here, even if Eph signaling affects mitochondria, a mechanistic framework is missing that links EphB1 via downstream pathways/mechanistic axes to changes in mitochondrial membrane environment—especially CL abundance/remodeling/oxidation/externalization—and further translates these changes into execution-layer differences such as GSDMD
        pore threshold and efficiency, culminating in reshaped IL-1β release and lytic permeabilization.
      pid: 1.2.5.p3
      section_heading: Consensus and gaps in inflammasome output control
    - type: paragraph
      text: Within the priming–assembly–execution framework of inflammasome biology, the execution layer largely determines output amplitude, timing, and tissue cost, making ‘execution thresholds’ a more informative target than ‘activation strength’ alone. In pyroptosis, cleavage of GSDMD generates an N-terminal fragment that oligomerizes into pores, enabling cytokine release, osmotic imbalance, and lytic death. Recent work further separates execution into ‘pore formation’ and ‘post-pore terminal rupture amplification’ (for example, via NINJ1), enabling stratified attribution of ‘how much is released, whether rupture occurs, and when’ as experimentally distinguishable questions. Thus, rather than generalizing differences as ‘inflammasome activation’, a more explanatory and translationally aligned question is why execution outputs diverge in amplitude and form under similar activation contexts. {doi:10.1038/s41586-023-05991-z}
      pid: 1.3.p1
      section_heading: Scientific question, hypotheses, and study objectives
    - type: paragraph
      text: Execution efficiency is constrained by membrane physicochemical environment, and this study defines the membrane environment of interest as the integrated state represented by cardiolipin metabolism rather than a single lipid event. CL is a signature tetra-acyl lipid of the mitochondrial inner membrane, tightly coupled to cristae structure, respiratory-chain organization, and oxidative phosphorylation efficiency. CL abundance, acyl-chain composition, remodeling balance, and oxidation state are plastic under stress, metabolic dysregulation, and inflammation, and can reshape mitochondrial membrane structure and interface properties. Disease and review literature (for example, Barth syndrome as a CL paradigm) underscores CL as a metabolic–structural–functional hub whose network-level changes can coordinate mitochondrial function with cell-fate decisions. {doi:10.1016/j.febslet.2006.07.022}
      pid: 1.3.p2
      section_heading: Scientific question, hypotheses, and study objectives
    - type: paragraph
      text: To avoid overcommitment to microdomain-level claims, this study explicitly adopts a multi-readout strategy for CL state and treats each readout within its interpretive boundary. Chemically quantitative lipidomics will be used to assess CL abundance and species distribution, and ratio-type indices related to remodeling or oxidation (e.g., MLCL/CL, oxCL/CL) to provide independent evidence of state changes. In parallel, functional/interface-linked readouts such as NAO staining will be used to suggest CL-related membrane-interface changes, while recognizing that NAO reports a ‘stainable/accessibility-related’ state influenced by membrane environment and dye behavior rather than absolute quantification of nanoscale pools or binding sites. The falsifiable criterion is not identifying a precise microdomain binding site, but whether reproducible CL-state changes align in direction and time with execution-output differences in pore formation/permeabilization/cytokine release. {doi:10.1111/j.1432-1033.1992.tb17285.x}
      pid: 1.3.p3
      section_heading: Scientific question, hypotheses, and study objectives
    - type: paragraph
      text: 'The central gap can therefore be stated as a falsifiable linkage: how an upstream receptor signal engages downstream pathways/mechanistic axes to reshape CL metabolism and membrane environment, and thereby translates into terminal inflammasome execution-output differences. Existing literature provides interface clues that gasdermins can interact with CL-related membrane environments to affect mitochondrial integrity, mtDNA release, and inflammatory amplification, coupling mitochondria to inflammasome outputs. Yet evidence largely remains at the level of ‘interface exists’ and ‘correlated coupling’, lacking a systems framework for how an upstream entry signal drives integrated CL metabolic changes. For EphB1 specifically, the key unknown is not whether it affects a single enzyme or event, but whether EphB1 signaling can, via downstream pathways/mechanistic axes, produce reproducible CL-state changes that are sufficient to explain changes in execution thresholds and efficiency.
        {doi:10.1016/j.immuni.2023.10.004} {doi:10.1038/s41467-019-09397-2}'
      pid: 1.3.p4
      section_heading: Scientific question, hypotheses, and study objectives
    - type: paragraph
      text: 'To address this question, the study adopts a closed-loop ‘discover–localize–validate’ design that decomposes the chain into three executable and falsifiable task modules with aligned readouts throughout. Input: genetic manipulation of EphB1 (e.g., KO/intervention) as the receptor-level entry variable under a unified inflammasome activation model and time-resolved sampling for comparability. Process: identify candidate downstream pathways from multi-omics/bioinformatics and prioritize ‘pathway/mechanistic axis as mediator’ using statistical mediation logic; then quantify CL-state and execution outputs in parallel with stratified priming/assembly markers to localize the layer of divergence. Output: complete causal tests with genetic plus pharmacologic masking/rescue or equivalent stratified strategies to validate whether perturbing a candidate pathway or correcting a candidate metabolic state coherently shifts CL readouts and execution outputs.'
      pid: 1.3.p5
      section_heading: Scientific question, hypotheses, and study objectives
    - type: paragraph
      text: 'Conceptually, this work contributes a layered causal narrative that reorganizes ‘signal–membrane environment–execution output’ with EphB1 as a candidate upstream entry and CL metabolic state as an integrated mitochondrial membrane readout. Rather than equating phenotypic differences with upstream inflammasome activation strength, the study emphasizes identifying which layer differs and whether execution thresholds and amplitude-limiting behavior can be tuned. The model is framed as evidence-bounded and falsifiable: it aims to test whether CL metabolic state is sufficient to account for execution-output divergence, without overclaiming complete molecular detail. The Results are organized as: downstream pathway/mechanistic axis prioritization → CL metabolic and membrane-environment phenotyping → stratified attribution and causal validation of execution outputs.'
      pid: 1.3.p6
      section_heading: Scientific question, hypotheses, and study objectives
  - id: methods
    title: Methods
    blocks:
    - type: heading
      level: 2
      text: Animals
    - type: paragraph
      text: All experiments were performed using mice on a C57BL/6J genetic background. Ephb1 mutant mice and wild-type littermates were used in this study. Mice were housed under specific pathogen-free (SPF) conditions with controlled temperature, humidity, and a 12 h light/12 h dark cycle. Animals had ad libitum access to sterilized standard chow and acidified drinking water. Ephb1 mutant mice were obtained from the piggyBac (PB) transposon-based mouse mutant library at the Institute of Developmental Biology and Molecular Medicine, Fudan University. Genotypes were confirmed by PCR-based analysis, and mice aged 6 weeks or older were used for experiments. All animal procedures were approved by the Institutional Animal Care and Use Committee of Fudan University and conducted in accordance with relevant guidelines and regulations.
    - type: heading
      level: 2
      text: Primary peritoneal macrophage isolation
    - type: paragraph
      text: Primary peritoneal macrophages were isolated from 6–10-week-old C57BL/6J wild-type and Ephb1-deficient mice. To elicit macrophage recruitment, mice were intraperitoneally injected with 1–2 mL of sterile 4% thioglycollate medium. Three days after injection, peritoneal exudate cells were harvested by lavage with pre-warmed phosphate-buffered saline (PBS). Recovered cells were collected by centrifugation and subjected to red blood cell lysis when necessary. Cells were resuspended in RPMI 1640 medium supplemented with 10% fetal bovine serum and antibiotics, counted, and seeded at the indicated densities. After 1–2 h of incubation, non-adherent cells were removed by gentle washing with PBS, and adherent macrophages were cultured overnight prior to subsequent experiments.
    - type: heading
      level: 2
      text: Cell culture and treatments
    - type: paragraph
      text: For inflammasome priming, cells were treated with lipopolysaccharide (LPS) at a final concentration of 1–10 ng/mL for 4 h. NLRP3 inflammasome activation was induced by treatment with either nigericin or ATP, NLRC4 activation was triggered by cytosolic delivery of flagellin, and AIM2 activation was induced by transfection of poly(dA:dT). For NLRP3 activation, cells were stimulated with nigericin (10 µg/mL) for 7.5–120 min or ATP (5 mM) for 2 h. For NLRC4 activation, cells were transfected with flagellin (0.5 ng/mL) using Lipofectamine 2000 and incubated for 2 h. For AIM2 activation, cells were transfected with poly(dA:dT) (0.1 ng/mL) using Lipofectamine 2000 and incubated for 8 h. Where indicated, cells were co-treated with Ephb1-Fc fusion protein to modulate ephrin-B/EphB signaling during inflammasome activation. To generate higher-order Ephb1-Fc clusters, Ephb1-Fc was pre-incubated with anti-human IgG Fc-specific antibody at a 10:1 ratio for 30 min at room temperature with gentle
        rotation. Ephb1-Fc complexes were prepared at final concentrations of 5, 0.5, 0.05, or 0.005 µg/mL in complete RPMI 1640 medium. Pre-formed Ephb1-Fc complexes were added to cell cultures together with the indicated inflammasome stimuli. At the end of stimulation, culture plates were immediately placed on ice, and supernatants and cell lysates were collected for downstream analyses.
    - type: heading
      level: 2
      text: Inflammasome activation assays
    - type: paragraph
      text: Inflammasome assembly was assessed by detecting ASC oligomerization using a chemical crosslinking-based assay. Primary peritoneal macrophages were stimulated to activate the NLRP3 inflammasome as described above. Following stimulation, cells were lysed with Triton X-100-containing buffer to separate soluble and detergent-insoluble fractions. The detergent-insoluble pellet fraction, enriched for ASC specks, was collected for crosslinking analysis. ASC oligomers in the insoluble fraction were chemically crosslinked using disuccinimidyl suberate (DSS). Crosslinking reactions were terminated by SDS-mediated denaturation prior to sample processing. Crosslinked samples were analyzed by SDS-PAGE followed by Western blotting to detect high-molecular-weight ASC oligomers. ASC oligomerization patterns in crosslinked insoluble fractions were compared with corresponding soluble lysate fractions.
    - type: heading
      level: 2
      text: Mitochondrial functional assays
    - type: paragraph
      text: Cellular and mitochondrial reactive oxygen species (ROS) production and mitochondrial membrane potential were assessed using fluorescent probe-based assays. H2DCFDA was used to monitor total intracellular ROS, MitoSOX Red was used to detect mitochondrial superoxide, and tetramethylrhodamine methyl ester (TMRM) was used to assess mitochondrial membrane potential. Experiments were performed sequentially, including LPS priming, probe loading, inflammasome activation, and fluorescence measurement. Cells were primed with lipopolysaccharide (LPS) for 4 h prior to fluorescent probe loading. For probe loading, cells were incubated with H2DCFDA, MitoSOX Red, and TMRM in serum-free medium during the final 45 min of LPS priming. Inflammasome activation was triggered by treatment with nigericin at a final concentration of 10 µg/mL. Fluorescence signals were recorded immediately after stimulation using a temperature-controlled multimode microplate reader. Fluorescence intensity was measured
        at excitation/emission wavelengths of approximately 488/525 nm for H2DCFDA, 510/580 nm for MitoSOX Red, and 550/576 nm for TMRM. Kinetic measurements were performed at 2.5-min intervals for up to 2 h following nigericin stimulation. Fluorescence signals were analyzed to evaluate changes in cellular and mitochondrial ROS levels and mitochondrial membrane potential under the indicated experimental conditions. Mitochondrial cardiolipin content was assessed using 10-N-nonyl acridine orange (NAO) staining. NAO was used at low nanomolar concentrations to semi-quantitatively monitor cardiolipin abundance and oxidation status in mitochondria. Following experimental treatments, cells were incubated with NAO at a final concentration of 200 nM for 30 min at 37 °C. After staining, fluorescence signals were acquired using either a multimode microplate reader or fluorescence microscopy. NAO fluorescence was measured at excitation/emission wavelengths of approximately 519/555 nm. Changes in NAO
        fluorescence intensity were used to evaluate dynamic alterations in mitochondrial cardiolipin levels under different experimental conditions.
    - type: heading
      level: 2
      text: Cell death assays
    - type: paragraph
      text: Pyroptotic cell death were quantitatively assessed following pharmacological or genetic perturbations. Primary peritoneal macrophages were seeded in 96-well plates at a density of 1 × 10^5 cells per well and cultured overnight to allow metabolic stabilization. Cells were subjected to inflammasome activation or control treatments as described above under a final volume of 100 µL per well. For maximal LDH release controls, cells were treated with lysis solution 45 min prior to sample collection. Following treatment, culture supernatants were collected for lactate dehydrogenase (LDH) release measurements. LDH activity in culture supernatants was determined using the CytoTox 96® Non-Radioactive Cytotoxicity Assay according to the manufacturer’s instructions. Absorbance was measured at 490–492 nm using a multimode microplate reader. Percent cytotoxicity was calculated by normalizing LDH release from treated samples to maximal LDH release controls after background subtraction. Apoptosis
        was induced by treating cells with staurosporine at a final concentration of 1 µM for 4 h, with vehicle-treated cells serving as controls. Apoptotic signaling was evaluated by immunoblot detection of cleaved caspase-3. Data were obtained from at least three independent experiments and analyzed using standard statistical methods as described below.
    - type: heading
      level: 2
      text: Protein analysis
    - type: paragraph
      text: Protein expression and secretion were analyzed by Western blotting and enzyme-linked immunosorbent assay (ELISA). Cells were lysed in Laemmli sample buffer supplemented with protease and phosphatase inhibitors, followed by heat denaturation. Protein samples were separated by SDS-PAGE using gels of appropriate acrylamide concentrations based on target protein molecular weight. Separated proteins were transferred onto polyvinylidene fluoride (PVDF) membranes under cold conditions. Membranes were blocked and incubated with primary antibodies overnight at 4 °C, followed by incubation with HRP-conjugated secondary antibodies. Protein signals were visualized using enhanced chemiluminescence reagents and captured with a digital imaging system. Band intensities were quantified by densitometric analysis and normalized to GAPDH as loading controls. Levels of secreted cytokines in culture supernatants were measured using mouse TNF-α, IL-6, and IL-1β uncoated ELISA kits. ELISA assays were
        performed according to the manufacturer’s instructions using 96-well high-binding plates. Cytokine concentrations were calculated from standard curves generated using serially diluted recombinant standards. Protein quantification data were obtained from at least three independent experiments and analyzed using appropriate statistical methods as described below.
    - type: heading
      level: 2
      text: RNA analysis
    - type: paragraph
      text: Gene expression was quantified by real-time quantitative PCR (qPCR). Total RNA was extracted from primary peritoneal macrophages using TRIzol reagent according to standard protocols. Complementary DNA (cDNA) was synthesized using a two-step reverse transcription protocol with genomic DNA removal. Quantitative PCR was performed using SYBR Green-based detection chemistry on a real-time PCR system. Gene expression levels were normalized to the geometric mean of GAPDH and HPRT1 as reference genes. Amplification specificity was confirmed by melt curve analysis, and technical replicates with excessive Ct variation were excluded. Relative gene expression was calculated using the ΔΔCt method with wild-type samples serving as calibrators. Each mouse was considered an independent biological replicate, and statistical analyses were performed as described below.
    - type: heading
      level: 2
      text: Confocal microscopy and image analysis
    - type: paragraph
      text: Confocal microscopy was performed to examine the subcellular distribution of cardiolipin using NAO staining in primary macrophages. Primary peritoneal macrophages were cultured on glass coverslips and subjected to the indicated treatments prior to fixation. Cells were fixed and, where indicated, permeabilized prior to staining. Cells were stained with 10-N-nonyl acridine orange (NAO) to visualize mitochondrial cardiolipin, with nuclei counterstained using DAPI where indicated. Fluorescence images were acquired using an Olympus SpinSR super-resolution confocal microscope. Multichannel images were collected using identical laser power, detector gain, and exposure settings for all experimental groups. For each condition, multiple randomly selected fields of view were imaged, and a minimum of 100 cells per group were analyzed. NAO fluorescence was quantified by applying consistent intensity thresholding and particle/region-of-interest analysis to derive signal intensity and/or area
        metrics. Image quantification was performed using ImageJ software with consistent analysis parameters applied across all samples.
    - type: heading
      level: 2
      text: Mitochondrial isolation and analysis
    - type: paragraph
      text: Mitochondria were isolated to assess mitochondrial integrity and cytosolic release of mitochondrial DNA (mtDNA) following inflammasome activation. Primary peritoneal macrophages were stimulated with lipopolysaccharide followed by nigericin prior to subcellular fractionation. Mitochondria were isolated using a commercial mitochondria isolation kit based on differential centrifugation under cold conditions. Differential centrifugation was used to obtain mitochondrial fractions, cytosolic fractions, and corresponding total cell lysates for comparison. Isolated mitochondrial pellets were either maintained in storage buffer for functional analyses or lysed for downstream protein or nucleic acid extraction. The purity of mitochondrial fractions was evaluated by quantitative PCR analysis of mitochondrial-encoded and nuclear-encoded DNA markers. Cytosolic mtDNA release was quantified by comparing mtDNA abundance in cytosolic fractions relative to total cellular mtDNA. DNA was extracted
        from total, mitochondrial, and cytosolic fractions, and mtDNA levels were quantified by real-time PCR. Relative mtDNA release was calculated using ΔCt-based normalization of cytosolic mtDNA to total mtDNA within each sample. Analyses were performed using samples from at least three independent biological replicates and evaluated using appropriate statistical methods as described below.
    - type: heading
      level: 2
      text: Lipidomics
    - type: paragraph
      text: Lipidomic analyses were performed to characterize global and pathway-specific lipid alterations in primary peritoneal macrophages following Ephb1 deficiency. Cellular lipids were extracted using a modified methyl tert-butyl ether (MTBE)-based method. Untargeted lipidomics was conducted to enable broad-spectrum detection and identification of lipid species. Lipid extracts were analyzed by liquid chromatography coupled to high-resolution mass spectrometry with polarity switching and data-dependent MS/MS acquisition. Lipid species were identified based on accurate mass measurements and MS/MS fragmentation patterns using dedicated lipidomics analysis software. Targeted lipidomics was performed to quantitatively validate selected lipid species of interest identified in the untargeted analysis. Quantification was achieved using internal standards and calibration curves, and lipid abundances were expressed as relative or absolute quantities as appropriate. Lipidomic data were normalized
        and scaled prior to statistical analysis to reduce technical variation and improve comparability across samples. Differential lipid abundance was assessed using univariate statistical testing and multivariate analyses, including principal component analysis. Quality control samples were included throughout the analytical workflow to monitor instrument stability, reproducibility, and data reliability.
    - type: heading
      level: 2
      text: RNA-seq analysis
    - type: paragraph
      text: RNA sequencing (RNA-seq) was performed to characterize global transcriptomic changes in primary peritoneal macrophages. Total RNA was extracted from macrophages, and RNA integrity and purity were assessed to ensure suitability for library construction. Strand-specific RNA-seq libraries were prepared following mRNA enrichment or rRNA depletion using standard protocols. Libraries were sequenced on an Illumina high-throughput sequencing platform using paired-end reads. Raw sequencing reads were subjected to quality control to remove adaptor sequences and low-quality reads prior to downstream analysis. Clean reads were aligned to the reference mouse genome, and gene-level expression counts were generated using standard alignment and quantification pipelines. Differentially expressed genes were identified using statistical models based on normalized read counts with multiple testing correction. Functional annotation and enrichment analyses were performed to identify biological processes
        and pathways associated with differentially expressed genes.
    - type: heading
      level: 2
      text: Statistical analysis
    - type: paragraph
      text: Statistical analyses were performed to assess differences between experimental groups and evaluate the reliability of observed effects. Data analysis and visualization were conducted using R and python statistical computing environment. Data distributions were assessed for normality prior to statistical testing, and appropriate parametric or non-parametric tests were selected accordingly. Two-group comparisons were performed using two-tailed Student’s t-tests or non-parametric alternatives, while multi-group comparisons were analyzed using analysis of variance (ANOVA) with appropriate post hoc tests. Data are presented as mean ± SEM unless otherwise indicated, with individual data points shown where appropriate. All statistical tests were two-sided, and P values less than 0.05 were considered statistically significant. Detailed information on sample size, statistical tests, and significance values is provided in the figure legends.
    - type: heading
      level: 2
      text: Data availability
    - type: paragraph
      text: Data management and analysis were performed in accordance with standard practices to ensure data integrity, traceability, and reproducibility. Raw experimental data were securely stored and backed up throughout the study. Data processing and statistical analyses were conducted using documented workflows to enable reproducibility. Key experimental findings were validated by independent biological replicates. Data supporting the findings of this study are available from the corresponding author upon reasonable request.
  - id: results
    title: Results
    blocks:
    - type: heading
      level: 2
      text: EphB1 loss limits inflammasome-induced pyroptosis and IL-1β release
    - type: paragraph
      text: To establish the experimental and logical framework underlying the genetic screening strategy used to identify regulators of inflammasome-associated outputs. A standardized workflow was designed in which primary macrophages from multiple genetic backgrounds were subjected to uniform NLRP3 inflammasome activation and assessed using IL-1β release as the functional readout. Together, this framework provides the experimental basis for the screening results presented in Figure 1b, without implying any mechanistic interpretation at this stage.
      source: figure_1_a_000.yaml
      panel_id: 1a
    - type: paragraph
      text: Having outlined the genetic-screening strategy, we next sought to identify, across the full panel of perturbations, a candidate signal that is both reproducible and sufficiently prominent to prioritize for mechanistic dissection.
      tags:
      - transition
    - type: paragraph
      text: Following establishment of the genetic screening framework, we next asked whether any strains exhibit pronounced inflammasome-associated phenotypic differences under activation conditions. IL-1β release was quantified as the functional readout of inflammasome activation across multiple pb genetic backgrounds, with WT and HO cells compared within each strain. Among the screened strains, only a small subset displayed significant genotype-dependent differences in IL-1β release following Nigericin stimulation. Notably, the Ephb1-associated 081230020-HRB strain showed a statistically significant and reproducible reduction in IL-1β release, supported by adequate biological replicates and within-strain statistical testing. Compared with other genetic backgrounds, the Ephb1 strain exhibited the most consistent and robust inflammasome-associated phenotype, prioritizing Ephb1 as a leading candidate for subsequent mechanistic investigation.
      source: figure_1_b_001.yaml
      panel_id: 1b
    - type: paragraph
      text: Having prioritized EphB1 from the screen, we next asked whether the phenotype generalizes beyond a single inflammasome agonist, thereby arguing against a stimulus-specific artifact.
      tags:
      - transition
    - type: paragraph
      text: Having identified Ephb1 as a candidate strain with reduced IL-1β output upon Nigericin stimulation, we next asked whether this phenotype generalizes across distinct inflammasome receptor pathways rather than reflecting a Nigericin-specific effect. WT and Ephb1 pb/pb primary peritoneal macrophages were LPS-primed and then activated via NLRP3 (Nigericin), NLRC4 (cytosolic flagellin delivery), or AIM2 (cytosolic poly(dA:dT) delivery), and IL-1β release was quantified by ELISA with background subtraction and MTT-based normalization. Across all three activation routes, Ephb1 pb/pb macrophages released significantly less IL-1β than WT controls. The reduction was statistically significant for each stimulus and remained consistent across independent experiments after dual background correction and cell-number normalization. These data indicate that the diminished IL-1β output in Ephb1 pb/pb macrophages is not restricted to a single receptor pathway, supporting a role for EphB1 in a shared
        downstream execution process.
      source: figure_1_c_v2.yaml
      panel_id: 1c
    - type: paragraph
      text: Having established cross-agonist consistency within inflammasome, we next asked whether EphB1 loss broadly constrains lytic execution across distinct inflammasome sensors.
      tags:
      - transition
    - type: paragraph
      text: To test whether the reduced inflammasome output observed upon EphB1 deficiency extends to pyroptotic cell lysis across multiple inflammasome pathways, we next examined cell death responses under distinct activation conditions. Pyroptotic cell lysis was quantified by measuring LDH release from WT and EphB1-deficient primary peritoneal macrophages following activation of NLRP3, NLRC4, or AIM2 inflammasomes. Across all inflammasome activation conditions, EphB1-deficient macrophages exhibited consistently reduced LDH release compared with WT controls. This reduction was reproducible across independent experiments and was evident at multiple time points, with statistically significant differences observed for NLRP3 and NLRC4 activation. These findings indicate that EphB1 deficiency broadly attenuates pyroptotic cell lysis downstream of distinct inflammasome receptors, consistent with a role in a shared execution step rather than pathway-specific signaling.
      source: figure_1_d_v2.yaml
      panel_id: 1d
    - type: paragraph
      text: Having established a reproducible output-limited inflammasome phenotype upon EphB1 loss,  we next asked whether the defect reflects impaired upstream priming/assembly  or instead a restriction at the terminal, GSDMD pore–driven execution step.
      tags:
      - transition
    - type: heading
      level: 2
      text: EphB1 loss preserves upstream NLRP3 activation but restricts GSDMD-mediated execution
    - type: paragraph
      text: To localize the point at which EphB1 influences inflammasome output, we first examined whether EphB1 deficiency alters transcriptional priming downstream of TLR4–NF-κB signaling. Transcriptional priming was assessed by qPCR analysis of Tnf, Il6, and Il1b mRNA levels in WT and EphB1-deficient primary peritoneal macrophages following LPS stimulation. LPS stimulation induced robust and comparable increases in Tnf, Il6, and Il1b transcripts in WT and EphB1-deficient macrophages across all examined time points. These transcriptional responses were reproducible across independent experiments and showed no statistically significant differences between genotypes. Together, these data indicate that EphB1 deficiency does not impair TLR4–NF-κB–dependent transcriptional priming, excluding defective first-signal activation as the cause of reduced inflammasome output.
      source: figure_2_a+b.yaml
      panel_id: 2a/b
    - type: paragraph
      text: Having established that transcriptional priming is preserved, we next asked whether conventional cytokine secretion is also intact, thereby separating inflammasome output from a global secretion defect.
      tags:
      - transition
    - type: paragraph
      text: Following confirmation that transcriptional priming remains intact, we next asked whether the reduced IL-1β output observed upon EphB1 deficiency could be attributed to a generalized impairment of classical cytokine secretion. Classical secretion was assessed by quantifying TNF-α and IL-6 release from WT and EphB1-deficient primary peritoneal macrophages following LPS stimulation at defined time points using ELISA. LPS stimulation induced robust increases in both TNF-α and IL-6 in WT and EphB1-deficient macrophages, with no significant genotype-dependent differences observed. These responses were consistent across independent experiments and remained non-significant after dual background subtraction and normalization to cell number. Thus, EphB1 deficiency does not measurably impair TLR4-driven classical secretion of TNF-α or IL-6, excluding a generalized secretory defect as the basis for reduced inflammasome-associated outputs.
      source: figure_2_c_v2.yaml
      panel_id: 2c
    - type: paragraph
      text: Having excluded a generalized secretion impairment, we next asked whether the EphB1-dependent difference manifests specifically in inflammasome-triggered IL-1β release across stimulus strength.
      tags:
      - transition
    - type: paragraph
      text: After excluding defects in transcriptional priming and classical cytokine secretion, we next asked whether EphB1 deficiency selectively impairs inflammasome-specific IL-1β release under NLRP3 activation, and whether this effect depends on the strength of the second signal. WT and EphB1-deficient primary peritoneal macrophages were uniformly primed with LPS and then stimulated with increasing doses of Nigericin, and mature IL-1β released into the supernatant was quantified by ELISA. While IL-1β release increased with higher Nigericin doses in both genotypes, EphB1-deficient macrophages consistently released less IL-1β than WT controls at each stimulatory dose. The genotype-dependent reduction was statistically significant at both 10 and 20 μM Nigericin and was supported by low variability across biological replicates, whereas baseline release under control conditions remained comparable between groups. These results demonstrate that EphB1 deficiency limits mature IL-1β release
        in a dose-independent manner across the tested range of NLRP3 activation, supporting a selective defect at the inflammasome-specific execution or export stage rather than impaired priming.
      source: figure_2_d.yaml
      panel_id: 2d
    - type: paragraph
      text: Having confirmed an inflammasome-specific output defect, we next asked whether this arises from impaired inflammasome assembly at the ASC platform.
      tags:
      - transition
    - type: paragraph
      text: After establishing that transcriptional priming and classical cytokine secretion remain intact, we next examined whether the reduced inflammasome output observed upon EphB1 deficiency arises from impaired inflammasome assembly at the level of ASC oligomerization. ASC assembly was assessed in WT and EphB1-deficient primary peritoneal macrophages following LPS priming and Nigericin stimulation by biochemical fractionation into soluble and insoluble fractions, DSS crosslinking, and immunoblot analysis of ASC oligomers. Under NLRP3 activation conditions, EphB1-deficient macrophages displayed levels of ASC oligomers, dimers, and monomers comparable to those observed in WT controls. This lack of genotype-dependent difference was consistently observed across independent experiments, with no significant changes detected in any ASC species following quantitative densitometric analysis. These data indicate that EphB1 deficiency does not disrupt ASC oligomerization during NLRP3 inflammasome
        activation, excluding defective inflammasome assembly as the basis for reduced downstream outputs.
      source: figure_2_e.yaml
      panel_id: 2e
    - type: paragraph
      text: Having found no evidence for altered ASC oligomerization, we next asked whether caspase-1 activation itself is preserved, further narrowing the bottleneck toward execution.
      tags:
      - transition
    - type: paragraph
      text: Given that ASC oligomerization remains intact upon EphB1 deficiency, we next asked whether the observed reduction in inflammasome output reflects impaired caspase-1 activation or a defect in its subsequent extracellular release. WT and EphB1-deficient primary peritoneal macrophages were primed and activated via the NLRP3 inflammasome, after which pro-caspase-1 and cleaved caspase-1 p20 were examined in total cell lysates and corresponding supernatants by immunoblotting. Caspase-1 activation, as reflected by intracellular p20 levels, was comparable between WT and EphB1-deficient macrophages. This result was reproducible across independent experiments, with no significant genotype-dependent differences in total lysate p20. These results localize the effect of EphB1 deficiency to a post-activation step, indicating that caspase-1 is efficiently activated.
      source: figure_2_f.yaml
      panel_id: 2f
    - type: paragraph
      text: Having established that caspase-1 activation is largely preserved, we next asked whether its canonical substrates—pro-IL-1β and GSDMD—are processed normally, thereby excluding impaired substrate cleavage as the source of the EphB1-dependent defect.
      tags:
      - transition
    - type: paragraph
      text: Following the observation that caspase-1 activation is preserved, we next examined whether caspase-1 substrate cleavage are differentially affected. WT and EphB1-deficient primary peritoneal macrophages were primed and activated via the NLRP3 inflammasome, after which GSDMD and IL-1β processing was analyzed in total cell lysates by immunoblotting. Caspase-1–dependent cleavage of GSDMD and pro–IL-1β occurred efficiently in EphB1-deficient macrophages, yielding cleavage and maturation degree comparable to those in WT cells. This intracellular processing was reproducible across independent experiments, with statistically significant reductions was not observed specifically in the total fractions. Together, these results demonstrate that EphB1 deficiency does not compromise caspase-1 substrate cleavage per se but selectively limits the extracellular release of mature inflammasome products, thereby localizing the defect to a late execution or export step.
      source: figure_2_g.yaml
      panel_id: 2g
    - type: paragraph
      text: Having mapped the bottleneck downstream of inflammasome assembly and caspase-1 activation,  we next asked whether EphB1 specifically gates the early engagement of GSDMD-NT with mitochondria that precedes pore function and organelle injury.
      tags:
      - transition
    - type: heading
      level: 2
      text: EphB1 loss reduces GSDMD engagement with the mitochondrial membrane
    - type: paragraph
      text: After localizing the functional bottleneck to the execution stage downstream of inflammasome assembly and caspase-1 activation, we next asked whether mitochondrial functional readouts—including cytosolic and mitochondrial ROS dynamics as well as mitochondrial membrane potential—are altered during NLRP3 activation. WT and Ephb1−/− primary peritoneal macrophages were LPS-primed and activated with Nigericin, and time-resolved changes in cytosolic ROS (H2DCHA), mitochondrial ROS (MitoSOX), and mitochondrial membrane potential (TMRM) were continuously monitored and normalized to pre-stimulation baselines. Upon inflammasome activation, Ephb1−/− macrophages exhibited attenuated accumulation of cytosolic ROS and a smaller loss of mitochondrial membrane potential compared with WT cells, whereas mitochondrial ROS signals measured by MitoSOX showed no significant genotype-dependent difference in overall magnitude. These patterns were consistent across independent experimental batches and
        were supported by area-under-the-curve analyses, while baseline TMRM measurements obtained under unstimulated conditions remained comparable between genotypes. Together, these results indicate that EphB1 deficiency does not cause an intrinsic alteration in mitochondrial membrane potential at baseline but limits ROS accumulation and membrane depolarization during inflammasome activation, supporting a model in which mitochondrial damage is attenuated during the execution phase.
      source: figure_3_a+b+c+d+e+f+g+h.yaml
      panel_id: 3a/b/c/d/e/f/g/h
    - type: paragraph
      text: Having delineated the kinetics of mitochondrial stress during inflammasome activation, we next defined the key time window for early interface events, so that subsequent readouts can be anchored to the appropriate temporal regime and we can test whether a more direct mitochondrial-content–release readout likewise shows an EphB1-dependent constraint consistent with a mitochondria-stage bottleneck.
      tags:
      - transition
    - type: paragraph
      text: we next asked whether inflammasome-induced release of mitochondrial contents—specifically cytosolic mtDNA—was correspondingly reduced. WT and Ephb1−/− primary peritoneal macrophages were primed and activated with Nigericin, followed by rapid subcellular fractionation and qPCR-based quantification of mtDNA (16S and ND1) in cytosolic, mitochondrial, and total cell fractions across a defined time course. In WT macrophages, inflammasome activation induced a rapid and transient pulse of cytosolic mtDNA, peaking at early time points, whereas this cytosolic mtDNA peak was markedly reduced in Ephb1−/− cells. In contrast, mtDNA levels in the total cell fraction remained largely stable between genotypes, with no significant differences detected for 16S and only minor fluctuations observed for ND1, and the early cytosolic mtDNA pulse was reproducible across independent experiments. Together, these results indicate that EphB1 deficiency selectively limits inflammasome-induced release of
        mitochondrial DNA into the cytosol without reducing total mtDNA content, localizing the effect to diminished mitochondrial membrane disruption during the execution phase.
      source: figure_3_i+j+s3_d+f+g.yaml
      panel_id: 3/i/j/s3/d/f/g
    - type: paragraph
      text: Having further reinforced the early mitochondrial-stage signature, we next asked whether an independent protein-level time-course can pinpoint the same peak window and, in doing so, whether EphB1 loss selectively diminishes GSDMD-NT enrichment on mitochondria—thereby placing the bottleneck at interface engagement/enrichment rather than upstream proteolytic activation.
      tags:
      - transition
    - type: paragraph
      text: we next asked whether EphB1 affects the early association of GSDMD-NT with mitochondria during inflammasome activation. WT and Ephb1−/− primary peritoneal macrophages were primed and activated with LPS and Nigericin, followed by rapid isolation of mitochondrial fractions at defined early time points and immunoblot analysis of GSDMD-NT in total lysates and mitochondrial fractions. In WT macrophages, GSDMD-NT transiently accumulated in the mitochondrial fraction with a pronounced peak at approximately 7.5 minutes after inflammasome activation, whereas this early mitochondrial enrichment of GSDMD-NT was markedly reduced in Ephb1−/− cells. By contrast, the extent of GSDMD cleavage in total cell lysates was comparable between genotypes, and mitochondrial abundance—as assessed by HK2 protein levels and mitochondrial 16S rRNA content—did not differ significantly, supporting a selective defect in mitochondrial targeting rather than substrate generation or organelle quantity. Together,
        these data localize the effect of EphB1 deficiency to the early mitochondrial enrichment of GSDMD-NT during inflammasome activation, indicating that EphB1 promotes efficient GSDMD–mitochondria association at the execution stage.
      source: figure_3_k+s3_e.yaml
      panel_id: 3k/s3e
    - type: paragraph
      text: Having localized the execution defect to the GSDMD–mitochondria interface,  we next asked whether a defined lipid gate at the mitochondrial membrane—cardiolipin abundance and accessibility—accounts for the altered engagement efficiency.
      tags:
      - transition
    - type: heading
      level: 2
      text: Cardiolipin mediates the EphB1-dependent constraint on inflammasome signalling
    - type: paragraph
      text: We asked whether EphB1 deficiency reduces the pool of cardiolipin that is detectable by NAO within the mitochondrial membrane. WT and Ephb1−/− primary peritoneal macrophages were stained with NAO under identical conditions, and NAO-associated fluorescence was quantified using fixed-exposure confocal imaging as well as time-resolved plate-reader measurements with no-dye wells for background subtraction. Across both imaging- and plate-based readouts, Ephb1−/− macrophages displayed significantly lower NAO fluorescence than WT cells, consistent with a reduced NAO-detectable cardiolipin pool. This decrease was consistently observed across multiple time points and independent experimental batches, and the concordant direction across two measurement modalities supports robustness of the phenotype. Together, these results show that EphB1 deficiency is associated with a significant reduction in NAO fluorescence, indicating a decreased NAO-detectable cardiolipin pool in the mitochondrial
        membrane under conditions where baseline mitochondrial membrane potential is unchanged.
      source: figure_4_a+b.yaml
      panel_id: 4a/b
    - type: paragraph
      text: Having observed a change in an accessibility-proxy readout, we next asked whether independent chemical quantification supports a shift in cardiolipin abundance and/or species composition.
      tags:
      - transition
    - type: paragraph
      text: Having observed a reduction in the NAO-detectable cardiolipin pool, we next asked whether this change reflects an overall decrease in cardiolipin abundance and accompanying alterations in molecular species composition. Total cardiolipin content and molecular species composition were quantified by LC–MS/MS–based lipidomics in resting WT and Ephb1−/− primary peritoneal macrophages, with abundances normalized to cell number using internal standards. Compared with WT cells, Ephb1−/− macrophages exhibited a significant reduction in total cardiolipin abundance, reaching approximately 70% of WT levels, accompanied by broad downregulation across a majority of cardiolipin molecular species. This decrease was reproducible across independent experimental batches and remained significant after multiple-testing correction, with roughly 60% of detected cardiolipin species showing reduced abundance. Together, these lipidomic data show that EphB1 deficiency not only reduces the NAO-accessible
        cardiolipin pool but also decreases total cardiolipin abundance, providing a quantitative membrane lipid basis for the attenuated mitochondrial damage observed in EphB1-deficient peritoneal macrophages.
      source: figure_4_c+d.yaml
      panel_id: 4c/d
    - type: paragraph
      text: Having established a lipid-state framework, we next asked whether an independent upstream pharmacologic perturbation can experimentally and controllably tune the NAO-defined accessible cardiolipin pool, providing a manipulable entry point for causal testing.
      tags:
      - transition
    - type: paragraph
      text: We next asked whether an independent pharmacological inhibition of cardiolipin biosynthesis is sufficient to reduce NAO signals in WT macrophages. WT primary peritoneal macrophages were pretreated with the cardiolipin biosynthesis inhibitor alexidine dihydrochloride (AD) prior to NAO staining, and cardiolipin-associated fluorescence was quantified by confocal microscopy under fixed exposure conditions. AD treatment markedly reduced NAO fluorescence in WT macrophages, indicating that pharmacological inhibition of cardiolipin biosynthesis decreases the NAO-accessible cardiolipin pool. This reduction in NAO signal was reproducible across independent experimental batches and reached statistical significance. Together, these results demonstrate that pharmacological inhibition of cardiolipin biosynthesis alone is sufficient to reduce the NAO-accessible cardiolipin pool in WT macrophages, supporting cardiolipin abundance as a key determinant of NAO-detectable cardiolipin availability.
      source: figure_4_e+f.yaml
      panel_id: 4e/f
    - type: paragraph
      text: Having implemented a lipid-state perturbation, we next asked whether inflammasome output shifts in the predicted direction—specifically, whether reduced accessible cardiolipin is sufficient to lower IL-1β release—thereby linking cardiolipin accessibility to terminal execution strength.
      tags:
      - transition
    - type: paragraph
      text: After establishing that pharmacological manipulation can reduce the NAO-accessible cardiolipin pool, we next asked whether lowering cardiolipin availability is sufficient to suppress inflammasome-driven IL-1β release. WT and Ephb1−/− primary peritoneal macrophages were pretreated with alexidine dihydrochloride (AD) at increasing doses and durations, followed by LPS priming and Nigericin activation, and IL-1β released into the supernatant was quantified by ELISA with cell-number normalization. AD treatment markedly suppressed LPS- and Nigericin-induced IL-1β release in macrophages in a dose- and time-dependent manner. The genotype-by-dose interaction was statistically significant, with most AD doses producing significant inhibition in WT cells but not in Ephb1−/− cells, and these patterns were reproducible across independent experimental batches without evidence of AD-induced cytotoxicity. Together, these results demonstrate that pharmacological reduction of cardiolipin availability
        is sufficient to suppress inflammasome-mediated IL-1β release, supporting a causal role for cardiolipin accessibility in controlling inflammasome output.
      source: figure_4_g.yaml
      panel_id: 4g
    - type: paragraph
      text: Having linked one perturbation axis to functional output, we next asked whether a mechanistically distinct perturbation converges on the same accessible-cardiolipin logic, reducing single-agent interpretive risk.
      tags:
      - transition
    - type: paragraph
      text: To further probe the determinants of the NAO-accessible cardiolipin pool, we next tested whether pharmacological perturbation of cardiolipin remodeling represents an alternative route to reduce NAO staining intensity. WT and Ephb1−/− primary peritoneal macrophages were pretreated with BEL, followed by NAO staining under identical imaging conditions, and cardiolipin-associated fluorescence intensity was quantified using uniform exposure and thresholding parameters. BEL treatment led to a marked reduction in NAO fluorescence intensity, indicating that pharmacological interference with cardiolipin remodeling is sufficient to decrease the NAO-accessible cardiolipin pool. This reduction in NAO staining was consistently observed across independent experimental batches and reached statistical significance relative to untreated controls. Together with perturbations targeting cardiolipin abundance, these results show that both manipulation of cardiolipin content and interference with
        cardiolipin remodeling can reduce NAO staining, indicating that changes in the NAO-accessible cardiolipin pool can arise through multiple mechanisms beyond alterations in total cardiolipin levels.
      source: figure_4_sa+b.yaml
      panel_id: s4a/b
    - type: paragraph
      text: Having established a second, independent lipid-state manipulation, we next asked whether its functional consequence on inflammasome output aligns with the same lipid-gate model.
      tags:
      - transition
    - type: paragraph
      text: We next asked whether perturbations that alter cardiolipin availability through distinct mechanisms are sufficient to attenuate the terminal functional output of inflammasome signaling, as measured by IL-1β release. Primary peritoneal macrophages were subjected to pharmacological manipulations targeting cardiolipin regulation via distinct mechanisms, followed by LPS priming and Nigericin activation, and IL-1β released into the supernatant was quantified by ELISA with normalization to cell number. Across these perturbations, reduction of cardiolipin availability consistently led to a marked decrease in LPS- and Nigericin-induced IL-1β release, indicating convergent suppression of inflammasome terminal output. The inhibitory effects on IL-1β release were dose- and/or time-dependent, reproducible across independent experimental batches, and occurred in the absence of detectable cytotoxicity. Together, these results demonstrate that diverse perturbations of cardiolipin regulation—whether
        affecting cardiolipin abundance or remodeling—converge on attenuation of inflammasome-mediated IL-1β release, supporting cardiolipin availability as a common limiting factor for terminal inflammasome output.
      source: figure_4_sc.yaml
      panel_id: s4c
    - type: paragraph
      text: Having established cardiolipin abundance and accessibility as the execution interface governing inflammasome output, we next operationalized the multiple, parallel processes that collectively shape cardiolipin state—including synthesis, supply, transport, oxidation, remodeling, and membrane context itself—into a set of separable, quantifiable mechanistic axes, enabling cross-batch integration of transcriptomic and lipidomic data to delineate how EphB1 loss coordinately perturbs these axes and thereby tunes GSDMD–mitochondria engagement.
      tags:
      - transition
    - type: heading
      level: 2
      text: Integrated multi-omics prioritizes membrane context as the dominant perturbed axis
    - type: paragraph
      text: To organize cardiolipin metabolism into an interpretable structure suitable for multi-omics integration, we constructed a conceptual framework that decomposes cardiolipin-related processes into six mechanistic axes. This framework defines six functional axes—synthesis, remodeling, transport, supply, oxidation, and membrane context—and assigns to each axis representative genes and lipid readouts that can, in principle, be extracted from transcriptomic and lipidomic datasets. Together, this conceptual model serves as a mechanistic coordinate system for organizing cardiolipin-related pathways and readouts, providing a common reference for the multi-omics analyses presented in subsequent figures.
      source: figure_5_a.yaml
      panel_id: 5a
    - type: paragraph
      text: Having introduced the mechanistic-axis conceptual framework, we next specified the concrete gene and lipid features that instantiate each axis, together with directionality and weighting rules.
      tags:
      - transition
    - type: paragraph
      text: To support the mechanistic schematic in Fig. 6A and ensure interpretability of axis-level scoring in the multi-omics integration, we curated a structured table of key lipid readouts and representative genes for each cardiolipin-related mechanistic axis. For each axis (supply, transport, synthesis, remodeling, oxidation, and membrane context), we define minimal feature records that specify axis assignment, biological meaning, quantitative formulae for lipid metrics, directionality conventions (bottleneck_sign), and within-axis weights, together with tiered inclusion rules (Tier-1 executors, Tier-2 proximal components, and Tier-3 conditional contributors) and cross-axis exclusion criteria. Together, this table serves as an interpretable lookup resource that links the six-axis cardiolipin framework to concrete gene and lipid features, thereby supporting Fig. 6A and guiding subsequent axis-based multi-omics analyses.
      source: figure_5_b.yaml
      panel_id: 5b
    - type: paragraph
      text: Having fixed axis definitions a priori, we next asked how heterogeneous multi-batch omics measurements can be normalized and projected into comparable axis-level scores.
      tags:
      - transition
    - type: paragraph
      text: To clarify how multi-batch RNA-seq, untargeted lipidomics, and targeted cardiolipin panel data were processed and rendered comparable for downstream mechanistic analyses, we summarized the complete data-processing workflow as an integrated pipeline. For each omics layer, raw data underwent modality-specific quality control, normalization, and batch-aware modeling, followed by feature aggregation into predefined mechanistic indicators and axis-level Z scores that serve as standardized inputs for multi-omics integration. Together, this processing pipeline provides a transparent and reproducible foundation for deriving mechanistic axis scores and cardiolipin phenotypes from heterogeneous multi-omics datasets, thereby enabling the integrative analyses presented in subsequent panels.
      source: figure_5_c.yaml
      panel_id: 5c
    - type: paragraph
      text: Having established the scoring pipeline, we next asked whether axis effects are directionally concordant across omics layers and batches, providing the first-pass structure of the perturbation landscape.
      tags:
      - transition
    - type: paragraph
      text: Building on the mechanistic axis framework and data-processing pipeline established in Fig. 6A–C, we next asked whether EphB1 deficiency produces consistent and reproducible axis-level effects across RNA-seq and lipidomics datasets. For each RNA-seq and lipidomics batch, we computed batch-specific effect_z scores representing the directional difference between EphB1-deficient and WT macrophages for each of the six mechanistic axes, and assembled these values into a cross-omics axis-by-batch effect matrix. Across three RNA-seq batches and four lipidomics batches, only the Membrane context axis displayed a consistent positive effect in both omics layers, with stable directionality and the largest absolute effect sizes among all axes. Effect_z values exceeding an absolute magnitude of 1 were predominantly observed for the Membrane context axis in both RNA and lipid datasets, whereas other axes showed sporadic or omics-specific effects that lacked cross-batch consistency. Together,
        this cross-omics effect matrix identifies Membrane context as the only mechanistic axis that is robustly and reproducibly perturbed by EphB1 deficiency, distinguishing it from other axes that are variably influenced by batch or omics-specific factors.
      source: figure_5_d.yaml
      panel_id: 5d
    - type: paragraph
      text: Having surveyed batch-by-omics concordance, we next asked whether equal-weight evidence aggregation yields a coherent, axis-level summary of EphB1-dependent perturbation.
      tags:
      - transition
    - type: paragraph
      text: Following the batch-level cross-omics comparison in Fig. 6D, we next asked whether integration across RNA-seq and lipidomics datasets would reveal a dominant mechanistic axis that is consistently perturbed by EphB1 deficiency. For each of the six predefined mitochondrial-related mechanistic axes, batch-level axis Z scores from RNA-seq and lipidomics were combined using Stouffer’s method to generate an overall multi-omics Z score representing the integrated effect of EphB1 deficiency. Among the six axes, the Membrane context axis exhibited the strongest and most pronounced deviation from zero, with a positive multi-omics Z score of approximately +2.6, representing the largest absolute effect across all mechanistic axes. This significance arose from consistent contributions across multiple RNA-seq and lipidomics batches rather than from a single dataset, whereas all other axes showed only mild or moderate shifts that failed to reach statistical significance after cross-omics integration.
        Together, these results identify Membrane context as the sole mechanistic axis that is robustly and significantly perturbed by EphB1 deficiency at the integrated multi-omics level, supporting the presence of a dominant membrane-related bottleneck rather than a distributed multi-axis imbalance.
      source: figure_5_e.yaml
      panel_id: 5e
    - type: paragraph
      text: Having obtained aggregated axis-level deviations, we next asked how these deviations relate to predefined cardiolipin phenotypic indicators, providing an interpretable bridge between axes and lipid outcome space.
      tags:
      - transition
    - type: paragraph
      text: After identifying Membrane context as the dominant mechanistic axis perturbed by EphB1 deficiency, we next asked whether axis-level effects can quantitatively predict changes in total cardiolipin abundance across experimental batches. For each experimental batch, combined mechanistic axis Z scores (HO–WT) were regressed against the corresponding HO–WT differences in total cardiolipin abundance (sum_CL) to assess cross-batch linear associations between axis effects and cardiolipin content. Among all axes, the Membrane context axis showed the strongest negative association with sum_CL, with higher combined Z scores corresponding to lower total cardiolipin levels, whereas all other axes displayed weak or near-zero correlations. However, none of the axis–sum_CL associations reached statistical significance within the current sample size (3–4 batches), with the Membrane context axis showing a moderate effect size (r ≈ −0.65) but a non-significant p value, indicating limited statistical
        power and sensitivity to batch-level variation. Together, these results indicate that total cardiolipin abundance (sum_CL) is not a sensitive or robust readout for capturing mechanistic axis effects across batches, thereby excluding sum_CL as a primary quantitative proxy for axis-level perturbations and motivating the use of more informative cardiolipin accessibility or composition-based metrics.
      source: figure_5_f.yaml
      panel_id: 5f
    - type: paragraph
      text: Having defined and prioritized a membrane-context mechanistic axis from integrated multi-omics, we next asked which EphB1-linked candidate signaling programs most consistently couple to this axis (X→M→Z), yielding a short, testable set of upstream mediators and validation hooks.
      tags:
      - transition
    - type: heading
      level: 2
      text: 'Prioritizing candidate pathways: an RNA X–M–Z framework with lipid phenotypic alignment'
    - type: paragraph
      text: To address the challenge of limited strictly paired RNA–lipid samples and unstable cross-omics mediation, we formulated an RNA-first X–M–Z framework that prioritizes reproducible pathway ranking over formal causal quantification. In this framework, EphB1 status is treated as an exogenous variable (X), downstream Eph-related signaling modules are quantified as RNA-based pathway scores (M), and the RNA membrane context axis score serves as a transcriptional proxy (Z) for lipid membrane phenotypes, while lipid readouts are used only for direction-concordance validation. Together, this RNA-first X–M–Z framework provides a transparent and reproducible strategy for ranking EphB1 downstream signaling modules most likely coupled to membrane context perturbation, thereby guiding subsequent experimental validation without over-interpreting limited cross-omics mediation.
      source: figure_6_a.yaml
      panel_id: 6a
    - type: paragraph
      text: Having defined the X–M–Z inference scaffold and the role of orthogonal lipid alignment, we next specified a minimal, literature-anchored set of EphB1-linked candidate signaling programs and their scoring rules.
      tags:
      - transition
    - type: paragraph
      text: To enable transparent and reproducible RNA-first X–M–Z prioritization of EphB1 downstream pathways, we curated a structured table that defines each downstream signaling module and its hypothesized linkage to cardiolipin regulatory axes. Each table row corresponds to one EphB1 downstream signaling gene set. Columns specify a unique pathway ID, a human-readable module label, network category (EphB1_signaling), the targeted cardiolipin mechanistic axes, module size (n_genes), and the full gene list annotated with gene_effect_sign to standardize directionality for module scoring. Together, this module dictionary provides the standardized building blocks used in Fig. 7A–7D, allowing readers and reviewers to trace how each EphB1 downstream pathway was defined and how it was linked to cardiolipin axes for subsequent quantitative analyses.
      source: figure_6_b.yaml
      panel_id: 6b
    - type: paragraph
      text: Having defined candidate programs and scoring directionality, we next asked which programs show reproducible EphB1-dependent shifts across RNA batches, qualifying them as plausible mediators (X→M).
      tags:
      - transition
    - type: paragraph
      text: 'Having established that EphB1 deficiency alters mitochondrial membrane lipid context and inflammasome output, we next asked whether loss of EphB1 leaves a detectable and systematic transcriptional footprint across its known downstream signaling pathways at the time of sample collection. Using RNA-seq data from multiple independent batches of WT and Ephb1−/− primary peritoneal macrophages, we quantified pathway-level transcriptional response scores based on predefined EphB1 downstream signaling gene sets, and summarized genotype-dependent shifts within each batch as standardized pathway z scores. Across three RNA-seq batches, EphB1 deficiency induced reproducible directional shifts in multiple signaling modules: PI3K–AKT–mTOR pathways showed consistent negative responses (KO < WT), NF-κB/ROS and JAK–STAT was overall reduced with batch-dependent reversals, cytoskeleton-related modules were shifted in a positive direction, and other pathways exhibited weaker or inconsistent effects.
        When pathway scores were integrated across batches using a meta Z approach, PI3K–AKT–mTOR and JAK–STAT displayed the highest cross-batch directional consistency and effect magnitude, whereas other modules showed smaller or batch-sensitive effects, highlighting differences in robustness rather than single-batch significance. Together, these analyses provide an overview of the transcriptional response state of EphB1 downstream signaling at the time of sampling, identifying PI3K–AKT–mTOR and JAK–STAT as the most consistently downregulated modules and prioritizing them as candidate pathways for subsequent coupling analyses with membrane context perturbation.'
      source: figure_6_c_v2.yaml
      panel_id: 6c
    - type: paragraph
      text: Having filtered candidates by cross-batch X→M consistency, we next asked which programs are mechanistically coupled to the prioritized membrane-context axis within RNA (M↔Z), strengthening chain coherence.
      tags:
      - transition
    - type: paragraph
      text: Following the identification of a stable membrane context–related mechanistic axis, we next asked which EphB1 downstream signaling modules exhibit cross-batch consistent transcriptional changes and show reproducible coupling to the Membrane context axis at the sample level. Using three independent RNA-seq batches of WT and Ephb1-deficient macrophages, we computed pathway footprint scores (M) for predefined EphB1 downstream gene sets and Membrane context axis scores (Z), summarized genotype effects as batch-level ΔM (KO−WT), and quantified within-batch coupling by linear regression of Z on M while controlling for genotype. Cross-batch aggregation revealed that most EphB1 downstream modules showed negative ΔM in EphB1-deficient cells, with the largest decreases observed for PI3K–AKT–mTOR and JAK–STAT, whereas cytoskeleton/adhesion modules (FAK–Src–Rho) displayed positive ΔM; correspondingly, PI3K–AKT–mTOR and JAK–STAT scores were negatively coupled to the Membrane context axis,
        while FAK–Src–Rho showed a positive coupling. The direction of X→M effects was consistent across batches by ΔM sign voting, and M↔Z coupling remained stable under pooled leave-one-out refitting, with PI3K–AKT–mTOR and JAK–STAT showing predominantly negative β_M_loo intervals and FAK–Src–Rho showing positive intervals. Together, these analyses prioritize PI3K–AKT–mTOR and JAK–STAT as the most robust EphB1 downstream candidates whose transcriptional attenuation is consistently associated with increased membrane context barrier scores, while distinguishing cytoskeleton/adhesion modules as oppositely coupled pathways.
      source: figure_6_d_v2.yaml
      panel_id: 6d
    - type: paragraph
      text: Having identified RNA-internal coupling candidates, we next asked whether the prioritized RNA axis aligns with lipid phenotypic space in independent repeats, providing orthogonal support without relying on paired-sample mediation.
      tags:
      - transition
    - type: paragraph
      text: 'After establishing EphB1–signal–membrane context mediation at the axis level in Fig. 7D, we next asked whether the same downstream signaling pathways similarly mediate EphB1-dependent changes across individual lipid readouts underlying the membrane context axis. Using the same X→M→Y mediation framework, we separately modeled five lipid indicators—CL fraction (CL/total), membrane CL content, mitochondrial total lipid mass (PC+PE+CL), membrane PC, and membrane PE—as outcome variables, and estimated pathway-specific indirect effects (a×b) for each indicator. Across all five lipid indicators, EphB1 deficiency was consistently associated with increased pathway scores (a>0), while the direction of the pathway–lipid association (b) diverged by readout: positive for CL fraction and membrane CL, but negative for mitochondrial lipid mass, membrane PC, and membrane PE, yielding opposite-signed indirect effects. Within each lipid readout, indirect effects across the nine pathways showed
        highly consistent directional signs and largely non-overlapping confidence intervals with zero, whereas effect magnitudes were not compared across readouts due to differences in scale and units. Together, these analyses indicate that the EphB1-dependent mediation structure observed at the membrane context axis level is recapitulated across multiple concrete lipid indicators, with pathway effects manifesting as coordinated but directionally distinct changes in cardiolipin-related versus PC/PE-dominated lipid readouts.'
      source: figure_6_e.yaml
      panel_id: 6e
  - id: discussion
    title: Discussion
    blocks:
    - type: paragraph
      text: 'The inflammasome field often treats upstream readouts—priming-dependent transcription, ASC speck formation, and caspase-1 activation—as near-equivalent proxies for “inflammatory strength.” In practice, a recurring structural paradox appears across models: upstream activation/assembly can look similar, yet lytic IL-1β release and membrane rupture diverge markedly. This activation–output decoupling implies an execution-layer threshold/cap that operates after assembly, deciding how much can be released, when rupture occurs, and whether rupture occurs at all. Accordingly, our Discussion shifts the question from “does NLRP3 activate?” to “how is the terminal output capped/thresholded when activation is comparable?” To make the paradox adjudicable, we compress the gap into a falsifiable minimal chain: signal input → membrane-environment mediator → pore functional output. In this framing, upstream activation remains necessary, but it is not sufficient to predict the magnitude of lytic
        output.'
      source: discussion_outline_en.yaml
      para_id: D1
    - type: paragraph
      text: 'Our evidence can be read as a compact chain from phenotype to layer-localization to a threshold model. Across a canonical LPS-priming–nigericin NLRP3 paradigm (and additional inflammasome settings), Ephb1-deficient macrophages show blunted lytic outputs and reduced IL-1β release, yet these output changes do not automatically imply that priming, assembly, or caspase activation is globally disabled. Instead, the divergence is better localized to the execution layer: pyroptosis is not a binary switch, but a parameterized process shaped by pore formation efficiency, pore stability and conductance, and a sub-lytic ceiling imposed by membrane repair. Mechanistically, ESCRT-mediated repair can cap membrane catastrophe and keep cells in a sub-lytic regime, altering the ratio between cytokine release and terminal lysis. Conversely, terminal rupture is separable from pore formation and can be amplified by dedicated rupture factors (e.g., NINJ1), creating structural space for activation
        without proportional rupture. On this basis, an execution-threshold/cap model is both plausible and testable. To move beyond correlation, we organize causal adjudication around three criteria: hierarchical masking (downstream membrane-environment manipulations should override upstream differences), same-level rescue (planned; restoring the membrane mediator should partially recover output in Ephb1 loss), and dose–response (graded membrane shifts should produce graded or threshold-like output changes). At present, our strongest support is for necessity and layer-localization; sufficiency requires dedicated rescue and pathway-validation experiments.'
      source: discussion_outline_en.yaml
      para_id: D2
    - type: paragraph
      text: 'We place the membrane lipid environment—not upstream assembly—as the mediator layer that translates signal input into execution output. Within this layer, cardiolipin (CL) is treated not as an abstract “binding-site” concept but as a quantifiable metabolic and biophysical state (amount, remodeling spectrum, oxidation state, and an operationally defined accessibility pool) that can shift pore permissiveness. In this organization, Ephb1 is an upstream signal entry point whose loss propagates through downstream signaling networks to remodel the mitochondrial/membrane environment, thereby shifting the functional threshold and ceiling of GSDMD pore output. Because complex systems often yield modest, distributed omics shifts, we avoid prematurely converging on a single enzyme node; instead, we use cross-batch “mechanism axes” to summarize supply/transport/synthesis/remodeling/oxidation/membrane-environment coordinates as reproducible phenotype endpoints. We then use mediation decomposition
        (X–M–Y) to prioritize candidate downstream pathways that best explain how Ephb1 perturbs these axes, producing a testable roadmap rather than a mechanistic proof. Crucially, mediation here is a ranking tool: it nominates pathways for targeted perturbation along a three-step logic (pathway → CL/axis state → pore/output) without claiming direct biochemical sufficiency. This mediator-first framework provides an interpretable way to rationalize activation–output decoupling: similar upstream activation can yield divergent lytic outputs if membrane-environment thresholds are shifted.'
      source: discussion_outline_en.yaml
      para_id: D3
    - type: paragraph
      text: 'Our central claim is deliberately scoped: the data most strongly support an execution-threshold model with membrane environment/CL as a high-priority mediator, whereas full sufficiency of the entire Ephb1→pathway→CL→pore loop remains to be closed. We do not claim that upstream activation is irrelevant; we claim it is necessary but insufficient to predict lytic output magnitude, and that execution-layer parameters (pore efficiency/stability, repair engagement, and rupture probability) provide the missing explanatory degrees of freedom. We also do not claim a direct Ephb1–GSDMD structural interaction or precise in situ CL accessibility/binding constants; our framework is built to explain relative threshold shifts using experimentally aligned readouts rather than absolute physical constants. Key alternative explanations remain adjudicable: (i) ROS-first causality (Ephb1→ROS→CL) versus CL-first or ROS-independent CL remodeling can be separated by ROS-clamping versus CL rescue in
        Ephb1-deficient cells; (ii) dominance of repair/rupture axes (ESCRT/NINJ1) can be tested by perturbing repair or rupture factors and asking whether they override the CL–output association; (iii) tool/energetic confounds (e.g., BEL stereochemistry, off-target hydrolase inhibition, ΔΨm effects influencing NAO) require enantiomer-aware dosing, covariate control (ΔΨm/mitochondrial mass), and orthogonal lipidomics validation. Internal validity is therefore bounded by measurement specificity (NAO vs LC–MS, ΔΨm covariates), tool specificity, and batch structure, while external validity is bounded by species/cell type (C57 peritoneal macrophages), stimulation paradigm (acute LPS+nigericin), and metabolic/ROS regimes where nonlinearity may dominate. Importantly, these boundaries do not negate the model; they define where the model should be expected to hold and what falsifiable predictions would overturn it. Thus, the Discussion aims to be maximally informative without over-claiming: we provide
        a layer-localized, mediator-based explanation for decoupling and specify the concrete experiments that can confirm or refute sufficiency and pathway priority.'
      source: discussion_outline_en.yaml
      para_id: D4
    - type: paragraph
      text: 'A practical implication of an execution-layer cap is that inflammatory signaling could, in principle, be modulated without fully shutting down upstream inflammasome activation—potentially preserving host defense while keeping lytic damage below a pathological threshold. To close the causal loop, the first priority is to test sufficiency at the mediator level: in Ephb1-deficient macrophages, compare ROS lowering versus direct CL restoration (with matched covariate control) and ask whether CL rescue can recover early GSDMD-NT membrane engagement and IL-1β lytic release even when ROS is not the sole driver. Second, we need to validate the mediation-prioritized downstream pathways using a strict hierarchy-consistent workflow: pathway perturbation should first shift CL/axis coordinates, then shift early pore/output readouts, while minimally affecting priming/assembly metrics. Together, these experiments will determine whether the proposed chain is merely a correlated scaffold or
        a mechanistically sufficient route. Take-home, in two sentences: Ephb1 acts as an upstream signal input that remodels the membrane environment (captured by CL metabolic state) to shift the functional threshold and ceiling of GSDMD pore output, thereby explaining why activation readouts can be similar while lytic outputs diverge. Framing pyroptosis in threshold terms—pore formation, repair capping, and rupture separability—turns activation–output decoupling from an empirical observation into a testable, portable model for interpreting inflammasome outputs.'
      source: discussion_outline_en.yaml
      para_id: D5
