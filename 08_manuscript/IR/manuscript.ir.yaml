  sections:
  - id: abstract
    title: Abstract
    blocks:
    - type: paragraph
      text: Inflammasome activation does not necessarily translate into proportional IL-1β release and pyroptotic output, yet the upstream mechanisms that constrain terminal execution remain unclear. Increasing evidence implicates mitochondrial membrane context, particularly cardiolipin status, as a potentially important but incompletely understood determinant of inflammasome output.. We asked whether loss of EphB1 remodels cardiolipin-linked mitochondrial membrane context to shift the execution threshold of gasdermin D and thereby attenuate inflammasome-induced lytic output. Using primary murine peritoneal macrophages, we combined genetic perturbation, functional localization of inflammasome signaling, cardiolipin-state perturbation, and integrative multi-omics analyses to test links between upstream signaling, membrane context, and terminal output. EphB1 deficiency consistently reduced IL-1β release and cell lysis across multiple inflammasome stimuli without affecting transcriptional priming,
        ASC assembly, or caspase-1 activation, localizing the defect to the execution stage. This phenotype was accompanied by reduced mitochondrial enrichment of GSDMD-NT together with coordinated decreases in cardiolipin abundance and accessibility, and was phenocopied by pharmacological perturbation of cardiolipin state. These findings support a membrane-mediated model in which EphB1-dependent signaling remodels cardiolipin-linked membrane context to shift the functional threshold of GSDMD-dependent execution, thereby helping explain how inflammasome activation can be uncoupled from output intensity.
  - id: introduction
    title: Introduction
    blocks:
    - type: paragraph
      text: 'Over the past two decades, the global disease landscape has shifted toward chronic inflammation-associated non-communicable diseases (NCDs), making immune an important public-health challenge. Cardiovascular diseases, cancer, chronic respiratory diseases, and diabetes together accounted for approximately 43 million deaths in 2021, representing roughly three quarters of non-pandemic-related deaths. {doi:10.5334/aogh.4649} Severe systemic inflammatory syndromes such as sepsis remain major contributors to global mortality. {doi:10.1016/s0140-6736(19)32989-7} {doi:10.1016/s2214-109x(25)00356-0} At the molecular level, the NLRP3 inflammasome is often viewed as a convergence node for diverse acute and chronic inflammatory pathologies. {doi:10.1038/s41577-019-0165-0} While extensive frameworks and regulatory networks have been developed for NLRP3 priming, assembly, and execution, many therapeutic strategies continue to focus on suppressing activation or upstream steps. {doi:10.1038/s41577-019-0165-0}
        {doi:10.1038/nrd.2018.97} This therapeutic emphasis raises an important mechanistic question: can inflammatory outputs be constrained without fully suppressing inflammasome activation?'
      paragraph_group: field_importance
      section_heading: Inflammasome output imbalance and immunopathological consequences
      source_pids:
      - 1.1.1.p1
      - 1.1.1.p2
      - 1.1.1.p3
      selected_sids:
      - 1.1.1.p1s1
      - 1.1.1.p1s2
      - 1.1.1.p2s1
      - 1.1.1.p3s3
      - 1.1.1.p3s4
      - 1.1.1.p3.bridge
    - type: paragraph
      text: Pyroptosis can be conceptualized as three connected but differentially regulatable stages—priming, inflammasome assembly/caspase activation, and terminal execution—each of which can shape phenotypic outputs. Priming determines the preparedness of inflammasome components, assembly determines whether inflammasomes form and caspases activate, and execution determines the magnitude and form of inflammatory output. In canonical pathways, inflammatory caspases cleave GSDMD to expose an N-terminal fragment that oligomerizes to form pores, enabling cytokine release and driving osmotic imbalance toward lytic death. {doi:10.1038/nature15514} {doi:10.1038/nature15541} Structural and functional studies suggest that the efficiency of GSDMD-NT pore formation strongly influences whether inflammatory outputs remain controlled or progress toward lytic rupture once a threshold is crossed. {doi:10.1038/nature18629} {doi:10.1073/pnas.1607769113} GSDMD-NT does not insert indiscriminately into all
        lipid membranes; it preferentially targets negatively charged phospholipids, particularly membranes enriched in cardiolipin (CL). {doi:10.1038/nature18629} {doi:10.1038/nature18590} This lipid dependence suggests that membrane environment may influence the threshold behavior of pyroptotic execution.
      paragraph_group: known_mechanism
      section_heading: Layered thresholds and membrane-environment constraints
      source_pids:
      - 1.1.2.p1
      - 1.1.2.p2
      - 1.1.2.p3
      - 1.1.2.p4
      selected_sids:
      - 1.1.2.p1s1
      - 1.1.2.p1s2
      - 1.1.2.p2s1
      - 1.1.2.p3s1
      - 1.1.2.p4s1
      - 1.1.2.p4.bridge
    - type: paragraph
      text: Before the plasma membrane, GSDMD-NT can rapidly damage both inner and outer mitochondrial membranes. {doi:10.1016/j.immuni.2023.10.004} Mitochondria may also feed back to amplify inflammasome signaling, as mitochondrial functional states influence sensitivity to NLRP3 activation cues. {doi:10.1038/s41590-022-01185-3} If pore formation is sensitive to lipid context, mitochondrial membrane lipids with dynamic remodeling capacity become plausible mediators linking upstream signals to execution-stage divergence. Cardiolipin is a signature tetra-acyl phospholipid enriched in the mitochondrial inner membrane and is widely viewed as a structural–functional coupling factor linking membrane architecture to bioenergetic performance. {doi:10.3390/cells8070728} At the molecular level, CL contributes to stabilization and organization of respiratory-chain complexes and supercomplexes. {doi:10.1074/jbc.m308366200} In addition, CL provides a lipid environment that supports the assembly and
        membrane association of inner-membrane protein complexes, including processes involved in respiratory-chain biogenesis. {doi:10.1242/jcs.240374} CL is not a static background lipid but undergoes regulated changes under stress and immune activation, linking mitochondrial membrane state to inflammatory signaling. {doi:10.1016/j.immuni.2013.08.001} {doi:10.4161/auto.27191} {doi:10.1016/j.celrep.2024.114237} In damage contexts, CL externalization can serve as a quality-control ‘tag’, for example via LC3 binding to trigger mitophagy. {doi:10.4161/auto.27191} CL oxidation has been associated with membrane damage and inflammatory amplification in relevant stress contexts. {doi:10.1016/j.celrep.2024.114237} Rather than treating mitochondrial status as a collection of dispersed signals such as ROS, mtDNA, and membrane potential, CL state may provide a more execution-proximal readout linking mitochondrial conditions to pore-forming efficiency and threshold behavior. This gap motivates the
        search for an upstream receptor-level mechanism that could link extracellular messages to CL-dependent execution thresholds.
      paragraph_group: mechanistic_focus
      section_heading: Layered thresholds and membrane-environment constraints
      source_pids:
      - 1.1.2.p5
      - 1.1.2.p6
      - 1.1.2.p7
      - 1.1.3.p1
      - 1.1.3.p2
      - 1.1.3.p3
      selected_sids:
      - 1.1.2.p5s2
      - 1.1.2.p6s1
      - 1.1.2.p7s1
      - 1.1.3.p1s1
      - 1.1.3.p1s2
      - 1.1.3.p1s4
      - 1.1.3.p2s1
      - 1.1.3.p2s3
      - 1.1.3.p2s4
      - 1.1.3.p3s1
      - 1.1.3.p3.bridge
    - type: paragraph
      text: 'Current evidence supports a connection between CL dynamics and inflammatory execution. By contrast, an unresolved question lies upstream: which receptor-level signals, through which downstream pathways or mechanistic axes, reshape CL state and thereby alter terminal inflammatory outputs? Because Eph–ephrin signaling translates cell–cell contact into downstream programs controlling adhesion, cytoskeletal organization, and microenvironmental responses, it provides a plausible receptor-level entry point for linking extracellular context to intracellular execution states. Important gaps remain in understanding how EphB1 relates to inflammasome and pyroptotic execution, and whether EphB1-associated mitochondrial effects can be linked to quantifiable membrane-environment readouts such as CL state. Second, Eph family functions are pleiotropic, and even closely related EphB subtypes can show opposing effects across tissues, limiting inference by family membership. These gaps motivate
        a falsifiable model in which EphB1 influences pyroptotic execution through downstream pathways that reshape CL state.'
      paragraph_group: knowledge_gap
      section_heading: Cardiolipin as a membrane-environment readout and interface
      source_pids:
      - 1.1.3.p3
      - 1.2.5.p1
      - 1.2.5.p3
      selected_sids:
      - 1.1.3.p3s2
      - 1.1.3.p3s3
      - 1.2.5.p1s2
      - 1.2.5.p3s1
      - 1.2.5.p3s3
      - 1.2.5.p3.bridge
    - type: paragraph
      text: The central question is whether an upstream receptor signal can engage downstream pathways that reshape CL state and membrane environment, thereby altering terminal inflammasome execution outputs. However, current evidence remains largely descriptive and lacks a systems-level framework explaining how upstream signals drive integrated changes in CL state. To address this question, we use a discover–localize–validate strategy to test the proposed chain with aligned readouts across each layer. This study is framed around a layered model linking receptor signaling, membrane environment, and execution output, with EphB1 as a candidate upstream entry point and CL state as an integrated mitochondrial readout. Rather than equating phenotypic differences with upstream inflammasome activation strength, the study emphasizes identifying which layer differs and whether execution thresholds and amplitude-limiting behavior can be tuned. Accordingly, the study tests whether changes in CL state
        are sufficient to explain execution-output divergence without assuming complete molecular resolution of every intermediate step.
      paragraph_group: hypothesis
      section_heading: Scientific question, hypotheses, and study objectives
      source_pids:
      - 1.3.p4
