      - D3s2
      - D3s3
    - type: paragraph
      text: 'Because complex systems often yield modest and distributed omics shifts, we avoid prematurely converging on a single enzyme node and instead use cross-batch mechanism axes to capture reproducible membrane-environment phenotypes. We then use mediation decomposition to prioritize candidate downstream pathways that best explain how Ephb1 perturbs these axes, yielding a testable roadmap rather than direct mechanistic proof. Here, mediation is used as a ranking tool: it prioritizes pathways for targeted perturbation along a pathway → CL/axis state → pore/output logic without implying direct biochemical sufficiency. This mediator-first framework provides an interpretable way to rationalize activation–output decoupling: similar upstream activation can yield divergent lytic outputs if membrane-environment thresholds are shifted.'
      source: discussion_outline_en.yaml
      paragraph_group: integration_with_literature
      source_para_ids:
      - D3
      selected_sids:
      - D3s4
      - D3s5
      - D3s6
      - D3s7
    - type: paragraph
      text: 'A practical implication of an execution-layer cap is that inflammatory signaling could, in principle, be modulated without fully shutting down upstream inflammasome activation—potentially preserving host defense while keeping lytic damage below a pathological threshold. Take-home, in two sentences: Ephb1 acts as an upstream signal input that remodels the membrane environment (captured by CL metabolic state) to shift the functional threshold and ceiling of GSDMD pore output, thereby explaining why activation readouts can be similar while lytic outputs diverge. Framing pyroptosis in threshold terms—pore formation, repair capping, and rupture separability—turns activation–output decoupling from an empirical observation into a testable, portable model for interpreting inflammasome outputs.'
      source: discussion_outline_en.yaml
      paragraph_group: biological_implication
      source_para_ids:
      - D5
      selected_sids:
      - D5s1
      - D5s5
      - D5s6
    - type: paragraph
      text: 'Our central claim is deliberately scoped: the data most strongly support an execution-threshold model with membrane environment/CL as a high-priority mediator, whereas full sufficiency of the entire Ephb1→pathway→CL→pore loop remains to be closed. We do not claim that upstream activation is irrelevant; we claim it is necessary but insufficient to predict lytic output magnitude, and that execution-layer parameters (pore efficiency/stability, repair engagement, and rupture probability) provide the missing explanatory degrees of freedom. We also do not claim a direct Ephb1–GSDMD structural interaction or precise in situ CL accessibility/binding constants; our framework is built to explain relative threshold shifts using experimentally aligned readouts rather than absolute physical constants. Several alternative explanations remain testable, including ROS-first versus CL-first causality, dominance of repair or rupture pathways, and tool- or energetics-related confounds affecting
        CL-linked readouts. Accordingly, internal validity is constrained by measurement specificity, tool specificity, and batch structure, whereas external validity is limited by cell type, stimulation paradigm, and metabolic contexts in which nonlinear behavior may dominate. Importantly, these boundaries do not negate the model; they define where the model should be expected to hold and what falsifiable predictions would overturn it. Taken together, the model provides a layer-localized, mediator-based explanation for decoupling while defining concrete experiments to test sufficiency and pathway priority. To close the causal loop, a first priority is to test mediator-level sufficiency by comparing ROS lowering with direct CL restoration in Ephb1-deficient macrophages and asking whether CL rescue can recover early GSDMD-NT engagement and lytic IL-1β release. A second priority is to test mediation-prioritized pathways by asking whether pathway perturbation first shifts CL/axis states and
        then alters early pore/output readouts while minimally affecting priming and assembly metrics. Together, these experiments will determine whether the proposed chain is merely a correlated scaffold or a mechanistically sufficient route.'
      source: discussion_outline_en.yaml
