    - type: paragraph
      text: 'The execution-threshold model can be mechanistically interpreted through repair, rupture, and membrane-environment mediation. Conversely, terminal rupture is separable from pore formation and can be amplified by dedicated rupture factors (e.g., NINJ1), creating structural space for activation without proportional rupture. On this basis, an execution-threshold/cap model is both plausible and testable. To move beyond correlation, this model can be evaluated through three criteria: hierarchical masking, same-level rescue, and dose–response behavior. At present, our strongest support is for necessity and layer-localization; sufficiency requires dedicated rescue and pathway-validation experiments. We place the membrane lipid environment—not upstream assembly—as the mediator layer that translates signal input into execution output. Within this mediator layer, cardiolipin (CL) is considered a quantifiable metabolic and biophysical state—rather than merely an abstract binding-site concept—that
        can shift pore permissiveness. In this organization, Ephb1 is an upstream signal entry point whose loss propagates through downstream signaling networks to remodel the mitochondrial/membrane environment, thereby shifting the functional threshold and ceiling of GSDMD pore output.'
      source: discussion_outline_en.yaml
      paragraph_group: mechanistic_interpretation
      source_para_ids:
      - D2
      - D3
      selected_sids:
      - D2s4
      - D2s5
      - D2s6
      - D2s7
