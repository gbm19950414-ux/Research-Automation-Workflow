  - id: discussion
    title: Discussion
    blocks:
    - type: paragraph
      text: 'The inflammasome field often treats upstream readouts—priming-dependent transcription, ASC speck formation, and caspase-1 activation—as near-equivalent proxies for “inflammatory strength.” In practice, a recurring structural paradox appears across models: upstream activation/assembly can look similar, yet lytic IL-1β release and membrane rupture diverge markedly. This activation–output decoupling is consistent with an execution-layer threshold or cap operating after assembly, shaping how much output is released, when rupture occurs, and whether rupture occurs at all. Accordingly, the central question is not simply whether NLRP3 activates, but how terminal output is capped or thresholded when upstream activation appears comparable. This paradox can be reduced to a falsifiable minimal chain in which signal input is translated through a membrane-environment mediator into pore functional output. In this framing, upstream activation remains necessary, but it is not sufficient to
        predict the magnitude of lytic output. Our findings support this framework by linking the phenotype to execution-layer localization and, in turn, to a threshold model of terminal output. Across a canonical LPS-priming–nigericin NLRP3 paradigm (and additional inflammasome settings), Ephb1-deficient macrophages show blunted lytic outputs and reduced IL-1β release, yet these output changes do not automatically imply that priming, assembly, or caspase activation is globally disabled. Instead, the divergence is better localized to the execution layer: pyroptosis is not a binary switch, but a parameterized process shaped by pore formation efficiency, pore stability and conductance, and a sub-lytic ceiling imposed by membrane repair.'
      source: discussion_outline_en.yaml
      paragraph_group: study_summary
      source_para_ids:
