  sections:
  - id: introduction
    title: Introduction
    blocks:
    - type: paragraph
      text: Over the past two decades, the global disease landscape has shifted toward chronic inflammation-associated non-communicable diseases (NCDs), making immune imbalance a central public-health challenge. Cardiovascular diseases, cancer, chronic respiratory diseases, and diabetes together accounted for approximately 43 million deaths in 2021, representing roughly three quarters of non-pandemic-related deaths. A substantial fraction of these deaths occurred before age 70 and disproportionately affected low- and middle-income countries, highlighting the societal burden of chronic inflammation and immune dysregulation. {doi:10.5334/aogh.4649}
      pid: 1.1.1.p1
      section_heading: Inflammasome output imbalance and immunopathological consequences
    - type: paragraph
      text: Acute systemic inflammation remains a major source of mortality, exemplified by sepsis. A Global Burden of Disease (GBD) 2017 systematic analysis estimated approximately 48.9 million sepsis events and 11.0 million sepsis-related deaths in 2017, accounting for about one fifth of global deaths. A subsequent GBD 2021 analysis suggested that the burden in 2021 could be even higher (on the order of 166 million events and 21.4 million deaths), emphasizing the potential rebound or worsening of systemic inflammatory risk in the context of pandemics and aging. {doi:10.1016/s0140-6736(19} {doi:10.1016/s2214-109x(25}
      pid: 1.1.1.p2
      section_heading: Inflammasome output imbalance and immunopathological consequences
    - type: paragraph
      text: From a global burden perspective, modifiable risk factors intersect inflammation and metabolic imbalance, suggesting value in identifying true rate-limiting steps that enable amplitude-limited immune control. GBD 2023 highlighted that a substantial proportion of deaths and disability are attributable to modifiable risk factors, many of which intersect with inflammation, metabolic dysregulation, and immune imbalance. At the molecular level, the NLRP3 inflammasome is often viewed as a convergence node for diverse acute and chronic inflammatory pathologies. While extensive frameworks and regulatory networks have been developed for NLRP3 priming, assembly, and execution, many therapeutic strategies continue to focus on suppressing activation or upstream steps. {doi:10.1016/s0140-6736(25} {doi:10.1038/s41577-019-0165-0} {doi:10.1038/nrd.2018.97}
      pid: 1.1.1.p3
      section_heading: Inflammasome output imbalance and immunopathological consequences
    - type: paragraph
      text: Pyroptosis can be conceptualized as three connected but differentially regulatable stages—priming, inflammasome assembly/caspase activation, and terminal execution—each of which can shape phenotypic outputs. Priming determines the preparedness of inflammasome components, assembly determines whether inflammasomes form and caspases activate, and execution determines the magnitude and form of inflammatory output. Thus, even with comparable NLRP3 activation, final phenotypes such as IL-1β/IL-18 release, membrane permeability, and lytic rupture are not necessarily equivalent, suggesting that divergence may largely reside in execution thresholds.
      pid: 1.1.2.p1
      section_heading: Layered thresholds and membrane-environment constraints
    - type: paragraph
      text: In canonical pathways, inflammatory caspases cleave GSDMD to expose an N-terminal fragment that oligomerizes to form pores, enabling cytokine release and driving osmotic imbalance toward lytic death. Inflammatory caspases (caspase-1/4/5/11) cleave GSDMD, generating the pore-forming GSDMD-NT fragment. GSDMD-NT oligomerizes on membranes to form transmembrane pores that promote IL-1β/IL-18 release and alter ionic and water flux. As pore burden and osmotic imbalance accumulate, cells progress toward lytic death. {doi:10.1038/nature15514} {doi:10.1038/nature15541}
      pid: 1.1.2.p2
      section_heading: Layered thresholds and membrane-environment constraints
    - type: paragraph
      text: Structural and functional studies indicate that pore-forming efficiency of GSDMD-NT is a decisive step that can switch outputs from controlled release to uncontrolled lysis once a threshold is crossed. Once the execution stage crosses a threshold, outputs can rapidly transition from regulated release to uncontrolled lytic rupture. Accordingly, pore formation can be viewed as a core bottleneck of terminal pyroptotic execution. {doi:10.1038/nature18629} {doi:10.1073/pnas.1607769113}
      pid: 1.1.2.p3
      section_heading: Layered thresholds and membrane-environment constraints
    - type: paragraph
      text: GSDMD-NT does not insert indiscriminately into all lipid membranes; it preferentially targets negatively charged phospholipids, particularly membranes enriched in phosphoinositides (PIPs) and cardiolipin (CL). In model-membrane systems, inclusion of such anionic lipids can markedly enhance pore formation and membrane leakage. Thus, the same GSDMD-NT fragment can exhibit different execution outcomes depending on lipid context, with membrane composition functioning as an adjustable ‘execution-gain’ knob that shapes amplitude and timing. {doi:10.1038/nature18629} {doi:10.1038/nature18590}
      pid: 1.1.2.p4
      section_heading: Layered thresholds and membrane-environment constraints
    - type: paragraph
      text: Temporal evidence suggests mitochondria are not merely passive damage targets during pyroptosis but can act as a regulatory hub for terminal execution. Beyond the plasma membrane, GSDMD-NT can rapidly damage both inner and outer mitochondrial membranes. Mitochondrial injury can occur after GSDMD cleavage but before overt plasma-membrane rupture, promoting early changes in membrane potential, ROS, release of mitochondrial contents, and quality-control responses. These events can accelerate and amplify the overall pyroptotic process. {doi:10.1016/j.immuni.2023.10.004}
      pid: 1.1.2.p5
      section_heading: Layered thresholds and membrane-environment constraints
    - type: paragraph
      text: Mitochondria can also amplify inflammasome signaling, as mitochondrial functional states modulate sensitivity to NLRP3 activation cues. Mitochondria-associated events such as ROS, changes in membrane permeability, and mtDNA release can promote inflammasome assembly and IL-1β production. Conversely, enhancing mitochondrial renewal/clearance capacity or maintaining respiratory-chain function can alter inflammasome flux and output intensity. {doi:10.1016/j.immuni.2012.01.009} {doi:10.1038/s41590-022-01185-3}
      pid: 1.1.2.p6
      section_heading: Layered thresholds and membrane-environment constraints
    - type: paragraph
      text: If pore formation is highly sensitive to lipid context, key mitochondrial-coupled and remodelable lipids are prime candidates for translating upstream signals into execution-stage divergence. Among such lipids, cardiolipin (CL) emerges as a particularly prominent candidate.
      pid: 1.1.2.p7
      section_heading: Layered thresholds and membrane-environment constraints
    - type: paragraph
      text: Cardiolipin is a signature tetra-acyl phospholipid enriched in the mitochondrial inner membrane and widely viewed as a key structural–functional coupling factor linking membrane architecture to bioenergetic performance. At the molecular level, CL contributes to stabilization and organization of respiratory-chain complexes and supercomplexes. CL also influences ATP synthase oligomerization and maintenance of high-curvature cristae structures. In addition, CL provides a lipid environment supporting assembly and membrane association of inner-membrane protein complexes, including membrane-proximal processes such as mitoribosome association and insertion/formation of nascent respiratory-chain components. Accordingly, shifts in CL abundance, acyl-chain composition, or oxidation state can jointly rewrite metabolic efficiency, membrane structural stability, and permeability thresholds, a view that has reached a relatively stable consensus at the review level. {doi:10.1074/jbc.m308366200}
        {doi:10.1016/j.bpj.2011.03.031} {doi:10.1242/jcs.240374} {doi:10.3390/cells8070728}
      pid: 1.1.3.p1
      section_heading: Cardiolipin as a membrane-environment readout and interface
    - type: paragraph
      text: 'Importantly, CL is not a static background lipid: it undergoes observable and regulatable dynamics under stress and immune activation, interfacing with inflammatory signaling. Mitochondrial CL has been reported to participate directly in NLRP3 recruitment and activation, including CL–NLRP3 binding and effects of perturbing CL synthesis on inflammasome activation. In damage contexts, CL externalization can serve as a quality-control ‘tag’, for example via LC3 binding to trigger mitophagy. CL oxidation and membrane damage/inflammatory amplification are frequently co-observed. Closer to the execution layer, GSDMD-N has been suggested in specific pathological contexts to recognize CL to form mitochondrial pores, amplifying mitochondrial ROS and inflammatory cascades. {doi:10.1016/j.immuni.2013.08.001} {doi:10.4161/auto.27191} {doi:10.1016/j.celrep.2024.114237}'
      pid: 1.1.3.p2
      section_heading: Cardiolipin as a membrane-environment readout and interface
    - type: paragraph
      text: 'A working inference follows: rather than treating mitochondrial status as a collection of dispersed signals (ROS, mtDNA, membrane potential), CL state may act as a more execution-proximal integrated readout that helps translate mitochondrial conditions into pore-forming efficiency and thresholds. Current consensus more robustly supports coupling between CL and inflammatory execution and the plasticity of CL dynamics. By contrast, the major knowledge gap lies upstream: which receptors or recognition signals, through which downstream pathways and mechanistic axes, can transmit extracellular cues to mitochondrial membrane lipids to systematically reshape CL state and thereby alter terminal outputs. In other words, the mid-to-early segment of a chain—‘receptor signal → downstream pathway/mechanistic axis → CL metabolism → mitochondrial inflammatory features → pore threshold and lytic cytokine release’—still lacks a broadly accepted systems model.'
      pid: 1.1.3.p3
      section_heading: Cardiolipin as a membrane-environment readout and interface
    - type: paragraph
      text: Eph receptors and their ephrin ligands form a contact-dependent bidirectional signaling system and constitute the largest receptor tyrosine kinase subfamily, making them conceptually suitable candidates for translating spatial microenvironmental context into intracellular state and effector outputs. The Eph/ephrin system was originally recognized for roles in development and spatial patterning, with a core feature of shaping adhesion, morphology, and migration through contact-dependent signal exchange. Increasing evidence extends Eph/ephrin biology into immune contexts, including immune-cell development, activation, migration, and tissue residence, and modulation of how immune cells communicate with endothelium/stroma or neighboring immune cells within inflammatory microenvironments. From a signaling architecture perspective, Eph downstream outputs are not a single linear pathway and can intersect major metabolic/growth networks, with mechanistic support for interactions and
        feedback with PI3K–Akt–mTOR signaling in multiple family members. Thus, Eph family signaling is positioned to extend plasma-membrane contact cues into deeper cellular homeostasis modules, including mitochondrial-related processes and membrane environment, albeit in a context-dependent manner across members, cell types, and stimuli. {doi:10.1016/s1357-2725(02} {doi:10.3389/fimmu.2019.01473} {doi:10.1016/j.ccr.2009.04.009} {doi:10.4161/cc.9.11.11925}
      pid: 1.1.3.p4
      section_heading: Cardiolipin as a membrane-environment readout and interface
    - type: paragraph
      text: 'If EphB1 signaling can engage downstream pathways or mechanistic axes that alter mitochondrial membrane environment—captured by CL abundance, species composition, or oxidation—it may shift the threshold and efficiency of pore formation and thereby achieve amplitude-limiting control of inflammasome outputs. A potential advantage of this strategy is that it targets output form and intensity (for example, a threshold window for lytic cytokine release) rather than being equivalent to fully disabling the inflammasome, which may better balance tissue protection with host defense in principle. Accordingly, this work adopts a working framework: receptor kinase (EphB1) → downstream pathway/mechanistic axis → mitochondrial membrane environment/CL readouts → terminal inflammasome execution outputs.'
      pid: 1.1.3.p5
      section_heading: Cardiolipin as a membrane-environment readout and interface
    - type: paragraph
      text: Beyond asking whether inflammasomes are activated, a more consequential question is how the execution layer determines the magnitude, timing, and form of inflammatory outputs. In canonical pathways, pathogen infection activates inflammasomes and caspase-1/-4/-5, cleaving GSDMD to generate an N-terminal fragment that oligomerizes into plasma-membrane pores to release IL-1β and other pro-inflammatory factors. In addition to lytic rupture, GSDMD pores can enable selective cytokine release under ‘sub-lytic’ states, while membrane-rupture machinery such as NINJ1 can cooperate to amplify death and content release. In apoptotic pathways, caspase-3 cleavage of GSDME can similarly induce plasma-membrane permeabilization and strong inflammatory responses. {doi:10.1038/nature15514} {doi:10.1038/nature15541} {doi:10.1038/nature18629} {doi:10.1038/nrmicro2070} {doi:10.1038/s41586-021-03478-3} {doi:10.1016/j.celrep.2021.108998} {doi:10.1038/s41586-021-03218-7} {doi:10.1038/ncomms14128} {doi:10.1038/nature22393}
      pid: 1.2.1.p1
      section_heading: Consensus and gaps in inflammasome output control
    - type: paragraph
      text: 'Mitochondria are widely recognized as coordinators of cell-death and stress signaling and participate in inflammatory and non-inflammatory death programs via modular control of membrane permeabilization. Mitochondrial outer membrane permeabilization (MOMP) is a core event in intrinsic apoptosis and can intersect immune and inflammatory pathways through release of mtDNA or dsRNA to engage cGAS–STING and MAVS signaling. A modular view of mitochondrial permeabilization highlights multiple layers: signal coupling via transcription factors, pore-forming proteins (including BCL-2 family and gasdermins), membrane lipids (especially CL) as a physicochemical basis, post-translational modifications, outer-membrane interactors, and mitochondrial dynamics and membrane potential that feed back on vulnerability. Notably, permeabilization can be incomplete, allowing survival with selective release of intermembrane-space proteins and remodeling-dependent release of apoptotic factors. As a pro-inflammatory
        signaling hub, mitochondria can integrate pyroptosis, necroptosis, and ferroptosis-related processes, including gasdermin–CL interactions that promote mitochondrial permeabilization and release of inflammatory mediators. {doi:10.1101/cshperspect.a006080} {doi:10.1038/cdd.2017.186} {doi:10.1038/nchembio727} {doi:10.1371/journal.pbio.1000298} {doi:10.1126/science.1219855} {doi:10.1016/j.bbamcr.2010.11.011} {doi:10.1091/mbc.e09-07-0649} {doi:10.15252/embj.201899238} {doi:10.1126/science.aao6047} {doi:10.1038/s41467-023-37146-z} {doi:10.1038/s41586-018-0363-0} {doi:10.1016/j.cell.2014.11.036} {doi:10.1016/j.cell.2014.11.037} {doi:10.1038/ncb3596} {doi:10.1016/j.molcel.2015.01.018} {doi:10.1016/j.cell.2007.03.045} {doi:10.1073/pnas.1417253111} {doi:10.1016/j.immuni.2023.10.004} {doi:10.1016/j.celrep.2018.09.071} {doi:10.1096/fj.202100085r} {doi:10.1016/j.jbc.2023.102908} {doi:10.1016/j.cell.2022.06.038}'
      pid: 1.2.1.p2
      section_heading: Consensus and gaps in inflammasome output control
    - type: paragraph
      text: Across regulated death modalities, pore formation and permeabilization often depend on specific membrane lipids—particularly anionic phospholipids—indicating that membrane composition sets boundary conditions for insertion, oligomerization, and pore stability. Mechanistically distinct pore systems (gasdermins, MLKL, BAX/BAK) nevertheless commonly exhibit selective binding and insertion into anionic phospholipids. Multiple gasdermin family members can directly bind mitochondrial CL, inducing inner and outer membrane permeabilization and promoting release of mtDNA and proteins to amplify inflammation. GSDMD/E N-terminal fragments can induce mitochondrial rupture and cytochrome c release, and BAX/BAK-mediated MOMP can in turn activate NLRP3 inflammasomes and GSDME, amplifying inflammatory cascades. {doi:10.1016/j.str.2014.07.014} {doi:10.1016/j.immuni.2023.10.004} {doi:10.1016/j.celrep.2018.09.071} {doi:10.1096/fj.202100085r} {doi:10.1016/j.jbc.2023.102908} {doi:10.1038/s41467-019-09397-2}
        {doi:10.1016/j.immuni.2021.04.012} {doi:10.1016/j.celrep.2018.10.103} {doi:10.1016/j.celrep.2018.10.087}
      pid: 1.2.2.p1
      section_heading: Consensus and gaps in inflammasome output control
    - type: paragraph
      text: Lipid constraints extend beyond pyroptosis, suggesting a shared membrane-interface principle across necroptosis and ferroptosis-related vulnerability. In necroptosis, MLKL can bind mitochondrial CL and interact with factors such as PGAM5 and DRP1 to influence mitochondrial fission, while structural and reconstitution studies indicate MLKL N-terminal bundles insert into anionic lipid-containing membranes (including CL) to cause leakage. Ferroptosis, although not a canonical ‘pore protein’ process, is driven by iron-dependent lipid peroxidation and displays strong dependence on membrane oxidation substrates and membrane-environment status; mitochondrial dysfunction and VDAC1/2 engagement by erastin are associated with mitochondrial shrinkage and ATP decline in relevant contexts. Targeting mitochondria with antioxidants can suppress ferroptosis only in specific cellular settings, implying context-dependent mitochondrial contributions. {doi:10.1016/j.cell.2009.05.021} {doi:10.1073/pnas.1408987111}
        {doi:10.1038/s41467-018-04714-7} {doi:10.1016/j.molcel.2014.03.003} {doi:10.1038/cddis.2013.531} {doi:10.1038/s41419-021-03418-z} {doi:10.1016/j.immuni.2013.06.018} {doi:10.1016/j.celrep.2013.10.034} {doi:10.1016/j.str.2014.07.014} {doi:10.1016/j.cell.2012.03.042} {doi:10.1083/jcb.202105043} {doi:10.1038/ncb3064} {doi:10.1016/j.molcel.2018.10.042} {doi:10.1016/j.freeradbiomed.2018.01.019}
      pid: 1.2.2.p2
      section_heading: Consensus and gaps in inflammasome output control
    - type: paragraph
      text: Despite consensus that membrane lipids can influence pore formation, a unifying framework remains lacking for how upstream signals systematically reshape lipid composition/oxidation in vivo to produce execution-layer output divergence. Most studies establish causal fragments—‘lipids affect pore formation’—without a systems model linking upstream receptors, downstream pathways/mechanistic axes, membrane lipid remodeling, and execution outputs.
      pid: 1.2.2.p3
      section_heading: Consensus and gaps in inflammasome output control
    - type: paragraph
      text: Mitochondrial signals are widely observed in NLRP3 priming and assembly contexts, but their causal position is often stimulus- and time-dependent, requiring stratified interpretation. Inflammatory stimuli can drive NLRP3 or adaptor enrichment at mitochondria or mitochondria-associated membranes, suggesting spatial platforms for assembly. Mitochondria-derived signals such as mtROS, cytosolic mtDNA, and membrane potential changes can enhance inflammasome activity in multiple models. However, these signals are better viewed as context-dependent background factors rather than a single necessary causal trigger, because in some settings they precede and amplify assembly whereas in others they may reflect downstream consequences of execution events. Mitochondrial injury spans a continuum rather than an all-or-none state; limited perturbations may support assembly or cytokine release, whereas accumulation beyond thresholds is more likely to promote widespread permeabilization and lytic
        death. {doi:10.1016/j.immuni.2013.08.001} {doi:10.4049/jimmunol.1301490}
      pid: 1.2.3.p1
      section_heading: Consensus and gaps in inflammasome output control
    - type: paragraph
      text: CL is a signature anionic lipid whose distribution, oxidation, and externalization can influence mitochondrial permeabilization thresholds and multiple pore-forming events, positioning it as a candidate execution-interface readout. Under stress and pathology, CL can externalize or become exposed on the outer membrane, promoting membrane association and insertion of key proteins (tBID, BAX, cytochrome c, and gasdermins), shaping curvature and pore formation/stability. CL externalization has been proposed as a membrane-interface signal relevant to inflammasome-associated pathways. {doi:10.1126/science.aao6047} {doi:10.1016/j.bbalip.2016.08.005} {doi:10.1016/j.immuni.2013.08.001}
      pid: 1.2.4.p1
      section_heading: Consensus and gaps in inflammasome output control
    - type: paragraph
      text: Direct evidence suggests GSDMD-NT can couple to mitochondrial membrane lipid environment and trigger mitochondrial damage before plasma-membrane lysis, strengthening the notion of CL as an execution-interface candidate. Gasdermins (notably GSDMD) can directly bind mitochondrial CL, induce mitochondrial inner and outer membrane permeabilization, and promote release of mtDNA and proteins to amplify inflammation. Disease models further highlight coupling between mitochondrial injury and pore events, consistent with membrane-environment amplification of execution. In apoptosis, CL is also implicated in tBID-mediated BAX activation and subsequent cytochrome c release, indicating that CL’s interface role is not confined to a single death modality. At the same time, evidence strength varies across putative receptor–CL axes, leaving mechanistic chains to be systematically established. {doi:10.1016/j.immuni.2023.10.004} {doi:10.1016/j.celrep.2018.09.071} {doi:10.1096/fj.202100085r} {doi:10.1016/j.jbc.2023.102908}
        {doi:10.1016/j.cell.2022.06.038} {doi:10.1038/s41467-019-09397-2} {doi:10.1038/2503} {doi:10.1016/j.neuron.2023.02.019} {doi:10.1016/j.immuni.2021.04.012} {doi:10.1016/j.celrep.2018.10.103} {doi:10.1016/j.celrep.2018.10.087} {doi:10.1016/j.chemphyslip.2013.12.002} {doi:10.1016/j.bbrc.2008.01.055}
      pid: 1.2.4.p2
      section_heading: Consensus and gaps in inflammasome output control
    - type: paragraph
      text: Eph receptors are contact-dependent bidirectional RTKs that translate spatial microenvironmental interactions into cellular behaviors, positioning them at key immune interfaces relevant to inflammatory output control. Eph–ephrin activation occurs at cell–cell contact interfaces and triggers both forward (receptor-side) and reverse (ligand-side) signaling cascades, coupling spatial proximity and localization to migration, adhesion, cytoskeletal remodeling, and microenvironmental organization. In immunopathological contexts, Eph–ephrin signaling has been repeatedly implicated in immune-cell migration, tissue entry, adhesion coordination, and spatial organization of intercellular communication within inflammatory microenvironments.
      pid: 1.2.5.p1
      section_heading: Consensus and gaps in inflammasome output control
    - type: paragraph
      text: 'Existing work suggests Eph signaling can intersect PI3K–Akt and MAPK branches and influence mitochondrial integrity, ROS, dynamics, and cell-fate thresholds in a context-dependent manner. In acute injury models such as myocardial ischemia–reperfusion, Eph stimulation is associated with protective changes in mitochondrial ultrastructure and function and correlates with indicators such as mPTP opening and cristae stability. In vascular or endothelial settings, loss of specific Eph subtypes coincides with decreased membrane potential, increased ROS, and impaired antioxidant/biogenesis axes. Mechanistic evidence supports Eph–PI3K/Akt contributions to maintaining mitochondrial outer-membrane stability and anti-apoptotic capacity, and Eph–ERK effects on DRP1 phosphorylation, mitochondrial fragmentation, and death sensitivity. In neural injury contexts, Eph-related axes have been linked to iron homeostasis and antioxidant networks with ferroptosis-like phenotypes. Together, these examples
        support an abstract consensus: Eph signaling can span ‘plasma-membrane spatial cues → mitochondrial homeostasis/membrane structure → fate thresholds and output forms’, with strong dependency on subtype, cell type, and microenvironment. {doi:10.1016/j.lfs.2021.119954} {doi:10.1016/j.fct.2019.110960} {doi:10.18632/oncotarget.12838} {doi:10.4103/1673-5374.369118}'
      pid: 1.2.5.p2
      section_heading: Consensus and gaps in inflammasome output control
    - type: paragraph
      text: Major gaps remain in mapping EphB1 to inflammasome/pyroptosis execution, and in coupling EphB1-driven mitochondrial effects to quantifiable membrane-environment readouts such as CL state. First, much of the literature emphasizes ‘Eph–mitochondria–apoptosis/metabolism’ rather than inflammasome–pyroptosis execution, and mitochondrial readouts (ΔΨm, ROS, dynamics) are often difficult to place causally as upstream triggers versus downstream amplification. Second, Eph family functions are pleiotropic, and even closely related EphB subtypes can show opposing effects across tissues, limiting inference by family membership. Third, and most directly relevant here, even if Eph signaling affects mitochondria, a mechanistic framework is missing that links EphB1 via downstream pathways/mechanistic axes to changes in mitochondrial membrane environment—especially CL abundance/remodeling/oxidation/externalization—and further translates these changes into execution-layer differences such as GSDMD
        pore threshold and efficiency, culminating in reshaped IL-1β release and lytic permeabilization.
      pid: 1.2.5.p3
      section_heading: Consensus and gaps in inflammasome output control
    - type: paragraph
      text: Within the priming–assembly–execution framework of inflammasome biology, the execution layer largely determines output amplitude, timing, and tissue cost, making ‘execution thresholds’ a more informative target than ‘activation strength’ alone. In pyroptosis, cleavage of GSDMD generates an N-terminal fragment that oligomerizes into pores, enabling cytokine release, osmotic imbalance, and lytic death. Recent work further separates execution into ‘pore formation’ and ‘post-pore terminal rupture amplification’ (for example, via NINJ1), enabling stratified attribution of ‘how much is released, whether rupture occurs, and when’ as experimentally distinguishable questions. Thus, rather than generalizing differences as ‘inflammasome activation’, a more explanatory and translationally aligned question is why execution outputs diverge in amplitude and form under similar activation contexts. {doi:10.1038/s41586-023-05991-z}
      pid: 1.3.p1
      section_heading: Scientific question, hypotheses, and study objectives
    - type: paragraph
      text: Execution efficiency is constrained by membrane physicochemical environment, and this study defines the membrane environment of interest as the integrated state represented by cardiolipin metabolism rather than a single lipid event. CL is a signature tetra-acyl lipid of the mitochondrial inner membrane, tightly coupled to cristae structure, respiratory-chain organization, and oxidative phosphorylation efficiency. CL abundance, acyl-chain composition, remodeling balance, and oxidation state are plastic under stress, metabolic dysregulation, and inflammation, and can reshape mitochondrial membrane structure and interface properties. Disease and review literature (for example, Barth syndrome as a CL paradigm) underscores CL as a metabolic–structural–functional hub whose network-level changes can coordinate mitochondrial function with cell-fate decisions. {doi:10.1016/j.febslet.2006.07.022}
      pid: 1.3.p2
      section_heading: Scientific question, hypotheses, and study objectives
    - type: paragraph
      text: To avoid overcommitment to microdomain-level claims, this study explicitly adopts a multi-readout strategy for CL state and treats each readout within its interpretive boundary. Chemically quantitative lipidomics will be used to assess CL abundance and species distribution, and ratio-type indices related to remodeling or oxidation (e.g., MLCL/CL, oxCL/CL) to provide independent evidence of state changes. In parallel, functional/interface-linked readouts such as NAO staining will be used to suggest CL-related membrane-interface changes, while recognizing that NAO reports a ‘stainable/accessibility-related’ state influenced by membrane environment and dye behavior rather than absolute quantification of nanoscale pools or binding sites. The falsifiable criterion is not identifying a precise microdomain binding site, but whether reproducible CL-state changes align in direction and time with execution-output differences in pore formation/permeabilization/cytokine release. {doi:10.1111/j.1432-1033.1992.tb17285.x}
      pid: 1.3.p3
      section_heading: Scientific question, hypotheses, and study objectives
    - type: paragraph
      text: 'The central gap can therefore be stated as a falsifiable linkage: how an upstream receptor signal engages downstream pathways/mechanistic axes to reshape CL metabolism and membrane environment, and thereby translates into terminal inflammasome execution-output differences. Existing literature provides interface clues that gasdermins can interact with CL-related membrane environments to affect mitochondrial integrity, mtDNA release, and inflammatory amplification, coupling mitochondria to inflammasome outputs. Yet evidence largely remains at the level of ‘interface exists’ and ‘correlated coupling’, lacking a systems framework for how an upstream entry signal drives integrated CL metabolic changes. For EphB1 specifically, the key unknown is not whether it affects a single enzyme or event, but whether EphB1 signaling can, via downstream pathways/mechanistic axes, produce reproducible CL-state changes that are sufficient to explain changes in execution thresholds and efficiency.
        {doi:10.1016/j.immuni.2023.10.004} {doi:10.1038/s41467-019-09397-2}'
      pid: 1.3.p4
      section_heading: Scientific question, hypotheses, and study objectives
    - type: paragraph
      text: 'To address this question, the study adopts a closed-loop ‘discover–localize–validate’ design that decomposes the chain into three executable and falsifiable task modules with aligned readouts throughout. Input: genetic manipulation of EphB1 (e.g., KO/intervention) as the receptor-level entry variable under a unified inflammasome activation model and time-resolved sampling for comparability. Process: identify candidate downstream pathways from multi-omics/bioinformatics and prioritize ‘pathway/mechanistic axis as mediator’ using statistical mediation logic; then quantify CL-state and execution outputs in parallel with stratified priming/assembly markers to localize the layer of divergence. Output: complete causal tests with genetic plus pharmacologic masking/rescue or equivalent stratified strategies to validate whether perturbing a candidate pathway or correcting a candidate metabolic state coherently shifts CL readouts and execution outputs.'
      pid: 1.3.p5
      section_heading: Scientific question, hypotheses, and study objectives
    - type: paragraph
      text: 'Conceptually, this work contributes a layered causal narrative that reorganizes ‘signal–membrane environment–execution output’ with EphB1 as a candidate upstream entry and CL metabolic state as an integrated mitochondrial membrane readout. Rather than equating phenotypic differences with upstream inflammasome activation strength, the study emphasizes identifying which layer differs and whether execution thresholds and amplitude-limiting behavior can be tuned. The model is framed as evidence-bounded and falsifiable: it aims to test whether CL metabolic state is sufficient to account for execution-output divergence, without overclaiming complete molecular detail. The Results are organized as: downstream pathway/mechanistic axis prioritization → CL metabolic and membrane-environment phenotyping → stratified attribution and causal validation of execution outputs.'
      pid: 1.3.p6
      section_heading: Scientific question, hypotheses, and study objectives
