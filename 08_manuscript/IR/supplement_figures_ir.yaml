  figure_legend_en: '(s2_a) Cytosolic mtDNA abundance measured by subcellular fractionation followed by qPCR in primary peritoneal
    macrophages at the indicated time points during NLRP3 inflammasome activation.


    (s2_b) GSDMD abundance in mitochondrial fractions and total lysates from primary peritoneal macrophages at different time
    points during NLRP3 inflammasome activation.


    (c,d) Total and cytosolic mtDNA abundance measured by subcellular fractionation followed by qPCR in primary peritoneal
    macrophages at the indicated time points during NLRP3 inflammasome activation, comparing WT and EphB1-deficient cells.


    Data are presented as mean ± SD unless otherwise indicate. n denotes biologically independent samples. For panels (c–d),
    n ≥ 3 per group, and results were reproduced in ≥3 independent experiments. Statistical significance was assessed using
    two-tailed unpaired t-tests. transcript levels were normalized to total component and expressed relative to unstimulated
