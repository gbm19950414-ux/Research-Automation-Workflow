  figure_legend_en: '(s1_a) qPCR analysis of transcriptional priming markers in primary peritoneal macrophages at the indicated
    time points following LPS stimulation, comparing WT and EphB1-deficient cells.


    (s1_b) Cytokines release in supernatants from primary peritoneal macrophages following LPS priming and NLRP3 activation
    with increasing doses of nigericin, comparing WT and EphB1-deficient cells.


    Data are presented as mean ± SD unless otherwise indicate. n denotes biologically independent samples. For panels (a,b),
    n ≥ 3 per group, and results were reproduced in ≥3 independent experiments; Statistical significance was assessed using
    two-tailed unpaired t-tests. In panels (a), transcript levels were normalized to GAPDH and expressed relative to unstimulated
    controls; in panel (b), ELISA signals were background-subtracted and normalized to cell number. *P < 0.05, **P < 0.01,
    ***P < 0.001; ns, not significant.'
