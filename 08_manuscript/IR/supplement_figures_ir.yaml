  figure_legend_en: '(a) NAO-associated fluorescence measured by imaging analysis in primary peritoneal macrophages under
    unstimulated conditions, comparing WT and EphB1-deficient cells.


    (b) Pharmacological inhibition of iPLA2 with BEL reduces NAO-associated fluorescence and collapses genotype-dependent
    differences in WT and Ephb1-deficient primary peritoneal macrophages.


    (c) IL-1β release in culture supernatants from primary peritoneal macrophages following AD pretreatment, LPS priming,
    and nigericin stimulation, comparing WT and EphB1-deficient cells across the indicated doses and treatment durations.


    Data are presented as mean ± SD unless otherwise indicated, and n denotes biologically independent samples or experiments.
    For panels (a,b), n ≥ 3 per group, with results reproduced in ≥3 independent experiments; NAO fluorescence was quantified
    under matched acquisition settings, and statistical significance was assessed using two-tailed unpaired t-tests. For panel
    (c), n ≥ 3 independent experiments per group, with results reproduced in ≥3 independent experiments; statistical significance
    was assessed using two-tailed unpaired t-tests. *P < 0.05, **P < 0.01, ***P < 0.001; ns, not significant.'
