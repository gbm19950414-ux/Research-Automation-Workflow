    - type: figure
      id: Figure 5
      title: Multi-omics integration prioritizes the membrane-context axis as the dominant perturbation
      legend: '(a) Conceptual diagram illustrating six mechanistic axes of cardiolipin metabolism and their organization into
        an ER–mitochondria–centered framework used to interpret EphB1-dependent multi-omics changes.. Not applicable Not applicable.
        Readout: Six cardiolipin-related mechanistic axes, including synthesis, remodeling, transport, supply, oxidation,
        and membrane context (Schematic representation). Normalization: Not applicable. n: Not applicable; stats: Not applicable.
        This model serves as a mechanistic coordinate system for organizing transcriptomic and lipidomic readouts in subsequent
        figures and does not imply quantitative relationships or directionality. (b) Curated table of representative lipid
        readouts and key genes mapped to six cardiolipin-related mechanistic axes, including explicit directionality conventions
        (bottleneck_sign) and within-axis weights to support axis-level scoring and interpretation.. Not applicable Not applicable.
        Readout: Axis assignment, feature definitions, formulae (for lipid metrics), biological interpretations, directionality
        (bottleneck_sign), and weights for supply, transport, synthesis, remodeling, oxidation, and membrane context axes
        (Structured table (lookup resource)). Normalization: Not applicable. n: Not applicable; stats: Not applicable. This
        table is used as an interpretable reference for constructing axis-level transcript/lipid scores and for linking curated
        features to the mechanistic schematic in Fig. 6A; it does not present quantitative comparisons. (c) Integrated workflow
        summarizing how multi-batch RNA-seq, untargeted lipidomics, and targeted cardiolipin panel datasets were quality-controlled,
        normalized, batch-modeled, and compressed into mechanistic axis Z scores and cardiolipin-related indicators for downstream
        multi-omics integration.. Not applicable Not applicable. Readout: Processing nodes and dependencies from raw datasets
        to axis-level Z scores, integrated multi-omics Z values, and axis–cardiolipin phenotype regression readouts (Schematic
        representation of computational workflow). Normalization: Not applicable. n: Not applicable; stats: Not applicable.
        The diagram emphasizes batch-aware modeling for RNA-seq (DESeq2 ~ batch + group), within-batch normalization for lipidomics
        (PQN to QC median profile), and feature aggregation into predefined mechanistic axes before cross-omics integration
        (Stouffer-weighted Z) and axis–cardiolipin phenotype mapping. (d) Batch-level effect_z matrix summarizing the direction
        and magnitude of EphB1 deficiency–associated changes across six mechanistic axes in RNA-seq and lipidomics datasets..
        Steady-state condition without additional stimulation Single endpoint per batch. Readout: Mechanistic axis effect_z
        values derived from batch-specific KO versus WT comparisons in RNA-seq and lipidomics datasets (RNA-seq differential
        expression modeling (DESeq2, batch-wise) and lipidomics normalization followed by axis-level feature aggregation).
        Normalization: Effect_z values were calculated within each batch and are displayed without cross-batch pooling or
        global scaling. n: RNA-seq: 3 batches; lipidomics: 4 batches; stats: not applicable (directional consistency analysis).
        Effect_z values represent directional effect sizes rather than formal significance testing; consistency across batches
        and omics layers was used as the primary robustness criterion. (e) Overall multi-omics Z scores summarizing Ephb1−/−
        versus WT effects across six predefined mitochondrial-related mechanistic axes by Stouffer meta-analysis of RNA-seq
        and lipidomics batches.. Not applicable (integrated analysis of existing omics datasets) Single endpoint per batch
        (see Methods for dataset-specific timing). Readout: Axis-level Z_multiomics_overall values for six mechanistic axes
        (Batch-aware axis scoring in RNA-seq and lipidomics followed by Stouffer meta-analysis within each omics layer and
        equal-weight Stouffer integration across omics). Normalization: Z scores were defined with direction as Ephb1−/− relative
        to WT; positive values indicate increased bottleneck strength and negative values indicate decreased bottleneck strength.
        n: RNA-seq: 3 batches; lipidomics: 3–4 batches; stats: Two-sided p values derived from Stouffer-combined Z scores.
        Mechanistic axes include Synthesis, Remodeling, Oxidation, Transport, Supply, and Membrane context. The Membrane context
        axis shows the largest absolute integrated effect in this analysis. (f) Cross-batch linear regression linking mechanistic
        axis combined Z scores (HO–WT) to batch-matched HO–WT differences in total cardiolipin abundance (sum_CL) to test
        whether axis-level effects predict cardiolipin content at the batch level.. Not applicable (computational association
        analysis using batch-matched contrasts) Single endpoint per batch; each batch contributes one paired data point. Readout:
        Association between combined Z (HO–WT) per mechanistic axis and sum_CL (HO–WT) (Linear regression performed per axis
        using batch-level paired contrasts). Normalization: Both predictors (combined Z) and outcomes (sum_CL) were defined
        as HO–WT differences within each batch to reduce batch effects; no log transformation was applied. n: n = 3–4 batches
        (axis-dependent point availability); stats: Linear regression / correlation test per axis. None of the axis–sum_CL
        associations reached statistical significance in the current batch range; the Membrane context axis showed the largest
        absolute correlation magnitude (r = −0.65, p = 0.35). # ---------- 8. English ----------.'
