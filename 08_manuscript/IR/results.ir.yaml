  sections:
  - id: results
    title: Results
    blocks:
    - type: heading
      level: 2
      text: Ephb1 deficiency reduces pyroptosis and IL-1β release
    - type: paragraph
      text: To identify regulators of inflammasome,
      source: opening_and_trans.yaml
      panel_id: ''
    - type: paragraph
      text: To identify regulators of inflammasome output, we subjected primary macrophages from multiple PiggyBac (PB) genetic
        backgrounds to standardized NLRP3 inflammasome activation and used IL-1β release as the screening readout (Fig. 1a).
      source: figure_1_a_000.yaml
      panel_id: 1a
    - type: paragraph
      text: Across the 10 screened strains, most showed little or no genotype-dependent difference in IL-1β release after
        nigericin stimulation, and only two reached statistical significance in within-strain comparisons (Fig. 1b). The Ephb1-associated
        strain (081230020-HRB) showed a pronounced reduction in IL-1β release in EphB1-deficient macrophages (~41% relative
        to WT; P≈0.034), representing the strongest statistically significant effect in the screen and nominating Ephb1 for
        mechanistic analysis.
      source: figure_1_b_001.yaml
      panel_id: 1b
    - type: paragraph
      text: We next tested whether this phenotype extended beyond a single inflammasome agonist. Across all three activation
        routes, Ephb1-deficient macrophages released significantly less IL-1β than WT controls (Fig. 1c). These data indicate
        that the reduced IL-1β output in EphB1-deficient macrophages is not limited to a single activation route, supporting
        a role for EphB1 downstream of receptor-specific triggering.
      source: figure_1_c_v2.yaml
      panel_id: 1c
    - type: paragraph
      text: We next tested whether Ephb1 loss also constrains lytic execution across distinct inflammasome sensors. Across
        all inflammasome activation conditions, Ephb1-deficient macrophages consistently showed reduced LDH release relative
        to WT controls (Fig. 1d). These findings indicate that EphB1 deficiency broadly attenuates pyroptotic lysis downstream
        of distinct inflammasome receptors, consistent with a role in a shared execution step.
      source: figure_1_d_v2.yaml
      panel_id: 1d
    - type: paragraph
      text: We therefore asked whether the defect in Ephb1-deficient macrophages reflects impaired upstream priming or assembly,
        or instead a restriction at the terminal GSDMD-dependent execution stage.
      source: opening_and_trans.yaml
      panel_id: ''
    - type: heading
      level: 2
      text: Ephb1 deficiency reduces pyroptotic execution
    - type: paragraph
      text: To localize the Ephb1-dependent defect within the inflammasome pathway, we compared responses triggered by NLRP3,
        AIM2, and NLRC4 in WT and Ephb1-deficient macrophages.
      source: opening_and_trans.yaml
      panel_id: ''
    - type: paragraph
      text: LPS stimulation induced robust and comparable increases in Tnf, Il6, and Il1b mRNA in WT and Ephb1-deficient macrophages
        across all examined time points (Fig. 2a,b). Together, these data indicate that Ephb1 deficiency does not impair TLR4–NF-κB–dependent
        transcriptional priming.
      source: figure_2_a+b.yaml
      panel_id: 2a/b
    - type: paragraph
      text: To assess whether secretion was broadly impaired, we measured conventional cytokine release. LPS stimulation induced
        comparable TNF-α and IL-6 release in WT and Ephb1-deficient macrophages, with no significant genotype-dependent differences
        (Fig. 2c). Thus, Ephb1 deficiency does not measurably impair TLR4-driven secretion of TNF-α or IL-6, arguing against
        a generalized secretory defect as the basis for reduced inflammasome output.
      source: figure_2_c_v2.yaml
      panel_id: 2c
    - type: paragraph
      text: We then tested whether the Ephb1-dependent difference in IL-1β release persisted across different levels of inflammasome
        stimulation. While IL-1β release increased with higher nigericin doses in both genotypes, Ephb1-deficient macrophages
        consistently released less IL-1β than WT controls at each dose (Fig. 2d). These results indicate that Ephb1 deficiency
        limits mature IL-1β release across the tested range of NLRP3 activation, consistent with a defect at a late execution
        or export step.
      source: figure_2_d.yaml
      panel_id: 2d
    - type: paragraph
      text: We then tested whether the defect arose at the level of ASC inflammasome assembly. Under NLRP3 activation conditions,
        Ephb1-deficient macrophages showed ASC oligomer, dimer, and monomer levels comparable to those in WT controls (Fig.
        2e). These data indicate that Ephb1 deficiency does not disrupt ASC oligomerization during NLRP3 activation, arguing
        against defective inflammasome assembly as the cause of reduced downstream output..
      source: figure_2_e.yaml
      panel_id: 2e
    - type: paragraph
      text: We then tested whether caspase-1 activation was preserved. Caspase-1 activation, as reflected by intracellular
        p20 levels, was comparable between WT and Ephb1-deficient macrophages (Fig. 2f). These results localize the Ephb1-dependent
        defect to a step downstream of caspase-1 activation.
      source: figure_2_f.yaml
      panel_id: 2f
    - type: paragraph
      text: We then tested whether the canonical caspase-1 substrates, pro-IL-1β and GSDMD, were processed normally. Caspase-1–dependent
        cleavage of GSDMD and pro–IL-1β occurred efficiently in Ephb1-deficient macrophages, with cleavage and maturation
        levels comparable to those in WT cells (Fig. 2g). Together, these results show that Ephb1 deficiency does not impair
        caspase-1 substrate cleavage but selectively limits extracellular release of mature inflammasome products, localizing
        the defect to a late execution or export step.
      source: figure_2_g.yaml
      panel_id: 2g
    - type: paragraph
      text: We therefore asked whether the Ephb1-dependent defect specifically affects the early interaction of GSDMD-NT with
        mitochondria before pore function and organelle injury.
      source: opening_and_trans.yaml
      panel_id: ''
    - type: heading
      level: 2
      text: Ephb1 deficiency reduces mitochondrial enrichment of GSDMD
    - type: paragraph
      text: To investigate how Ephb1 regulates pyroptotic execution, we examined mitochondrial integrity and GSDMD localization
        during NLRP3 activation in WT and Ephb1-deficient macrophages.
      source: opening_and_trans.yaml
      panel_id: ''
    - type: paragraph
      text: Upon inflammasome activation, Ephb1-deficient macrophages showed reduced cytosolic ROS accumulation and less mitochondrial
        depolarization than WT cells. By contrast, mitochondrial ROS levels measured by MitoSOX did not differ significantly
        between genotypes (Fig. 3a,b,c,d,e,f,g,h). Together, these results indicate that Ephb1 promotes early mitochondrial
        enrichment of GSDMD-NT during inflammasome activation.
      source: figure_3_a+b+c+d+e+f+g+h.yaml
      panel_id: 3a/b/c/d/e/f/g/h
    - type: paragraph
      text: We then tested whether Ephb1 deficiency alters early mitochondrial content release during inflammasome activation.
        In WT macrophages, inflammasome activation induced a rapid, transient pulse of cytosolic mtDNA that peaked at 7.5
        min, whereas this peak was markedly reduced in Ephb1-deficient macrophages (Fig. 3i,j,s3,d,f,g). Together, these results
        indicate that Ephb1 deficiency reduces inflammasome-induced release of mitochondrial DNA into the cytosol without
        altering total mtDNA abundance.
      source: figure_3_i+j+s3_d+f+g.yaml
      panel_id: 3/i/j/s3/d/f/g
    - type: paragraph
      text: We then asked whether GSDMD recruitment to mitochondria followed a similar temporal pattern. In WT macrophages,
        GSDMD-NT accumulated in the mitochondrial fraction at approximately 7.5 min after inflammasome activation, whereas
        this early mitochondrial enrichment was markedly reduced in Ephb1-deficient macrophages (Fig. 3k,s3e). Together, these
        results indicate that EphB1 promotes early mitochondrial enrichment of GSDMD-NT during inflammasome activation.
      source: figure_3_k+s3_e.yaml
      panel_id: 3k/s3e
    - type: paragraph
      text: We therefore asked whether cardiolipin abundance at the mitochondrial membrane accounts for the reduced mitochondrial
        engagement of GSDMD-NT.
      source: opening_and_trans.yaml
      panel_id: ''
    - type: heading
      level: 2
      text: Ephb1 deficiency reduces cardiolipin abundance
    - type: paragraph
      text: To determine whether mitochondrial membrane composition contributes to the Ephb1-dependent phenotype, we quantified
        cardiolipin abundance in WT and Ephb1-deficient macrophages.
      source: opening_and_trans.yaml
      panel_id: ''
    - type: paragraph
      text: Ephb1-deficient macrophages displayed significantly lower NAO fluorescence than WT cells, indicating a reduced
        NAO-detectable cardiolipin pool (Fig. 4a,b).
      source: figure_4_a+b.yaml
      panel_id: 4a/b
    - type: paragraph
      text: Lipidomic analysis was then used to determine whether total cardiolipin abundance was also altered. Compared with
        WT cells, Ephb1-deficient macrophages showed a significant reduction in total cardiolipin abundance, to approximately
        70% of WT levels (Fig. 4c,d). Together, these data show that Ephb1 deficiency reduces both the NAO-accessible cardiolipin
        pool and total cardiolipin abundance.
      source: figure_4_c+d.yaml
      panel_id: 4c/d
    - type: paragraph
      text: We then tested whether pharmacological inhibition of cardiolipin biosynthesis reduced cardiolipin abundance. AD
        treatment markedly reduced NAO fluorescence in WT macrophages, indicating that pharmacological inhibition of cardiolipin
        biosynthesis reduces the NAO-detectable cardiolipin pool (Fig. 4e,f).
      source: figure_4_e+f.yaml
      panel_id: 4e/f
    - type: paragraph
      text: We then tested whether reduced cardiolipin abundance affected inflammasome-mediated IL-1β release. AD treatment
        markedly suppressed LPS- and nigericin-induced IL-1β release in macrophages (Fig. 4g). These results indicate that
        pharmacological reduction of cardiolipin is sufficient to suppress inflammasome-induced IL-1β release.
      source: figure_4_g.yaml
      panel_id: 4g
    - type: paragraph
      text: We then tested whether perturbing cardiolipin remodeling produced a similar effect. BEL treatment led to a marked
        reduction in NAO fluorescence intensity, indicating that pharmacological interference with cardiolipin remodeling
        reduces the NAO-detectable cardiolipin pool (Fig. S4a,b). Together, these results show that both reduced cardiolipin
        content and disrupted cardiolipin remodeling can lower NAO staining, indicating that the NAO-accessible cardiolipin
        pool can be altered through multiple mechanisms beyond changes in total cardiolipin levels.
      source: figure_4_sa+b.yaml
      panel_id: s4a/b
    - type: paragraph
      text: We then tested whether perturbing cardiolipin remodeling similarly affected inflammasome-mediated IL-1β release.
        Across both perturbation strategies, reduced cardiolipin availability consistently decreased LPS- and nigericin-induced
        IL-1β release (Fig. S4c). Together, these results show that perturbations affecting cardiolipin abundance or remodeling
        consistently reduce inflammasome-mediated IL-1β release.
      source: figure_4_sc.yaml
      panel_id: s4c
    - type: heading
      level: 2
      text: Membrane context is the dominant cardiolipin-related axis perturbed by Ephb1 deficiency
    - type: paragraph
      text: To identify cellular processes associated with cardiolipin variation, we constructed cardiolipin-centered biological
        process axes and evaluated their associations with cardiolipin abundance across batches.
      source: opening_and_trans.yaml
      panel_id: ''
    - type: paragraph
      text: The resulting framework comprised six functional axes—synthesis, remodeling, transport, supply, oxidation, and
        membrane context—each represented by genes and lipid readouts derived from transcriptomic and lipidomic datasets (Fig.
        5a).
      source: figure_5_a.yaml
      panel_id: 5a
    - type: paragraph
      text: For each axis, representative genes and lipid features were specified using predefined weighting and inclusion
        rules (Fig. 5b).
      source: figure_5_b.yaml
      panel_id: 5b
    - type: paragraph
      text: For each omics layer, raw data underwent quality control, normalization, and batch-aware modeling, followed by
        aggregation into predefined axis-level Z scores used for multi-omics integration (Fig. 5c).
      source: figure_5_c.yaml
      panel_id: 5c
    - type: paragraph
      text: Across three RNA-seq batches and four lipidomics batches, only the membrane context axis showed a consistent positive
        effect across both omics layers (Fig. 5d). These results identify membrane context as the only axis consistently perturbed
        by Ephb1 deficiency across datasets.
      source: figure_5_d.yaml
      panel_id: 5d
    - type: paragraph
      text: Among the six axes, membrane context showed the largest deviation from zero, with a multi-omics Z score of approximately
        +2.6 (Fig. 5e). These results identify membrane context as the dominant cardiolipin-related axis perturbed by Ephb1
        deficiency.
      source: figure_5_e.yaml
      panel_id: 5e
    - type: paragraph
      text: Among all axes, the membrane context axis showed the strongest negative association with sum_CL, such that higher
        combined Z scores corresponded to lower total cardiolipin levels, whereas all other axes showed weak or near-zero
        correlations (Fig. 5f). These results indicate that total cardiolipin abundance closely tracks membrane context axis
        perturbation across batches.
      source: figure_5_f.yaml
      panel_id: 5f
    - type: paragraph
      text: We therefore asked which downstream Ephb1-associated signaling pathways correlate most strongly with the membrane
        context axis.
      source: opening_and_trans.yaml
      panel_id: ''
    - type: heading
      level: 2
      text: PI3K–AKT–mTOR signaling correlates with the membrane-context axis
    - type: paragraph
      text: To identify Ephb1 downstream signaling pathways associated with the membrane context axis, we constructed Ephb1-related
        pathway gene sets and evaluated their transcriptional changes across batches and their correlation with the membrane
        context axis.
      source: opening_and_trans.yaml
      panel_id: ''
    - type: paragraph
      text: We used an RNA-based framework to evaluate how Ephb1-dependent pathway scores associate with the membrane context
        axis (Fig. 6a).
      source: figure_6_a.yaml
      panel_id: 6a
    - type: paragraph
      text: Candidate Ephb1 downstream signaling gene sets were then defined for pathway-level analysis. Each gene set represents
        an EphB1-associated signaling pathway with predefined gene members and scoring directionality (Fig. 6b).
      source: figure_6_b.yaml
      panel_id: 6b
    - type: paragraph
      text: Across three RNA-seq batches, Ephb1 deficiency consistently reduced PI3K–AKT–mTOR pathway scores (KO < WT). NF-κB/ROS
        and JAK–STAT modules showed weaker or batch-dependent reductions, whereas cytoskeleton-related pathways showed positive
        shifts (Fig. 6c).
      source: figure_6_c_v2.yaml
      panel_id: 6c
    - type: paragraph
      text: We then asked which pathways showed the largest overall shifts across batches. Across pathways, PI3K–AKT–mTOR
        and JAK–STAT modules showed the largest downward shifts in Ephb1-deficient macrophages, whereas cytoskeleton/adhesion
        pathways (FAK–Src–Rho) showed positive shifts (Fig. 6d). Together, these results prioritize PI3K–AKT–mTOR as the most
        robust Ephb1-associated downstream signaling candidate.
      source: figure_6_d_v2.yaml
      panel_id: 6d
    - type: paragraph
      text: We then asked whether these pathway shifts correlated with the membrane context axis. Notably, the PI3K–AKT–mTOR
        pathway showed coordinated shifts along both axes, with KO samples displaced toward lower M and higher Z values, whereas
        WT samples occupied the opposite quadrant. In contrast, the JAK–STAT and FAK–Src–Rho pathways separated primarily
        along the Z axis while largely overlapping along the M axis (Fig. 6e). These results show that reduced PI3K–AKT–mTOR
        signaling is consistently associated with increased membrane context axis scores.
      source: figure_6_e_v2.yaml
      panel_id: 6e
  - id: figures
    title: Figures
    blocks:
    - type: figure
      id: Figure 1
      title: Ephb1 deficiency reduces inflammasome-triggered pyroptosis and IL-1β release
      legend: (a) Schematic overview of the genetic screening strategy used to identify regulators of inflammasome output.
        (b) Normalized IL-1β release in culture supernatants across PB genetic backgrounds following nigericin-induced inflammasome
        activation, comparing WT and gene-deficient cells within each background. (c) IL-1β release in culture supernatants
        from primary peritoneal macrophages following activation of distinct inflammasome pathways with the indicated secondary
        stimuli, comparing WT and EphB1-deficient cells. (d) LDH release in culture supernatants from primary peritoneal macrophages
        following activation of the NLRP3, NLRC4, or AIM2 inflammasome under the indicated conditions, comparing WT and EphB1-deficient
        cells. Panel (a) is a schematic and does not contain quantitative data. Unless otherwise indicated, data are presented
        as mean ± SD, and n denotes biologically independent samples. Statistical significance was assessed using two-tailed
        unpaired t-tests, except that panel (b) was analyzed by two-tailed Welch’s t-test within each genetic background.
        Panels (c) and (d) were reproduced in ≥3 independent experiments. *P < 0.05, **P < 0.01, ***P < 0.001; ns, not significant.
      image_path: /Volumes/Samsung_SSD_990_PRO_2TB_Media/EphB1/06_figures/figs/figure_1_画板 1.png
    - type: figure
      id: Figure 2
      title: Ephb1 deficiency reduces GSDMD-dependent pyroptotic execution
      legend: (a,b) qPCR analysis of transcriptional priming markers in primary peritoneal macrophages at the indicated time
        points following LPS stimulation, comparing WT and EphB1-deficient cells. (c) TNF-α and IL-6 secretion in supernatants
        from primary peritoneal macrophages at the indicated time points following LPS stimulation, comparing WT and EphB1-deficient
        cells. (d) IL-1β release in supernatants from primary peritoneal macrophages following LPS priming and NLRP3 activation
        with increasing doses of nigericin, comparing WT and EphB1-deficient cells. (e) ASC oligomerization in soluble and
        insoluble fractions from primary peritoneal macrophages following LPS priming and NLRP3 activation, comparing WT and
        EphB1-deficient cells. (f) Pro-caspase-1 and cleaved caspase-1 p20 in total lysate and supernatant fractions from
        primary peritoneal macrophages following LPS priming and NLRP3 activation, comparing WT and EphB1-deficient cells.
        (g) GSDMD and IL-1β processing in total lysate and supernatant fractions from primary peritoneal macrophages following
        LPS priming and NLRP3 activation, comparing WT and EphB1-deficient cells. Data are presented as mean ± SD unless otherwise
        indicate. n denotes biologically independent samples. For panels (a,b,e–g), n ≥ 3 per group, and results were reproduced
        in ≥3 independent experiments; for panel (d), n = 3 biological replicates per group, and each point represents one
        biological replicate. Statistical significance was assessed using two-tailed unpaired t-tests. In panels (a,b), transcript
        levels were normalized to GAPDH and expressed relative to unstimulated controls; in panel (c), ELISA signals were
        background-subtracted and normalized to cell number; and in panels (e–g), lysate and supernatant or soluble and insoluble
        fractions were analyzed in parallel. *P < 0.05, **P < 0.01, ***P < 0.001; ns, not significant.
      image_path: /Volumes/Samsung_SSD_990_PRO_2TB_Media/EphB1/06_figures/figs/figure_2_画板 1.png
    - type: figure
      id: Figure 3
      title: Ephb1 deficiency reduces mitochondrial enrichment of GSDMD-NT
      legend: (a,b,c,d,e,f,g,h) Time-resolved measurements of cytosolic ROS, mitochondrial ROS, and mitochondrial membrane
        potential in primary peritoneal macrophages during NLRP3 inflammasome activation or under unstimulated baseline conditions,
        comparing WT and EphB1-deficient cells. (i,j) Cytosolic mtDNA abundance measured by subcellular fractionation followed
        by qPCR in primary peritoneal macrophages at the indicated time points during NLRP3 inflammasome activation, comparing
        WT and EphB1-deficient cells. (k) GSDMD-NT abundance in mitochondrial fractions and total lysates from primary peritoneal
        macrophages at the indicated early time points during NLRP3 inflammasome activation, comparing WT and EphB1-deficient
        cells. Mitochondrial abundance controls were assessed in parallel. Data are presented as mean ± SEM unless otherwise
        indicated. For panels (a–h), n ≥ 3 independent experiments, and fluorescence signals were normalized to the pre-stimulation
        baseline; statistical significance was assessed using two-tailed unpaired t-tests on area-under-the-curve or endpoint
        values, as indicated. Panels (g,h) show unstimulated baseline TMRM measurements. For panels (i,j), n ≥ 2 independent
        experiments per group, reproduced in ≥3 independent batches; cytosolic mtDNA was quantified by subcellular fractionation
        followed by qPCR and expressed relative to WT. For panel (k), n ≥ 3 biologically independent experiments per genotype,
        reproduced in ≥3 independent batches; mitochondrial and total GSDMD-NT abundance were assessed by immunoblotting and
        quantified by densitometry. Statistical significance was assessed using two-tailed unpaired t-tests. *P < 0.05, **P
        < 0.01, ***P < 0.001; ns, not significant.
      image_path: /Volumes/Samsung_SSD_990_PRO_2TB_Media/EphB1/06_figures/figs/figure_3_画板 1.png
    - type: figure
      id: Figure 4
      title: Ephb1 deficiency reduces cardiolipin abundance
      legend: (a,b) Pharmacological inhibition of iPLA2 with BEL reduces NAO-associated fluorescence and collapses genotype-dependent
        differences in WT and Ephb1-deficient primary peritoneal macrophages. (c,d) Total cardiolipin abundance and cardiolipin
        molecular species measured by LC–MS/MS lipidomics in resting primary peritoneal macrophages, comparing WT and EphB1-deficient
        cells. (e,f) NAO-associated fluorescence measured by fixed-exposure imaging in primary peritoneal macrophages following
        alexidine dihydrochloride (AD) treatment, comparing WT and EphB1-deficient cells. (g) IL-1β release in culture supernatants
        from primary peritoneal macrophages following AD pretreatment, LPS priming, and nigericin stimulation, comparing WT
        and EphB1-deficient cells across the indicated doses and treatment durations. (s4c) IL-1β release in culture supernatants
        from primary peritoneal macrophages following BEL pretreatment, LPS priming, and nigericin stimulation, comparing
        WT and EphB1-deficient cells across the indicated doses and treatment durations. Data are presented as mean ± SEM
        unless otherwise indicated, and n denotes biologically independent samples or experiments. For panels (a,b,e,f), n
        ≥ 3 per group, with results reproduced in ≥3 independent experiments; NAO fluorescence was quantified under matched
        acquisition settings, and statistical significance was assessed using two-tailed unpaired t-tests. For panels (c,d),
        n ≥ 3 biologically independent samples per group, reproduced in ≥2 independent batches; total cardiolipin abundance
        and species composition were quantified by LC–MS/MS lipidomics, and species-level comparisons were additionally evaluated
        with FDR correction. For panel (g), n ≥ 3 independent experiments per group, with results reproduced in ≥3 independent
        experiments; statistical significance was assessed using two-tailed unpaired t-tests, and genotype × dose effects
        were additionally evaluated by two-way ANOVA. *P < 0.05, **P < 0.01, ***P < 0.001; ns, not significant.
      image_path: /Volumes/Samsung_SSD_990_PRO_2TB_Media/EphB1/06_figures/figs/figure_4_画板 1.png
    - type: figure
      id: Figure 5
      title: Membrane context is the dominant cardiolipin-related axis perturbed by Ephb1 deficiency
      legend: (a) Conceptual diagram defining six cardiolipin-related mechanistic axes within an ER–mitochondria-centered
        framework for interpretation of transcriptomic and lipidomic changes. (b) Curated reference table assigning representative
        lipid readouts and key genes to the six cardiolipin-related mechanistic axes, with predefined directionality conventions
        and within-axis weights for axis-level scoring. (c) Integrated workflow summarizing batch-aware processing of RNA-seq,
        untargeted lipidomics, and targeted cardiolipin datasets into mechanistic axis scores and cardiolipin-related indicators
        for downstream multi-omics integration. (d) Batch-level effect_z matrix from RNA-seq and lipidomics datasets showing
        the direction and magnitude of EphB1 deficiency-associated changes across six mechanistic axes. (e) Integrated multi-omics
        Z scores for six predefined mechanistic axes derived from batch-level RNA-seq and lipidomics axis scores by Stouffer
        meta-analysis. (f) Cross-batch regression relating mechanistic axis combined Z scores to batch-matched differences
        in total cardiolipin abundance to assess whether axis-level effects predict cardiolipin content across batches. Panels
        (a–c) are conceptual or reference panels and do not present quantitative experimental comparisons or significance
        testing. Panels (d–f) summarize batch-level and integrated multi-omics analyses derived from WT and Ephb1−/− primary
        murine peritoneal macrophage datasets. In panel (d), effect_z values represent within-batch directional effect sizes
        and are interpreted by directional consistency across RNA-seq and lipidomics batches rather than by formal significance
        testing. In panel (e), batch-level axis scores were combined by Stouffer meta-analysis within and across omics layers;
        n denotes independent experimental batches (RNA-seq, 3 batches; lipidomics, 3–4 batches), and two-sided P values were
        derived from combined Z scores. In panel (f), each point represents one independent experimental batch; matched HO–WT
        contrasts were evaluated by linear regression / correlation analysis, and Pearson r and two-sided P values are reported.
        Unless otherwise indicated, significance is denoted as *P < 0.05, **P < 0.01, ***P < 0.001; ns, not significant.
      image_path: /Volumes/Samsung_SSD_990_PRO_2TB_Media/EphB1/06_figures/figs/figure_5_画板 1.png
    - type: figure
      id: Figure 6
      title: PI3K–AKT–mTOR signaling correlates with the membrane-context axis
      legend: (a) Conceptual diagram illustrating an RNA-first X–M–Z framework linking Ephb1 status, downstream signaling
        module scores, and the membrane-context axis, with independent lipid phenotypes used for directional concordance validation.
        (b) Curated reference table defining EphB1 downstream signaling modules and their expected relationships to cardiolipin-related
        mechanistic axes for pathway-level prioritization. (c) Pathway-level transcriptional response scores derived from
        RNA-seq across three independent batches, showing batch-specific z_pathway shifts and cross-batch meta Z effects for
        curated EphB1 downstream signaling modules. (d) Cross-batch ranking of Ephb1 downstream signaling modules based on
        genotype-associated transcriptional shifts and their coupling robustness with the membrane-context axis assessed by
        within-batch regression and pooled leave-one-out refitting. (e) Sample-level relationships between membrane-context
        axis scores and pathway mediator scores across independent RNA-seq batches, showing genotype-dependent clustering
        patterns for representative prioritized pathways. Panels (a,b) are conceptual or reference panels and do not present
        quantitative experimental comparisons or formal significance testing. Panels (c–e) summarize RNA-seq–based analyses
        from unstimulated WT and Ephb1−/− primary murine peritoneal macrophages across 3 independent batches. In panel (c),
        pathway-level transcriptional scores were standardized within batch and integrated across batches as meta Z values
        to summarize directional consistency and effect magnitude. In panel (d), module prioritization was based on batch-level
        transcriptional shifts together with within-batch regression and pooled leave-one-out refitting; n denotes independent
        RNA-seq batches or samples, as specified, and no multiple-comparison correction was applied because the analysis is
        intended for candidate ranking rather than formal inferential testing. In panel (e), each point represents one RNA-seq
        sample; quantitative prioritization incorporated transcriptional shifts, correlation, and leave-one-out stability,
        whereas fitted lines are shown for visualization only. Unless otherwise indicated, significance notation is not applied
        in this figure because panels (c–e) are intended for pathway ranking, coupling assessment, and structural visualization
        rather than formal hypothesis testing of a single endpoint.
      image_path: /Volumes/Samsung_SSD_990_PRO_2TB_Media/EphB1/06_figures/figs/figure_6_画板 1.png
