  sections:
  - id: results
    title: Results
    blocks:
    - type: heading
      level: 2
      text: EphB1 loss limits inflammasome-induced pyroptosis and IL-1β release
    - type: paragraph
      text: To establish the experimental and logical framework underlying the genetic screening strategy used to identify
        regulators of inflammasome-associated outputs. A standardized workflow was designed in which primary macrophages from
        multiple genetic backgrounds were subjected to uniform NLRP3 inflammasome activation and assessed using IL-1β release
        as the functional readout. Together, this framework provides the experimental basis for the screening results presented
        in Figure 1b, without implying any mechanistic interpretation at this stage.
      source: figure_1_a_000.yaml
      panel_id: 1a
    - type: paragraph
      text: Having outlined the genetic-screening strategy, we next sought to identify, across the full panel of perturbations,
        a candidate signal that is both reproducible and sufficiently prominent to prioritize for mechanistic dissection.
      tags:
      - transition
    - type: paragraph
      text: Following establishment of the genetic screening framework, we next asked whether any strains exhibit pronounced
        inflammasome-associated phenotypic differences under activation conditions. IL-1β release was quantified as the functional
        readout of inflammasome activation across multiple pb genetic backgrounds, with WT and HO cells compared within each
        strain. Among the screened strains, only a small subset displayed significant genotype-dependent differences in IL-1β
        release following Nigericin stimulation. Notably, the Ephb1-associated 081230020-HRB strain showed a statistically
        significant and reproducible reduction in IL-1β release, supported by adequate biological replicates and within-strain
        statistical testing. Compared with other genetic backgrounds, the Ephb1 strain exhibited the most consistent and robust
        inflammasome-associated phenotype, prioritizing Ephb1 as a leading candidate for subsequent mechanistic investigation.
      source: figure_1_b_001.yaml
      panel_id: 1b
    - type: paragraph
      text: Having prioritized EphB1 from the screen, we next asked whether the phenotype generalizes beyond a single inflammasome
        agonist, thereby arguing against a stimulus-specific artifact.
      tags:
      - transition
    - type: paragraph
      text: Having identified Ephb1 as a candidate strain with reduced IL-1β output upon Nigericin stimulation, we next asked
        whether this phenotype generalizes across distinct inflammasome receptor pathways rather than reflecting a Nigericin-specific
        effect. WT and Ephb1 pb/pb primary peritoneal macrophages were LPS-primed and then activated via NLRP3 (Nigericin),
        NLRC4 (cytosolic flagellin delivery), or AIM2 (cytosolic poly(dA:dT) delivery), and IL-1β release was quantified by
        ELISA with background subtraction and MTT-based normalization. Across all three activation routes, Ephb1 pb/pb macrophages
        released significantly less IL-1β than WT controls. The reduction was statistically significant for each stimulus
        and remained consistent across independent experiments after dual background correction and cell-number normalization.
        These data indicate that the diminished IL-1β output in Ephb1 pb/pb macrophages is not restricted to a single receptor
        pathway, supporting a role for EphB1 in a shared downstream execution process.
      source: figure_1_c_v2.yaml
      panel_id: 1c
    - type: paragraph
      text: Having established cross-agonist consistency within inflammasome, we next asked whether EphB1 loss broadly constrains
        lytic execution across distinct inflammasome sensors.
      tags:
      - transition
    - type: paragraph
      text: To test whether the reduced inflammasome output observed upon EphB1 deficiency extends to pyroptotic cell lysis
        across multiple inflammasome pathways, we next examined cell death responses under distinct activation conditions.
        Pyroptotic cell lysis was quantified by measuring LDH release from WT and EphB1-deficient primary peritoneal macrophages
        following activation of NLRP3, NLRC4, or AIM2 inflammasomes. Across all inflammasome activation conditions, EphB1-deficient
        macrophages exhibited consistently reduced LDH release compared with WT controls. This reduction was reproducible
        across independent experiments and was evident at multiple time points, with statistically significant differences
        observed for NLRP3 and NLRC4 activation. These findings indicate that EphB1 deficiency broadly attenuates pyroptotic
        cell lysis downstream of distinct inflammasome receptors, consistent with a role in a shared execution step rather
        than pathway-specific signaling.
      source: figure_1_d_v2.yaml
      panel_id: 1d
    - type: paragraph
      text: Having established a reproducible output-limited inflammasome phenotype upon EphB1 loss,  we next asked whether
        the defect reflects impaired upstream priming/assembly  or instead a restriction at the terminal, GSDMD pore–driven
        execution step.
      tags:
      - transition
    - type: heading
      level: 2
      text: EphB1 loss preserves upstream NLRP3 activation but restricts GSDMD-mediated execution
    - type: paragraph
      text: To localize the point at which EphB1 influences inflammasome output, we first examined whether EphB1 deficiency
        alters transcriptional priming downstream of TLR4–NF-κB signaling. Transcriptional priming was assessed by qPCR analysis
        of Tnf, Il6, and Il1b mRNA levels in WT and EphB1-deficient primary peritoneal macrophages following LPS stimulation.
        LPS stimulation induced robust and comparable increases in Tnf, Il6, and Il1b transcripts in WT and EphB1-deficient
        macrophages across all examined time points. These transcriptional responses were reproducible across independent
        experiments and showed no statistically significant differences between genotypes. Together, these data indicate that
        EphB1 deficiency does not impair TLR4–NF-κB–dependent transcriptional priming, excluding defective first-signal activation
        as the cause of reduced inflammasome output.
      source: figure_2_a+b.yaml
      panel_id: 2a/b
    - type: paragraph
      text: Having established that transcriptional priming is preserved, we next asked whether conventional cytokine secretion
        is also intact, thereby separating inflammasome output from a global secretion defect.
      tags:
      - transition
    - type: paragraph
      text: Following confirmation that transcriptional priming remains intact, we next asked whether the reduced IL-1β output
        observed upon EphB1 deficiency could be attributed to a generalized impairment of classical cytokine secretion. Classical
        secretion was assessed by quantifying TNF-α and IL-6 release from WT and EphB1-deficient primary peritoneal macrophages
        following LPS stimulation at defined time points using ELISA. LPS stimulation induced robust increases in both TNF-α
        and IL-6 in WT and EphB1-deficient macrophages, with no significant genotype-dependent differences observed. These
        responses were consistent across independent experiments and remained non-significant after dual background subtraction
        and normalization to cell number. Thus, EphB1 deficiency does not measurably impair TLR4-driven classical secretion
        of TNF-α or IL-6, excluding a generalized secretory defect as the basis for reduced inflammasome-associated outputs.
      source: figure_2_c_v2.yaml
      panel_id: 2c
    - type: paragraph
      text: Having excluded a generalized secretion impairment, we next asked whether the EphB1-dependent difference manifests
        specifically in inflammasome-triggered IL-1β release across stimulus strength.
      tags:
      - transition
    - type: paragraph
      text: After excluding defects in transcriptional priming and classical cytokine secretion, we next asked whether EphB1
        deficiency selectively impairs inflammasome-specific IL-1β release under NLRP3 activation, and whether this effect
        depends on the strength of the second signal. WT and EphB1-deficient primary peritoneal macrophages were uniformly
        primed with LPS and then stimulated with increasing doses of Nigericin, and mature IL-1β released into the supernatant
        was quantified by ELISA. While IL-1β release increased with higher Nigericin doses in both genotypes, EphB1-deficient
        macrophages consistently released less IL-1β than WT controls at each stimulatory dose. The genotype-dependent reduction
        was statistically significant at both 10 and 20 μM Nigericin and was supported by low variability across biological
        replicates, whereas baseline release under control conditions remained comparable between groups. These results demonstrate
        that EphB1 deficiency limits mature IL-1β release in a dose-independent manner across the tested range of NLRP3 activation,
        supporting a selective defect at the inflammasome-specific execution or export stage rather than impaired priming.
      source: figure_2_d.yaml
      panel_id: 2d
    - type: paragraph
      text: Having confirmed an inflammasome-specific output defect, we next asked whether this arises from impaired inflammasome
        assembly at the ASC platform.
      tags:
      - transition
    - type: paragraph
      text: After establishing that transcriptional priming and classical cytokine secretion remain intact, we next examined
        whether the reduced inflammasome output observed upon EphB1 deficiency arises from impaired inflammasome assembly
        at the level of ASC oligomerization. ASC assembly was assessed in WT and EphB1-deficient primary peritoneal macrophages
        following LPS priming and Nigericin stimulation by biochemical fractionation into soluble and insoluble fractions,
        DSS crosslinking, and immunoblot analysis of ASC oligomers. Under NLRP3 activation conditions, EphB1-deficient macrophages
        displayed levels of ASC oligomers, dimers, and monomers comparable to those observed in WT controls. This lack of
        genotype-dependent difference was consistently observed across independent experiments, with no significant changes
        detected in any ASC species following quantitative densitometric analysis. These data indicate that EphB1 deficiency
        does not disrupt ASC oligomerization during NLRP3 inflammasome activation, excluding defective inflammasome assembly
        as the basis for reduced downstream outputs.
      source: figure_2_e.yaml
      panel_id: 2e
    - type: paragraph
      text: Having found no evidence for altered ASC oligomerization, we next asked whether caspase-1 activation itself is
        preserved, further narrowing the bottleneck toward execution.
      tags:
      - transition
    - type: paragraph
      text: Given that ASC oligomerization remains intact upon EphB1 deficiency, we next asked whether the observed reduction
        in inflammasome output reflects impaired caspase-1 activation or a defect in its subsequent extracellular release.
        WT and EphB1-deficient primary peritoneal macrophages were primed and activated via the NLRP3 inflammasome, after
        which pro-caspase-1 and cleaved caspase-1 p20 were examined in total cell lysates and corresponding supernatants by
        immunoblotting. Caspase-1 activation, as reflected by intracellular p20 levels, was comparable between WT and EphB1-deficient
        macrophages. This result was reproducible across independent experiments, with no significant genotype-dependent differences
        in total lysate p20. These results localize the effect of EphB1 deficiency to a post-activation step, indicating that
        caspase-1 is efficiently activated.
      source: figure_2_f.yaml
      panel_id: 2f
    - type: paragraph
      text: Having established that caspase-1 activation is largely preserved, we next asked whether its canonical substrates—pro-IL-1β
        and GSDMD—are processed normally, thereby excluding impaired substrate cleavage as the source of the EphB1-dependent
        defect.
      tags:
      - transition
    - type: paragraph
      text: Following the observation that caspase-1 activation is preserved, we next examined whether caspase-1 substrate
        cleavage are differentially affected. WT and EphB1-deficient primary peritoneal macrophages were primed and activated
        via the NLRP3 inflammasome, after which GSDMD and IL-1β processing was analyzed in total cell lysates by immunoblotting.
        Caspase-1–dependent cleavage of GSDMD and pro–IL-1β occurred efficiently in EphB1-deficient macrophages, yielding
        cleavage and maturation degree comparable to those in WT cells. This intracellular processing was reproducible across
        independent experiments, with statistically significant reductions was not observed specifically in the total fractions.
        Together, these results demonstrate that EphB1 deficiency does not compromise caspase-1 substrate cleavage per se
        but selectively limits the extracellular release of mature inflammasome products, thereby localizing the defect to
        a late execution or export step.
      source: figure_2_g.yaml
      panel_id: 2g
    - type: paragraph
      text: Having mapped the bottleneck downstream of inflammasome assembly and caspase-1 activation,  we next asked whether
        EphB1 specifically gates the early engagement of GSDMD-NT with mitochondria that precedes pore function and organelle
        injury.
      tags:
      - transition
    - type: heading
      level: 2
      text: EphB1 loss reduces GSDMD engagement with the mitochondrial membrane
    - type: paragraph
      text: After localizing the functional bottleneck to the execution stage downstream of inflammasome assembly and caspase-1
        activation, we next asked whether mitochondrial functional readouts—including cytosolic and mitochondrial ROS dynamics
        as well as mitochondrial membrane potential—are altered during NLRP3 activation. WT and Ephb1−/− primary peritoneal
        macrophages were LPS-primed and activated with Nigericin, and time-resolved changes in cytosolic ROS (H2DCHA), mitochondrial
        ROS (MitoSOX), and mitochondrial membrane potential (TMRM) were continuously monitored and normalized to pre-stimulation
        baselines. Upon inflammasome activation, Ephb1−/− macrophages exhibited attenuated accumulation of cytosolic ROS and
        a smaller loss of mitochondrial membrane potential compared with WT cells, whereas mitochondrial ROS signals measured
        by MitoSOX showed no significant genotype-dependent difference in overall magnitude. These patterns were consistent
        across independent experimental batches and were supported by area-under-the-curve analyses, while baseline TMRM measurements
        obtained under unstimulated conditions remained comparable between genotypes. Together, these results indicate that
        EphB1 deficiency does not cause an intrinsic alteration in mitochondrial membrane potential at baseline but limits
        ROS accumulation and membrane depolarization during inflammasome activation, supporting a model in which mitochondrial
        damage is attenuated during the execution phase.
      source: figure_3_a+b+c+d+e+f+g+h.yaml
      panel_id: 3a/b/c/d/e/f/g/h
    - type: paragraph
      text: Having delineated the kinetics of mitochondrial stress during inflammasome activation, we next defined the key
        time window for early interface events, so that subsequent readouts can be anchored to the appropriate temporal regime
        and we can test whether a more direct mitochondrial-content–release readout likewise shows an EphB1-dependent constraint
        consistent with a mitochondria-stage bottleneck.
      tags:
      - transition
    - type: paragraph
      text: we next asked whether inflammasome-induced release of mitochondrial contents—specifically cytosolic mtDNA—was
        correspondingly reduced. WT and Ephb1−/− primary peritoneal macrophages were primed and activated with Nigericin,
        followed by rapid subcellular fractionation and qPCR-based quantification of mtDNA (16S and ND1) in cytosolic, mitochondrial,
        and total cell fractions across a defined time course. In WT macrophages, inflammasome activation induced a rapid
        and transient pulse of cytosolic mtDNA, peaking at early time points, whereas this cytosolic mtDNA peak was markedly
        reduced in Ephb1−/− cells. In contrast, mtDNA levels in the total cell fraction remained largely stable between genotypes,
        with no significant differences detected for 16S and only minor fluctuations observed for ND1, and the early cytosolic
        mtDNA pulse was reproducible across independent experiments. Together, these results indicate that EphB1 deficiency
        selectively limits inflammasome-induced release of mitochondrial DNA into the cytosol without reducing total mtDNA
        content, localizing the effect to diminished mitochondrial membrane disruption during the execution phase.
      source: figure_3_i+j+s3_d+f+g.yaml
      panel_id: 3/i/j/s3/d/f/g
    - type: paragraph
      text: Having further reinforced the early mitochondrial-stage signature, we next asked whether an independent protein-level
        time-course can pinpoint the same peak window and, in doing so, whether EphB1 loss selectively diminishes GSDMD-NT
        enrichment on mitochondria—thereby placing the bottleneck at interface engagement/enrichment rather than upstream
        proteolytic activation.
      tags:
      - transition
    - type: paragraph
      text: we next asked whether EphB1 affects the early association of GSDMD-NT with mitochondria during inflammasome activation.
        WT and Ephb1−/− primary peritoneal macrophages were primed and activated with LPS and Nigericin, followed by rapid
        isolation of mitochondrial fractions at defined early time points and immunoblot analysis of GSDMD-NT in total lysates
        and mitochondrial fractions. In WT macrophages, GSDMD-NT transiently accumulated in the mitochondrial fraction with
        a pronounced peak at approximately 7.5 minutes after inflammasome activation, whereas this early mitochondrial enrichment
        of GSDMD-NT was markedly reduced in Ephb1−/− cells. By contrast, the extent of GSDMD cleavage in total cell lysates
        was comparable between genotypes, and mitochondrial abundance—as assessed by HK2 protein levels and mitochondrial
        16S rRNA content—did not differ significantly, supporting a selective defect in mitochondrial targeting rather than
        substrate generation or organelle quantity. Together, these data localize the effect of EphB1 deficiency to the early
        mitochondrial enrichment of GSDMD-NT during inflammasome activation, indicating that EphB1 promotes efficient GSDMD–mitochondria
        association at the execution stage.
      source: figure_3_k+s3_e.yaml
      panel_id: 3k/s3e
    - type: paragraph
      text: Having localized the execution defect to the GSDMD–mitochondria interface,  we next asked whether a defined lipid
        gate at the mitochondrial membrane—cardiolipin abundance and accessibility—accounts for the altered engagement efficiency.
      tags:
      - transition
    - type: heading
      level: 2
      text: Cardiolipin mediates the EphB1-dependent constraint on inflammasome signalling
    - type: paragraph
      text: We asked whether EphB1 deficiency reduces the pool of cardiolipin that is detectable by NAO within the mitochondrial
        membrane. WT and Ephb1−/− primary peritoneal macrophages were stained with NAO under identical conditions, and NAO-associated
        fluorescence was quantified using fixed-exposure confocal imaging as well as time-resolved plate-reader measurements
        with no-dye wells for background subtraction. Across both imaging- and plate-based readouts, Ephb1−/− macrophages
        displayed significantly lower NAO fluorescence than WT cells, consistent with a reduced NAO-detectable cardiolipin
        pool. This decrease was consistently observed across multiple time points and independent experimental batches, and
        the concordant direction across two measurement modalities supports robustness of the phenotype. Together, these results
        show that EphB1 deficiency is associated with a significant reduction in NAO fluorescence, indicating a decreased
        NAO-detectable cardiolipin pool in the mitochondrial membrane under conditions where baseline mitochondrial membrane
        potential is unchanged.
      source: figure_4_a+b.yaml
      panel_id: 4a/b
    - type: paragraph
      text: Having observed a change in an accessibility-proxy readout, we next asked whether independent chemical quantification
        supports a shift in cardiolipin abundance and/or species composition.
      tags:
      - transition
    - type: paragraph
      text: Having observed a reduction in the NAO-detectable cardiolipin pool, we next asked whether this change reflects
        an overall decrease in cardiolipin abundance and accompanying alterations in molecular species composition. Total
        cardiolipin content and molecular species composition were quantified by LC–MS/MS–based lipidomics in resting WT and
        Ephb1−/− primary peritoneal macrophages, with abundances normalized to cell number using internal standards. Compared
        with WT cells, Ephb1−/− macrophages exhibited a significant reduction in total cardiolipin abundance, reaching approximately
        70% of WT levels, accompanied by broad downregulation across a majority of cardiolipin molecular species. This decrease
        was reproducible across independent experimental batches and remained significant after multiple-testing correction,
        with roughly 60% of detected cardiolipin species showing reduced abundance. Together, these lipidomic data show that
        EphB1 deficiency not only reduces the NAO-accessible cardiolipin pool but also decreases total cardiolipin abundance,
        providing a quantitative membrane lipid basis for the attenuated mitochondrial damage observed in EphB1-deficient
        peritoneal macrophages.
      source: figure_4_c+d.yaml
      panel_id: 4c/d
    - type: paragraph
      text: Having established a lipid-state framework, we next asked whether an independent upstream pharmacologic perturbation
        can experimentally and controllably tune the NAO-defined accessible cardiolipin pool, providing a manipulable entry
        point for causal testing.
      tags:
      - transition
    - type: paragraph
      text: We next asked whether an independent pharmacological inhibition of cardiolipin biosynthesis is sufficient to reduce
        NAO signals in WT macrophages. WT primary peritoneal macrophages were pretreated with the cardiolipin biosynthesis
        inhibitor alexidine dihydrochloride (AD) prior to NAO staining, and cardiolipin-associated fluorescence was quantified
        by confocal microscopy under fixed exposure conditions. AD treatment markedly reduced NAO fluorescence in WT macrophages,
        indicating that pharmacological inhibition of cardiolipin biosynthesis decreases the NAO-accessible cardiolipin pool.
        This reduction in NAO signal was reproducible across independent experimental batches and reached statistical significance.
        Together, these results demonstrate that pharmacological inhibition of cardiolipin biosynthesis alone is sufficient
        to reduce the NAO-accessible cardiolipin pool in WT macrophages, supporting cardiolipin abundance as a key determinant
        of NAO-detectable cardiolipin availability.
      source: figure_4_e+f.yaml
      panel_id: 4e/f
    - type: paragraph
      text: Having implemented a lipid-state perturbation, we next asked whether inflammasome output shifts in the predicted
        direction—specifically, whether reduced accessible cardiolipin is sufficient to lower IL-1β release—thereby linking
        cardiolipin accessibility to terminal execution strength.
      tags:
      - transition
    - type: paragraph
      text: After establishing that pharmacological manipulation can reduce the NAO-accessible cardiolipin pool, we next asked
        whether lowering cardiolipin availability is sufficient to suppress inflammasome-driven IL-1β release. WT and Ephb1−/−
        primary peritoneal macrophages were pretreated with alexidine dihydrochloride (AD) at increasing doses and durations,
        followed by LPS priming and Nigericin activation, and IL-1β released into the supernatant was quantified by ELISA
        with cell-number normalization. AD treatment markedly suppressed LPS- and Nigericin-induced IL-1β release in macrophages
        in a dose- and time-dependent manner. The genotype-by-dose interaction was statistically significant, with most AD
        doses producing significant inhibition in WT cells but not in Ephb1−/− cells, and these patterns were reproducible
        across independent experimental batches without evidence of AD-induced cytotoxicity. Together, these results demonstrate
        that pharmacological reduction of cardiolipin availability is sufficient to suppress inflammasome-mediated IL-1β release,
        supporting a causal role for cardiolipin accessibility in controlling inflammasome output.
      source: figure_4_g.yaml
      panel_id: 4g
    - type: paragraph
      text: Having linked one perturbation axis to functional output, we next asked whether a mechanistically distinct perturbation
        converges on the same accessible-cardiolipin logic, reducing single-agent interpretive risk.
      tags:
      - transition
    - type: paragraph
      text: To further probe the determinants of the NAO-accessible cardiolipin pool, we next tested whether pharmacological
        perturbation of cardiolipin remodeling represents an alternative route to reduce NAO staining intensity. WT and Ephb1−/−
        primary peritoneal macrophages were pretreated with BEL, followed by NAO staining under identical imaging conditions,
        and cardiolipin-associated fluorescence intensity was quantified using uniform exposure and thresholding parameters.
        BEL treatment led to a marked reduction in NAO fluorescence intensity, indicating that pharmacological interference
        with cardiolipin remodeling is sufficient to decrease the NAO-accessible cardiolipin pool. This reduction in NAO staining
        was consistently observed across independent experimental batches and reached statistical significance relative to
        untreated controls. Together with perturbations targeting cardiolipin abundance, these results show that both manipulation
        of cardiolipin content and interference with cardiolipin remodeling can reduce NAO staining, indicating that changes
        in the NAO-accessible cardiolipin pool can arise through multiple mechanisms beyond alterations in total cardiolipin
        levels.
      source: figure_4_sa+b.yaml
      panel_id: s4a/b
    - type: paragraph
      text: Having established a second, independent lipid-state manipulation, we next asked whether its functional consequence
        on inflammasome output aligns with the same lipid-gate model.
      tags:
      - transition
    - type: paragraph
      text: We next asked whether perturbations that alter cardiolipin availability through distinct mechanisms are sufficient
        to attenuate the terminal functional output of inflammasome signaling, as measured by IL-1β release. Primary peritoneal
        macrophages were subjected to pharmacological manipulations targeting cardiolipin regulation via distinct mechanisms,
        followed by LPS priming and Nigericin activation, and IL-1β released into the supernatant was quantified by ELISA
        with normalization to cell number. Across these perturbations, reduction of cardiolipin availability consistently
        led to a marked decrease in LPS- and Nigericin-induced IL-1β release, indicating convergent suppression of inflammasome
        terminal output. The inhibitory effects on IL-1β release were dose- and/or time-dependent, reproducible across independent
        experimental batches, and occurred in the absence of detectable cytotoxicity. Together, these results demonstrate
        that diverse perturbations of cardiolipin regulation—whether affecting cardiolipin abundance or remodeling—converge
        on attenuation of inflammasome-mediated IL-1β release, supporting cardiolipin availability as a common limiting factor
        for terminal inflammasome output.
      source: figure_4_sc.yaml
      panel_id: s4c
    - type: paragraph
      text: Having established cardiolipin abundance and accessibility as the execution interface governing inflammasome output,
        we next operationalized the multiple, parallel processes that collectively shape cardiolipin state—including synthesis,
        supply, transport, oxidation, remodeling, and membrane context itself—into a set of separable, quantifiable mechanistic
        axes, enabling cross-batch integration of transcriptomic and lipidomic data to delineate how EphB1 loss coordinately
        perturbs these axes and thereby tunes GSDMD–mitochondria engagement.
      tags:
      - transition
    - type: heading
      level: 2
      text: Integrated multi-omics prioritizes membrane context as the dominant perturbed axis
    - type: paragraph
      text: To organize cardiolipin metabolism into an interpretable structure suitable for multi-omics integration, we constructed
        a conceptual framework that decomposes cardiolipin-related processes into six mechanistic axes. This framework defines
        six functional axes—synthesis, remodeling, transport, supply, oxidation, and membrane context—and assigns to each
        axis representative genes and lipid readouts that can, in principle, be extracted from transcriptomic and lipidomic
        datasets. Together, this conceptual model serves as a mechanistic coordinate system for organizing cardiolipin-related
        pathways and readouts, providing a common reference for the multi-omics analyses presented in subsequent figures.
      source: figure_5_a.yaml
      panel_id: 5a
    - type: paragraph
      text: Having introduced the mechanistic-axis conceptual framework, we next specified the concrete gene and lipid features
        that instantiate each axis, together with directionality and weighting rules.
      tags:
      - transition
    - type: paragraph
      text: To support the mechanistic schematic in Fig. 6A and ensure interpretability of axis-level scoring in the multi-omics
        integration, we curated a structured table of key lipid readouts and representative genes for each cardiolipin-related
        mechanistic axis. For each axis (supply, transport, synthesis, remodeling, oxidation, and membrane context), we define
        minimal feature records that specify axis assignment, biological meaning, quantitative formulae for lipid metrics,
        directionality conventions (bottleneck_sign), and within-axis weights, together with tiered inclusion rules (Tier-1
        executors, Tier-2 proximal components, and Tier-3 conditional contributors) and cross-axis exclusion criteria. Together,
        this table serves as an interpretable lookup resource that links the six-axis cardiolipin framework to concrete gene
        and lipid features, thereby supporting Fig. 6A and guiding subsequent axis-based multi-omics analyses.
      source: figure_5_b.yaml
      panel_id: 5b
    - type: paragraph
      text: Having fixed axis definitions a priori, we next asked how heterogeneous multi-batch omics measurements can be
        normalized and projected into comparable axis-level scores.
      tags:
      - transition
    - type: paragraph
      text: To clarify how multi-batch RNA-seq, untargeted lipidomics, and targeted cardiolipin panel data were processed
        and rendered comparable for downstream mechanistic analyses, we summarized the complete data-processing workflow as
        an integrated pipeline. For each omics layer, raw data underwent modality-specific quality control, normalization,
        and batch-aware modeling, followed by feature aggregation into predefined mechanistic indicators and axis-level Z
        scores that serve as standardized inputs for multi-omics integration. Together, this processing pipeline provides
        a transparent and reproducible foundation for deriving mechanistic axis scores and cardiolipin phenotypes from heterogeneous
        multi-omics datasets, thereby enabling the integrative analyses presented in subsequent panels.
      source: figure_5_c.yaml
      panel_id: 5c
    - type: paragraph
      text: Having established the scoring pipeline, we next asked whether axis effects are directionally concordant across
        omics layers and batches, providing the first-pass structure of the perturbation landscape.
      tags:
      - transition
    - type: paragraph
      text: Building on the mechanistic axis framework and data-processing pipeline established in Fig. 6A–C, we next asked
        whether EphB1 deficiency produces consistent and reproducible axis-level effects across RNA-seq and lipidomics datasets.
        For each RNA-seq and lipidomics batch, we computed batch-specific effect_z scores representing the directional difference
        between EphB1-deficient and WT macrophages for each of the six mechanistic axes, and assembled these values into a
        cross-omics axis-by-batch effect matrix. Across three RNA-seq batches and four lipidomics batches, only the Membrane
        context axis displayed a consistent positive effect in both omics layers, with stable directionality and the largest
        absolute effect sizes among all axes. Effect_z values exceeding an absolute magnitude of 1 were predominantly observed
        for the Membrane context axis in both RNA and lipid datasets, whereas other axes showed sporadic or omics-specific
        effects that lacked cross-batch consistency. Together, this cross-omics effect matrix identifies Membrane context
        as the only mechanistic axis that is robustly and reproducibly perturbed by EphB1 deficiency, distinguishing it from
        other axes that are variably influenced by batch or omics-specific factors.
      source: figure_5_d.yaml
      panel_id: 5d
    - type: paragraph
      text: Having surveyed batch-by-omics concordance, we next asked whether equal-weight evidence aggregation yields a coherent,
        axis-level summary of EphB1-dependent perturbation.
      tags:
      - transition
    - type: paragraph
      text: Following the batch-level cross-omics comparison in Fig. 6D, we next asked whether integration across RNA-seq
        and lipidomics datasets would reveal a dominant mechanistic axis that is consistently perturbed by EphB1 deficiency.
        For each of the six predefined mitochondrial-related mechanistic axes, batch-level axis Z scores from RNA-seq and
        lipidomics were combined using Stouffer’s method to generate an overall multi-omics Z score representing the integrated
        effect of EphB1 deficiency. Among the six axes, the Membrane context axis exhibited the strongest and most pronounced
        deviation from zero, with a positive multi-omics Z score of approximately +2.6, representing the largest absolute
        effect across all mechanistic axes. This significance arose from consistent contributions across multiple RNA-seq
        and lipidomics batches rather than from a single dataset, whereas all other axes showed only mild or moderate shifts
        that failed to reach statistical significance after cross-omics integration. Together, these results identify Membrane
        context as the sole mechanistic axis that is robustly and significantly perturbed by EphB1 deficiency at the integrated
        multi-omics level, supporting the presence of a dominant membrane-related bottleneck rather than a distributed multi-axis
        imbalance.
      source: figure_5_e.yaml
      panel_id: 5e
    - type: paragraph
      text: Having obtained aggregated axis-level deviations, we next asked how these deviations relate to predefined cardiolipin
        phenotypic indicators, providing an interpretable bridge between axes and lipid outcome space.
      tags:
      - transition
    - type: paragraph
      text: After identifying Membrane context as the dominant mechanistic axis perturbed by EphB1 deficiency, we next asked
        whether axis-level effects can quantitatively predict changes in total cardiolipin abundance across experimental batches.
        For each experimental batch, combined mechanistic axis Z scores (HO–WT) were regressed against the corresponding HO–WT
        differences in total cardiolipin abundance (sum_CL) to assess cross-batch linear associations between axis effects
        and cardiolipin content. Among all axes, the Membrane context axis showed the strongest negative association with
        sum_CL, with higher combined Z scores corresponding to lower total cardiolipin levels, whereas all other axes displayed
        weak or near-zero correlations. However, none of the axis–sum_CL associations reached statistical significance within
        the current sample size (3–4 batches), with the Membrane context axis showing a moderate effect size (r ≈ −0.65) but
        a non-significant p value, indicating limited statistical power and sensitivity to batch-level variation. Together,
        these results indicate that total cardiolipin abundance (sum_CL) is not a sensitive or robust readout for capturing
        mechanistic axis effects across batches, thereby excluding sum_CL as a primary quantitative proxy for axis-level perturbations
        and motivating the use of more informative cardiolipin accessibility or composition-based metrics.
      source: figure_5_f.yaml
      panel_id: 5f
    - type: paragraph
      text: Having defined and prioritized a membrane-context mechanistic axis from integrated multi-omics, we next asked
        which EphB1-linked candidate signaling programs most consistently couple to this axis (X→M→Z), yielding a short, testable
        set of upstream mediators and validation hooks.
      tags:
      - transition
    - type: heading
      level: 2
      text: 'Prioritizing candidate pathways: an RNA X–M–Z framework with lipid phenotypic alignment'
    - type: paragraph
      text: To address the challenge of limited strictly paired RNA–lipid samples and unstable cross-omics mediation, we formulated
        an RNA-first X–M–Z framework that prioritizes reproducible pathway ranking over formal causal quantification. In this
        framework, EphB1 status is treated as an exogenous variable (X), downstream Eph-related signaling modules are quantified
        as RNA-based pathway scores (M), and the RNA membrane context axis score serves as a transcriptional proxy (Z) for
        lipid membrane phenotypes, while lipid readouts are used only for direction-concordance validation. Together, this
        RNA-first X–M–Z framework provides a transparent and reproducible strategy for ranking EphB1 downstream signaling
        modules most likely coupled to membrane context perturbation, thereby guiding subsequent experimental validation without
        over-interpreting limited cross-omics mediation.
      source: figure_6_a.yaml
      panel_id: 6a
    - type: paragraph
      text: Having defined the X–M–Z inference scaffold and the role of orthogonal lipid alignment, we next specified a minimal,
        literature-anchored set of EphB1-linked candidate signaling programs and their scoring rules.
      tags:
      - transition
    - type: paragraph
      text: To enable transparent and reproducible RNA-first X–M–Z prioritization of EphB1 downstream pathways, we curated
        a structured table that defines each downstream signaling module and its hypothesized linkage to cardiolipin regulatory
        axes. Each table row corresponds to one EphB1 downstream signaling gene set. Columns specify a unique pathway ID,
        a human-readable module label, network category (EphB1_signaling), the targeted cardiolipin mechanistic axes, module
        size (n_genes), and the full gene list annotated with gene_effect_sign to standardize directionality for module scoring.
        Together, this module dictionary provides the standardized building blocks used in Fig. 7A–7D, allowing readers and
        reviewers to trace how each EphB1 downstream pathway was defined and how it was linked to cardiolipin axes for subsequent
        quantitative analyses.
      source: figure_6_b.yaml
      panel_id: 6b
    - type: paragraph
      text: Having defined candidate programs and scoring directionality, we next asked which programs show reproducible EphB1-dependent
        shifts across RNA batches, qualifying them as plausible mediators (X→M).
      tags:
      - transition
    - type: paragraph
      text: 'Having established that EphB1 deficiency alters mitochondrial membrane lipid context and inflammasome output,
        we next asked whether loss of EphB1 leaves a detectable and systematic transcriptional footprint across its known
        downstream signaling pathways at the time of sample collection. Using RNA-seq data from multiple independent batches
        of WT and Ephb1−/− primary peritoneal macrophages, we quantified pathway-level transcriptional response scores based
        on predefined EphB1 downstream signaling gene sets, and summarized genotype-dependent shifts within each batch as
        standardized pathway z scores. Across three RNA-seq batches, EphB1 deficiency induced reproducible directional shifts
        in multiple signaling modules: PI3K–AKT–mTOR pathways showed consistent negative responses (KO < WT), NF-κB/ROS and
        JAK–STAT was overall reduced with batch-dependent reversals, cytoskeleton-related modules were shifted in a positive
        direction, and other pathways exhibited weaker or inconsistent effects. When pathway scores were integrated across
        batches using a meta Z approach, PI3K–AKT–mTOR and JAK–STAT displayed the highest cross-batch directional consistency
        and effect magnitude, whereas other modules showed smaller or batch-sensitive effects, highlighting differences in
        robustness rather than single-batch significance. Together, these analyses provide an overview of the transcriptional
        response state of EphB1 downstream signaling at the time of sampling, identifying PI3K–AKT–mTOR and JAK–STAT as the
        most consistently downregulated modules and prioritizing them as candidate pathways for subsequent coupling analyses
        with membrane context perturbation.'
      source: figure_6_c_v2.yaml
      panel_id: 6c
    - type: paragraph
      text: Having filtered candidates by cross-batch X→M consistency, we next asked which programs are mechanistically coupled
        to the prioritized membrane-context axis within RNA (M↔Z), strengthening chain coherence.
      tags:
      - transition
    - type: paragraph
      text: Following the identification of a stable membrane context–related mechanistic axis, we next asked which EphB1
        downstream signaling modules exhibit cross-batch consistent transcriptional changes and show reproducible coupling
        to the Membrane context axis at the sample level. Using three independent RNA-seq batches of WT and Ephb1-deficient
        macrophages, we computed pathway footprint scores (M) for predefined EphB1 downstream gene sets and Membrane context
        axis scores (Z), summarized genotype effects as batch-level ΔM (KO−WT), and quantified within-batch coupling by linear
        regression of Z on M while controlling for genotype. Cross-batch aggregation revealed that most EphB1 downstream modules
        showed negative ΔM in EphB1-deficient cells, with the largest decreases observed for PI3K–AKT–mTOR and JAK–STAT, whereas
        cytoskeleton/adhesion modules (FAK–Src–Rho) displayed positive ΔM; correspondingly, PI3K–AKT–mTOR and JAK–STAT scores
        were negatively coupled to the Membrane context axis, while FAK–Src–Rho showed a positive coupling. The direction
        of X→M effects was consistent across batches by ΔM sign voting, and M↔Z coupling remained stable under pooled leave-one-out
        refitting, with PI3K–AKT–mTOR and JAK–STAT showing predominantly negative β_M_loo intervals and FAK–Src–Rho showing
        positive intervals. Together, these analyses prioritize PI3K–AKT–mTOR and JAK–STAT as the most robust EphB1 downstream
        candidates whose transcriptional attenuation is consistently associated with increased membrane context barrier scores,
        while distinguishing cytoskeleton/adhesion modules as oppositely coupled pathways.
      source: figure_6_d_v2.yaml
      panel_id: 6d
    - type: paragraph
      text: Having identified RNA-internal coupling candidates, we next asked whether the prioritized RNA axis aligns with
        lipid phenotypic space in independent repeats, providing orthogonal support without relying on paired-sample mediation.
      tags:
      - transition
    - type: paragraph
      text: 'After establishing EphB1–signal–membrane context mediation at the axis level in Fig. 7D, we next asked whether
        the same downstream signaling pathways similarly mediate EphB1-dependent changes across individual lipid readouts
        underlying the membrane context axis. Using the same X→M→Y mediation framework, we separately modeled five lipid indicators—CL
        fraction (CL/total), membrane CL content, mitochondrial total lipid mass (PC+PE+CL), membrane PC, and membrane PE—as
        outcome variables, and estimated pathway-specific indirect effects (a×b) for each indicator. Across all five lipid
        indicators, EphB1 deficiency was consistently associated with increased pathway scores (a>0), while the direction
        of the pathway–lipid association (b) diverged by readout: positive for CL fraction and membrane CL, but negative for
        mitochondrial lipid mass, membrane PC, and membrane PE, yielding opposite-signed indirect effects. Within each lipid
        readout, indirect effects across the nine pathways showed highly consistent directional signs and largely non-overlapping
        confidence intervals with zero, whereas effect magnitudes were not compared across readouts due to differences in
        scale and units. Together, these analyses indicate that the EphB1-dependent mediation structure observed at the membrane
        context axis level is recapitulated across multiple concrete lipid indicators, with pathway effects manifesting as
        coordinated but directionally distinct changes in cardiolipin-related versus PC/PE-dominated lipid readouts.'
      source: figure_6_e.yaml
      panel_id: 6e
