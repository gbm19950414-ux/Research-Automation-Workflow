  - id: results
    title: Results
    blocks:
    - type: heading
      level: 2
      text: EphB1 deficiency reduces pyroptosis and IL-1β release
    - type: paragraph
      text: To identify regulators of inflammasome,
      source: opening_and_trans.yaml
      panel_id: ''
    - type: paragraph
      text: Primary macrophages from multiple PiggyBac (PB) genetic backgrounds were subjected to standardized NLRP3 inflammasome activation, and IL-1β release was used as the functional screening readout (Fig. 1a). Having outlined the genetic-screening strategy, we next sought to identify, a candidate strain to prioritize for mechanistic dissection.
      source: figure_1_a_000.yaml
      panel_id: 1a
    - type: paragraph
      text: Across the 10 screened strains, most genetic backgrounds showed little or no genotype-dependent difference in IL-1β release following Nigericin stimulation, whereas only two strains reached statistical significance in within-strain comparisons (Fig. 1b). Notably, the Ephb1-associated strain (081230020-HRB) exhibited a pronounced reduction in IL-1β release in EphB1-deficient macrophages (~41% decrease relative to WT; P≈0.034), representing  the most statistically significant reduction observed in the screen and prioritizing Ephb1 for subsequent mechanistic investigation.
      source: figure_1_b_001.yaml
      panel_id: 1b
    - type: paragraph
      text: Having prioritized Ephb1 from the screen, we next asked whether the phenotype generalizes beyond a single inflammasome agonist, thereby arguing against a stimulus-specific artifact. Across all three activation routes, Ephb1-deficient macrophages released significantly less IL-1β than WT controls (Fig. 1c). These data indicate that the diminished IL-1β output in EphB1-deficient macrophages is not restricted to a single receptor pathway, supporting a role for EphB1 at a receptor-downstream step.
      source: figure_1_c_v2.yaml
      panel_id: 1c
    - type: paragraph
      text: Having established cross-agonist consistency within inflammasome, we next asked whether Ephb1 loss broadly constrains lytic execution across distinct inflammasome sensors. Across all inflammasome activation conditions, EphB1-deficient macrophages exhibited consistently reduced LDH release compared with WT controls (Fig. 1d). These findings indicate that EphB1 deficiency broadly attenuates pyroptotic cell lysis downstream of distinct inflammasome receptors, consistent with a role in a shared execution step rather than pathway-specific signaling.
      source: figure_1_d_v2.yaml
      panel_id: 1d
    - type: paragraph
      text: Having established a output-limited inflammasome phenotype upon Ephb1-deficiency macrophages,  we next asked whether the defect reflects impaired upstream priming/assembly  or instead a restriction at the terminal, GSDMD pore–driven pyroptotic execution.
      source: opening_and_trans.yaml
      panel_id: ''
    - type: heading
      level: 2
      text: EphB1 deficiency reduces pyroptotic execution
    - type: paragraph
      text: To map the position of Ephb1 within the inflammasome pathway,  we compared inflammasome responses triggered by NLRP3, AIM2, and NLRC4 in WT and Ephb1-deficient macrophages.
      source: opening_and_trans.yaml
      panel_id: ''
    - type: paragraph
      text: LPS stimulation induced robust and comparable increases in Tnf, Il6, and Il-1β mRNA in WT and EphB1-deficient macrophages across all examined time points (Fig. 2a,b). Together, these data indicate that EphB1 deficiency does not impair TLR4–NF-κB–dependent transcriptional priming, arguing against defective first-signal activation as the cause of reduced inflammasome output.
      source: figure_2_a+b.yaml
      panel_id: 2a/b
    - type: paragraph
      text: We next asked whether conventional cytokine secretion was preserved, which would argue against a generalized secretory defect. LPS stimulation induced comparable increases in TNF-α and IL-6 in WT and EphB1-deficient macrophages, with no significant genotype-dependent differences (Fig. 2c). Thus, EphB1 deficiency does not measurably impair TLR4-driven secretion of TNF-α or IL-6, arguing against a generalized secretory defect as the basis for reduced inflammasome-associated outputs.
      source: figure_2_c_v2.yaml
      panel_id: 2c
    - type: paragraph
      text: We next asked whether the Ephb1-dependent difference specifically affects inflammasome-triggered IL-1β release across different levels of stimulation. While IL-1β release increased with higher nigericin doses in both genotypes, EphB1-deficient macrophages consistently released less IL-1β than WT controls at each stimulatory dose (Fig. 2d). These results indicate that EphB1 deficiency limits mature IL-1β release across the tested range of NLRP3 activation, supporting a defect at a late inflammasome execution or export step rather than impaired priming.
      source: figure_2_d.yaml
      panel_id: 2d
    - type: paragraph
      text: We next examined whether this defect reflects impaired inflammasome assembly at the ASC platform. Under NLRP3 activation conditions, EphB1-deficient macrophages displayed levels of ASC oligomers, dimers, and monomers comparable to those observed in WT controls (Fig. 2e). These data indicate that EphB1 deficiency does not disrupt ASC oligomerization during NLRP3 inflammasome activation, arguing against defective inflammasome assembly as the basis for reduced downstream outputs.
      source: figure_2_e.yaml
      panel_id: 2e
    - type: paragraph
      text: We next examined whether caspase-1 activation itself is preserved. Caspase-1 activation, as reflected by intracellular p20 levels, was comparable between WT and EphB1-deficient macrophages (Fig. 2f). These results localize the EphB1-dependent defect to a step downstream of caspase-1 activation.
      source: figure_2_f.yaml
      panel_id: 2f
    - type: paragraph
      text: We next examined whether the canonical caspase-1 substrates—pro-IL-1β and GSDMD—are processed normally. Caspase-1–dependent cleavage of GSDMD and pro–IL-1β occurred efficiently in EphB1-deficient macrophages, yielding levels of cleavage and maturation comparable to those in WT cells (Fig. 2g). Together, these results demonstrate that EphB1 deficiency does not compromise caspase-1 substrate cleavage per se but selectively limits the extracellular release of mature inflammasome products, thereby localizing the defect to a late execution or export step.
      source: figure_2_g.yaml
      panel_id: 2g
    - type: paragraph
      text: Having mapped the bottleneck pyroptotic execution,  we next asked whether Ephb1 specifically gates the early engagement of GSDMD-NT with mitochondria that precedes pore function and organelle injury.
      source: opening_and_trans.yaml
      panel_id: ''
    - type: heading
      level: 2
      text: EphB1 deficiency reduces mitochondrial enrichment of GSDMD
    - type: paragraph
      text: To investigate how Ephb1 regulates pyroptotic execution, we examined mitochondrial integrity and GSDMD localization during NLRP3 inflammasome activation in WT and Ephb1-deficient macrophages.
      source: opening_and_trans.yaml
      panel_id: ''
    - type: paragraph
      text: Upon inflammasome activation, EphB1-deficient macrophages exhibited reduced accumulation of cytosolic ROS and a smaller loss of mitochondrial membrane potential compared with WT cells. In contrast, mitochondrial ROS levels measured by MitoSOX showed no significant genotype-dependent difference (Fig. 3a,b,c,d,e,f,g,h). Together, these results indicate that EphB1 deficiency does not cause an intrinsic alteration in mitochondrial membrane potential at baseline but limits ROS accumulation and mitochondrial depolarization during inflammasome activation, suggesting reduced mitochondrial damage.
      source: figure_3_a+b+c+d+e+f+g+h.yaml
      panel_id: 3a/b/c/d/e/f/g/h
    - type: paragraph
      text: We therefore examined early mitochondrial events during inflammasome activation to determine whether Ephb1 deficiency affects mitochondrial content release. In WT macrophages, inflammasome activation induced a rapid and transient pulse of cytosolic mtDNA, peaking at 7.5min, whereas this cytosolic mtDNA peak was markedly reduced in EphB1-deficient macrophages (Fig. 3i,j,s3,d,f,g). Together, these results indicate that EphB1 deficiency reduces inflammasome-induced release of mitochondrial DNA into the cytosol without altering total mtDNA abundance.
      source: figure_3_i+j+s3_d+f+g.yaml
      panel_id: 3/i/j/s3/d/f/g
    - type: paragraph
      text: We next examined whether GSDMD recruitment to mitochondria follows a similar temporal pattern during inflammasome activation. In WT macrophages, GSDMD-NT accumulated in the mitochondrial fraction at approximately 7.5 min after inflammasome activation, whereas this early mitochondrial enrichment of GSDMD-NT was markedly reduced in Ephb1-deficient macrophages (Fig. 3k,s3e). Together, these results indicate that EphB1 promotes early mitochondrial enrichment of GSDMD-NT during inflammasome activation.
      source: figure_3_k+s3_e.yaml
      panel_id: 3k/s3e
    - type: paragraph
      text: Having localized the execution defect to the GSDMD–mitochondria interface,  we next asked whether a defined lipid gate at the mitochondrial membrane—cardiolipin abundance—accounts for the altered engagement efficiency.
      source: opening_and_trans.yaml
      panel_id: ''
    - type: heading
      level: 2
      text: EphB1 deficiency reduces cardiolipin abundance
    - type: paragraph
      text: To determine whether mitochondrial membrane composition contributes to the Ephb1-dependent phenotype, we quantified cardiolipin abundance in WT and Ephb1-deficient macrophages.
      source: opening_and_trans.yaml
      panel_id: ''
    - type: paragraph
      text: Ephb1-deficient macrophages displayed significantly lower NAO fluorescence than WT cells, indicating a reduced NAO-detectable cardiolipin pool (Fig. 4a,b).
      source: figure_4_a+b.yaml
      panel_id: 4a/b
    - type: paragraph
      text: We next examined whether lipidomic analysis confirms changes in cardiolipin abundance. Compared with WT cells, Ephb1-deficient macrophages exhibited a significant reduction in total cardiolipin abundance(~70% of WT levels) (Fig. 4c,d). Together, these lipidomic data show that EphB1 deficiency not only reduces the NAO-accessible cardiolipin pool but also decreases total cardiolipin abundance, providing a quantitative membrane lipid basis for the attenuated mitochondrial damage observed in EphB1-deficient macrophages.
      source: figure_4_c+d.yaml
      panel_id: 4c/d
    - type: paragraph
      text: We next tested whether pharmacological inhibition of cardiolipin biosynthesis alters  cardiolipin abundance. AD treatment markedly reduced NAO fluorescence in WT macrophages, pharmacological inhibition of cardiolipin biosynthesis decreases the cardiolipin abundance (Fig. 4e,f).
      source: figure_4_e+f.yaml
      panel_id: 4e/f
    - type: paragraph
      text: We next examined whether reduced cardiolipin abundance affects inflammasome-mediated IL-1β release. AD treatment markedly suppressed LPS and Nigericin induced IL-1β release in macrophages (Fig. 4g). These results indicate that pharmacological reduction of cardiolipin abundant suppresses inflammasome-induced IL-1β release.
      source: figure_4_g.yaml
      panel_id: 4g
    - type: paragraph
      text: We next tested whether perturbation of cardiolipin remodeling produces a similar effect. BEL treatment led to a marked reduction in NAO fluorescence intensity, indicating that pharmacological interference with cardiolipin remodeling decrease the cardiolipin abundance (Fig. S4a,b). Together with perturbations targeting cardiolipin abundance, these results show that both manipulation of cardiolipin content and interference with cardiolipin remodeling can reduce NAO staining, indicating that changes in the NAO-accessible cardiolipin pool can arise through multiple mechanisms beyond alterations in total cardiolipin levels.
      source: figure_4_sa+b.yaml
      panel_id: s4a/b
    - type: paragraph
      text: We next examined whether this perturbation similarly affects inflammasome-mediated IL-1β release. Across these perturbations, reduced cardiolipin abundant consistently decreased LPS and Nigericin induced IL-1β release (Fig. S4c). Together, these results show that perturbations affecting cardiolipin abundance or remodeling consistently reduce inflammasome-mediated IL-1β release.
      source: figure_4_sc.yaml
      panel_id: s4c
    - type: heading
      level: 2
      text: Membrane context is the dominant cardiolipin-related axis perturbed by EphB1 deficiency
    - type: paragraph
      text: To identify cellular processes associated with cardiolipin variation, we defined biological process axes centered on cardiolipin metabolism, each represented by lipidomic indicators and gene sets, and evaluated their association with cardiolipin abundance across batches.
      source: opening_and_trans.yaml
      panel_id: ''
    - type: paragraph
      text: This framework defines six functional axes—synthesis, remodeling, transport, supply, oxidation, and membrane context—and assigns to each axis representative genes and lipid readouts derived from transcriptomic and lipidomic datasets (Fig. 5a).
      source: figure_5_a.yaml
      panel_id: 5a
    - type: paragraph
      text: We next defined the specific gene and lipid features assigned to each axis. For each axis, we defined representative genes and lipid features together with predefined weighting and inclusion rules (Fig. 5b).
      source: figure_5_b.yaml
      panel_id: 5b
    - type: paragraph
      text: We next normalized multi-batch omics datasets and computed comparable axis-level scores. For each omics layer, raw data underwent quality control, normalization, and batch-aware modeling, followed by aggregation into predefined axis-level Z scores used for multi-omics integration (Fig. 5c).
      source: figure_5_c.yaml
      panel_id: 5c
    - type: paragraph
      text: We next examined whether axis effects are consistent across omics layers and batches. Across three RNA-seq batches and four lipidomics batches, only the membrane context axis displayed a consistent positive effect in both omics layers, with stable directionality (Fig. 5d). These results identify the membrane context axis as the only axis consistently perturbed by Ephb1 deficiency across omics layers.
      source: figure_5_d.yaml
      panel_id: 5d
    - type: paragraph
      text: We next integrated evidence across batches to obtain aggregated axis-level scores. Among the six axes, the membrane context axis showed the largest deviation from zero, with a multi-omics Z score of approximately +2.6 (Fig. 5e). These results identify membrane context as the primary axis perturbed by EphB1 deficiency.
      source: figure_5_e.yaml
      panel_id: 5e
    - type: paragraph
      text: We next examined the relationship between axis scores and cardiolipin abundance. Among all axes, the membrane context axis showed the strongest negative association with sum_CL, with higher combined Z scores corresponding to lower total cardiolipin levels, whereas all other axes displayed weak or near-zero correlations (Fig. 5f). These results indicate that total cardiolipin abundance (sum_CL) consistently capture membrane context axis perturbations across batches.
      source: figure_5_f.yaml
      panel_id: 5f
    - type: paragraph
      text: We next examined which Ephb1 downstream signaling pathways correlate most strongly with the membrane context axis.
      source: opening_and_trans.yaml
      panel_id: ''
    - type: heading
      level: 2
      text: PI3K–AKT–mTOR signaling correlates with the membrane-context axis
    - type: paragraph
      text: To identify Ephb1 downstream signaling pathways associated with the membrane context axis, we constructed Ephb1-related pathway gene sets and evaluated their transcriptional changes and correlation with the membrane context axis.
      source: opening_and_trans.yaml
      panel_id: ''
    - type: paragraph
      text: We applied an RNA-based analysis framework in which Ephb1 status was treated as the upstream variable and downstream signaling pathway scores were evaluated for association with the membrane context axis (Fig. 6a).
      source: figure_6_a.yaml
      panel_id: 6a
    - type: paragraph
      text: We next defined candidate EphB1 downstream signaling gene sets for pathway-level analysis. Each gene set represents an EphB1-associated signaling pathway with predefined gene members and scoring directionality (Fig. 6b).
      source: figure_6_b.yaml
      panel_id: 6b
    - type: paragraph
      text: We next examined which pathways show consistent EphB1-dependent transcriptional changes across RNA batches. Across three RNA-seq batches, EphB1 deficiency induced consistent decreases in PI3K–AKT–mTOR pathway scores (KO < WT). NF-κB/ROS and JAK–STAT modules showed weaker or batch-dependent reductions, whereas cytoskeleton-related pathways displayed positive shifts (Fig. 6c).
      source: figure_6_c_v2.yaml
      panel_id: 6c
    - type: paragraph
      text: We next examined which pathways show the strongest change across batchs. Across pathways, PI3K–AKT–mTOR and JAK–STAT modules showed the largest decreases in EphB1-deficient macrophages, whereas cytoskeleton/adhesion pathways (FAK–Src–Rho) displayed positive shifts (Fig. 6d). Together, these results prioritize PI3K–AKT–mTOR as the most robust EphB1 downstream signaling candidate.
      source: figure_6_d_v2.yaml
      panel_id: 6d
    - type: paragraph
      text: We next examined whether these pathways correlate with the membrane context axis. Notably, the PI3K–AKT–mTOR pathway shows coordinated shifts along both axes, with KO samples displaced toward lower M and higher Z values, whereas WT samples occupy the opposite quadrant. In contrast, JAK–STAT inflammatory and FAK–Src–Rho cytoskeleton pathways separate primarily along the Z axis while largely overlapping along the M axis (Fig. 6e). These results show that reduced PI3K–AKT–mTOR signaling is consistently associated with increased membrane context axis scores.
      source: figure_6_e_v2.yaml
      panel_id: 6e
