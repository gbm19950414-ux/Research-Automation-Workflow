    - type: figure
      id: Figure 6
      title: An RNA X–M–Z framework prioritizes EphB1-linked pathways with orthogonal lipid alignment
      legend: '(a) Conceptual diagram illustrating an RNA-first X–M–Z framework that links EphB1 status (X), downstream signaling
        modules (M), and an RNA membrane context axis (Z), with independent lipid phenotypes used for directional concordance
        validation.. Not applicable Not applicable. Readout: Relationships among X (EphB1 status), M (RNA-based pathway module
        scores), and Z (RNA membrane context axis score), and their directional alignment with independent lipid readouts
        (Schematic representation of analytical logic). Normalization: Not applicable. n: Not applicable; stats: Not applicable.
        The framework decomposes cross-omics interpretation into three evaluation layers: cross-batch consistency of X→M effects,
        within-batch coupling between M and Z, and directional concordance between Z and independent lipid phenotypes; it
        is intended for pathway prioritization rather than formal causal mediation. (b) Curated table defining EphB1 downstream
        signaling modules (gene sets) and mapping each module to the cardiolipin mechanistic axes it is expected to influence..
        Not applicable (module definition table) Not applicable. Readout: Module identifiers and labels, network category,
        targeted cardiolipin axes, module size, and gene lists annotated with gene_effect_sign for standardized module scoring
        direction (Structured table (module dictionary)). Normalization: Not applicable. n: Not applicable; stats: Not applicable.
        This table is referenced for downstream module scoring and mechanistic integration and does not present quantitative
        comparisons. (c) Pathway-level transcriptional response scores for curated EphB1 downstream signaling modules in WT
        and Ephb1−/− primary peritoneal macrophages across three independent RNA-seq batches, summarized as per-batch z_pathway
        shifts and cross-batch meta Z effects.. Unstimulated condition consistent with the RNA-seq experiments Single endpoint
        at the time of RNA collection (per batch). Readout: EphB1 downstream signaling module response scores (z_pathway)
        and cross-batch meta Z (RNA-seq–based differential expression (DESeq2, batch-wise log2 fold change) followed by gene-set
        aggregation to compute pathway response scores). Normalization: Pathway scores were standardized within each batch
        as z_pathway and integrated across batches using a meta Z approach to summarize directional consistency and effect
        magnitude. n: n = 3 RNA-seq batches; stats: not applicable (cross-batch consistency and effect-size ranking). Meta
        Z values reflect directionally consistent shifts across batches rather than single-batch significance; pathway response
        scores represent transcriptional footprints and do not directly report kinase phosphorylation activity. # ----------
        8. English ----------. (d) Cross-batch ranking of EphB1 downstream signaling modules by genotype-associated transcriptional
        shifts (ΔM) and assessment of their coupling robustness with the Membrane context axis using within-batch regression
        and pooled leave-one-out refitting.. Unstimulated condition consistent with the RNA-seq datasets Single RNA collection
        endpoint per batch. Readout: Batch-level ΔM (KO−WT) for EphB1 downstream signaling modules and corresponding M↔Z coupling
        coefficients (β_M) with robustness evaluated by leave-one-out refitting (RNA-seq–based pathway footprint scoring followed
        by batch-wise aggregation of ΔM, within-batch linear regression of Z ~ M + X, and pooled leave-one-out refitting).
        Normalization: ΔM values were computed within each batch as mean(KO)−mean(WT); regression coefficients were derived
        without cross-batch pooling of expression values. n: 3 RNA-seq batches; pooled LOO across all samples; stats: Linear
        regression within batch; robustness assessed by sign consistency under LOO. Module prioritization is based on the
        concordance of cross-batch ΔM direction and the stability of M↔Z coupling under leave-one-out refitting, and is intended
        for candidate ranking rather than formal causal inference. (e) Mediation analyses testing whether EphB1-dependent
        changes in five lipid indicators are transmitted through RNA-seq–derived downstream signaling pathway scores, summarized
        as pathway-specific indirect effects (a×b) with bootstrap confidence intervals.. No external stimulation; steady-state
        condition. For each lipid indicator (Y), separate X→M→Y mediation models were fit using nine curated EphB1 downstream
        pathway sample-level scores as mediators (M) Single endpoint (paired RNA + lipid measurements). Readout: Indirect
        effects (a×b) of EphB1 genotype on five lipid indicators: CL fraction (CL/total), membrane CL content, mitochondrial
        total lipid mass (PC+PE+CL), membrane PC, and membrane PE (Linear mediation framework with paths a (M ~ X) and b (Y
        ~ X + M), reporting the indirect effect a×b per pathway for each lipid indicator). Normalization: Pathway mediator
        variables are RNA-seq–derived transcriptional signature scores (sample-level scores); indirect effects are shown as
        bootstrap means with 95% confidence intervals, and direction labels denote the signs of a and b (e.g., a+, b+ or a+,
        b−). n: n=3 WT and n=2 KO (batch1); same sample set as Fig. 6d; stats: bootstrap inference for indirect effects (a×b).
        Indirect-effect magnitudes are comparable only within the same lipid indicator panel because units and scales differ
        across indicators; pathway scores are transcriptional footprints and do not directly report kinase activity or protein
        phosphorylation.'
