博士论文最终检查清单:
  元信息:
    论文类型: "博士学位论文"
    学科: "生物学"
    写作语言: "中文"
    学位授予单位: "中国高校"
    模板版本: "v1.0"
    最近更新日期: "YYYY-MM-DD"
    当前状态: "进行中"   # 进行中 | 已完成

  扫描策略:
    核心原则:
      - "内容修改与格式修改严格分离"
      - "一次扫描只完成一个认知目标"
      - "扫描阶段只标记问题，不立即修改"
    推荐顺序:
      - 科学内容一致性
      - 表达方式与术语统一
      - 引用关系与文献完整性
      - 逻辑导航与阅读体验
      - 最终格式与提交合规

  科学内容一致性:
    目标: "确保全文在科学结论与逻辑推理层面完全自洽"
    检查项:
      结论一致性:
        说明: "同一研究发现在不同章节中的表述强度与结论方向一致"
        具体检查:
          - "结果、讨论与总结部分对同一现象的结论不存在矛盾"
          - "因果关系与相关关系的使用前后一致"
          - "讨论部分未出现结果章节未支持的强化结论"
        状态: "未检查"

      机制解释连贯性:
        说明: "机制性解释在不同章节与图表中保持稳定"
        具体检查:
          - "关键通路或分子机制不存在前后方向变化"
          - "未引入缺乏实验数据支持的新机制"
          - "推测性机制均被明确标注为推测"
        状态: "未检查"

      阴性结果处理一致性:
        说明: "对无显著变化或阴性结果的解释前后一致"
        具体检查:
          - "阴性结果未在其他章节被间接夸大"
          - "“无变化”“未见显著差异”等表述统一"
        状态: "未检查"

  表达方式与术语统一:
    目标: "统一全文术语、语气和语言风格"
    术语语言策略:
      核心原则: "缩写作为学术主语言，中文名用于引入与概括"
      分类规则:
        有缩写术语:
          首次出现: "中文名（英文名，缩写）"
          后续使用: "缩写"
          特殊位置: "章节标题或总结允许使用中文名"
        无中文名术语:
          首次出现: "英文名 + 功能说明"
          后续使用: "英文名"
        无缩写概念:
          使用规则: "全文中文"
    具体步骤:
      总原则:
        - "先建立统一标准，再进行全文替换，避免边读边改"
        - "一次扫描只处理一种问题（术语 / 动词强度 / 文体语态）"
        - "扫描阶段只标记问题，修改阶段再集中处理"

      Step_1_建立统一标准表:
        目的: "明确全文唯一允许的表达方式"
        操作:
          - "整理核心术语列表（中/英/缩写）"
          - "为每个术语指定唯一后续写法"
          - "列出禁用写法，防止同义替换"
        产出物: "统一术语与表达标准表"

      Step_2_核心术语统一:
        目的: "消除概念漂移"
        操作:
          - "按术语表逐一全文搜索"
          - "将所有非标准写法替换为统一写法"
          - "确保缩写不早于首次定义"

      Step_3_动词强度校正:
        目的: "保证结论强度与证据等级匹配"
        操作:
          - "全文搜索高强度结论动词（如 表明/导致/证明）"
          - "同一科学主张统一使用同一强度等级动词"
          - "推测性结论明确使用保守措辞"

      Step_4_文体与语态统一:
        目的: "提升整体专业性与一致性"
        操作:
          - "方法部分统一为被动语态，避免第一人称"
          - "结果部分仅客观描述，不引入解释"
          - "讨论部分避免口语化和情绪化表达"

      Step_5_快速复扫:
        目的: "防止修正引入新的不一致"
        操作:
          - "复查各章首段与末段"
          - "核对摘要与正文中的术语和动词"
          - "确认图注与正文表达一致"

    检查项:
      核心术语统一:
        说明: "同一科学概念仅使用一种规范表述"
        具体检查:
          - "缩写在首次出现时完整定义，之后统一使用"
          - "基因、蛋白、通路命名符合统一规范"
          - "不存在同义替换导致的概念漂移"
        状态: "未检查"

      动词强度控制:
        说明: "语言强度与证据等级严格匹配"
        具体检查:
          - "只有在数据充分支持时使用强结论动词"
          - "推测性结论使用保守措辞"
          - "同一结论未在不同位置使用不同强度动词"
        状态: "未检查"

      文体与语态一致性:
        说明: "不同章节遵循固定文体规则"
        具体检查:
          - "材料与方法部分统一使用被动语态"
          - "讨论部分以分析性语言为主，避免叙事化"
          - "第一人称使用遵循统一规则"
        状态: "未检查"

  引用关系与文献完整性:
    目标: "确保所有引用准确、必要且与论断严格对应"
    检查项:
      引用与论断匹配:
        说明: "每一条文献引用都精准支持其对应论断"
        具体检查:
          - "不存在一篇文献支撑多个不相关结论的情况"
          - "关键机制性论断优先引用原始研究文献"
        状态: "未检查"

      过度或不足引用:
        说明: "避免引用冗余或关键文献缺失"
        具体检查:
          - "教材级常识未被过度引用"
          - "重要结论未仅依赖单一薄弱文献"
        状态: "未检查"

      参考文献列表一致性:
        说明: "正文引用与参考文献列表完全对应"
        具体检查:
          - "正文中出现的文献均存在于参考文献列表"
          - "参考文献列表中不存在未被引用条目"
          - "文献格式符合学校或期刊要求"
        状态: "未检查"

  逻辑导航与阅读体验:
    目标: "降低阅读负担，使逻辑路径对读者清晰可循"
    检查项:
      章节开头逻辑:
        说明: "每一章明确回答“本章解决什么问题”"
        具体检查:
          - "章节开头清楚说明研究目的"
          - "明确与上一章节的逻辑衔接"
        状态: "未检查"

      段落内部流畅性:
        说明: "段落之间逻辑自然推进"
        具体检查:
          - "每个段落具有明确主题句"
          - "不存在突兀的逻辑跳跃"
        状态: "未检查"

      讨论结构导航:
        说明: "长篇讨论具有清晰结构提示"
        具体检查:
          - "小标题具有实质信息而非形式性"
          - "必要位置设置阶段性小结"
        状态: "未检查"

  最终格式与提交合规:
    目标: "确保论文形式完全符合提交与归档要求"
    检查项:
      图表规范性:
        说明: "图表编号、引用与说明完全正确"
        具体检查:
          - "图表编号连续且无遗漏"
          - "正文中均已引用所有图表"
          - "图注信息自洽、可独立理解"
        状态: "未检查"

      排版与版式:
        说明: "全文排版符合学校模板"
        具体检查:
          - "页边距、行距、字体符合要求"
          - "页眉、页脚与页码设置正确"
        状态: "未检查"

      最终提交前检查:
        说明: "提交前的技术性确认"
        具体检查:
          - "目录可自动正确更新"
          - "全文无批注、修订痕迹"
          - "PDF 转换后版式未破坏"
        状态: "未检查"

  最终确认:
    作者声明:
      说明: "作者对论文最终状态的确认"
      确认事项:
        - "所有检查项均已完成"
        - "已完成至少一次完整通读"
        - "论文已准备好提交"
      签署人: "作者姓名"
      日期: "YYYY-MM-DD"
      状态: "未确认"