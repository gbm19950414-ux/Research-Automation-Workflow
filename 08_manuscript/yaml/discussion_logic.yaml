meta:
  language: 中文
  document_role: 博士论文 Discussion 逻辑蓝图
  core_claim: EphB1 通过下游信号通路网络重塑线粒体膜环境（以多组学“机制轴”与中介分析为线索），改变心磷脂代谢状态（总量/谱系及可及池），从而设定
    GSDMD 焦亡执行阈值与 IL-1β 裂解性外排强度
  discussion_principles:
  - 先回答 what，再回答 so what，最后回答 what next
  - 所有讨论围绕“解释力是否优于替代解释”
  - 区分：发现本身 vs 解释 vs 推论
  result_logic_map:
    S1: 差异主要定位于焦亡执行层而非 priming/装配（“限幅输出”）
    S2: 执行接口落在 GSDMD-NT 与线粒体膜的早期对接/孔功能
    S3: CL 含量与“可结合/可及池”是执行阈值的关键膜脂阀门；药理操控与遗传缺失呈阶层定位/遮蔽关系
    S4: 多组学“机制轴”分析与中介分析用于从 EphB1 追溯到下游信号通路→膜环境/膜磷脂供给模块→CL 表型的上游调控网络（避免预设单一酶节点）
sections:
- id: 4.1
  title: 主要发现与创新点
  tag: what
  logic_goal: >
    将 Results 压缩为一条可被反驳但当前证据最优的解释链，并用三段式结构
    完成：核心结论与证据链（what）、概念与方法创新（so-what-in-what）、证据力度/边界/替代解释（defense）。
  narrative_role: >
    Discussion 的逻辑锚点：先把“活化≠输出强度”的领域矛盾收束为中心命题，
    再说明创新增量，最后声明证据力度与适用边界以完成裁决。
  principles:
  - 标题承担导航功能：只保留读者需要的 3 个子标题
  - 4.1.1 只讲“结论+证据链”，不展开大段背景
  - 4.1.2 只讲“概念增量+方法增量”，避免重复证据
  - 4.1.3 用“证据力度声明+边界+替代解释筛选”完成防御
  children:
  - id: 4.1.1
    title: 核心结论与证据链
    logic_goal: >
      用“领域矛盾→中心命题→证据链六跳”建立闭环，
      让读者一眼知道我们发现了什么、差异定位在哪里、为何更支持阈值—中介模型。
    narrative_role: >
      4.1 的开篇段：建立中心命题并按因果顺序串联证据类型，避免 Results 式细节复述。
    one_sentence_problem: >
      上游 priming/装配读出相近时，裂解性焦亡强度与 IL-1β 裂解性外排仍可显著分叉（“活化 ≠ 输出强度”），提示存在独立的末端执行阈值/上限层级。
    core_claim: >
      EphB1 的关键作用不在于显著改变炎症小体 priming/装配本身，
      而在于通过下游信号通路网络重塑线粒体膜环境，
      改变以心磷脂（CL）为核心的代谢状态（总量/谱系重塑/氧化及可及池），
      从而平移 GSDMD 执行端孔功能阈值并限幅 IL-1β 裂解性外排强度。
    evidence_chain_overview:
    - step: 现象
      point: EphB1 缺失降低裂解性输出与 IL-1β 外排，但该变化不等价于上游级联整体失活。
    - step: 定位
      point: 差异更集中于“激活之后的输出环节”，支持定位在执行端阈值/上限，而非装配是否发生。
    - step: 机制线索
      point: 与输出同向变化的膜环境/脂质读出同步出现；孔蛋白插膜/寡聚/导通受膜面电荷、相态、曲率与氧化等约束，膜环境可作为中介变量而非背景条件。
    - step: 因果组织
      point: 用“阶层遮蔽、同阶救援（作为关键后续验证）、剂量响应”表达阈值模型的可判别预期，并限定结论力度（当前更稳健为“必要性+层级定位”）。
    - step: 机制轴（多组学整合）
      point: 以供给/转运/合成/重塑/氧化/膜环境等轴级过程稳定表征 CL 表型，避免过早收敛到单一酶节点叙事，形成可跨批次复核的表型终点（Y）。
    - step: 中介分解（通路定位）
      point: 用 X–M–Y 框架把 EphB1 缺失（X）对机制轴/膜环境（Y）的影响分解为可检验的下游通路集合（M），产出优先级列表作为“路线图”而非直接机制证明。
    take_home: >
      用阈值—中介模型可解释“装配读出相近但裂解性输出分叉”的脱钩现象，
      并给出“受体信号→通路网络→膜环境/CL→孔功能→外排/裂解”的可检验链条。

  - id: 4.1.2
    title: 概念与方法创新
    logic_goal: >
      明确创新增量发生在两层：概念框架（阈值/限幅）与方法组织（执行端读出×膜脂读出配对 + 机制轴/中介分解路线图）。
    narrative_role: >
      回答“为何构成创新”：不是报告新关联，而是提供可迁移的解释接口与可复用的论证/分析范式。
    concept_innovation:
    - 将焦亡从“是否发生”的二元叙事推进为“执行端输出强度可被限幅”的阈值过程（孔功能、膜修复、膜破裂可拆分讨论）。
    - 为“炎症小体活化≠细胞因子释放强度”的脱钩现象提供结构性解释接口（上游可相近，阈值因膜环境平移而分叉）。
    - 将线粒体膜环境/CL 从“背景条件”提升为可量化、可操控的中介层级（阈值的接口变量）。
    method_innovation:
    - 执行端读出（孔功能/IL-1β 外排/裂解）× 膜脂读出（CL 代谢状态）配对，用于阈值问题的评估范式。
    - 遗传与药理交叉，按遮蔽/救援/梯度判据组织因果论证，并在文本中区分“必要性 vs 充分性”的证据力度。
    - 多组学“机制轴坐标系 + 中介分解”：先稳健定义表型终点（Y），再生成通路优先级（M），把解释转化为可逐跳验证的路线图。
    wording_guardrail: >
      创新段不重复 4.1.1 的证据细节；只讲“新增了什么解释能力/可复用范式”，并同步声明不过度外推。

  - id: 4.1.3
    title: 证据力度、边界与替代解释
    logic_goal: >
      用一个模块完成三件事：证据力度声明（我们能说到哪里）、测量与情境边界（我们不能说什么）、替代解释筛选（为何这是剩余最优解释）。
    narrative_role: >
      作为 4.1 的防御段：主动限定结论强度、吸收文献冲突与情境差异，降低被评审挑断言过强的风险。
    strength_statement:
      supported:
      - 结论更稳健支持“必要性 + 层级定位”：差异主要位于执行端阈值/上限层级，而非上游 priming/装配整体失活。
      - CL/膜环境具有强候选中介地位：与执行端读出形成系统耦合，并在操控与阈值预期上呈现可判别模式（遮蔽/梯度；救援作为下一步关键闭环）。
      - 机制轴与中介分解提供“追溯路线图”：用于优先级排序与提出可检验路径，而非以统计替代机制证明。
      not_yet_supported:
      - 不宜断言已量化 CL 的原位结合常数/精确可及池，当前表述应停留在“CL 代谢状态/膜环境代理变量”层级。
      - 不宜断言 EphB1 直接互作 GSDMD 或孔复合体（需共免/邻近标记/结构证据）。
      - 不宜将中介分析的候选通路直接等同于已验证机制节点（需独立通路操控闭环验证）。
    boundary_conditions:
    - 测量边界：CL 总量/代谢状态 ≠ 原位结合常数或精确可及池；“孔功能读出”与“最终膜破裂”也不完全等价（膜修复/膜破裂因子介入）。
    - 情境边界：刺激强度与时序会改变阈值可观测窗口；不同细胞类型的膜脂基线与膜修复能力不同，阈值位置可被平移。
    - 家族背景：Eph 家族亚型与共表达网络可能导致方向差异；本文结论限定在所研究免疫细胞与刺激情境。
    alternative_explanations_screen: >
      - "全局虚弱/细胞活性下降"：若上游装配读出未同步下降且膜环境操控可重现方向一致的执行端变化，则阈值—中介模型更简约。
      - "仅由 GSDMD 表达量/裂解效率解释"：这些更像决定“孔组装潜力”的输入变量，难以取代对孔稳定性/膜修复/膜破裂解耦的阈值讨论。
      - "直接互作模型"：在缺少直接互作证据前，保持为开放可能；即便存在，也需判断是否独立于膜环境机制轴（主路径 vs 旁路）。
    residual_best_model: >
      在当前证据与公共共识允许的力度范围内，
      “EphB1→下游通路网络→膜环境/CL→GSDMD 执行端阈值→IL-1β 外排/裂解强度”
      以最少额外假设解释最多观测结果，并给出最清晰的可检验后续路径。

  verdict:
    level: main_text
    reason: >
      4.1 采用三段式导航标题，对应正文重排：4.1.1（结论+证据链）/4.1.2（创新）/4.1.3（力度与边界）。
      同时保留“阈值—中介—机制轴/中介分解”的核心组织方式，减少碎标题与重复铺垫。
