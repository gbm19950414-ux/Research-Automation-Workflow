- id: 4.4
  title: 下一步研究方向：从细胞到系统
  tag: what_next
  logic_goal: '明确当前研究中尚未充分解决的关键科学不确定性， 并提出与本研究逻辑连续、技术上可行的后续研究路径， 用于检验、细化或限制当前解释框架。

    '
  narrative_role: '展示研究的延展性与可持续性， 明确哪些问题已被当前工作回答，哪些仍需独立验证或更高层级模型支持。

    '
  principles:
  - 每一方向均对应一个尚未充分解决的科学不确定性
  - 提出的是研究路径，而非确定结论
  - 避免与 Results 或 Discussion 主张形成循环论证
  children:
  - id: 4.4.1
    title: 验证 EphB1–CL 耦合是否具备因果充分性
    logic_goal: '检验在不依赖其他上游变化的前提下， 单独操控心磷脂相关代谢状态是否足以设定焦亡执行输出阈值。

      '
    narrative_role: '回应“相关性是否等同于因果性”的核心质疑， 明确当前证据链在因果强度上的上限。

      '
    key_questions:
    - 在 EphB1 恒定条件下，改变 CL 代谢状态是否足以改变 GSDMD 孔功能与裂解性输出？
    - 在 EphB1 缺失背景下，CL 层级的同阶补偿能否部分或完全救援执行端表型？
    - 不同幅度的 CL 改变是否呈现执行阈值的剂量–响应关系？
    experimental_directions:
    - 精细化操控 CL 合成/重塑通量
    - 结合遗传与药理的交叉遮蔽与救援实验
    - 区分“必要性证据”与“充分性证据”的实验设计
    verdict:
      level: brief
      reason: 充分性关键实验（CL 层级操控/救援）是最重要的下一步，只保留 1–2 句。
      target_paragraphs:
      - D5_future_takehome
  - id: 4.4.2
    title: 验证中介分析所指示的下游通路优先级
    logic_goal: '将多组学机制轴与中介分析的统计推断， 转化为可被独立实验检验的因果路径优先级列表。

      '
    narrative_role: '防止“机制轴/中介分析”仅停留在解释层面， 强化其作为下一步实验路线图的指导价值。

      '
    key_questions:
    - 中介分析优先级较高的通路操控，是否首先改变 CL 机制轴表型， 再影响 GSDMD 执行读出（时间与层级一致性）？
    - 是否存在多个并行或部分中介通路，其权重随刺激强度或代谢背景而变化？
    - 哪些通路对 priming/装配影响有限，却对执行阈值具有更高解释力？
    experimental_directions:
    - 通路级遗传或药理干预 → 机制轴评分/脂质组终点 → 执行端读出
    - 比较“同向变化”与“具有中介分解能力”的差异
    - 在不同刺激强度与时间窗口下重复验证通路优先级稳定性
    verdict:
      level: brief
      reason: 验证中介分析优先级：强调‘统计→可检验路线图’，保留 1 句。
      target_paragraphs:
      - D5_future_takehome
  - id: 4.4.3
    title: 追踪 EphB1 信号到线粒体膜环境的空间耦合路径
    logic_goal: '澄清 EphB1 受体信号如何在空间上与线粒体过程发生功能耦合， 填补“信号如何到达膜脂/线粒体层级”的结构性空白。

      '
    narrative_role: '将当前以功能与统计为主的路径定位， 延伸至亚细胞空间组织与信号中继机制。

      '
    open_questions:
    - EphB1 是否存在稳定或瞬时的线粒体相关定位？
    - 是否通过细胞器接触位点或信号中继复合体实现功能传递？
    methodological_needs:
    - 高时空分辨成像
    - 亚细胞分馏与互作组学
    - 条件性或瞬时激活体系
    verdict:
      level: supplement
      reason: 空间耦合与高分辨技术路线较长，适合补充或 grant 方向。
  - id: 4.4.4
    title: 将 EphB1–CL 轴嵌入免疫代谢框架
    logic_goal: '探讨该轴是否与巨噬细胞代谢重编程过程协同调控， 以及代谢状态是否反向调制焦亡执行阈值。

      '
    narrative_role: '将单一机制上升为免疫代谢网络中的一条分支， 解释不同代谢背景下阈值平移的合理性。

      '
    hypotheses:
    - EphB1–CL 轴可能与糖酵解/氧化代谢状态耦合
    - 代谢状态可能反向影响膜环境与执行端阈值
    future_approaches:
    - 代谢流分析
    - 单细胞多组学
    - 不同激活状态下的比较分析
    verdict:
      level: supplement
      reason: 免疫代谢框架外延较大，英文主体可不展开。
  - id: 4.4.5
    title: 从执行端阈值到组织与系统层面的累积效应
    logic_goal: '探讨执行层限幅在组织与系统尺度可能产生的长期与累积后果。

      '
    narrative_role: '连接单细胞层面的机制变化与整体炎症结局， 回应“该机制在体内是否有意义”的关键疑问。

      '
    open_directions:
    - 组织炎症阈值的设定与平移
    - 慢性炎症中执行端限幅的长期累积效应
    - 不同免疫细胞亚群间的协同或补偿机制
    verdict:
      level: supplement
      reason: 系统层面累积效应重要但证据跨度大，留作 future work 备忘。
  - id: 4.4.6
    title: 跨物种验证与应用潜力的边界
    logic_goal: '评估 EphB1–CL 轴在不同物种与人类样本中的保守性， 并讨论其作为干预靶点的理论可能性与现实限制。

      '
    narrative_role: '在保持科学克制的前提下回应外推与应用导向关切， 明确哪些推论尚不成立。

      '
    considerations:
    - 不同物种中 Eph 家族的功能分化
    - 人类免疫细胞中的表达与调控差异
    - 干预依赖时序、剂量与细胞类型的精细控制
    - 需警惕系统性与线粒体相关副作用
    verdict:
      level: supplement
      reason: 跨物种/应用边界可在投稿期刊要求下酌情加 1 句，否则不占主体字数。
  verdict:
    level: brief
    reason: what next 压缩成 2–3 句或 2–3 个要点；不展开成博士论文长度。
- id: 4.5
  title: 整体贡献与结论
  tag: take_home
  logic_goal: '用最少的话完成三件事：回到最初的科学问题、给出证据允许力度下的最终答案、并明确该答案对领域与后续工作的“可迁移增量”。

    '
  narrative_role: '作为全文 Discussion 的收束段：将 4.1–4.4 的论证压缩为可记忆的结论与边界声明， 让读者带走一个清晰的工作模型与下一步验证路线。

    '
  children:
  - id: 4.5.1
    title: 推进领域认识
    logic_goal: '概括本研究把“炎症小体激活”叙事推进到了哪一步：从上游装配读出到执行端阈值与中介层级。

      '
    narrative_role: '直接回答“这项工作改变了什么理解”，并与既有框架形成对照。

      '
    key_points:
    - 通过证据链将差异主要定位到焦亡末端执行层：在 priming/装配读出相近时，裂解性外排与细胞裂解仍可显著分叉（活化 ≠ 输出强度）。
    - 提出并支持“膜环境/膜脂代谢”为关键中介层级：心磷脂相关代谢状态（总量/谱系重塑/氧化及可及池）可平移 GSDMD 孔功能与裂解阈值，从而实现“限幅输出”。
    - 将 EphB1 放置为可检验的上游信号入口：其作用更符合通过下游通路网络重塑膜环境，而非直接作为炎症小体装配或孔蛋白的单点开关。
    - 方法论上引入“机制轴坐标系 + 中介分解”的组织方式：用跨组学证据为上游信号到膜脂表型的追溯提供可复核的优先级排序，避免过早收敛到单一候选酶节点。
    verdict:
      level: brief
      reason: 4.5 下子模块用于 take-home 收束；主体只保留压缩版本。
  - id: 4.5.2
    title: 三层价值总结
    logic_goal: '用“概念—方法—应用边界”三层结构收束全文贡献，并同步声明证据边界与适用条件。

      '
    narrative_role: '给出最终 take-home message：既强调增量，也避免过度承诺。

      '
    layers:
    - layer: 概念
      take_home: '焦亡不应仅被描述为二元结局，而应被视为由膜环境与膜修复共同设定的“执行端阈值过程”； 因而可在不完全关闭上游装配的前提下，通过调制膜脂中介实现裂解性输出的限幅。

        '
    - layer: 方法
      take_home: '将“执行端读出（孔功能/裂解性外排）”与“膜脂/机制轴读出（CL 代谢状态）”配对， 并用遗传/药理的遮蔽与同阶救援构建因果论证，再以多组学机制轴与中介分析生成通路优先级路线图。

        '
    - layer: 应用与边界
      take_home: 本研究为“精确调节炎症而非一刀切抑制”的策略提供了机制入口，但当前证据支持的重点是阈值模型与中介层级定位； 对于原位结合动力学、精确可及性参数、以及体内系统尺度的长期效应仍需在更高层级模型与独立验证中确证。
    verdict:
      level: brief
      reason: 4.5 下子模块用于 take-home 收束；主体只保留压缩版本。
  verdict:
    level: brief
    reason: 结尾 take-home：用 2–3 句收束工作模型与边界声明即可。
    target_paragraphs:
    - D5_future_takehome
verdict_schema:
  field_name: verdict
  level_enum:
  - main_text
  - brief
  - supplement
  - omit
  level_meaning:
    main_text: 英文期刊 Discussion 主体必须写（可与相邻段合并）。
    brief: 英文主体点到为止（通常 1–3 句），不展开细节。
    supplement: 不进入英文主体；可放补充材料/写作备忘/未来工作池。
    omit: 英文版建议不写（与其他段重叠或风险高）。
  target_paragraphs_note: 若提供 target_paragraphs，表示推荐放入的英文 Discussion 压缩段落（D1–D5）。
  paragraph_plan:
    D1_opening_claim: 现象→定位→一句话中心主张（阈值/限幅 + CL 中介 + EphB1 上游信号入口）
    D2_mechanism_evidence: 机制段：CL/膜环境如何设定 GSDMD 孔功能阈值（证据链概览式组织）
    D3_pathway_innovation: 路径定位 + 创新：机制轴/中介分解作为路线图（避免单点结论）
    D4_implication_limits_alternatives: 功能意义（点到为止）+ 边界/替代解释 + 证据力度声明
    D5_future_takehome: what next（压缩）+ take-home closing
