methods:

  - id: animals
    title: Animals
    assay_type: animal_model_and_ethics
    sources:
      - "2.1.1 实验动物"
    sentences:
      - id: ani_01
        role: animal_model_definition
        required: true
        text: >
          All experiments were performed using mice on a C57BL/6J genetic
          background.

      - id: ani_02
        role: genetic_background
        required: true
        text: >
          Ephb1 mutant mice and wild-type littermates were used in this study.

      - id: ani_06
        role: mutant_line_origin
        required: true
        text: >
          Ephb1 mutant mice were obtained from the piggyBac (PB) transposon-based
          mouse mutant library at the Institute of Developmental Biology and
          Molecular Medicine, Fudan University.


      - id: ani_03
        role: housing_conditions
        required: true
        text: >
          Mice were housed under specific pathogen-free (SPF) conditions with
          controlled temperature, humidity, and a 12 h light/12 h dark cycle.

      - id: ani_04
        role: thermoneutral_or_special_conditions
        required: false
        text: >
          Where indicated, mice were maintained under thermoneutral conditions
          using an environmental simulation control system.

      - id: ani_05
        role: water_and_diet
        required: true
        text: >
          Animals had ad libitum access to sterilized standard chow and
          acidified drinking water.


      - id: ani_07
        role: genotyping_and_age_selection
        required: true
        text: >
          Genotypes were confirmed by PCR-based analysis, and mice aged
          6-10 weeks were used for experiments.

      - id: ani_08
        role: ethical_approval
        required: true
        text: >
          All animal procedures were approved by the Institutional Animal Care
          and Use Committee of Fudan University and conducted in accordance
          with relevant guidelines and regulations.

  - id: primary_peritoneal_macrophage_isolation
    title: Primary peritoneal macrophage isolation
    assay_type: primary_cell_isolation
    sources:
      - "2.2.1 原代腹腔巨噬细胞分离与纯化"
    sentences:
      - id: pmi_01
        role: animal_source
        required: true
        text: >
          Primary peritoneal macrophages were isolated from 6–10-week-old
          C57BL/6J wild-type and Ephb1-deficient mice.

      - id: pmi_02
        role: induction_or_pretreatment
        required: true
        text: >
          To elicit macrophage recruitment, mice were intraperitoneally injected
          with 2 mL of sterile 4% thioglycollate medium.

      - id: pmi_03
        role: cell_harvesting
        required: true
        text: >
          Three days after injection, peritoneal exudate cells were harvested
          by lavage with pre-warmed phosphate-buffered saline (PBS).

      - id: pmi_04
        role: purification_and_handling
        required: true
        text: >
          Recovered cells were collected by centrifugation and subjected to
          red blood cell lysis when necessary.

      - id: pmi_05
        role: seeding_and_stabilization
        required: true
        text: >
          Cells were resuspended in RPMI 1640 medium supplemented with 10%
          fetal bovine serum and antibiotics, counted, and seeded at the
          indicated densities.

      - id: pmi_06
        role: seeding_and_stabilization
        required: true
        text: >
          After 1–2 h of incubation, non-adherent cells were removed by gentle
          washing with PBS, and adherent macrophages were cultured overnight
          before downstream stimulation and assay procedures.

  - id: Cell culture and inflammasome stimulation
    title: Cell culture and inflammasome stimulation
    assay_type: cell_treatment_and_stimulation
    sources:
      - "2.2.2 炎症小体激活"
      - "2.2.3 Ephb1-FC 处理"
    sentences:
      - id: cct_01
        role: cell_source_context
        required: true
        text: >
          Primary peritoneal macrophages were subjected to defined inflammasome
          priming and activation protocols, with Ephb1-Fc perturbation applied
          where indicated.

      - id: cct_02
        role: priming_step
        required: true
        text: >
          For inflammasome priming, cells were treated with lipopolysaccharide
          (LPS) at a final concentration of 1–10 ng/mL for 4 h.

      - id: cct_03
        role: stimulation_definition
        required: true
        text: >
          NLRP3 inflammasome activation was induced by treatment with either
          nigericin or ATP, NLRC4 activation was triggered by cytosolic delivery
          of flagellin, and AIM2 activation was induced by transfection of
          poly(dA:dT).

      - id: cct_04
        role: stimulation_conditions
        required: true
        text: >
          For NLRP3 activation, cells were stimulated with nigericin
          (10 µg/mL) for 7.5–120 min or ATP (5 mM) for 2 h.

      - id: cct_05
        role: stimulation_conditions
        required: true
        text: >
          For NLRC4 activation, cells were transfected with flagellin
          (0.5 ng/mL) using Lipofectamine 2000 and incubated for 2 h.

      - id: cct_06
        role: stimulation_conditions
        required: true
        text: >
          For AIM2 activation, cells were transfected with poly(dA:dT)
          (0.1 ng/mL) using Lipofectamine 2000 and incubated for 8 h.

      - id: cct_07
        role: co_treatment_definition
        required: true
        text: >
          Where indicated, cells were co-treated with Ephb1-Fc fusion protein
          to modulate ephrin-B/EphB signaling during inflammasome activation.

      - id: cct_08
        role: ligand_or_complex_preparation
        required: true
        text: >
          To generate higher-order Ephb1-Fc clusters, Ephb1-Fc was pre-incubated
          with anti-human IgG Fc-specific antibody at a 10:1 ratio for 30 min
          at room temperature with gentle rotation.

      - id: cct_09
        role: ligand_or_complex_preparation
        required: true
        text: >
          Ephb1-Fc complexes were prepared at final concentrations of
          5, 0.5, 0.05, or 0.005 µg/mL in complete RPMI 1640 medium.

      - id: cct_10
        role: co_treatment_execution
        required: true
        text: >
          Pre-formed Ephb1-Fc complexes were added to cell cultures together
          with the indicated inflammasome stimuli.

      - id: cct_11
        role: reaction_termination_and_sample_collection
        required: true
        text: >
          At the end of stimulation, culture plates were immediately placed
          on ice, and supernatants and cell lysates were collected for
          downstream analyses.

  - id: Inflammasome assembly assays
    title: Inflammasome assembly assays
    assay_type: inflammasome_assembly_detection
    sources:
      - "2.3.4 ASC speck 交联"
    sentences:
      - id: iaa_01
        role: assay_scope_definition
        required: true
        text: >
          Inflammasome assembly was assessed by detecting ASC oligomerization
          using a chemical crosslinking-based assay.

      - id: iaa_02
        role: cell_stimulation_context
        required: true
        text: >
          Primary peritoneal macrophages were stimulated to activate the
          NLRP3 inflammasome under the indicated stimulation conditions.

      - id: iaa_03
        role: lysis_and_fractionation_strategy
        required: true
        text: >
          Following stimulation, cells were lysed with Triton X-100-containing
          buffer to separate soluble and detergent-insoluble fractions.

      - id: iaa_04
        role: insoluble_fraction_definition
        required: true
        text: >
          The detergent-insoluble pellet fraction, enriched for ASC specks,
          was collected for crosslinking analysis.

      - id: iaa_05
        role: chemical_crosslinking
        required: true
        text: >
          ASC oligomers in the insoluble fraction were chemically crosslinked
          using disuccinimidyl suberate (DSS).

      - id: iaa_06
        role: reaction_termination
        required: true
        text: >
          Crosslinking reactions were terminated by SDS-mediated denaturation
          prior to sample processing.

      - id: iaa_07
        role: readout_definition
        required: true
        text: >
          Crosslinked samples were analyzed by SDS-PAGE followed by Western
          blotting to detect high-molecular-weight ASC oligomers.

      - id: iaa_08
        role: comparison_context
        required: true
        text: >
          ASC oligomerization patterns in crosslinked insoluble fractions were
          compared with corresponding soluble lysate fractions.

  - id: Inflammasome output and cell death assays
    title: Inflammasome output and cell death assays
    assay_type: cell_death_quantification
    sources:
      - "2.2.8 细胞焦亡检测"
      - "2.2.9 细胞凋亡检测"
      - "2.3.4 分泌蛋白 ELISA 检测"
    sentences:
      - id: cda_01
        role: assay_scope_definition
        required: true
        text: >
          Inflammasome-associated cell death and cytokine release were
          quantitatively assessed following pharmacological or genetic
          perturbations.

      - id: cda_02
        role: cell_seeding_context
        required: true
        text: >
          Primary peritoneal macrophages were seeded in 96-well plates at
          a density of 1 × 10^5 cells per well and cultured overnight
          to allow metabolic stabilization.

      - id: cda_03
        role: treatment_execution
        required: true
        text: >
          Cells were subjected to inflammasome activation or control treatments
          as described above under a final volume of 100 µL per well.

      - id: cda_04
        role: positive_control_definition
        required: true
        text: >
          For maximal LDH release controls, cells were treated with lysis
          solution 45 min prior to sample collection.

      - id: cda_05
        role: sample_collection
        required: true
        text: >
          Following treatment, culture supernatants were collected for
          lactate dehydrogenase (LDH) release measurements.

      - id: cda_06
        role: signal_detection
        required: true
        text: >
          LDH activity in culture supernatants was determined using the
          CytoTox 96® Non-Radioactive Cytotoxicity Assay according to
          the manufacturer’s instructions.

      - id: cda_07
        role: measurement_parameters
        required: true
        text: >
          Absorbance was measured at 490–492 nm using a multimode microplate reader.

      - id: cda_08
        role: quantification_formula
        required: true
        text: >
          Percent cytotoxicity was calculated by normalizing LDH release from
          treated samples to maximal LDH release controls after background
          subtraction.

      - id: cda_12
        role: cytokine_readout_definition
        required: true
        text: >
          Levels of secreted cytokines in culture supernatants were measured
          using mouse TNF-α, IL-6, and IL-1β uncoated ELISA kits.

      - id: cda_13
        role: elisa_execution
        required: false
        text: >
          ELISA assays were performed according to the manufacturer’s
          instructions using 96-well high-binding plates.

      - id: cda_14
        role: standard_curve_and_readout
        required: true
        text: >
          Cytokine concentrations were calculated from standard curves
          generated using serially diluted recombinant standards.
      - id: cda_15
        role: control_assay_transition
        required: true
        text: >
          To distinguish inflammasome-associated output from non-pyroptotic
          cell death, apoptosis control assays were performed separately under
          matched culture conditions.

      - id: cda_09
        role: apoptosis_induction_definition
        required: true
        text: >
          Apoptosis was induced by treating cells with staurosporine at a final
          concentration of 1 µM for 4 h, with vehicle-treated cells serving
          as controls.

      - id: cda_10
        role: apoptosis_readout_definition
        required: true
        text: >
          Apoptotic signaling was evaluated by immunoblot detection of
          cleaved caspase-3.

      - id: cda_11
        role: data_analysis_context
        required: true
        text: >
          Data were obtained from at least three independent experiments and analyzed using the statistical procedures described below.

  - id: mitochondrial_functional_assays
    title: Mitochondrial functional assays
    assay_type: mitochondrial_functional_fluorescence
    sources:
      - "2.2.4 ROS 及膜电位染色与检测"
    sentences:
      - id: mfa_01
        role: assay_scope_definition
        required: true
        text: >
          Cellular and mitochondrial reactive oxygen species (ROS) production
          and mitochondrial membrane potential were assessed using fluorescent
          probe-based assays.

      - id: mfa_02
        role: probe_definition
        required: true
        text: >
          H2DCFDA was used to monitor total intracellular ROS, MitoSOX Red was
          used to detect mitochondrial superoxide, and tetramethylrhodamine
          methyl ester (TMRM) was used to assess mitochondrial membrane potential.

      - id: mfa_03
        role: experimental_sequence
        required: true
        text: >
          Experiments were performed sequentially, including LPS priming,
          probe loading, inflammasome activation, and fluorescence measurement.

      - id: mfa_04
        role: priming_or_pretreatment
        required: true
        text: >
          Cells were primed with lipopolysaccharide (LPS) for 4 h prior to
          fluorescent probe loading.

      - id: mfa_05
        role: probe_loading
        required: true
        text: >
          For probe loading, cells were incubated with H2DCFDA, MitoSOX Red,
          and TMRM in serum-free medium during the final 45 min of LPS priming.

      - id: mfa_06
        role: stimulation_execution
        required: true
        text: >
          Inflammasome activation was triggered by treatment with nigericin
          at a final concentration of 10 µg/mL.

      - id: mfa_07
        role: signal_acquisition
        required: true
        text: >
          Fluorescence signals were recorded immediately after stimulation
          using a temperature-controlled multimode microplate reader.

      - id: mfa_08
        role: measurement_parameters
        required: true
        text: >
          Fluorescence intensity was measured at excitation/emission wavelengths
          of approximately 488/525 nm for H2DCFDA, 510/580 nm for MitoSOX Red,
          and 550/576 nm for TMRM.

      - id: mfa_09
        role: measurement_parameters
        required: true
        text: >
          Kinetic measurements were performed at 2.5-min intervals for up to
          2 h following nigericin stimulation.

      - id: mfa_10
        role: data_quantification_context
        required: true
        text: >
          Fluorescence signals were quantified and compared across experimental conditions to assess changes in cellular ROS, mitochondrial superoxide, and mitochondrial membrane potential.

  - id: Cardiolipin accessibility and imaging assays
    title: Cardiolipin accessibility and imaging assays
    assay_type: fluorescence_imaging_and_quantification
    sources:
      - "2.2.5 CL 染色"
      - "2.2.7 显微成像数据处理"
    sentences:
      - id: cai_01
        role: assay_scope_definition
        required: true
        text: >
          Mitochondrial cardiolipin content was assessed using
          10-N-nonyl acridine orange (NAO) staining.

      - id: cai_02
        role: probe_definition
        required: true
        text: >
          NAO was used at low nanomolar concentrations to semi-quantitatively monitor cardiolipin-associated fluorescence signals in mitochondria.
      - id: cai_03
        role: probe_loading
        required: true
        text: >
          Following experimental treatments, cells were incubated with NAO
          at a final concentration of 200 nM for 30 min at 37 °C.

      - id: cai_04
        role: signal_acquisition
        required: true
        text: >
          After staining, fluorescence signals were acquired using either a
          multimode microplate reader or fluorescence microscopy.

      - id: cai_05
        role: measurement_parameters
        required: true
        text: >
          NAO fluorescence was measured at excitation/emission wavelengths
          of approximately 519/555 nm.

      - id: cai_06
        role: data_quantification_context
        required: true
        text: >
          Changes in NAO fluorescence intensity were used to compare cardiolipin-associated signals across experimental conditions.
      - id: cai_07
        role: imaging_transition
        required: true
        text: >
          In parallel with plate-based NAO quantification, microscopy-based
          imaging was performed to assess the subcellular distribution of
          cardiolipin-associated signals.

      - id: ima_01
        role: assay_scope_definition
        required: true
        text: >
          Confocal microscopy of NAO-stained primary macrophages was performed to visualize cardiolipin-associated subcellular signals.

      - id: ima_02
        role: sample_preparation_context
        required: true
        text: >
          Primary peritoneal macrophages were cultured on glass coverslips and
          subjected to the indicated treatments prior to fixation.

      - id: ima_03
        role: fixation_and_staining_definition
        required: true
        text: >
          Cells were fixed and, where indicated, permeabilized prior to staining.

      - id: ima_04
        role: fluorescent_labeling_definition
        required: true
        text: >
          For imaging, cells were stained with NAO to visualize cardiolipin-associated mitochondrial signals, with DAPI counterstaining applied where indicated.
      - id: ima_05
        role: microscopy_platform
        required: true
        text: >
          Fluorescence images were acquired using an Olympus SpinSR
          super-resolution confocal microscope.

      - id: ima_06
        role: image_acquisition_parameters
        required: true
        text: >
          Multichannel images were collected using identical laser power,
          detector gain, and exposure settings for all experimental groups.

      - id: ima_07
        role: sampling_strategy
        required: true
        text: >
          For each condition, multiple randomly selected fields of view were
          imaged, and a minimum of 100 cells per group were analyzed.

      - id: ima_08
        role: image_quantification_strategy
        required: true
        text: >
          NAO fluorescence was quantified by applying consistent intensity
          thresholding and particle/region-of-interest analysis to derive
          signal intensity and/or area metrics.

      - id: ima_09
        role: analysis_software_and_blinding
        required: true
        text: >
          Image quantification was performed using ImageJ software with
          consistent analysis parameters applied across all samples.

  - id: Mitochondrial isolation and mtDNA release analysis
    title: Mitochondrial isolation and mtDNA release analysis
    assay_type: mitochondrial_fractionation_and_mtDNA_analysis
    sources:
      - "2.3.5 线粒体分离"
      - "2.3.6 线粒体数量检测与 mtDNA 释放"
    sentences:
      - id: mia_01
        role: assay_scope_definition
        required: true
        text: >
          Mitochondria were isolated to assess mitochondrial integrity and
          cytosolic release of mitochondrial DNA (mtDNA) following inflammasome
          activation.

      - id: mia_02
        role: cell_treatment_context
        required: true
        text: >
          Primary peritoneal macrophages were stimulated with lipopolysaccharide
          followed by nigericin prior to subcellular fractionation.

      - id: mia_03
        role: fractionation_strategy
        required: true
        text: >
          Mitochondria were isolated using a commercial mitochondria isolation
          kit based on differential centrifugation under cold conditions.

      - id: mia_04
        role: fraction_definition
        required: true
        text: >
          Differential centrifugation was used to obtain mitochondrial
          fractions, cytosolic fractions, and corresponding total cell
          lysates for comparison.

      - id: mia_05
        role: mitochondrial_handling
        required: true
        text: >
          Isolated mitochondrial pellets were either maintained in storage
          buffer for functional analyses or lysed for downstream protein or
          nucleic acid extraction.

      - id: mia_06
        role: purity_assessment
        required: true
        text: >
          The purity of mitochondrial fractions was evaluated by quantitative
          PCR analysis of mitochondrial-encoded and nuclear-encoded DNA markers.

      - id: mia_07
        role: mtDNA_release_assay_definition
        required: true
        text: >
          Cytosolic mtDNA release was quantified by comparing mtDNA abundance
          in cytosolic fractions relative to total cellular mtDNA.

      - id: mia_08
        role: DNA_extraction_and_quantification
        required: true
        text: >
          DNA was extracted from total, mitochondrial, and cytosolic fractions,
          and mtDNA levels were quantified by real-time PCR.

      - id: mia_09
        role: normalization_and_calculation_logic
        required: true
        text: >
          Relative mtDNA release was calculated using ΔCt-based normalization
          of cytosolic mtDNA to total mtDNA within each sample.

      - id: mia_10
        role: replicates_and_statistics_context
        required: true
        text: >
          Analyses were performed using samples from at least three independent biological replicates and evaluated using the statistical procedures described below.

  - id: Immunoblot analysis
    title: Immunoblot analysis
    assay_type: protein_quantification_and_detection
    sources:
      - "2.3.3 蛋白提取与免疫印迹（Western Blot）"
    sentences:
      - id: pa_01
        role: assay_scope_definition
        required: true
        text: >
          Protein expression was analyzed by Western blotting.

      - id: pa_02
        role: sample_preparation
        required: true
        text: >
          Cells were lysed in Laemmli sample buffer supplemented with protease
          and phosphatase inhibitors, followed by heat denaturation.

      - id: pa_03
        role: protein_separation
        required: true
        text: >
          Protein samples were separated by SDS-PAGE using gels of appropriate
          acrylamide concentrations based on target protein molecular weight.

      - id: pa_04
        role: protein_transfer
        required: true
        text: >
          Separated proteins were transferred onto polyvinylidene fluoride
          (PVDF) membranes under cold conditions.

      - id: pa_05
        role: antibody_incubation
        required: true
        text: >
          Membranes were blocked and incubated with primary antibodies
          overnight at 4 °C, followed by incubation with HRP-conjugated
          secondary antibodies.

      - id: pa_06
        role: signal_detection
        required: true
        text: >
          Protein signals were visualized using enhanced chemiluminescence
          reagents and captured with a digital imaging system.

      - id: pa_07
        role: quantification_and_normalization
        required: true
        text: >
          Band intensities were quantified by densitometric analysis and normalized to GAPDH as a loading control.

      - id: pa_11
        role: data_processing_and_statistics
        required: true
        text: >
          Immunoblot quantification data were obtained from at least three independent experiments and analyzed using the statistical procedures described below.


  - id: rna_analysis
    title: Quantitative PCR analysis
    sources:
      - "2.3.2 RNA 提取与 qPCR"
    sentences:
      - id: rna_01
        role: assay_scope_definition
        required: true
        text: >
          Gene expression was quantified by real-time quantitative PCR (qPCR).

      - id: rna_02
        role: RNA_extraction_method
        required: true
        text: >
          Total RNA was extracted from primary peritoneal macrophages using
          TRIzol reagent according to standard protocols.

      - id: rna_03
        role: reverse_transcription
        required: true
        text: >
          Complementary DNA (cDNA) was synthesized using a two-step reverse
          transcription protocol with genomic DNA removal.

      - id: rna_04
        role: qPCR_chemistry_and_platform
        required: true
        text: >
          Quantitative PCR was performed using SYBR Green-based detection
          chemistry on a real-time PCR system.

      - id: rna_05
        role: reference_gene_definition
        required: true
        text: >
          Gene expression levels were normalized to the geometric mean of
          GAPDH and HPRT1 as reference genes.

      - id: rna_06
        role: data_quality_control
        required: true
        text: >
          Amplification specificity was confirmed by melt curve analysis,
          and technical replicates with excessive Ct variation were excluded.

      - id: rna_07
        role: relative_quantification_method
        required: true
        text: >
          Relative gene expression was calculated using the ΔΔCt method with
          wild-type samples serving as calibrators.

      - id: rna_08
        role: replicates_and_statistics_context
        required: true
        text: >
          Each mouse was treated as an independent biological replicate, and data were analyzed using the statistical procedures described below.

  - id: lipidomics
    title: Lipidomics
    assay_type: lipidomics_profiling_and_quantification
    sources:
      - "2.4.1 非靶/靶向脂质组学"
    sentences:
      - id: lip_01
        role: assay_scope_definition
        required: true
        text: >
          Lipidomic analyses were performed to characterize global and
          pathway-specific lipid alterations in primary peritoneal
          macrophages following Ephb1 deficiency.

      - id: lip_02
        role: sample_preparation_and_extraction
        required: true
        text: >
          Cellular lipids were extracted using a modified
          methyl tert-butyl ether (MTBE)-based method.

      - id: lip_03
        role: untargeted_lipidomics_definition
        required: true
        text: >
          Untargeted lipidomics was conducted to enable broad-spectrum
          detection and identification of lipid species.

      - id: lip_04
        role: LCMS_platform_and_acquisition
        required: true
        text: >
          Lipid extracts were analyzed by liquid chromatography coupled to
          high-resolution mass spectrometry with polarity switching and
          data-dependent MS/MS acquisition.

      - id: lip_05
        role: lipid_identification_strategy
        required: true
        text: >
          Lipid species were identified based on accurate mass measurements
          and MS/MS fragmentation patterns using dedicated lipidomics
          analysis software.

      - id: lip_06
        role: targeted_lipidomics_definition
        required: true
        text: >
          Targeted lipidomics was performed to quantitatively validate
          selected lipid species of interest identified in the untargeted
          analysis.

      - id: lip_07
        role: quantification_and_internal_standards
        required: true
        text: >
          Quantification was achieved using internal standards and
          calibration curves, and lipid abundances were expressed as
          relative or absolute quantities as appropriate.

      - id: lip_08
        role: data_normalization_and_scaling
        required: true
        text: >
          Lipidomic data were normalized and scaled prior to statistical
          analysis to reduce technical variation and improve comparability
          across samples.

      - id: lip_09
        role: multivariate_and_univariate_analysis
        required: true
        text: >
          Differential lipid abundance was assessed using univariate
          statistical testing and multivariate analyses, including principal
          component analysis.

      - id: lip_10
        role: quality_control_measures
        required: true
        text: >
          Quality control samples were included throughout the analytical
          workflow to monitor instrument stability, reproducibility, and
          data reliability.

  - id: rna_seq_analysis
    title: Transcriptomics
    assay_type: transcriptome_profiling_and_differential_expression
    sources:
      - "2.4.2 转录组分析"
    sentences:
      - id: rna_seq_01
        role: assay_scope_definition
        required: true
        text: >
          RNA sequencing (RNA-seq) was performed to characterize global
          transcriptomic changes in primary peritoneal macrophages.

      - id: rna_seq_02
        role: sample_preparation_and_RNA_quality
        required: true
        text: >
          Total RNA was extracted from macrophages, and RNA integrity and
          purity were assessed to ensure suitability for library construction.

      - id: rna_seq_03
        role: library_preparation_strategy
        required: true
        text: >
          Strand-specific RNA-seq libraries were prepared following mRNA
          enrichment or rRNA depletion using standard protocols.

      - id: rna_seq_04
        role: sequencing_platform
        required: true
        text: >
          Libraries were sequenced on an Illumina high-throughput sequencing
          platform using paired-end reads.

      - id: rna_seq_05
        role: raw_data_quality_control
        required: true
        text: >
          Raw sequencing reads were subjected to quality control to remove
