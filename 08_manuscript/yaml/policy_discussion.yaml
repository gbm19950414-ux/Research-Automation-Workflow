  study_summary:
    logic_chain:
      - id: D1
        paragraph: 1
        function: "提出领域中的核心悖论：upstream activation/assembly readouts相近，但lytic IL-1β release和membrane rupture可明显分离，说明activation与output之间存在decoupling。"
        lead_to: "需要一个能够解释这种activation–output decoupling的最小机制框架。"

      - id: D2
        paragraph: 1
        function: "将上述悖论收束为一个可证伪的最小链条：signal input通过某种membrane-state mediator被翻译为最终的pore/output差异。"
        lead_to: "需要把本文结果定位到这一框架中的具体层级。"

      - id: D3
        paragraph: 1
        function: "用本文结果支持该框架：Ephb1缺失降低lytic output和IL-1β release，但并未整体破坏priming、assembly或caspase activation，因此差异被定位在execution layer。"
        lead_to: "既然差异位于execution layer，就需要进一步提出execution层面的机制解释。"

      - id: D4
        paragraph: 1
        function: "将pyroptosis解释为一个graded process，而非binary switch；其输出由pore formation efficiency、pore stability/conductance以及membrane repair设定的sublytic ceiling共同决定。"
        lead_to: "需要把这一execution-threshold model进一步机制化。"

