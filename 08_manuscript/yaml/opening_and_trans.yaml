figures:

  Figure 1:
    claim: EphB1 deficiency reduces IL-1β release

    opening_en: >
      To identify regulators of inflammasome,
      we performed a genetic screening strategy in primary macrophages
      from PB genetic backgrounds using IL-1β release as the functional readout.

  Figure 2:
    claim: EphB1 deficiency maps to the level of the inflammasome receptor downstream pathway

    opening_en: >
      To determine where EphB1 functions within the inflammasome pathway,
      we compared inflammasome activation across NLRP3, AIM2, and NLRC4 stimuli
      in WT and Ephb1-deficient macrophages.

  Figure 3:
    claim: EphB1 deficiency reduces mitochondrial rupture

    opening_en: >
      To investigate how EphB1 regulates pyroptotic execution,
      we examined mitochondrial integrity and GSDMD recruitment to mitochondria
      during NLRP3 inflammasome activation in WT and Ephb1-deficient macrophages.

  Figure 4:
    claim: EphB1 deficiency reduces cardiolipin levels

    opening_en: >
      To test whether altered mitochondrial membrane composition contributes
      to the EphB1-dependent phenotype, we quantified cardiolipin levels
      in WT and Ephb1-deficient macrophages.

  Figure 5:
    claim: EphB1 deficiency alters the membrane environment axis

    opening_en: >
      To identify cellular processes associated with cardiolipin variation,
      we defined a set of biological process axes centered on cardiolipin metabolism,
      each represented by corresponding lipidomic indicators and gene sets,
      and evaluated their perturbation magnitude and association with cardiolipin abundance across batch.

  Figure 6:
    claim: EphB1 deficiency increases PI3K–AKT–mTOR signaling module

    opening_en: >
      To identify signaling pathways downstream of EphB1 associated with membrane context axis,
      we constructed EphB1 downstream pathway gene sets
      and evaluated their perturbation magnitude, consistency across samples,
      and covariation with the membrane context axis.
