figure_1: >
  Panel (a) is a schematic and does not contain quantitative data. Unless otherwise indicated, data are presented as mean ± SD, and n denotes biologically independent samples. Statistical significance was assessed using two-tailed unpaired t-tests, except that panel (b) was analyzed by two-tailed Welch’s t-test within each genetic background. Panels (c) and (d) were reproduced in ≥3 independent experiments. *P < 0.05, **P < 0.01, ***P < 0.001; ns, not significant.

figure_2: >
  Data are presented as mean ± SD unless otherwise indicate. n denotes biologically independent samples. For panels (a,b,e–g), n ≥ 3 per group, and results were reproduced in ≥3 independent experiments; for panel (d), n = 3 biological replicates per group, and each point represents one biological replicate. Statistical significance was assessed using two-tailed unpaired t-tests. In panels (a,b), transcript levels were normalized to GAPDH and expressed relative to unstimulated controls; in panel (c), ELISA signals were background-subtracted and normalized to cell number; and in panels (e–g), lysate and supernatant or soluble and insoluble fractions were analyzed in parallel. *P < 0.05, **P < 0.01, ***P < 0.001; ns, not significant.

figure_3: >
  Data are presented as mean ± SEM unless otherwise indicated. For panels (a–h), n ≥ 3 independent experiments, and fluorescence signals were normalized to the pre-stimulation baseline; statistical significance was assessed using two-tailed unpaired t-tests on area-under-the-curve or endpoint values, as indicated. Panels (g,h) show unstimulated baseline TMRM measurements. For panels (i,j), n ≥ 2 independent experiments per group, reproduced in ≥3 independent batches; cytosolic mtDNA was quantified by subcellular fractionation followed by qPCR and expressed relative to WT. For panel (k), n ≥ 3 biologically independent experiments per genotype, reproduced in ≥3 independent batches; mitochondrial and total GSDMD-NT abundance were assessed by immunoblotting and quantified by densitometry. Statistical significance was assessed using two-tailed unpaired t-tests. *P < 0.05, **P < 0.01, ***P < 0.001; ns, not significant.

figure_4: >
  Data are presented as mean ± SEM unless otherwise indicated, and n denotes biologically independent samples or experiments. For panels (a,b,e,f), n ≥ 3 per group, with results reproduced in ≥3 independent experiments; NAO fluorescence was quantified under matched acquisition settings, and statistical significance was assessed using two-tailed unpaired t-tests. For panels (c,d), n ≥ 3 biologically independent samples per group, reproduced in ≥2 independent batches; total cardiolipin abundance and species composition were quantified by LC–MS/MS lipidomics, and species-level comparisons were additionally evaluated with FDR correction. For panel (g), n ≥ 3 independent experiments per group, with results reproduced in ≥3 independent experiments; statistical significance was assessed using two-tailed unpaired t-tests, and genotype × dose effects were additionally evaluated by two-way ANOVA. *P < 0.05, **P < 0.01, ***P < 0.001; ns, not significant.

figure_5: >
  Panels (a–c) are conceptual or reference panels and do not present quantitative experimental comparisons or significance testing. Panels (d–f) summarize batch-level and integrated multi-omics analyses derived from WT and Ephb1−/− primary murine peritoneal macrophage datasets. In panel (d), effect_z values represent within-batch directional effect sizes and are interpreted by directional consistency across RNA-seq and lipidomics batches rather than by formal significance testing. In panel (e), batch-level axis scores were combined by Stouffer meta-analysis within and across omics layers; n denotes independent experimental batches (RNA-seq, 3 batches; lipidomics, 3–4 batches), and two-sided P values were derived from combined Z scores. In panel (f), each point represents one independent experimental batch; matched HO–WT contrasts were evaluated by linear regression / correlation analysis, and Pearson r and two-sided P values are reported. Unless otherwise indicated, significance is denoted as *P < 0.05, **P < 0.01, ***P < 0.001; ns, not significant.

figure_6: >
  Panels (a,b) are conceptual or reference panels and do not present quantitative experimental comparisons or formal significance testing. Panels (c–e) summarize RNA-seq–based analyses from unstimulated WT and Ephb1−/− primary murine peritoneal macrophages across 3 independent batches. In panel (c), pathway-level transcriptional scores were standardized within batch and integrated across batches as meta Z values to summarize directional consistency and effect magnitude. In panel (d), module prioritization was based on batch-level transcriptional shifts together with within-batch regression and pooled leave-one-out refitting; n denotes independent RNA-seq batches or samples, as specified, and no multiple-comparison correction was applied because the analysis is intended for candidate ranking rather than formal inferential testing. In panel (e), each point represents one RNA-seq sample; quantitative prioritization incorporated transcriptional shifts, correlation, and leave-one-out stability, whereas fitted lines are shown for visualization only. Unless otherwise indicated, significance notation is not applied in this figure because panels (c–e) are intended for pathway ranking, coupling assessment, and structural visualization rather than formal hypothesis testing of a single endpoint.