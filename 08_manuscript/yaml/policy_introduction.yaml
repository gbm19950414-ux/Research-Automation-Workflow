mode: submission
include_subheadings: false
keep_hypotheses: false
paragraph_groups:
  # =========================
  # Paragraph 1
  # Field importance
  # =========================
  field_importance:
    include:
      # topic_sentence
      - "1.1.1.p1s1"
      - "1.1.1.p1s2"
      # impact_sentence
      - "1.1.1.p2s1"
      # transition_sentence
      # - "1.1.1.p3s2"
      - "1.1.1.p3s3"
      - "1.1.1.p3s4"
      - "1.1.1.p3.bridge"
  # =========================
  # Paragraph 2
  # Known mechanism
  # =========================
  known_mechanism:
    include:
      # mechanism_overview
      - "1.1.2.p1s1"
      - "1.1.2.p1s2"
      # mechanism_details
      - "1.1.2.p2s1"
      # - "1.1.2.p2s2"
      # - "1.1.2.p2s3"
      - "1.1.2.p3s1"
      # - "1.1.2.p3s2"
      # transition to mechanistic focus
      - "1.1.2.p4s1"
      # - "1.1.2.p4s2"
      # - "1.1.2.p5s1"
      # - "1.1.2.p5s2"
      # - "1.1.2.p5s3"
      # - "1.1.2.p6s1"
      # - "1.1.2.p6s2"
      # - "1.1.2.p7s1"
      - "1.1.2.p4.bridge"
  # =========================
  # Paragraph 3
  # Mechanistic focus (cardiolipin)
  # =========================
  mechanistic_focus:
    include:
      # from paragraph 2 ending, trans to paragraph 3
      - "1.1.2.p5s2"
      # - "1.1.2.p5s3"
      - "1.1.2.p6s1"
      # - "1.1.2.p6s2"
      - "1.1.2.p7s1"
      # highlight_key_step
      - "1.1.3.p1s1"
      - "1.1.3.p1s2"
      - "1.1.3.p1s4"
      # supporting_literature
      - "1.1.3.p2s1"
      - "1.1.3.p2s3"
      - "1.1.3.p2s4"
      # transition_to_gap
      - "1.1.3.p3s1"
      - "1.1.3.p3.bridge"
  # =========================
  # Paragraph 4
  # Knowledge gap
  # =========================
  knowledge_gap:
    include:
      # state_unknown
      - "1.1.3.p3s2"
      - "1.1.3.p3s3"
      # - "1.2.2.p3s1"
      # - "1.2.4.p2s4"
      # mention_candidate_regulation
      # - "1.2.5.p1s1"
      - "1.2.5.p1s2"
      # - "1.2.5.p2s3"
      # - "1.2.5.p2s5"
      # lead_to_hypothesis
      - "1.2.5.p3s1"
      - "1.2.5.p3s3"
      - "1.2.5.p3.bridge"
  # =========================
  # Paragraph 5
  # Hypothesis
  # =========================
  hypothesis:
    include:
      # hypothesis_statement
      # - "1.1.3.p5s2"
      - "1.3.p4s1"
      - "1.3.p4s3"
      # approach
      # - "1.3.p3s1"
      # - "1.3.p3s2"
      # - "1.3.p3s3"
      - "1.3.p5s1"
      # - "1.3.p5s2"
      # - "1.3.p5s3"
      # overview
      - "1.3.p6s1"
      - "1.3.p6s2"
      - "1.3.p6s3"