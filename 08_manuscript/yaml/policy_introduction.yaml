      - "1.2.5.p3s1"
      - "1.2.5.p3s3"
      - "1.2.5.p3.bridge"
  # =========================
  # Paragraph 5
  # Hypothesis
  # =========================
  hypothesis:
    logic_chain:

      - id: L12
        function: "正式定义本文的中心科学问题。"
        leads_to: "为实验设计与研究策略提供直接导向。"

      - id: L13
        function: "说明研究策略不是直接假定上游activation增强/减弱，而是分层定位差异发生在哪一层，并检验CL state是否足以解释execution output差异。"
        leads_to: "完成从introduction到results部分的逻辑过渡。"
    include:
