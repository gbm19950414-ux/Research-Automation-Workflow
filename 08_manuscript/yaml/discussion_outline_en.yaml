discussion_outline:

  paragraphs:
    - id: D1
      sentences_en:
        - "The inflammasome field often treats upstream readouts—priming-dependent transcription, ASC speck formation, and caspase-1 activation—as near-equivalent proxies for inflammatory strength."
        - "In practice, a recurring structural paradox appears across models: upstream activation/assembly can look similar, yet lytic IL-1β release and membrane rupture diverge markedly."
        - "This activation–output decoupling is consistent with an execution-layer threshold or cap operating after assembly, shaping the magnitude and timing of output and whether rupture occurs at all."
        - "Accordingly, the central question is not simply whether NLRP3 activates, but how terminal output is capped or thresholded when upstream activation appears comparable."
        - "This paradox can be reduced to a falsifiable minimal chain in which signal input is translated through a membrane-state mediator into pore output."
        - "In this framing, upstream activation remains necessary, but it is not sufficient to predict the magnitude of lytic output."

    - id: D2
      title_en: "Evidence-chain synopsis: from localization to a threshold model"
      purpose:
        - "Provide a compact, reviewer-friendly evidence logic: phenomenon → localization → mechanism mediator → causal criteria."
        - "Introduce ESCRT repair and NINJ1 rupture separation as structural space for decoupling."
      verdict_level: "main_text"
      cn_source_sections:
        primary:
          - "4.1.2 证据链梗概"
        secondary:
          - "4.1.1（末端阈值语言）"
      claim_spine_en_skeleton:
        - "Phenotype anchor: Ephb1 loss shows weakened lytic outputs across inflammasome contexts."
        - "Localization: divergence is better explained at the execution layer than a global upstream shutdown."
        - "Execution is parameterized (pore efficiency/stability, conductance threshold, sub-lytic ceiling)."
        - "ESCRT repair can cap membrane catastrophe; rupture is separable (e.g., NINJ1)."
        - "Thus, a threshold/cap model is structurally plausible and testable."
      sentences_en:
        - "Our findings support this framework by localizing the phenotype to the execution layer and, in turn, to a threshold model of terminal output."
        - "Across a canonical LPS-priming–nigericin NLRP3 paradigm, as well as additional inflammasome settings, Ephb1-deficient macrophages showed blunted lytic output and reduced IL-1β release, without evidence that priming, assembly, or caspase activation was globally disabled."
        - "Instead, the divergence is better localized to the execution layer: pyroptosis is not a binary switch, but a graded process shaped by pore formation efficiency, pore stability and conductance, and a sublytic ceiling imposed by membrane repair."
        - "The execution-threshold model can be interpreted mechanistically in terms of membrane repair, terminal rupture, and membrane-environment mediation."
        - "Notably, terminal rupture is separable from pore formation and can be amplified by dedicated rupture factors such as NINJ1, creating scope for activation without proportional rupture."
        - "On this basis, an execution-threshold/cap model is both plausible and testable."
        - "To move beyond correlation, the model can be evaluated using three criteria: hierarchical masking, same-level rescue, and dose–response behavior."
        - "At present, our strongest support is for necessity and layer-localization; sufficiency requires dedicated rescue and pathway-validation experiments."
      cn_source_key_points:
        - "定位：差异发生在激活之后的输出环节"
        - "执行端拆分：孔形成/导通/修复/膜破裂"
        - "ESCRT限幅、NINJ1使孔与破裂可解耦"
      causal_criteria_to_state (adjudication language):
        - "hierarchical masking (downstream manipulation should override upstream differences)"
        - "same-level rescue (planned/partially missing; state as future causal test)"
        - "dose–response (graded shift expected under threshold model)"
      boundaries_en_skeleton:
        - "Current strength: necessity + layer-localization; sufficiency remains to be proven."
      compression_rule:
        max_sentences: 8
        must_include:
          - "phenotype anchor → localization"
          - "execution parameterization"
          - "ESCRT + rupture separability"
          - "three causal criteria (masking/rescue/dose-response)"
        must_avoid:
          - "detailing every assay; keep as logic synopsis"

    - id: D3
      sentences_en:
        - "In this framework, the membrane lipid environment—not upstream assembly—serves as the mediator layer translating signal input into execution output."
        - "Within this mediator layer, cardiolipin (CL) is best viewed as a quantifiable metabolic and biophysical state, rather than merely a binding-site concept, that can shift pore permissiveness."
        - "In this framework, Ephb1 acts as an upstream signal entry point whose loss propagates through downstream signaling networks to remodel the mitochondrial membrane environment, thereby shifting the threshold and ceiling of GSDMD pore output."
        - "Because complex systems often produce modest and distributed omics shifts, we avoid prematurely focusing on a single enzyme node and instead use cross-batch mechanism axes to capture reproducible membrane-environment phenotypes."
        - "We then use mediation decomposition to prioritize candidate downstream pathways that best explain how Ephb1 perturbs these axes and to generate a testable roadmap for targeted validation."
        - "Here, mediation is used as a ranking tool: it prioritizes pathways for targeted perturbation along a pathway → CL/axis state → pore/output logic without implying direct biochemical sufficiency."
        - "This mediator-first framework provides an interpretable way to explain activation–output decoupling: similar upstream activation can yield divergent lytic outputs if membrane-environment thresholds shift."
    - id: D4
      title_en: "Strength of claims, alternatives, and limitations (what we can and cannot conclude)"
      purpose:
        - "Adjudicate evidence strength (necessity > sufficiency)."
        - "Handle alternative explanations and literature/context conflicts in a controlled way."
        - "State internal/external validity limits without weakening the central claim."
      verdict_level: "main_text"
      cn_source_sections:
        primary:
          - "4.1.6 充分性与救援"
          - "4.1.7 替代解释与文献冲突的判断"
          - "4.3 技术与解释的局限性（内/外部效度要点）"
        secondary:
          - "4.1.4 必要性（可用1–2句，但不单列段）"
      claim_spine_en_skeleton:
        - "What is strongly supported: execution-threshold model + mediator layer localization."
        - "What is not yet supported: full sufficiency loop; direct Ephb1–GSDMD structural interaction; precise CL accessibility constants."
        - "Why the framework is robust to measurement limits: it models relative threshold shifts, not absolute physical constants."
        - "Context dependence explains literature conflicts: stimulus strength/timing, cell-type lipid background, Eph family context."
      sentences_en:
        - "Our central claim is deliberately scoped: the data most strongly support an execution-threshold model with membrane environment/CL as a high-priority mediator, whereas full sufficiency of the Ephb1→pathway→CL→pore chain remains to be established."
        - "We do not argue that upstream activation is irrelevant; rather, it is necessary but insufficient to predict lytic output magnitude, which also depends on execution-layer parameters such as pore efficiency and stability, repair engagement, and rupture probability."
        - "We also do not infer a direct Ephb1–GSDMD structural interaction or precise in situ CL accessibility or binding constants; instead, the framework is designed to explain relative threshold shifts using experimentally aligned readouts rather than absolute physical constants."
        - "Several alternative explanations remain testable, including ROS-first versus CL-first causality, dominance of repair or rupture pathways, and tool- or energetics-related confounds affecting CL-linked readouts."
        - "Accordingly, internal validity is constrained by measurement specificity, tool specificity, and batch structure, whereas external validity is limited by cell type, stimulation paradigm, and metabolic contexts in which nonlinear responses may dominate."
        - "Importantly, these boundaries do not negate the model; they define where the model should be expected to hold and what falsifiable predictions would overturn it."
        - "Taken together, the model provides a layer-localized explanation for decoupling and defines concrete experiments to test sufficiency and pathway priority."
      key_alternatives_to_list (as adjudication bullets):
        - "ROS-first vs CL-first causality (Ephb1→ROS→CL vs Ephb1→CL independent of ROS)"
        - "ESCRT/NINJ1 dominance (repair/rupture axis may dominate terminal lysis)"
        - "tool off-target/energetics confounds (e.g., BEL, ΔΨm affecting NAO and outputs)"
        - "GSDME/apoptosis cross-talk scenarios"
      limitations_bucket:
        internal_validity:
          - "measurement specificity (NAO vs LC–MS; ΔΨm and mitochondrial mass covariates)"
          - "tool specificity/off-targets (BEL enantiomers, energetic effects)"
          - "batch effects and modeling (LMM/robust handling)"
        external_validity:
          - "species/cell type (C57 peritoneal macrophage boundary)"
          - "stimulation paradigm (acute LPS+nigericin; chronic/infection may shift windows)"
          - "metabolic/ROS extremes (nonlinear regimes)"
      compression_rule:
        max_sentences: 9
        must_include:
          - "necessity vs sufficiency adjudication"
          - "explicit 'we do not claim' statements"
          - "top 3 alternative explanations + how to test"
          - "internal + external validity boundary"
        must_avoid:
          - "turning limitations into long methods; keep as decision-relevant constraints"

    - id: D5
      title_en: "Implications, next steps, and take-home conclusion"
      purpose:
        - "Provide brief functional/physiology implications without over-extrapolation."
        - "State 2–3 concrete next-step experiments that close the sufficiency loop and validate pathway priority."
        - "Deliver a 2–3 sentence take-home message aligned with the central claim."
      verdict_level: "brief"
      cn_source_sections:
        primary:
          - "4.2 功能意义与生理/疾病相关性（压缩为半段/数句）"
          - "4.4 下一步研究方向（只取4.4.1与4.4.2作为核心）"
          - "4.5 整体贡献与结论（作为closing模板）"
        secondary:
          - "4.2.2 启示（可借一句作generalizable principle）"
      claim_spine_en_skeleton:
        - "Implication (brief): execution-layer capping offers finer control than shutting down upstream activation."
        - "Next step 1: test causal sufficiency of CL rescue vs ROS lowering in KO."
        - "Next step 2: validate mediation-prioritized pathways with 'pathway → axis/CL → pore/output' three-step logic."
        - "Ephb1 acts as an upstream signal input that remodels the membrane environment, captured here by CL metabolic state, to shift the functional threshold and ceiling of GSDMD pore output, thereby explaining why activation readouts can remain similar while lytic outputs diverge."
      sentences_en:
        - "A practical implication of an execution-layer cap is that inflammatory signaling could, in principle, be modulated without fully shutting down upstream inflammasome activation, thereby preserving host defense while limiting lytic damage below a pathological threshold."
        - "To close the causal loop, a first priority is to test mediator-level sufficiency by comparing ROS lowering with direct CL restoration in Ephb1-deficient macrophages and asking whether CL rescue restores early GSDMD-NT engagement and lytic IL-1β release."
        - "A second priority is to test mediation-prioritized pathways by asking whether pathway perturbation first shifts CL/axis states and then alters early pore/output readouts without materially changing priming or assembly."
        - "Together, these experiments will determine whether the proposed chain is merely a correlated scaffold or a mechanistically sufficient route."
        - "Ephb1 acts upstream to remodel the membrane environment, captured here by CL state, and thereby shifts the threshold and ceiling of GSDMD pore output, explaining why activation readouts can remain similar while lytic outputs diverge."
        - "Framing pyroptosis in threshold terms—through pore formation, repair capping, and rupture separability—turns activation–output decoupling from an empirical observation into a testable model for interpreting inflammasome outputs."
      compression_rule:
        max_sentences: 7
        must_include:
          - "1 brief implication"
          - "2 key next steps (4.4.1 + 4.4.2)"
          - "2–3 sentence take-home aligned with D1 claim"
        must_avoid:
          - "disease-by-disease long mapping"
          - "grant-style future work expansion"

