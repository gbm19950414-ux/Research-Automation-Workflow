inputs:
  overall_logic: "/.../overall_logic.yaml"
  figures_glob: "/.../figure_*.yaml"

output:
  format: "markdown"
  path: "/.../Results_v0.md"

include_rules:
  framework:
    include_modules: ["M1_motivation", "M2_level_definition", "M5_panel_conclusion"]
  results_default:
    include_modules: ["M1_motivation", "M2_level_definition", "M3_directional_result", "M4_robustness", "M5_panel_conclusion"]
  results_by_logic_type:
    descriptive:
      include_modules: ["M1_motivation", "M2_level_definition", "M3_directional_result", "M5_panel_conclusion"]