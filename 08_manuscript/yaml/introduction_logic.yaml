meta:
  language: 中文
  document_role: 博士论文 Introduction 逻辑蓝图
  core_axis: Ephb1–线粒体膜脂（心磷脂）–炎症/细胞死亡执行
  writing_principles:
    - 由宏观到微观
    - 由现象到机制
    - 由共识到空白
    - 由描述到可检验假说

sections:
  - id: 1.1
    title: 炎症小体输出调控的病理背景与机制方向
    logic_goal: 建立炎症小体相关输出失衡在多种免疫病理中的重要性，并引出对炎症输出调控层级的关注
    narrative_role: 从疾病负担与免疫失衡切入，为后续讨论炎症小体输出调控的具体层级提供问题背景
    # NOTE: 炎症小体 priming–装配–执行 的三层级框架已在 1.1.2.0 明确给出
    # NOTE: 1.2.1 中关于细胞死亡/通透的讨论仅作为执行层“限幅/阈值”的边界对照，不再重复定义框架
    # PURPOSE: 为后文“调控通路定位”“执行层限幅”提供统一且不重复的概念坐标系
    key_points: []
    children:
      - id: 1.1.1
        title: 输出失衡与疾病负担
        logic_goal: 说明炎症小体相关输出失衡与多类免疫病理过程存在紧密关联
        narrative_role: 将“疾病负担”从广义炎症收束到炎症小体输出这一更贴近本文的病理单元
        key_points: []
        children:
          - id: 1.1.1.1
            title: 疾病负担的广泛性
            logic_goal: 用宏观事实支撑“炎症小体相关输出”在多病种中的病理关联性
            narrative_role: 为后续讨论“输出强度/层级干预”提供现实动机
            key_points:
              - 慢性炎症相关疾病的流行病学事实
              - 炎症作为多系统疾病的共性底层机制
            children: []
          - id: 1.1.1.2
            title: 输出强度的可干预性
            logic_goal: 强调炎症小体输出并非“全有或全无”，其强度与时序存在可调节空间
            narrative_role: 引出“选择合适调控层级”比单纯阻断更具策略意义
            key_points:
              - 炎症不是全有或全无
              - 末端输出具有更优治疗窗口
            children: []
          - id: 1.1.1.3
            title: 执行层限幅的必要性
            logic_goal: 指出现有上游阻断策略可能带来抗感染代价，提出“限幅输出”的需求
            narrative_role: 自然过渡到本文关注的执行层阈值/限幅调控思路
            key_points:
              - 广谱抗炎的免疫抑制风险
              - 精准调控执行层的必要性
            children: []
          - id: 1.1.1.4
            title: 过渡：从疾病负担到调控层级
            logic_goal: 明确炎症小体通路存在多层级调控入口，不同层级干预后果并不等价
            narrative_role: 将讨论从“重要性”自然转入“本文将聚焦的调控层级问题”
            key_points: []
            children: []

      - id: 1.1.2
        title: 执行层阈值与膜环境依赖
        logic_goal: 将“输出强度如何决定”落到执行层，并引出执行过程对膜环境的依赖
        narrative_role: 为后续从“执行层阈值”过渡到“膜环境/线粒体膜脂读出”搭桥
        key_points: []
        children:
          - id: 1.1.2.0
            title: 炎症小体三层级框架：priming–装配–执行
            logic_goal: 提供炎症小体通路的分层语言，便于定位“差异发生在哪一层”
            narrative_role: 为后文“我们聚焦执行层阈值/限幅”建立统一概念坐标系
            key_points: []
            children: []
          - id: 1.1.2.1
            title: 执行层瓶颈：GSDMD 成孔
            logic_goal: 说明 GSDMD 成孔是焦亡执行的核心事件，直接决定裂解性释放的强度
            narrative_role: 将“限幅输出”的讨论具体化到可量化的执行步骤
            key_points:
              - GSDMD 成孔决定炎症释放
              - 成孔行为可被定量描述
            children: []

          - id: 1.1.2.2
            title: 膜环境对成孔的约束
            logic_goal: 强调成孔与插膜行为受膜脂环境影响，脂质组成可改变执行效率
            narrative_role: 为引入“膜环境机制轴/关键膜脂读出（如 CL）”创造合理性
            key_points:
              - 脂质组成影响蛋白插膜
              - 膜决定孔的稳定性
            children: []

          - id: 1.1.2.3
            title: 线粒体状态与执行前提
            logic_goal: 概述线粒体功能状态与炎症小体信号/执行过程存在交叉证据
            narrative_role: 将线粒体引入为“膜环境来源与调控平台”，而非提前给出因果结论
            key_points:
              - ROS、能量、膜脂状态
              - 线粒体完整性影响炎症
            children: []
          - id: 1.1.2.4
            title: 过渡：从膜环境到膜脂读出
            logic_goal: 将“膜环境”具体化为可量化、可比较的膜脂读出指标，为后续聚焦 CL 提供理由
            narrative_role: 避免从“膜环境重要”直接跳到“单一膜脂”，增强论证平滑性
            key_points: []
            children: []

      - id: 1.1.3
        title: 膜环境读出与心磷脂（CL）
        logic_goal: 引入心磷脂作为线粒体膜环境的重要膜脂读出与候选调控节点
        narrative_role: 在不预设单一因果起点的前提下，为后续“上游信号如何影响膜环境/CL”铺垫
        key_points: []
        children:
          - id: 1.1.3.1
            title: 心磷脂的线粒体特异性
            logic_goal: 说明 CL 的线粒体内膜特异性及其与膜蛋白/膜结构的高度耦联特征
            narrative_role: 将 CL 合理化为“膜环境读出”的优先候选
            key_points:
              - 线粒体内膜特异
              - 与膜蛋白高度耦联
            children: []

          - id: 1.1.3.2
            title: 心磷脂与炎症执行
            logic_goal: 概述现有研究提示 CL 动态变化可能影响炎症小体相关执行过程
            narrative_role: 将 CL 从“结构脂质”提升为与执行接口相关的可检验变量
            key_points:
              - 重塑、外翻、氧化
              - 与炎症信号耦合
            children: []

          - id: 1.1.3.3
            title: 心磷脂上游调控缺口
            logic_goal: 明确“膜环境/CL 状态如何被上游信号调控”仍缺乏清晰机制框架
            narrative_role: 将缺口表述为“上游信号网络/通路层级”的未解问题，为引入候选信号入口做准备
            key_points:
              - 证据多为相关性
              - 缺乏明确信号轴
            children: []

      - id: 1.1.4
        title: Ephb1作为空间信号转译的潜在调控入口
        logic_goal: 提出 EphB1 作为候选上游信号入口，用于解释“信号—膜环境/CL—炎症小体输出”的连接可能性
        narrative_role: 回应 1.1.3 所界定的“上游信号调控缺口”，将论证推进到可检验的受体信号假设，并自然承接后续研究目标
        key_points: []
        children:
        # TODO: 在此处补充前期 PB 筛选结果作为研究起点
        # NOTE: 目的不是展示数据，而是回答“为何在炎症小体背景下关注 EphB1”
        # PURPOSE: 明确 EphB1 在 inflammasome 通路中的未知位置即为本研究的核心动机
        
          - id: 1.1.4.1
            title: Eph/Ephrin 从定位到代谢
            logic_goal: 概述 Eph/Ephrin 信号在免疫调控与代谢相关过程中的扩展证据
            narrative_role: 使 EphB1 作为候选入口在免疫病理语境下更自然
            key_points: []
            children: []

          - id: 1.1.4.2
            title: Eph 下游与线粒体交叉
            logic_goal: 概述 Eph 下游信号与线粒体功能/膜环境调控可能发生交叉的研究线索
            narrative_role: 为“上游信号可影响膜环境读出”提供合理过渡
            key_points: []
            children: []

          - id: 1.1.4.3
            title: Eph 与心磷脂/焦亡的潜在连接
            logic_goal: 提炼“EphB1—膜环境/CL—执行层输出”这一可检验连接作为研究假设雏形
            narrative_role: 完成从共识背景到具体研究问题的收束
            key_points: []
            children: []

  - id: 1.2
    # NOTE: 下述 TODO 节并非新增主线，而是用于承接“通路/机制轴定位”这一已在 1.3 中提出的核心假设
    title: 炎症小体执行层调控的共识与层级缺口
    logic_goal: 系统梳理炎症小体输出调控相关的主要研究方向，并明确不同调控层级之间仍存在的关键不确定性
    narrative_role: 将已有共识逐步收束至尚未被充分解析的调控层级，为提出研究问题奠定基础
    key_points: []
    # REVIEW: 本 section 的叙事顺序需要从“分子/脂质”调整为“机制轴/膜环境 → readout(CL)”
    # MOVE: 建议阅读顺序为 1.2.1 → 1.2.2 → 1.2.4 → 1.2.3 → 1.2.6
    # NOTE: 该调整用于匹配结果部分按“阶层定位 → 接口 → 膜环境 → CL 表型”的推进逻辑
    children:
      - id: 1.2.1
        title: 执行层成孔与膜通透：输出强度的决定界面
        logic_goal: 澄清炎症小体通路中“装配/激活”与“末端执行”在决定输出形式与强度上的分工，并引出膜通透作为可调控界面
        narrative_role: 作为 1.2 的起点，将讨论从“是否激活”转向“输出如何被限幅/重塑”，为后续膜环境与膜脂读出铺垫
        # SUGGEST: 若整体篇幅受限，可在本节中弱化与炎症小体关联较弱的死亡通路内容，避免被解读为广义细胞死亡综述
        # NOTE: 1.2.1.2–1.2.1.4 作为“非全或无/限幅”的边界对照使用；避免展开成广义细胞死亡综述主线
        # MOVE (optional): 若需压缩篇幅，可将 1.2.1.3（BCL-2）下移至 Discussion 或附录综述，仅保留一句边界声明
        key_points:
          - 焦亡以成孔为决定性步骤
          - 执行效率而非是否激活决定输出
        children:
          - id: 1.2.1.1
            title: 线粒体是细胞死亡的枢纽
            logic_goal: 将线粒体置于多种死亡模式的交汇点
            narrative_role: 将线粒体引入为“膜环境来源与调控平台”，为后续膜脂读出（CL）与执行层接口铺垫
            key_points: []
            children: []

          - id: 1.2.1.2
            title: 凋亡与亚致死状态
            logic_goal: 引入“非全或无”的死亡连续谱
            narrative_role: 作为“限幅/阈值”概念的边界对照，强调死亡/通透存在连续谱
            key_points: []
            children: []

          - id: 1.2.1.3
            title: BCL-2 家族调控内源性凋亡
            logic_goal: 总结经典线粒体依赖型凋亡通路
            narrative_role: 作为边界对照（对照线粒体通透的经典调控），避免与炎症小体主线并列展开
            key_points: []
            children: []

          - id: 1.2.1.4
            title: 非致死性线粒体通透信号
            logic_goal: 说明线粒体通透并不必然导致死亡
            narrative_role: 支撑“输出可被限幅/重塑”的思想：通透/损伤可在非致死区间调节
            key_points: []
            children: []

      - id: 1.2.2
        title: 膜脂环境对执行层成孔过程的普遍调控
        logic_goal: 总结孔形成/插膜过程对膜脂环境的普遍依赖，明确膜脂组成可调节执行效率与输出强度的共识框架，并为引入可量化膜脂读出（如 CL）奠基
        narrative_role: 将论证从“蛋白—通路”推进到“蛋白—膜界面”，为后续聚焦膜脂读出提供逻辑过渡
        # NOTE: 此处强调“普遍膜脂约束”，避免提前将 CL 设定为唯一或决定性因素
        key_points: []
        children:
          - id: 1.2.2.1
            title: 成孔蛋白对心磷脂的亲和性
            logic_goal: 总结已有生化与结构证据
            narrative_role: 为 CL 作为候选膜脂读出提供界面证据（不预设唯一性）
            key_points: []
            children: []

          - id: 1.2.2.2
            title: 其他成孔路径的膜脂约束
            logic_goal: 说明膜脂约束具有普遍性
            narrative_role: 避免将 CL 特殊化为个例
            key_points: []
            children: []

          - id: 1.2.2.3
            title: 膜脂改变影响膜受损方式
            logic_goal: 将膜脂变化与功能后果直接关联
            narrative_role: 为机制推断提供逻辑闭环
            key_points: []
            children: []

          - id: 1.2.2.4
            title: 膜脂改变的上游调控问题
            logic_goal: 指出现有研究的断裂点
            narrative_role: 为信号调控问题铺路
            key_points: []
            children: []

      - id: 1.2.4
        title: 线粒体作为炎症小体装配与输出的情境依赖调控平台
        logic_goal: 概述线粒体相关信号在炎症小体启动/装配中的证据，并强调其时间顺序与情境依赖性，而不预设单一因果起点
        narrative_role: 提供装配层与线粒体交叉的共识背景，使后续将线粒体作为膜环境来源与调控平台的讨论更自然
        # SUGGEST: 若需要进一步贴合结果主线，可将本节在阅读顺序上置于膜脂讨论之前，作为“背景平台”段
        key_points: []
        children:
          - id: 1.2.4.1
            title: 线粒体信号的功能定位：调控平台而非唯一起点
            logic_goal: 总结线粒体相关信号参与炎症小体启动/装配的常见证据框架，并强调其为“平台/来源之一”而非单一因果起点
            narrative_role: 提供共识背景，避免将后续膜环境讨论误读为“线粒体决定论”
            # NOTE: 这里的“平台”指证据汇聚点（ROS/离子/膜接触等），叙事上避免等同于必要且充分条件
            key_points: []
            children: []

          - id: 1.2.4.2
            title: 时间顺序与因果方向：区分“触发”与“继发”
            logic_goal: 强调装配层事件与膜环境/执行层改变在时间上可能先后不同，提示需要用时序证据区分“装配触发”与“执行限幅”
            narrative_role: 为后文将差异定位到执行层/膜环境层提供方法论直觉（以时序而非相关性下结论）
            key_points: []
            children: []

          - id: 1.2.4.3
            title: 损伤程度与输出形态：阈值效应与可逆窗口
            logic_goal: 概述线粒体损伤程度与炎症小体相关输出（细胞因子释放/裂解性通透）之间的关联线索，并强调存在阈值与可逆窗口的情境依赖
            narrative_role: 将“限幅/阈值”从概念落到可观察表型（损伤程度—输出形态），为后续膜脂读出（CL）作为桥梁变量做铺垫
            # SUGGEST: 若篇幅紧张，可将本节聚焦在“程度—表型”框架，避免展开具体损伤因子列表
            key_points: []
            children: []

      - id: 1.2.3
        title: 心磷脂在执行层成孔调控中的关键角色
        logic_goal: 在膜脂约束框架下，引入 CL 作为线粒体膜环境的关键读出与候选执行接口因素，梳理其动态变化与炎症小体相关执行过程之间的证据与不确定性
        narrative_role: 将讨论从“膜脂一般性约束”收束到“CL 这一可检验读出”，同时保留因果方向与上游调控仍不清晰的边界
        # NOTE: 保持 CL 为“读出/接口候选”而非单一因果起点，与当前领域共识一致
        # SUGGEST: 1.2.3.1–1.2.3.3 对应“重塑/外翻/氧化”三类动态，避免证据覆盖不均导致的选择性叙事质疑
        key_points: []
        children:
          - id: 1.2.3.1
            title: 心磷脂重塑与外翻的信号触发
            logic_goal: 总结 CL 动态变化的诱因
            narrative_role: 强调其可调控性
            key_points: []
            children: []

          - id: 1.2.3.2
            title: 心磷脂作为成孔蛋白结合位点
            logic_goal: 说明 CL 在执行层的直接作用
            narrative_role: 将膜脂与成孔行为直接耦联
            key_points: []
            children: []

          - id: 1.2.3.3
            title: 心磷脂氧化作为损伤读出与执行接口
            logic_goal: 补全 CL 动态变化中的“氧化”维度，概述氧化 CL 与膜损伤/炎症放大相关的研究线索
            narrative_role: 将“线粒体损伤程度—膜环境读出—执行层输出”的链条写完整，同时保持因果方向需验证的边界
            key_points: []
            children: []

      - id: 1.2.5
        title: Ephb1在连接质膜空间信号与线粒体膜环境中的上游定位缺口
        logic_goal: 梳理 EphB1 相关信号在免疫调控与代谢过程中的研究线索，明确其与线粒体膜环境/膜脂读出及炎症小体输出之间仍缺乏系统机制框架
        narrative_role: 将“膜环境/CL 上游调控缺口”落实到具体受体信号层级，为提出通路—机制轴的可检验假设与研究目标做收束
        # SUGGEST: 本节宜作为 1.2 的收束段，避免提前引入具体分子因果结论
        key_points: []
        children:
          - id: 1.2.5.1
            title: Eph/Ephrin 信号概览：从发育到免疫语境
            logic_goal: 用最小背景交代 Eph/Ephrin 的信号组织方式与研究脉络，为将 EphB1 置于免疫病理语境提供入口
            narrative_role: 去除“发育信号”的刻板印象，但避免写成家族综述
            # SUGGEST: 本节建议控制在 3–5 句背景即可，重点是为 1.2.5.2 的免疫代谢线索服务
            key_points: []
            children: []

          - id: 1.2.5.2
            title: Ephb1的免疫代谢线索：作为候选入口的理由
            logic_goal: 汇总 EphB1 与免疫细胞功能、代谢重编程或炎症表型相关的研究线索，强调其提示“上游受体信号可能影响炎症输出层级”的可能性
            narrative_role: 将 EphB1 的既有证据转译为“为何值得检验其是否影响膜环境/执行层输出”，但不预设直接调控路径
            # NOTE: 叙事上优先强调“线索/趋势/相关证据”，将因果链条留给后续通路与实验验证
            key_points: []
            children: []

          - id: 1.2.5.3
            title: 缺口收束：信号—膜环境—执行输出的连接机制
            logic_goal: 明确 EphB1 相关信号如何经由下游通路影响线粒体膜环境/膜脂读出（含 CL）并进而改变执行层输出，当前仍缺少系统机制框架
            narrative_role: 将 1.2 的未解问题收束为可检验的“受体信号入口—通路/机制轴—表型读出”链条，直接承接 1.3 的科学问题与假设
            # NOTE: 此处用“机制框架缺失”表述空白，避免将 EphB1 与 CL/炎症小体的因果关系写成既定事实
            key_points:
              - EphB1 下游信号通路/机制轴是否中介线粒体膜环境（含 CL 读出）的改变
              - 膜环境读出变化如何在执行层（如 GSDMD 成孔阈值/效率）转译为炎症输出表型
            children: []

      - id: 1.2.6
        title: 遗传×药理遮蔽的方法桥梁
        logic_goal: 连接功能验证方法与分子机制定位
        narrative_role: 说明方法论在研究中的支撑作用
        # REVIEW: 遮蔽/同阶关系用于“功能阶层定位”，而非确认具体分子中介
        # NOTE: 该节不应被解读为支持单一酶节点（如 LYCAT）的直接因果链
        key_points:
          - 遗传操作（KO/过表达）与药理遮蔽用于区分“装配/激活层”与“末端执行层”的功能归因
          - 遮蔽关系用于“功能阶层定位/同阶或上下游判断”，不等同于确认单一分子中介
          - 与生物信息学通路与中介分析结合，可将“候选信号入口”收束为“通路—机制轴—表型读出”的可检验链条
        children: []
