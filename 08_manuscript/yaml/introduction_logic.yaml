  - id: 1.3
    title: 基于缺口的科学问题与研究路线图
    logic_goal: 基于前述研究现状与知识缺口，提出围绕炎症小体输出调控的具体科学问题，并形成可检验的研究假设与目标
    narrative_role: 明确本研究在炎症小体输出调控研究中的切入层级与研究范围，并界定其探索性与验证性边界
    key_points: []
    children:
      - id: 1.3.1
        title: 信号—心磷脂代谢—执行输出的关键问题
        logic_goal: 以“心磷脂代谢（合成/重塑/供给/转运/氧化/膜成分背景）”为核心对象，把复杂背景收束为可分层定位、可被证伪的逻辑链条
        narrative_role: 以图驱动方式“读图写作”：从受体信号入口出发，经由下游通路/机制轴重塑线粒体膜脂代谢与膜环境（以 CL 相关读出为锚点），并将差异定位到炎症小体末端执行输出
        key_points:
          - 问题对象：本节聚焦“CL 代谢整体”而非单一事件（外翻/可及性/单酶），强调 CL 作为线粒体膜环境的核心代谢枢纽
          - 读出层级：CL 相关读出是多层级的（含量/谱系/氧化与可及池等）；本研究以可操作读出为边界进行并行刻画，但不承诺对“微区结合位点/精确可及性池”的绝对定量
          - 阶层定位：区分 priming/装配 与 执行输出，优先回答“输出如何被限幅/阈值如何变化”而非泛化为上游激活差异
          - 连接缺口：未知 EphB1 相关受体信号如何经由下游通路/机制轴重塑 CL 代谢与膜环境，并进而改变焦亡末端执行输出（成孔/通透/外排）
        children:
          - id: 1.3.1.1
            title: 从 CL 代谢整体出发：为何它是执行层阈值的候选“膜环境枢纽”
            logic_goal: 用最小框架概括 CL 代谢的关键环节（供给/转运/合成/重塑/氧化/膜成分背景），说明其为何可能决定成孔蛋白的插膜效率与阈值
            narrative_role: 将“膜环境重要”具体化为“CL 代谢网络可被信号重塑”，为后续把 EphB1 引入为候选上游入口创造合理性
            key_points:
              - CL 是线粒体内膜特异膜脂，但其稳态由多环节共同决定（前体供给与转运、合成、重塑、氧化与清除，以及整体膜磷脂背景）
              - 执行层成孔/通透对膜电性与膜脂组成敏感，因此 CL 代谢改变可作为“执行阈值”变化的上游候选解释
            children: []

          - id: 1.3.1.2
            title: 读出策略与边界：用“多读出并行”刻画 CL 代谢状态
            logic_goal: 主动声明可达读出边界，避免将 CL 讨论收窄为单一技术或单一池；以并行读出提高对 CL 代谢改变的解释稳健性
            narrative_role: 为后续结果中 NAO（功能性染色）与脂质组学（化学定量）并行出现提供统一口径，同时降低对“可及性/结合池精确量化”的不必要期待
            key_points:
              - 功能性读出：NAO 等染色更多反映“可染/可及 CL 状态”，用于提示膜界面层面的变化
              - 化学定量读出：脂质组学用于独立评估 CL 总量、亚型谱与相关指标，作为对功能性读出的化学支撑与校准
              - 边界声明：本研究不把“微区分布/精确结合位点”作为必须回答的层级，而是以“代谢状态改变是否足以解释执行输出差异”为判别标准
            children: []

          - id: 1.3.1.3
            title: 阶层定位：把差异压缩到执行层输出，而不是泛化为上游激活
            logic_goal: 将问题表述为“差异发生在哪一层”的判别题，明确末端执行表型是核心解释对象
            narrative_role: 为后续通过时序证据与遗传×药理遮蔽实现层级归因做方法论铺垫，避免仅凭相关性倒置因果
            key_points:
              - 输出定义聚焦末端执行（GSDMD 成孔/裂解性通透/细胞因子外排）
              - priming/装配层指标用于排除或界定，不作为本节的主解释框架
            children: []

          - id: 1.3.1.4
            title: 连接缺口与工作模型：受体信号如何经“通路/机制轴”重塑 CL 代谢并转译为执行输出
            logic_goal: 明确“受体信号→下游通路/机制轴→CL 代谢状态（膜环境）→执行输出”的桥梁问题，并将其写成可证伪链条
            narrative_role: 将 EphB1 作为候选入口的讨论从“线索”推进到“可检验的连接问题”，直接承接 1.3.2 的技术路线与后续 Results 的图序逻辑
            key_points:
              - EphB1 的关键未知不是是否影响某个单酶，而是其下游通路/机制轴是否足以解释 CL 代谢状态改变
              - 需要在同一框架内同时评估 CL 代谢读出与末端执行输出，才能回答“限幅发生在执行层”
              - 证伪边界：若 CL 代谢相关读出不变或无法解释执行输出差异，则模型需转向上游装配层或非膜脂机制
            children: []

      - id: 1.3.2
        title: 研究目标与技术路线
        logic_goal: 将“信号—CL 代谢—执行输出”的科学问题拆解为可执行的三段式任务，并用一条闭环路线把发现、定位与验证串起来
        narrative_role: 从“我们要回答什么”转向“我们如何回答”，用清晰的任务分解与证据类型对应，降低读者对后续 Results 结构的理解成本
        key_points:
          - 三段式路线：通路/机制轴定位 → CL 代谢与膜环境表型刻画 → 执行层输出分层定位与因果验证
          - 证据闭环：数据驱动发现（生信/中介）与实验因果验证（遗传×药理/遮蔽）相互校准
          - 读出一致：CL 相关读出与执行输出读出贯穿全流程，避免“前后指标断裂”
        children:
          - id: 1.3.2.1
            title: 总体目标
            logic_goal: 用一句话概括论文主线目标并明确三类核心读出
            narrative_role: 作为全章路线图的“标题式摘要”，便于读者在进入 Results 前建立预期
            key_points:
              - 在炎症小体分层框架下，定位 EphB1 影响输出的作用层级（priming/装配/执行）
              - 解析 EphB1 相关信号如何重塑线粒体膜脂代谢（以 CL 相关读出为锚点）
              - 验证 CL 代谢/膜环境改变如何转译为焦亡末端执行输出差异（成孔/通透/外排）
            children: []

          - id: 1.3.2.2
            title: 技术路线概览
            logic_goal: 用“输入—过程—输出”的形式描述研究闭环，强调每一步对应的证据类型
            narrative_role: 将后续 Results 的章节组织提前“映射”给读者，使结果顺序显得必然而非堆砌
            key_points:
              - 输入：EphB1 遗传操纵与炎症小体激活模型（对照 WT/KO，时序采样）
              - 发现：组学/生信提取下游通路候选，并用中介分析定义优先机制轴
              - 表型：并行刻画 CL 代谢状态（NAO/脂质组学等）与线粒体功能相关读出（作为情境边界）
              - 定位：用分层指标区分 priming/装配 与 执行输出差异
              - 验证：遗传×药理遮蔽/救援建立因果链条与层级归因
            children: []

          - id: 1.3.2.3
            title: 任务 1：下游通路与机制轴的优先定位
            logic_goal: 在不预设单一分子节点的前提下，以数据驱动方式锁定“最可能解释 EphB1–CL 代谢–输出”的通路/机制轴
            narrative_role: 与结果部分的“先发现再验证”顺序对齐，解释为何需要生信与中介分析作为起手
            key_points:
              - 生物信息学：在下游信号网络中识别与炎症输出与膜脂代谢相关的候选通路
              - 中介分析：评估“通路/机制轴是否中介 EphB1→CL 代谢读出”的统计证据，给出优先级
              - 产出：形成可进入实验验证的“通路—机制轴候选列表”与可检验预测
            children: []

          - id: 1.3.2.4
            title: 任务 2：CL 代谢与线粒体膜环境的并行表型刻画
            logic_goal: 用多读出并行的方式刻画 CL 代谢状态变化，并将其放在炎症小体分层框架内解释
            narrative_role: 将“膜环境改变”落到可重复的表型证据，同时为后续执行层输出差异提供解释变量
            key_points:
              - CL 代谢读出：总量/亚型谱/氧化指标等化学定量 + NAO 等功能性读出互相校准
              - 情境边界：记录膜电位/ROS/动力学等线粒体状态指标以界定情境，但避免将其写成单一因果起点
              - 产出：建立 EphB1 操纵下 CL 代谢状态的可重复变化图谱
            children: []

          - id: 1.3.2.5
            title: 任务 3：执行层输出的分层定位与因果验证
            logic_goal: 将差异定位到 priming/装配/执行中的具体层级，并用遮蔽/救援证明 CL 代谢—执行输出之间的因果联系
            narrative_role: 把“限幅/阈值”从叙事概念落到实验归因，形成全文最关键的证据闭环
            key_points:
              - 分层定位：用 priming/装配指标排除或界定上游差异，将重点落在成孔/通透/外排等执行读出
              - 因果验证：遗传×药理遮蔽与救援检验“CL 代谢改变是否足以解释执行输出差异”
              - 产出：给出清晰的层级归因结论与工作模型的支持/修正
            children: []

          - id: 1.3.2.6
            title: 章节与结果图序的对应关系
            logic_goal: 将三段式任务映射到论文后续章节与关键结果图，形成阅读导航
            narrative_role: 让读者在进入 Results 前就能理解“为什么这些图按这个顺序出现”
            key_points:
              - Results 先展示通路/机制轴定位，再展示 CL 代谢表型，最后完成执行层输出的层级归因与验证
              - Discussion 回收“限幅/阈值”与“信号—膜环境—输出”的概念贡献，并讨论情境依赖与边界
            children: []

      - id: 1.3.3
        title: 本研究的贡献与阅读导航
        logic_goal: 用最少文字交代“我们贡献什么、如何被证据支持、读者应如何顺着结果阅读到结论”
        narrative_role: 在进入 Results 前完成预期管理：突出概念贡献与证据边界，并给出章节/图序导航
        key_points:
          - 概念贡献：提出并检验“受体信号—通路/机制轴—CL 代谢状态—执行输出”的分层框架
          - 方法贡献：以“生信/中介（发现）+ 遗传×药理遮蔽（因果）”形成证据闭环
          - 阅读导航：Results 按“通路定位 → CL 表型 → 执行层归因与验证”推进，Discussion 回收限幅/阈值与情境依赖
        children:
          - id: 1.3.3.1
            title: 概念贡献：分层框架与工作模型
            logic_goal: 明确本文提供的最核心解释框架与其可证伪边界
            narrative_role: 让读者在阅读 Results 前就知道“最终要证明/要推翻的是什么”
            key_points:
              - 提供一个可分层定位的解释框架：priming/装配 vs 执行输出
              - 将膜环境问题落到 CL 代谢状态的可检验读出，而非抽象描述
              - 工作模型以数据支持为准：若关键读出不支持，模型应被修正而非强行解释
            children: []

          - id: 1.3.3.2
            title: 潜在意义：可转化的限幅思路
            logic_goal: 用克制表述说明潜在转化意义，避免把“意义”写成结论
            narrative_role: 将“执行层限幅”的临床直觉与论文证据范围对齐
            key_points:
              - 与“全关掉炎症”相比，执行层限幅更可能保留抗感染能力并降低副作用窗口
              - 本文讨论的是机制与层级归因；是否可转化取决于后续药物学可行性与安全性验证
            children: []

          - id: 1.3.3.3
            title: 阅读导航：章节与图序
            logic_goal: 把论文组织方式翻译成一条“阅读路径”，便于快速抓主线
            narrative_role: 降低阅读成本，减少读者在 Results 中迷路的概率
            key_points:
              - Results：先给出下游通路/机制轴定位，再展示 CL 代谢表型，最后完成执行层输出的层级归因与因果验证
              - Discussion：回收机制贡献，讨论情境依赖、边界与未解问题
            children: []

      - id: 1.3.4
        title: 假设体系与可检验预测
        logic_goal: 将核心问题写成“可被数据支持或推翻”的假设集合，并为每个假设绑定可观测 readout 与判别标准
        narrative_role: 把 1.3.1 的问题链条与 1.3.2 的路线图，压缩成读者可随时对照的“预测清单”
        # NOTE: 主线以“通路—机制轴—readout”表述；具体分子仅作为候选实现层，不与主线绑定
        # NOTE: 各假设需绑定可观测 readout（CL 含量/谱系/oxCL，GSDMD 成孔与通透指标，IL-1β/IL-18 等）
        key_points:
          - 先框架后模块：先提出通路/机制轴中介假设，再分别展开膜脂与执行层假设
          - 强约束：每条假设都给出“支持/反驳”的最小判别标准，避免仅凭相关性叙事
        children:
          - id: 1.3.4.0
            title: H0：通路/机制轴中介信号对执行输出的影响
            logic_goal: 假设 EphB1 的效应主要通过一个或多个下游通路与机制轴中介，最终体现为执行层输出差异
            narrative_role: 将“受体入口”转换为可被生信与实验共同检验的通路级命题
            key_points:
              - 预测：下游通路/机制轴活动与执行输出读出同向变化，并在统计上中介 EphB1 与执行输出之间的关联
              - 判别：若通路/机制轴指标与执行输出无关或不具中介证据，则需要重估主导路径（上游装配或其他机制）
            children:
              - id: 1.3.4.0.1
                title: Readouts
                logic_goal: 绑定 H0 的最小观测集合
                narrative_role: 防止假设漂移
                key_points:
                  - 生信/通路：差异通路富集、轴评分、关键节点活性指标
                  - 统计：中介分析（EphB1 → 机制轴 → 表型/输出）
                  - 输出：GSDMD 成孔/通透与细胞因子外排（与 1.3.4.2 对齐）
                children: []

          - id: 1.3.4.1
            title: H1：信号可重塑 CL 代谢状态
            logic_goal: 假设 EphB1 相关信号能改变 CL 代谢状态（供给/合成/重塑/氧化与膜背景），产生可重复的 CL 相关表型读出
            narrative_role: 将 H0 的通路级命题落到膜脂层的可观测变量，避免预设单一酶节点
            key_points:
              - 预测：至少一个 CL 相关读出出现方向一致且可重复的变化（含量/谱系/氧化/功能性读出之一或组合）
              - 判别：若 CL 相关读出整体稳定，则“膜脂为关键解释变量”的模型需要下调权重
            children:
              - id: 1.3.4.1.1
                title: Readouts
                logic_goal: 绑定 H1 的观测指标
                narrative_role: 与后续 Results 的指标体系一致
                key_points:
                  - 脂质组学：CL 总量、亚型谱、MLCL/CL、oxCL/CL 等
                  - 功能性/界面读出：NAO 等提示膜界面层变化的指标（作为并行证据而非单一结论来源）
                children: []

          - id: 1.3.4.2
            title: H2：CL 代谢状态改变可转译为执行层输出差异
            logic_goal: 假设膜脂环境（含 CL 代谢状态变化）可调节成孔/通透过程的阈值与效率，从而改变裂解性输出与细胞因子外排
            narrative_role: 定义“膜脂—执行”接口的可证伪命题，并为遮蔽/救援提供预测
            key_points:
              - 预测：CL 相关读出变化与执行层读出变化在时序与方向上可对齐（不要求完全线性）
              - 判别：若执行层差异存在但与 CL 读出无关，则需转向非膜脂机制或上游层级解释
            children:
              - id: 1.3.4.2.1
                title: Readouts
                logic_goal: 绑定 H2 的执行层读出
                narrative_role: 明确“输出”究竟测什么
                key_points:
                  - 成孔：GSDMD 裂解、GSDMD-NT 定位/寡聚、孔形成相关指标
                  - 通透/裂解：质膜通透与裂解性死亡指标（含 NINJ1 相关放大作为情境解释）
                  - 外排：IL-1β/IL-18 释放与其他胞质内容物外排指标
                children: []

          - id: 1.3.4.3
            title: H3：线粒体状态提供情境与反馈环
            logic_goal: 假设 ROS、膜电位、动力学与质量控制等线粒体状态变量，与 CL 代谢读出与执行输出存在耦联，决定情境依赖与反馈方向
            narrative_role: 作为边界假设：解释不同刺激/细胞背景下效应差异，防止将线粒体写成单因子决定论
            key_points:
              - 预测：线粒体状态指标与 CL/执行读出之间存在一致的情境相关性（例如在高 ROS 或低 ΔΨm 背景下更明显）
              - 判别：若线粒体状态与 CL/执行读出脱钩，则说明反馈环并非主要解释变量
            children:
              - id: 1.3.4.3.1
                title: Readouts
                logic_goal: 绑定 H3 的情境读出
                narrative_role: 提供边界与解释变量
                key_points:
                  - ROS、ΔΨm、线粒体形态/动力学、自噬/线粒体自噬相关指标
                  - 作为“情境边界/协变量”解释，而非默认的因果起点
                children: []


