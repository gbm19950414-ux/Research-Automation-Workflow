figure_S1: >
  Data are presented as mean ± SD unless otherwise indicate. n denotes biologically independent samples. For panels (a,b), n ≥ 3 per group, and results were reproduced in ≥3 independent experiments; Statistical significance was assessed using two-tailed unpaired t-tests. In panels (a), transcript levels were normalized to GAPDH and expressed relative to unstimulated controls; in panel (b), ELISA signals were background-subtracted and normalized to cell number. *P < 0.05, **P < 0.01, ***P < 0.001; ns, not significant.

figure_S2: >
  Data are presented as mean ± SD unless otherwise indicate. n denotes biologically independent samples. For panels (c–d), n ≥ 3 per group, and results were reproduced in ≥3 independent experiments. Statistical significance was assessed using two-tailed unpaired t-tests. transcript levels were normalized to total component and expressed relative to unstimulated controls. *P < 0.05, **P < 0.01, ***P < 0.001; ns, not significant.
figure_S3: >
  Data are presented as mean ± SD unless otherwise indicated, and n denotes biologically independent samples or experiments. For panels (a,b), n ≥ 3 per group, with results reproduced in ≥3 independent experiments; NAO fluorescence was quantified under matched acquisition settings, and statistical significance was assessed using two-tailed unpaired t-tests. For panel (c), n ≥ 3 independent experiments per group, with results reproduced in ≥3 independent experiments; statistical significance was assessed using two-tailed unpaired t-tests. *P < 0.05, **P < 0.01, ***P < 0.001; ns, not significant.
