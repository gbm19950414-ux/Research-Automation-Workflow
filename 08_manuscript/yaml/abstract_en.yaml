abstract:
  background_gap: 
    en: Inflammasome activation does not necessarily translate into pyroptotic output and proportional IL-1β release, yet the upstream mechanisms that constrain terminal execution remain unclear. Emerging evidence suggests that mitochondrial membrane context, particularly cardiolipin status, influences inflammasome output, but the underlying mechanism remains unclear.
  research_question: 
    en: We asked whether EphB1 loss alters cardiolipin-linked mitochondrial membrane context to raise the threshold for gasdermin D execution and thereby attenuate inflammasome-induced lytic output.
  approach: 
    en: Using primary murine peritoneal macrophages, we combined genetic and pharmacological perturbations with functional mapping and integrative multi-omics to test links between upstream signaling, membrane context, and terminal output.
  key_finding: 
    en: EphB1 deficiency consistently reduced IL-1β release and cell lysis across multiple inflammasome stimuli while leaving transcriptional priming, ASC assembly, and caspase-1 activation intact, localizing the defect to the execution stage. This phenotype was accompanied by reduced mitochondrial enrichment of GSDMD-NT, coordinated decreases in cardiolipin abundance and accessibility, and phenocopying by pharmacological disruption of cardiolipin state.
  implication: 
    en: These findings support a membrane-mediated model in which EphB1-dependent signaling remodels cardiolipin-linked membrane properties to shift the threshold for GSDMD-dependent execution, helping explain how inflammasome activation can be uncoupled from output intensity.
