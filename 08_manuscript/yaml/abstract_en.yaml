abstract:
  background_gap: 
    en: Inflammasome activation does not necessarily translate into proportional IL-1β release and pyroptotic output, yet the upstream mechanisms that constrain terminal execution remain unclear. Increasing evidence implicates mitochondrial membrane context, particularly cardiolipin status, as a critical but poorly understood regulator of inflammasome output.
    cn: 炎症小体的激活并不必然对应等比例的 IL-1β 裂解性外排与焦亡输出，但限制末端执行强度的上游机制仍不清楚。越来越多的证据提示线粒体膜环境，尤其是心磷脂状态，是调控炎症小体输出的重要但尚未充分解析的关键因素。
  research_question: 
    en: We asked whether loss of the receptor EphB1 reshapes mitochondrial cardiolipin-dependent membrane context to shift the execution threshold of gasdermin D and thereby attenuate inflammasome-induced lytic output.
    cn: 本研究探究受体 EphB1 的缺失是否通过重塑依赖心磷脂的线粒体膜环境，平移 GSDMD 的执行阈值，从而降低炎症小体诱导的裂解性输出。
  approach: 
    en: Using primary murine peritoneal macrophages, we combined genetic perturbation, layered functional positioning of inflammasome signaling, lipid accessibility profiling, pharmacological modulation of cardiolipin state, and integrative multi-omics analyses to dissect causal links between upstream signaling, membrane context, and terminal output.
    cn: 本研究以原代小鼠腹腔巨噬细胞为核心模型，结合遗传学干预、炎症小体分层功能定位、心磷脂可及性表型分析、药理学调控及多组学整合分析，系统解析上游信号、膜环境与末端输出之间的因果关系。
  key_finding: 
    en: EphB1 deficiency consistently reduced IL-1β release and cell lysis across multiple inflammasome stimuli without affecting transcriptional priming, ASC assembly, or caspase-1 activation, localizing the defect to the execution stage. This was associated with impaired mitochondrial enrichment of GSDMD-NT and a coordinated reduction in cardiolipin abundance and accessibility, phenocopied by pharmacological disruption of cardiolipin state.
    cn: EphB1 缺失在多种炎症小体激活条件下均显著降低 IL-1β 外排与细胞裂解，而不影响转录性 priming、ASC 装配或 caspase-1 激活，提示瓶颈位于末端执行层。该表型伴随 GSDMD-NT 线粒体富集受损及心磷脂含量与可及性协同下降，且可被心磷脂状态的药理学干预所重现。
  implication: 
    en: These findings support a membrane-mediated model in which EphB1-dependent signaling remodels cardiolipin-centered membrane context to tune the functional threshold of GSDMD pore formation and limit inflammasome output, providing a mechanistic framework for dissociating activation from output intensity.
    cn: 这些结果支持一种以膜环境为中介的工作模型：EphB1 依赖的信号网络通过重塑以心磷脂为核心的膜环境，调控 GSDMD 成孔的功能阈值，从而实现炎症小体输出的限幅调节，为解释“激活不等于输出强度”提供了机制框架。