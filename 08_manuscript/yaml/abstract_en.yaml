abstract:
  background_gap: 
    en: Inflammasome activation does not necessarily translate into proportional IL-1β release and pyroptotic output, yet the upstream mechanisms that constrain terminal execution remain unclear. Increasing evidence implicates mitochondrial membrane context, particularly cardiolipin status, as a potentially important but incompletely understood determinant of inflammasome output..
  research_question: 
    en: We asked whether loss of EphB1 remodels cardiolipin-linked mitochondrial membrane context to shift the execution threshold of gasdermin D and thereby attenuate inflammasome-induced lytic output.
  approach: 
    en: Using primary murine peritoneal macrophages, we combined genetic perturbation, functional localization of inflammasome signaling, cardiolipin-state perturbation, and integrative multi-omics analyses to test links between upstream signaling, membrane context, and terminal output.
  key_finding: 
    en: EphB1 deficiency consistently reduced IL-1β release and cell lysis across multiple inflammasome stimuli without affecting transcriptional priming, ASC assembly, or caspase-1 activation, localizing the defect to the execution stage. This phenotype was accompanied by reduced mitochondrial enrichment of GSDMD-NT together with coordinated decreases in cardiolipin abundance and accessibility, and was phenocopied by pharmacological perturbation of cardiolipin state.
  implication: 
    en: These findings support a membrane-mediated model in which EphB1-dependent signaling remodels cardiolipin-linked membrane context to shift the functional threshold of GSDMD-dependent execution, thereby helping explain how inflammasome activation can be uncoupled from output intensity.
