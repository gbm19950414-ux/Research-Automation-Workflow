    - "1.3.4"
  sections:

  - id: "1.1.1"
    heading: "Inflammasome output imbalance and immunopathological consequences"
    narrative_role: "Set the public-health and translational motivation; motivate
      the need for amplitude-limiting control of inflammatory outputs."
    paragraphs:

    - pid: "1.1.1.p1"
      source_trace:
      - "original_text:1.1.1"
      topic_sentence: "Over the past two decades, the global disease burden has shifted increasingly toward chronic non-communicable diseases driven in part by persistent inflammation, making inflammatory dysregulation a major public-health challenge."
      sentences:
      - "In 2021, cardiovascular diseases, cancer, chronic respiratory diseases, and diabetes together accounted for approximately 43 million deaths, representing nearly three quarters of all non-pandemic-related deaths."
      - "A substantial fraction of these deaths occurred before age 70 and disproportionately
        affected low- and middle-income countries, highlighting the societal burden
        of chronic inflammation and immune dysregulation."
      sentence_citations_list:
      - []
      - [10.5334/aogh.4649]
      - [10.5334/aogh.4649]
      bridge: "These trends motivate interventions that can modulate inflammatory
        pathways with translational precision."

    - pid: "1.1.1.p2"
      source_trace:
      - "original_text:1.1.1"
      topic_sentence: "Beyond chronic inflammatory disease, severe systemic inflammatory syndromes such as sepsis also remain major contributors to global mortality."
      sentences:
      - "A Global Burden of Disease (GBD) 2017 systematic analysis estimated approximately
        48.9 million sepsis events and 11.0 million sepsis-related deaths in 2017,
        accounting for about one fifth of global deaths."
      - "A subsequent GBD 2021 analysis suggested that the burden in 2021 could be
        even higher (on the order of 166 million events and 21.4 million deaths),
        emphasizing the potential rebound or worsening of systemic inflammatory risk
        in the context of pandemics and aging."
      sentence_citations_list:
      - [10.1016/s0140-6736(19)32989-7, 10.1016/s2214-109x(25)00356-0]
      - [10.1016/s0140-6736(19)32989-7]
      - [10.1016/s2214-109x(25)00356-0]
      bridge: "Together, chronic and acute inflammatory states impose high costs and
        create demand for actionable control points in immune pathways."

    - pid: "1.1.1.p3"
      source_trace:
      - "original_text:1.1.1"
      topic_sentence: "From a global burden perspective, modifiable risk factors intersect
        inflammation and metabolic imbalance, suggesting value in identifying true
        rate-limiting steps that enable amplitude-limited immune control."
      sentences:
      - "GBD 2023 highlighted that a substantial proportion of deaths and disability are attributable to modifiable risk factors, many of which intersect with inflammation."
      - "At the molecular level, the NLRP3 inflammasome is widely regarded as a convergence point for diverse acute and chronic inflammatory pathologies."
      - "Although regulatory frameworks have been described for NLRP3 priming, assembly, and execution, therapeutic strategies still largely focus on suppressing activation or other upstream steps."
      sentence_citations_list:
      - [10.1016/s0140-6736(25)01637-x]
      - [10.1016/s0140-6736(25)01637-x]
      - [10.1038/s41577-019-0165-0]
      - [10.1038/s41577-019-0165-0, 10.1038/nrd.2018.97]
      bridge: "This therapeutic emphasis raises a central mechanistic question: can inflammatory output be limited without fully suppressing inflammasome activation?"

  - id: "1.1.2"
    heading: "Layered thresholds and membrane-environment constraints"
    narrative_role: "Introduce the priming–assembly–execution stratification and argue
      that output divergence can emerge at execution thresholds."
    paragraphs:

    - pid: "1.1.2.p1"
      source_trace:
      - "original_text:1.1.2"
      topic_sentence: "Pyroptosis can be viewed as three linked but separably regulated stages—priming, inflammasome assembly/caspase activation, and terminal execution—each of which can independently influence inflammatory output."
      sentences:
      - "Priming sets the readiness of inflammasome components, assembly governs whether inflammasomes form and caspases activate, and execution determines the magnitude and form of the ensuing inflammatory output."
      - "Thus, even with comparable NLRP3 activation, final phenotypes such as IL-1β/IL-18
        release, membrane permeability, and lytic rupture are not necessarily equivalent,
        suggesting that divergence may largely reside in execution thresholds."
      citations: []
      bridge: "This stratification reframes ‘activation’ as insufficient to explain
        ‘output intensity’."

    - pid: "1.1.2.p2"
      source_trace:
      - "original_text:1.1.2"
      topic_sentence: "In canonical pathways, inflammatory caspases cleave GSDMD to expose an N-terminal fragment that oligomerizes into pores, enabling cytokine release and promoting osmotic lysis."
      sentences:
      - "Inflammatory caspases (caspase-1/4/5/11) cleave GSDMD, generating the pore-forming
        GSDMD-NT fragment."
      - "GSDMD-NT oligomerizes on membranes to form transmembrane pores that promote
        IL-1β/IL-18 release and alter ionic and water flux."
      - "As pore burden and osmotic imbalance accumulate, cells progress toward lytic
        death."
      sentence_citations_list:
      - [10.1038/nature15514, 10.1038/nature15541]
      - [10.1038/nature15514, 10.1038/nature15541]
      - [10.1038/nature15514, 10.1038/nature15541]
      - [10.1038/nature15514, 10.1038/nature15541]
      figure_refs:
      - "Fig. 1.1"
      bridge: "Therefore, pore formation is positioned as a mechanistic bottleneck
        for determining ‘how much is released, whether rupture occurs, and when’."

    - pid: "1.1.2.p3"
      source_trace:
      - "original_text:1.1.2"
      topic_sentence: "Structural and functional studies suggest that the efficiency of GSDMD-NT pore formation helps determine the threshold at which inflammatory output shifts from a controlled state to lytic rupture."
      sentences:
      - "Once the execution stage crosses a threshold, outputs can rapidly transition
        from regulated release to uncontrolled lytic rupture."
      - "Accordingly, pore formation can be viewed as a core bottleneck of terminal
        pyroptotic execution."
      sentence_citations_list:
      - [10.1038/nature18629, 10.1073/pnas.1607769113]
      - [10.1038/nature18629, 10.1073/pnas.1607769113]
      - [10.1038/nature18629, 10.1073/pnas.1607769113]
      bridge: "A critical implication is that execution is not only ‘protein-coded’
        but also constrained by the protein–membrane interface."

    - pid: "1.1.2.p4"
      source_trace:
      - "original_text:1.1.2"
      topic_sentence: "GSDMD-NT does not insert indiscriminately into all lipid membranes;
        it preferentially targets negatively charged phospholipids, particularly membranes
        enriched in cardiolipin (CL)."
      sentences:
      - "In model-membrane systems, inclusion of such anionic lipids can markedly
        enhance pore formation and membrane leakage."
      - "Thus, the same GSDMD-NT fragment can exhibit different execution outcomes
        depending on lipid context, with membrane composition functioning as an adjustable
        ‘execution-gain’ knob that shapes amplitude and timing."
      sentence_citations_list:
      - [10.1038/nature18629, 10.1038/nature18590]
      - [10.1038/nature18590]
      - [10.1038/nature18629, 10.1038/nature18590]
      bridge: "This lipid dependence suggests that membrane composition may help set the threshold for pyroptotic execution."

    - pid: "1.1.2.p5"
      source_trace:
      - "original_text:1.1.2"
      topic_sentence: "Temporal evidence suggests mitochondria are not merely passive
        damage targets during pyroptosis but can act as a regulatory hub for terminal
        execution."
      sentences:
      - "Before the plasma membrane, GSDMD-NT can rapidly damage both inner and outer
        mitochondrial membranes."
      - "Mitochondrial injury can occur after GSDMD cleavage but before overt plasma-membrane
        rupture, promoting early changes in membrane potential, ROS, release of mitochondrial
        contents, and quality-control responses."
      - "These events can accelerate and amplify the overall pyroptotic process."
      sentence_citations_list:
      - [10.1016/j.immuni.2023.10.004]
      - [10.1016/j.immuni.2023.10.004]
      - [10.1016/j.immuni.2023.10.004]
      - [10.1016/j.immuni.2023.10.004]
      figure_refs:
      - "Fig. 1.2"
      bridge: "Mitochondrial membrane environment may therefore both receive direct
        execution-stage attacks and feed back to set execution thresholds and amplitude-limiting
        capacity."

    - pid: "1.1.2.p6"
      source_trace:
      - "original_text:1.1.2"
      topic_sentence: "Mitochondria may also feed back to shape inflammasome signaling, because their functional state influences sensitivity to NLRP3 activation cues."
      sentences:
      - "Mitochondria-associated events such as ROS, changes in membrane permeability,
        and mtDNA release can promote inflammasome assembly and IL-1β production."
      - "Conversely, enhancing mitochondrial renewal/clearance capacity or maintaining
        respiratory-chain function can alter inflammasome flux and output intensity."
      sentence_citations_list:
      - [10.1038/s41590-022-01185-3]
      - [10.1016/j.immuni.2012.01.009]
      - [10.1038/s41590-022-01185-3]
      bridge: "These observations motivate a testable question: can altering the membrane–mitochondrial
        environment reshape the output threshold and dynamics of an otherwise identical
        execution pathway?"

    - pid: "1.1.2.p7"
      source_trace:
      - "original_text:1.1.2"
      topic_sentence: "If pore formation is sensitive to lipid context, dynamically remodeled mitochondrial lipids become plausible mediators linking upstream signals to divergence at the execution stage."
      sentences:
      - "Among such lipids, cardiolipin (CL) emerges as a particularly prominent candidate."
      citations: []
      bridge: "This rationale sets up CL as both a mechanistic interface and an integrated
        readout of mitochondrial membrane environment."

  - id: "1.1.3"
    heading: "Cardiolipin as a membrane-environment readout and interface"
    narrative_role: "Define CL as a structural–functional coupling lipid and argue
      its dynamic plasticity and inflammasome/pyroptosis coupling."
    paragraphs:

    - pid: "1.1.3.p1"
      source_trace:
      - "original_text:1.1.3"
      topic_sentence: "Cardiolipin is a mitochondria-enriched phospholipid that links membrane architecture to bioenergetic function and is therefore a plausible mediator of execution-stage membrane behavior."
      sentences:
      - "At the molecular level, CL helps organize and stabilize respiratory-chain complexes and supercomplexes."
      - "CL also influences ATP synthase oligomerization and maintenance of high-curvature
        cristae structures."
      - " In addition, CL provides a lipid environment that supports the assembly and membrane association of inner-membrane protein complexes, including processes involved in respiratory-chain biogenesis. "
      - "Accordingly, shifts in CL abundance, acyl-chain composition, or oxidation
        state can jointly rewrite metabolic efficiency, membrane structural stability,
        and permeability thresholds, a view that has reached a relatively stable consensus
        at the review level."
      sentence_citations_list:
      - [10.3390/cells8070728]
      - [10.1074/jbc.m308366200]
      - [10.1016/j.bpj.2011.03.031]
      - [10.1242/jcs.240374]
      - [10.3390/cells8070728]
      bridge: "CL therefore represents a plausible lever through which mitochondrial
        state can be integrated into membrane-interface behavior."

    - pid: "1.1.3.p2"
      source_trace:
      - "original_text:1.1.3"
      topic_sentence: "CL is not a static background lipid but undergoes regulated changes under stress and immune activation, linking mitochondrial membrane state to inflammatory signaling."
      sentences:
      - "Mitochondrial CL has been reported to participate directly in NLRP3 recruitment
        and activation, including CL–NLRP3 binding and effects of perturbing CL synthesis
        on inflammasome activation."
      - "In damage contexts, CL externalization can serve as a quality-control ‘tag’,
        for example via LC3 binding to trigger mitophagy."
      - "CL oxidation has been associated with membrane damage and inflammatory amplification in relevant stress contexts."
      - "Closer to the execution layer, GSDMD-N has been suggested in specific pathological
        contexts to recognize CL to form mitochondrial pores, amplifying mitochondrial
        ROS and inflammatory cascades."
      sentence_citations_list:
      - [10.1016/j.immuni.2013.08.001, 10.4161/auto.27191, 10.1016/j.celrep.2024.114237]
      - [10.1016/j.immuni.2013.08.001]
      - [10.4161/auto.27191]
      - [10.1016/j.celrep.2024.114237]
      - [10.1016/j.celrep.2024.114237]
      bridge: "These lines of evidence position CL as both a mitochondrial-status
        indicator and a potential determinant of ‘whether/when/how strongly’ inflammasome
        outputs proceed to lytic execution."

    - pid: "1.1.3.p3"
      source_trace:
      - "original_text:1.1.3"
      topic_sentence: "Rather than viewing mitochondrial status as a dispersed set of signals such as ROS, mtDNA, and membrane potential, CL state may offer a more execution-proximal link between mitochondrial condition and pore-forming efficiency."
      sentences:
      - "Current evidence supports a connection between CL dynamics and inflammatory execution."
      - "By contrast, a key unresolved question lies upstream: which receptor-level signals reshape CL state through downstream pathways and thereby alter terminal inflammatory output?"
      - "In other words, the mid-to-early segment of a chain—‘receptor signal → downstream
        pathway/mechanistic axis → CL metabolism → mitochondrial inflammatory features
        → pore threshold and lytic cytokine release’—still lacks a broadly accepted
        systems model."
      citations: []
      bridge: "This unresolved link motivates the search for an upstream receptor-level mechanism that connects extracellular cues to CL-dependent execution thresholds."

    - pid: "1.1.3.p4"
      source_trace:
      - "original_text:1.1.3 (Ephb1 作为候选上游)"
      topic_sentence: "Eph receptors and their ephrin ligands form a contact-dependent
        bidirectional signaling system and constitute the largest receptor tyrosine
        kinase subfamily, making them conceptually suitable candidates for translating
        spatial microenvironmental context into intracellular state and effector outputs."
      sentences:
      - "The Eph/ephrin system was originally recognized for roles in development
        and spatial patterning, with a core feature of shaping adhesion, morphology,
        and migration through contact-dependent signal exchange."
      - "Increasing evidence extends Eph/ephrin biology into immune contexts, including
        immune-cell development, activation, migration, and tissue residence, and
        modulation of how immune cells communicate with endothelium/stroma or neighboring
        immune cells within inflammatory microenvironments."
      - "From a signaling architecture perspective, Eph downstream outputs are not
        a single linear pathway and can intersect major metabolic/growth networks,
        with mechanistic support for interactions and feedback with PI3K–Akt–mTOR
        signaling in multiple family members."
      - "Thus, Eph family signaling is positioned to extend plasma-membrane contact
        cues into deeper cellular homeostasis modules, including mitochondrial-related
        processes and membrane environment, albeit in a context-dependent manner across
        members, cell types, and stimuli."
      sentence_citations_list:
      - [10.1016/s1357-2725(02)00096-1, 10.3389/fimmu.2019.01473]
      - [10.1016/s1357-2725(02)00096-1]
      - [10.3389/fimmu.2019.01473]
      - [10.1016/j.ccr.2009.04.009, 10.4161/cc.9.11.11925]
      - [10.1016/j.ccr.2009.04.009, 10.4161/cc.9.11.11925]
      bridge: "This reasoning nominates Ephb1 as a plausible upstream candidate that
        could reshape mitochondrial membrane environment (CL) and thereby tune pyroptotic
        execution thresholds."

    - pid: "1.1.3.p5"
      source_trace:
      - "original_text:1.1.3"
      topic_sentence: "If Ephb1 signaling can engage downstream pathways or mechanistic
        axes that alter mitochondrial membrane environment—captured by CL abundance,
        species composition, or oxidation—it may shift the threshold and efficiency
        of pore formation and thereby achieve amplitude-limiting control of inflammasome
        outputs."
      sentences:
      - "A potential advantage of this strategy is that it targets output form and
        intensity (for example, a threshold window for lytic cytokine release) rather
        than being equivalent to fully disabling the inflammasome, which may better
        balance tissue protection with host defense in principle."
      - "Accordingly, this work adopts a working framework: receptor kinase (Ephb1)
        → downstream pathway/mechanistic axis → mitochondrial membrane environment/CL
        readouts → terminal inflammasome execution outputs."
      citations: []
      bridge: "The following sections therefore summarize the state of the field across
        terminal execution, CL biology, mitochondria–inflammation coupling, and Ephb1-related
        immunometabolic clues, and motivate falsifiable tests along the proposed chain."

  - id: "1.2"
    heading: "Consensus and gaps in inflammasome output control"
    narrative_role: "Broaden mechanistic consensus (pore formation, membrane lipids,
      mitochondrial context), then sharpen the specific gap and why Ephb1–CL–execution
      is testable."
    paragraphs:

    - pid: "1.2.1.p1"
      source_trace:
      - "original_text:1.2.1"
      topic_sentence: "Beyond asking whether inflammasomes are activated, a more consequential
        question is how the execution layer determines the magnitude, timing, and
        form of inflammatory outputs."
      sentences:
      - "In canonical pathways, pathogen infection activates inflammasomes and caspase-1/-4/-5,
        cleaving GSDMD to generate an N-terminal fragment that oligomerizes into plasma-membrane
        pores to release IL-1β and other pro-inflammatory factors."
      - "In addition to lytic rupture, GSDMD pores can enable selective cytokine release
        under ‘sub-lytic’ states, while membrane-rupture machinery such as NINJ1 can
        cooperate to amplify death and content release."
      - "In apoptotic pathways, caspase-3 cleavage of GSDME can similarly induce plasma-membrane
        permeabilization and strong inflammatory responses."
      sentence_citations_list:
      - [10.1038/nrmicro2070, 10.1038/s41586-021-03478-3, 10.1016/j.celrep.2021.108998, 10.1038/s41586-021-03218-7, 10.1038/ncomms14128, 10.1038/nature22393]
      - [10.1038/nature15514, 10.1038/nature15541]
      - [10.1038/s41586-021-03478-3, 10.1016/j.celrep.2021.108998, 10.1038/s41586-021-03218-7]
      - [10.1038/ncomms14128, 10.1038/nature22393]
      bridge: "These findings support execution as a regulated continuum rather than
        an all-or-none endpoint."

    - pid: "1.2.1.p2"
      source_trace:
      - "original_text:1.2.1"
      topic_sentence: "Mitochondria are widely recognized as coordinators of cell-death
        and stress signaling and participate in inflammatory and non-inflammatory
        death programs via modular control of membrane permeabilization."
      sentences:
      - "Mitochondrial outer membrane permeabilization (MOMP) is a core event in intrinsic
        apoptosis and can intersect immune and inflammatory pathways through release
        of mtDNA or dsRNA to engage cGAS–STING and MAVS signaling."
      - "A modular view of mitochondrial permeabilization highlights multiple layers:
        signal coupling via transcription factors, pore-forming proteins (including
        BCL-2 family and gasdermins), membrane lipids (especially CL) as a physicochemical
        basis, post-translational modifications, outer-membrane interactors, and mitochondrial
        dynamics and membrane potential that feed back on vulnerability."
      - "Notably, permeabilization can be incomplete, allowing survival with selective
        release of intermembrane-space proteins and remodeling-dependent release of
        apoptotic factors."
      - "As a pro-inflammatory signaling hub, mitochondria can integrate pyroptosis,
        necroptosis, and ferroptosis-related processes, including gasdermin–CL interactions
        that promote mitochondrial permeabilization and release of inflammatory mediators."
      sentence_citations_list:
      - [10.1101/cshperspect.a006080, 10.1038/cdd.2017.186]
      - [10.1038/s41586-018-0363-0, 10.1016/j.cell.2014.11.036, 10.1016/j.cell.2014.11.037]
      - [10.1038/nchembio727, 10.1371/journal.pbio.1000298, 10.1126/science.1219855, 10.1016/j.bbamcr.2010.11.011, 10.1091/mbc.e09-07-0649, 10.15252/embj.201899238, 10.1126/science.aao6047, 10.1038/ncb3596, 10.1016/j.molcel.2015.01.018, 10.1016/j.cell.2007.03.045, 10.1073/pnas.1417253111]
      - [10.15252/embj.201899238, 10.1016/j.molcel.2015.01.018, 10.1016/j.cell.2007.03.045]
      - [10.1016/j.immuni.2023.10.004, 10.1016/j.celrep.2018.09.071, 10.1096/fj.202100085r, 10.1016/j.jbc.2023.102908, 10.1016/j.cell.2022.06.038]
      bridge: "This context underscores that ‘permeabilization/pore formation’ has
        thresholds and is likely constrained by membrane environment."

    - pid: "1.2.2.p1"
      source_trace:
      - "original_text:1.2.2"
      topic_sentence: "Across regulated death modalities, pore formation and permeabilization
        often depend on specific membrane lipids—particularly anionic phospholipids—indicating
        that membrane composition sets boundary conditions for insertion, oligomerization,
        and pore stability."
      sentences:
      - "Mechanistically distinct pore systems (gasdermins, MLKL, BAX/BAK) nevertheless
        commonly exhibit selective binding and insertion into anionic phospholipids."
      - "Multiple gasdermin family members can directly bind mitochondrial CL, inducing
        inner and outer membrane permeabilization and promoting release of mtDNA and
        proteins to amplify inflammation."
      - "GSDMD/E N-terminal fragments can induce mitochondrial rupture and cytochrome
        c release, and BAX/BAK-mediated MOMP can in turn activate NLRP3 inflammasomes
        and GSDME, amplifying inflammatory cascades."
      sentence_citations_list:
      - [10.1016/j.str.2014.07.014, 10.1016/j.immuni.2023.10.004, 10.1016/j.celrep.2018.09.071, 10.1096/fj.202100085r, 10.1016/j.jbc.2023.102908, 10.1038/s41467-019-09397-2, 10.1016/j.immuni.2021.04.012, 10.1016/j.celrep.2018.10.103, 10.1016/j.celrep.2018.10.087]
      - [10.1016/j.str.2014.07.014]
      - [10.1016/j.immuni.2023.10.004, 10.1016/j.celrep.2018.09.071, 10.1096/fj.202100085r, 10.1016/j.jbc.2023.102908]
      - [10.1038/s41467-019-09397-2, 10.1016/j.immuni.2021.04.012, 10.1016/j.celrep.2018.10.103, 10.1016/j.celrep.2018.10.087]
      bridge: "These observations reinforce that execution efficiency is not equivalent
        across lipid contexts and that CL-enriched mitochondrial membranes can provide
        a high-efficiency interface."

    - pid: "1.2.2.p2"
      source_trace:
      - "original_text:1.2.2"
      topic_sentence: "Lipid constraints extend beyond pyroptosis, suggesting a shared
        membrane-interface principle across necroptosis and ferroptosis-related vulnerability."
      sentences:
      - "In necroptosis, MLKL can bind mitochondrial CL and interact with factors
        such as PGAM5 and DRP1 to influence mitochondrial fission, while structural
        and reconstitution studies indicate MLKL N-terminal bundles insert into anionic
        lipid-containing membranes (including CL) to cause leakage."
      - "Ferroptosis, although not a canonical ‘pore protein’ process, is driven by
        iron-dependent lipid peroxidation and displays strong dependence on membrane
        oxidation substrates and membrane-environment status; mitochondrial dysfunction
        and VDAC1/2 engagement by erastin are associated with mitochondrial shrinkage
        and ATP decline in relevant contexts."
      - "Targeting mitochondria with antioxidants can suppress ferroptosis only in
        specific cellular settings, implying context-dependent mitochondrial contributions."
      sentence_citations_list:
      - [10.1016/j.cell.2009.05.021, 10.1073/pnas.1408987111, 10.1038/s41467-018-04714-7, 10.1016/j.molcel.2014.03.003, 10.1038/cddis.2013.531, 10.1038/s41419-021-03418-z, 10.1016/j.immuni.2013.06.018, 10.1016/j.celrep.2013.10.034, 10.1016/j.str.2014.07.014, 10.1016/j.cell.2012.03.042, 10.1083/jcb.202105043, 10.1038/ncb3064, 10.1016/j.molcel.2018.10.042, 10.1016/j.freeradbiomed.2018.01.019]
      - [10.1016/j.cell.2009.05.021, 10.1073/pnas.1408987111, 10.1038/s41467-018-04714-7, 10.1016/j.molcel.2014.03.003, 10.1038/cddis.2013.531, 10.1038/s41419-021-03418-z, 10.1016/j.immuni.2013.06.018, 10.1016/j.celrep.2013.10.034, 10.1016/j.str.2014.07.014]
      - [10.1016/j.cell.2012.03.042, 10.1083/jcb.202105043, 10.1038/ncb3064, 10.1016/j.molcel.2018.10.042]
      - [10.1016/j.freeradbiomed.2018.01.019]
      bridge: "Collectively, these examples motivate a unifying view: terminal execution
        is a protein–membrane interfacial reaction whose energetics and thresholds
        are tuned by lipid composition and oxidation state."

    - pid: "1.2.2.p3"
      source_trace:
      - "original_text:1.2.2"
      topic_sentence: "Despite consensus that membrane lipids can influence pore formation,
        a unifying framework remains lacking for how upstream signals systematically
        reshape lipid composition/oxidation in vivo to produce execution-layer output
        divergence."
      sentences:
      - "Most studies establish causal fragments—‘lipids affect pore formation’—without
        a systems model linking upstream receptors, downstream pathways/mechanistic
        axes, membrane lipid remodeling, and execution outputs."
      citations: []
      bridge: "This gap sets up the need for receptor-to-membrane-environment mechanisms."

    - pid: "1.2.3.p1"
      source_trace:
      - "original_text:1.2.3"
      topic_sentence: "Mitochondrial signals are widely observed in NLRP3 priming
        and assembly contexts, but their causal position is often stimulus- and time-dependent,
        requiring stratified interpretation."
      sentences:
      - "Inflammatory stimuli can drive NLRP3 or adaptor enrichment at mitochondria
        or mitochondria-associated membranes, suggesting spatial platforms for assembly."
      - "Mitochondria-derived signals such as mtROS, cytosolic mtDNA, and membrane
        potential changes can enhance inflammasome activity in multiple models."
      - "However, these signals are better viewed as context-dependent background
        factors rather than a single necessary causal trigger, because in some settings
        they precede and amplify assembly whereas in others they may reflect downstream
        consequences of execution events."
      - "Mitochondrial injury spans a continuum rather than an all-or-none state;
        limited perturbations may support assembly or cytokine release, whereas accumulation
        beyond thresholds is more likely to promote widespread permeabilization and
        lytic death."
      sentence_citations_list:
      - [10.1016/j.immuni.2013.08.001, 10.4049/jimmunol.1301490]
      - [10.1016/j.immuni.2013.08.001]
      - [10.1016/j.immuni.2013.08.001, 10.4049/jimmunol.1301490]
      - [10.1016/j.immuni.2013.08.001, 10.4049/jimmunol.1301490]
      - [10.1016/j.immuni.2013.08.001, 10.4049/jimmunol.1301490]
      bridge: "This framing highlights the need for a quantifiable, execution-proximal
        mitochondrial readout that can connect mitochondrial state to execution thresholds."

    - pid: "1.2.4.p1"
      source_trace:
      - "original_text:1.2.4"
      topic_sentence: "CL is a signature anionic lipid whose distribution, oxidation,
        and externalization can influence mitochondrial permeabilization thresholds
        and multiple pore-forming events, positioning it as a candidate execution-interface
        readout."
      sentences:
      - "Under stress and pathology, CL can externalize or become exposed on the outer
        membrane, promoting membrane association and insertion of key proteins (tBID,
        BAX, cytochrome c, and gasdermins), shaping curvature and pore formation/stability."
      - "CL externalization has been proposed as a membrane-interface signal relevant
        to inflammasome-associated pathways."
      sentence_citations_list:
      - [10.1126/science.aao6047, 10.1016/j.bbalip.2016.08.005, 10.1016/j.immuni.2013.08.001]
      - [10.1126/science.aao6047, 10.1016/j.bbalip.2016.08.005]
      - [10.1016/j.immuni.2013.08.001]
      bridge: "This dual role—mitochondrial status signal and membrane-interface determinant—makes
        CL attractive as an integrated variable linking mitochondria to execution-layer
        outcomes."

    - pid: "1.2.4.p2"
      source_trace:
      - "original_text:1.2.4"
      topic_sentence: "Direct evidence suggests GSDMD-NT can couple to mitochondrial
        membrane lipid environment and trigger mitochondrial damage before plasma-membrane
        lysis, strengthening the notion of CL as an execution-interface candidate."
      sentences:
      - "Gasdermins (notably GSDMD) can directly bind mitochondrial CL, induce mitochondrial
        inner and outer membrane permeabilization, and promote release of mtDNA and
        proteins to amplify inflammation."
      - "Disease models further highlight coupling between mitochondrial injury and
        pore events, consistent with membrane-environment amplification of execution."
      - "In apoptosis, CL is also implicated in tBID-mediated BAX activation and subsequent
        cytochrome c release, indicating that CL’s interface role is not confined
        to a single death modality."
      - "At the same time, evidence strength varies across putative receptor–CL axes,
        leaving mechanistic chains to be systematically established."
      sentence_citations_list:
      - [10.1016/j.immuni.2023.10.004, 10.1016/j.celrep.2018.09.071, 10.1096/fj.202100085r, 10.1016/j.jbc.2023.102908, 10.1016/j.cell.2022.06.038]
      - [10.1016/j.immuni.2023.10.004, 10.1016/j.celrep.2018.09.071, 10.1096/fj.202100085r, 10.1016/j.jbc.2023.102908, 10.1016/j.cell.2022.06.038]
      - [10.1016/j.immuni.2023.10.004, 10.1016/j.celrep.2018.09.071, 10.1096/fj.202100085r, 10.1016/j.jbc.2023.102908, 10.1016/j.cell.2022.06.038]
      - [10.1038/2503, 10.1016/j.neuron.2023.02.019, 10.1016/j.chemphyslip.2013.12.002, 10.1016/j.bbrc.2008.01.055]
      - [10.1038/s41467-019-09397-2, 10.1016/j.immuni.2021.04.012, 10.1016/j.celrep.2018.10.103, 10.1016/j.celrep.2018.10.087]
      bridge: "Thus, the critical missing link is not whether an interface exists,
        but how upstream signaling rewires CL state to tune execution-layer thresholds."

    - pid: "1.2.5.p1"
      source_trace:
      - "original_text:1.2.5"
      topic_sentence: "Eph receptors are contact-dependent bidirectional RTKs that
        translate spatial microenvironmental interactions into cellular behaviors,
        positioning them at key immune interfaces relevant to inflammatory output
        control."
      sentences:
      - "Because Eph–ephrin signaling converts cell–cell contact into downstream programs that shape adhesion, cytoskeletal organization, and microenvironmental responses, it offers a plausible receptor-level route linking extracellular context to pyroptotic execution."
      - "In immunopathological contexts, Eph–ephrin signaling has been repeatedly
        implicated in immune-cell migration, tissue entry, adhesion coordination,
        and spatial organization of intercellular communication within inflammatory
        microenvironments."
      citations: []
      bridge: "The central question is therefore not whether Eph signaling matters,
        but whether a specific Eph subtype such as Ephb1 connects contact cues to
        downstream layers that determine output form."

    - pid: "1.2.5.p2"
      source_trace:
      - "original_text:1.2.5"
      topic_sentence: "Existing work suggests Eph signaling can intersect PI3K–Akt
        and MAPK branches and influence mitochondrial integrity, ROS, dynamics, and
        cell-fate thresholds in a context-dependent manner."
      sentences:
      - "In acute injury models such as myocardial ischemia–reperfusion, Eph stimulation
        is associated with protective changes in mitochondrial ultrastructure and
        function and correlates with indicators such as mPTP opening and cristae stability."
      - "In vascular or endothelial settings, loss of specific Eph subtypes coincides
        with decreased membrane potential, increased ROS, and impaired antioxidant/biogenesis
        axes."
      - "Mechanistic evidence supports Eph–PI3K/Akt contributions to maintaining mitochondrial
        outer-membrane stability and anti-apoptotic capacity, and Eph–ERK effects
        on DRP1 phosphorylation, mitochondrial fragmentation, and death sensitivity."
      - "In neural injury contexts, Eph-related axes have been linked to iron homeostasis
        and antioxidant networks with ferroptosis-like phenotypes."
      - "Together, these examples support an abstract consensus: Eph signaling can
        span ‘plasma-membrane spatial cues → mitochondrial homeostasis/membrane structure
        → fate thresholds and output forms’, with strong dependency on subtype, cell
        type, and microenvironment."
      sentence_citations_list:
      - [10.1016/j.lfs.2021.119954, 10.1016/j.fct.2019.110960, 10.18632/oncotarget.12838, 10.4103/1673-5374.369118]
      - [10.1016/j.lfs.2021.119954]
      - [10.1016/j.fct.2019.110960]
      - [10.18632/oncotarget.12838]
      - [10.4103/1673-5374.369118]
      - [10.1016/j.lfs.2021.119954, 10.1016/j.fct.2019.110960, 10.18632/oncotarget.12838, 10.4103/1673-5374.369118]
      bridge: "However, these clues do not yet resolve the specific stratification
        question relevant to inflammasome execution outputs."

    - pid: "1.2.5.p3"
      source_trace:
      - "original_text:1.2.5"
      topic_sentence: "Whether Ephb1 participates in inflammasome and pyroptotic execution is itself unresolved, and, if so, whether its mitochondrial effects can be linked to measurable membrane-state readouts such as CL remains unknown."
      sentences:
      - "First, much of the literature emphasizes ‘Eph–mitochondria–apoptosis/metabolism’
        rather than inflammasome–pyroptosis execution, and mitochondrial readouts
        (ΔΨm, ROS, dynamics) are often difficult to place causally as upstream triggers
        versus downstream amplification."
      - "However, Eph family functions are pleiotropic, and even closely related EphB subtypes can have opposing effects across tissues, limiting inference from family membership alone."
      - "Third, and most directly relevant here, even if Eph signaling affects mitochondria,
        a mechanistic framework is missing that links Ephb1 via downstream pathways/mechanistic
        axes to changes in mitochondrial membrane environment—especially CL abundance/remodeling/oxidation/externalization—and
        further translates these changes into execution-layer differences such as
        GSDMD pore threshold and efficiency, culminating in reshaped IL-1β release
        and lytic permeabilization."
      citations: []
      bridge: "These gaps motivate a falsifiable model in which Ephb1 influences pyroptotic execution through downstream pathways that reshape CL state."

  - id: "1.3"
    heading: "Scientific question, hypotheses, and study objectives"
    narrative_role: "State the falsifiable chain, define what is measured (readouts),
      and preview the discovery–localize–validate strategy without revealing results."
    paragraphs:

    - pid: "1.3.p1"
      source_trace:
      - "original_text:1.3.1"
      topic_sentence: "Within the priming–assembly–execution framework of inflammasome
        biology, the execution layer largely determines output amplitude, timing,
        and tissue cost, making ‘execution thresholds’ a more informative target than
        ‘activation strength’ alone."
      sentences:
      - "In pyroptosis, cleavage of GSDMD generates an N-terminal fragment that oligomerizes
        into pores, enabling cytokine release, osmotic imbalance, and lytic death."
      - "Recent work further separates execution into ‘pore formation’ and ‘post-pore
        terminal rupture amplification’ (for example, via NINJ1), enabling stratified
        attribution of ‘how much is released, whether rupture occurs, and when’ as
        experimentally distinguishable questions."
      - "Thus, rather than generalizing differences as ‘inflammasome activation’,
        a more explanatory and translationally aligned question is why execution outputs
        diverge in amplitude and form under similar activation contexts."
      sentence_citations_list:
      - [10.1038/s41586-023-05991-z]
      - []
      - [10.1038/s41586-023-05991-z]
      - [10.1038/s41586-023-05991-z]
      bridge: "This framing elevates membrane environment as a key determinant of
        execution efficiency."

    - pid: "1.3.p2"
      source_trace:
      - "original_text:1.3.1"
      topic_sentence: "Execution efficiency is constrained by membrane physicochemical
        environment, and this study defines the membrane environment of interest as
        the integrated state represented by cardiolipin metabolism rather than a single
        lipid event."
      sentences:
      - "CL is a signature tetra-acyl lipid of the mitochondrial inner membrane, tightly
        coupled to cristae structure, respiratory-chain organization, and oxidative
        phosphorylation efficiency."
      - "CL abundance, acyl-chain composition, remodeling balance, and oxidation state
        are plastic under stress, metabolic dysregulation, and inflammation, and can
        reshape mitochondrial membrane structure and interface properties."
      - "Disease and review literature (for example, Barth syndrome as a CL paradigm)
        underscores CL as a metabolic–structural–functional hub whose network-level
        changes can coordinate mitochondrial function with cell-fate decisions."
      sentence_citations_list:
      - [10.1016/j.febslet.2006.07.022]
      - [10.1016/j.febslet.2006.07.022]
      - [10.1016/j.febslet.2006.07.022]
      - [10.1016/j.febslet.2006.07.022]
      bridge: "Accordingly, CL is positioned here as both a candidate mechanistic
        interface and a quantifiable multi-dimensional readout."

    - pid: "1.3.p3"
      source_trace:
      - "original_text:1.3.1"
      topic_sentence: "To avoid overcommitment to microdomain-level claims, this study
        explicitly adopts a multi-readout strategy for CL state and treats each readout
        within its interpretive boundary."
      sentences:
      - "Chemically quantitative lipidomics will be used to assess CL abundance and
        species distribution, and ratio-type indices related to remodeling or oxidation
        (e.g., MLCL/CL, oxCL/CL) to provide independent evidence of state changes."
      - "In parallel, functional/interface-linked readouts such as NAO staining will
        be used to suggest CL-related membrane-interface changes, while recognizing
        that NAO reports a ‘stainable/accessibility-related’ state influenced by membrane
        environment and dye behavior rather than absolute quantification of nanoscale
        pools or binding sites."
      - "The falsifiable criterion is not identifying a precise microdomain binding
        site, but whether reproducible CL-state changes align in direction and time
        with execution-output differences in pore formation/permeabilization/cytokine
        release."
      sentence_citations_list:
      - [10.1111/j.1432-1033.1992.tb17285.x]
      - [10.1111/j.1432-1033.1992.tb17285.x]
      - [10.1111/j.1432-1033.1992.tb17285.x]
      - [10.1111/j.1432-1033.1992.tb17285.x]
      bridge: "This defines a pragmatic but stringent test of whether CL-state modulation
        is sufficient to explain execution divergence."

    - pid: "1.3.p4"
      source_trace:
      - "original_text:1.3.1"
      topic_sentence: "A central question is whether Ephb1 itself participates in terminal inflammasome execution and, if so, whether it does so through downstream pathways that reshape CL state."
      sentences:
      - "Existing literature provides interface clues that gasdermins can interact
        with CL-related membrane environments to affect mitochondrial integrity, mtDNA
        release, and inflammatory amplification, coupling mitochondria to inflammasome
        outputs."
      - "Current evidence does not yet establish Ephb1 as a regulator of inflammasome or pyroptotic execution, nor does it provide a systems-level framework for linking receptor-level signals to integrated changes in CL state."
      - "For Ephb1 specifically, the key unknown is not whether it affects a single
        enzyme or event, but whether Ephb1 signaling can, via downstream pathways/mechanistic
        axes, produce reproducible CL-state changes that are sufficient to explain
        changes in execution thresholds and efficiency."
      sentence_citations_list:
      - []
      - [10.1016/j.immuni.2023.10.004, 10.1038/s41467-019-09397-2]
      - []
      - []
      bridge: "These considerations motivate a discovery–localize–validate workflow
        aligned to the proposed chain."

    - pid: "1.3.p5"
      source_trace:
      - "original_text:1.3.2"
      - "logic_yaml:1.3.2"
      topic_sentence: "We therefore approached the problem in a staged manner: first asking whether Ephb1 alters inflammasome output, then localizing the point of divergence within the pathway, and finally testing whether membrane-state changes could account for the phenotype."
      sentences:
      - "Input: genetic manipulation of Ephb1 (e.g., KO/intervention) as the receptor-level
        entry variable under a unified inflammasome activation model and time-resolved
        sampling for comparability."
      - "Process: identify candidate downstream pathways from multi-omics/bioinformatics
        and prioritize ‘pathway/mechanistic axis as mediator’ using statistical mediation
        logic; then quantify CL-state and execution outputs in parallel with stratified
        priming/assembly markers to localize the layer of divergence."
      - "Output: complete causal tests with genetic plus pharmacologic masking/rescue
        or equivalent stratified strategies to validate whether perturbing a candidate
        pathway or correcting a candidate metabolic state coherently shifts CL readouts
        and execution outputs."
      citations: []
      bridge: "This design aims to prevent narrative drift by enforcing consistent
        readouts and explicit stratification across priming, assembly, and execution."

    - pid: "1.3.p6"
      source_trace:
      - "original_text:1.3.3"
      topic_sentence: "Rather than assuming that phenotypic differences simply reflect stronger or weaker upstream activation, we asked which layer differs and whether execution thresholds or output amplitude can be tuned."
      sentences:
      - "This strategy led us to examine a membrane-mediated explanation in which CL state functions as an integrated mitochondrial readout linking upstream signaling to execution output."
      - "Accordingly, the study tests whether changes in CL state are sufficient to explain divergence in execution output without requiring complete molecular resolution of every intermediate step."
      - "The Results are organized as: downstream pathway/mechanistic axis prioritization
        → CL metabolic and membrane-environment phenotyping → stratified attribution
        and causal validation of execution outputs."
      citations: []
      bridge: "This structure sets a clear expectation for how evidence will accumulate
        and where the model could be falsified."

    - pid: "1.3.p7"
      source_trace:
      - "original_text:1.3.4"
      - "logic_yaml:1.3.4"
      topic_sentence: "Based on the above rationale, the study advances a set of testable
        hypotheses with explicit readouts and minimal decision criteria to avoid purely
        correlational storytelling."
      hypotheses:
      - hid: "H1"
        statement: "Ephb1 modulates terminal inflammasome execution outputs primarily
          via one or more downstream signaling pathways/mechanistic axes, rather than
          solely through priming or assembly differences."
        support_if:
        - "pathway/mechanistic-axis metrics change concordantly with execution outputs"
        - "statistical mediation supports Ephb1 → axis → execution-output linkage"
        refute_if:
        - "axis metrics are unrelated to execution outputs or no mediation evidence
          is obtained"
        readouts:
        - "pathway enrichment/axis scoring/activation indices"
        - "mediation analysis: Ephb1 → axis → phenotype/output"
        - "execution outputs: GSDMD pore/permeabilization and cytokine release"
      - hid: "H2"
        statement: "Ephb1 signaling reshapes integrated CL metabolic state, including
          supply, synthesis, remodeling, and oxidation, yielding reproducible CL phenotypes."
        support_if:
        - "at least one CL metric (abundance, species pattern, or oxidation-related
          index) shifts consistently under Ephb1 manipulation"
        refute_if:
        - "CL readouts remain globally stable across conditions"
        readouts:
        - "lipidomics: CL total and species distribution"
        - "ratio indices: MLCL/CL, oxCL/CL (as stated in source text)"
        - "functional/interface readout: NAO staining (interpreted as accessibility-related)"
      - hid: "H3"
        statement: "Changes in CL metabolic state translate into execution-layer output
          differences by tuning pore-formation/permeabilization thresholds and efficiency."
        support_if:
        - "CL readouts align in direction and timing with execution outputs"
        - "masking/rescue conditions co-shift CL readouts and execution outputs"
        refute_if:
        - "CL readouts and execution outputs are decoupled"
        readouts:
        - "GSDMD pore/permeabilization metrics"
        - "IL-1β/IL-18 release and lytic permeability outputs"
        - "CL-state metrics as in H2"
      - hid: "H4"
        statement: "Mitochondrial functional state (ROS, membrane potential, dynamics,
          quality control) provides context dependence and feedback that modulates
          effect size, without being assumed as a single deterministic cause."
        support_if:
        - "mitochondrial-state metrics explain context-dependent differences in the
          CL–execution relationship across stimuli or cellular backgrounds"
        refute_if:
        - "mitochondrial-state metrics remain persistently uncoupled from CL and execution
          outputs"
        readouts:
        - "ROS, membrane potential, dynamics, quality-control indicators (used as
          contextual covariates)"
      bridge: "Together, these hypotheses compress the study into an explicit ‘pathway/mechanistic
        axis → CL state → execution output’ chain with stratified localization and
        falsifiability."
