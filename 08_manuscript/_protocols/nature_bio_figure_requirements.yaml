Nature_Figure_Requirements:
  # ———仅供脚本读取的可执行样式———
  plot_style:
    size:
      width_mm: 89            # 单栏目标宽度
      height_mm: null         # null 表示使用 aspect_ratio 计算
      aspect_ratio: "4:3"
      max_width_mm: 183       # 自适应加宽上限（双栏）
    font:
      family: Arial
      axis_pt: 7
      tick_pt: 6
      legend_pt: 6
    axes:
      spine_top: false
      spine_right: false
      tick_dir: out
      tick_len: 2
      tick_w: 0.6
      axis_w: 0.8
      grid: false
    lines:
      lw: 1.0
      ms: 3.0
    errorbar:
      type: sd
      capsize: 2.0
    scatter:
      show_points: true
      alpha: 1.0
      jitter: 0.0
    palette:
      colorblind_safe: true
      wt: "#66c2a5"           # ← 统一为你最终决定的配色
      ho: "#fc8d62"
    dynamic:
      threshold_labels: 10     # 超过该数开始加宽/降采样
      mm_per_extra_label: 3
      x_ticks:
        max_labels: 10
        rotate_deg: 45
        step_auto: true        # 代替 "step: auto"
        wrap_chars: null
        stagger: false
    export:
      formats: [pdf, png]
      dpi: 600
      transparent: false

  statistics:
    annotate_on_plot: true
    show_ns: false
    pvalue_col: p_value
    stars:
      - {p_lt: 0.01, label: "**"}
      - {p_lt: 0.05, label: "*"}

  # ———作者须知/规范（供核对，不建议脚本读取）———
  guidance:
    file_types:
      vector: [AI, EPS, PDF, PPT]
      bitmap: [PSD, TIFF]
    resolution:
      photos_dpi_min: 300
      line_art: vector
    dimensions:
      single_column_mm: 89
      double_column_mm: 183
      page_height_mm: 247
      subpanel_label_style: {text: "a,b,c…", pt: 8, weight: bold}
    fonts:
      preferred: [Helvetica, Arial]
      sequence: Courier
      sizes: {panel_label_pt: 8, general_pt_max: 7, minimum_pt: 5}
    color:
      online: RGB
      print: CMYK
      notes: ["避免红/绿仅双色", "确保色盲友好和对比度"]
    axes_and_scales:
      microscopy_requires_scale_bar: true
    legends:
      limit_char: 300
      must_include: ["errorbar meaning", "n (bio replicates)", "test + tail + correction", "significance"]
    integrity:
      allowed: "global linear adjustments"
      prohibited: ["local enhance", "nonlinear", "unmarked splice", "copy/paste"]
    checklist:
      - "文字可编辑、字体嵌入；线稿保持矢量"
      - "照片类 ≥300 dpi"
      - "尺度条/单位/刻度清晰"
      - "统计/误差/n 明确"
      - "单图 ≤50 MB"