journal_selection_workflow:
  meta:
    template_name: journal_selection_decision
    version: v1.0
    last_updated: 2026-01-13
    author: gbm
    notes: >
      YAML-based workflow for rapid journal selection,
      prioritizing scope-fit, acceptance probability, and decision speed.

############################################################
# STEP 1. Manuscript parameterization（文章定型）
############################################################
manuscript_profile:
  title: "Ephb1 deficiency limits inflammasome-driven IL-1β release and pyroptosis by remodeling cardiolipin-dependent mitochondrial membrane environment"

  short_core_claim: >
    Ephb1 functions as an upstream signaling node that limits inflammasome output
    by reshaping cardiolipin-centered mitochondrial membrane environment,
    thereby increasing the execution threshold of GSDMD pore formation.

  field_and_audience:
    primary_field: inflammasome biology
    secondary_fields:
      - mitochondrial biology
      - membrane lipid metabolism
      - pyroptosis
      - innate immunity signaling
    target_readers: >
      Mechanism-oriented basic researchers in innate immunity,
      inflammasome signaling, and mitochondrial regulation.

  contribution_type:
    category: mechanism
    novelty_level:
      self_assessment: strong
      rationale: >
        Identifies membrane environment remodeling, mediated by cardiolipin,
        as a limiting execution-layer mechanism separating inflammasome activation
        from lytic output, and positions Ephb1 as an upstream signal translator.

  evidence_strength:
    model_systems:
      in_vivo: false
      in_vitro: true
      omics:
        - RNA-seq
        - lipidomics
    causality_level: strong causality
    known_limitations: >
      Primarily based on primary mouse peritoneal macrophages;
      in vivo validation and disease models are not included.

  manuscript_format:
    article_type: Article
    length_flexibility:
      text: medium
      figures: medium

  constraints:
    open_access_required: false
    apc_upper_limit: ""
    ethical_constraints: >
      All animal experiments conducted under approved institutional guidelines.

  ############################################################
  # STEP 2. Reference-based reverse engineering（反向工程）
  ############################################################
  reference_anchor_papers:
    selection_rule:
      total_papers: 10
      breakdown:
        mechanism_similar: 5
        method_similar: 3
        model_similar: 2

    papers:
      - doi: "10.1038/nature18590"
        journal: "Nature"
        year: 2016
        similarity_type: [mechanism]

      - doi: "10.1016/j.immuni.2017.11.013"
        journal: "Immunity"
        year: 2018
        similarity_type: [mechanism, model]

      - doi: "10.1126/science.aar7607"
        journal: "Science"
        year: 2018
        similarity_type: [mechanism]

      - doi: "10.1038/s41586-021-03218-7"
        journal: "Nature"
        year: 2021
        similarity_type: [mechanism]

      - doi: "10.1038/s41467-021-27692-9"
        journal: "Nature Communications"
        year: 2022
        similarity_type: [mechanism]

      - doi: "10.1016/j.immuni.2023.10.004"
        journal: "Immunity"
        year: 2023
        similarity_type: [mechanism, model]

      - doi: "10.1126/sciimmunol.adn1452"
        journal: "Science Immunology"
        year: 2024
        similarity_type: [mechanism]

      - doi: "10.1016/j.celrep.2024.114237"
        journal: "Cell Reports"
        year: 2024
        similarity_type: [method]

      - doi: "10.1038/s41419-018-1121-9"
        journal: "Cell Death & Disease"
        year: 2018
        similarity_type: [method, model]

      - doi: "10.1073/pnas.1607769113"
        journal: "Proceedings of the National Academy of Sciences of the United States of America"
        year: 2016
        similarity_type: [mechanism]

    journal_frequency_summary:
      auto_extract: false   # future automation hook
      summary:
        by_journal:
          Nature:
            count: 2
            references: [2016, 2021]
          Immunity:
            count: 2
            references: [2018, 2023]
          Science:
            count: 1
            references: [2018]
          Nature Communications:
            count: 1
            references: [2022]
          Science Immunology:
            count: 1
            references: [2024]
          Cell Reports:
            count: 1
            references: [2024]
          Cell Death & Disease:
            count: 1
            references: [2018]
          PNAS:
            count: 1
            references: [2016]
        by_publisher_family:
          Nature_Portfolio:
            journals: [Nature, Nature Communications]
            count: 3
          Cell_Press:
            journals: [Immunity, Cell Reports]
            count: 3
          AAAS:
            journals: [Science, Science Immunology]
            count: 2
      interpretation: >
        The most frequent natural matches cluster within the Nature Portfolio
        and Cell Press families, indicating strong scope alignment with
        mechanism-focused immunology and cell biology journals that routinely
        publish work on inflammasome execution, GSDMD regulation, and membrane
        biology.
      notes: >
        Journals with frequency >=2 (Nature, Immunity) represent top-tier
        stretch/match candidates. Publisher-family clustering suggests
        efficient transfer strategies within Nature Portfolio and Cell Press.

  ############################################################
  # STEP 3. Candidate journal pool
  ############################################################
  candidate_journals:
    stretch:
      - journal_name: "Immunity"
        publisher_family: "Cell_Press"
        recent_impact_factor: 31.7
        rationale_short: "Flagship mechanistic immunology journal; strong precedent for inflammasome execution and GSDMD regulation."
        scores:
          scope_fit: 2
          article_type_match: 2
          evidence_threshold: 1
          decision_speed: 1
          acceptance_predictability: 1
          layout_flexibility: 1
          cost_and_oa: 2
          transfer_convenience: 2
          journal_reputation: 2
          narrative_alignment: 2
        weighted_total_score: 17.3
      - journal_name: "Nature Immunology"
        publisher_family: "Nature_Portfolio"
        recent_impact_factor: 29.3
        rationale_short: "Premier immunology venue; excellent fit for activation–output uncoupling and execution-layer mechanisms."
        scores:
          scope_fit: 2
          article_type_match: 2
          evidence_threshold: 1
          decision_speed: 1
          acceptance_predictability: 1
          layout_flexibility: 1
          cost_and_oa: 2
          transfer_convenience: 2
          journal_reputation: 2
          narrative_alignment: 2
        weighted_total_score: 17.3
      - journal_name: "Science Immunology"
        publisher_family: "AAAS"
        recent_impact_factor: 24.8
        rationale_short: "High-end immunology journal receptive to inflammasome execution control and signaling-to-effector coupling."
        scores:
          scope_fit: 2
          article_type_match: 2
          evidence_threshold: 1
          decision_speed: 1
          acceptance_predictability: 1
          layout_flexibility: 1
          cost_and_oa: 2
          transfer_convenience: 1
          journal_reputation: 2
          narrative_alignment: 2
        weighted_total_score: 16.8
      - journal_name: "Nature Cell Biology"
        publisher_family: "Nature_Portfolio"
        recent_impact_factor: 20.0
        rationale_short: "Mechanistic cell biology focus; suitable if membrane/mitochondrial lipid context is foregrounded."
        scores:
          scope_fit: 1
          article_type_match: 1
          evidence_threshold: 1
          decision_speed: 1
          acceptance_predictability: 1
          layout_flexibility: 1
          cost_and_oa: 2
          transfer_convenience: 2
          journal_reputation: 2
          narrative_alignment: 1
        weighted_total_score: 13.3
      - journal_name: "Cell Metabolism"
        publisher_family: "Cell_Press"
        recent_impact_factor: 27.7
        rationale_short: "Strong option if cardiolipin metabolism and mitochondrial lipid remodeling are positioned as the main axis."
        scores:
          scope_fit: 1
          article_type_match: 1
          evidence_threshold: 0
          decision_speed: 1
          acceptance_predictability: 0
          layout_flexibility: 1
          cost_and_oa: 2
          transfer_convenience: 2
          journal_reputation: 2
          narrative_alignment: 1
        weighted_total_score: 10.6

    match:
      - journal_name: "Nature Communications"
        publisher_family: "Nature_Portfolio"
        recent_impact_factor: 16.6
        rationale_short: "Broad-scope, reliable home for multi-omics + functional immunology mechanisms; predictable editorial process."
        scores:
          scope_fit: 2
          article_type_match: 2
          evidence_threshold: 2
          decision_speed: 2
          acceptance_predictability: 2
          layout_flexibility: 2
          cost_and_oa: 2
          transfer_convenience: 2
          journal_reputation: 2
          narrative_alignment: 2
        weighted_total_score: 22.0
      - journal_name: "Cell Reports"
        publisher_family: "Cell_Press"
        recent_impact_factor: 9.9
        rationale_short: "Well-suited for rigorous execution-layer mechanisms with multi-level validation and clear narrative."
        scores:
          scope_fit: 2
          article_type_match: 2
          evidence_threshold: 2
          decision_speed: 2
          acceptance_predictability: 2
          layout_flexibility: 2
          cost_and_oa: 2
          transfer_convenience: 2
          journal_reputation: 2
          narrative_alignment: 2
        weighted_total_score: 22.0
      - journal_name: "EMBO Journal"
        publisher_family: "EMBO"
        recent_impact_factor: 11.5
        rationale_short: "Deep mechanism and signaling; good match for Ephb1→PI3K–AKT–mTOR→membrane environment causal chain."
        scores:
          scope_fit: 2
          article_type_match: 2
          evidence_threshold: 2
          decision_speed: 1
          acceptance_predictability: 1
          layout_flexibility: 1
          cost_and_oa: 2
          transfer_convenience: 1
          journal_reputation: 2
          narrative_alignment: 2
        weighted_total_score: 18.3
      - journal_name: "Proceedings of the National Academy of Sciences (PNAS)"
        publisher_family: "NAS"
        recent_impact_factor: 12.2
        rationale_short: "Broad, respected venue for rigorous mechanistic biology with general-interest framing."
        scores:
          scope_fit: 2
          article_type_match: 2
          evidence_threshold: 2
          decision_speed: 1
          acceptance_predictability: 1
          layout_flexibility: 1
          cost_and_oa: 2
          transfer_convenience: 0
          journal_reputation: 2
          narrative_alignment: 2
        weighted_total_score: 17.8
      - journal_name: "eLife"
        publisher_family: "eLife"
        recent_impact_factor: 7.7
        rationale_short: "Transparent review process; suitable for cross-disciplinary organelle–immunity mechanisms."
        scores:
          scope_fit: 2
          article_type_match: 2
          evidence_threshold: 2
          decision_speed: 1
          acceptance_predictability: 1
          layout_flexibility: 2
          cost_and_oa: 2
          transfer_convenience: 0
          journal_reputation: 2
          narrative_alignment: 2
        weighted_total_score: 18.6
      - journal_name: "Journal of Experimental Medicine"
        publisher_family: "Rockefeller_University_Press"
        recent_impact_factor: 17.0
        rationale_short: "Strong mechanistic immunology journal; best fit if physiological relevance is emphasized."
        scores:
          scope_fit: 1
          article_type_match: 2
          evidence_threshold: 0
          decision_speed: 1
          acceptance_predictability: 0
          layout_flexibility: 1
          cost_and_oa: 2
          transfer_convenience: 0
          journal_reputation: 2
          narrative_alignment: 1
        weighted_total_score: 10.6

    safety:
      - journal_name: "Communications Biology"
        publisher_family: "Nature_Portfolio"
        recent_impact_factor: 5.5
        rationale_short: "Broad biology scope; solid safety option for well-supported mechanistic stories."
        scores:
          scope_fit: 2
          article_type_match: 2
          evidence_threshold: 2
          decision_speed: 2
          acceptance_predictability: 2
          layout_flexibility: 2
          cost_and_oa: 2
          transfer_convenience: 2
          journal_reputation: 2
          narrative_alignment: 2
        weighted_total_score: 22.0
      - journal_name: "iScience"
        publisher_family: "Cell_Press"
        recent_impact_factor: 5.7
        rationale_short: "Broad-scope OA journal; suitable for multi-layer mechanisms with clear structure."
        scores:
          scope_fit: 2
          article_type_match: 2
          evidence_threshold: 2
          decision_speed: 2
          acceptance_predictability: 2
          layout_flexibility: 2
          cost_and_oa: 2
          transfer_convenience: 2
          journal_reputation: 2
          narrative_alignment: 2
        weighted_total_score: 22.0
      - journal_name: "Cell Death & Disease"
        publisher_family: "Nature_Portfolio"
        recent_impact_factor: 9.0
        rationale_short: "Cell death and pyroptosis-focused venue; aligns with execution-layer and lytic output phenotypes."
        scores:
          scope_fit: 2
          article_type_match: 2
          evidence_threshold: 2
          decision_speed: 2
          acceptance_predictability: 2
          layout_flexibility: 2
          cost_and_oa: 2
          transfer_convenience: 1
          journal_reputation: 2
          narrative_alignment: 2
        weighted_total_score: 21.5

  ############################################################
  # STEP 4. Scoring system（核心决策表）
  ############################################################
  scoring_schema:
    score_range: [0, 2]
    dimensions:
      scope_fit:
        description: "How well the journal scope matches the manuscript"
        weight: 1.5
      article_type_match:
        description: "Match between manuscript format and journal preference"
        weight: 1.0
      evidence_threshold:
        description: "Likelihood that evidence meets review standards"
        weight: 1.5
      decision_speed:
        description: "Transparency and speed of first decision"
        weight: 1.2
      acceptance_predictability:
        description: "Stability and predictability of outcomes"
        weight: 1.2
      layout_flexibility:
        description: "Figure, length, and structure friendliness"
        weight: 0.8
      cost_and_oa:
        description: "OA policy and APC compatibility"
        weight: 0.8
      transfer_convenience:
        description: "Publisher-level transfer options"
        weight: 0.5
      journal_reputation:
        description: "Editorial ethics and community trust"
        weight: 1.0
      narrative_alignment:
        description: "How naturally your story fits the journal's style"
        weight: 1.5


  ############################################################
  # STEP 6. Tier strategy（Stretch / Match / Safety）
  ############################################################
  tier_strategy:
    stretch:
      max_number: 2
      selection_logic: >
        Higher impact, higher risk, but still within plausible scope.
      selected:
        - journal_name: "Immunity"
          from_pool: "candidate_journals.stretch"
          weighted_total_score: 17.3
          rationale: "Best stretch fit for inflammasome execution/output control; strong precedent in anchor set."
        - journal_name: "Nature Immunology"
          from_pool: "candidate_journals.stretch"
          weighted_total_score: 17.3
          rationale: "Top immunology venue; clear alignment with activation–output uncoupling framework."
      alternates:
        - journal_name: "Science Immunology"
          weighted_total_score: 16.8
          use_if: "Prefer AAAS route or Immunity/NatImmunol desk-reject quickly"
        - journal_name: "Nature Cell Biology"
          weighted_total_score: 13.3
          use_if: "If emphasizing membrane/mitochondrial lipid cell biology more than immunology"
        - journal_name: "Cell Metabolism"
          weighted_total_score: 10.6
          use_if: "Only if CL metabolism is reframed as the dominant axis and immunology as application"

    match:
      max_number: 4
      selection_logic: >
        Best balance of scope fit, evidence threshold, and speed.
      selected:
        - journal_name: "Nature Communications"
          from_pool: "candidate_journals.match"
          weighted_total_score: 22.0
          rationale: "Highest overall fit/threshold/speed; most efficient main-track home for this story."
        - journal_name: "Cell Reports"
          from_pool: "candidate_journals.match"
          weighted_total_score: 22.0
          rationale: "Strong match for execution-layer mechanism with multi-level validation; predictable revisions."
        - journal_name: "eLife"
          from_pool: "candidate_journals.match"
          weighted_total_score: 18.6
          rationale: "Good cross-disciplinary fit (organelle–immunity) with transparent review process."
        - journal_name: "EMBO Journal"
          from_pool: "candidate_journals.match"
          weighted_total_score: 18.3
          rationale: "Deep mechanism/signaling venue; fits Ephb1→PI3K–AKT–mTOR→membrane environment chain."
      alternates:
        - journal_name: "PNAS"
          weighted_total_score: 17.8
          use_if: "If you want broad general-interest framing and can tolerate moderate decision speed"
        - journal_name: "Journal of Experimental Medicine"
          weighted_total_score: 10.6
          use_if: "Only if you can add/foreground strong physiological relevance (ideally in vivo)"

    safety:
      max_number: 2
      selection_logic: >
        Broad scope, predictable review, acceptable prestige.
      selected:
        - journal_name: "Cell Death & Disease"
          from_pool: "candidate_journals.safety"
          weighted_total_score: 21.5
          rationale: "Pyroptosis/cell-death aligned scope; reliable safety that preserves mechanistic narrative."
        - journal_name: "iScience"
          from_pool: "candidate_journals.safety"
          weighted_total_score: 22.0
          rationale: "Broad OA safety with high fit and fast processing; good for multi-layer mechanism."
      alternates:
        - journal_name: "Communications Biology"
          weighted_total_score: 22.0
          use_if: "If you prefer Nature Portfolio safety route or need another broad-scope option"

    submission_sequence:
      # Recommended execution order under the 2+4+2 strategy
      - rank: 1
        journal_name: "Immunity"
        tier: "Stretch"
      - rank: 2
        journal_name: "Nature Immunology"
        tier: "Stretch"
      - rank: 3
        journal_name: "Nature Communications"
        tier: "Match"
      - rank: 4
        journal_name: "Cell Reports"
        tier: "Match"
      - rank: 5
        journal_name: "eLife"
        tier: "Match"
      - rank: 6
        journal_name: "EMBO Journal"
        tier: "Match"
      - rank: 7
        journal_name: "Cell Death & Disease"
        tier: "Safety"
      - rank: 8
        journal_name: "iScience"
        tier: "Safety"

    notes: >
      This STEP 6 selection enforces the configured max counts (Stretch=2, Match=4, Safety=2)
      while prioritizing (i) conceptual fit to inflammasome execution/output control, (ii) evidence-threshold match,
      and (iii) overall cycle time. If early outcomes are rapid desk rejections, consider switching to alternates
      with similar scope (e.g., Science Immunology or PNAS) before moving to Safety.

  ############################################################
  # STEP 7. Submission acceleration package（提速）
  ############################################################
  acceleration_package:
    cover_letter:
      core_message: ""   # one-paragraph editor-facing summary
      journal_specific_customization: true

    reviewer_suggestions:
      target_number: 4-6
      exclusion_rules:
        - same_institution
        - recent_collaborators

    citation_alignment:
      cite_recent_journal_papers: true
      years: 2-3

    data_readiness:
      raw_data_available: true
      code_or_pipeline_ready: true
      statistics_checked: true

  ############################################################
  # STEP 8. Transfer & fallback plan（防时间浪费）
  ############################################################
  transfer_plan:
    preferred_publishers: []  # e.g. Nature / Elsevier / Wiley
    format_reuse_level: high
    alternative_abstract_versions:
      - focus: mechanism
        text: ""
      - focus: resource_or_method
        text: ""

  ############################################################
  # STEP 9. Risk control & red flags
  ############################################################
  risk_control:
    avoid_journals_with:
      - unclear_peer_review
      - aggressive_acceptance_promises
      - poor_retraction_policy

    final_go_no_go_checklist:
      - scope_fit >= 1
      - evidence_threshold >= 1
      - decision_speed_known: true
      - ethical_compliance_confirmed: true