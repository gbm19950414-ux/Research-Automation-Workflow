# 博士论文 48h 最终检查行动版（Action YAML）
# 目标：在 ≤48 小时内最大化“可被导师/答辩接受的完成度下限”
# 核心策略：风险优先、不可逆优先、标记优先于完美修改

meta:
  适用阶段: "提交/答辩前 1–2 天"
  总目标: "消除否决级风险，保证论文处于可提交状态"
  核心假设:
    - "不是所有检查项等权，优先处理高风险 20%"
    - "不可逆错误 > 可逆错误"
    - "发现并标记问题 ≈ 已完成 80% 的价值"

时间分配:
  Day1:
    总时长: "6–8 小时"
    重点: "内容与引用的致命风险"
  Day2:
    总时长: "3–5 小时"
    重点: "格式合规与最终确认"

Day1_必做任务:
  - 任务: "科学内容一致性 · 冲突扫描"
    目标: "避免任何结论自相矛盾或强度漂移"
    扫描范围:
      - 摘要
      - 结果部分：相应章节 第一段、最后一段、Figure legend 的结论句
      - 总讨论/总结段的证据链中相应句子
    只问三个问题:
      - "同一结论在不同位置强弱是否一致？"
      - "是否存在前文否定、后文暗示肯定的情况？"
      - "讨论中是否引入结果章节未支持的新机制？"
    行动规则:
      - "发现问题只标记，不做精修"
      - "能一句话弱化解决的，当场修改"
    完成判据: "未发现结论级冲突或已全部标记"

  - 任务: "引用关系与文献完整性 · 抽查"
    目标: "保证不存在‘引用错误’这一否决级问题"
    扫描方式:
      - "每章任选 2–3 条关键论断进行人工核对"
      - "检查论断是否真的被该文献支持"
    必查位置:
      - "引言中的共识性论断"
      - "讨论中的机制性结论"
    行动规则:
      - "不追求全覆盖，只求无硬伤"
      - "存疑文献直接替换为更稳妥的综述或原始文献"
    完成判据: "未发现明显错引或张冠李戴"

  - 任务: "动词强度快速校正（仅讨论部分）"
    目标: "避免因语言过满被质疑结论过度"
    操作:
      - "全文搜索高强度动词：证明 / 导致 / 决定 / 完全 / 明确表明"
      - "证据不足处统一弱化为：提示 / 支持 / 一致表明 / 可能"
    行动规则:
      - "只修改最显眼的 10–20 处"
    完成判据: "讨论中无明显‘证据不配强结论’表述"

Day2_必做任务:
  - 任务: "最终格式与提交合规 · 技术检查"
    目标: "保证论文在形式上可被系统与学院接受"
    必查清单:
      - "目录可自动更新且无报错"
      - "图表编号连续、正文均有引用"
      - "页眉页脚、页码符合模板"
      - "PDF 导出后无版式崩坏"
    行动规则:
      - "不进行任何美学级调整"
    完成判据: "PDF 版本可直接提交"

  - 任务: "最终确认与心理收尾"
    目标: "明确论文状态，避免反复返工"
    操作:
      - "完整通读摘要 + 总结一遍"
      - "确认所有高风险项已处理或已知晓"
    完成判据: "论文进入‘可提交’而非‘完美’状态"

明确放弃事项:
  - "全文逐句语言润色"
  - "所有术语逐一复核"
  - "逻辑流畅性全覆盖检查"
  - "阴性结果逐条交叉比对"

最终成功定义:
  - "不存在科学结论冲突"
  - "不存在明显错引或漏引"
  - "不存在因格式问题被退回"
  - "论文状态：答辩/提交可接受"