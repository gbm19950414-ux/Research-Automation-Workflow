# figures.yaml
# Purpose:
#   Figure rendering configuration (NOT content, NOT IR).
#   This file controls:
#     - which figures are rendered
#     - how figure images are located
#     - rendering-level display options
#
# Rendering rule:
#   - results.ir.yaml is the ONLY content truth
#   - figures.yaml may FILTER or OVERRIDE rendering behavior
#   - figures.yaml must NEVER introduce new figures or text

figures:

  # ---- Main figures ----
  - id: "Figure 1"
    enable: true
    image:
      pattern: "figure_1*.png"

  - id: "Figure 2"
    enable: true
    image:
      pattern: "figure_2*.png"

  - id: "Figure 3"
    enable: true
    image:
      pattern: "figure_3*.png"

  - id: "Figure 4"
    enable: true
    image:
      pattern: "figure_4*.png"

  - id: "Figure 5"
    enable: true
    image:
      pattern: "figure_5*.png"

  - id: "Figure 6"
    enable: true
    image:
      pattern: "figure_6*.png"


# ---- Rendering-level defaults (optional) ----
rendering:

  # Insert a page break after each figure block
  page_break_between_figures: true

  # Default figure width in inches when inserting into Word
  # Typical values:
  #   - 6.5  : single-column-friendly
  #   - 7.0+ : full-page figure
  image_width_in: 6.5

  # Preferred image formats (searched in order)
  image_prefer_ext:
    - png
    - tif
    - tiff
    - jpg
    - jpeg