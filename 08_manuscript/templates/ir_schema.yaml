ir_schema:
  ir_version: "0.1"

  conventions:
    inline_tokens:
      citation:
        syntax:
          - "{cite:Key}"
          - "{cite:Key1;Key2;Key3}"
        notes:
          - "Keys are citation identifiers (e.g., BibTeX keys)."
          - "Renderer assigns Vancouver numbers by first appearance across the whole document."
      cross_reference:
        syntax:
          - "{xref:fig1}"
          - "{xref:tbl2}"
        notes:
          - "Renderer replaces with template-specific prefixes (e.g., Fig. 1 / Table 2)."

  required_structure:
    document:
      meta:
        required_fields: ["id", "language"]
        optional_fields: ["title", "authors", "date"]
        constraints:
          language: ["en", "zh", "bilingual"]
      sections:
        - required_fields: ["id", "title", "blocks"]
          id_rules:
            - "lowercase snake_case recommended"
          blocks:
            allowed_types:
              - heading
              - paragraph
              - figure
              - table
              - list

  block_types:
    heading:
      required_fields: ["type", "level", "text"]
      constraints:
        level: "integer >= 1"
    paragraph:
      required_fields: ["type", "text"]
      optional_fields: ["role", "source", "tags"]
    figure:
      required_fields: ["type", "id", "caption"]
      optional_fields: ["path", "title", "notes", "source"]
      id_examples: ["fig1", "fig2a"]
    table:
      required_fields: ["type", "id", "caption"]
      optional_fields: ["path", "data", "title", "notes", "source"]
      id_examples: ["tbl1", "tbl2"]
    list:
      required_fields: ["type", "items"]
      optional_fields: ["ordered"]
      items_rules:
        - "Each item is a string (may include {cite:} tokens)."

  optional_reference_database:
    default_path: "../yaml/references.yaml"
    format:
      references:
        Key:
          required_fields: ["title"]
          optional_fields: ["authors", "year", "journal", "volume", "pages", "doi", "url", "note"]
    fallback_behavior:
      - "If references.yaml is missing or a Key is not found, renderer prints Key as reference text."