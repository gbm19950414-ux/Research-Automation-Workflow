template:
  template_version: "0.1"
  name: "thesis"
  language: "en"

  structure:
    # 可按需要关掉某些 section 或重命名
    section_map:
      abstract:       { title: "Abstract", include: true }
      introduction:   { title: "Introduction", include: true }
      methods:        { title: "Methods", include: true }
      results:        { title: "Results", include: true }
      discussion:     { title: "Discussion", include: true }
      conclusion:     { title: "Conclusion", include: true }
      references:     { title: "References", include: true }

  rendering:
    page_break_between_sections: true
    heading_numbering: false
    figure_caption_prefix: "Figure"
    table_caption_prefix: "Table"
    references_heading: "References"

  citations:
    style: "vancouver"
    bracket_left: "["
    bracket_right: "]"
    delimiter: ","
    sort_numeric: true
    compress_ranges: true
    # 多引用输出示例：[1,2,5-7]

  docx_styles:
    title_style: "Title"
    h1: "Heading 1"
    h2: "Heading 2"
    h3: "Heading 3"
    normal: "Normal"
    caption: "Caption"
    reference: "Normal"

  typography:
    normal_font_pt: 11