template:
  template_version: "0.1"
  name: "journal_short"
  language: "en"

  structure:
    # 期刊正文常见：主文不放详细 Methods（或只放简版）
    section_map:
      abstract:       { title: "Abstract", include: true }
      introduction:   { title: "Introduction", include: true }
      methods:        { title: "Methods", include: false }
      results:        { title: "Results", include: true }
      discussion:     { title: "Discussion", include: true }
      references:     { title: "References", include: true }

  rendering:
    page_break_between_sections: false
    heading_numbering: false
    figure_caption_prefix: "Fig."
    table_caption_prefix: "Table"
    references_heading: "References"

  citations:
    style: "vancouver"
    bracket_left: "["
    bracket_right: "]"
    delimiter: ","
    sort_numeric: true
    compress_ranges: true

  docx_styles:
    title_style: "Title"
    h1: "Heading 1"
    h2: "Heading 2"
    h3: "Heading 3"
    normal: "Normal"
    caption: "Caption"
    reference: "Normal"

  typography:
    normal_font_pt: 11