# RULES FOR LOGIC-LAYER CONTENT
# --------------------------------------------
# 1. 逻辑层只描述“图要解决的问题、逻辑角色与分析目的”，
#    不记录任何实验观察、数据数值、具体结果或显著性。
#
# 2. 若一句话是在回答“图为什么存在/要回答什么问题”，→ 放在 logic 层。
#    若一句话是在回答“图最终发现了什么观察”，→ 必须放到 figure/panel 层。
#
# 3. logic 层允许任务级、方向级、推理级的抽象表达（不依赖具体数据），
#    但禁止出现可因数据更新而改变的具体结论。
#
# 4. logic 层永远是分析流程的上游，不得被 panel 或结果反向污染；
#    内容必须在数据重跑、批次变化时仍保持有效。
#
# 5. 简而言之：logic = purpose，不写 facts。
meta:
  paper_title: "EphB1调控线粒体心磷脂含量减轻NLRP3炎症小体引发的焦亡"
  short_name: "EphB1_CL_pyroptosis"

main_question:
  one_sentence: >
    在 LPS 激活的小鼠腹腔巨噬细胞中，EphB1 是否通过调控线粒体心磷脂
    含量及其可结合池，改变线粒体–膜脂环境，从而限幅 NLRP3 炎症小体
    介导的 GSDMD 焦亡输出？
  background_gap: >
    系统性炎症和焦亡相关疾病负担持续攀升，临床真正需求是“在不削弱抗感染
    能力的前提下，对孔形成–裂解性外排环节做限幅”，但目前多数策略仍停留在
    抑制 NLRP3 激活而非精细调节输出。已有研究提示 GSDMD-NT 对带负电膜脂、
    尤其是线粒体心磷脂（CL）具有高亲和力，线粒体状态与 CL 动态被视为
    焦亡执行效率的关键阀门；然而，“质膜受体/外源信号 → CL 含量/重塑 →
    线粒体炎症平台 → GSDMD 成孔”这一链条的上游模块仍然几乎空白，尤其缺乏
    将 Eph 受体家族与 CL–焦亡轴直接相连的实验证据。
  central_claim: >
    本研究在巨噬细胞–线粒体–炎症小体轴上证明：EphB1 通过维持线粒体心磷脂
    含量及其可结合池，决定 GSDMD-NT 早期线粒体对接与孔功能，从而调节
    NLRP3 诱导焦亡和 IL-1β 释放的阈值。EphB1 缺失降低 CL 可及性，限制
    GSDMD-NT 线粒体结合并削弱裂解性外排；药理性抑制 CL 可结合池（BEL）
    在 IL-1β 释放上与 EphB1 缺失呈遮蔽关系，而上游 LYCAT 下调将 EphB1
    与 CL 生物合成直接连接，构成 “EphB1–LYCAT–CL–GSDMD–焦亡” 的可逆调控轴，
    将受体酪氨酸激酶信号与膜脂重塑–线粒体孔化置于同一因果序列之中。

hypotheses:
  - id: "H1"
    text: >
      EphB1 是维持线粒体心磷脂含量及可结合池的正向调控因子；
      EphB1 缺失将导致线粒体 CL 总量和 GSDMD 可及的 CL 池下降。

  - id: "H2"
    text: >
      EphB1 缺失主要通过改变线粒体 CL–膜脂环境，降低 GSDMD-NT 对线粒体的
      结合与成孔效率，从而在不影响 NLRP3 priming、ASC 斑点和 caspase-1
      激活的前提下，选择性减弱焦亡和 IL-1β 释放。

  - id: "H3"
    text: >
      药理性抑制线粒体 CL 可结合池（如 BEL 处理）可在功能上模拟 EphB1 缺失
      对 IL-1β 释放的效应，并与 EphB1 缺失呈同阶遮蔽关系，证明 EphB1 的
      主要作用通路是通过 CL 轴而非其他独立下游。

  - id: "H4"
    text: >
      EphB1 通过转录调控心磷脂再酰化酶 LYCAT，从而控制线粒体 CL 合成与
      可结合池大小；EphB1–LYCAT–CL 轴是连接受体激酶信号与焦亡执行效率的
      关键上游模块。

mechanistic_axes:
  - id: "AX1"
    name: "CL 含量与可结合池（EphB1–LYCAT–CL 轴）"
    summary: >
      描述 EphB1 及其下游 LYCAT 对线粒体心磷脂总量、脂肪酸谱和
      GSDMD 可及 CL 池的调控，是从受体信号到膜脂环境的代谢接口。

  - id: "AX2"
    name: "GSDMD–线粒体界面与成孔效率"
    summary: >
      聚焦 GSDMD-NT 在线粒体外膜上的富集、寡聚和成孔，强调其对
      线粒体 CL 与膜电性状态的依赖，是“执行层”物理阈值的体现。

  - id: "AX3"
    name: "NLRP3–GSDMD–IL-1β 焦亡输出"
    summary: >
      覆盖 NLRP3 priming、ASC 装配、caspase-1 裂解、GSDMD 成孔、
      IL-1β/IL-18 释放以及裂解性死亡等 readout，是临床相关炎症输出的综合表型。

sections:
  - id: "S1"
    title: "EphB1 缺失限幅 NLRP3 诱导的焦亡与 IL-1β 释放，但不影响上游激活"
    question: >
      EphB1 缺失在 NLRP3 炎症小体通路的“priming–装配–执行”各层级中，
      究竟改变了哪一环，是否表现为选择性降低焦亡输出？
    core_message: >
      在 LPS+NLRP3 激活条件下，EphB1 缺失显著降低巨噬细胞焦亡和 IL-1β 释放，
      但不影响 NF-κB 依赖 priming、ASC 斑点形成或 caspase-1 裂解，说明
      差异集中在 GSDMD 成孔/内容物外排这一末端执行层。
    figures: ["Figure 1", "Figure 2"]

  - id: "S2"
    title: "EphB1 缺失降低 GSDMD 的线粒体结合"
    question: >
      EphB1 缺失是否改变了 GSDMD 与线粒体的空间耦合，从而影响成孔效率？
    core_message: >
      通过亚细胞分离、线粒体富集及共定位分析，证明 EphB1 缺失显著降低
      GSDMD-NT 在线粒体上的富集与结合，提示 GSDMD–线粒体界面是 EphB1
      调控焦亡的直接执行接口。
    figures: ["Figure 3"]

  - id: "S3"
    title: "EphB1 缺失降低线粒体心磷脂含量及可结合池，并被 BEL 遮蔽"
    question: >
      EphB1 缺失是否改变线粒体 CL 含量及 GSDMD 可及的 CL 池，
      以及 CL 轴是否在功能上位于 EphB1 下游？
    core_message: >
      NAO 染色和 LC-MS 脂质组学显示 EphB1 缺失显著降低线粒体 CL 含量和
      可结合池；抑制 CL 再酰化/可结合池的 BEL 处理可在 WT 中下调 IL-1β 释放，
      且在 EphB1 缺失背景下不再叠加，呈现遗传学×药理的同阶遮蔽关系，
      支持 EphB1 主要通过 CL 轴限幅焦亡输出。
    figures: ["Figure 4", "Figure 5"]

  - id: "S4"
    title: "EphB1 下调 LYCAT 形成 EphB1–LYCAT–CL–焦亡调控轴"
    question: >
      EphB1 如何在转录/信号层面连接到 CL 合成与可结合池调控，是否存在
      可操作的上游“单一酶节点”？
    core_message: >
      通过转录组与 qPCR 证实 EphB1 缺失下调心磷脂再酰化酶 LYCAT 的表达，
      配合 CL 含量、GSDMD 结合与 IL-1β 释放数据，提出 EphB1–LYCAT–CL–焦亡
      这一纵向调控轴，为从受体激酶到膜脂阈值的因果链提供分子支点。
    figures: ["Figure 6"]

figures:
  - id: "Figure 1"
    title: "EphB1 缺失降低炎症小体诱导的巨噬细胞焦亡与 IL-1β 释放"
    section: "S1"
    role_in_story: "phenotype"
    one_sentence_purpose: >
      建立 EphB1 缺失在多种炎症小体激活条件下“焦亡输出被限幅”的功能表型，
      并排除广泛凋亡改变或分泌缺陷，为后续机制定位提供起点。
    key_message: >
      EphB1 缺失并不改变 staurosporine 诱导的经典凋亡敏感性，却在 NLRP3/NLRC4/AIM2 等
      炎症小体激活条件下稳定降低 LDH 外排和 IL-1β 释放，确立其作为炎症小体依赖性焦亡
      负向调节因子的功能表型。
    panels:
      - id: "1A_apoptosis_control"
        order: 1
        story_role: "specificity_control"
        micro_question: >
          在进入炎症小体相关实验之前，EphB1 缺失是否已经导致巨噬细胞对非炎性死亡
          （如经典凋亡）的广泛耐受或易感，从而干扰后续焦亡表型的解读？
        micro_answer: >
          Staurosporine 诱导的 cleaved caspase-3 在 WT 与 KO 巨噬细胞中水平相近，说明 EphB1
          缺失并未普遍改变经典凋亡通路的敏感性，为后续将差异归因于炎症小体依赖性焦亡
          提供了阴性对照。
        focuses_on_axes: []
        depends_on_panels: []

      - id: "1B_LDH_pyroptosis_multi_inflammasome"
        order: 2
        story_role: "pyroptosis_readout"
        micro_question: >
          在不同炎症小体感受器被激活的条件下，EphB1 缺失是否一致降低焦亡相关的膜裂解/
          LDH 外排，确立其在炎症小体依赖性细胞裂解中的功能表型？
        micro_answer: >
          在 NLRP3、NLRC4 与 AIM2 被激活时，KO 巨噬细胞的 LDH 外排在早晚两个时间窗口内均
          持续低于 WT，提示 EphB1 缺失在多条炎症小体通路下都压低焦亡强度，而非仅推迟裂解
          时间或只影响单一路径。
        focuses_on_axes: ["AX3"]
        depends_on_panels: ["1A_apoptosis_control"]

      - id: "1C_IL1b_release_and_pore_products"
        order: 3
        story_role: "cytokine_readout"
        micro_question: >
          EphB1 缺失导致的焦亡减弱，是否同时体现在 NLRP3 依赖的 IL-1β 释放和与之相关的
          GSDMD/caspase-1 裂解产物上，从而把细胞裂解与炎症输出联系起来？
        micro_answer: >
          在相同 LPS+Nigericin 条件下，KO 巨噬细胞上清中的 IL-1β 水平及与焦亡执行相关的
          GSDMD-NT、caspase-1 p20 条带均低于 WT，说明 EphB1 缺失不仅减弱膜裂解，还同步压低了
          依赖 GSDMD 孔形成的炎症因子外排，确立了“焦亡输出被限幅”的起点表型。
        focuses_on_axes: ["AX3"]
        depends_on_panels: ["1B_LDH_pyroptosis_multi_inflammasome"]

    supports_hypotheses: ["H2", "H3"]
    focuses_on_axes: ["AX3"]
    builds_on_figures: []
    leads_to_figures: ["Figure 2", "Figure 3"]

  - id: "Figure 2"
    title: "EphB1 缺失不影响 NLRP3 priming、ASC 装配和 caspase-1 激活，差异集中在执行层外排环节"
    section: "S1"
    role_in_story: "mechanism_core"
    one_sentence_purpose: >
      通过逐层排除经典分泌、转录性 priming、priming 蛋白丰度及 ASC 组装的差异，将 EphB1
      的作用定位在炎症小体第二信号之后、GSDMD 孔介导的内容物外排这一执行层。
    key_message: >
      EphB1 缺失不影响 LPS 诱导的 TNF-α/IL-6 经典分泌，也不削弱炎症小体相关基因的转录性
      priming、pro-IL-1β/NLRP3 的胞内丰度或 ASC 寡聚化；在相同刺激下，caspase-1 激活及其对
      GSDMD/IL-1β 的切割基本保留，但成熟片段的胞外释放受限，提示瓶颈位于 GSDMD 孔与膜裂解
      步骤，而非炎症小体的组装或酶活本身。
    panels:
      - id: "2A_classical_secretion_TNF_IL6"
        order: 1
        story_role: "negative_control_secretion"
        micro_question: >
          EphB1 缺失是否造成巨噬细胞对 LPS 诱导的经典分泌途径（TNF-α/IL-6）的普遍释放缺陷，
          从而混淆对 IL-1β 变化的解读？
        micro_answer: >
          在 LPS 单独刺激下，WT 与 KO 巨噬细胞释放的 TNF-α 和 IL-6 均随时间上升且幅度相近，
          提示 EphB1 缺失并未普遍削弱经典分泌途径，为后续将分泌差异特异性归因于炎症小体/
          焦亡相关释放提供了基础。
        focuses_on_axes: []
        depends_on_panels: []

      - id: "2B_priming_transcription"
        order: 2
        story_role: "priming_check_transcript"
        micro_question: >
          在 TLR4–NF-κB 介导的第一信号阶段，EphB1 缺失是否改变了炎症小体相关细胞因子和
          Nlrp3 本身的转录性 priming？
        micro_answer: >
          LPS 诱导下 TNF-α、IL-6、IL-1β 及 Nlrp3 mRNA 随时间上升，但 WT 与 KO 之间曲线基本
          重合，表明 EphB1 缺失未明显影响第一信号驱动的转录性 priming。
        focuses_on_axes: ["AX3"]
        depends_on_panels: ["2A_classical_secretion_TNF_IL6"]

      - id: "2C_priming_protein_levels"
        order: 3
        story_role: "priming_check_protein"
        micro_question: >
          在完成转录后，关键 priming 蛋白（pro-IL-1β、NLRP3）的胞内丰度是否受到 EphB1 缺失影响，
          从而在蛋白层面限制炎症小体装配？
        micro_answer: >
          LPS 预激 4 h 后，WT 与 KO 巨噬细胞中 pro-IL-1β 与 NLRP3 的胞内条带强度相当，说明在给定
          条件下，EphB1 缺失并未通过降低 priming 蛋白含量来削弱炎症小体组装能力。
        focuses_on_axes: ["AX3"]
        depends_on_panels: ["2B_priming_transcription"]

      - id: "2D_ASC_oligomerization"
        order: 4
        story_role: "assembly_check_ASC"
        micro_question: >
          在第二信号触发后，EphB1 缺失是否影响 ASC 的寡聚化和 speck 形成，从而在装配层面阻断
          炎症小体？
        micro_answer: >
          DSS 交联结合亚细胞分级显示，EphB1 缺失并未明显改变 ASC 高分子复合物与单体在可溶/
          不溶组分中的分布，提示炎症小体的装配步骤在 KO 中基本保留。
        focuses_on_axes: ["AX3"]
        depends_on_panels: ["2C_priming_protein_levels"]

      - id: "2E_caspase1_activation_and_cargo_release"
        order: 5
        story_role: "execution_bottleneck_mapping"
        micro_question: >
          在 ASC 平台完好组装的前提下，EphB1 缺失对 caspase-1 的激活及其底物 GSDMD/pro-IL-1β 的
          切割与胞外释放分别产生了怎样的影响，从而帮助定位差异所在的执行层级？
        micro_answer: >
          全细胞裂解物中 cleaved caspase-1 p20 以及 GSDMD/IL-1β 的切割指数在 WT 与 KO 之间相近，
          说明 caspase-1 激活及底物加工基本保留；但这些成熟片段在上清中的丰度在 KO 中明显降低，
          提示瓶颈主要位于 GSDMD 孔介导的跨膜外排/膜裂解阶段，而非 caspase-1 激活或底物切割
          本身。
        focuses_on_axes: ["AX3"]
        depends_on_panels: ["2D_ASC_oligomerization"]

    supports_hypotheses: ["H2"]
    focuses_on_axes: ["AX3"]
    builds_on_figures: ["Figure 1"]
    leads_to_figures: ["Figure 3"]

  - id: "Figure 3"
    title: "EphB1 缺失降低 GSDMD 的线粒体结合并减弱线粒体应激"
    section: "S2"
    role_in_story: "mechanism_core"
    one_sentence_purpose: >
      将 EphB1 的作用具体定位到 GSDMD–线粒体界面，检验焦亡执行瓶颈是否体现在 GSDMD-NT 对
      线粒体膜的结合及其引发的线粒体损伤与 mtDNA 释放上。
    key_message: >
      EphB1 缺失并不削弱 GSDMD 的剪切，但显著降低炎症小体激活早期 GSDMD-NT 在线粒体分级中的
      富集，并伴随 ROS、ΔΨm 与胞质 mtDNA 脉冲释放的减弱，说明“线粒体阶段”的 GSDMD 孔形成与
      损伤被限幅，为后续聚焦线粒体膜脂环境提供依据。
    panels:
      - id: "3A_mito_GSDMD_NT_enrichment"
        order: 1
        story_role: "mitochondrial_binding_readout"
        micro_question: >
          在炎症小体激活早期，EphB1 缺失是否削弱 GSDMD-NT 对线粒体的快速富集，从而在
          “GSDMD–线粒体界面”层面解释执行瓶颈？
        micro_answer: >
          时间梯度的线粒体分级 Western blot 显示，Nigericin 刺激后 GSDMD-NT 在 WT 线粒体组分中
          短时间内出现明显峰值，而在 KO 中该线粒体富集峰显著减弱；与此同时，总裂解物中的
          GSDMD 裂解程度相近，说明差异主要来自膜结合/定位，而非剪切不足。
        focuses_on_axes: ["AX2"]
        depends_on_panels: []

      - id: "3B_ROS_and_membrane_potential_dynamics"
        order: 2
        story_role: "mitochondrial_stress_readout"
        micro_question: >
          EphB1 缺失导致的 GSDMD-NT 线粒体富集减少，是否伴随炎症小体激活过程中更轻的线粒体损伤
          与 ROS 应激？
        micro_answer: >
          H2DCFDA/MitoSOX/TMRM 动力学检测表明，在相同 NLRP3 激活条件下，KO 细胞质 ROS 上升较缓、
          ΔΨm 更为稳定，而经膜电位校正后的线粒体 ROS 指标与 WT 接近，整体模式与“线粒体孔形成
          减少 → ROS 外泄减弱”的解释相符。
        focuses_on_axes: ["AX2", "AX3"]
        depends_on_panels: ["3A_mito_GSDMD_NT_enrichment"]

      - id: "3C_cytosolic_mtDNA_pulse"
        order: 3
        story_role: "mitochondrial_damage_readout"
        micro_question: >
          在线粒体损伤更直接的 readout——胞质 mtDNA 脉冲释放——上，EphB1 缺失是否同样表现为损伤减弱，
          从而进一步支持“线粒体阶段被限幅”的模型？
        micro_answer: >
          分离胞质与线粒体组分后定量 mtDNA 显示，炎症小体激活早期 WT 细胞胞质 mtDNA 迅速出现一过性峰值，
          而在 KO 中该脉冲明显减弱；与此同时，全细胞 mtDNA 总量在两组间相当，说明差异源自线粒体向胞质的
          外泄过程，而非 mtDNA 储量改变。
        focuses_on_axes: ["AX2", "AX3"]
        depends_on_panels: ["3B_ROS_and_membrane_potential_dynamics"]

    supports_hypotheses: ["H2"]
    focuses_on_axes: ["AX2", "AX3"]
    builds_on_figures: ["Figure 1", "Figure 2"]
    leads_to_figures: ["Figure 4"]

  - id: "Figure 4"
    title: "EphB1 缺失降低线粒体心磷脂含量及可结合池"
    section: "S3"
    role_in_story: "mechanism_core"
    one_sentence_purpose: >
      证明 EphB1 缺失确实改变了线粒体心磷脂总量和 NAO 可染/可及的 CL 池，并排除线粒体数量或
      ΔΨm 变化作为主因，为“CL–线粒体界面决定 GSDMD 成孔效率”的模型提供膜脂基础。
    key_message: >
      在基线条件下，EphB1 缺失并未引起线粒体数量或膜电位的巨大改变，但 NAO 标记的心磷脂池和
      脂质组学测得的 CL 总量均下调，并伴有分子种组成重排，说明 EphB1 通过调控线粒体 CL 含量及
      其可结合池，为 GSDMD–线粒体界面提供关键膜脂环境。
    panels:
      - id: "4A_mito_potential_and_mass_baseline"
        order: 1
        story_role: "baseline_mito_state"
        micro_question: >
          在未激活炎症小体时，EphB1 缺失是否导致线粒体膜电位或数量发生明显改变，从而成为后续
          CL 读数的主要驱动因素？
        micro_answer: >
          TMRM 动力学与线粒体标志基因（如 HK2、16S）qPCR 显示，WT 与 KO 巨噬细胞的 ΔΨm 和线粒体
          数量整体处于相近水平，排除了“线粒体大规模丢失或严重去极化”作为心磷脂信号差异主因的
          可能，为后续将 NAO 变化归因于 CL 本身奠定了背景。
        focuses_on_axes: ["AX1"]
        depends_on_panels: []

      - id: "4B_NAO_CL_pool"
        order: 2
        story_role: "CL_pool_readout"
        micro_question: >
          在控制线粒体膜电位与数量后，EphB1 缺失是否仍然表现为 NAO 可染心磷脂池的下降，从而提示
          CL 可及性/质量的改变？
        micro_answer: >
          在统一细胞当量和 ΔΨm 校正的前提下，显微与板读的 NAO 信号在 KO 巨噬细胞中均低于 WT，且随
          时间维持稳定差异，说明在给定条件下可被 NAO 进入并形成复合的 CL 池容量减少，为解释
          GSDMD-NT 线粒体结合减少提供了膜脂学线索。
        focuses_on_axes: ["AX1", "AX2"]
        depends_on_panels: ["4A_mito_potential_and_mass_baseline"]

      - id: "4C_CL_lipidomics_total_and_composition"
        order: 3
        story_role: "CL_total_and_composition"
        micro_question: >
          非靶向脂质组学层面，EphB1 缺失是否确实导致 CL 总量下降并伴随分子种组成重排，从而支持
          NAO 信号差异反映的是 CL 池本身而非技术伪影？
        micro_answer: >
          定量脂质组学显示，KO 巨噬细胞的总 CL 含量整体低于 WT，大部分丰度较高的 CL 物种呈下降
          趋势，尤其是富含 18:2 的经典线粒体 CL；仅少数长链/高不饱和物种轻度上升，对总量贡献有限。
          该模式与 NAO 可染 CL 池减少相吻合，强化了“EphB1 缺失降低线粒体 CL 含量及可结合池”的
          结论。
        focuses_on_axes: ["AX1"]
        depends_on_panels: ["4B_NAO_CL_pool"]

    supports_hypotheses: ["H1", "H2"]
    focuses_on_axes: ["AX1", "AX2"]
    builds_on_figures: ["Figure 3"]
    leads_to_figures: ["Figure 5", "Figure 6"]

  - id: "Figure 5"
    title: "BEL 抑制 CL 可结合池并在 IL-1β 释放上遮蔽 EphB1 缺失效应"
    section: "S3"
    role_in_story: "validation"
    one_sentence_purpose: >
      通过 iPLA₂ 抑制剂 BEL 在脂质与功能两个层面模拟“CL 可结合池下降”，检验 EphB1 的抗焦亡效应
      是否主要通过 CL 轴实现，并利用遗传×药理遮蔽关系定位其作用阶层。
    key_message: >
      BEL 处理在 WT 巨噬细胞中降低 NAO 可染 CL 池并剂量/时间依赖地下调 IL-1β 释放，而在 EphB1 缺失
      背景下同样处理带来的额外抑制明显减弱，构成典型的遮蔽关系，提示 EphB1 与 iPLA₂–CL 可结合池
      位于同一功能阶层，EphB1 的主要作用通路是通过 CL 轴限幅 GSDMD 孔介导的炎症输出。
    panels:
      - id: "5A_BEL_effect_on_NAO_CL_pool"
        order: 1
        story_role: "pharmacologic_CL_manipulation"
        micro_question: >
          通过药理抑制 iPLA₂–介导的 CL 去酰基/重塑，是否可以在人为条件下降低 NAO 可染 CL 池，并部分
          重现 EphB1 缺失的 CL 表型？
        micro_answer: >
          BEL 预处理显著降低 WT 巨噬细胞的 NAO 染色强度，并使 WT 与 KO 之间原本存在的 NAO 差异被抹平，
          说明 iPLA₂ 依赖的 CL 重塑步骤确实决定了“可达/可复合” CL 池的大小，同时也提示这一可结合池的
          下降是 EphB1 缺失的关键特征之一。
        focuses_on_axes: ["AX1", "AX2"]
        depends_on_panels: ["4B_NAO_CL_pool"]

      - id: "5B_BEL_effect_on_IL1b_and_masking"
        order: 2
        story_role: "genetic_pharmacologic_epistasis"
        micro_question: >
          在功能 readout 上，BEL 诱导的 CL 可及性下降是否足以下调 IL-1β 释放，并与 EphB1 缺失形成遮蔽
          关系，从而将 EphB1 作用路径定位到 CL 轴？
        micro_answer: >
          在 WT 巨噬细胞中，BEL 以剂量与处理时间依赖方式降低 NLRP3 诱导的 IL-1β 释放，而在 EphB1 缺失
          背景下同样处理带来的额外抑制明显减弱，且细胞活力未受显著影响；这种 genotype×dose 的遮蔽模式
          表明，EphB1 的主要作用环节与 iPLA₂–CL 可结合池位于同一功能阶层，支持“EphB1 → CL 可及性 →
          GSDMD 孔/外排 → IL-1β 释放”的因果链条。
        focuses_on_axes: ["AX1", "AX3"]
        depends_on_panels: ["5A_BEL_effect_on_NAO_CL_pool"]

    supports_hypotheses: ["H1", "H3"]
    focuses_on_axes: ["AX1", "AX3"]
    builds_on_figures: ["Figure 4"]
    leads_to_figures: ["Figure 6"]

  - id: "Figure 6"
    title: "CL 机制轴定义与多组学整合：从概念模型到跨轴综合评估"
    section: "S4"   # 若你之后重新划分章节，可再改
    role_in_story: "mechanism_framework"

    one_sentence_purpose: >
      以线粒体心磷脂（CL）相关机制轴为坐标系，
      从概念图、指标表、数据处理流程到轴级效应矩阵、跨组学综合得分及 CL 表型关联，
      系统回答 “EphB1 缺失是否通过某一条主导 CL 机制轴起作用，还是表现为多轴分布式调节”。

    key_message: >
      Figure 6 先在概念上将 CL 代谢拆分为若干机制轴，并用表格明确每条轴包含的基因与脂质指标及其方向定
      （6A–6B），展示通过多批次 RNA-seq、脂质组和靶向CL panel 的统一 pipeline，将原始数据压缩为轴级 Z
      分数（6C），随后展示 EphB1 缺失在不同组学、不同批次中的轴级z分数矩阵，通过人工观察批次间、组学间
      一致性，进行方向一致性分析，寻找在所有批次、所有轴上都一致性改变的轴（6D），之后，每个 omics、每个
      批次先算轴级 Z，再做 Stouffer meta，判断“EphB1 缺失导致 CL 代谢呈现多轴/单轴失衡，其中以 X 轴的改变
      最为集中且多组学一致。”（6E），完成相关性分析后，进行因果分析。对轴机制分数和CL panel表型值在批次间
      进行回归分析，筛选出与CL含量最相关的轴（6F）。

    panels:
      - id: "6A"
        order: 1
        story_role: "concept_model"
        micro_question: >
          如何在概念层面把复杂的 CL 相关代谢与膜环境拆分为若干可被定量评估的机制轴，
          作为后续多组学分析的坐标系？
        micro_answer: >
          通过一张 ER–线粒体界面的概念图，将心磷脂代谢和相关膜环境拆分为若干功能轴
          （如合成、重塑、转运、供给、氧化、membrane context），在图中标出关键结构
          （线粒体、ER、CL）及各轴的作用方向，为后续轴级 Z 分数与基因/脂质指标的解读
          提供统一的机制框架。
        focuses_on_axes: ["AX1", "AX2", "AX3"]
        depends_on_panels: []

      - id: "6B"
        order: 2
        story_role: "axis_definition_table"
        micro_question: >
          在上述机制轴框架下，每条轴具体由哪些基因和脂质指标构成，这些指标的方向
          （bottleneck_sign）和权重是如何被系统定义的？
        micro_answer: >
          以表格形式系统整理六条 CL 机制轴（supply / transport / synthesis /
          remodeling / oxidation / membrane_context）的关键基因与脂质 readout，给出每个
          feature 的生物学含义、公式、对 CL 的作用(s6a)、bottleneck_sign（+1/−1）和轴内
          权重，并说明通过分层（Tier-1/2/3）与统一排除规则保证轴特异性，同时提高
          轴级 Z-score 的稳定性，为 Fig6C–6F 的轴级分析提供可追溯的定义基础。
        focuses_on_axes: ["AX1", "AX2", "AX3"]
        depends_on_panels: ["6A"]
        supplementary_files: ["supplementary_figure6A"]

      - id: "6C"
        order: 3
        story_role: "methods_pipeline"
        micro_question: >
          多批次的 RNA-seq、非靶向脂质组和靶向 CL panel 原始数据，是如何被处理、
          归一化并投影到这些机制轴和 CL 指标上的？
        micro_answer: >
          通过一张流程型示意图，把 RNA-seq（3 批次）、脂质组（3 批次）与靶向 CL panel
          各自的 QC、对齐/峰表处理、批内归一化（如 PQN）、必要的批间校正，以及从
          基因/脂质特征到机制轴 Z、从 CL 物种到 CL/PG、MLCL/CL、oxCL/CL 等指标的计算
          路径串联起来，最终收束到 “axis-level scores + CL indicators” 的统一输出节点，
          作为后续多组学整合与机制分析的输入。
        focuses_on_axes: ["AX1"]
        depends_on_panels: ["6A", "6B"]

      - id: "6D"
        order: 4
        story_role: "cross_omics_consistency"
        micro_question: >
          在每个 batch 内分别计算 RNA 与脂质层面的机制轴效应后，EphB1 缺失在这些轴上
          的方向是否在不同组学、不同批次之间保持一致，从而指向潜在的主导轴？
        micro_answer: >
          以 axis×batch×omics 的热图展示六条机制轴的 effect_z，肉眼观察各轴在多批次、
          多组学中的方向与效应大小，突出那些在不同批次与组学间方向一致、效应稳定的轴，
          同时区分仅在单一层面波动的次要轴，为后续 Stouffer 合并和主导轴筛选提供直观线索。
        focuses_on_axes: ["AX1", "AX2"]
        depends_on_panels: ["6C"]

      - id: "6E"
        order: 5
        story_role: "multiomics_meta_summary"
        micro_question: >
          将各批次、各组学的轴级 Z 分数通过 Stouffer 等权合并后，EphB1 缺失是否在某一条
          机制轴上形成统计学上显著的综合异常，还是呈现多轴温和偏移、缺乏单一主导瓶颈？
        micro_answer: >
          条形图给出六条机制轴跨 RNA 与脂质组、多批次整合后的 Z_multiomics_overall 及
          p_multiomics_overall，显示所有轴的综合效应均为 |Z|<2 且 p>0.05，其中 Transport、
          Membrane context、Oxidation 等轴略偏正向，Synthesis 轴略偏负，Supply 接近 0，
          但均未达到显著。结合单一组学 meta 结果（如 membrane context 轴在脂质组 Z_lipid
          ≈ +2.8、在 RNA 中为负），结果支持 “多轴分布式、温和偏移” 而非 “单一极端瓶颈”
          的图景。  [oai_citation:4‡figure_6_e.yaml](sediment://file_000000002b6071fda27d22c0cd91abae)
        focuses_on_axes: ["AX1", "AX2", "AX3"]
        depends_on_panels: ["6D"]

      - id: "6F"
        order: 6
        story_role: "phenotype_link"
        micro_question: >
          这些机制轴的 combined Z 分数在跨批次层面，能在多大程度上预测靶向 CL panel
          中的关键 CL 表型 readout（如 CL_fraction、mito_lipid_mass、MLCL_CL_ratio 等）？
        micro_answer: >
          以批次为单位，将各机制轴的 combined Z 与 CL panel 中预先挑选的 CL 指标
          HO–WT 差值做线性回归：membrane context 轴下 CL_fraction 与轴效应呈强负相关、
          mito_lipid_mass 与轴效应呈中度正相关；transport 轴下 PA_CL_mismatch 与
          PA_PG_mismatch 与轴 Z 呈较强正相关；其他轴与其对应 CL readout 的相关性较弱、
          方向不稳定且 p 值大多 >0.3。整体上，机制轴 Z 与 CL 表型之间存在方向合理但功效有限的
          趋势性关联，表明轴级评分具有一定解释力，但并非决定性预测因子。
        focuses_on_axes: ["AX1"]
        depends_on_panels: ["6C", "6E"]

    supports_hypotheses: ["H1", "H2"]
    focuses_on_axes: ["AX1", "AX2", "AX3"]
    builds_on_figures: ["Figure 3", "Figure 4", "Figure 5"]
    leads_to_figures: []

