claims:
- id: c_fig1
  figure: 1
  type: phenotype
  title: Fig1 phenotype
  weakest_evidence_level: necessity
  text_zh_draft: EphB1 basal state 会影响（调控）IL-1β release（现象层结论，需对应图中证据）。
  text_en_draft: These data support that EphB1 basal state positively regulate IL-1β release.
  supported_by_edges:
  - e1
  - e3
  edge_summary_zh:
  - 'e1: EphB1 basal state 促进 IL-1β release（必要性）'
  - 'e3: EphB1 basal state 促进 Pyroptosis（必要性）'
  edge_summary_en:
  - 'e1: EphB1 basal state positively regulate IL-1β release (evidence: necessity)'
  - 'e3: EphB1 basal state positively regulate Pyroptosis (evidence: necessity)'
- id: c_fig2
  figure: 2
  type: positioning
  title: Fig2 positioning
  weakest_evidence_level: positioning
  text_zh_draft: EphB1 basal state 的作用可被定位在 Inflammasome receptor downstream pathway 相关层级（定位性结论：强调排除与定位，而非完整机制）。
  text_en_draft: These data support the positioning that EphB1 basal state acts at the level of Inflammasome receptor downstream
    pathway (positioning; emphasizes exclusion/localization rather than full mechanism).
  supported_by_edges:
  - e2
  - e4
  edge_summary_zh:
  - 'e2: EphB1 basal state 促进 Inflammasome receptor downstream pathway（必要性）'
  - 'e4: EphB1 basal state 促进 Caspase-1 cleavage downstream pathway（定位）'
  edge_summary_en:
  - 'e2: EphB1 basal state positively regulate Inflammasome receptor downstream pathway (evidence: necessity)'
  - 'e4: EphB1 basal state positively regulate Caspase-1 cleavage downstream pathway (evidence: positioning)'
- id: c_fig3
  figure: 3
  type: mechanism_discovery
  title: Fig3 mechanism_discovery
  weakest_evidence_level: necessity
  text_zh_draft: EphB1 basal state 与 Mitochondrial rupture 的机制关联可通过该组证据被支持（机制发现：指出关键过程）。
  text_en_draft: These data support that EphB1 basal state positively regulate Mitochondrial rupture.
  supported_by_edges:
  - e5
  - e6
  edge_summary_zh:
  - 'e5: EphB1 basal state 促进 Mitochondrial rupture（必要性）'
  - 'e6: EphB1 basal state 促进 GSDMD recruitment to mitochondria（必要性）'
  edge_summary_en:
  - 'e5: EphB1 basal state positively regulate Mitochondrial rupture (evidence: necessity)'
  - 'e6: EphB1 basal state positively regulate GSDMD recruitment to mitochondria (evidence: necessity)'
- id: c_fig4
