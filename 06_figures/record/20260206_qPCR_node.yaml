    multiple_comparisons: "Per-gene comparison between treatments"

  significance:
    symbols: "ns, not significant; *, P < 0.05; **, P < 0.01; ***, P < 0.001"

  extra_notes: "Genes shown include rerouting/turnover nodes (Dgat2, Mgll, Lipe) and flux-limitation nodes (Acaca, Cept1, Etnk1)."
