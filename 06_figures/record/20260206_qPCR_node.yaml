# ============================================================
# schema.yaml v3  ——  单个 panel 的结构化写作模版（与 figure_1_d_v2.yaml 对齐）
# 目标：让 AI 在几乎不需要补充信息的前提下，生成：
#   - 结果段（Results）
#   - 简短讨论/过渡段（Mini Discussion / Transition）
#   - Methods 中本实验的“差异性信息”
# ============================================================

meta:
  figure: "Figure X"
  figure_id: "Xx"
  experiment_id: "RUN01_A_RNA_qPCR_PI3K_capacity_and_flux_turnover"
  short_title: "在基线条件下用 qPCR 复现 PI3K capacity/AKT(FOXO footprint)/flux-turnover 关键转录轴（WT vs EphB1_KO）"
  chapter: "Node validation: A/B/C transcriptional axes"
  version: 2026-02-09

question:
  context_from_previous: "前述组学分析提示 EphB1 缺失可能伴随 PI3K capacity 下调、AKT 输出改变的转录足迹以及脂质 flux/turnover 轴的方向性重塑，但需要在独立样本中验证其可复现性。"
  core_question: "在无额外刺激与无药理干预的纯基线条件下，WT 与 EphB1_KO 的 PI3K capacity（A）、AKT 输出足迹（FOXO targets，B）以及 flux/turnover 关键节点（C）是否能用 qPCR 在独立样本中复现组学方向？"
  hypothesis_or_expectation: "预期 EphB1_KO 在 PI3K capacity gene set 上呈总体下调方向，同时出现 FOXO 靶基因上调等 AKT 输出降低的转录足迹，并伴随 flux/turnover 轴呈“合成受限 + 周转增强”的方向性变化。"
  importance_reason: "该分支提供 A/B/C 关键节点的低成本、可重复的独立验证，为后续 link 实验（B→C、D→E）提供可靠的起点与方向锚点。"

rationale:
  model_and_system: "采用原代小鼠腹腔巨噬细胞（WT 与 EphB1_KO），因为组学差异与后续功能 readout（如 NAO）均建立在同一细胞系统上，便于把转录节点验证无缝嵌入主线机制链条。"
  key_variables: "关键变量为基因型（WT vs EphB1_KO）对三类转录 readouts 的影响：PI3K capacity gene set、FOXO targets（AKT 输出足迹）与 flux/turnover 关键节点；本分支不引入刺激或抑制剂以避免额外混杂。"
  control_logic: "同一 run 同时包含 WT 与 KO（同日分离、同板培养）以控制批次/培养差异；保持基线无处理使观察到的差异更可归因于基因型本身，从而对组学方向做最直接的复现检验。"
  core_justification: "以“最少干预”的基线 qPCR 在同一生物系统中独立复现 A/B/C 方向，为后续因果 link 实验提供可信的节点级证据与方向约束。"

methods:
  inherits_from_protocol: "protocols.RNA_TRIzol_v1 + protocols.cDNA_RT_v1 + protocols.qPCR_SYBR_v1 + protocols.qPCR_DCt_DDct_Zscore_v1"
  biological_material: "原代小鼠腹腔巨噬细胞；基因型包含 WT 与 EphB1_KO（同日分离、同板培养以降低批次效应）。"
  experimental_groups: "WT（baseline, no extra treatment）vs EphB1_KO（baseline, no extra treatment）；每组为独立生物学样本。"
  stimuli_and_treatment: "无额外刺激/无生长因子脉冲/无抑制剂处理；保持纯基线培养条件。"
  time_points: "单一基线采样时间点（按分离后既定培养时间收样；本 panel 不做时间梯度）。"
  dose_info: "不适用（本分支不引入药物/刺激）。"
  readout_and_assay: "qPCR：PI3K capacity panel、FOXO targets panel（作为 AKT 输出降低/解除抑制的转录足迹）、flux/turnover panel 的关键节点；ΔCt/ΔΔCt 相对定量。"
  replicates: "生物学重复 n = （按你实际完成填写）；若跨多次独立分离合并，注明批次数与合并规则。"
  analysis_notes: "按预设分析流程进行 ΔCt→ΔΔCt 计算，并在基因层面可进行稳健离群值处理（如 IQR/robust z-score，若你在通用 pipeline 中启用）；输出既可逐基因比较，也可对 gene set 进行方向性汇总（用于对照组学方向）。"
  minimal_methods_summary: "WT 与 EphB1_KO 原代腹腔巨噬细胞在无额外处理的基线条件下收集 RNA，经 TRIzol 提取、逆转录并用 SYBR qPCR 检测 PI3K capacity、FOXO targets 与 flux/turnover 关键基因；按 ΔCt/ΔΔCt 相对定量比较 WT 与 KO 的方向性差异以复现组学结论。"

# ---------- 4. Results：把图变成结构化文字 ----------
results:
  data_direction: "在 WT 原代巨噬细胞中，PI3K 抑制剂处理后，rerouting/turnover 相关基因中 Mgll 与 Lipe 显著上调，而 Dgat2 在两组间为 ns；在 flux limitation 相关基因中，Cept1 与 Etnk1 显著上调，而 Acaca 在两组间为 ns。"
  stats_summary: "显著性标注显示：Mgll（**）、Lipe（**）、Cept1（***）与 Etnk1（*）在对照与 PI3K 抑制组之间存在显著差异；Dgat2 与 Acaca 为 ns。"
  key_numbers: "大致幅度：PI3K 抑制后 Mgll 约升至 ~1.2 fold，Lipe 约升至 ~1.4 fold，Cept1 约升至 ~1.25 fold，Etnk1 约升至 ~1.15–1.2 fold；Dgat2 与 Acaca 的变化幅度较小（具体数值见源数据）。"
  group_difference_statement: >
    在 WT 背景下，单纯降低 PI3K 输出即可诱导多项 rerouting/turnover 节点（Mgll、Lipe）以及部分 flux limitation 节点（Cept1、Etnk1）的转录上调，而并非所有脂质合成入口节点均发生改变（Dgat2、Acaca 为 ns），提示该响应呈现为“选择性节点重调节”而非全轴性一致变化。
    rerouting/turnover 节点均体现为上调，说明PI3K通路活化同时增加了TG的周转与磷脂的合成，这与HO脂质组中的TG增加、磷脂减少的表型不符，说明该抑制剂Copanlisib 不能有效模拟HO的PI3K信号通路状态，需要寻找更合适的抑制剂，重新设计实验
  robustness_and_qc: "各基因在组内的重复点分布集中；出现显著差异的节点（Mgll、Lipe、Cept1、Etnk1）在两组间分布分离清晰，而 Dgat2 与 Acaca 在两组间高度重叠，支持结果的稳健性。"
  anomalies_or_limits: "Dgat2 与 Acaca 未随 PI3K 抑制出现显著变化，提示并非所有脂质合成入口或 rerouting 节点都对 PI3K 输出下降敏感；该转录响应可能更偏向周转/分支重分配层面的调节。"
# ---------- 5. Interpretation & Role in Chapter：怎么理解 + 在整章中的作用 ----------
interpretation:
  minimal_bio_interpretation: "本 panel 作为 B→C 的 link-level 验证，检验“降低 PI3K 输出”是否足以驱动脂质代谢相关转录网络的重排。结果显示，在 WT 细胞中，PI3K 抑制可显著上调 Mgll、Lipe、Cept1 与 Etnk1，而 Dgat2 与 Acaca 保持稳定，说明Copanlisib导致的通路输出下降并非引发HO相同的PI3K信号轴扰动，而是导致磷脂与TG的全局合成增加。"
  alternative_explanations: >
    由于该实验为急性药理抑制，观察到的转录变化可能同时反映直接通路效应与继发适应性反应；
    且转录层面的变化未必等同于蛋白水平或真实代谢通量的改变；
    不同细胞状态对 PI3K 输出变化的敏感性差异，也可能来自并行调控通路或代谢补偿机制。
  summary_type: "link_validation"
  claim_supported: "因此，本实验在功能上支持“PI3K 输出下降足以驱动脂质代谢转录网络发生系统性响应”，但不能为EphB1缺失导致的PI3K信号降低与磷脂-TG周转变化建立因果连接提供直接证据。"
  link_to_previous: "该结果与前一分支中 EphB1 缺失背景下观察到的‘节点选择性改变’在结构上相呼应，但方向不完全对称，提示遗传缺失与急性通路抑制在网络层面的重编程方式可能不同。"
  transition_to_next: "基于该 link-level 证据，下一步将重新设计实验，更精确地模仿HO的PI3K抑制状态。"
# ---------- 6. figure_legend ----------

figure_legend:
  panel: "Figure X"
  panel_title_en: "PI3K inhibition reshapes transcription of lipid rerouting/turnover and flux-limitation nodes in WT macrophages"
  panel_title_cn: "在 WT 巨噬细胞中，PI3K 抑制剂重塑脂质 rerouting/turnover 与 flux-limitation 相关转录节点"

  one_sentence_en: "WT primary macrophages were treated with a PI3K inhibitor or vehicle, and mRNA levels of selected lipid rerouting/turnover and flux-limitation genes were quantified by qPCR."

  system_and_design:
    model: "Primary mouse peritoneal macrophages"
    genotype_or_groups: "WT cells treated with vehicle (control) or PI3K inhibitor"
    key_treatments: "PI3K inhibitor versus vehicle control"
