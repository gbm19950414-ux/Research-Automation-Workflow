  stats:
    n_definition: "Each dot represents one biological replicate"
    n: "n as indicated in the source data"
    summary: "Data are shown as box plots with individual data points overlaid"
    test: "Statistical tests as specified in the analysis pipeline"
    multiple_comparisons: "Between-genotype comparisons for each gene"

  significance:
    symbols: "ns, not significant; *, P < 0.05; **, P < 0.01; ***, P < 0.001"

  extra_notes: "Genes are grouped to represent lipid synthesis/entry (e.g., Acaca, Cept1), lipid turnover/redirecting (e.g., Dgat2, Mgll, Lipe), PI3K capacity (e.g., Inpp4b, Rps6kb2, Pik3ip1), and AKT/FOXO footprint (e.g., Myc, Pes1, Scd1, Mvd, Bnip3, Trib3)."
