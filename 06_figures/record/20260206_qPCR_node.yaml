# ============================================================
# schema.yaml v3  ——  单个 panel 的结构化写作模版（与 figure_1_d_v2.yaml 对齐）
# 目标：让 AI 在几乎不需要补充信息的前提下，生成：
#   - 结果段（Results）
#   - 简短讨论/过渡段（Mini Discussion / Transition）
#   - Methods 中本实验的“差异性信息”
# ============================================================

meta:
  figure: "Figure X"
  figure_id: "Xx"
  experiment_id: "RUN01_A_RNA_qPCR_PI3K_capacity_and_flux_turnover"
  short_title: "在基线条件下用 qPCR 复现 PI3K capacity/AKT(FOXO footprint)/flux-turnover 关键转录轴（WT vs EphB1_KO）"
  chapter: "Node validation: A/B/C transcriptional axes"
  version: 2026-02-09

question:
  context_from_previous: "前述组学分析提示 EphB1 缺失可能伴随 PI3K capacity 下调、AKT 输出改变的转录足迹以及脂质 flux/turnover 轴的方向性重塑，但需要在独立样本中验证其可复现性。"
  core_question: "在无额外刺激与无药理干预的纯基线条件下，WT 与 EphB1_KO 的 PI3K capacity（A）、AKT 输出足迹（FOXO targets，B）以及 flux/turnover 关键节点（C）是否能用 qPCR 在独立样本中复现组学方向？"
  hypothesis_or_expectation: "预期 EphB1_KO 在 PI3K capacity gene set 上呈总体下调方向，同时出现 FOXO 靶基因上调等 AKT 输出降低的转录足迹，并伴随 flux/turnover 轴呈“合成受限 + 周转增强”的方向性变化。"
  importance_reason: "该分支提供 A/B/C 关键节点的低成本、可重复的独立验证，为后续 link 实验（B→C、D→E）提供可靠的起点与方向锚点。"

rationale:
  model_and_system: "采用原代小鼠腹腔巨噬细胞（WT 与 EphB1_KO），因为组学差异与后续功能 readout（如 NAO）均建立在同一细胞系统上，便于把转录节点验证无缝嵌入主线机制链条。"
  key_variables: "关键变量为基因型（WT vs EphB1_KO）对三类转录 readouts 的影响：PI3K capacity gene set、FOXO targets（AKT 输出足迹）与 flux/turnover 关键节点；本分支不引入刺激或抑制剂以避免额外混杂。"
  control_logic: "同一 run 同时包含 WT 与 KO（同日分离、同板培养）以控制批次/培养差异；保持基线无处理使观察到的差异更可归因于基因型本身，从而对组学方向做最直接的复现检验。"
  core_justification: "以“最少干预”的基线 qPCR 在同一生物系统中独立复现 A/B/C 方向，为后续因果 link 实验提供可信的节点级证据与方向约束。"

methods:
  inherits_from_protocol: "protocols.RNA_TRIzol_v1 + protocols.cDNA_RT_v1 + protocols.qPCR_SYBR_v1 + protocols.qPCR_DCt_DDct_Zscore_v1"
  biological_material: "原代小鼠腹腔巨噬细胞；基因型包含 WT 与 EphB1_KO（同日分离、同板培养以降低批次效应）。"
  experimental_groups: "WT（baseline, no extra treatment）vs EphB1_KO（baseline, no extra treatment）；每组为独立生物学样本。"
  stimuli_and_treatment: "无额外刺激/无生长因子脉冲/无抑制剂处理；保持纯基线培养条件。"
  time_points: "单一基线采样时间点（按分离后既定培养时间收样；本 panel 不做时间梯度）。"
  dose_info: "不适用（本分支不引入药物/刺激）。"
  readout_and_assay: "qPCR：PI3K capacity panel、FOXO targets panel（作为 AKT 输出降低/解除抑制的转录足迹）、flux/turnover panel 的关键节点；ΔCt/ΔΔCt 相对定量。"
  replicates: "生物学重复 n = （按你实际完成填写）；若跨多次独立分离合并，注明批次数与合并规则。"
  analysis_notes: "按预设分析流程进行 ΔCt→ΔΔCt 计算，并在基因层面可进行稳健离群值处理（如 IQR/robust z-score，若你在通用 pipeline 中启用）；输出既可逐基因比较，也可对 gene set 进行方向性汇总（用于对照组学方向）。"
  minimal_methods_summary: "WT 与 EphB1_KO 原代腹腔巨噬细胞在无额外处理的基线条件下收集 RNA，经 TRIzol 提取、逆转录并用 SYBR qPCR 检测 PI3K capacity、FOXO targets 与 flux/turnover 关键基因；按 ΔCt/ΔΔCt 相对定量比较 WT 与 KO 的方向性差异以复现组学结论。"

# ---------- 4. Results：把图变成结构化文字 ----------
results:
  data_direction: "在基线条件下，rerouting to TG 相关基因中，Dgat2 与 Mgll 在 HO 中显著下调，而 Lipe 在两组间无显著差异；AKT/FOXO footprint 相关基因中，Myc、Pes1、Scd1、Mvd 与 Bnip3 在 WT 与 HO 间均为 ns，而 Trib3 在 HO 中显著下调；PI3K capacity 节点中，Inpp4b 与 Pik3ip1 在两组间为 ns，而 Rps6kb2 在 HO 中显著下调；flux limitation 相关基因中，Acaca 与 Cept1 在两组间均为 ns，而 Etnk1 在 HO 中呈下降趋势但未达到统计学显著。"
  stats_summary: "显著性标注显示：Dgat2（**）与 Mgll（*）在 WT 与 HO 间存在显著差异，Trib3（*）与 Rps6kb2（*）在 WT 与 HO 间存在显著差异；Lipe、Myc、Pes1、Scd1、Mvd、Bnip3、Inpp4b、Pik3ip1、Acaca 与 Cept1 为 ns，Etnk1 未达到显著性阈值。"
  key_numbers: "大致幅度：HO 中 Dgat2 约降至 ~0.6–0.7 fold，Mgll 约降至 ~0.7 fold；Trib3 约降至 ~0.85 fold；Rps6kb2 约降至 ~0.8–0.85 fold；其余基因变化幅度较小（具体均值±SEM 见源数据）。"
  group_difference_statement: >
    在基线条件下，EphB1 缺失并未引起 AKT/FOXO footprint 轴或 flux limitation 轴的大范围同步改变（多数节点为 ns），但在 PI3K capacity 轴的一个组成节点（Rps6kb2）以及 rerouting to TG/周转相关节点（Dgat2、Mgll）上出现了方向一致且具有统计学意义的下调，同时 Trib3 作为 FOXO footprint 节点表现为轻度但显著的下降，提示转录层面的改变呈现为“选择性节点受影响”而非全轴性重编程。
  robustness_and_qc: "各基因在两组内的重复点分布集中；出现显著差异的节点（Dgat2、Mgll、Rps6kb2、Trib3）在组间分布分离清晰，而多数未显著基因在 WT 与 HO 间高度重叠，支持该结果的稳健性。"
  anomalies_or_limits: "flux limitation 轴的 Acaca、Cept1 与 Etnk1 未出现与假设一致的显著变化，提示该轴在转录层面的证据不足或效应较弱；同时多数 footprint 节点保持稳定，说明该分支效应为选择性而非全局性改变。"
# ---------- 5. Interpretation & Role in Chapter：怎么理解 + 在整章中的作用 ----------
interpretation:
  minimal_bio_interpretation: "本 panel 的设计目标是作为 node-level 验证：检验组学中提出的 PI3K capacity / AKT(FOXO) footprint / flux–turnover 三条轴是否能在湿实验中被复现。结果显示，该假设获得选择性支持：capacity 轴未在 Pik3ip1形成一致证据 ，但 Inpp4b/Rps6kb2 上呈一致方向；FOXO footprint 轴整体稳定，仅 Trib3 发生改变；flux轴中无明显一致性变化，而turnover 轴中大多下调（与预期相反）"
  alternative_explanations: >
    由于样本量与转录层面的局限，部分 node 的不一致结果可能来自生物学变异、补偿调控或检测灵敏度限制
    同时转录变化未必等同于蛋白/通量层面的改变
    同时收样时通路瞬时状态可能与真正有差异的时间段错开（比如473重磷酸化峰值）
  summary_type: "node_validation"
  claim_supported: "因此，本实验在 node 层面上对 pipeline 假设提供了‘部分复现、定点支持’的证据，提示真正的节点可能是Trib3、Rps6kb2"
  link_to_previous: "该证据力度不足，实验设计本身存在缺陷，不足以验证node"
  transition_to_next: "放弃该实验的node验证，转而专注于pi3k下游akt 473磷酸化与轴的联系。"
# ---------- 6. figure_legend ----------

figure_legend:
  panel: "Figure X, panel Y"
  panel_title_en: "Baseline qPCR validation of PI3K capacity, AKT/FOXO footprint, and lipid flux/turnover nodes in WT and EphB1-KO macrophages"
  panel_title_cn: "在基线条件下用 qPCR 验证 WT 与 EphB1-KO 巨噬细胞中 PI3K capacity、AKT/FOXO 足迹及脂质 flux/turnover 关键节点"

  one_sentence_en: "Baseline mRNA levels of selected genes representing PI3K capacity, AKT/FOXO footprint, and lipid synthesis/turnover pathways were quantified by qPCR in WT and EphB1-KO (HO) primary peritoneal macrophages."

  system_and_design:
    model: "Primary mouse peritoneal macrophages"
    genotype_or_groups: "WT and EphB1-KO (HO) under baseline (no additional treatment) conditions"
    key_treatments: "No stimulation or inhibitor; baseline culture conditions only"
    time_window: "Single baseline sampling time point"

  readouts_and_assays:
    primary_readout: "mRNA expression levels (fold change)"
    assay: "qPCR (SYBR-based)"
