# ============================================================
# schema.yaml v2  ——  单个 panel 的结构化写作模版
# 目标：让 AI 在几乎不需要补充信息的前提下，生成：
#   - 结果段（Results）
#   - 简短讨论/过渡段（Mini Discussion / Transition）
#   - Methods 中本实验的“差异性信息”
# ============================================================

# ---------- 0. Meta & Assets：基本信息 ----------
meta:
  figure: "Figure 3"
  panel: "B"
  short_title: "EphB1 缺失减缓细胞质 ROS 上升并维持线粒体膜电位"
  chapter: "3.3 EphB1 缺失降低 GSDMD 的线粒体结合"
  experiment_id: "2025-03-21_ROS_TMRM_timecourse"
  version: 1              # 整数，用来追踪修改

assets:
  main_figure_file: ""    # 主图文件路径，如 "figures/F3/F3A_IL1b_ELISA.pdf"
  raw_data_files:         # 原始数据/整理后数据的文件路径列表
    - ""
  stats_files:            # 统计分析结果文件（R/Python 脚本输出）
    - ""
  analysis_scripts:       # 用于生成图/做统计的脚本
    - ""
  supplementary_items:    # 对应的补充图/表（若有）
    - ""                  # 如 "Figure S3B", "Table S2"

# ---------- 1. Scientific Question：本节要回答什么 ----------
question:
  context_from_previous: "上一节显示 EphB1 缺失削弱 GSDMD-NT 在线粒体的早期富集，提示线粒体膜事件可能受影响。"
  core_question: "EphB1 缺失是否影响炎症小体激活过程中细胞质 ROS 上升与线粒体膜电位变化？"
  hypothesis_or_expectation: "若 EphB1 缺失降低 GSDMD 介导的线粒体损伤，则应观察到更少的细胞质 ROS 上升与更稳定的膜电位。"
  importance_reason: "ROS 与膜电位是反映线粒体损伤与炎症小体执行端状态的关键 readouts。"

# ---------- 2. Rationale / Design Logic：为什么这样设计 ----------
rationale:
  model_and_system: "使用 WT 与 Ephb1−/− 原代腹腔巨噬细胞，其对 LPS+nigericin 的响应可稳定诱导 ROS 动力学与 Δψm 改变。"
  key_variables: "比较基因型差异下的细胞质 ROS（H2DCHA）、线粒体 ROS（MitoSOX）、线粒体膜电位（TMRM）。"
  control_logic: "统一使用 LPS priming + nigericin 的时间梯度；所有指标归一化到加药前基线以比较动力学差异。"
  core_justification: "若 KO 的 ROS 上升减缓且 Δψm 更稳定，则说明线粒体损伤减少并与 GSDMD-NT 结合受限一致。"

# ---------- 3. Methods（差异性信息）：只写本 panel 特有的 ----------
methods:
  inherits_from_protocol: "default_peritoneal_macrophage_NLRP3_activation"
  biological_material: "8–12 周龄 C57BL/6 WT 与 Ephb1−/− 原代腹腔巨噬细胞。"
  experimental_groups: "WT vs Ephb1−/−；均进行 LPS priming 后进行 nigericin 时间梯度激活。"
  stimuli_and_treatment: "LPS 100 ng/mL 4 h；刺激结束前 30 min 加入 H2DCHA 或 MitoSOX 或 TMRM；随后加入 nigericin 并连续读数 120 min。"
  time_points: "0–120 min，间隔 2–5 min（根据 plate reader 设置）。"
  dose_info: "Nigericin 10 μM；荧光探针按说明书标准浓度使用。"
  readout_and_assay: "96 孔板即时荧光读数；H2DCHA 检测细胞质 ROS；MitoSOX 检测线粒体 ROS；TMRM 检测 Δψm；MitoSOX/Δψm 用于 Δψm 校正后的 mtROS。"
  replicates: "每组 n ≥ 3；≥3 批次独立实验。"
  analysis_notes: "所有时间序列数据归一化至加药时第一个时间点；比较曲线下面积（AUC）与关键时间点差异；双尾 t 检验。"
  minimal_methods_summary: "LPS priming 后以多探针实时监测 WT 与 KO 巨噬细胞在 nigericin 激活后的细胞质 ROS、线粒体 ROS 与膜电位变化。"

# ---------- 4. Results：把图变成结构化文字 ----------
results:
  data_direction: "Ephb1−/− 细胞在 nigericin 激活后 120 min 内的细胞质 ROS 上升显著减缓，Δψm 更稳定，Δψm 校正后 mtROS 与 WT 相当。"
  stats_summary: "H2DCHA 曲线：KO 明显减弱（p < 0.05）；TMRM：KO 曲线更稳定（p < 0.05）；MitoSOX/Δψm：ns。"
  key_numbers: "KO 的细胞质 ROS AUC 降低约 25–40%；Δψm 降低幅度减少约 20–30%。"
  group_difference_statement: "与 WT 相比，KO 在炎症小体激活期间的 ROS 上升更慢、膜电位维持更好，而校正后的线粒体 ROS 水平无显著差异。"
  robustness_and_qc: "趋势在 ≥3 批次中一致；探针信号背景已统一校正；未见异常反应孔。"
  anomalies_or_limits: "个别批次中后期（>90 min）TMRM 信号略有漂移，但不影响总体趋势。"

# ---------- 5. Interpretation & Role in Chapter：怎么理解 + 在整章中的作用 ----------
interpretation:
  minimal_bio_interpretation: "EphB1 缺失减弱炎症小体激活时的细胞质 ROS 上升并维持 Δψm，提示线粒体损伤程度降低。"
  alternative_explanations: "不排除 KO 细胞基础代谢不同导致的 ROS 动态差异，但 Δψm 校正后 mtROS 无差异支持 GSDMD-NT 孔减少模型。"
  summary_type: "supportive, descriptive"
  claim_supported: "EphB1 缺失减弱炎症小体激活时的 ROS 增加并稳定线粒体膜电位。"
  link_to_previous: "结合上一节 GSDMD-NT 线粒体富集减少，本节进一步支持 KO 线粒体膜损伤受限。"
  transition_to_next: "下一节将检测 mtDNA 释放以验证线粒体膜受损程度。"

# ---------- 6. AI Writing Hints（可选）：给 LLM 的写作风格提示 ----------
ai_hints:
  target_section: ["Results", "Discussion_mini", "Methods_diff"] 
    # 你希望从这个 schema 主要生成哪些部分的正文？
    # 可选值： "Results" / "Discussion_mini" / "Methods_diff"
  tone: "neutral"     
    # 写作语气： "neutral"（默认科研语气）/ "cautious"（更谨慎）/ "confident"（偏肯定）
  target_journal_style: "" 
    # 若有心仪期刊的写作风格，可以在此填入名称，仅作为“风格参考”
    # 例如："Cell Metabolism", "Nature Immunology"
  language: "zh_en_mix"
    # 你希望生成何种语言： "zh"（中文）/ "en"（英文）/ "zh_en_mix"（中英混排方便你润色）