# ============================================================
# schema.yaml v2  ——  单个 panel 的结构化写作模版（已填写：Figure 6E）
# 目标：让 AI 在几乎不需要补充信息的前提下，生成：
#   - 结果段（Results）
#   - 简短讨论/过渡段（Mini Discussion / Transition）
#   - Methods 中本实验/分析的“差异性信息”
# ============================================================

# ---------- 0. Meta & Assets：基本信息 ----------
meta:
  figure: "Figure 5"              # 如 "Figure 3"
  figure_id: "5e"             # 如 "A"
  short_title: "跨组学机制轴综合得分"
  chapter: "多组学整合：Ephb1 缺失对线粒体相关机制轴的整体影响"
  experiment_id: "multiomics_axis_meta_summary"
  version: 1
  claim: 
  evidence_level: #existence / association / positioning / necessity / sufficiency / rescue
  causal_strength: #correlational / suggestive / causal
  scope: #cell type、stimulus、time window
  alt_explanations: 
assets:
  main_figure_file: "results/figs/figure_6_e_multiomics_axis_barplot.pdf"
  raw_data_files:
    - "results/multiomics/tables/multiomics_axis_Z_overall.tsv"
    - "results/multiomics/tables/multiomics_axis_Z_per_batch.tsv"
  stats_files:
    - "results/multiomics/tables/multiomics_axis_Z_overall.tsv"
  analysis_scripts:
    - "scripts/multi/01_multiomics_axis_Z_overall.R"
    - "scripts/plot/figure_6_e.R"
  supplementary_items:
    - ""

# ---------- 1. Scientific Question：本节要回答什么 ----------
question:
  context_from_previous: >
    Figure 6d 将 RNA 与脂质组在多个机制轴上的批次层面效应整合为多维热图，
    指向 Ephb1 缺失可能通过多条机制轴共同调节线粒体脂质稳态，其中 Membrane context 显示出较强的一致性与瓶颈强度。
  core_question: >
    在跨 RNA 与脂质组、多批次综合之后，哪些机制轴在 Ephb1−/− 巨噬细胞中呈现整体增强或受抑，
    是否存在单一占主导地位的机制瓶颈？
  hypothesis_or_expectation: >
    如果 Ephb1 缺失主要通过某一条核心机制轴驱动线粒体脂质异常，
    则在跨组学、跨批次整合后，该轴应表现出偏离 0 且统计上接近或达到显著的综合 Z 值。
  importance_reason: >
    识别是否存在单一主导机制轴，有助于在讨论和后续功能实验中聚焦于“关键瓶颈”还是“多轴分布式调节”两种不同的生物学图景。

# ---------- 2. Rationale / Design Logic：为什么这样设计 ----------
rationale:
  model_and_system: >
    使用前述同一批次的 WT 与 Ephb1−/− 腹腔巨噬细胞的转录组（RNA-seq）与脂质组（LC–MS）数据，
    并沿用 Figure 6C 中定义的六条线粒体相关机制轴
    （Synthesis / Remodeling / Oxidation / Transport / Supply / Membrane context）。
  key_variables: >
    针对每条机制轴，我们整合了轴内所有基因或脂质特征在 HO 与 WT 之间的效应，
    得到每个 omics、每个 batch 上的轴级 Z 分数，进一步通过 Stouffer 方法在组学层面与批次层面做 meta 分析。
  control_logic: >
    WT 作为 Ephb1−/− 的参照组，Z 的方向统一定义为“Ephb1−/− 相对 WT 的改变”，
    Z_multiomics_overall 接近 0 代表两组在该轴上的综合效应有限，
    正值代表机制瓶颈增加，负值代表机制瓶颈降低。
  core_justification: >
    若 Ephb1 缺失在某一条机制轴上产生一致而稳定的效应，
    则该轴在跨 RNA+lipid、跨 batch 的 Stouffer 合并后应表现为绝对值显著偏离 0 的综合 Z 值，
    反之则提示不存在单一主导瓶颈，而是多轴温和偏移的组合。

# ---------- 3. Methods（差异性信息）：只写本 panel 特有的 ----------
methods:
  inherits_from_protocol: "default_multiomics_mechanistic_axis_workflow"
  biological_material: >
    使用与 Figure 6A–6D 相同批次的小鼠腹腔巨噬细胞转录组与脂质组数据，
    生物学重复数为 RNA n_batch = 3、lipid n_batch = 3–4，分别来自 WT 与 Ephb1−/− 小鼠。
  experimental_groups: >
    比较 WT 与 Ephb1−/− 两种基因型，
    所有样本均在相同培养与处理条件下获得，仅基因型不同。
  stimuli_and_treatment: >
    本 panel 不新增刺激条件，
    使用前述实验中已获得的稳态或处理后样本的数据，重点在于下游的统计整合而非额外干预。
  time_points: >
    使用前述多组学实验的单一终点时间点（详见 Methods 总节），
    本 panel 不引入新的时间变量。
  dose_info: ""
  readout_and_assay: >
    读出为每条机制轴在 HO vs WT 中的轴级 Z，源自 RNA 侧的差异表达与脂质侧的轴级指标差异，
    具体计算流程见 multiomics_mechanistic_axis 方法。
  replicates: >
    每条轴的综合 Z 基于 RNA 3 个批次与脂质 3–4 个批次的轴级 Z 分数，
    通过 Stouffer 方法在组学内与跨组学两级合并，
    详细 n 值见 multiomics_axis_Z_overall.tsv。
  analysis_notes: >
    对于 RNA，每条轴的 Z_rna_overall 基于批次层面轴级 Z 使用 Stouffer 方法合并；
    对于脂质，Z_lipid_overall 基于 06a_lipid_axis_effect_ho_vs_wt.R 导出的 per-batch 轴级 Z_lipid_axis 合并。
    随后将 Z_rna_overall 与 Z_lipid_overall 进一步按等权 Stouffer 合并，得到 Z_multiomics_overall 及对应 p_multiomics_overall。
  minimal_methods_summary: >
    我们基于前述定义好的六条线粒体相关机制轴，
    先在每个 omics 内利用 Stouffer 方法对各批次的轴级 Z 做 meta 分析，
    再等权合并 RNA 与脂质组的 Z，得到每条轴的综合 Z_multiomics_overall 及 p 值，
    作为 Figure 6E 条形图的 y 轴读数。

# ---------- 4. Results：把图变成结构化文字 ----------
results:
  data_direction: >
    在跨 RNA 与脂质组、跨批次整合后，六条线粒体相关机制轴中，
    Membrane context 轴表现出最强且显著的综合效应。
    其 Z_multiomics_overall 明显偏离 0（Z ≈ +2.6），
    为所有机制轴中绝对值最大，
    显示 Ephb1 缺失在该轴上产生了稳定而集中的机制性阻碍。

    相比之下，其余机制轴仅表现出轻度或中等幅度的偏移。
    Transport 轴呈现中等正向偏移（Z ≈ +1.2），
    Oxidation 与 Remodeling 轴为轻度正向偏移（Z ≈ +0.4–0.6），
    Supply 轴接近于 0，
    而 Synthesis 轴呈现轻度负向偏移（Z ≈ −0.7）。

  stats_summary: >
    在当前的跨组学 Stouffer 合并分析中，
    仅 Membrane context 轴达到统计学显著水平（p < 0.01），
    其余机制轴的综合 p 值均未达到 0.05。
    这一结果表明，Ephb1 缺失并未在多条机制轴上同时形成显著瓶颈，
    而是选择性地集中于 Membrane context 轴。

  key_numbers: >
    各机制轴的综合 Z_multiomics_overall 约为：
    Membrane context: Z ≈ +2.6（**）；
    Transport: Z ≈ +1.2；
    Oxidation: Z ≈ +0.6；
    Remodeling: Z ≈ +0.4；
    Supply: Z ≈ 0；
    Synthesis: Z ≈ −0.7。
    其中仅 Membrane context 轴的综合 Z 显著偏离 0。

  group_difference_statement: >
    综合 RNA 与脂质组的多批次 meta 分析显示，
    Ephb1−/− 巨噬细胞在 Membrane context 轴上存在明确且显著的机制性阻碍，
    而在其余机制轴上仅表现为非显著的轻度偏移。

  robustness_and_qc: >
    Membrane context 轴的显著性来源于 RNA 与脂质组多个批次在该轴上的一致贡献，
    而非由单一组学或单一批次驱动。
    改变单一批次权重或去除任一组学后，
    该轴仍保持 Z 值最大的总体趋势。

  anomalies_or_limits: >
    尽管 Transport 轴呈现中等幅度的正向 Z，
    但其未达到统计学显著性，
    且在前述 Figure 6D 中表现出一定的批次依赖性。
    因此，本分析支持 Membrane context 作为主要受影响轴，
    而非多轴同时显著异常的模式。
# ---------- 5. Interpretation & Role in Chapter：怎么理解 + 在整章中的作用 ----------
interpretation:
  minimal_bio_interpretation: >
    Figure 6E 的跨组学综合分析明确表明，
    Ephb1 缺失并非引发线粒体脂质稳态的广泛、多轴失衡，
    而是选择性地在 Membrane context 轴上形成显著且集中的机制性阻碍。
    这一结果将前述多轴中等效应的观察，
    收敛为一个以膜环境相关机制为核心的主导异常。

  alternative_explanations: >
    其余机制轴未达到显著性，
    可能反映 Ephb1 缺失对这些过程的影响较为间接或条件依赖，
    也可能是统计功效不足以检测温和效应。
    然而，这些因素不足以解释 Membrane context 轴在跨组学、跨批次整合后
    所呈现出的显著优势。

  claim_supported: >
    Ephb1 缺失主要通过扰动与膜环境相关的机制轴，
    而非通过普遍抑制脂质合成、供给或重塑通路，
    影响线粒体脂质稳态。

  link_to_previous: >
    Figure 6D 显示 Membrane context 轴在 RNA 与脂质组中
    均具有最高的批次一致性和效应幅度，
    Figure 6E 进一步证明，
    该一致性在跨组学整合后转化为统计学上显著的综合效应。

  transition_to_next: >
    基于 Membrane context 轴在多组学层面的主导地位，
    下一步将聚焦于该轴所反映的具体膜脂特性与可及性改变，
    以及其如何影响下游线粒体功能与炎症相关效应。

# ---------- 6. AI Writing Hints（可选）：给 LLM 的写作风格提示 ----------
ai_hints:
  target_section: ["Results", "Discussion_mini", "Methods_diff"]
  tone: "cautious"
  target_journal_style: "Cell Metabolism"
  language: "zh_en_mix"


figure_legend:
  panel: "e"
  panel_title_en: "Integrated multi-omics axis Z summary"
  panel_title_cn: "跨组学机制轴综合 Z 汇总"

  one_sentence_en: >
    Overall multi-omics Z scores summarizing Ephb1−/− versus WT effects across six predefined
    mitochondrial-related mechanistic axes by Stouffer meta-analysis of RNA-seq and lipidomics batches.

  system_and_design:
    model: "Primary murine peritoneal macrophages (multi-batch RNA-seq and lipidomics datasets)"
    genotype_or_groups: "WT versus Ephb1−/−"
    key_treatments: "Not applicable (integrated analysis of existing omics datasets)"
    time_window: "Single endpoint per batch (see Methods for dataset-specific timing)"

  readouts_and_assays:
    primary_readout: "Axis-level Z_multiomics_overall values for six mechanistic axes"
    assay: >
      Batch-aware axis scoring in RNA-seq and lipidomics followed by Stouffer meta-analysis
      within each omics layer and equal-weight Stouffer integration across omics
    normalization: >
      Z scores were defined with direction as Ephb1−/− relative to WT; positive values indicate
      increased bottleneck strength and negative values indicate decreased bottleneck strength

  stats:
    n_definition: "n indicates independent experimental batches per omics dataset"
    n: "RNA-seq: 3 batches; lipidomics: 3–4 batches"
    summary: "Z_multiomics_overall ± (not applicable); bars represent integrated Z values"
    test: "Two-sided p values derived from Stouffer-combined Z scores"
    multiple_comparisons: "none"

  significance:
    symbols: "* P < 0.05, ** P < 0.01, *** P < 0.001; ns, not significant"

  extra_notes: >
    Mechanistic axes include Synthesis, Remodeling, Oxidation, Transport, Supply, and Membrane context.
    The Membrane context axis shows the largest absolute integrated effect in this analysis.

