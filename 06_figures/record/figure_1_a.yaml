# ============================================================
# schema.yaml v2  ——  单个 panel 的结构化写作模版
# 目标：让 AI 在几乎不需要补充信息的前提下，生成：
#   - 结果段（Results）
#   - 简短讨论/过渡段（Mini Discussion / Transition）
#   - Methods 中本实验的“差异性信息”
# ============================================================

# ---------- 0. Meta & Assets：基本信息 ----------
meta:
  figure: "Figure 1"              # 如 "Figure 3"
  panel: "A"                      # 如 "A"
  short_title: "EphB1 缺失不影响 staurosporine 诱导的细胞凋亡"         
  chapter: "3.1 EphB1 缺失降低炎症小体诱导的巨噬细胞焦亡与 IL-1β 释放"
  experiment_id: "EphB1_STS_apoptosis_WB"
  version: 1

assets:
  main_figure_file: ""    # 主图文件路径，如 "figures/F1/F1A_cleaved_caspase3_WB.pdf"
  raw_data_files:         # 原始数据/整理后数据的文件路径列表
    - ""
  stats_files:            # 统计分析结果文件（R/Python 脚本输出）
    - ""
  analysis_scripts:       # 用于生成图/做统计的脚本
    - ""
  supplementary_items:    # 对应的补充图/表（若有）
    - ""                  # 如 "Figure S3B", "Table S2"

# ---------- 1. Scientific Question：本节要回答什么 ----------
question:
  context_from_previous: >
    前一小节提出 EphB1 可能参与炎症小体依赖性细胞死亡的调控，但尚需排除其通过
    广泛改变细胞死亡敏感性而非特异性调节焦亡的可能。
  core_question: >
    EphB1 缺失是否改变原代腹腔巨噬细胞对 staurosporine 诱导经典程序性凋亡的敏感性？
  hypothesis_or_expectation: >
    如果 EphB1 主要影响炎症小体依赖性焦亡而非普遍细胞死亡，则在相同 staurosporine
    处理条件下，KO 与 WT 巨噬细胞中 cleaved caspase-3 的丰度应相近。
  importance_reason: >
    通过首先确认凋亡水平不变，可以排除“EphB1 缺失导致普遍抗死亡/易死亡”的混杂因素，
    从而为后续将表型特异性归因于炎症小体依赖性焦亡奠定基础。

# ---------- 2. Rationale / Design Logic：为什么这样设计 ----------
rationale:
  model_and_system: >
    选用 EphB1 PB−/−（KO）与野生型（WT）小鼠来源的原代腹腔巨噬细胞，以保持与后续
    炎症小体/焦亡实验一致的细胞系统，并避免细胞系适应性改变带来的偏差。
  key_variables: >
    本实验主要比较基因型（WT vs EphB1 PB−/−）在 staurosporine 诱导凋亡条件下
    cleaved caspase-3 水平的差异，未设置复杂刺激梯度，以突出“是否存在广泛凋亡改变”这一核心问题。
  control_logic: >
    WT 作为基因型参照，用以定义 staurosporine 诱导凋亡的正常反应；KO 组在相同处理下
    若 cleaved caspase-3 显著降低，则提示可能存在普遍抗凋亡；若无差异，则支持 EphB1
    的作用更偏向炎症小体依赖性焦亡而非经典凋亡。
  core_justification: >
    通过在相同 staurosporine 处理下比较 WT 与 KO 巨噬细胞的 cleaved caspase-3，
    可以直接检验 EphB1 缺失是否引起对非炎症性凋亡途径的普遍耐受，从而为后续
    焦亡特异性效应提供必要的阴性对照。

# ---------- 3. Methods（差异性信息）：只写本 panel 特有的 ----------
methods:
  inherits_from_protocol: "default_peritoneal_macrophage_apoptosis_induction"
  biological_material: >
    8–12 周龄 C57BL/6 背景的野生型（WT）与 EphB1 PB−/−（KO）小鼠来源的原代腹腔巨噬细胞。
  experimental_groups: >
    细胞按基因型分为 WT 与 KO 两组，均在贴壁并恢复状态稳定后接受 staurosporine 处理；
    未加药组作为基线/阴性对照（如有，在 Methods 总节中统一描述）。
  stimuli_and_treatment: >
    采用 staurosporine 作为广谱蛋白激酶抑制剂诱导经典程序性凋亡，处理时间与具体剂量
    参见 Methods 总节中“凋亡诱导”通用 protocol。
  time_points: >
    在 staurosporine 处理结束时立即收集细胞全蛋白，用于 caspase-3 剪切状态的检测。
  dose_info: >
    使用单一工作浓度的 staurosporine（具体数值见 Methods 总节），旨在模拟常用的
    凋亡诱导条件而非构建完整剂量反应曲线。
  readout_and_assay: >
    采用 Western blot 检测 cleaved caspase-3 与 total caspase-3，条带信号归一化到内参
    蛋白（如 GAPDH 或 β-Tubulin），并计算 cleaved/total 比值作为凋亡 readout。
  replicates: >
    每组生物学重复 n ≥ 3，结果来源于至少 3 次独立实验，最终数据按实验批次合并分析。
  analysis_notes: >
    对 cleaved caspase-3 归一化强度在 WT 与 KO 之间进行非配对双尾 t 检验；若有未处理对照，
    主要用于确认 staurosporine 成功诱导凋亡，而不参与基因型间差异统计。
  minimal_methods_summary: >
    WT 与 EphB1 PB−/− 小鼠原代腹腔巨噬细胞在相同条件下接受 staurosporine 处理后，
    收集全细胞蛋白进行 caspase-3 Western blot，条带信号归一化到内参后比较 cleaved caspase-3
    在 WT 与 KO 之间的差异，每组 n ≥ 3，结果合并自 ≥3 次独立实验，采用非配对双尾 t 检验评估显著性。

# ---------- 4. Results：把图变成结构化文字 ----------
results:
  data_direction: >
    在 staurosporine 处理条件下，KO 巨噬细胞中 cleaved caspase-3 的丰度与 WT 基本相当，
    未观察到明显上升或下降趋势。
  stats_summary: >
    归一化后的 cleaved caspase-3 信号在 WT 与 KO 之间差异不显著（非配对双尾 t 检验，p > 0.05）。
  key_numbers: >
    cleaved caspase-3 的 KO/WT 比值接近 1.0；所有重复中均未见超过预设效应量阈值的系统性偏移，
    与图 3.1 中“ns” 标记一致（具体均值 ± SD 见原始数据表）。
  group_difference_statement: >
    与 WT 相比，EphB1 PB−/− 巨噬细胞在 staurosporine 诱导的凋亡条件下 cleaved caspase-3 水平
    未见显著变化，提示 EphB1 缺失并不改变经典凋亡的总体程度。
  robustness_and_qc: >
    该趋势在 ≥3 次独立实验中重复获得，各批次中 WT 组均可观察到 staurosporine 诱导的
    caspase-3 剪切，证明凋亡诱导本身有效；根据预设准则检查后未剔除额外 outlier。
  anomalies_or_limits: >
    本实验仅基于单一凋亡诱导剂和单一时间窗，未系统评估其他凋亡通路（如死亡受体途径）或
    早晚不同时间点的动态变化。

# ---------- 5. Interpretation & Role in Chapter：怎么理解 + 在整章中的作用 ----------
interpretation:
  minimal_bio_interpretation: >
    这些结果表明，在常规 staurosporine 诱导条件下，EphB1 缺失并不会显著改变原代腹腔巨噬细胞
    的经典程序性凋亡程度，提示 EphB1 并非普遍调控细胞凋亡的因子。
  alternative_explanations: >
    目前仅检测 cleaved caspase-3 这一凋亡 readout，且仅考察 staurosporine 一种诱导方式；
    不能完全排除 EphB1 在其他凋亡通路（如外源性死亡受体、内源性线粒体通路的上游调控）
    中存在更细微或情境依赖的作用。
  summary_type: "elimination,supportive"
  claim_supported: >
    EphB1 缺失不会导致原代巨噬细胞对非炎性凋亡方式的普遍耐受，其在细胞死亡调控中的作用
    具有相对特异性，更主要体现在炎症小体依赖性焦亡上。
  link_to_previous: >
    在总体提出“EphB1 可能参与炎症小体诱导细胞死亡”的前提下，本节首先表明 EphB1 缺失并不
    改变 staurosporine 诱导的经典凋亡，为后续将表型聚焦于焦亡而非普遍细胞死亡提供了阴性背景。
  transition_to_next: >
    在排除广泛凋亡改变之后，我们接下来通过 LDH 释放和 IL-1β 分泌等 readout，系统评估 EphB1
    缺失对炎症小体依赖性焦亡过程本身的影响。

# ---------- 6. AI Writing Hints（可选）：给 LLM 的写作风格提示 ----------
ai_hints:
  target_section: ["Results", "Discussion_mini", "Methods_diff"] 
  tone: "neutral"
  target_journal_style: ""
  language: "zh_en_mix"