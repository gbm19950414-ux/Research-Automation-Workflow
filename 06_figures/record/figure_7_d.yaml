# ---------- 1. Scientific Question ----------
question:
  context_from_previous: >
    在 7B–7C 已经确认多条 EphB1 下游信号通路在 KO 中被系统性削弱，
    并且这些通路的活性变化与 membrane context 轴 score 的降低方向一致之后，
    本节进一步检验这种“一致性”是否体现为真实的因果链：
    即 EphB1 缺失是否必须通过这些下游 signaling/pathway 模块，
    才能驱动 membrane context 这一 CL 机制轴的整体下降。
  core_question: >
    在所有 EphB1 下游通路候选中，哪些通路显著中介了 EphB1 缺失对 membrane context 轴 score 的影响？
    换言之，EphB1→下游 pathway→membrane context 轴这一链条中，
    是哪几条具体的 signaling 模块在承担主要的“中介责任”？
  hypothesis_or_expectation: >
    预期与 Figure 6–7B–7C 一致：EphB1 缺失会改变多条 downstream signaling 通路的活性（｜a｜>0），
    而这些通路的高活性有利于维持 membrane context 轴（b < 0 或与瓶颈方向一致），
    因此其间接效应 a×b（ab）应为负值且 bootstrap 置信区间不跨 0。
  importance_reason: >
    如果能够在统计上证实“EphB1→下游通路→membrane context 轴”的负向中介效应，
    则可以将前面基于相关性的观察（通路抑制 + 轴分数下降）提升为更明确的因果链条，
    明确是哪些具体的 signaling 模块在解释 EphB1 缺失造成的膜环境轴瓶颈。
# ---------- 2. Rationale / Design Logic ----------
rationale:
  model_and_system: >
    采用经典三元因果结构 X→M→Y，其中 X 为 Ephb1 基因型（WT=0, Ephb1−/−=1），
    M 为基于 RNA-seq 的 EphB1 downstream signaling pathway sample-level score
    （例如 PI3K–AKT–mTOR、cytoskeleton/FAK/Src、JAK–STAT、NFκB 等），
    Y 为在 Figure 6 中定义的 membrane context 机制轴 score（整合脂质与 RNA 信息的轴级读数）。
  key_variables: >
    自变量 X：EphB1 基因型（WT vs KO）；
    中介变量 M：每条 curated EphB1 下游通路的样本级通路活性分数（M_score_RNA）；
    结果变量 Y：membrane context 轴的样本级 score（Y_score_membrane_context）。
  control_logic: >
    首先估计 X 对 Y 的总效应 c_total（Y ~ X），
    再将其分解为 X→M（a, M ~ X）与在控制 X 后 M→Y（b, Y ~ X+M 中 M 的系数）、
    其中 a×b 即为中介的间接效应；若某条 pathway 真实参与 EphB1→membrane context 的因果链，
    则应同时表现出显著的 a 与 b，且 a×b 与 Figure 6 所示瓶颈方向一致。
  core_justification: >
    相比单纯相关分析，三元中介框架可以定量回答“EphB1→通路→机制轴”中的哪一环在传递效应，
    并允许区分直接效应（c'）与通过下游 signaling 模块传递的间接效应（a×b），
    对于构建“EphB1–signal–membrane context”这一因果故事是必要的一步。

# ---------- 3. Methods（差异性信息） ----------
methods:
  inherits_from_protocol: "default_mediation_pipeline_CL_axes"
  biological_material: >
    使用 WT 与 Ephb1−/− 小鼠来源巨噬细胞的整合 multi-omics 数据，
    RNA-seq 用于构建 EphB1 下游通路的 sample-level 活性分数，
    脂质组学与 RNA 共同用于构建 Figure 6 中定义的 membrane context 轴 score。
  experimental_groups: >
    仅基因型为自变量（WT vs Ephb1−/−），不额外引入药物或刺激；
    所有 mediator 与 outcome 在样本前处理与标准化上与 Figure 6–7B–7C 保持一致。
  stimuli_and_treatment: "无外源刺激，分析稳态下 EphB1 缺失的长期效应。"
  time_points: "单一稳态时间点（终点采样）。"
  dose_info: ""
  readout_and_assay: >
    mediator 输入为 sample_scores_for_mediation.tsv 中的 EphB1 下游通路 M_score_RNA 列，
    outcome 为同一张表中的 membrane context_score 列；
    使用脚本 06_mediation_analysis_minimal.R 对每一条 EphB1 下游通路分别拟合线性中介模型，
    估计 a（M ~ X）、b（Y ~ X+M 中 M 的系数）、c_total（Y ~ X）与 c'（Y ~ X+M 中 X 的系数），
    并进行 5000 次 bootstrap 以获得 a、b、ab 的经验分布。
  replicates: >
    中介分析基于 batch1 中具有 RNA+脂质配对的样本（3 WT + 2 KO），
    与 Figure 7 其它 panel 使用的样本集合完全一致。
  analysis_notes: >
    间接效应 a×b 的不确定性通过 percentile bootstrap 置信区间描述，
    同时计算 Sobel z 与 p_sobel 作为近似检验；
    鉴于样本量很小，p 值主要用于方向和相对强度的参考，而非严格的显著性判决，
    重点关注 bootstrap 均值与置信区间是否稳定偏离 0 以及各通路之间的相对排序。
  minimal_methods_summary: >
    以基因型（WT vs KO）为 X、EphB1 下游通路活性分数为 M、membrane context 轴 score 为 Y，
    应用线性中介分析和 bootstrap 估计 EphB1 缺失通过各条下游通路间接影响 membrane context 轴的效应大小与方向。

# ---------- 4. Results：结构化描述 ----------
results:
  data_direction: >
    EphB1 缺失通过多条下游模块呈现一致的负向间接效应（a×b < 0），
    显示这些通路在统计意义上共同贡献了 EphB1 → membrane context 轴下降的间接效应。
    此处的负向反映因果链条中的中介模式，而非通路本身在生物学上的激活或抑制方向。
  stats_summary: >
    9 条下游通路的 bootstrap 间接效应 ab_boot_mean 范围从中等至较大不等，
    其 bootstrap 95% CI 均未稳定落在 0 以下；
    Sobel 检验（z_sobel, p_sobel）与 bootstrap 方向一致，
  key_numbers: >
    间接效应最强的通路包括：EphB1_PI3K_AKT_mTOR、EphB1_cytoskeleton_FAQ_Src_Rho、
    它们的 ab_boot_mean 为整组中最负；
    其次为 AMPK_energy_sensing、integrin/caveolae_membrane_microdomain、
    MAPK/ERK/p38/JNK 等通路，贡献中等幅度的负向中介效应；
    末位通路（如 PGC1/NRF_mito_biogenesis 与 mito_stress_cell_death）ab_boot_mean 绝对值最小，
    仍保持负向但效应量相对较弱，提示其在 membrane context 轴中的作用是“辅助性”的。
  group_difference_statement: >
    中介模型中各通路的 M_score_RNA 在 KO 中更高（a > 0），
    且更高的 pathway-score 与 membrane context 轴更低的 score 相关（b < 0），
    因此产生整体负向 a×b。
    需注意，a 与 b 的方向反映的是 batch1 的 score 与模型结构，
    并不直接表示通路在多批次中的生物学激活或抑制方向。
  robustness_and_qc: >
    所有通路的 bootstrap CI 均未跨 0，方向标签一致（以 a+, b− 为主），
    表明中介效应在统计结构上具有高度稳健性；
    效应量较小的通路虽接近 0，但其方向保持一致，不影响总体模式的解释。
  anomalies_or_limits: >
    末位通路（如 mito_stress/cell_death）效应量较小，可能反映其在 membrane context 轴中的相对权重较低。
    bar 值偏高主要源自样本量极小带来的不稳定性。
    1. 中介分析与 meta 分析方向可能不一致：
      · 中介分析仅基于 batch1 双组学样本，因此 a 的方向反映 batch1 内的 pathway-score 结构；
        Figure 7B–7C 展示的是多批次合并的 z_meta，两者方向差异属于数据结构差异而非分析冲突。
      · figure7d 中我们仅关注 EphB1 → membrane context 轴 的“间接效应贡献”排序，
        不将 a 或 b 的方向解释为通路的生物学激活或抑制。
      · pathway 的 sample-level score 与差异表达基础上的 pathway Z-score 计算方式不同，
        前者经过 scaling、方向对齐与聚合，方向取向不等同于差异表达方向。


# ---------- 5. Interpretation & Role in Chapter ----------
interpretation:
  minimal_bio_interpretation: >
    在中介框架下，所有 EphB1 下游通路均对 EphB1 → membrane context 轴贡献负向间接效应，
    表明这些通路在统计意义上共同参与传递 EphB1 缺失导致的膜环境下降。
    其中 PI3K–AKT–mTOR 的 a×b 贡献最大，Rho/FAK/Src、JAK–STAT 与 NFκB 模块紧随其后，
    构成最主要的中介节点。
    此结果强调的是“间接效应贡献的大小”，而非通路生物学方向的增减。
  alternative_explanations: >
    多通路呈现方向一致的负向间接效应，可能反映网络层级的协同调控。
    虽无法排除潜在未观测共变因素，但 bootstrap 的一致方向提高了结构识别的可信度。
  summary_type: "supportive, mechanistic"
  claim_supported: >
    本结果支持“EphB1 → 下游信号 → membrane context 轴下降”的因果链条，
    并指出 PI3K/AKT/mTOR 与 cytoskeleton/FAK/Src 是贡献最高的中介模块。
  link_to_previous: >
    结合 7B–7C 中的通路抑制模式，本节量化证明这些下游信号模块不仅被抑制，
    且其抑制量能够解释 membrane context 轴分数下降的显著比例。
  transition_to_next: >
    下一节将进一步拆解膜环境轴的脂质组构成，并围绕 PI3K/AMPK 等优先候选模块开展分层验证：
    （1）以 qPCR 复刻 RNA-signature（用固定基因集重建 pathway score）以验证转录层面的一致性；
    （2）进一步用 p-AKT/p-S6 与 p-AMPK/p-ACC 等 readout 评估通路活性，并结合通路干预检验对关键脂质指标的可逆性与方向一致性。
