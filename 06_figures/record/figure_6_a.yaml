# ============================================================
# schema.yaml v2 — Model Panel (Conceptual / Mechanistic Diagram)
# 用于没有数据、仅用于说明假设与机制的图（如 Figure 6A）
# ============================================================

meta:
  panel_type: "model"
  figure: "Figure 6"              # 如 "Figure 3"
  figure_id: "6a"             # 如 "A"
  short_title: "RNA-first X–M–Z framework linking Ephb1 downstream modules to membrane context"
  chapter: "S4"
  role_in_paper: >
    以 X–M–Z 概念图形式，定义 Ephb1 状态（X）、Eph 下游信号模块（M）与
    RNA membrane context 轴（Z）之间的分析框架；
    在脂质组配对样本受限的前提下，以 RNA 内机制耦合为主计算（回归/相关），
    并以脂质表型方向一致性作为独立验证层，支撑 Figure 7 后续的通路优先级筛选。
  claim: 
  evidence_level: #existence / association / positioning / necessity / sufficiency / rescue
  causal_strength: #correlational / suggestive / causal
  scope: #cell type、stimulus、time window
  alt_explanations: 
# ---------- 1. Conceptual Goal（这张图要解释什么？） ----------
concept_goal:
  core_message: >
    将 Ephb1 缺失对膜环境机制轴的影响，组织为“X→M（跨批次ΔM一致性）+ M↔Z（批内回归/相关）
    + Z↔lipid（方向一致性验证）”的 RNA-first 框架，用于排序最可能解释 membrane context 扰动的候选通路。
  problem_being_explained: >
    在严格配对的 RNA–lipid 样本量有限、跨组学中介回归不稳定的前提下，
    如何以可复现的证据链识别哪些 Ephb1 下游信号模块最可能与 membrane context（Z）耦合，
    并与独立脂质表型方向保持一致，从而为后续湿实验验证提供优先级候选？

# ---------- 2. Mechanistic Elements（机制组成部分） ----------
mechanism:
  key_nodes:
    - name: "X: Ephb1 status"
      description: >
        遗传或处理层面的 Ephb1 状态（WT vs KO / HO），被视为外生处理变量 X，
        是整个中介模型的起点。
    - name: "M: Eph downstream signaling modules"
      description: >
        由预先定义的 Ephb1 下游信号/转录模块构成的候选集合（M₁…M_k），
        以 RNA-seq 转录足迹（gene set scores）量化其“长期配置/转录状态”（capacity/footprint），
        包括 PI3K–AKT–mTOR、mito stress/cell death、AMPK energy sensing、
        PGC1–NRF mitochondrial biogenesis、MAPK (ERK/p38/JNK)、integrin/caveolae microdomains、
        NFκB–ROS、JAK–STAT、cytoskeleton–FAK–Src–Rho 等；
        这些模块用于通路优先级排序，并不等同于瞬时磷酸化活性读出。
    - name: "Z: RNA membrane context axis score"
      description: >
        RNA 层面的 membrane context 机制轴样本级得分（Z），
        用作脂质层 membrane/CL 表型的转录代理（proxy），
        旨在刻画膜环境、线粒体容量/组织与 CL 可及性相关的长期状态，
        不要求与 CL 总量（sum_CL）呈稳定线性关系。
    - name: "lipid: key lipid readouts"
      description: >
        独立脂质组学表型（例如 CL_fraction、mito_lipid_mass、PC/PE/CL 等 readouts 或其效应方向），
        作为与 RNA Z 的“方向一致性（concordance）”验证层；
        本框架不以 lipid 作为主回归结果变量，而用于检查 Z 是否在方向上可重复映射到脂质表型。


  key_edges:
    - from: "X: Ephb1 status"
      to: "M: Eph downstream signaling modules"
      type: "associate"
      evidence: >
        在每个 RNA 批次内比较 Ephb1 WT 与 KO/HO 的通路分数差异（ΔM = KO−WT），
        并汇总跨批次方向投票与效应量，用于评估 X→M 的一致性与稳健性（不依赖配对脂质组学）。
    - from: "M: Eph downstream signaling modules"
      to: "Z: RNA membrane context axis score"
      type: "associate"
      evidence: >
        在每个批次内评估 Z 与 M 的耦合（相关或回归），
        并可在模型中控制 X（Z ~ M + X）以区分“通路—轴”的独立关联；
        该边用于筛选哪些 M 与 Z 保持方向一致、且对单样本扰动具有一定稳健性（如 LOO 检查）。
    - from: "Z: RNA membrane context axis score"
      to: "lipid: key lipid readouts"
      type: "concordance"
      evidence: >
        以批次为单位比较 Z 的 HO−WT 效应方向/大小与脂质表型的 HO−WT 效应方向/大小，
        计算方向一致性（direction concordance）作为独立验证层；
        该步骤用于检验 RNA proxy（Z）是否能在方向上重复映射到脂质变化，而非用于中介因果量化。
    - from: "X: Ephb1 status"
      to: "Z: RNA membrane context axis score"
      type: "associate"
      evidence: >
        X 与 Z 的总体差异（HO−WT）在多批次 RNA 中可重复评估，
        作为“Ephb1 缺失与 membrane context 转录代理改变”的主效应证据。
        本框架不要求估计或强调 c/c'，重点在于可重复的通路优先级筛选。
    - from: "X: Ephb1 status"
      to: "lipid: key lipid readouts"
      type: "associate"
      evidence: >
        在独立脂质组学批次中评估关键脂质表型的 HO−WT 效应方向/大小，
        与 RNA 的 Z 进行方向对齐；脂质层证据在本框架中作为外部验证，而非主回归目标。

# ---------- 3. Evidence Mapping（每条机制对应论文证据） ----------
evidence_mapping:
  supported_links:
    - mechanism_step: "X → Z：Ephb1 缺失与 RNA membrane context 轴（Z）的跨批次主效应"
      supported_by: ["Fig6C", "Fig6D", "Fig6E"]
      confidence: "high"
    - mechanism_step: "X → M：Ephb1 缺失对候选通路模块的跨批次ΔM一致性"
      supported_by: ["Fig7B", "Fig7C"]
      confidence: "medium"
    - mechanism_step: "M ↔ Z：批内通路分数与 Z 的耦合（相关/回归，控制X可选）"
      supported_by: ["Fig7D", "Fig7E"]
      confidence: "medium"
    - mechanism_step: "Z ↔ lipid：RNA proxy 与脂质表型的方向一致性验证"
      supported_by: ["Fig6E", "Fig6F"]
      confidence: "medium"
  speculative_links:
    - mechanism_step: "形式化跨组学中介（a×b）"
      rationale: >
        在严格配对的 RNA–lipid 样本量显著扩大后，
        才适合对 X→M→lipid 的 a×b 进行更稳定的因果中介量化；
        目前以 RNA-first 的一致性与耦合证据进行候选通路排序更可辩护。
      boundary: >
        当前框架不把 a×b 的显著性作为主结论来源，
        也不排除非转录机制或未建模通路对脂质表型的贡献。

# ---------- 4. Graphical Logic（图要怎么讲故事） ----------
visual_logic:
  flow_direction: "left-to-right"
  entry_point: "Ephb1 status (WT vs KO/HO) 作为外生处理变量 X"
  exit_point: "Z（RNA membrane context 轴）作为主结果，脂质 readouts 作为方向一致性验证层"
  causal_chain:
    - "Ephb1 status (X)"
    - "Eph downstream signaling modules (M)"
    - "RNA membrane context axis score (Z)"
  parallel_paths:
    - "多个 Eph 下游模块 M₁…M_k 并联作为候选解释者：先看 X→M 的跨批次ΔM一致性，再看 M↔Z 的批内耦合，形成排序。"
  feedback_loops:
    - "本图不建模反馈回路与瞬时激活；脂质层仅用于与 Z 的方向一致性验证。"

# ---------- 5. Message Strength & Boundaries（力度与边界） ----------
interpretation:
  what_is_certain: >
    该框架可以稳定地回答三个可重复问题：
    (1) Ephb1 缺失是否在多批次 RNA 中一致改变候选通路分数（X→M, ΔM一致性）；
    (2) 候选通路分数是否在批内与 membrane context 轴（Z）保持耦合（M↔Z, 相关/回归）；
    (3) Z 的效应方向是否与独立脂质表型方向一致（Z↔lipid concordance）。
  what_is_plausible: >
    若某条通路同时满足“X→M 方向稳定”与“ M↔Z 耦合稳定”，且 Z 与脂质表型方向一致，
    则该通路可作为解释 Ephb1 对膜环境长期扰动的优先候选，用于后续湿实验验证。
  what_is_unknown: >
    在当前配对多组学样本量下，无法对跨组学因果中介份额（a×b）给出稳健量化；
    同时也无法排除 Ephb1 通过非转录机制或未纳入模块的通路影响膜环境。
  why_model_needed: >
    该图将 Figure 7 的计算目标从“形式化中介显著性”转为“可复现的候选通路优先级排序”，
    使读者清楚理解：ΔM、批内回归/相关、以及与脂质表型的方向一致性分别在证据链中承担何种角色。

# ---------- 6. Transition（图在正文中的作用） ----------
transition:
  how_it_summarizes_previous: >
    基于 Figure 6 已确立的 membrane context 机制轴优先级，
    本图把后续分析的目标明确为：在多个 RNA 批次中筛选与 Z 最一致耦合的 Ephb1 下游候选通路，
    并用独立脂质表型的方向一致性对 Z 的生物学对应关系进行验证。
  how_it_leads_next_section: >
    接下来将依次展示：
    (i) 各通路模块在不同 RNA 批次的 ΔM（X→M）与方向投票；
    (ii) 各通路与 Z 的批内耦合强度与稳健性（M↔Z）；
    (iii) Z 与脂质表型在批次层面的方向一致性（Z↔lipid）。
    这些结果共同用于输出“最值得优先验证的 Ephb1 下游通路候选”。

# ---------- 7. AI Writing Hints（写作提示，可选） ----------
ai_hints:
  target_section: ["Results_mediation", "Discussion_model"]
  tone: "neutral"
  language: "zh_en_mix"
  target_journal_style: "Cell Metabolism"


# ---------- 6. figure_legend（每个 panel 一份：用于最终拼接 Figure Legends） ----------
# 设计原则：
# - 这是“投稿层”信息（允许事实：系统/条件/n/统计/归一化），但不写讨论式推理。
# - 每个 panel 只写“这个 panel 自己需要的 legend 信息”。
# - 脚本在 figure 层汇总时：
#     - Figure title 由 figure-level yaml 提供（若你之后有）；
#     - Panel legend 由这里提供并按 (a)(b)(c) 顺序拼接。
figure_legend:
  panel: "a"
  panel_title_en: "RNA-first X–M–Z framework"
  panel_title_cn: "RNA-first 的 X–M–Z 分析框架"

  one_sentence_en: >
    Conceptual diagram illustrating an RNA-first X–M–Z framework that links Ephb1 status (X),
    downstream signaling modules (M), and an RNA membrane context axis (Z), with independent
    lipid phenotypes used for directional concordance validation.

  system_and_design:
    model: "Conceptual framework (no experimental data shown)"
    genotype_or_groups: "WT versus Ephb1-deficient (KO/HO) as abstract variable X"
    key_treatments: "Not applicable"
    time_window: "Not applicable"

  readouts_and_assays:
    primary_readout: >
      Relationships among X (Ephb1 status), M (RNA-based pathway module scores),
      and Z (RNA membrane context axis score), and their directional alignment with
      independent lipid readouts
    assay: "Schematic representation of analytical logic"
    normalization: "Not applicable"

  stats:
    n_definition: "Not applicable"
    n: "Not applicable"
    summary: "Not applicable"
    test: "Not applicable"
    multiple_comparisons: "Not applicable"

  significance:
    symbols: "Not applicable"

  extra_notes: >
    The framework decomposes cross-omics interpretation into three evaluation layers:
    cross-batch consistency of X→M effects, within-batch coupling between M and Z,
    and directional concordance between Z and independent lipid phenotypes; it is
    intended for pathway prioritization rather than formal causal mediation.


# ---------- 8. English ----------

results_skeleton_en:
  stage: T3
  purpose: "panel-level Results skeleton (conceptual framework, bilingual)"
  panel_level: framework
  results_logic_type: mechanistic_integration

  modules:
    M1_motivation:
      en: "To address the challenge of limited strictly paired RNA–lipid samples and unstable cross-omics mediation, we formulated an RNA-first X–M–Z framework that prioritizes reproducible pathway ranking over formal causal quantification."
      cn: "为应对严格配对的 RNA–lipid 样本量有限且跨组学中介分析不稳定的问题，我们提出了一个以 RNA 为核心的 X–M–Z 框架，将重点从形式化因果量化转向可复现的通路优先级排序。"
      logic_source: "question.context_from_previous + question.core_question"

    M2_level_definition:
      en: "We applied an RNA-based analysis framework in which Ephb1 status was treated as the upstream variable and downstream signaling pathway scores were evaluated for association with the membrane context axis (Fig. 6a)."
      logic_source: "methods.readout_and_assay + question.core_question"

    M3_directional_result:
      en: "Rather than estimating a single cross-omics mediation effect, the framework decomposes the analysis into three reproducible steps: cross-batch consistency of X→M effects, within-batch coupling between M and Z, and directional concordance between Z and independent lipid phenotypes."
      cn: "该框架并不试图估计单一的跨组学中介效应，而是将分析拆解为三个可复现的步骤：X→M 的跨批次一致性、M 与 Z 的批内耦合，以及 Z 与独立脂质表型之间的方向一致性。"
      logic_source: "results.data_direction"

    M4_robustness:
      en: "By separating consistency, coupling, and concordance into distinct evaluation layers, the X–M–Z framework reduces sensitivity to sample pairing limitations and batch noise, enabling stable prioritization of candidate Ephb1 downstream pathways across datasets."
      cn: "通过将一致性、耦合与方向验证划分为彼此独立的评估层级，X–M–Z 框架降低了对样本配对限制与批次噪音的敏感性，从而实现跨数据集稳定的 Ephb1 下游候选通路排序。"
      logic_source: "results.robustness_and_qc + results.stats_summary"

    M5_panel_conclusion:
      en: # "Together, this RNA-first X–M–Z framework provides a transparent and reproducible strategy for ranking Ephb1 downstream signaling modules most likely coupled to membrane context perturbation, thereby guiding subsequent experimental validation without over-interpreting limited cross-omics mediation."
      logic_source: "results.group_difference_statement"