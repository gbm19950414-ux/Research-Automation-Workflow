# schema.yaml v2  ——  单个 panel 的结构化写作模版
# 目标：让 AI 在几乎不需要补充信息的前提下，生成：
#   - 结果段（Results）
#   - 简短讨论/过渡段（Mini Discussion / Transition）
#   - Methods 中本实验的“差异性信息”
# ============================================================

# ---------- 0. Meta & Assets：基本信息 ----------
meta:
  figure: "Figure 6"              # 如 "Figure 3"
  figure_id: "6c"   
  experiment_id: "RNAseq_EphB1_downstream_state"
  short_title: "EphB1 缺失重塑下游信号通路的转录响应状态"

assets:
  main_figure_file: "figures/F7/F7C_EphB1_downstream_pathway_scores.pdf"
  raw_data_files:
    - "results/rna/deseq2/interaction/interaction_summary_with_perBatchLFC.tsv"
  stats_files:
    - "results/multiomics/tables/ephb1_downstream_signaling_scores_per_batch.tsv"
    - "results/multiomics/tables/ephb1_downstream_signaling_top5_contributors_per_batch.tsv"
  analysis_scripts:
    - "scripts/multi/04_EphB1下游通路活性评估_rna_ephb1_downstream_scores.R"
    - "scripts/multi/ephb1_downstream_signaling_sets.yaml"
  supplementary_items:
    - "Figure S7"

# ---------- 1. Scientific Question：本节要回答什么 ----------
question:
  context_from_previous: "前述结果表明 EphB1 缺失改变了线粒体膜脂环境与炎症小体效应端输出。"
  core_question: "在收样时刻，EphB1 缺失是否系统性重塑其已知下游信号通路的转录响应状态？"
  hypothesis_or_expectation: "若 EphB1 作为上游信号节点参与多条细胞内信号调控，其缺失应在转录层面留下可检测的下游通路响应差异。"
  importance_reason: "明确 EphB1 下游信号通路的整体状态，有助于理解其如何通过多通路整合影响炎症与代谢表型。"

# ---------- 2. Rationale / Design Logic：为什么这样设计 ----------
rationale:
  model_and_system: >
   "采用 WT 与 Ephb1−/− 原代小鼠腹腔巨噬细胞的 RNA-seq 数据，以反映在炎症刺激背景下的稳态转录状态。"
    信号通路模块选择：
      EphB1–ephrin-B 介导的细胞接触信号具有典型的双向性（bidirectional signaling）：Eph 受体细胞内触发“forward signaling”，同时在配体细胞内诱发 ephrin-B 的“reverse signaling”。综述与系统性总结指出，这两侧信号尽管在不同细胞类型与情境下呈现高度可塑性，但其下游效应往往收敛于一组反复出现的保守模块。在 forward 侧，Eph 受体的自磷酸化位点可招募 SH2/SH3 适配蛋白与非受体酪氨酸激酶，最常被归纳为以 Src/FAK 平台、Rho 家族小 GTPases 介导的细胞骨架重排、以及向 MAPK 与 PI3K–AKT–mTOR 等枢纽通路的分流为核心的信号模块集合。 ￼
      在 reverse 侧，ephrin-B 缺乏酶活域，其信号传递依赖两类保守机制：一是由 Src 家族激酶介导的 ephrin-B 胞质尾部酪氨酸磷酸化及其对 Grb4 等适配蛋白的招募；二是由 ephrin-B C 端 PDZ-binding motif 介导的 PDZ 蛋白复合体（如 PDZ-RGS3 等）相互作用，进而影响 细胞骨架/黏附、迁移与极性等细胞行为，并可在部分情境下耦联到 JNK/p38 等应激 MAPK 分支。 ￼
      基于上述文献共识，我们采用“模块化覆盖”的策略：以这些跨系统反复验证的保守模块作为 EphB1 下游信号网络的最小框架，用于刻画样品在收样时刻的“信号响应状态”（transcriptional response state），而非穷举所有可能的情境分支。 ￼
    模块基因集建立：
      
  key_variables: "关键变量为基因型（WT vs Ephb1−/−），通过比较两者的转录差异评估下游信号响应。"
  control_logic: "WT 细胞作为同背景对照，用于界定 Ephb1 缺失引起的特异性转录改变。"
  core_justification: "若 EphB1 缺失改变其下游信号网络，则相关信号通路的转录足迹在 Ephb1−/− 细胞中应系统性偏移。"

# ---------- 3. Methods（差异性信息）：只写本 panel 特有的 ----------
methods:
  inherits_from_protocol: "default_bulk_rna_seq_analysis"
  biological_material: "来源于 8–12 周龄 C57BL/6 WT 与 Ephb1−/− 小鼠的原代腹腔巨噬细胞。"
  experimental_groups: "实验分为 WT 与 Ephb1−/− 两组，RNA-seq 数据来自多批次独立实验。"
  stimuli_and_treatment: "细胞未经过任何处理（与前述 RNA-seq 实验一致）。"
  time_points: "在统一时间点收集样品用于 RNA 提取。"
  dose_info: "不适用。"
  readout_and_assay: "基于 RNA-seq 的差异表达分析，进一步通过预定义的 EphB1 下游信号通路转录足迹基因集计算通路响应分数。"
  replicates: "每个基因型包含 ≥3 个生物学重复，合并多个实验批次分析。"
  analysis_notes: >
   "我们基于文献中 EphB1 的已知下游信号模块，构建其“转录足迹”基因集，用以表征收样时刻细胞在转录层面反映出的信号响应强度（response state），并与结构平台（capacity）指标联合解读，以避免将转录响应等同于即时激酶活性。"
   "使用 DESeq2 计算每批次 log2 fold change，并基于通路基因集汇总为通路级转录响应分数。"
  minimal_methods_summary: "对 WT 与 Ephb1−/− 原代腹腔巨噬细胞进行 RNA-seq 分析，并利用下游信号通路转录足迹基因集评估收样时刻的通路响应状态。"

# ---------- 4. Results：把图变成结构化文字 ----------
results:
  data_direction: "在三个独立 RNA 批次中，EphB1 缺失对多条下游模块的通路分数产生可检测的方向性偏移：PI3K–AKT–mTOR 与 JAK–STAT 在各批次总体呈负向改变（KO/HO < WT）；NF-κB/ROS 整体偏负但在 batch2 出现反向；Cytoskeleton（FAK–Src–Rho）总体偏正；其余模块（MAPK、Integrin/caveolae、PGC-1/NRF biogenesis、mito stress/cell death、AMPK）在批次间方向不完全一致或效应较弱。"
  stats_summary: "通路分数以基因集汇总并在每个批次内标准化为 z_pathway；右侧 cross-batch meta Z 为跨批次合并效应（方向一致性越高、效应越大则 |meta Z| 越大）。本面板主要用于一致性与效应强度排序，不将单一批次的显著性作为结论依据。"
  key_numbers: "cross-batch meta Z（约值，见右侧条形图）：PI3K–AKT–mTOR ≈ −2；JAK–STAT ≈ −2；NF-κB/ROS ≈ −1.5；MAPK ≈ −0.5；Integrin/caveolae ≈ 0；mito stress/cell death、PGC-1/NRF、AMPK 为小幅正向；Cytoskeleton 为正向（≈ +1）。"
  group_difference_statement: "总体而言，EphB1 缺失在转录层面最一致地指向 PI3K–AKT–mTOR 与 JAK–STAT 模块下调，同时伴随 NF-κB/ROS 总体下移与 Cytoskeleton 模块上移，提示收样时刻的下游信号响应状态发生系统性重排。"
  robustness_and_qc: "该评估基于 ≥3 个独立 RNA 批次，按批次内比较 WT vs KO/HO 后再进行跨批次合并；PI3K–AKT–mTOR 与 JAK–STAT 的方向一致性最高，因而在 meta Z 排序中最稳健。"
  anomalies_or_limits: "部分模块存在批次依赖的方向反转（例如 NF-κB/ROS、mito stress/cell death），提示其更可能受刺激背景/细胞状态影响；此外，转录足迹分数反映的是长期配置/响应状态，并不等同于即时激酶磷酸化活性。"

# ---------- 5. Interpretation & Role in Chapter：怎么理解 + 在整章中的作用 ----------
interpretation:
  minimal_bio_interpretation: "该结果提供了 EphB1 缺失在收样时刻的“下游信号转录响应状态”概览：PI3K–AKT–mTOR 与 JAK–STAT 为跨批次最一致受抑的模块，优先作为后续与 membrane context 轴耦合/验证的候选通路；Cytoskeleton 模块总体上调提示黏附/张力与骨架重排的转录配置改变。"
  alternative_explanations: "通路分数可能同时包含 footprint 与 capacity 的贡献，且不同刺激/培养条件会改变免疫状态相关模块（如 NF-κB、JAK–STAT）的方向；因此需要结合蛋白/磷酸化 readout 或功能扰动实验来区分“转录配置变化”与“即时活性变化”。"
  summary_type: "descriptive,supportive"
  claim_supported: "EphB1 缺失在转录层面重塑多条经典下游模块，其中 PI3K–AKT–mTOR（以及 JAK–STAT）显示跨批次最一致的抑制性信号指纹，可作为解释膜环境机制轴扰动的优先候选通路集合。"
  link_to_previous: "在已观察到 membrane context 等机制轴发生跨批次改变后，本节进一步量化 EphB1 已知下游通路在收样时刻的转录响应状态，以确定后续需要优先检验的候选信号模块。"
  transition_to_next: "基于该跨批次通路状态图，我们将在后续分析中评估这些候选模块与 membrane context 轴之间的统计耦合与稳健性，并据此筛选最有希望进入湿实验验证的通路。"



# ---------- 7. AI Writing Hints（可选）：给 LLM 的写作风格提示 ----------
ai_hints:
  target_section: ["Results", "Discussion_mini", "Methods_diff"] 
    # 你希望从这个 schema 主要生成哪些部分的正文？
    # 可选值： "Results" / "Discussion_mini" / "Methods_diff"
  tone: "neutral"     
    # 写作语气： "neutral"（默认科研语气）/ "cautious"（更谨慎）/ "confident"（偏肯定）
  target_journal_style: "" 
    # 若有心仪期刊的写作风格，可以在此填入名称，仅作为“风格参考”
    # 例如："Cell Metabolism", "Nature Immunology"
  language: "zh_en_mix"
    # 你希望生成何种语言： "zh"（中文）/ "en"（英文）/ "zh_en_mix"（中英混排方便你润色）

figure_legend:
  panel: "c"
  panel_title_en: "Cross-batch EphB1 downstream pathway response state"
  panel_title_cn: "EphB1 下游通路转录响应状态（跨批次）"

  one_sentence_en: >
    Pathway-level transcriptional response scores for curated EphB1 downstream signaling modules in
    WT and Ephb1−/− primary peritoneal macrophages across three independent RNA-seq batches, summarized
    as per-batch z_pathway shifts and cross-batch meta Z effects.

  system_and_design:
    model: "Primary murine peritoneal macrophages"
    genotype_or_groups: "WT versus Ephb1−/−"
    key_treatments: "Unstimulated condition consistent with the RNA-seq experiments"
    time_window: "Single endpoint at the time of RNA collection (per batch)"

  readouts_and_assays:
    primary_readout: "EphB1 downstream signaling module response scores (z_pathway) and cross-batch meta Z"
    assay: >
      RNA-seq–based differential expression (DESeq2, batch-wise log2 fold change) followed by
      gene-set aggregation to compute pathway response scores
    normalization: >
      Pathway scores were standardized within each batch as z_pathway and integrated across batches
      using a meta Z approach to summarize directional consistency and effect magnitude

  stats:
    n_definition: "n indicates independent RNA-seq batches"
    n: "n = 3 RNA-seq batches"
    summary: "z_pathway and meta Z values displayed"
    test: "not applicable (cross-batch consistency and effect-size ranking)"
    multiple_comparisons: "not applicable"

  significance:
    symbols: "not applicable"

  extra_notes: >
    Meta Z values reflect directionally consistent shifts across batches rather than single-batch significance;
    pathway response scores represent transcriptional footprints and do not directly report kinase phosphorylation activity.    # ---------- 8. English ----------

results_skeleton_en:
  stage: T3
  purpose: "panel-level Results skeleton (pre-reduction, bilingual)"
  panel_level: results
  results_logic_type: discovery

  modules:
    M1_motivation:
      en: "Having established that EphB1 deficiency alters mitochondrial membrane lipid context and inflammasome output, we next asked whether loss of EphB1 leaves a detectable and systematic transcriptional footprint across its known downstream signaling pathways at the time of sample collection."
      cn: "在确认 EphB1 缺失会改变线粒体膜脂环境并影响炎症小体输出之后，我们进一步检验在收样时刻，EphB1 缺失是否在其已知下游信号通路中留下可检测且系统性的转录响应足迹。"
      logic_source: "question.context_from_previous + question.core_question"

    M2_level_definition:
      en: "Using RNA-seq data from multiple independent batches of WT and Ephb1−/− primary peritoneal macrophages, we quantified pathway-level transcriptional response scores based on predefined EphB1 downstream signaling gene sets, and summarized genotype-dependent shifts within each batch as standardized pathway z scores."
      cn: "基于多个独立批次 WT 与 Ephb1−/− 原代腹腔巨噬细胞的 RNA-seq 数据，我们利用预定义的 EphB1 下游信号通路基因集计算通路层面的转录响应分数，并在每个批次内以标准化的通路 z 分数概括基因型差异。"
      logic_source: "methods.readout_and_assay + question.core_question"

    M3_directional_result:
      en: "Across three RNA-seq batches, EphB1 deficiency induced reproducible directional shifts in multiple signaling modules: PI3K–AKT–mTOR pathways showed consistent negative responses (KO < WT), NF-κB/ROS and JAK–STAT was overall reduced with batch-dependent reversals, cytoskeleton-related modules were shifted in a positive direction, and other pathways exhibited weaker or inconsistent effects."
      cn: "在三个独立 RNA 批次中，EphB1 缺失在多条信号模块中引起可重复的方向性偏移：PI3K–AKT–mTOR 在各批次中总体呈负向改变（KO < WT）；NF-κB/ROS 与 JAK–STAT 总体下移但存在批次依赖的反向；Cytoskeleton 相关模块总体呈正向偏移；其余通路效应较弱或方向不一致。"
      logic_source: "results.data_direction"

    M4_robustness:
      en: "When pathway scores were integrated across batches using a meta Z approach, PI3K–AKT–mTOR and JAK–STAT displayed the highest cross-batch directional consistency and effect magnitude, whereas other modules showed smaller or batch-sensitive effects, highlighting differences in robustness rather than single-batch significance."
      cn: "在采用跨批次合并的 meta Z 方法后，PI3K–AKT–mTOR 与 JAK–STAT 表现出最高的方向一致性与效应强度；相比之下，其余模块的效应幅度较小或对批次更为敏感，强调了稳健性排序而非单批次显著性。"
      logic_source: "results.robustness_and_qc + results.stats_summary"

    M5_panel_conclusion:
      en: "Together, these analyses provide an overview of the transcriptional response state of EphB1 downstream signaling at the time of sampling, identifying PI3K–AKT–mTOR and JAK–STAT as the most consistently downregulated modules and prioritizing them as candidate pathways for subsequent coupling analyses with membrane context perturbation."
      cn: "综上，这些分析刻画了收样时刻 EphB1 下游信号网络的转录响应状态，确定 PI3K–AKT–mTOR 与 JAK–STAT 是跨批次最一致受抑的模块，并将其优先作为后续与 membrane context 机制轴耦合分析的候选通路。"
      logic_source: "results.group_difference_statement"