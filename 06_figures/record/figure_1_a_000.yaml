# ============================================================
# schema.yaml v2 — Model Panel (Conceptual / Mechanistic Diagram)
# Figure 1a：遗传筛选流程示意图
# ============================================================


meta:
  figure: "Figure 1"              # 如 "Figure 3"
  figure_id: "1a"   
  panel_type: "model"
  experiment_id: "000"
  short_title: "炎症小体遗传筛选流程示意图"
  chapter: "S1"
  role_in_paper: >
    用于说明 Ephb1 表型的发现路径，建立 Figure 1b 遗传筛选结果的实验与逻辑合法性，
    而非用于展示数据或提出机制结论。


# ---------- 1. Conceptual Goal ----------
concept_goal:
  core_message: >
    通过“输入–流程–输出”的三段式结构，概述炎症小体相关遗传筛选的整体设计逻辑。
  problem_being_explained: >
    Figure 1b 中遗传筛选结果是如何在统一条件下、通过标准化流程获得的？

# ---------- 2. Mechanistic Elements ----------
mechanism:
  key_nodes:
    - name: "pb genetic backgrounds"
      description: >
        多个独立的 pb 遗传背景品系（约 10 个），每个品系分别包含 WT 与 HO 两种基因型。
    - name: "within-strain comparison"
      description: >
        在同一遗传背景内比较 WT 与 HO 的炎症小体相关表型。
    - name: "primary macrophages"
      description: >
        从各 pb 品系获得的原代巨噬细胞，作为统一的功能检测体系。
    - name: "NLRP3 activation"
      description: >
        通过 LPS 预处理联合 Nigericin 刺激激活 NLRP3 炎症小体通路。
    - name: "pyroptosis output"
      description: >
        炎症小体激活后的效应端读出，主要以 IL-1β 释放作为定量指标。
    - name: "significance and effect size"
      description: >
        基于 WT 与 HO 在同一品系内的差异幅度及统计显著性，对候选品系进行筛选与排序。

  key_edges:
    - from: "pb genetic backgrounds"
      to: "WT vs HO comparison"
      type: "required_for"
      evidence: "Figure 1a"
    - from: "WT vs HO comparison"
      to: "inflammasome activation"
      type: "associate"
      evidence: "Figure 1a"
    - from: "inflammasome activation"
      to: "pyroptotic outputs"
      type: "promote"
      evidence: "Figure 1a"
    - from: "pyroptotic outputs"
      to: "candidate prioritization"
      type: "required_for"
      evidence: "Figure 1b"

# ---------- 3. Evidence Mapping ----------
evidence_mapping:
  supported_links:
    - mechanism_step: "WT vs HO comparison → pyroptotic outputs"
      supported_by: ["Figure 1b"]
      confidence: "high"
  speculative_links:
    - mechanism_step: "Ephb1 regulates inflammasome-dependent pyroptosis"
      rationale: >
        Ephb1 在筛选中表现出显著且可重复的炎症输出差异。
      boundary: >
        该流程图本身不用于阐明具体分子机制，相关调控关系将在后续实验中验证。

# ---------- 4. Graphical Logic ----------
visual_logic:
  flow_direction: "left-to-right"
  entry_point: "pb genetic backgrounds (WT and HO pairs)"
  exit_point: "significance and effect size"
  causal_chain:
    - "multiple pb genetic backgrounds"
    - "primary macrophages from each strain"
    - "NLRP3 inflammasome activation (LPS + Nigericin)"
    - "pyroptosis output (IL-1β release)"
    - "within-strain WT vs HO comparison"
    - "candidate prioritization"
  parallel_paths: []
  feedback_loops: []

# ---------- 5. Message Strength & Boundaries ----------
interpretation:
  what_is_certain: >
    该流程在多个 pb 遗传背景中，以原代巨噬细胞为体系，统一诱导 NLRP3 炎症小体激活并检测 IL-1β 释放。
  what_is_plausible: >
    通过在同一遗传背景内比较 WT 与 HO 的差异，可识别在炎症小体效应端具有显著表型差异的候选品系。
  what_is_unknown: >
    筛选结果本身不用于解释 Ephb1 或其他候选基因影响炎症小体功能的分子机制。
  why_model_needed: >
    该流程示意图用于帮助读者理解遗传筛选结果的来源与判定逻辑，而非展示具体实验数据。

# ---------- 6. Transition ----------
transition:
  how_it_summarizes_previous: >
    本图概括了遗传筛选的整体设计思想，为理解后续数据面板提供实验背景。
  how_it_leads_next_section: >
    基于该筛选流程，Figure 1b 展示了 Ephb1 在筛选中的具体表型结果，
    并为后续机制研究章节确定研究对象。



# ---------- 7. AI Writing Hints ----------
ai_hints:
  target_section: ["Results_intro", "Figure_legend", "Discussion_transition"]
  tone: "neutral"
  language: "zh"
  target_journal_style: "中国生物学博士论文"

# ---------- 6. figure_legend（每个 panel 一份：用于最终拼接 Figure Legends） ----------
# 设计原则：
# - 这是“投稿层”信息（允许事实：系统/条件/n/统计/归一化），但不写讨论式推理。
# - 每个 panel 只写“这个 panel 自己需要的 legend 信息”。
# - 脚本在 figure 层汇总时：
#     - Figure title 由 figure-level yaml 提供（若你之后有）；
#     - Panel legend 由这里提供并按 (a)(b)(c) 顺序拼接。
figure_legend:
  panel: "a"
  panel_title_en: "Genetic screening workflow"
  panel_title_cn: "遗传筛选流程示意"

  one_sentence_en: >
    Schematic overview of the genetic screening strategy used to identify regulators of inflammasome-associated pyroptotic output.

  system_and_design:
    model: "Primary murine peritoneal macrophages"
    genotype_or_groups: "WT and HO pairs within multiple pb genetic backgrounds"
    key_treatments: "LPS priming followed by nigericin-induced NLRP3 activation"
    time_window: "Defined stimulation window under standardized conditions"

  readouts_and_assays:
    primary_readout: "IL-1β release as a functional readout of pyroptotic output"
    assay: "Conceptual workflow schematic (no quantitative assay)"
    normalization: "Not applicable"

  stats:
    n_definition: "Not applicable"
    n: "Not applicable"
    summary: "Not applicable"
    test: "Not applicable"
    multiple_comparisons: "Not applicable"

  significance:
    symbols: "Not applicable"

  extra_notes: >
    This schematic illustrates experimental design and decision logic only and does not present quantitative data.
# ---------- 8. English ----------

results_skeleton_en:
  stage: T3
  purpose: "panel-level Results skeleton (pre-reduction, bilingual)"
  panel_level: framework
  results_logic_type: null
  modules:
    M1_motivation:
      en: "To establish the experimental and logical framework underlying the genetic screening strategy used to identify regulators of inflammasome-associated outputs."
      cn: "为建立用于鉴定炎症小体相关输出调控因子的遗传筛选实验与逻辑框架。"
      logic_source: "meta.role_in_paper + concept_goal.core_message"

    M2_level_definition:
      en: "Primary macrophages from multiple PiggyBac (PB) genetic backgrounds were subjected to standardized NLRP3 inflammasome activation, and IL-1β release was used as the functional screening readout "
      logic_source: "mechanism.key_nodes + visual_logic.causal_chain"
    M3_directional_result:
      en: "Within each genetic background, WT and EphB1-deficient macrophages were directly compared to quantify genotype-dependent differences in inflammasome-associated outputs."
      logic_source: "mechanism.key_nodes.within-strain comparison"
    M4_robustness:
      en: "This within-strain comparison strategy controls for background-specific variability and enables consistent prioritization of candidate genes based on effect size and statistical significance."
      cn: "该同背景内比较策略有效控制了遗传背景差异带来的变异性，并支持基于效应大小与统计显著性对候选基因进行一致性排序。"
      logic_source: "mechanism.key_nodes.significance and effect size"

    M5_panel_conclusion:
      en: "Having outlined the genetic-screening strategy, we next sought to identify, a candidate strain to prioritize for mechanistic dissection."
      logic_source: "evidence_mapping.speculative_links.boundary + transition.how_it_leads_next_section"