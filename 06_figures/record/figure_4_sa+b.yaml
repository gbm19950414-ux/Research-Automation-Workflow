meta:
  figure: "s4a/b"              # 如 "Figure 3"
  panel: "A"               # 如 "A"
  short_title: "BEL 降低 NAO 可染心磷脂池并收敛基因型差异"         # 1 句以内，本 panel 做了什么（如："EphB1 缺失抑制 NLRP3 介导的 IL-1β 释放"）
  chapter: "3.5 线粒体心磷脂可及性与重塑的因果实验"             # 属于哪一章/小节，如 "3.2 Mitochondrial damage during pyroptosis"
  experiment_id: "figure_5_a"       # 选填，用于和你的实验记录/脚本对应，如 "2025-03-21_NLRP3_IL1b_ELISA"
  version: 1              # 整数，用来追踪修改

assets:
  main_figure_file: ""    # 主图文件路径，如 "figures/F3/F3A_IL1b_ELISA.pdf"
  raw_data_files:         # 原始数据/整理后数据的文件路径列表
    - ""
  stats_files:            # 统计分析结果文件（R/Python 脚本输出）
    - ""
  analysis_scripts:       # 用于生成图/做统计的脚本
    - ""
  supplementary_items:    # 对应的补充图/表（若有）
    - ""                  # 如 "Figure S3B", "Table S2"

question:
  context_from_previous: "上一节发现 EphB1 缺失导致 NAO 可染 CL 池减少，提示 CL 可及性受限。"  # 与上一节的衔接（1 句）：上一节发现/提出了什么问题？
                             # 例如：“前一节结果提示 EphB1 缺失可能限制 NLRP3 炎性小体的完全激活。”
  core_question: "BEL 抑制 iPLA₂ 是否会降低 NAO 信号并抹除 WT 与 KO 的差异？"          # 本 panel 的核心科学问题（1 句，用“是否”、“如何”、“在多大程度上”等）
                             # 例如：“本节检验 EphB1 缺失是否降低 NLRP3 激活后 IL-1β 的分泌水平。”
  hypothesis_or_expectation: "若 CL 重塑/外翻微环境限制 NAO 可达性，则 BEL 处理应降低 NAO 信号并收敛基因型差异。"  # 你的假设或预期结果（1 句）
                             # 例如：“如果 EphB1 促进 NLRP3 炎性小体的效应端活性，则 EphB1 缺失应降低 IL-1β 的释放。”
  importance_reason: "通过药理学抑制 iPLA₂ 直接操控 NAO 可染心磷脂池，用于检验‘CL 可及性受限’与 GSDMD 结合/炎症小体效应之间的因果关联。"      # 为什么这个问题重要/值得单列一节（1 句即可）
                             # 例如：“IL-1β 是 NLRP3 炎性小体的关键功能 readout，用于评估效应端活性。”

rationale:
  model_and_system: "使用 WT 与 Ephb1−/− 原代腹腔巨噬细胞，以 BEL 抑制 iPLA₂β/γ，模拟 CL 重塑受阻状态。"       # 使用的模型/系统 + 选择理由
                             # 例如：“选用原代腹腔巨噬细胞，因为其对 NLRP3 激活高度敏感，且能反映体内炎症状态。”
  key_variables: "BEL 处理（+BEL vs −BEL）、基因型（WT vs KO）、NAO 荧光强度。"          # 本实验关注的关键变量 + 操纵方式
                             # 例如：“操纵基因型（WT vs Ephb1−/−）和刺激条件（LPS 预处理 + ATP/Nigericin 激活）。”
  control_logic: "未处理组用于确认基线基因型差异；BEL 处理作为因果操控，用于检验降低 NAO 可染心磷脂池是否足以使 NAO 信号整体下降并使组间差异收敛。"          # 对照设置背后的逻辑（为什么这些对照足以回答问题）
                             # 例如：“未刺激组用于定义基线 IL-1β 水平，WT 作为 Ephb1−/− 的参照组。”
  core_justification: "若 EphB1 缺失所见 NAO 下降主要反映‘NAO 可染心磷脂池/可及性’受限，则通过 BEL 抑制 iPLA₂ 诱导的 CL 重塑受阻应足以降低 NAO 信号，并在表型层面使 WT 与 KO 的差异收敛。"     # 最关键的一句“设计理由”（可直接当自动摘要用）
                             # 例如：“如果 EphB1 促进炎性小体效应端活性，则 Ephb1−/− 细胞在相同刺激下应释放更少 IL-1β。”

methods:
  inherits_from_protocol: "default_peritoneal_macrophage_general_fluorescence_assay"   # 引用全章或整篇论文的通用 protocol 名称，如 "default_peritoneal_macrophage_NLRP3_activation"
                               # 之后可在 Methods 总节详细描述该 protocol。
  biological_material: "8–12 周龄 C57BL/6 WT 与 Ephb1−/− 原代腹腔巨噬细胞。"      # 使用的生物材料/模型：动物/原代/细胞系 + 关键信息
                               # 例如：“8–12 周龄雄性 C57BL/6 WT 与 Ephb1−/− 小鼠来源的原代腹腔巨噬细胞。”
  experimental_groups: "WT/KO × ±BEL（16 h 预处理）。"      # 组别及核心差异：基因型、处理、时间点
                               # 例如：“按基因型分为 WT 和 Ephb1−/−，均接受 LPS 预处理 + ATP 激活。”
  stimuli_and_treatment: "BEL 10 µM 预处理 16 h；随后 LPS 预激 + Nigericin 激活；最后 NAO 染色。"    # 刺激/药物/处理的关键信息（种类 + 浓度 + 时间）
                               # 例如：“LPS 100 ng/mL 预处理 4 h，随后 ATP 5 mM 处理 30 min。”
  time_points: "BEL 预处理 16 h；NAO 染色 30 min。"              # 关键测定时间点（如果不在上面已写清）
  dose_info: "BEL 10 µM（不可逆 iPLA₂ 抑制剂）。"                # 若有剂量梯度，在此简要说明（如 “Alexidine 0, 1, 5, 10 μM”）
  readout_and_assay: "荧光显微镜拍摄；统一曝光；ImageJ 统一阈值定量；背景扣除。"        # 读出方式（ELISA/WB/IF/plate reader）及关键差异信息
                               # 例如：“使用 IL-1β ELISA 测定上清中 IL-1β，按厂商说明书操作。”
  replicates: "每组 n ≥ 3；≥3 批独立实验重复。"               # 生物学重复数 n，以及是否合并多次实验
                               # 例如：“每组 n = 4 生物学重复，结果合并自两次独立实验。”
  analysis_notes: "双尾 t 检验；荧光强度按未加染料孔背景扣除。"           # 本 panel 特有的分析方法/统计模型（如 normalization、配对 vs 非配对）
                               # 例如：“采用非配对双尾 t 检验；ELISA 结果按蛋白浓度归一化。”
  minimal_methods_summary: "采用 BEL 抑制 iPLA₂β/γ 后进行 NAO 染色，通过显微定量检测 CL 可达性的变化及基因型差异是否被抹除。"  # 1–2 句，把上面内容压缩成将来写 Methods 时可以直接用的一小段。

results:
  data_direction: "BEL 处理显著降低 NAO 荧光信号，提示 NAO 可染心磷脂池减少；同时 WT 与 KO 在 +BEL 条件下的 NAO 信号趋于一致，显示药理学降低 CL 可及性足以使基因型差异收敛。"           # 纯“趋势描述”，不解释机制（↑/↓/无变化 + 相对谁）
                               # 例如：“在 LPS+ATP 刺激下，Ephb1−/− 巨噬细胞释放的 IL-1β 显著低于 WT。”
  stats_summary: "与未处理组相比，BEL 处理组 NAO 显著下降（p < 0.05）；在 +BEL 条件下 WT 与 KO 之间差异为 ns（双尾 t 检验）。"            # 统计显著性信息（检验方法、p 值区间即可）
                               # 例如：“非配对 t 检验，p < 0.01。”
  key_numbers: "BEL 处理可使 NAO 信号下降约 40–50%。"              # 可选：fold change、均值±SEM、效应量（方便你之后查）
                               # 例如：“WT: 850 ± 120 pg/mL；Ephb1−/−: 410 ± 90 pg/mL；约下降 50%。”
  group_difference_statement: "在 BEL 处理后，WT 的 NAO 染色下降显著，KO 亦呈相似下降，使两者 NAO 信号趋于一致。" # 用一两句把组间差异说清楚（可直接作为结果段主句）
                                 # 例如：“与 WT 相比，Ephb1−/− 巨噬细胞在相同刺激强度下产生的 IL-1β 减少。”
  robustness_and_qc: "趋势在 ≥3 批实验中一致；显微与定量结果相互支持。"        # 是否在多批次实验中重复、是否排除了明显 outlier 等
                               # 例如：“该趋势在两批独立实验中均一致，排除 1 个基于预设准则的 outlier 后结果不变。”
  anomalies_or_limits: "个别样本 BEL 处理后荧光降低幅度略有差异，但不影响总体趋势。"      # 若有“怪点/边缘显著/批间差异”，在此简短记录（便于 Discussion）
                               # 例如：“一批实验中 WT 绝对值略低，可能与细胞密度偏低有关。”

interpretation:
  minimal_bio_interpretation: >
    BEL 抑制 iPLA₂ 所介导的脂质重塑可显著降低 NAO 可染的心磷脂池，并使 WT 与 KO 的 NAO 差异收敛，表明‘CL 可及性/NAO 可达性受限’可被药理学操控，并为 EphB1 缺失表型提供脂质层面的因果支持。
    这些数据表明，无论是改变心磷脂含量，还是干预心磷脂重塑过程，均可导致 NAO 染色水平下降，提示 NAO 可及心磷脂池的变化并不等同于心磷脂总量改变，而可由多种机制共同决定。
  alternative_explanations: "BEL 可能同时影响多种磷脂重塑过程；此外 NAO 信号主要报告‘可达/可染’的 CL 池而非 CL 总量。因此，本节结论限定为：BEL 诱导的 NAO 下降反映 CL 可及性降低，但不直接等同于 CL 总量减少。"   # 可能的其他解释/局限（方便之后写 Discussion）
                                 # 例如：“不能排除 EphB1 缺失影响前炎性细胞因子转录的可能。”
  summary_type: "supportive, elimination"               # 从下列类型中选一个或多个，用逗号分隔：
                                 #   "supportive"   支持前一节/主假设
                                 #   "descriptive"  纯描述现象
                                 #   "elimination"  排除某种机制或可能性
                                 #   "negative"     未见显著差异/阴性结果
                                 #   "exploratory"  探索性发现
                                 # 例如："supportive"
  claim_supported: "药理学降低 NAO 可染心磷脂池足以收敛 WT 与 KO 的 NAO 差异，为‘CL 可及性受限’参与 EphB1 缺失相关效应提供因果证据。"            # 本 panel 主要想支持/反驳的“文字命题”
                                 # 例如：“EphB1 是 NLRP3 炎性小体效应端活性的正调控因子。”
  link_to_previous: "在观察到 EphB1 缺失伴随 NAO 信号下降后，本节利用 BEL 作为上游脂质状态操控，验证 NAO 可染心磷脂池可被直接下调并推动表型收敛。"           # 承接上一节的句子（1 句）：上一节结果如何被本节进一步验证/延伸/修正？
                                 # 例如：“在观察到 EphB1 缺失缓解线粒体损伤后，我们进一步评估其对下游 IL-1β 释放的影响。”
  transition_to_next: "为确认脂质变化的来源，下一节将进一步评估 CL 重塑与氧化相关指标。"         # 引出下一节（1 句）：下一步要看什么/为什么自然过渡到下一节？
                                 # 例如：“为了明确这种效应是否依赖于线粒体 ROS，我们随后检测了 NLRP3 激活过程中 mtROS 的变化。”

ai_hints:
  target_section: ["Results", "Discussion_mini", "Methods_diff"] 
    # 你希望从这个 schema 主要生成哪些部分的正文？
    # 可选值： "Results" / "Discussion_mini" / "Methods_diff"
  tone: "neutral"     
    # 写作语气： "neutral"（默认科研语气）/ "cautious"（更谨慎）/ "confident"（偏肯定）
  target_journal_style: "" 
    # 若有心仪期刊的写作风格，可以在此填入名称，仅作为“风格参考”
    # 例如："Cell Metabolism", "Nature Immunology"
  language: "zh_en_mix"
    # 你希望生成何种语言： "zh"（中文）/ "en"（英文）/ "zh_en_mix"（中英混排方便你润色）

    # ---------- 8. English ----------

results_skeleton_en:
  stage: T3
  purpose: "panel-level Results skeleton (pre-reduction, bilingual)"
  panel_level: results
  results_logic_type: perturbation_response

modules:
  M1_motivation:
    en: "To further probe the determinants of the NAO-accessible cardiolipin pool, we next tested whether pharmacological perturbation of cardiolipin remodeling represents an alternative route to reduce NAO staining intensity."
    cn: "为进一步解析决定 NAO 可及心磷脂池的因素，我们进一步检验，针对心磷脂重塑过程的药理学干预是否构成另一条降低 NAO 染色强度的途径。"
    logic_source: "question.context_from_previous + question.core_question"

  M2_level_definition:
    en: "WT and Ephb1−/− primary peritoneal macrophages were pretreated with BEL, followed by NAO staining under identical imaging conditions, and cardiolipin-associated fluorescence intensity was quantified using uniform exposure and thresholding parameters."
    cn: "对 WT 与 Ephb1−/− 原代腹腔巨噬细胞进行 BEL 预处理后实施 NAO 染色，并在统一曝光与阈值条件下定量分析心磷脂相关荧光强度。"
    logic_source: "methods.readout_and_assay + question.core_question"

  M3_directional_result:
    en: "BEL treatment led to a marked reduction in NAO fluorescence intensity, indicating that pharmacological interference with cardiolipin remodeling is sufficient to decrease the NAO-accessible cardiolipin pool."
    cn: "BEL 处理显著降低 NAO 荧光强度，表明通过药理学干预心磷脂重塑过程即可减少 NAO 可及的心磷脂池。"
    logic_source: "results.data_direction"

  M4_robustness:
    en: "This reduction in NAO staining was consistently observed across independent experimental batches and reached statistical significance relative to untreated controls."
    cn: "该 NAO 染色下降在多批次独立实验中稳定复现，并相对于未处理对照达到统计学显著性。"
    logic_source: "results.robustness_and_qc + results.stats_summary"

  M5_panel_conclusion:
    en: "Together with perturbations targeting cardiolipin abundance, these results show that both manipulation of cardiolipin content and interference with cardiolipin remodeling can reduce NAO staining, indicating that changes in the NAO-accessible cardiolipin pool can arise through multiple mechanisms beyond alterations in total cardiolipin levels."
    cn: "结合针对心磷脂含量的操控结果，这些数据表明，无论是改变心磷脂含量，还是干预心磷脂重塑过程，均可导致 NAO 染色水平下降，提示 NAO 可及心磷脂池的变化并不等同于心磷脂总量改变，而可由多种机制共同决定。"
    logic_source: "results.group_difference_statement"