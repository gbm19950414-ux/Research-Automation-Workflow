  short_title: "EphB1 缺失不影响 TNF-α/IL-6 的经典分泌"
  chapter: "EphB1 缺失不影响 NLRP3 炎症小体 priming–ASC–caspase-1 激活，差异集中在 GSDMD 膜孔形成/内容物外排环节"
  experiment_id: "figure_2_a"
