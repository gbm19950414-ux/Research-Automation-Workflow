question:
  context_from_previous: “在确认转录性 priming 未受影响后，需要进一步排除 EphB1 缺失导致的‘普遍分泌能力下降’，以避免将 IL-1β 的变化误判为经典分泌缺陷。”
  core_question: "EphB1 缺失是否会造成经典分泌（TNF-α/IL-6）能力的全局性削弱？"
  hypothesis_or_expectation: "若 EphB1 缺失的作用点位于 GSDMD 执行端，而非上游 priming 或分泌机械，则经典分泌途径不应受影响。"
  importance_reason: "排除普遍分泌缺陷是明确炎症小体/焦亡特异性差异的前提。"

rationale:
  model_and_system: "使用 WT 与 EphB1−/− 原代腹腔巨噬细胞，因为该系统 TLR4-NF-κB 经典炎症反应稳定、可重复。"
  key_variables: "比较 WT vs KO 在 LPS 刺激下 TNF-α 与 IL-6 的经典分泌能力。"
  control_logic: >
    IL-1β 的成熟和分泌依赖 caspase-1 的切割及 GSDMD 形成的膜孔，因此在焦亡受抑制的条件下，其上清浓度预期会显著下降。
    而IL-6（2h）与 TNF-α（4h）分别代表不同时间窗口的经典分泌，不依赖焦亡执行；
    未见差异可排除普遍分泌不足。
  core_justification: "若 EphB1 缺失不影响经典分泌，则炎症小体/焦亡相关的释放缺陷更可能源自 GSDMD 下游膜事件。"

methods:
  inherits_from_protocol: "default_TLR4_cytokine_release"
  biological_material: "8–12 周龄 C57BL/6 WT 与 EphB1−/− 小鼠原代腹腔巨噬细胞。"
  experimental_groups: "WT 与 KO，均接受单一 LPS 刺激。"
  stimuli_and_treatment: "LPS（100 ng/mL），分别在 2h（检测 IL-6）与 4h（检测 TNF-α）收集上清。"
  time_points: "IL-6：2h；TNF-α：4h。"
  dose_info:  "LPS 100 ng/mL"
  readout_and_assay: "使用商业 ELISA 试剂盒定量 TNF-α 与 IL-6；检测信号经空白孔与 480 nm 背景双重扣除，并以 MTT 结果对细胞数量归一化。"
  replicates: "每组 n ≥ 3，≥3 次独立实验重复。"
  analysis_notes: "双尾非配对 t 检验；数据表示为均值 ± SD。"
  minimal_methods_summary: "原代巨噬细胞经 LPS 刺激后于不同时间点收集上清，通过 ELISA 测量 TNF-α/IL-6，并以 MTT 归一化细胞数量。"

results:
  data_direction: "LPS 刺激后 TNF-α 与 IL-6 在 WT 与 KO 中均上升；KO 略低但无显著性差异。"
  stats_summary: "双尾 t 检验，均无显著性差异（ns）。"
  key_numbers: ""
  group_difference_statement: "EphB1 缺失不影响 LPS 诱导的 TNF-α/IL-6 分泌能力。"
  robustness_and_qc: "趋势在 ≥3 次独立实验中均一致；数据经双重背景扣除与 MTT 校正。"
  anomalies_or_limits: "KO 绝对值略低但趋势不稳定，与细胞密度轻微差异相关。"

interpretation:
  minimal_bio_interpretation: "结果表明 EphB1 缺失未造成经典分泌的普遍性缺陷。"
  alternative_explanations: "不排除更长刺激时间或更强强度下可能出现轻微差异。"
  summary_type: "negative, elimination"
  claim_supported: "EphB1 缺失不影响 TLR4 介导的经典分泌途径。"
  link_to_previous: "在明确焦亡受抑制后，本节排除了上游经典分泌不足的可能性。"
  transition_to_next: “下一步在炎症小体特异条件下比较 IL-1β 释放，并结合 ASC 寡聚化、caspase-1/GSDMD 加工与上清释放等 readout，逐层定位瓶颈是否位于 GSDMD 孔介导外排的执行层。”

ai_hints:
  target_section: ["Results", "Discussion_mini", "Methods_diff"]
  tone: "neutral"
  target_journal_style: "Cell Metabolism"
  language: "zh_en_mix"


# ---------- 6. figure_legend（每个 panel 一份：用于最终拼接 Figure Legends） ----------
# 设计原则：
# - 这是“投稿层”信息（允许事实：系统/条件/n/统计/归一化），但不写讨论式推理。
# - 每个 panel 只写“这个 panel 自己需要的 legend 信息”。
# - 脚本在 figure 层汇总时：
#     - Figure title 由 figure-level yaml 提供（若你之后有）；
#     - Panel legend 由这里提供并按 (a)(b)(c) 顺序拼接。
figure_legend:
  panel: "c"
  panel_title_en: "Classical cytokine secretion"
  panel_title_cn: "经典炎症因子的分泌"

  one_sentence_en: >
    TNF-α and IL-6 secretion from WT and EphB1-deficient primary peritoneal macrophages following LPS stimulation at defined time points.

  system_and_design:
    model: "Primary murine peritoneal macrophages"
    genotype_or_groups: "WT versus EphB1 PB−/− (KO)"
    key_treatments: "LPS stimulation (100 ng/mL)"
    time_window: "Supernatants collected at 2 h for IL-6 and 4 h for TNF-α after stimulation"

  readouts_and_assays:
    primary_readout: "TNF-α and IL-6 release in culture supernatants"
    assay: "ELISA"
    normalization: >
      ELISA signals were background-subtracted using blank wells and 480 nm readings
      and normalized to cell number based on MTT measurements

  stats:
    n_definition: "n indicates biologically independent samples"
    n: "n ≥ 3 per group; results reproduced in ≥3 independent experiments"
    summary: "mean ± SD"
    test: "two-tailed unpaired t-test"
    multiple_comparisons: "none"

  significance:
    symbols: "* P < 0.05, ** P < 0.01, *** P < 0.001; ns, not significant"

  extra_notes: ""
  # ---------- 8. English ----------

results_skeleton_en:
  stage: T3
  purpose: "panel-level Results skeleton (pre-reduction, bilingual)"
  panel_level: results
  results_logic_type: elimination

  modules:
    M1_motivation:
      en: "Following confirmation that transcriptional priming remains intact, we next asked whether the reduced IL-1β output observed upon EphB1 deficiency could be attributed to a generalized impairment of classical cytokine secretion."
      cn: "在确认转录性 priming 未受影响后，我们进一步检验 EphB1 缺失所致的 IL-1β 输出降低是否源于经典分泌能力的普遍性受损。"
      logic_source: "question.context_from_previous + question.core_question"

    M2_level_definition:
      en: "Classical secretion was assessed by quantifying TNF-α and IL-6 release from WT and EphB1-deficient primary peritoneal macrophages following LPS stimulation at defined time points using ELISA."
      cn: "通过 ELISA 定量检测 WT 与 EphB1 缺失原代腹腔巨噬细胞在 LPS 刺激后不同时间点的 TNF-α 与 IL-6 释放水平，以评估经典分泌能力。"
      logic_source: "methods.readout_and_assay + question.core_question"

    M3_directional_result:
      en: "LPS stimulation induced robust increases in both TNF-α and IL-6 in WT and EphB1-deficient macrophages, with no significant genotype-dependent differences observed."
      cn: "LPS 刺激在 WT 与 EphB1 缺失巨噬细胞中均诱导了显著的 TNF-α 与 IL-6 分泌，且未观察到基因型依赖的显著差异。"
      logic_source: "results.data_direction"

    M4_robustness:
      en: "These responses were consistent across independent experiments and remained non-significant after dual background subtraction and normalization to cell number."
      cn: "上述结果在多次独立实验中保持一致，并在完成双重背景扣除及细胞数量归一化后仍未达到统计学显著性。"
      logic_source: "results.robustness_and_qc + results.stats_summary"

    M5_panel_conclusion:
      en: "Thus, EphB1 deficiency does not measurably impair TLR4-driven classical secretion of TNF-α or IL-6, excluding a generalized secretory defect as the basis for reduced inflammasome-associated outputs."
      cn: "因此，EphB1 缺失并未显著影响 TLR4 介导的 TNF-α 或 IL-6 经典分泌，排除了普遍分泌缺陷作为炎症小体相关输出降低原因的可能性。"
      logic_source: "results.group_difference_statement"