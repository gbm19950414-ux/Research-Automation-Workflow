# ============================================================
# schema.yaml v2  ——  单个 panel 的结构化写作模版
# 目标：让 AI 在几乎不需要补充信息的前提下，生成：
#   - 结果段（Results）
#   - 简短讨论/过渡段（Mini Discussion / Transition）
#   - Methods 中本实验的“差异性信息”
# ============================================================

# ---------- 0. Meta & Assets：基本信息 ----------
meta:
  figure: "Figure 4"              # 如 "Figure 3"
  figure_id: "4a/b"             # 如 "A"
  short_title: "EphB1 缺失降低 NAO 标记的心磷脂池"         # 1 句以内，本 panel 做了什么（如："EphB1 缺失抑制 NLRP3 介导的 IL-1β 释放"）
  chapter: "3.4 EphB1 缺失影响线粒体心磷脂环境"             # 属于哪一章/小节，如 "3.2 Mitochondrial damage during pyroptosis"
  experiment_id: "figure_4_c"       # 选填，用于和你的实验记录/脚本对应，如 "2025-03-21_NLRP3_IL1b_ELISA"
  version: 1              # 整数，用来追踪修改
  claim: 
  evidence_level: #existence / association / positioning / necessity / sufficiency / rescue
  causal_strength: #correlational / suggestive / causal
  scope: #cell type、stimulus、time window
  alt_explanations: 
assets:
  main_figure_file: ""    # 主图文件路径，如 "figures/F3/F3A_IL1b_ELISA.pdf"
  raw_data_files:         # 原始数据/整理后数据的文件路径列表
    - ""
  stats_files:            # 统计分析结果文件（R/Python 脚本输出）
    - ""
  analysis_scripts:       # 用于生成图/做统计的脚本
    - ""
  supplementary_items:    # 对应的补充图/表（若有）
    - ""                  # 如 "Figure S3B", "Table S2"

# ---------- 1. Scientific Question：本节要回答什么 ----------
question:
  context_from_previous: "上一节确认 ΔΨm 与线粒体数量均未显著改变，因此可排除 NAO 差异由膜电位或线粒体丰度引起。"  # 与上一节的衔接（1 句）：上一节发现/提出了什么问题？
                             # 例如：“前一节结果提示 EphB1 缺失可能限制 NLRP3 炎性小体的完全激活。”
  core_question: "EphB1 缺失是否降低在线粒体膜中可被 NAO 标记的心磷脂（CL）池容量？"          # 本 panel 的核心科学问题（1 句，用“是否”、“如何”、“在多大程度上”等）
                             # 例如：“本节检验 EphB1 缺失是否降低 NLRP3 激活后 IL-1β 的分泌水平。”
  hypothesis_or_expectation: >
    NAO（10-N-nonyl acridine orange）在线粒体内膜与阴离子脂质（对 CL 亲和最高）形成复合后荧光增强/谱移。NAO的染色强度受到多种因素影响，包括CL的丰度、分布、氧化/重塑状态及线粒体膜电位。NAO 信号提示在当下刺激条件下可染/可达/可复合的 CL 池容量。在控制ΔΨm与线粒体质量后，该读数与 GSDMD 的膜结合正相关。在上一小节中，我们对线粒体膜电位进行监测，发现KO的线粒体膜电位未发生显著改变，这使得NAO可以用来检测线粒体膜中CL的含量。
    "若 EphB1 缺失影响 CL 可及性或膜脂环境，则 NAO 荧光强度应显著下降。" 
  importance_reason: "CL 是 GSDMD-NT 膜结合的关键脂质，其可染性变化可直接反映孔形成阶段的膜脂环境。"      # 为什么这个问题重要/值得单列一节（1 句即可）
                             # 例如：“IL-1β 是 NLRP3 炎性小体的关键功能 readout，用于评估效应端活性。”

# ---------- 2. Rationale / Design Logic：为什么这样设计 ----------
rationale:
  model_and_system: "使用 WT 与 Ephb1-deficient 原代腹腔巨噬细胞，可反映突变在生理条件下对线粒体膜脂状态的影响。"       # 使用的模型/系统 + 选择理由
                             # 例如：“选用原代腹腔巨噬细胞，因为其对 NLRP3 激活高度敏感，且能反映体内炎症状态。”
  key_variables: "NAO 荧光强度、NAO/Δψm、显微与板读两种 readout 均用于评估 CL 可达性/可复合性。"          # 本实验关注的关键变量 + 操纵方式
                             # 例如：“操纵基因型（WT vs Ephb1-deficient）和刺激条件（LPS 预处理 + ATP/Nigericin 激活）。”
  control_logic: "使用固定曝光显微成像与背景扣除板读确保跨方法可比性。"          # 对照设置背后的逻辑（为什么这些对照足以回答问题）
                             # 例如：“未刺激组用于定义基线 IL-1β 水平，WT 作为 Ephb1-deficient 的参照组。”
  core_justification: "若 NAO 信号下降在 Δψm 校正后仍成立，则差异来源于 CL 池本身，而非电位或线粒体质量变化。"     # 最关键的一句“设计理由”（可直接当自动摘要用）
                             # 例如：“如果 EphB1 促进炎性小体效应端活性，则 Ephb1-deficient 细胞在相同刺激下应释放更少 IL-1β。”

# ---------- 3. Methods（差异性信息）：只写本 panel 特有的 ----------
methods:
  inherits_from_protocol: "default_peritoneal_macrophage_general_fluorescence_assay"   # 引用全章或整篇论文的通用 protocol 名称，如 "default_peritoneal_macrophage_NLRP3_activation"
                               # 之后可在 Methods 总节详细描述该 protocol。
  biological_material: "8–12 周龄 C57BL/6 WT 与 Ephb1-deficient 原代腹腔巨噬细胞。"      # 使用的生物材料/模型：动物/原代/细胞系 + 关键信息
                               # 例如：“8–12 周龄雄性 C57BL/6 WT 与 Ephb1-deficient 小鼠来源的原代腹腔巨噬细胞。”
  experimental_groups: "WT vs Ephb1-deficient；细胞数量严格等量接种。"      # 组别及核心差异：基因型、处理、时间点
                               # 例如：“按基因型分为 WT 和 Ephb1-deficient，均接受 LPS 预处理 + ATP 激活。”
  stimuli_and_treatment: "NAO 200 nM 染色 30 min；未加 nigericin。"    # 刺激/药物/处理的关键信息（种类 + 浓度 + 时间）
                               # 例如：“LPS 100 ng/mL 预处理 4 h，随后 ATP 5 mM 处理 30 min。”
  time_points: "显微 30 min 固定时间点；板读 0、5、10、24、48 min。"              # 关键测定时间点（如果不在上面已写清）
  dose_info: "NAO 200 nM"                # 若有剂量梯度，在此简要说明（如 “Alexidine 0, 1, 5, 10 μM”）
  readout_and_assay: "显微镜统一曝光/增益，ImageJ 统一阈值定量；板读进行未加染料孔背景扣除；计算 NAO/Δψm。"        # 读出方式（ELISA/WB/IF/plate reader）及关键差异信息
                               # 例如：“使用 IL-1β ELISA 测定上清中 IL-1β，按厂商说明书操作。”
  replicates: "每组 n ≥ 3；≥3 次独立实验重复。"               # 生物学重复数 n，以及是否合并多次实验
                               # 例如：“每组 n = 4 生物学重复，结果合并自两次独立实验。”
  analysis_notes: "荧光以背景扣除后值归一化；Δψm;双尾 t 检验评估差异。"           # 本 panel 特有的分析方法/统计模型（如 normalization、配对 vs 非配对）
                               # 例如：“采用非配对双尾 t 检验；ELISA 结果按蛋白浓度归一化。”
  minimal_methods_summary: "WT 与 KO 巨噬细胞以 NAO 染色检测 CL 可染性"  # 1–2 句，把上面内容压缩成将来写 Methods 时可以直接用的一小段。

# ---------- 4. Results：把图变成结构化文字 ----------
results:
  data_direction: "KO 细胞的 NAO 荧光显著低于 WT，显微图像与板读曲线均显示 CL 可染池减少。"           # 纯“趋势描述”，不解释机制（↑/↓/无变化 + 相对谁）
                               # 例如：“在 LPS+ATP 刺激下，Ephb1-deficient 巨噬细胞释放的 IL-1β 显著低于 WT。”
  stats_summary: "显微 NAO：KO 下降约 40%，p < 0.05；板读 0–48 min：KO 全程显著低于 WT（p < 0.05）。"            # 统计显著性信息（检验方法、p 值区间即可）
                               # 例如：“非配对 t 检验，p < 0.01。”
  key_numbers: "NAO 荧光降低约 40%；Δψm 校正后差异仍持续。"              # 可选：fold change、均值±SEM、效应量（方便你之后查）
                               # 例如：“WT: 850 ± 120 pg/mL；Ephb1-deficient: 410 ± 90 pg/mL；约下降 50%。”
  group_difference_statement: "EphB1 缺失在线粒体膜中显著降低可被 NAO 标记的心磷脂池容量，即使在 Δψm 校正后仍成立。" # 用一两句把组间差异说清楚（可直接作为结果段主句）
                                 # 例如：“与 WT 相比，Ephb1-deficient 巨噬细胞在相同刺激强度下产生的 IL-1β 减少。”
  robustness_and_qc: "趋势在显微与板读中一致；在 ≥3 批次实验均稳定复现。"        # 是否在多批次实验中重复、是否排除了明显 outlier 等
                               # 例如：“该趋势在两批独立实验中均一致，排除 1 个基于预设准则的 outlier 后结果不变。”
  anomalies_or_limits: "部分样本在后期时间点存在轻微噪声，但总体趋势不受影响。"      # 若有“怪点/边缘显著/批间差异”，在此简短记录（便于 Discussion）
                               # 例如：“一批实验中 WT 绝对值略低，可能与细胞密度偏低有关。”

# ---------- 5. Interpretation & Role in Chapter：怎么理解 + 在整章中的作用 ----------
interpretation:
  minimal_bio_interpretation: "EphB1 缺失降低可染 CL 池，提示线粒体膜脂可及性或质量（氧化/重塑）受损。" # 在不过度拔高的前提下，用 1–2 句解释结果“生物学含义”
                                 # 例如：“这些结果提示 EphB1 对 NLRP3 介导的 IL-1β 释放是促进性的。”
  alternative_explanations: "尽管 NAO 受多因素影响，但 Δψm 与线粒体数量均无差异，加上脂质组学一致下调支持 CL 池本身减少。"   # 可能的其他解释/局限（方便之后写 Discussion）
                                 # 例如：“不能排除 EphB1 缺失影响前炎性细胞因子转录的可能。”
  summary_type: "supportive, exploratory"               # 从下列类型中选一个或多个，用逗号分隔：
                                 #   "supportive"   支持前一节/主假设
                                 #   "descriptive"  纯描述现象
                                 #   "elimination"  排除某种机制或可能性
                                 #   "negative"     未见显著差异/阴性结果
                                 #   "exploratory"  探索性发现
                                 # 例如："supportive"
  claim_supported: "EphB1 缺失降低线粒体膜中可被 NAO 标记的心磷脂池容量。"            # 本 panel 主要想支持/反驳的“文字命题”
                                 # 例如：“EphB1 是 NLRP3 炎性小体效应端活性的正调控因子。”
  link_to_previous: "在确认 Δψm 与线粒体质量未变后，本节进一步显示 CL 可达性下降。"           # 承接上一节的句子（1 句）：上一节结果如何被本节进一步验证/延伸/修正？
                                 # 例如：“在观察到 EphB1 缺失缓解线粒体损伤后，我们进一步评估其对下游 IL-1β 释放的影响。”
  transition_to_next: "随后将通过定量脂质组学直接测量 CL 总量与组成，以验证 NAO 差异的脂质基础。"         # 引出下一节（1 句）：下一步要看什么/为什么自然过渡到下一节？
                                 # 例如：“为了明确这种效应是否依赖于线粒体 ROS，我们随后检测了 NLRP3 激活过程中 mtROS 的变化。”

# ---------- 6. AI Writing Hints（可选）：给 LLM 的写作风格提示 ----------
ai_hints:
  target_section: ["Results", "Discussion_mini", "Methods_diff"] 
    # 你希望从这个 schema 主要生成哪些部分的正文？
    # 可选值： "Results" / "Discussion_mini" / "Methods_diff"
  tone: "neutral"     
    # 写作语气： "neutral"（默认科研语气）/ "cautious"（更谨慎）/ "confident"（偏肯定）
  target_journal_style: "" 
    # 若有心仪期刊的写作风格，可以在此填入名称，仅作为“风格参考”
    # 例如："Cell Metabolism", "Nature Immunology"
  language: "zh_en_mix"
    # 你希望生成何种语言： "zh"（中文）/ "en"（英文）/ "zh_en_mix"（中英混排方便你润色）


# ---------- 6. figure_legend (shared; Figure 4a/b) ----------
figure_legend:
  one_sentence_en: >
    NAO-associated fluorescence measured by imaging analysis in primary peritoneal macrophages under unstimulated conditions, comparing WT and EphB1-deficient cells.

  system_and_design:
    model: "Primary murine peritoneal macrophages (8–12-week-old C57BL/6 WT and Ephb1-deficient mice)"
    genotype_or_groups: "WT versus Ephb1-deficient"
    key_treatments: "NAO staining (200 nM, 30 min); no nigericin"
    time_window: "Microscopy at 30 min; plate-reader acquisition at 0, 5, 10, 24, and 48 min"

  readouts_and_assays:
    primary_readout: "NAO fluorescence as a readout of the NAO-detectable cardiolipin pool"
    assay: "Fixed-exposure fluorescence imaging and plate-reader fluorescence measurement"
    normalization: >
      Imaging quantification used identical exposure/gain and unified ImageJ thresholding; plate-reader signals
      were background-subtracted using no-dye wells. Where indicated, NAO signals were additionally expressed
      as NAO/Δψm using matched Δψm measurements.

  stats:
    n_definition: "n indicates biologically independent samples"
    n: "n ≥ 3 per group; results reproduced in ≥3 independent experiments"
    summary: "mean ± SEM"
    test: "two-tailed unpaired t-test"
    multiple_comparisons: "none"

  significance:
    symbols: "* P < 0.05, ** P < 0.01, *** P < 0.001; ns, not significant"

  extra_notes: ""


# ---------- panel-specific overrides ----------
panel_overrides:
  a:
    panel_title_en: "NAO imaging quantification"
    panel_title_cn: "NAO 显微成像定量"
    displayed_targets:
      - "Representative NAO fluorescence images (fixed exposure)"
      - "Imaging-based NAO intensity quantification"

  b:
    panel_title_en: "Time-resolved NAO plate-reader signal"
    panel_title_cn: "NAO 板读时间曲线"
    displayed_targets:
      - "Plate-reader NAO fluorescence time course (0–48 min)"
      - "Background-subtracted NAO signal (and NAO/Δψm if shown)"
    # ---------- 8. English ----------

results_skeleton_en:
  stage: T3
  purpose: "panel-level Results skeleton (pre-reduction, bilingual)"
  panel_level: results
  results_logic_type: localization

  modules:
    M1_motivation:
      en: "We asked whether EphB1 deficiency reduces the pool of cardiolipin that is detectable by NAO within the mitochondrial membrane."
      cn: "我们检验 EphB1 缺失是否降低线粒体膜中可被 NAO 检测到的心磷脂池容量。"
      logic_source: "question.context_from_previous + question.core_question"

    M2_level_definition:
      en: "WT and Ephb1-deficient primary peritoneal macrophages were stained with NAO under identical conditions, and NAO-associated fluorescence was quantified using fixed-exposure confocal imaging as well as time-resolved plate-reader measurements with no-dye wells for background subtraction."
      cn: "在相同条件下对 WT 与 Ephb1-deficient 原代腹腔巨噬细胞进行 NAO 染色，并通过固定曝光的共聚焦成像与时间分辨板读两种方式定量 NAO 相关荧光信号；板读使用未加染料孔进行背景扣除。"
      logic_source: "methods.readout_and_assay + question.core_question"

    M3_directional_result:
      en: "Ephb1-deficient macrophages displayed significantly lower NAO fluorescence than WT cells, indicating a reduced NAO-detectable cardiolipin pool"
      cn: "无论在显微成像还是板读检测中，Ephb1-deficient 巨噬细胞的 NAO 荧光信号均显著低于 WT，提示 NAO 可检测的心磷脂池减少。"
      logic_source: "results.data_direction"

    M4_robustness:
      en: "This decrease was consistently observed across multiple time points and independent experimental batches, and the concordant direction across two measurement modalities supports robustness of the phenotype."
      cn: "该下降趋势在多个时间点及多批次独立实验中稳定复现，且两种检测方式方向一致，支持该表型的稳健性。"
      logic_source: "results.robustness_and_qc + results.stats_summary"

    M5_panel_conclusion:
      en: # "Together, these results show that EphB1 deficiency is associated with a significant reduction in NAO fluorescence, indicating a decreased NAO-detectable cardiolipin pool in the mitochondrial membrane under conditions where baseline mitochondrial membrane potential is unchanged."
      logic_source: "results.group_difference_statement"