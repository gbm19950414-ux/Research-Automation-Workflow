meta:
  figure: "2a/b"
  short_title: "EphB1 缺失不影响炎症小体第一信号（priming）的转录程序"
  experiment_id: "figure_2_b"
  version: 1

assets:
  main_figure_file: "figures/F3/F3_5_priming_qPCR.pdf"
  raw_data_files:
    - "data/qPCR/priming_raw_ct.csv"
  stats_files:
    - "stats/priming_qPCR_stats.csv"
  analysis_scripts:
    - "scripts/figure_3_5_priming_qPCR.R"
  supplementary_items:
    - ""

question:

  context_from_previous: "为了定位 EphB1 在炎症小体通路中的作用节点，需首先排除其对第一信号 priming 的影响。"
  core_question: "EphB1 缺失是否影响第一信号（TLR4-NF-κB 介导的 priming）相关基因的转录水平？"
  hypothesis_or_expectation: "若 EphB1 缺失的效应点位于 priming 之后，则 TNF-α、IL-6、IL-1β 等基因的转录水平应保持正常。"
  importance_reason: "判定第一信号是否完好是进一步定位 EphB1 在炎症小体通路中作用节点的关键步骤。"

rationale:
  model_and_system: "使用 WT 与 EphB1−/− 原代腹腔巨噬细胞，并以 LPS 激活 TLR4-NF-κB 途径，是研究经典 priming 程序最标准的模型。"
  key_variables: "基因型（WT vs KO）与 LPS 作用时间。"
  control_logic: "时间序列可精准监测 priming 的动态变化；若所有基因曲线趋势一致，则可排除转录层级的差异。"
  core_justification: "若 EphB1 缺失不影响 priming 基因的诱导，则其在炎症小体通路中的作用更可能位于第二信号之后。"

methods:
  inherits_from_protocol: "default_TLR4_priming_qPCR"
  biological_material: "8–12 周龄 C57BL/6 WT 与 EphB1−/− 小鼠原代腹腔巨噬细胞。"
  experimental_groups: "WT 与 KO；均接受 LPS 刺激，并采样。"
  stimuli_and_treatment: "LPS（100 ng/mL）刺激后裂解收集 RNA。"
  time_points: ""
  dose_info: ""
  readout_and_assay: "qPCR 检测 Tnf、Il6、Il1b mRNA；使用 GAPDH 作为内参；ΔCt → ΔΔCt → log2FC。"
  replicates: "每组 n ≥ 3；趋势在 ≥3 次独立实验中重复获得。"
  analysis_notes: "双尾 t 检验；以 WT 组均值为基准。"
  minimal_methods_summary: "原代巨噬细胞经 LPS 刺激不同时间点收集 RNA，经 qPCR 分析 TNF-α、IL-6、IL-1β的转录性 priming。"

results:
  data_direction: "Tnf、Il6、Il1b 在 LPS 刺激下均上升；KO 相对 WT 各时间点转录水平均未见显著差异。"
  stats_summary: "双尾 t 检验均为 ns。"
  key_numbers: ""
  group_difference_statement: "EphB1 缺失不影响经典 TLR4 介导的第一信号转录性 priming。"
  robustness_and_qc: "趋势在 ≥3 次独立实验中一致；Ct 值经 GAPDH 归一化；全部样品均通过熔解曲线与无模板对照质控。"
  anomalies_or_limits: "少数样本在 4h 时点略低，但无统计学意义，与生物变异相关。"

interpretation:
  minimal_bio_interpretation: "EphB1 缺失并未损伤炎症小体第一信号的转录激活程序。"
  alternative_explanations: "不能完全排除在更早（≤30 min）或更晚（≥8 h）的时点存在细微差异。"
  summary_type: "negative, elimination"
  claim_supported: "EphB1 缺失不影响 TLR4-NF-κB 介导的转录性 priming 程序。"
  link_to_previous: "继排除普遍分泌缺陷后，本节进一步排除了第一信号 priming 异常。"
  transition_to_next: "下一步检测 ASC 聚集与 caspase-1 激活以定位差异是否出现在第二信号阶段。"

ai_hints:
  target_section: ["Results", "Discussion_mini", "Methods_diff"]
  tone: "neutral"
  target_journal_style: "Cell Metabolism"
  language: "zh_en_mix"


results_skeleton_en:
  stage: T3
  purpose: "panel-level Results skeleton (pre-reduction, bilingual)"
  panel_level: results
  results_logic_type: elimination

  modules:
    M1_motivation:
      en: "To localize the point at which EphB1 influences inflammasome output, we first examined whether EphB1 deficiency alters transcriptional priming downstream of TLR4–NF-κB signaling."
      cn: "为定位 EphB1 在炎症小体通路中的作用节点，我们首先检验 EphB1 缺失是否影响 TLR4–NF-κB 下游的转录性 priming。"
      logic_source: "question.context_from_previous + question.core_question"

    M2_level_definition:
      en: "Transcriptional priming was assessed by qPCR analysis of Tnf, Il6, and Il1b mRNA levels in WT and EphB1-deficient primary peritoneal macrophages following LPS stimulation."
      cn: "通过 qPCR 检测 WT 与 EphB1 缺失原代腹腔巨噬细胞在 LPS 刺激后的 Tnf、Il6 与 Il1b mRNA 水平，以评估转录性 priming。"
      logic_source: "methods.readout_and_assay + question.core_question"

    M3_directional_result:
      en: "LPS stimulation induced robust and comparable increases in Tnf, Il6, and Il1b transcripts in WT and EphB1-deficient macrophages across all examined time points."
      cn: "在所有检测时间点，LPS 刺激均在 WT 与 EphB1 缺失巨噬细胞中诱导了幅度相当的 Tnf、Il6 与 Il1b 转录上调。"
      logic_source: "results.data_direction"

    M4_robustness:
      en: "These transcriptional responses were reproducible across independent experiments and showed no statistically significant differences between genotypes."
      cn: "上述转录反应在多次独立实验中具有良好重复性，且不同基因型之间均未观察到统计学显著差异。"
      logic_source: "results.robustness_and_qc + results.stats_summary"

    M5_panel_conclusion:
      en: "Together, these data indicate that EphB1 deficiency does not impair TLR4–NF-κB–dependent transcriptional priming, excluding defective first-signal activation as the cause of reduced inflammasome output."
      cn: "综上，这些结果表明 EphB1 缺失并不影响 TLR4–NF-κB 依赖的转录性 priming，从而排除了第一信号受损导致炎症小体输出降低的可能性。"
      logic_source: "results.group_difference_statement"      
