# ============================================================
# schema.yaml v2  ——  单个 panel 的结构化写作模版
# 目标：让 AI 在几乎不需要补充信息的前提下，生成：
#   - 结果段（Results）
#   - 简短讨论/过渡段（Mini Discussion / Transition）
#   - Methods 中本实验的“差异性信息”
# ============================================================

# ---------- 0. Meta & Assets：基本信息 ----------
meta:
  figure: "Figure 3"              # 如 "Figure 3"
  figure_id: "3a+b+c+d+e+f+g+h"
  short_title: "EphB1 缺失减缓炎症小体激活期 ROS 上升并在基线条件下对线粒体膜电位影响有限"
  chapter: "3.3 EphB1 缺失降低 GSDMD 的线粒体结合"
  experiment_id: "figure_3_b"
  version: 1              # 整数，用来追踪修改
  claim: 
  evidence_level: #existence / association / positioning / necessity / sufficiency / rescue
  causal_strength: #correlational / suggestive / causal
  scope: #cell type、stimulus、time window
  alt_explanations: 
assets:
  main_figure_file: ""    # 主图文件路径，如 "figures/F3/F3A_IL1b_ELISA.pdf"
  raw_data_files:         # 原始数据/整理后数据的文件路径列表
    - ""
  stats_files:            # 统计分析结果文件（R/Python 脚本输出）
    - ""
  analysis_scripts:       # 用于生成图/做统计的脚本
    - ""
  supplementary_items:    # 对应的补充图/表（若有）
    - ""                  # 如 "Figure S3B", "Table S2"

# ---------- 1. Scientific Question：本节要回答什么 ----------
question:
  context_from_previous: "在将瓶颈定位到炎症小体装配与 caspase-1 激活之后的执行阶段后"
  core_question: >
    "EphB1 缺失是否影响炎症小体激活过程中细胞质 ROS 上升与线粒体膜电位变化？"
    "在未激活炎症小体的静息条件下，EphB1 缺失是否已造成线粒体膜电位（ΔΨm）的固有差异？"
  hypothesis_or_expectation: "若 EphB1 缺失降低 GSDMD 介导的线粒体损伤，则应观察到更少的细胞质 ROS 上升与更稳定的膜电位。"
  importance_reason: "ROS 与膜电位是反映线粒体损伤与炎症小体执行端状态的关键 readouts。"

# ---------- 2. Rationale / Design Logic：为什么这样设计 ----------
rationale:
  model_and_system: "使用 WT 与 EphB1-deficient 原代腹腔巨噬细胞，其对 LPS+nigericin 的响应可稳定诱导 ROS 动力学与 Δψm 改变。"
  key_variables: "比较基因型差异下的细胞质 ROS（H2DCHA）、线粒体 ROS（MitoSOX）、线粒体膜电位（TMRM）。"
  control_logic: >
    "统一使用 LPS priming + nigericin 的时间梯度；所有指标归一化到加药前基线以比较动力学差异。"
    "通过在未激活炎症小体条件下单独检测 TMRM（对应原 Figure 4A / 本图 G-H），用于判定 ΔΨm 是否在刺激前已存在基因型差异。"
  core_justification: "若 KO 出现更弱的胞质 ROS 上升与更稳定 ΔΨm，将支持（support）线粒体损伤/外泄过程受限的模型，但仍需与后续 mtRNA 外泄、分级富集等证据合并判断。"

# ---------- 3. Methods（差异性信息）：只写本 panel 特有的 ----------
methods:
  inherits_from_protocol: "default_peritoneal_macrophage_NLRP3_activation"
  biological_material: "8–12 周龄 C57BL/6 WT 与 EphB1-deficient 原代腹腔巨噬细胞。"
  experimental_groups: "WT vs EphB1-deficient；均进行 LPS priming 后进行 nigericin 时间梯度激活。"
  stimuli_and_treatment: "LPS 100 ng/mL 4 h；刺激结束前 30 min 加入 H2DCHA 或 MitoSOX 或 TMRM；随后加入 nigericin 并连续读数 120 min。"
  time_points: "0–120 min，间隔 1–2.5 min（根据 plate reader 设置），结果最终求平均聚合为5分钟间隔。"
  dose_info: "Nigericin 10 μM；荧光探针按说明书标准浓度使用。"
  readout_and_assay: >
    "96 孔板即时荧光读数；H2DCHA 检测细胞质 ROS；
    MitoSOX 检测线粒体 ROS；
    TMRM 检测 Δψm。
    H2DCHA 在胞质中被氧化生成荧光，主要反映细胞质层面的 ROS 累积，不能区分 ROS 的具体来源；
    MitoSOX 定位于线粒体内环境，主要报告线粒体内超氧阴离子相关的氧化应激状态，其信号不等同于膜损伤或孔化程度；
    TMRM 为膜电位依赖性染料，其荧光变化反映线粒体内膜电位（Δψm）的相对变化，可作为线粒体功能完整性的功能性 readout。
    本图中 G/H 面板为未激活炎症小体条件下的基线 TMRM，用于排除基因型导致的固有膜电位差异，从而支持将激活期 Δψm 的变化解释为刺激诱导的动态响应。其中基线 TMRM 测定对应未进行 LPS 或 nigericin 处理的静息条件，用于评估 EphB1 缺失是否导致固有 Δψm 改变（原 Figure 4A）。"
  analysis_notes: "所有时间序列数据归一化至加药时第一个时间点；比较曲线下面积（AUC）与关键时间点差异；双尾 t 检验。"
  minimal_methods_summary: "LPS priming 后以多探针实时监测 WT 与 KO 巨噬细胞在 nigericin 激活后的细胞质 ROS、线粒体 ROS 与膜电位变化。"

# ---------- 4. Results：把图变成结构化文字 ----------
results:
  data_direction: "EphB1-deficient 细胞在 nigericin 激活后 120 min 内的细胞质 ROS（H2DCHA）上升减缓，并表现为 TMRM 信号维持更高（去极化幅度更小）；MitoSOX 的 AUC 未见显著差异（ns），但 HO 组在部分时间段呈更高/更波动的趋势。基线条件下（G/H）TMRM 两组差异不大（ns）。"
  stats_summary: "H2DCHA：AUC KO 低于 WT（**）；TMRM（激活条件）：AUC KO 高于 WT（**）；MitoSOX：ns；基线 TMRM（G/H）：ns。"
  key_numbers: "H2DCHA AUC：KO 低于 WT；TMRM AUC（激活）：KO 高于 WT；MitoSOX AUC：ns（存在趋势）；基线 TMRM AUC：ns。"
  group_difference_statement: "与 WT 相比，KO 在炎症小体激活期间呈现更弱的细胞质 ROS 累积与更小的膜电位下降；线粒体 ROS（MitoSOX）整体差异未达显著。"
  robustness_and_qc: "趋势在 ≥3 批次中一致；探针信号背景已统一校正；基线 TMRM（G/H）无显著差异支持后续将激活期的 ΔΨm 差异解释为刺激过程中的动态变化而非固有基线偏移。"
  anomalies_or_limits: "个别批次中后期（>90 min）TMRM 信号略有漂移，但不影响总体趋势。"

# ---------- 5. Interpretation & Role in Chapter：怎么理解 + 在整章中的作用 ----------
interpretation:
  minimal_bio_interpretation: "EphB1 缺失并未显著改变静息条件下的线粒体膜电位，因此激活期 Δψm 的分叉更可能反映刺激诱导的线粒体损伤差异，而非基础功能缺陷。"
  alternative_explanations: "不排除 KO 细胞基础代谢或抗氧化能力差异影响 ROS 动态；但基线 TMRM（G/H）差异不大，支持将激活期 ΔΨm 的分叉视为刺激过程中的动态响应差异。MitoSOX 的 ns 结果提示需要结合 mtRNA 外泄与 GSDMD-NT 分级富集等更直接 readout 综合定位瓶颈。"
  summary_type: "supportive, elimination"
  claim_supported: "EphB1 缺失不显著影响原代巨噬细胞的基础线粒体膜电位，但在炎症小体激活过程中有助于维持 Δψm 稳定。"
  link_to_previous: "结合上一节 GSDMD-NT 线粒体富集减少，本节进一步支持 KO 线粒体膜损伤受限。"
  transition_to_next: "下一节将检测胞质 mtRNA 脉冲释放，以更直接评估线粒体内容物外泄/膜损伤程度。"

# ---------- 6. AI Writing Hints（可选）：给 LLM 的写作风格提示 ----------
ai_hints:
  target_section: ["Results", "Discussion_mini", "Methods_diff"] 
    # 你希望从这个 schema 主要生成哪些部分的正文？
    # 可选值： "Results" / "Discussion_mini" / "Methods_diff"
  tone: "neutral"     
    # 写作语气： "neutral"（默认科研语气）/ "cautious"（更谨慎）/ "confident"（偏肯定）
  target_journal_style: "" 
    # 若有心仪期刊的写作风格，可以在此填入名称，仅作为“风格参考”
    # 例如："Cell Metabolism", "Nature Immunology"
  language: "zh_en_mix"
    # 你希望生成何种语言： "zh"（中文）/ "en"（英文）/ "zh_en_mix"（中英混排方便你润色）

# ---------- 6. figure_legend（每个 panel 一份：用于最终拼接 Figure Legends） ----------
figure_legend:
  one_sentence_en: >
    Time-resolved measurements of cytosolic ROS, mitochondrial ROS, and mitochondrial membrane potential in primary peritoneal macrophages during NLRP3 inflammasome activation or under unstimulated baseline conditions, comparing WT and EphB1-deficient cells.

  system_and_design:
    model: "Primary murine peritoneal macrophages"
    genotype_or_groups: "WT versus EphB1-deficient"
    key_treatments: >
      LPS priming (100 ng/mL, 4 h) followed by nigericin stimulation (10 μM),
      or unstimulated conditions for baseline measurements
    time_window: "0–120 min after stimulation, with continuous fluorescence acquisition"

  readouts_and_assays:
    primary_readout: "Cytosolic ROS, mitochondrial ROS, and mitochondrial membrane potential"
    assay: "Live-cell fluorescence measurements using H2DCHA, MitoSOX, and TMRM"
    normalization: >
      All fluorescence signals were normalized to the first time point immediately
      before nigericin addition to allow comparison of dynamic changes

  stats:
    n_definition: "n indicates biologically independent experiments"
    n: "n ≥ 3 independent experiments"
    summary: "mean ± SEM"
    test: "two-tailed unpaired t-test on area-under-the-curve or endpoint values"
    multiple_comparisons: "none"

  significance:
    symbols: "* P < 0.05, ** P < 0.01, *** P < 0.001; ns, not significant"

panel_overrides:
  a:
    panel_title_en: "Cytosolic ROS dynamics"
    displayed_targets:
      - "H2DCHA fluorescence"

  b:
    panel_title_en: "Mitochondrial ROS dynamics"
    displayed_targets:
      - "MitoSOX fluorescence"

  c:
    panel_title_en: "Mitochondrial membrane potential dynamics"
    displayed_targets:
      - "TMRM fluorescence"

  d:
    panel_title_en: "Cytosolic ROS AUC"
    displayed_targets:
      - "H2DCHA AUC (0–120 min)"

  e:
    panel_title_en: "Mitochondrial ROS AUC"
    displayed_targets:
      - "MitoSOX AUC (0–120 min)"

  f:
    panel_title_en: "ΔΨm AUC during activation"
    displayed_targets:
      - "TMRM AUC (0–120 min)"

  g:
    panel_title_en: "Baseline mitochondrial membrane potential"
    displayed_targets:
      - "Baseline TMRM fluorescence (unstimulated)"

  h:
    panel_title_en: "Baseline ΔΨm quantification"
    displayed_targets:
      - "Baseline TMRM AUC (unstimulated)"

    # ---------- 8. English ----------

results_skeleton_en:
  stage: T3
  purpose: "panel-level Results skeleton (pre-reduction, bilingual)"
  panel_level: results
  results_logic_type: elimination

  modules:
    M1_motivation:
      en: "After localizing the functional bottleneck to the execution stage downstream of inflammasome assembly and caspase-1 activation, we next asked whether mitochondrial functional readouts—including cytosolic and mitochondrial ROS dynamics as well as mitochondrial membrane potential—are altered during NLRP3 activation."
      cn: "在将功能瓶颈定位到炎性小体组装和caspase-1激活的下游执行阶段后，我们接下来要问的是，在NLRP3激活过程中，线粒体功能数据（包括胞质和线粒体ROS动力学以及线粒体膜电位）是否会发生改变。"
      logic_source: "question.context_from_previous + question.core_question"

    M2_level_definition:
      en: "WT and EphB1-deficient primary peritoneal macrophages were LPS-primed and activated with Nigericin, and time-resolved changes in cytosolic ROS (H2DCHA), mitochondrial ROS (MitoSOX), and mitochondrial membrane potential (TMRM) were continuously monitored and normalized to pre-stimulation baselines."
      cn: "在 WT 与 EphB1-deficient 原代腹腔巨噬细胞中进行 LPS 预激并以 Nigericin 激活后，连续监测并归一化分析细胞质 ROS（H2DCHA）、线粒体 ROS（MitoSOX）及线粒体膜电位（TMRM）的时间动态变化。"
      logic_source: "methods.readout_and_assay + question.core_question"

    M3_directional_result:
      en: "Upon inflammasome activation, Ephb1-deficient macrophages showed reduced cytosolic ROS accumulation and less mitochondrial depolarization than WT cells. By contrast, mitochondrial ROS levels measured by MitoSOX did not differ significantly between genotypes."
      cn: "在炎症小体激活过程中，与 WT 相比，EphB1-deficient 巨噬细胞表现出更弱的细胞质 ROS 累积以及更小幅度的线粒体膜电位下降；而以 MitoSOX 检测的线粒体 ROS 整体强度未显示显著的基因型差异。"
      logic_source: "results.data_direction"

    M4_robustness:
      en: "These patterns were consistent across independent experimental batches and were supported by area-under-the-curve analyses, while baseline TMRM measurements obtained under unstimulated conditions remained comparable between genotypes."
      cn: "上述模式在多批次独立实验中保持一致，并得到曲线下面积分析的支持；同时，在未激活条件下测得的基线 TMRM 信号在不同基因型之间保持相当。"
      logic_source: "results.robustness_and_qc + results.stats_summary"

    M5_panel_conclusion:
      en: "Together, these results indicate that Ephb1 promotes early mitochondrial enrichment of GSDMD-NT during inflammasome activation."
      cn: "综上，这些结果表明 EphB1 缺失并未在静息条件下引起线粒体膜电位的固有改变，但在炎症小体激活过程中可限制 ROS 累积与膜去极化，支持执行阶段线粒体损伤受限的模型。"
      logic_source: "results.group_difference_statement"