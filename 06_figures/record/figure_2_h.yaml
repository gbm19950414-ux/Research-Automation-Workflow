# ============================================================
# schema.yaml v2  ——  单个 panel 的结构化写作模版
# 目标：让 AI 在几乎不需要补充信息的前提下，生成：
#   - 结果段（Results）
#   - 简短讨论/过渡段（Mini Discussion / Transition）
#   - Methods 中本实验的“差异性信息”
# ============================================================

# ---------- 0. Meta & Assets：基本信息 ----------
meta:
  figure: ""              # 如 "Figure 3"
  panel: ""               # 如 "A"
  short_title: ""         # 1 句以内，本 panel 做了什么（如："EphB1 缺失抑制 NLRP3 介导的 IL-1β 释放"）
  chapter: ""             # 属于哪一章/小节，如 "3.2 Mitochondrial damage during pyroptosis"
  experiment_id: ""       # 选填，用于和你的实验记录/脚本对应，如 "2025-03-21_NLRP3_IL1b_ELISA"
  version: 1              # 整数，用来追踪修改

assets:
  main_figure_file: ""    # 主图文件路径，如 "figures/F3/F3A_IL1b_ELISA.pdf"
  raw_data_files:         # 原始数据/整理后数据的文件路径列表
    - ""
  stats_files:            # 统计分析结果文件（R/Python 脚本输出）
    - ""
  analysis_scripts:       # 用于生成图/做统计的脚本
    - ""
  supplementary_items:    # 对应的补充图/表（若有）
    - ""                  # 如 "Figure S3B", "Table S2"

# ---------- 1. Scientific Question：本节要回答什么 ----------
question:
  context_from_previous: ""  # 与上一节的衔接（1 句）：上一节发现/提出了什么问题？
                             # 例如：“前一节结果提示 EphB1 缺失可能限制 NLRP3 炎性小体的完全激活。”
  core_question: ""          # 本 panel 的核心科学问题（1 句，用“是否”、“如何”、“在多大程度上”等）
                             # 例如：“本节检验 EphB1 缺失是否降低 NLRP3 激活后 IL-1β 的分泌水平。”
  hypothesis_or_expectation: ""  # 你的假设或预期结果（1 句）
                             # 例如：“如果 EphB1 促进 NLRP3 炎性小体的效应端活性，则 EphB1 缺失应降低 IL-1β 的释放。”
  importance_reason: ""      # 为什么这个问题重要/值得单列一节（1 句即可）
                             # 例如：“IL-1β 是 NLRP3 炎性小体的关键功能 readout，用于评估效应端活性。”

# ---------- 2. Rationale / Design Logic：为什么这样设计 ----------
rationale:
  model_and_system: ""       # 使用的模型/系统 + 选择理由
                             # 例如：“选用原代腹腔巨噬细胞，因为其对 NLRP3 激活高度敏感，且能反映体内炎症状态。”
  key_variables: ""          # 本实验关注的关键变量 + 操纵方式
                             # 例如：“操纵基因型（WT vs Ephb1−/−）和刺激条件（LPS 预处理 + ATP/Nigericin 激活）。”
  control_logic: ""          # 对照设置背后的逻辑（为什么这些对照足以回答问题）
                             # 例如：“未刺激组用于定义基线 IL-1β 水平，WT 作为 Ephb1−/− 的参照组。”
  core_justification: ""     # 最关键的一句“设计理由”（可直接当自动摘要用）
                             # 例如：“如果 EphB1 促进炎性小体效应端活性，则 Ephb1−/− 细胞在相同刺激下应释放更少 IL-1β。”

# ---------- 3. Methods（差异性信息）：只写本 panel 特有的 ----------
methods:
  inherits_from_protocol: ""   # 引用全章或整篇论文的通用 protocol 名称，如 "default_peritoneal_macrophage_NLRP3_activation"
                               # 之后可在 Methods 总节详细描述该 protocol。
  biological_material: ""      # 使用的生物材料/模型：动物/原代/细胞系 + 关键信息
                               # 例如：“8–12 周龄雄性 C57BL/6 WT 与 Ephb1−/− 小鼠来源的原代腹腔巨噬细胞。”
  experimental_groups: ""      # 组别及核心差异：基因型、处理、时间点
                               # 例如：“按基因型分为 WT 和 Ephb1−/−，均接受 LPS 预处理 + ATP 激活。”
  stimuli_and_treatment: ""    # 刺激/药物/处理的关键信息（种类 + 浓度 + 时间）
                               # 例如：“LPS 100 ng/mL 预处理 4 h，随后 ATP 5 mM 处理 30 min。”
  time_points: ""              # 关键测定时间点（如果不在上面已写清）
  dose_info: ""                # 若有剂量梯度，在此简要说明（如 “Alexidine 0, 1, 5, 10 μM”）
  readout_and_assay: ""        # 读出方式（ELISA/WB/IF/plate reader）及关键差异信息
                               # 例如：“使用 IL-1β ELISA 测定上清中 IL-1β，按厂商说明书操作。”
  replicates: ""               # 生物学重复数 n，以及是否合并多次实验
                               # 例如：“每组 n = 4 生物学重复，结果合并自两次独立实验。”
  analysis_notes: ""           # 本 panel 特有的分析方法/统计模型（如 normalization、配对 vs 非配对）
                               # 例如：“采用非配对双尾 t 检验；ELISA 结果按蛋白浓度归一化。”
  minimal_methods_summary: ""  # 1–2 句，把上面内容压缩成将来写 Methods 时可以直接用的一小段。

# ---------- 4. Results：把图变成结构化文字 ----------
results:
  data_direction: ""           # 纯“趋势描述”，不解释机制（↑/↓/无变化 + 相对谁）
                               # 例如：“在 LPS+ATP 刺激下，Ephb1−/− 巨噬细胞释放的 IL-1β 显著低于 WT。”
  stats_summary: ""            # 统计显著性信息（检验方法、p 值区间即可）
                               # 例如：“非配对 t 检验，p < 0.01。”
  key_numbers: ""              # 可选：fold change、均值±SEM、效应量（方便你之后查）
                               # 例如：“WT: 850 ± 120 pg/mL；Ephb1−/−: 410 ± 90 pg/mL；约下降 50%。”
  group_difference_statement: "" # 用一两句把组间差异说清楚（可直接作为结果段主句）
                                 # 例如：“与 WT 相比，Ephb1−/− 巨噬细胞在相同刺激强度下产生的 IL-1β 减少。”
  robustness_and_qc: ""        # 是否在多批次实验中重复、是否排除了明显 outlier 等
                               # 例如：“该趋势在两批独立实验中均一致，排除 1 个基于预设准则的 outlier 后结果不变。”
  anomalies_or_limits: ""      # 若有“怪点/边缘显著/批间差异”，在此简短记录（便于 Discussion）
                               # 例如：“一批实验中 WT 绝对值略低，可能与细胞密度偏低有关。”

# ---------- 5. Interpretation & Role in Chapter：怎么理解 + 在整章中的作用 ----------
interpretation:
  minimal_bio_interpretation: "" # 在不过度拔高的前提下，用 1–2 句解释结果“生物学含义”
                                 # 例如：“这些结果提示 EphB1 对 NLRP3 介导的 IL-1β 释放是促进性的。”
  alternative_explanations: ""   # 可能的其他解释/局限（方便之后写 Discussion）
                                 # 例如：“不能排除 EphB1 缺失影响前炎性细胞因子转录的可能。”
  summary_type: ""               # 从下列类型中选一个或多个，用逗号分隔：
                                 #   "supportive"   支持前一节/主假设
                                 #   "descriptive"  纯描述现象
                                 #   "elimination"  排除某种机制或可能性
                                 #   "negative"     未见显著差异/阴性结果
                                 #   "exploratory"  探索性发现
                                 # 例如："supportive"
  claim_supported: ""            # 本 panel 主要想支持/反驳的“文字命题”
                                 # 例如：“EphB1 是 NLRP3 炎性小体效应端活性的正调控因子。”
  link_to_previous: ""           # 承接上一节的句子（1 句）：上一节结果如何被本节进一步验证/延伸/修正？
                                 # 例如：“在观察到 EphB1 缺失缓解线粒体损伤后，我们进一步评估其对下游 IL-1β 释放的影响。”
  transition_to_next: ""         # 引出下一节（1 句）：下一步要看什么/为什么自然过渡到下一节？
                                 # 例如：“为了明确这种效应是否依赖于线粒体 ROS，我们随后检测了 NLRP3 激活过程中 mtROS 的变化。”

# ---------- 6. AI Writing Hints（可选）：给 LLM 的写作风格提示 ----------
ai_hints:
  target_section: ["Results", "Discussion_mini", "Methods_diff"] 
    # 你希望从这个 schema 主要生成哪些部分的正文？
    # 可选值： "Results" / "Discussion_mini" / "Methods_diff"
  tone: "neutral"     
    # 写作语气： "neutral"（默认科研语气）/ "cautious"（更谨慎）/ "confident"（偏肯定）
  target_journal_style: "" 
    # 若有心仪期刊的写作风格，可以在此填入名称，仅作为“风格参考”
    # 例如："Cell Metabolism", "Nature Immunology"
  language: "zh_en_mix"
    # 你希望生成何种语言： "zh"（中文）/ "en"（英文）/ "zh_en_mix"（中英混排方便你润色）