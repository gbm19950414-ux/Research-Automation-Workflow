# ============================================================
# schema.yaml v2  ——  单个 panel 的结构化写作模版
# 目标：让 AI 在几乎不需要补充信息的前提下，生成：
#   - 结果段（Results）
#   - 简短讨论/过渡段（Mini Discussion / Transition）
#   - Methods 中本实验的“差异性信息”
# ============================================================

# ---------- 0. Meta & Assets：基本信息 ----------
meta:
  figure: "Figure 1"              # 如 "Figure 3"
  figure_id: "1b"
  experiment_id: "001"
  short_title: "EphB1 在炎症小体遗传筛选中的表型表现"
  hypothesis: Ephb1 缺失调控NLRP3炎症小体激活导致的 IL-1β 释放
  claim: "在炎症小体遗传筛选中，Ephb1 对应的 081230020-HRB 品系在 Nigericin 诱导的炎症小体激活条件下表现出显著降低的 IL-1β 释放，提示 Ephb1 可能是一个值得进一步研究的炎症小体调控候选基因。"
  evidence_level: association
  causal_strength: suggestive
  scope: "来源于多个 pb 遗传背景的小鼠原代巨噬细胞，在 Nigericin（10 μM）刺激诱导炎症小体激活的筛选条件下，通过 ELISA 检测 IL-1β 释放。"
  alt_explanations: "该表型差异仍可能受到不同遗传背景基础反应性差异、炎症小体激活敏感性差异或筛选阶段统计波动等因素影响，而不一定完全由 Ephb1 的直接调控作用所导致。"

assets:
  main_figure_file: "06_figures/figure_1/001_genetic_screening_dotplot_nigericin_10.pdf"
  raw_data_files:
    - "04_data/raw/炎症表型遗传筛选/raw_data.xlsx"
  stats_files:
    - "04_data/interim/炎症表型遗传筛选/001_genetic_screening_dotplot_nigericin_10_ttest_ho_vs_wt.tsv"
    - "04_data/interim/炎症表型遗传筛选/001_genetic_screening_dotplot_nigericin_10_wt_baseline.tsv"
  analysis_scripts:
    - "06_figures/script/screening_style_dot_plot.R"
    - "06_figures/script/001_genetic screening_of_inflammatory_phenotypes.R"
    - "06_figures/script/001_genetic_screening_inflammatory_phenotypes.yaml"
  supplementary_items:

# ---------- 1. Scientific Question：本节要回答什么 ----------
question:
  context_from_previous: >
    在前一面板中，我们建立了炎症小体相关遗传筛选的整体设计框架。
  core_question: >
    在多个遗传背景中，是否存在在炎症小体激活条件下呈现显著表型差异的候选品系？
  hypothesis_or_expectation: >
    若 该基因在炎症小体功能中发挥调控作用，则其对应品系可能在筛选中表现出较为显著的炎症输出差异。
  importance_reason: >
    通过遗传筛选识别出具有统计学显著差异的候选品系，是后续聚焦机制研究与模型选择的关键前提。

# ---------- 2. Rationale / Design Logic：为什么这样设计 ----------
rationale:
  model_and_system: >
    采用多个 pb 遗传背景来源的细胞进行并行筛选，以比较不同品系在炎症小体激活条件下的反应差异。
  key_variables: >
    主要比较变量为各品系中 WT 与对应 HO 的 IL-1β 释放差异幅度及其统计学显著性。
  control_logic: >
    在每个遗传背景内以 WT 作为内参对照，并将读数归一化至 WT 均值，以保证差异比较仅反映基因型效应。
  core_justification: >
    通过统一统计标准识别在筛选中呈现显著差异的品系，可从多背景中优先筛选出具有代表性的候选基因模型。

# ---------- 3. Methods（差异性信息）：只写本 panel 特有的 ----------
methods:
  inherits_from_protocol: "default_inflammasome_genetic_screening"
  biological_material: >
    来自多个 pb 遗传背景的小鼠来源细胞（具体来源与培养条件见通用方法）。
  experimental_groups: >
    各遗传背景分别比较 WT 与 基因缺失（HO）两组。
  stimuli_and_treatment: >
    采用 Nigericin（10 μM）激活炎症小体通路。
  time_points: >
    处理后收集细胞上清进行检测（具体时间点见通用方法）。
  dose_info: >
    单一筛选剂量：Nigericin 10 μM。
  readout_and_assay: >
    通过 ELISA 定量检测细胞上清中的 IL-1β 释放水平。
  replicates: >
    各遗传背景内 WT 与 HO 组生物学重复数不等，多数为 n≥4；个别品系 WT 重复数不足。
  analysis_notes: >
    在相同遗传背景内以 WT 平均值进行归一化（WT mean = 1），并采用双侧 Welch t 检验比较 WT 与 HO 差异。
  minimal_methods_summary: >
    在多遗传背景条件下，于 Nigericin 诱导的炎症小体激活模型中检测 WT 与 Ephb1 缺失细胞的 IL-1β 释放，并在各背景内进行归一化与统计比较。

# ---------- 4. Results：把图变成结构化文字 ----------
results:
  data_direction: >
    在多遗传背景的筛选结果中，大多数品系在 Nigericin 诱导条件下 WT 与 HO 之间的 IL-1β 释放差异较小或不具统计学显著性，仅有少数品系表现出较为明显的基因型依赖性变化。

  stats_summary: >
    在逐品系进行的双侧 Welch t 检验中，仅有两个品系达到名义统计学显著水平。其中 Ephb1 对应的 081230020-HRB 品系具有最低的 p 值（P≈0.034），而另一品系 080214058-HRA 亦达到统计学显著（P≈0.045）。其余多数品系的 WT 与 HO 差异未达到统计学显著。

  key_numbers: >
    在 Ephb1（081230020-HRB）品系中，HO 组的归一化 IL-1β 释放均值约为 0.585，相较 WT（归一化为 1）约下降 41%。该品系 WT 与 HO 均具有充分的生物学重复数（WT n≈5，HO n≈5），为统计比较提供了较好的统计效力。相比之下，080214058-HRA 品系 HO 均值约为 0.627（约下降 37%）。

  group_difference_statement: >
    综合效应量与统计显著性，Ephb1 所在的 081230020-HRB 品系在所有检测背景中表现出最为突出的统计显著表型之一，并呈现清晰的基因型依赖性 IL-1β 释放下降。

  robustness_and_qc: >
    所有统计检验均在各遗传背景内部独立完成，并以各自 WT 平均值进行归一化处理，因此 Ephb1 品系中观察到的差异不依赖于跨品系比较。

  anomalies_or_limits: >
    在部分其他品系中，由于生物学重复数较少或基因型差异幅度较小，未能在筛选阶段达到统计学显著水平，因此这些品系的潜在效应仍需在后续针对性实验中进一步评估。

# ---------- 5. Interpretation & Role in Chapter：怎么理解 + 在整章中的作用 ----------
interpretation:
  minimal_bio_interpretation: >
    遗传筛选结果显示，Ephb1 所在的 081230020-HRB 品系在炎症小体激活后呈现出显著且可重复的 IL-1β 输出降低表型。
  alternative_explanations: >
    不同遗传背景下的基础反应性差异可能影响其他品系的统计效力，但并不影响 Ephb1 品系中观察到的显著差异。
  summary_type: "exploratory,prioritization"
  claim_supported: >
    Ephb1 在遗传筛选中被识别为具有显著炎症小体相关表型的优先候选基因。
  link_to_previous: >
    在建立筛选框架后，本面板明确了 Ephb1 对应品系在筛选中的突出表现。
  transition_to_next: >
    基于其在筛选中的显著性与重复性，后续章节将以 Ephb1 为重点对象展开机制层面的系统研究。

# ---------- 6. figure_legend ----------
figure_legend:
  panel: "b"
  panel_title_en: "Genetic screening outcome"
  panel_title_cn: "遗传筛选结果"
  one_sentence_en: >
    Normalized IL-1β release across multiple pb genetic backgrounds following nigericin-induced inflammasome activation, highlighting strains with pronounced genotype-dependent differences.
  system_and_design:
    model: "Primary murine macrophages derived from multiple pb genetic backgrounds"
    genotype_or_groups: "WT versus gene-deficient (HO) cells within each genetic background"
    key_treatments: "Nigericin stimulation (10 μM)"
    time_window: "Supernatants collected after inflammasome activation"
  readouts_and_assays:
    primary_readout: "IL-1β release in culture supernatants"
    assay: "ELISA"
  stats:
    normalization: "Values normalized to the WT mean within each genetic background (WT mean = 1)"
    n_definition: "n indicates biologically independent samples within each genetic background"
    n: "n ≥ 3 per group"
    summary: "mean ± SEM"
    test: "two-tailed Welch’s t-test"
    multiple_comparisons: "none"
  significance:
    symbols: "* P < 0.05, ** P < 0.01, *** P < 0.001; ns, not significant"
  extra_notes: >
    Each point represents an individual genetic background, with WT and HO comparisons performed within the same background.
# ---------- 7. AI Writing Hints（可选）：给 LLM 的写作风格提示 ----------
ai_hints:
  target_section: ["Results", "Discussion_mini", "Methods_diff"] 
    # 你希望从这个 schema 主要生成哪些部分的正文？
    # 可选值： "Results" / "Discussion_mini" / "Methods_diff"
  tone: "neutral"     
    # 写作语气： "neutral"（默认科研语气）/ "cautious"（更谨慎）/ "confident"（偏肯定）
  target_journal_style: "" 
    # 若有心仪期刊的写作风格，可以在此填入名称，仅作为“风格参考”
    # 例如："Cell Metabolism", "Nature Immunology"
  language: "zh_en_mix"
    # 你希望生成何种语言： "zh"（中文）/ "en"（英文）/ "zh_en_mix"（中英混排方便你润色）
# ---------- 8. English ----------

results_skeleton_en:
  stage: T3
  purpose: "panel-level Results skeleton (pre-reduction, bilingual)"
  panel_level: results
  results_logic_type: discovery
  modules:
    M1_motivation:
      en: "Following establishment of the genetic screening framework, we next asked whether any strains exhibit pronounced inflammasome-associated phenotypic differences under activation conditions."
      cn: "在建立遗传筛选框架后，我们进一步关注是否存在在炎症小体激活条件下呈现显著表型差异的品系。"
      logic_source: "question.context_from_previous + question.core_question"

    M2_level_definition:
      en: "IL-1β release was quantified as the functional readout of inflammasome activation across multiple pb genetic backgrounds, with WT and HO cells compared within each strain."
      cn: "以 IL-1β 释放作为炎症小体激活的功能性读出，在多个 pb 遗传背景中于各自品系内比较 WT 与 HO 细胞。"
      logic_source: "methods.readout_and_assay + rationale.key_variables + rationale.control_logic"
    M3_directional_result:
      en: "Across the 10 screened strains, most genetic backgrounds showed little or no genotype-dependent difference in IL-1β release following Nigericin stimulation, whereas only two strains reached nominal statistical significance in within-strain comparisons."
      cn: "在所筛选的10个遗传背景中，大多数品系在 Nigericin 刺激后 WT 与 HO 之间的 IL-1β 释放差异较小或未达到统计学显著，仅有两个品系在品系内比较中达到名义统计学显著水平。"
      logic_source: "results.data_direction + results.stats_summary"

    M4_robustness:
      en: "Notably, the Ephb1-associated 081230020-HRB strain showed a statistically significant and reproducible reduction in IL-1β release, supported by adequate biological replicates and within-strain statistical testing."
      cn: "其中，Ephb1 对应的 081230020-HRB 品系在具有充分生物学重复的前提下，于品系内统计分析中显示出显著且可重复的 IL-1β 释放降低。"
      logic_source: "results.stats_summary + results.key_numbers + results.robustness_and_qc"
    M5_panel_conclusion:
      en: "Notably, the Ephb1-associated strain (081230020-HRB) exhibited a pronounced reduction in IL-1β release in HO cells (~41% decrease relative to WT; P≈0.034), representing the strongest statistically significant genotype-dependent phenotype observed in the screen and prioritizing Ephb1 for subsequent mechanistic investigation."
      cn: "其中，Ephb1 对应的 081230020-HRB 品系在 HO 细胞中表现出明显的 IL-1β 释放降低（约下降 41%，P≈0.034），在所有检测背景中形成最为突出的统计学显著基因型依赖表型之一，从而将 Ephb1 确立为后续机制研究的优先候选基因。"
      logic_source: "results.key_numbers + results.group_difference_statement + interpretation.claim_supported"