# ============================================================
# schema.yaml v3  ——  单个 panel 的结构化写作模版（与 figure_1_d_v2.yaml 对齐）
# 目标：让 AI 在几乎不需要补充信息的前提下，生成：
#   - 结果段（Results）
#   - 简短讨论/过渡段（Mini Discussion / Transition）
#   - Methods 中本实验的“差异性信息”
# ============================================================

# ---------- 0. Meta & Assets：基本信息 ----------
meta:
  figure: ""           # e.g., "Figure 1"
  figure_id: ""        # e.g., "1d"
  experiment_id: "20260206_qPCR"
  short_title: "EphB1 缺失抑制PI3K信号通路活化"         # 1 句以内，本 panel 做了什么（如："EphB1 缺失抑制 NLRP3 介导的 IL-1β 释放"）
  chapter: ""
  version: 2026-02-09

# ---------- 1. Scientific Question：本节要回答什么 ----------
question:
  context_from_previous: >
    前一节在转录与表型 readout 层面
    提示 EphB1 缺失可能改变 PI3K 相关输出与下游代谢/膜环境节点，
    但仍缺少“即刻信号输出”层面的直接证据。
  core_question: >
    EphB1 缺失是否会改变 PI3K–AKT–mTOR 通路在
    标准化输入脉冲（血清再喂养）下的即时磷酸化输出动力学（幅度与积分输出）？
  hypothesis_or_expectation: >
    若 EphB1 影响 PI3K 输出 capacity，
    则在饥饿统一起点后进行 FBS refeed，
    KO 与 WT 的 p-AKT(T308/S473)、p-S6、p-4EBP1 的峰值与/或 AUC 将出现可重复差异。
  importance_reason: >
    磷酸化层的动态 readout 能将“上游输入差异/基线差异”与“通路输出 capacity 差异”解耦，
    为后续 link_validation（B→C）提供因果链的关键中间证据。

# ---------- 2. Rationale / Design Logic：为什么这样设计 ----------
rationale:
  model_and_system: >
    采用 WT 与 EphB1_KO 原代小鼠腹腔巨噬细胞，
    并在同日分离同板培养的条件下直接比较基因型差异。
  key_variables: >
    主要变量为基因型（WT vs EphB1_KO）与刺激输入（no_refeed vs FBS_refeed），
    以时间点梯度刻画 p-AKT/p-S6/p-4EBP1 的动力学曲线。
  control_logic: >
    先用无血清预处理统一起点并“打开动态范围”；
    no_refeed 定义饥饿后的基线/地板效应，
    FBS_refeed 提供标准化输入脉冲，确保比较聚焦于通路响应能力而非培养波动。
  core_justification: >
    通过“统一预处理 + 标准化 refeed 脉冲 + 时间梯度曲线”，
    可以用峰值与 AUC 等容量指标定量比较 WT 与 KO 的 PI3K–AKT–mTOR 即时输出差异。

# ---------- 3. Methods（差异性信息）：只写本 panel 特有的 ----------
methods:
  inherits_from_protocol: "protocols.WB_phospho_signaling_v1"
  biological_material: >
    WT 与 EphB1_KO（EphB1 PB−/−）小鼠来源原代腹腔巨噬细胞；同日分离、同板培养以减少批间差异。
  experimental_groups: >
    no_refeed（饥饿后不再喂养）与 FBS_refeed（再喂养）两类条件下，分别比较 WT vs KO；主分析聚焦于 refeed 条件下的 WT vs KO。
  stimuli_and_treatment: >
    采用血清饥饿预处理（5 h，统一起点）后，以 FBS （10%）再喂养作为标准化输入脉冲。
  time_points: >
    timecourse：0、5、10、20、40、60 min（ 0 min 为no_refeed）。
  dose_info: >
    统一无血清饥饿，10% FBS refeed
  readout_and_assay: >
    Western blot 检测 p-AKT(T308/S473)、p-S6、p-4EBP1，并检测 total AKT/S6/4EBP1 与 GAPDH 作为 loading/归一化参考。
  replicates: >
    每个时间点与条件包含生物学重复（n=3），并在独立批次重复以验证方向一致性。
  analysis_notes: >
    以 total protein 或对应 total target 进行归一化后，提取峰值（max）与积分输出（AUC，0–30/0–60）作为 capacity 指标；对 no_refeed 与 refeed 分别建模，核心对比为 refeed 条件下 WT vs KO。
  minimal_methods_summary: >
    WT 与 EphB1_KO 原代腹腔巨噬细胞经无血清预处理统一起点后进行 FBS 再喂养时间梯度取样，WB 检测 p-AKT/p-S6/p-4EBP1 并以 total/loading 归一化，使用 max 与 AUC 定量比较通路输出差异。
# ---------- 4. Results：把图变成结构化文字 ----------
results:
  data_direction: >           # 纯“趋势描述”，不解释机制（↑/↓/无变化 + 相对谁）
    AKT
      batch1中，HO与WT无肉眼可见差异，但是60min时2个样品均较低（程度相似）
      batch2中，HO与WT无肉眼可见差异，但是60min时2个样品均较低（程度相似）
      batch3中，HO与WT无肉眼可见差异，但是0min时2个样品均较低（程度相似）

    pAKT(308)
      batch1中，0min时候，HO与WT均极低，WT与HO无肉眼可见差异，WT与HO均随时间梯度上升，HO在5min、20min、60min时间点似乎略强于WT或无差异。与total不同，60min时间点强度很高，且符合时间梯度上升趋势
      batch2中，0min时候，HO与WT均极低，WT与HO无肉眼可见差异，WT与HO均随时间梯度上升，HO在40min、60min时间点似乎略强于WT或无差异。与total不同，60min时间点强度很高，且符合时间梯度上升趋势
      batch3中，0min时候，HO与WT均极低，WT与HO无肉眼可见差异，WT与HO均随时间梯度上升，但是幅度较小。HO与WT之间无差异。与total不同，60min时间点强度很高，且符合时间梯度上升趋势

    pAKT(473)
      batch1中，0min时候，HO与WT均极高（所有时间点中最高），WT与HO无差异。5min时间点时候，WT与HO均降低，HO低于WT。10min时间点时候，WT与HO进一步降低，HO低于WT。20min时间点时候，WT回升，HO低于WT。40min时间点时候，WT进一步回升，HO低于WT。60min时间点时候，WT与HO信号均降到最低，HO低于WT。
      batch2中，0min时候，HO与WT均极高（所有时间点中最高），WT与HO无差异。5min时间点时候，WT与HO均降低，HO与WT无差异。10min时间点时候，WT与HO进一步降低，HO低于WT。20min时间点时候，WT回升，HO与WT无差异。40min时间点时候，WT进一步回升，HO低于WT。60min时间点时候，WT与HO信号均降到最低，HO低于WT。
      batch3中，0min时候，HO与WT均极高（所有时间点中最高），WT与HO无差异。5min时间点时候，WT与HO均降低，HO与WT无差异。10min时间点时候，WT与HO进一步降低，HO低于WT。20min时间点时候，WT回升，HO低于WT。40min时间点时候，WT进一步回升，HO低于WT。60min时间点时候，WT与HO信号均降到最低，HO与WT无差异。
    S6
      batch1中，HO与WT无肉眼可见差异，但是60min HO略低于WT
      batch2中，HO与WT无肉眼可见差异，但是10min HO略低于WT
      batch3中，HO与WT无肉眼可见差异，但是0min时2个样品均较低（程度相似）

    pS6
      batch1中，0min时候，HO与WT无差异。5min时，HO与WT略微降低，无差异。10min时，HO与WT开始升高，HO略高于WT。20min时，升高到最强，无差异。40min时，维持最强，无差异。60min时，WT与HO信号均降低，无差异。
      batch2中，0min时候，HO与WT无差异。5min时，HO与WT不变，无差异。10min时，HO与WT升高到最强，无差异。20min时，略微降低，HO略高于WT。40min时，继续降低，HO略高于WT。60min时，WT与HO信号均降至最低，HO略高于WT。
      batch3中，0min时候，HO与WT无差异。5min时，HO与WT不变，无差异。10min时，HO与WT升高到最强，无差异。20min时，略微降低，无差异。40min时，继续降低，无差异。60min时，WT与HO信号均降至最低，无差异。

    4EBP1
      batch1中，0min时候，HO与WT最高，HO弱于WT。5min，均降低，HO与WT无差异。10min，均回升高一点，HO弱于WT。20min，升至最高，HO弱于WT。40min，开始回落，HO弱于WT。60min，降至最低，HO弱于WT
      batch2中，0min时候，HO与WT较低，HO与WT无差异。5min，均升高，HO与WT无差异。10min，继续升高，HO弱于WT。20min，降低，HO弱于WT。40min，继续降低，HO与WT无差异。60min，降至最低，几乎不可见
      batch3中，0min时候，HO与WT较低，HO略强于WT。5min，均升高，HO强于WT。10min，均升高，HO强于WT。20min，均升至最高，HO强于WT。40min，猛降低至0min水平以下，HO强于WT。60min，降至最低，HO略弱于WT

    p-4EBP1
      batch1中，0min时候，HO与WT较低，无差异。5min，无变化，HO与WT无差异。10min，升高，HO与WT无差异。20min，升高，HO弱于WT。40min，升至最高，HO弱于WT。60min，降低，HO弱于WT
      batch2中，0min时候，HO与WT较低，HO略强于WT。5min，无变化，H略弱于WT。10min，升高，HO与WT无差异。20min，维持，HO与WT无差异。40min，维持，HO与WT无差异。60min，降低，HO与WT无差异
      batch3中，0min时候，HO与WT较低，HO与WT无差异。5min，无变化，HO与WT无差异。10min，升高，HO略强于WT。20min，升高，HO略强于WT。40min，维持，HO与WT无差异。60min，降低，HO与WT无差异

  stats_summary: "由于每个batch均只有1个wt与1个HO，而跨批次在不同膜上独立进行实验，所以无法计算显著差异"            # 统计显著性信息（检验方法、p 值区间即可）
  key_numbers: ""              # 可选：fold change、均值±SEM、效应量（方便你之后查）
  group_difference_statement: >  # 用一两句把组间差异说清楚（可直接作为结果段主句）
    在血清再喂养时间梯度下，
    WT 与 EphB1_KO 原代巨噬细胞在 p-AKT(T308) 与 p-S6 的动态变化上总体相似，未见稳定可重复的基因型差异；
    而 4EBP1 / p-4EBP1 的变化则表现出明显的批间不一致性，未形成一致的基因型效应。
    相比之下，与 WT 相比，EphB1_KO（HO）细胞在血清再喂养后的中期阶段（10–40 min）p-AKT(S473) 的回升幅度持续偏低，
    而 p-AKT(T308) 与 p-S6 的整体动力学差异不明显，提示 EphB1 缺失更可能影响 AKT(S473) 相关的持续/再平衡输出而非早期刺激启动。
  robustness_and_qc: "本次实验采用3对WT与HO进行检测，若结果同时出现在3批次中，则认为结果可靠"        # 是否在多批次实验中重复、是否排除了明显 outlier 等
  anomalies_or_limits: >      # 若有“怪点/边缘显著/批间差异”，在此简短记录（便于 Discussion）
    0 min T308最低，但 S473最高
      饥饿 5 h 的 PI3K/PDK1 输入很低（T308低），但细胞处在某种 应激/代偿状态，导致 mTORC2 或 S473 上游激酶活跃 或 去磷酸化被抑制（S473高）。
    S473 的动力学特征：先下降、再回升、40 min 再峰值、60 min 再掉到底
      refeed 早期启动“快速负反馈”，优先压 S473，然后随着系统平衡再次上升，40min时的峰值反应mtorc2的二阶段激活
      60min时刺激足够强，建立了充足的负反馈，
    total 4ebp1变化剧烈的问题，可能来自于实验体系错误。


# ---------- 5. Interpretation & Role in Chapter：怎么理解 + 在整章中的作用 ----------
  minimal_bio_interpretation: >
    在标准化的血清再喂养输入下，EphB1 缺失并未导致 p-AKT(T308) 或 p-S6 的整体动力学发生稳定改变，
    但在 10–40 min 的再平衡/维持阶段，HO 的 p-AKT(S473) 回升幅度在多批次中持续低于 WT，
    提示 EphB1 可能影响 AKT(S473) 相关的中期持续输出能力，而非早期刺激启动本身。
  alternative_explanations: >
    由于每批次仅包含 1 个 WT 与 1 个 HO 且跨批次在不同膜上完成，当前证据以“方向一致性”支持趋势判断而非统计显著性。
    p-AKT(S473) 的中期回升减弱既可能源于 mTORC2/膜-骨架相关状态适应不足，也可能反映更强/更早建立的负反馈或位点选择性去磷酸化增强；
    HO 中 Inpp4b 高表达在机制上可作为候选解释（通过改变 PI(3,4)P2 动力学削弱中期维持），但仍需在蛋白/功能干预层面建立因果。
    另外，0 min 时 S473 高而 T308 低的“基线解耦”以及 60 min 的极端点位可能受取样终止速度、曝光动态范围与条带饱和等技术因素影响；
    4EBP1/ p-4EBP1 的批间不一致性亦提示该轴的结论需要更严格的定量与条带形态（多磷酸化迁移）控制。
  summary_type: "supportive,exploratory,descriptive"
  claim_supported: >
    在血清再喂养诱导的 PI3K–AKT–mTOR 即刻信号动力学中，EphB1 缺失的主要可重复差异体现在 AKT(S473) 的中期回升/维持不足，而非 T308 或 S6 轴的整体响应缺失。
  link_to_previous: >
    前一节提示 EphB1 缺失可能改变 PI3K 相关输出与下游代谢/膜环境节点，本节通过标准化 refeed 时间梯度的磷酸化读出，进一步在“即刻信号输出”层面提供中间证据。
  transition_to_next: >
    下一步需要通过密度定量（max/AUC）、关键节点补充读出（AKT 底物磷酸化、mTORC2 相关指标）及对候选调控因子（如 INPP4B）的功能干预，验证 HO 的 S473 回升缺陷是否对应真实的输出能力下降并建立因果链。
