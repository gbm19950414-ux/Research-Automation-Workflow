  panel_title_en: "Cross-omics mechanistic axis effect matrix"
  panel_title_cn: "跨 RNA 与脂质组的机制轴效应矩阵"

  one_sentence_en: >
    Batch-level effect_z matrix summarizing the direction and magnitude of Ephb1 deficiency–associated
    changes across six mechanistic axes in RNA-seq and lipidomics datasets.

  system_and_design:
    model: "Primary murine peritoneal macrophages"
    genotype_or_groups: "WT versus Ephb1−/−"
    key_treatments: "Steady-state condition without additional stimulation"
    time_window: "Single endpoint per batch"

  readouts_and_assays:
    primary_readout: >
      Mechanistic axis effect_z values derived from batch-specific KO versus WT comparisons
      in RNA-seq and lipidomics datasets
    assay: >
      RNA-seq differential expression modeling (DESeq2, batch-wise) and lipidomics normalization
      followed by axis-level feature aggregation
    normalization: >
      Effect_z values were calculated within each batch and are displayed without cross-batch pooling
      or global scaling

  stats:
    n_definition: "n indicates independent experimental batches"
    n: "RNA-seq: 3 batches; lipidomics: 4 batches"
    summary: "effect_z values displayed as a matrix"
    test: "not applicable (directional consistency analysis)"
    multiple_comparisons: "not applicable"

  significance:
    symbols: "not applicable"

  extra_notes: >
    Effect_z values represent directional effect sizes rather than formal significance testing;
    consistency across batches and omics layers was used as the primary robustness criterion.

  # ---------- 8. English ----------

results_skeleton_en:
  stage: T3
  purpose: "panel-level Results skeleton (pre-reduction, bilingual)"
  panel_level: results
  results_logic_type: discovery

  modules:
    M1_motivation:
      en: "Building on the mechanistic axis framework and data-processing pipeline established in Fig. 6A–C, we next asked whether Ephb1 deficiency produces consistent and reproducible axis-level effects across RNA-seq and lipidomics datasets."
      cn: "在 Fig.6A–C 已建立机制轴框架与数据处理流程的基础上，我们进一步检验 Ephb1 缺失是否在 RNA-seq 与脂质组学中产生一致且可重复的机制轴层级效应。"
      logic_source: "question.context_from_previous + question.core_question"

    M2_level_definition:
      en: "For each RNA-seq and lipidomics batch, we computed batch-specific effect_z scores representing the directional difference between Ephb1-deficient and WT macrophages for each of the six mechanistic axes, and assembled these values into a cross-omics axis-by-batch effect matrix."
      cn: "针对每一个 RNA-seq 与脂质组学批次，我们分别计算 Ephb1 缺失相对于 WT 的机制轴效应值（effect_z），并将其整合为跨组学的 axis×batch 效应矩阵。"
      logic_source: "methods.readout_and_assay + question.core_question"

    M3_directional_result:
      en: "Across three RNA-seq batches and four lipidomics batches, only the membrane context axis displayed a consistent positive effect in both omics layers, with stable directionality."
      cn: "在 RNA-seq 的三个批次与脂质组学的四个批次中，仅 Membrane context 轴在两种组学中均表现出方向一致的正向效应，且其绝对效应值在所有机制轴中最大。"
      logic_source: "results.data_direction"

    M4_robustness:
      en: "Effect_z values exceeding an absolute magnitude of 1 were predominantly observed for the Membrane context axis in both RNA and lipid datasets, whereas other axes showed sporadic or omics-specific effects that lacked cross-batch consistency."
      cn: "绝对值超过 1 的 effect_z 主要集中于 Membrane context 轴，并同时出现在 RNA 与脂质组中；相比之下，其余机制轴仅在个别批次或单一组学中出现效应，且缺乏跨批次一致性。"
      logic_source: "results.robustness_and_qc + results.stats_summary"

    M5_panel_conclusion:
      en: "These results identify the membrane context axis as the only axis consistently perturbed by Ephb1 deficiency across omics layers."
      cn: "综上，该跨组学效应矩阵表明，Membrane context 是唯一在不同组学与不同批次中均稳定受 Ephb1 缺失影响的机制轴，从而将其与受批次或组学特异性因素影响的其他轴区分开来。"
      logic_source: "results.group_difference_statement"