question:
  context_from_previous: "Fig6A-C已经介绍多组学整合的概念图、指标选择与数据处理流程。"
  core_question: "Ephb1 缺失是否在 RNA 与脂质组中呈现一致且可重复的机制轴效应？"
  hypothesis_or_expectation: "预期找到一个在多个批次、两种组学中方向一致的机制轴。"
  importance_reason: "判断哪些机制轴具有跨批次、组学一致性，是后续提出最终机制模型的前提。"

rationale:
  model_and_system: "整合 RNA-seq（3 批次）与脂质组学 LC–MS（4 批次）的机制轴效应。"
  key_variables: "对比 Ephb1 KO vs WT 在六条机制轴上的 batch-level effect_z。"
  control_logic: "同一机制轴在不同组学/不同批次的方向是否一致，是判断其生物学稳健性的核心。"
  core_justification: "若某机制轴是 Ephb1 缺失的主要受影响路径，则应在不同组学、不同批次中呈现一致方向的 effect_z。"

methods:
  inherits_from_protocol: "default_transcriptomic_lipidomic_mechanistic_axis_pipeline"
  biological_material: "C57BL/6 WT 与 Ephb1−/− 小鼠来源腹腔巨噬细胞（RNA 3 批次、脂质组 4 批次）。"
  experimental_groups: "按基因型分为 WT 与 Ephb1−/−，每个 batch 独立建模。"
  stimuli_and_treatment: "RNA 与脂质组均来自 steady-state 条件，不含额外刺激。"
  time_points: "单一时间点收集。"
  dose_info: "无剂量处理。"
  readout_and_assay: "RNA：DESeq2 LFC shrinkage；Lipid：PQN+z-score；机制轴按 Fig6B/C 的指标集计算。"
  replicates: "RNA 各批次 n≈3–6；脂质组各批次 n≈3～6。"
  analysis_notes: "effect_z = batch 内 KO vs WT 的方向性效应；不跨批次合并，仅作方向比较。"
  minimal_methods_summary: "RNA 与脂质组分别在每个 batch 内计算机制轴效应（effect_z），再整合成 axis×batch×omics 矩阵用于方向一致性分析。"
  claim: 
  evidence_level: #existence / association / positioning / necessity / sufficiency / rescue
  causal_strength: #correlational / suggestive / causal
  scope: #cell type、stimulus、time window
  alt_explanations: 
results:
  data_direction: >
    基于 RNA-seq（3 个批次）与脂质组学（4 个批次）计算的 batch-level effect_z 矩阵显示，
    六条机制轴中仅 Membrane context 轴在两种组学中均呈现出显著且高度一致的方向性变化。
    在 RNA 层面，Membrane context 在所有批次中均表现为稳定的正向效应
    （effect_z ≈ 0.24 至 0.79）；而在脂质组层面，该轴在四个独立批次中均表现为正向效应
    （effect_z ≈ +0.54 至 +2.24）
    Membrane context 轴的方向在所有批次中完全一致，且绝对效应值在所有轴中最大。

    相比之下，其余机制轴均未显示出类似的跨批次稳健性。


  stats_summary: >
    effect_z 的绝对值超过 1 的情况主要集中于 Membrane context 轴，
    其在 RNA 与脂质组中均达到或超过该阈值。
    其他机制轴仅在个别批次或单一组学中出现 |effect_z| > 1，
    且缺乏跨批次与跨组学的一致性。
    本分析未对不同批次进行数值合并或总体显著性检验，
    而是以方向一致性与效应幅度作为稳健性评估标准。

  robustness_and_qc: >
    Membrane context 轴在 RNA 三个批次与脂质组四个批次中均呈现完全一致的组学内方向性，
    且绝对效应值在所有机制轴中最高，显示出显著的跨批次稳健性。
    其余机制轴均受到明显的 batch effect 影响，限制了其作为主要受影响通路的解释力度。

  anomalies_or_limits: >
    Membrane context 轴的基因集选择为整体磷脂合成/分解相关基因集，并赋予方向变量

interpretation:
  minimal_bio_interpretation: >
    跨组学效应矩阵表明，Ephb1 缺失并未引发广泛、非特异性的代谢或合成程序改变，
    而是选择性地扰动了与膜环境相关的机制轴。
    Membrane context 轴在 RNA 与脂质组中均表现出最大的效应幅度和最高的批次一致性，
    指示其为 Ephb1 缺失条件下最主要、最稳健的受影响机制轴。

  alternative_explanations: >

    其他机制轴中观察到的方向混杂更可能源于 batch effect、
    条件依赖性调控或较弱的真实生物学效应。

  claim_supported: >
    这些结果支持如下结论：Ephb1 缺失主要与膜环境相关机制轴的稳定扰动相关，
    而非直接作用于心磷脂的合成或供给能力。

  link_to_previous: >
    Fig.6A–C 已建立多组学整合分析的概念框架与指标体系，
    Fig.6D 在此基础上系统比较不同机制轴在 RNA 与脂质组中的批次一致性。

  transition_to_next: >
    基于 Membrane context 轴在跨组学与跨批次中的突出稳健性，
    后续分析将进一步合并多组学效应，检测绝对效应值是否具有显著性，
    以构建 Ephb1 缺失影响膜环境的整合机制模型。
