# ---------- 1. Scientific Question：本表服务的科学问题 ----------
scientific_question:
  context_from_previous: >
    前一节在转录组与脂质组层面分别描绘了 EphB1 缺失后多条线粒体相关通路的变化，
    并在 Figure 7A 中给出了 EphB1–CL 轴的整体概念模型。
  core_question: >
    本表旨在系统归纳 EphB1 缺失背景下被定义为“下游信号模块”的基因集，
    以及这些模块在心磷脂各机制轴（合成、供给、氧化、运输、膜环境）中的预期作用。
  importance_reason: >
    通过以表格形式明确列出每个模块的名称、功能定位、目标 CL 机制轴及基因构成，
    有助于读者理解后续中介分析与机制图中各信号模块的来源与生物学含义，
    也便于评审追溯模块定义过程的合理性和可重复性。

# ---------- 2. Rationale / Design Logic：为什么要这样设计这张表 ----------
rationale:
  why_table_instead_of_figure: >
    该部分信息以离散的信号模块与基因列表为主，需要精确的文本与表头说明，
    直接以图形呈现易造成信息拥挤，采用表格更适合系统化展示与引用。
  design_logic: >
    每一行代表一个 EphB1 下游信号模块（gene set），列依次给出模块 ID、
    中文名称、在 EphB1 信号网络中的定位、预期作用的心磷脂机制轴、
    模块基因数以及带有 gene_effect_sign 的基因列表。模块功能的文字描述
    通过 key_message 与 notes_for_writing 记录，用于自动生成正文。
  inclusion_criteria: >
    仅纳入在文献和通路注释中有明确生物学定义、且可在本课题转录组数据中
    通过基因表达与 EphB1 状态建立联系的信号模块；每个模块需由多个核心
    基因组成，并在原始 YAML 中给出明确基因列表与 gene_effect_sign。
  exclusion_criteria: >
    未纳入仅含少数零散基因、缺乏清晰通路框架的候选集合；未纳入仅在单批次
    或单一组学中偶然显著、缺乏生物学一致性的基因列表；未单独拆分高度重叠、
    难以在机制层面区分的子通路，以避免表格过度碎片化。
  core_justification: >
    本表通过将文献驱动的 EphB1 下游信号通路整理为有限数目的功能模块，
    为后续“EphB1→信号模块→心磷脂机制轴”的中介分析与机制整合提供
    结构化、可复用的模块定义。

# ---------- 3. Table Structure：列结构与整体用途 ----------
table_structure:
  table_title: >
    Table 7-B. EphB1 下游信号模块及其与心磷脂机制轴的对应关系。
  table_goal: >
    帮助读者在一处查看本研究中采用的所有 EphB1 下游信号模块，
    包括其生物学命名、在 EphB1 信号网络中的定位、预期作用的
    心磷脂机制轴以及模块基因构成，为理解 Figure 7A–7D 中的
    概念模型和中介分析结果提供清晰的“模块字典”。
  level_in_text: "main_result"
  related_figures:
    - "Figure 7A"
    - "Figure 7B"
    - "Figure 7C"
    - "Figure 7D"

  column_definitions:
    - key: "pathway_id"
      label: "Pathway ID"
      description: "模块唯一标识符（对应原始 YAML 中的 pathway 名称，用于脚本与其他结果文件索引）。"
      unit: ""
      value_type: "string"
      allowed_values: []
      example_value: "EphB1_AMPK_energy_sensing"

    - key: "module_label"
      label: "模块名称"
      description: "该信号模块的生物学名称（中英文混用），用于表格首列展示和正文引用。"
      unit: ""
      value_type: "string"
      allowed_values: []
      example_value: "AMPK–TSC 能量感知模块"

    - key: "axis"
      label: "所属大轴"
      description: "该模块在 EphB1 整体信号网络中的大类归属，本表中均为 EphB1_signaling。"
      unit: ""
      value_type: "string"
      allowed_values:
        - "EphB1_signaling"
      example_value: "EphB1_signaling"

    - key: "target_axes"
      label: "目标 CL 机制轴"
      description: >
        该信号模块在机制推理中预期主要作用的心磷脂调控维度，可包括
        Synthesis、Supply、Oxidation、Transport、Membrane context 等，
        以分号分隔。
      unit: ""
      value_type: "string"
      allowed_values:
        - "Synthesis"
        - "Supply"
        - "Oxidation"
        - "Transport"
        - "Membrane context"
      example_value: "Supply; Oxidation"

    - key: "n_genes"
      label: "基因数"
      description: "模块中包含的基因数量，用于反映模块规模与冗余度。"
      unit: "genes"
      value_type: "numeric"
      allowed_values: []
      example_value: "10"

    - key: "genes_with_sign"
      label: "基因列表（含 gene_effect_sign）"
      description: >
        模块内所有基因及其 gene_effect_sign 标记，1 表示表达上调有利于
        该模块活化，-1 表示表达上调对应模块抑制，便于后续计算模块得分时
        统一方向。
      unit: ""
      value_type: "string"
      allowed_values: []
      example_value: "Prkaa1 (1), Prkaa2 (1), Tsc1 (1), Tsc2 (1), …"

# ---------- 4. Entries：每一行代表一个最小“feature”实体 ----------
entries:
  - row_id: "EphB1_AMPK_energy_sensing"
    display_label: "AMPK–TSC 能量感知模块"
    category: "EphB1_signaling_module"
    priority: "primary"
    key_message: >
      AMPK–TSC 能量感知模块将 EphB1 信号与细胞能量状态、脂质氧化和
      线粒体生物发生联系起来，是解释 EphB1 缺失影响心磷脂供给与氧化
      敏感性的关键调节点。
    values:
      pathway_id: "EphB1_AMPK_energy_sensing"
      module_label: "AMPK–TSC energy-sensing module"
      axis: "EphB1_signaling"
      target_axes: "Supply; Oxidation"
      n_genes: 10
      genes_with_sign: "Prkaa1 (1), Prkaa2 (1), Prkab1 (1), Prkab2 (1), Prkag1 (1), Tsc1 (1), Tsc2 (1), Sirt1 (1), Ppargc1a (1), Ppargc1b (1)"
    evidence_note: >
      模块基于 AMPK 及 TSC 复合体的经典能量感知功能构建，
      本课题中在多批次 RNA-seq 中可见其多个成员随 EphB1 状态
      与心磷脂供给/氧化指标呈协同变化，用作中介分析的候选中枢。
    link_to_figures:
      - "Figure 7A"
      - "Figure 7B"
      - "Figure 7C"
    notes_for_writing: >
      在 Results 中强调：EphB1 缺失伴随 AMPK–TSC 模块整体激活/抑制，
      与心磷脂供给/氧化轴的改变方向一致；在 Discussion 中可讨论
      “能量感知–线粒体脂质供给”这一桥梁机制。

  - row_id: "EphB1_PI3K_AKT_mTOR"
