    category: "EphB1_signaling_module"
    priority: "primary"
    key_message: >
      PI3K–AKT–mTOR 模块代表 EphB1 对细胞生长与代谢的经典调控通路，
      是连接 EphB1 状态与脂质前体池（PG/PA）供给变化的重要上游信号。
    values:
      pathway_id: "EphB1_PI3K_AKT_mTOR"
      module_label: "PI3K–AKT–mTOR signaling downstream of EphB1"
      axis: "EphB1_signaling"
      target_axes: "Synthesis; Supply"
      n_genes: 19
      genes_with_sign: "Pik3ca (1), Pik3cb (1), Pik3cd (1), Pik3r1 (1), Pik3r2 (1), Akt1 (1), Akt2 (1), Akt3 (1), Mtor (1), Rptor (1), Rictor (1), Mlst8 (1), Prkaa1 (-1), Prkaa2 (-1), Tsc1 (-1), Tsc2 (-1), Rps6kb1 (1), Rps6kb2 (1), Eif4ebp1 (1)"
    evidence_note: >
      该模块以 PI3K 催化/调节亚基、AKT 家族和 mTORC1/2 关键组分为核心，
      gene_effect_sign 结合 AMPK/TSC 对 mTOR 的负调控方向设置；
      在转录组中，该模块得分与 CL_PG_ratio、sum_PA 等合成/供给轴指标
