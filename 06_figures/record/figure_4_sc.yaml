# ============================================================
# schema.yaml v2  ——  单个 panel 的结构化写作模版
# 目标：让 AI 在几乎不需要补充信息的前提下，生成：
#   - 结果段（Results）
#   - 简短讨论/过渡段（Mini Discussion / Transition）
#   - Methods 中本实验的“差异性信息”
# ============================================================

# ---------- 0. Meta & Assets：基本信息 ----------
meta:
  figure: "Figure 4"              # 如 "Figure 3"
  figure_id: "s4c"             # 如 "A"
  short_title: "降低心磷脂可及性抑制炎症小体介导的 IL-1β 释放"
  chapter: "3.5 线粒体心磷脂可及性与重塑的因果实验"             # 属于哪一章/小节，如 "3.2 Mitochondrial damage during pyroptosis"
  experiment_id: "figure_5_b"       # 选填，用于和你的实验记录/脚本对应，如 "2025-03-21_NLRP3_IL1b_ELISA"
  version: 1              # 整数，用来追踪修改

assets:
  main_figure_file: ""    # 主图文件路径，如 "figures/F3/F3A_IL1b_ELISA.pdf"
  raw_data_files:         # 原始数据/整理后数据的文件路径列表
    - ""
  stats_files:            # 统计分析结果文件（R/Python 脚本输出）
    - ""
  analysis_scripts:       # 用于生成图/做统计的脚本
    - ""
  supplementary_items:    # 对应的补充图/表（若有）
    - ""                  # 如 "Figure S3B", "Table S2"

# ---------- 1. Scientific Question：本节要回答什么 ----------
question:
  context_from_previous: "上一节表明 BEL 可显著降低 NAO 可染的心磷脂池，为药理学操控 CL 可及性提供了上游手段。"
  core_question: "在降低心磷脂可及性的条件下，炎症小体通路激活及其 IL-1β 释放是否受到功能性抑制？"
  hypothesis_or_expectation: "若 CL 可及性限制 IL-1β 释放，则 BEL 应下降 IL-1β 释放，并部分遮蔽基因型差异。"
  importance_reason: "该实验用于检验‘CL 可及性下降’是否在功能层面足以限制炎症小体通路激活，而非仅作为相关表型出现。"

# ---------- 2. Rationale / Design Logic：为什么这样设计 ----------
rationale:
  model_and_system: "使用 WT 与 Ephb1−/− 原代腹腔巨噬细胞评估 BEL 对 IL-1β 释放的影响。"
  key_variables: "BEL 处理时间（4/16 h）、剂量（1, 2, 4 μM）、基因型（WT vs KO）、IL-1β 释放量。"
  control_logic: "DMSO vehicle 作为基线对照；BEL 剂量与时间梯度用于评估功能抑制的依赖性；KO 组用于判断在 CL 可及性已受限背景下是否出现遮蔽效应。"
  core_justification: "若心磷脂可及性是炎症小体孔功能与 IL-1β 释放的必要脂质条件，则 BEL 诱导的 CL 可及性下降应直接抑制炎症小体激活，并在功能层面部分遮蔽 EphB1 缺失表型。"

# ---------- 3. Methods（差异性信息）：只写本 panel 特有的 ----------
methods:
  inherits_from_protocol: "default_peritoneal_macrophage_NLRP3_activation"
  biological_material: "8–12 周龄 C57BL/6 WT 与 Ephb1−/− 原代腹腔巨噬细胞。"
  experimental_groups: "WT vs KO × BEL 0/1/2/4 μM；BEL 预处理 4 h 或 16 h。"
  stimuli_and_treatment: "LPS 100 ng/mL 预激 4 h；Nigericin 10 μM 激活 1 h；BEL 预处理按剂量梯度。"
  time_points: "BEL 预处理 4 h 与 16 h；Nigericin 激活 1 h。"
  dose_info: "BEL 1、2、4 μM；DMSO 0.1% vehicle 对照。"
  readout_and_assay: "收集上清进行 IL-1β ELISA；480 nm 背景与空白孔双重背景扣除；MTT 校正细胞数量。"
  replicates: "每组 n ≥ 3，≥3 次独立实验重复。"
  analysis_notes: "使用双尾 t 检验；交互效应以 two-way ANOVA 评估 genotype×dose。"
  minimal_methods_summary: "WT 与 KO 巨噬细胞在 BEL 预处理后进行 LPS+Nigericin 激活，并以 ELISA 定量 IL-1β 释放，评估 BEL 对基因型差异的遮蔽效应。"

# ---------- 4. Results：把图变成结构化文字 ----------
results:
  data_direction: "在 WT 巨噬细胞中，BEL 处理以剂量和时间依赖方式显著抑制 LPS+nigericin 诱导的 IL-1β 释放；在 KO 细胞中，该抑制效应进一步增强的幅度有限。"
  stats_summary: "genotype×dose 交互项显著；多数 BEL 剂量对 WT p < 0.05，而对 KO 多为 ns。"
  key_numbers: "WT 在 4 μM BEL、16 h 时 IL-1β 下降约 50%；KO 在相同条件下降幅 <20%。"
  group_difference_statement: "BEL 在 WT 细胞中显著降低 IL-1β 释放，并在高剂量或长时间处理条件下使 WT 与 KO 间的差异明显收敛。"
  robustness_and_qc: "趋势在 ≥3 批实验重复；MTT 显示 BEL 无细胞毒性。"
  anomalies_or_limits: "低剂量 BEL 在部分批次中的效果略弱，但遮蔽趋势一致。"

# ---------- 5. Interpretation & Role in Chapter：怎么理解 + 在整章中的作用 ----------
interpretation:
  minimal_bio_interpretation: "通过药理学方式降低心磷脂可及性即可显著抑制炎症小体介导的 IL-1β 释放，并在功能层面部分复现并遮蔽 EphB1 缺失表型。"
  alternative_explanations: "BEL 可能同时影响多种 iPLA₂ 相关脂质通路；此外，BEL 的作用被限定为降低 NAO 可染/可达的心磷脂池，而不直接等同于 CL 总量变化。"
  summary_type: "supportive, elimination"
  claim_supported: "降低心磷脂可及性本身即可在功能层面限制炎症小体通路激活并减少 IL-1β 释放。"
  link_to_previous: "在确认 BEL 可作为上游手段降低 NAO 可染心磷脂池之后，本节进一步证明该脂质状态改变在功能上足以抑制炎症小体通路激活。"
  transition_to_next: "为定位 CL 重塑参与程度，下一节将考察 MLCL/CL 与重塑酶（如 TAZ）相关指标。"

# ---------- 6. AI Writing Hints（可选）：给 LLM 的写作风格提示 ----------
ai_hints:
  target_section: ["Results", "Discussion_mini", "Methods_diff"] 
    # 你希望从这个 schema 主要生成哪些部分的正文？
    # 可选值： "Results" / "Discussion_mini" / "Methods_diff"
  tone: "neutral"     
    # 写作语气： "neutral"（默认科研语气）/ "cautious"（更谨慎）/ "confident"（偏肯定）
  target_journal_style: "" 
    # 若有心仪期刊的写作风格，可以在此填入名称，仅作为“风格参考”
    # 例如："Cell Metabolism", "Nature Immunology"
  language: "zh_en_mix"
    # 你希望生成何种语言： "zh"（中文）/ "en"（英文）/ "zh_en_mix"（中英混排方便你润色）


figure_legend:
  panel: "s4c"
  panel_title_en: "BEL suppresses IL-1β release"
  panel_title_cn: "BEL 抑制 IL-1β 释放"

  one_sentence_en: >
    IL-1β release from WT and Ephb1−/− primary peritoneal macrophages following
    LPS and nigericin stimulation under increasing doses and durations of BEL treatment.

  system_and_design:
    model: "Primary murine peritoneal macrophages"
    genotype_or_groups: "WT versus Ephb1−/−"
    key_treatments: >
      BEL pretreatment (1, 2, or 4 μM for 4 h or 16 h), followed by LPS priming
      (100 ng/mL, 4 h) and nigericin stimulation (10 μM, 1 h)
    time_window: "Supernatants collected after 1 h of nigericin stimulation"

  readouts_and_assays:
    primary_readout: "IL-1β release in culture supernatants"
    assay: "ELISA"
    normalization: >
      ELISA signals were background-subtracted using blank wells and 480 nm readings
      and normalized to cell number based on MTT measurements

  stats:
    n_definition: "n indicates biologically independent experiments"
    n: "n ≥ 3 per group; results reproduced in ≥3 independent experiments"
    summary: "mean ± SEM"
    test: "two-tailed unpaired t-test; genotype × dose interaction assessed by two-way ANOVA"
    multiple_comparisons: "none"

  significance:
    symbols: "* P < 0.05, ** P < 0.01, *** P < 0.001; ns, not significant"

  extra_notes: >
    DMSO-treated cells served as vehicle controls; BEL treatment did not induce
    detectable cytotoxicity as assessed by MTT.
# ---------- 8. English ----------

results_skeleton_en:
  stage: T3
  purpose: "panel-level Results skeleton (pre-reduction, bilingual)"
  panel_level: results
  results_logic_type: perturbation_response

  modules:
    M1_motivation:
      en: "We next asked whether perturbations that alter cardiolipin availability through distinct mechanisms are sufficient to attenuate the terminal functional output of inflammasome signaling, as measured by IL-1β release."
      cn: "我们进一步检验，通过不同机制改变心磷脂可及性的操作，是否均足以削弱炎症小体信号通路的终端功能输出，即 IL-1β 的释放。"
      logic_source: "question.context_from_previous + question.core_question"

    M2_level_definition:
      en: "Primary peritoneal macrophages were subjected to pharmacological manipulations targeting cardiolipin regulation via distinct mechanisms, followed by LPS priming and Nigericin activation, and IL-1β released into the supernatant was quantified by ELISA with normalization to cell number."
      cn: "通过不同药理学手段从不同机制层面干预心磷脂调控后，对原代腹腔巨噬细胞进行 LPS 预激与 Nigericin 激活，并通过 ELISA 定量检测上清中 IL-1β 的释放量并校正细胞数量。"
      logic_source: "methods.readout_and_assay + question.core_question"

    M3_directional_result:
      en: "Across these perturbations, reduction of cardiolipin availability consistently led to a marked decrease in LPS- and Nigericin-induced IL-1β release, indicating convergent suppression of inflammasome terminal output."
      cn: "在上述多种干预条件下，心磷脂可及性的降低均伴随 LPS+nigericin 诱导的 IL-1β 释放显著下降，提示炎症小体终端输出出现一致性的抑制。"
      logic_source: "results.data_direction"

    M4_robustness:
      en: "The inhibitory effects on IL-1β release were dose- and/or time-dependent, reproducible across independent experimental batches, and occurred in the absence of detectable cytotoxicity."
      cn: "IL-1β 释放的抑制效应呈剂量和/或时间依赖性，在多批次独立实验中稳定复现，且未检测到明显的细胞毒性。"
      logic_source: "results.robustness_and_qc + results.stats_summary"

    M5_panel_conclusion:
      en: "Together, these results demonstrate that diverse perturbations of cardiolipin regulation—whether affecting cardiolipin abundance or remodeling—converge on attenuation of inflammasome-mediated IL-1β release, supporting cardiolipin availability as a common limiting factor for terminal inflammasome output."
      cn: "综上，这些结果表明，无论是影响心磷脂含量还是干预心磷脂重塑，不同机制层面的心磷脂调控均汇聚于炎症小体介导的 IL-1β 释放减弱，支持心磷脂可及性作为限制炎症小体终端输出的共同关键因素。"
      logic_source: "results.group_difference_statement"