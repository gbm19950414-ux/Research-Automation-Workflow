# schema.yaml v2  ——  单个 panel 的结构化写作模版（已填写：Figure 6E）
# 目标：让 AI 在几乎不需要补充信息的前提下，生成：
#   - 结果段（Results）
#   - 简短讨论/过渡段（Mini Discussion / Transition）
#   - Methods 中本实验/分析的“差异性信息”
# ============================================================

# ---------- 0. Meta & Assets：基本信息 ----------
meta:
  figure: "6"
  panel: "E"
  short_title: "跨组学机制轴综合得分"
  chapter: "多组学整合：Ephb1 缺失对线粒体相关机制轴的整体影响"
  experiment_id: "multiomics_axis_meta_summary"
  version: 1

assets:
  main_figure_file: "results/figs/figure_6_e_multiomics_axis_barplot.pdf"
  raw_data_files:
    - "results/multiomics/tables/multiomics_axis_Z_overall.tsv"
    - "results/multiomics/tables/multiomics_axis_Z_per_batch.tsv"
  stats_files:
    - "results/multiomics/tables/multiomics_axis_Z_overall.tsv"
  analysis_scripts:
    - "scripts/multi/01_multiomics_axis_Z_overall.R"
    - "scripts/plot/figure_6_e.R"
  supplementary_items:
    - ""

# ---------- 1. Scientific Question：本节要回答什么 ----------
question:
  context_from_previous: >
    Figure 6d 将 RNA 与脂质组在多个机制轴上的批次层面效应整合为多维热图，
    指向 Ephb1 缺失可能通过多条机制轴共同调节线粒体脂质稳态，其中 Membrane context 显示出较强的一致性与瓶颈强度。
  core_question: >
    在跨 RNA 与脂质组、多批次综合之后，哪些机制轴在 Ephb1−/− 巨噬细胞中呈现整体增强或受抑，
    是否存在单一占主导地位的机制瓶颈？
  hypothesis_or_expectation: >
    如果 Ephb1 缺失主要通过某一条核心机制轴驱动线粒体脂质异常，
    则在跨组学、跨批次整合后，该轴应表现出偏离 0 且统计上接近或达到显著的综合 Z 值。
  importance_reason: >
    识别是否存在单一主导机制轴，有助于在讨论和后续功能实验中聚焦于“关键瓶颈”还是“多轴分布式调节”两种不同的生物学图景。

# ---------- 2. Rationale / Design Logic：为什么这样设计 ----------
rationale:
  model_and_system: >
    使用前述同一批次的 WT 与 Ephb1−/− 腹腔巨噬细胞的转录组（RNA-seq）与脂质组（LC–MS）数据，
    并沿用 Figure 6C 中定义的六条线粒体相关机制轴
    （Synthesis / Remodeling / Oxidation / Transport / Supply / Membrane context）。
  key_variables: >
    针对每条机制轴，我们整合了轴内所有基因或脂质特征在 HO 与 WT 之间的效应，
    得到每个 omics、每个 batch 上的轴级 Z 分数，进一步通过 Stouffer 方法在组学层面与批次层面做 meta 分析。
  control_logic: >
    WT 作为 Ephb1−/− 的参照组，Z 的方向统一定义为“Ephb1−/− 相对 WT 的改变”，
    Z_multiomics_overall 接近 0 代表两组在该轴上的综合效应有限，
    正值代表机制瓶颈增加，负值代表机制瓶颈降低。
  core_justification: >
    若 Ephb1 缺失在某一条机制轴上产生一致而稳定的效应，
    则该轴在跨 RNA+lipid、跨 batch 的 Stouffer 合并后应表现为绝对值显著偏离 0 的综合 Z 值，
    反之则提示不存在单一主导瓶颈，而是多轴温和偏移的组合。

# ---------- 3. Methods（差异性信息）：只写本 panel 特有的 ----------
methods:
  inherits_from_protocol: "default_multiomics_mechanistic_axis_workflow"
  biological_material: >
    使用与 Figure 6A–6D 相同批次的小鼠腹腔巨噬细胞转录组与脂质组数据，
    生物学重复数为 RNA n_batch = 3、lipid n_batch = 3–4，分别来自 WT 与 Ephb1−/− 小鼠。
  experimental_groups: >
    比较 WT 与 Ephb1−/− 两种基因型，
    所有样本均在相同培养与处理条件下获得，仅基因型不同。
  stimuli_and_treatment: >
    本 panel 不新增刺激条件，
    使用前述实验中已获得的稳态或处理后样本的数据，重点在于下游的统计整合而非额外干预。
  time_points: >
    使用前述多组学实验的单一终点时间点（详见 Methods 总节），
    本 panel 不引入新的时间变量。
  dose_info: ""
  readout_and_assay: >
    读出为每条机制轴在 HO vs WT 中的轴级 Z，源自 RNA 侧的差异表达与脂质侧的轴级指标差异，
    具体计算流程见 multiomics_mechanistic_axis 方法。
  replicates: >
    每条轴的综合 Z 基于 RNA 3 个批次与脂质 3–4 个批次的轴级 Z 分数，
    通过 Stouffer 方法在组学内与跨组学两级合并，
    详细 n 值见 multiomics_axis_Z_overall.tsv。
  analysis_notes: >
    对于 RNA，每条轴的 Z_rna_overall 基于批次层面轴级 Z 使用 Stouffer 方法合并；
    对于脂质，Z_lipid_overall 基于 06a_lipid_axis_effect_ho_vs_wt.R 导出的 per-batch 轴级 Z_lipid_axis 合并。
    随后将 Z_rna_overall 与 Z_lipid_overall 进一步按等权 Stouffer 合并，得到 Z_multiomics_overall 及对应 p_multiomics_overall。
  minimal_methods_summary: >
    我们基于前述定义好的六条线粒体相关机制轴，
    先在每个 omics 内利用 Stouffer 方法对各批次的轴级 Z 做 meta 分析，
    再等权合并 RNA 与脂质组的 Z，得到每条轴的综合 Z_multiomics_overall 及 p 值，
    作为 Figure 6E 条形图的 y 轴读数。

# ---------- 4. Results：把图变成结构化文字 ----------
results:
  data_direction: >
    在跨 RNA 与脂质组的综合后，六条机制轴的 Z_multiomics_overall 均处于温和偏移范围内，
    未见绝对值超过 2 的强效应。
    Membrane context 与 Transport 轴的综合 Z 略为偏正（分别约为 +0.90 与 +1.21），
    Oxidation 与 Remodeling 轴也呈轻度正向偏移，
    Synthesis 轴则呈轻度负向偏移（约 −0.74），Supply 轴接近 0。
    总体趋势提示 Ephb1 缺失并未在某一条机制轴上产生高度集中的异常，
    而更像是在多条轴上产生程度有限且方向略有差异的分布式偏移。
  stats_summary: >
    在当前样本量与合并策略下，所有机制轴的 p_multiomics_overall 均未达到传统显著性阈值（0.05），
    其中 Transport 轴的综合 p 值约为 0.23、Membrane context 约为 0.37，
    其余轴的 p 值均在 0.46–0.97 区间，
    支持“缺乏单一显著主导轴”而非“完全无效应”的温和证据模式。
  key_numbers: >
    轴级综合 Z_multiomics_overall 与 p_multiomics_overall 约为：
    Membrane context: Z ≈ +0.90, p ≈ 0.37；
    Oxidation: Z ≈ +0.56, p ≈ 0.58；
    Remodeling: Z ≈ +0.43, p ≈ 0.67；
    Supply: Z ≈ −0.04, p ≈ 0.97；
    Synthesis: Z ≈ −0.74, p ≈ 0.46；
    Transport: Z ≈ +1.21, p ≈ 0.23。
    其中单一组学层面的 meta 结果显示，Membrane context 轴在脂质组方向上 Z_lipid_overall ≈ +2.81（p ≈ 0.0049），
    而在 RNA 方向上 Z_rna_overall ≈ −1.91（p ≈ 0.056），提示两组学在该轴上存在方向不完全一致的分量。
  group_difference_statement: >
    综合 RNA 与脂质组的多批次 meta 分析后，
    Ephb1−/− 巨噬细胞在任一单条机制轴上都未表现出统计学上显著的整体增强或抑制，
    但在 Transport、Membrane context 及 Oxidation 等轴上可见轻度倾向于“机制瓶颈增强”的正向 Z，
    在 Synthesis 轴上则略倾向于“机制瓶颈减弱”的负向 Z，
    与 Figure 6C 中“多轴中等效应而非单轴极端效应”的印象相一致。
  robustness_and_qc: >
    这些综合 Z 值基于 3 个 RNA 批次与 3–4 个脂质组批次的轴级结果，
    各批次间效应方向总体保持一致或波动有限，
    更改 Stouffer 合并时对单轴权重的设定不会改变“无单一显著主导轴”的总体结论。
  anomalies_or_limits: >
    Membrane context 轴在脂质组中呈现显著瓶颈效应而在 RNA 中接近负向边缘显著，
    使得跨组学合并后的 Z 被部分抵消；同 figure6 d 所讲述，这一问题可能出在对 Membrane context 轴的 gene set定义上，
    未来可通过更新基因集来进一步验证该轴的真实生物学效应。
    这一“组学间方向不完全一致”的情况提示，在解释跨组学综合 Z 时需要小心区分“信号抵消”与“真正缺乏效应”，
    也意味着该轴可能存在转录后或膜微环境层面的调控成分。

# ---------- 5. Interpretation & Role in Chapter：怎么理解 + 在整章中的作用 ----------
interpretation:
  minimal_bio_interpretation: >
    跨组学综合的结果提示，Ephb1 缺失并未在单一机制轴上造成压倒性瓶颈，
    而更类似于在合成、重塑、氧化、运输与膜环境等多条轴上产生幅度有限、方向各异的分布式扰动。
    这种图景与“线粒体脂质稳态由多条相互耦合的轴共同维持”而非“由单一瓶颈决定”的观点相吻合。
  alternative_explanations: >
    首先，目前样本量与统计功效可能不足以在温和效应下检测到显著的综合 Z，
    因此“未显著”并不等同于“完全不存在主导轴”；
    其次，Stouffer 式等权合并假定 RNA 与脂质组贡献相当，
    但在某些轴上，真实生物学可能更偏向转录后调控或结构性脂质重排，
    这会导致跨组学合并时出现“信号抵消”，
    尤其是在 Membrane context 轴这类 RNA 与 lipid 方向相反的情形。
  summary_type: "supportive,descriptive"
  claim_supported: >
    Ephb1 缺失对线粒体相关机制轴的影响呈现多轴分布式、温和偏移的特征，
    而非通过单一机制轴形成绝对主导的脂质瓶颈。
  link_to_previous: >
    在 Figure 6C 中，我们观察到多条机制轴在转录组与脂质组层面均存在中等强度的效应，
    Figure 6E 进一步表明，在跨组学与跨批次整合之后，
    这一模式更符合“多轴协同失衡”而非“单轴极端异常”的整体图景。
  transition_to_next: >
    基于这一多轴分布式偏移的结果，
    下一节将从更具体的脂质种类与线粒体结构参数入手，
    探索 Ephb1 缺失如何在微观层面重塑线粒体膜脂环境及其功能后果。

