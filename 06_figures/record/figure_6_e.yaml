# ============================================================
# schema.yaml v2 —— 单个 panel 的结构化写作模版
# Figure 7E：Mediation analysis connecting EphB1 → mediator → lipid indicators
# ============================================================

meta:
  figure: "Figure 7"
  panel: "E"
  short_title: "EphB1–signal–lipid indicator 中介分析"
  chapter: "7.5 Mediation analysis on lipid indicators downstream of EphB1"
  experiment_id: "2025-03-21_mediation_CL_indicators"
  version: 1

assets:
  main_figure_file: "results/figs/figure_7_e.pdf"
  sub_panels:
    CL_fraction: "results/figs/figure_7_e_CL_fraction_CL_total_.pdf"
    CL_membrane: "results/figs/figure_7_e_CL_membrane_CL_.pdf"
    mito_lipid_mass: "results/figs/figure_7_e_Mito_lipid_mass_PC_PE_CL_.pdf"
    PC_membrane: "results/figs/figure_7_e_PC_membrane_PC_.pdf"
    PE_membrane: "results/figs/figure_7_e_PE_membrane_PE_.pdf"
