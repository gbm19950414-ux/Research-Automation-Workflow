# ============================================================
# schema.yaml v2 — Model Panel (Conceptual / Mechanistic Diagram)
# 用于没有数据、仅用于说明假设与机制的图（如 Figure 6A）
# ============================================================

meta:
  panel_type: "model"
  figure: "Figure 7"
  panel: "A"
  short_title: "EphB1–signaling–membrane context axis mediation model"
  chapter: "S4"
  role_in_paper: >
    以 X–M–Y 概念图形式，定义 EphB1 状态、Eph 下游转录/信号通路与
    membrane context 轴及关键脂质指标之间的中介结构，
    为 Figure 7 后续所有统计中介分析提供因果框架。

# ---------- 1. Conceptual Goal（这张图要解释什么？） ----------
concept_goal:
  core_message: >
    将 EphB1 缺失对膜环境轴和关键脂质 readouts 的影响，
    形式化为通过 Eph 下游转录/信号通路 M 发生部分中介的 X–M–Y 模型。
  problem_being_explained: >
    在多组学中观察到的 “EphB1 缺失 → membrane context 轴分数 / 脂质指标改变”
    这一总体效应中，有多大比例可以归因于特定 Eph 下游转录/信号通路活动的改变，
    而非完全依赖未建模的直接作用或其他途径？

# ---------- 2. Mechanistic Elements（机制组成部分） ----------
mechanism:
  key_nodes:
    - name: "X: EphB1 status"
      description: >
        遗传或处理层面的 EphB1 状态（WT vs KO / HO），被视为外生处理变量 X，
        是整个中介模型的起点。
    - name: "M: Eph downstream signaling modules"
      description: >
        由 RNA-seq / pathway 分析定义的一组 Eph 受体下游转录/信号通路模块，
        包括 PI3K–AKT–mTOR、mito stress / cell death、AMPK energy sensing、
        PGC1–NRF 线粒体生物发生、MAPK (ERK / p38 / JNK)、integrin / caveolae
        membrane 相关通路、NFκB inflammation / ROS、JAK–STAT inflammatory、
        cytoskeleton–FAK–Src–Rho 等，作为潜在中介 M。 
    - name: "Y_axis: membrane context axis score"
      description: >
        通过 Figure 6 已定义的 membrane context 机制轴的样本级得分，
        综合反映线粒体膜脂组成、PC/PE 比值、CL 周边脂环境等特征，
        作为下游结果变量之一。
    - name: "Y_lipid: key lipid readouts score"
      description: >
        若干代表性膜脂指标（如与 CL 相关的脂质分数组、PC/PE、PG/PA 等）
        构成的合成得分或单独 readout，用于在轴之下对具体膜脂变化进行下钻。
    - name: "a×b: mediated_effect"
      description: >
        统计中介分析中，通过 M 传递的 EphB1 效应，即 X→M 的效应 a 与 M→Y 的效应 b
        的乘积 a×b，对应于图中标注的 “a × b: indirect (mediated) effect”。

  key_edges:
    - from: "X: EphB1 status"
      to: "M: Eph downstream signaling modules"
      type: "associate"
      evidence: >
        以基因集富集 / 通路打分为基础，在不同批次 RNA-seq 数据中比较
        EphB1 WT 与 KO/HO 样本的通路活性，估计路径系数 a；
        该边在模型中被视为 “EphB1 状态对 Eph 下游转录/信号通路活性的因果影响假设”，
        但具体方向和大小在不同模块间可不同。
    - from: "M: Eph downstream signaling modules"
      to: "Y_axis: membrane context axis score"
      type: "associate"
      evidence: >
        在控制 X 的前提下，以轴级得分为结果、通路活性为预测变量，估计路径系数 b_axis；
        该边对应 “Eph 下游通路活性变化对 membrane context 轴分数的因果影响假设”，
        间接效应由 a×b_axis 给出。
    - from: "M: Eph downstream signaling modules"
      to: "Y_lipid: key lipid readouts score"
      type: "associate"
      evidence: >
        同样在控制 X 的条件下，以关键膜脂 readout 或其合成得分为结果估计 b_lipid；
        该边捕捉通路活性变化对具体膜脂指标的影响，间接效应为 a×b_lipid。
    - from: "X: EphB1 status"
      to: "Y_axis: membrane context axis score"
      type: "associate"
      evidence: >
        图中未显式标出 c 或 c' 箭头，但在实际统计模型中，
        将估计总效应 c（不控制 M）以及在控制 M 后的直接效应 c'，
        以判断间接效应 a×b 在总体效应中的占比（partial vs. full mediation）。
    - from: "X: EphB1 status"
      to: "Y_lipid: key lipid readouts score"
      type: "associate"
      evidence: >
        同上，对关键膜脂 readouts 估计总效应及在控制 M 后的残余效应，
        用于评估是否存在不经 M 的直接通路；
        在本概念图中仅以文字说明，不单独绘制系数。

# ---------- 3. Evidence Mapping（每条机制对应论文证据） ----------
evidence_mapping:
  supported_links:
    - mechanism_step: "X → Y_axis / Y_lipid：EphB1 缺失与 membrane context 轴及关键膜脂 readouts 的总体效应 (c)"
      supported_by: ["Fig6C", "Fig6D", "Fig6E"]
      confidence: "high"
    - mechanism_step: "X → M：EphB1 状态与 Eph 下游通路活性的关联 (a)"
      supported_by: ["Fig7B", "Fig7C"]
      confidence: "medium"
    - mechanism_step: "M → Y_axis / Y_lipid：在给定 X 条件下通路活性与轴 / 膜脂 readouts 的关联 (b)"
      supported_by: ["Fig7D", "Fig7E"]
      confidence: "medium"
    - mechanism_step: "a×b：Eph 下游通路对 EphB1 效应的间接贡献"
      supported_by: ["Fig7D", "Fig7E"]
      confidence: "medium"
  speculative_links:
    - mechanism_step: "X → Y 的完全中介：EphB1 对膜环境轴和膜脂的效应全部通过所列转录/信号通路 M 传递"
      rationale: >
        若各 Y 的总效应 c 大体可被若干 a×b 分量之和解释，且 c' 接近 0，
        则可推断大部分效应由 M 中介；目前数据更支持 “部分中介”，完全中介仍属假设。
      boundary: >
        由于 M 的选取有限，且多组学数据在批次和样本量上有限，
        即使观测到显著 a×b 也不能排除其他未建模通路或直接膜相互作用对 Y 的贡献。

# ---------- 4. Graphical Logic（图要怎么讲故事） ----------
visual_logic:
  flow_direction: "left-to-right"
  entry_point: "EphB1 status (WT vs KO/HO) 作为外生处理变量 X"
  exit_point: "membrane context 轴分数及 key lipid readouts 作为下游结果 Y"
  causal_chain:
    - "EphB1 status (X)"
    - "Eph downstream signaling modules (M)"
    - "membrane context axis score / key lipid readouts (Y)"
  parallel_paths:
    - "多个 Eph 下游通路模块 M₁…M_k 并联连接 X 与 Y，允许不同通路以不同方向 / 强度中介 EphB1 的效应。"
  feedback_loops:
    - "本图不显式建模反馈回路；潜在的膜环境变化反馈影响 EphB1 / 通路活性在讨论中定性提及，而非本次中介分析的估计目标。"

# ---------- 5. Message Strength & Boundaries（力度与边界） ----------
interpretation:
  what_is_certain: >
    现有多组学结果支持 EphB1 缺失会改变 membrane context 轴分数和部分关键膜脂 readouts（总效应 c 存在），
    同时与多个 Eph 下游通路模块的富集 / 活性改变相关；
    在控制 X 的条件下，这些通路活性与 Y 之间也存在可量化的关联，
    为估计间接效应 a×b 提供了基础。
  what_is_plausible: >
    至少部分 EphB1 对膜环境轴和膜脂组成的影响，是通过这些转录/信号通路模块传递的；
    不同通路在不同 Y 上的 a×b 大小和符号不同，构成一个多通路、多 readout 的 “部分中介” 网络。
  what_is_unknown: >
    各通路 a×b 之和是否足以解释全部总效应 c，即是否存在近乎完全中介；
    以及 EphB1 是否还通过未纳入 M 的非转录机制（如直接影响膜微区、受体–脂筏相互作用）
    调控膜环境轴和膜脂；此外，观测性多组学数据的混杂与批次效应限制了因果量化的精度。
  why_model_needed: >
    该中介模型将 “EphB1 → 多通路信号 → membrane context 轴 / 膜脂 readouts”
    的复杂多组学结果压缩为一个 X–M–Y 框架，
    使读者清楚理解 Figure 7 中 “a、b、a×b” 这些系数在统计上对应什么，
    在生物学上又如何被解释为 “Eph 下游通路对 EphB1 效应的中介份额”。

# ---------- 6. Transition（图在正文中的作用） ----------
transition:
  how_it_summarizes_previous: >
    该概念图在 Figure 6 所建立的 CL 机制轴与 membrane context 轴框架之上，
    进一步把 EphB1 缺失对轴级与膜脂 readouts 的总体效应抽象为 X→Y 的总效应 c，
    并指出这些效应有可能部分通过特定的 Eph 下游通路活动 M 传递，
    从而整合前文的差异表达 / 通路富集信息。
  how_it_leads_next_section: >
    图中明确的 X–M–Y 结构为后续 Figure 7B–7E 的具体中介分析提供了路线图：
    接下来将依次展示 X→M 的 a、M→Y 的 b 以及 a×b 的估计与置信区间，
    并与残余直接效应 c' 对比，从而回答
    “哪些通路在多大程度上中介了 EphB1 对膜环境轴和关键膜脂 readouts 的影响”。

# ---------- 7. AI Writing Hints（写作提示，可选） ----------
ai_hints:
  target_section: ["Results_mediation", "Discussion_model"]
  tone: "neutral"
  language: "zh_en_mix"
  target_journal_style: "Cell Metabolism"