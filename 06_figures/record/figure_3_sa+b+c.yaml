# ============================================================
# schema.yaml v2 —— Figure 3 Supplementary A/B/C
# 目的：展示多批次、多条件下 ROS / Δψm 动态模式的一致性与结构性
# ============================================================

# ---------- 0. Meta & Assets ----------
meta:
  figure_id: "Figure S3A–C"
  experiment_id: "figure_3_b"
  short_title: "多批次条件下 ROS 与 Δψm 动态模式的整体一致性分析"

assets:
  main_figure_file: "figures/F3/F3S_heatmap_ros_tmrm.pdf"
  raw_data_files:
    - "data/plate_reader/ros_tmrm_timecourse_all_batches.csv"
  stats_files:
    - "results/summary/auc_summary_stats.csv"
  analysis_scripts:
    - "scripts/plot_heatmap_timecourse.py"
  supplementary_items:
    - "Figure 3A–H"

# ---------- 1. Scientific Question ----------
question:
  context_from_previous: >
    主图 Figure 3A–H 显示 EphB1 缺失在炎症小体激活过程中伴随
    细胞质 ROS 上升减缓与 Δψm 下降幅度减小。
  core_question: >
    这些 ROS 与 Δψm 的动态差异是否在不同实验批次、
    不同刺激与读数条件下保持一致的整体结构模式？
  hypothesis_or_expectation: >
    若 EphB1 缺失确实限制炎症小体激活过程中的线粒体阶段反应，
    则多批次时间序列数据应呈现可重复的动力学结构差异，
    而非单一实验的偶然偏移。
  importance_reason: >
    多批次一致性分析有助于区分真实的生物学模式与批次噪音，
    为主图结论提供稳健性支持。

# ---------- 2. Rationale / Design Logic ----------
rationale:
  model_and_system: >
    汇总 WT 与 Ephb1−/− 原代腹腔巨噬细胞在多次独立实验中
    采集的 plate reader 时间序列数据。
  key_variables: >
    变量包括基因型（WT vs Ephb1−/−）、刺激条件
    （未刺激、LPS、LPS+nigericin）及不同荧光 readout
    （H2DCFDA、MitoSOX、TMRM）。
  control_logic: >
    通过对所有时间序列按初始时间点归一化，
    并以 WT/HO 比值形式展示，
    降低绝对信号差异对跨批次比较的影响。
  core_justification: >
    若差异源自 EphB1 缺失对炎症小体执行阶段的稳定影响，
    则其在时间维度上的整体模式应在多批次中保持一致，
    并呈现可辨识的结构性特征。

# ---------- 3. Methods（差异性信息） ----------
methods:
  inherits_from_protocol: "default_plate_reader_ros_tmrm_timecourse"
  biological_material: >
    多批次独立分离的 WT 与 Ephb1−/− 小鼠原代腹腔巨噬细胞。
  experimental_groups: >
    按基因型（WT / Ephb1−/−）与刺激条件
    （未刺激、LPS、LPS+nigericin）分组。
  stimuli_and_treatment: >
    LPS 预处理后以 nigericin 激活炎症小体；
    未刺激与单独 LPS 作为对照条件。
  time_points: >
    0–120 min 时间序列读数，统一时间步长。
  dose_info: >
    各批次采用相同刺激与染料浓度设置。
  readout_and_assay: >
    Plate reader 连续监测 H2DCFDA（细胞质 ROS）、
    MitoSOX（线粒体 ROS）与 TMRM（Δψm）荧光信号；
    所有时间序列按各自起始时间点归一化，
    并以 WT/HO 比值形式用于 heatmap 展示。
  replicates: >
    汇总 ≥3 次独立实验批次，
    每批次包含 WT 与 Ephb1−/− 平行测定。
  analysis_notes: >
    采用 heatmap 方式展示不同批次、条件与 readout 的
    时间演化结构，不进行额外统计检验。
  minimal_methods_summary: >
    将多批次 ROS 与 Δψm 时间序列数据归一化后以 WT/HO 比值
    形式可视化，用于评估动力学差异的整体一致性。

# ---------- 4. Results ----------
results:
  data_direction: >
    在 LPS+nigericin 条件下，
    多数批次中 H2DCFDA 的 WT/HO 比值随时间升高，HO升高的幅度与量级小于WT
    MitoSOX 的 WT/HO 比值随时间升高，HO升高的幅度与量级大于WT
    而 TMRM 的 WT/HO 比值随时间升高，HO升高的幅度与量级大于WT
  stats_summary: >
    本补充图为结构性可视化分析，
    未对单一时间点进行统计显著性检验。
  key_numbers: >
    不适用（以整体时间结构为主要观察对象）。
  group_difference_statement: >
    不同批次间虽存在绝对信号幅度差异，
    但在炎症小体激活条件下，
    ROS 与 Δψm 的 WT/HO 动态模式在结构上保持一致。
  robustness_and_qc: >
    相同 readout 在不同批次中呈现相似的时间演化趋势，
    未见单一批次主导整体模式的情况。
  anomalies_or_limits: >
    个别批次中 MitoSOX 信号波动较大，
    提示线粒体 ROS readout 的批间变异性较高。

# ---------- 5. Interpretation & Role in Chapter ----------
interpretation:
  minimal_bio_interpretation: >
    多批次 heatmap 分析表明，
    Figure 3 主图中观察到的 ROS 与 Δψm 动态差异
    并非来源于单一实验批次的偶然波动。
  alternative_explanations: >
    该分析不能排除不同批次间刺激效率或探针加载差异，
    但其不影响整体动力学结构的一致性判断。
  summary_type: "supportive"
  claim_supported: >
    EphB1 缺失相关的炎症小体激活期线粒体应激特征
    在多批次实验中具有稳定的动力学模式。
  link_to_previous: >
    该补充图对 Figure 3A–H 中的时间序列结果
    提供了跨批次的一致性支持。
  transition_to_next: >
    基于这些稳健的动力学差异，
    后续章节将进一步结合更直接的线粒体界面 readout
    定位 EphB1 作用的分子层级。

# ---------- 6. figure_legend ----------
figure_legend:
  title: "多批次 ROS 与 Δψm 时间序列的 WT/HO 比值热图分析"
  panels:
    description: >
      (A) H2DCFDA、(B) MitoSOX 与 (C) TMRM 在不同批次、
      不同刺激条件下的 WT/HO 时间序列比值热图。
  groups:
    definition: >
      WT 与 Ephb1−/− 原代腹腔巨噬细胞。
  sample_size:
    n_per_group: "每批次 n ≥ 3 技术重复"
    replicates: "≥3 次独立生物学实验批次"
  statistics:
    test: "不适用（结构性可视化分析）"
    multiple_comparison: "未进行"
  normalization:
    description: >
      所有时间序列按各自起始时间点归一化，
      并以 WT/HO 比值形式展示。
  significance:
    symbols: "不适用"

# ---------- 7. AI Writing Hints ----------
ai_hints:
  target_section: ["Results", "Discussion_mini"]
  tone: "neutral"
  target_journal_style: "Nature Immunology"
  language: "zh_en_mix"