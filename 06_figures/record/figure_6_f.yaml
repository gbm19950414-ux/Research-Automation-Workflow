# ============================================================
# schema.yaml v2  ——  单个 panel 的结构化写作模版
# 目标：让 AI 在几乎不需要补充信息的前提下，生成：
#   - 结果段（Results）
#   - 简短讨论/过渡段（Mini Discussion / Transition）
#   - Methods 中本实验的“差异性信息”
# ============================================================

# ---------- 0. Meta & Assets：基本信息 ----------
meta:
  figure: "6"              # 如 "Figure 3"
  panel: "A"               # 如 "A"
  short_title: "机制轴效应与 CL 表型的跨批次关联分析"         # 1 句以内，本 panel 做了什么（如："EphB1 缺失抑制 NLRP3 介导的 IL-1β 释放"）
  chapter: "Mitochondrial lipid remodeling"             # 属于哪一章/小节，如 "3.2 Mitochondrial damage during pyroptosis"
  experiment_id: "multiomics_axis_CL_link"       # 选填，用于和你的实验记录/脚本对应，如 "2025-03-21_NLRP3_IL1b_ELISA"
  version: 1              # 整数，用来追踪修改

assets:
  main_figure_file: "results/figs/figure_6_f.png"    # 主图文件路径，如 "figures/F3/F3A_IL1b_ELISA.pdf"
  raw_data_files:         # 原始数据/整理后数据的文件路径列表
    - "results/multiomics/mechanistic_axis_effects_matrix.tsv"
  stats_files:            # 统计分析结果文件（R/Python 脚本输出）
    - "results/figs/figure_6_f_all_stats.tsv"
  analysis_scripts:       # 用于生成图/做统计的脚本
    - "scripts/plot/figure_6_f.R"
  supplementary_items:    # 对应的补充图/表（若有）
    - "Figure S6F_full"

# ---------- 1. Scientific Question：本节要回答什么 ----------
question:
  context_from_previous: "上一节识别了 HO 与 WT 在线粒体脂质生成、氧化与膜环境方面的主要机制轴差异。"  # 与上一节的衔接（1 句）：上一节发现/提出了什么问题？
                             # 例如：“前一节结果提示 EphB1 缺失可能限制 NLRP3 炎性小体的完全激活。”
  core_question: "这些机制轴的综合效应是否能预测跨批次的关键 CL 表型变化？"          # 本 panel 的核心科学问题（1 句，用“是否”、“如何”、“在多大程度上”等）
                             # 例如：“本节检验 EphB1 缺失是否降低 NLRP3 激活后 IL-1β 的分泌水平。”
  hypothesis_or_expectation: "若轴 Z 分数真实反映脂质代谢瓶颈，则 CL panel 的 HO–WT 差值应与轴效应呈一致趋势。"  # 你的假设或预期结果（1 句）
                             # 例如：“如果 EphB1 促进 NLRP3 炎性小体的效应端活性，则 EphB1 缺失应降低 IL-1β 的释放。”
  importance_reason: "建立机制轴与真实脂质读数之间的联系，是验证多组学整合分析可靠性的关键步骤。"      # 为什么这个问题重要/值得单列一节（1 句即可）
                             # 例如：“IL-1β 是 NLRP3 炎性小体的关键功能 readout，用于评估效应端活性。”

# ---------- 2. Rationale / Design Logic：为什么这样设计 ----------
rationale:
  model_and_system: "以批次为单位，将每个 axis 的 combined Z 分数与 CL panel 中的 HO–WT 脂质差值配对。"       # 使用的模型/系统 + 选择理由
                             # 例如：“选用原代腹腔巨噬细胞，因为其对 NLRP3 激活高度敏感，且能反映体内炎症状态。”
  key_variables: "自变量：combined Z（HO–WT）；因变量：CL 相关脂质指标 HO–WT 差值。"          # 本实验关注的关键变量 + 操纵方式
                             # 例如：“操纵基因型（WT vs Ephb1−/−）和刺激条件（LPS 预处理 + ATP/Nigericin 激活）。”
  control_logic: "跨批次差值可减少实验噪声，并凸显 HO 特异性的方向性变化。"          # 对照设置背后的逻辑（为什么这些对照足以回答问题）
                             # 例如：“未刺激组用于定义基线 IL-1β 水平，WT 作为 Ephb1−/− 的参照组。”
  core_justification: "若某轴主导 HO 的 CL 含量变化，则不同批次中该轴的 Z 分数应与 CL 表型一致变化。"     # 最关键的一句“设计理由”（可直接当自动摘要用）
                             # 例如：“如果 EphB1 促进炎性小体效应端活性，则 Ephb1−/− 细胞在相同刺激下应释放更少 IL-1β。”

# ---------- 3. Methods（差异性信息）：只写本 panel 特有的 ----------
methods:
  inherits_from_protocol: "default_multiomics_CL_pipeline"   # 引用全章或整篇论文的通用 protocol 名称，如 "default_peritoneal_macrophage_NLRP3_activation"
                               # 之后可在 Methods 总节详细描述该 protocol。
  biological_material: "原代腹腔巨噬细胞（C57BL/6 WT 与 HO 基因敲除小鼠）。"      # 使用的生物材料/模型：动物/原代/细胞系 + 关键信息
                               # 例如：“8–12 周龄雄性 C57BL/6 WT 与 Ephb1−/− 小鼠来源的原代腹腔巨噬细胞。”
  experimental_groups: "每个批次均包含 WT 与 HO，并计算 HO–WT 差值。"      # 组别及核心差异：基因型、处理、时间点
                               # 例如：“按基因型分为 WT 和 Ephb1−/−，均接受 LPS 预处理 + ATP 激活。”
  stimuli_and_treatment: "无特异性刺激"    # 刺激/药物/处理的关键信息（种类 + 浓度 + 时间）
                               # 例如：“LPS 100 ng/mL 预处理 4 h，随后 ATP 5 mM 处理 30 min。”
  time_points: "无特殊时间点"              # 关键测定时间点（如果不在上面已写清）
  dose_info: "无剂量"                # 若有剂量梯度，在此简要说明（如 “Alexidine 0, 1, 5, 10 μM”）
  readout_and_assay: "LC-MS 测得 CL panel 指标；multi-omics 整合获得 mechanistic axis Z 分数。"        # 读出方式（ELISA/WB/IF/plate reader）及关键差异信息
                               # 例如：“使用 IL-1β ELISA 测定上清中 IL-1β，按厂商说明书操作。”
  replicates: "共 3–4 个独立批次（每批含 WT 与 HO），每批次视为一个数据点。"               # 生物学重复数 n，以及是否合并多次实验
                               # 例如：“每组 n = 4 生物学重复，结果合并自两次独立实验。”
  analysis_notes: "对每个 axis × phenotype 做线性回归，记录 r、p 与斜率方向；无对数转换。"           # 本 panel 特有的分析方法/统计模型（如 normalization、配对 vs 非配对）
                               # 例如：“采用非配对双尾 t 检验；ELISA 结果按蛋白浓度归一化。”
  minimal_methods_summary: "以批次为单位，将 HO–WT 的 CL 表型差值与机制轴 Z 分数进行回归分析。"  # 1–2 句，把上面内容压缩成将来写 Methods 时可以直接用的一小段。

# ---------- 4. Results：把图变成结构化文字 ----------
results:
  data_direction: >
    以批次为单位，将每条机制轴的 combined Z（HO−WT）与 sum_CL 的 HO−WT 差值做回归，
    直接检验多组学轴效应能否在总量层面预测心磷脂丰度的变化。
    在 Membrane context 轴上，sum_CL 的 HO−WT 差值随轴 Z 分数升高整体呈下降趋势，
    回归斜率约为 −6.67×10⁸（n = 4），相关系数 r ≈ −0.97，提示在跨批次层面总 CL 量在膜环境受扰更严重的 HO 中整体略有下降。
    Oxidation 轴中，sum_CL 与轴效应几乎不相关（斜率约 6.82×10⁷，r ≈ 0.09，p ≈ 0.91，n = 4），
    暗示氧化轴更多反映 CL 质量/修饰状态而非总量变化。
    Remodeling 轴中，sum_CL 随轴 Z 分数升高略有下降（斜率约 −3.21×10⁸，r ≈ −0.18，p ≈ 0.82，n = 4），
    但相关性较弱，批次间点位主要围绕 0 轻度波动。
    Supply 轴中，sum_CL 与轴效应几乎完全脱耦（斜率约 3.32×10⁵，r ≈ 0.00，p ≈ 1.00，n = 4），
    说明在当前数据集中，底物供应轴所捕捉的变化很难转化为跨批次可见的总 CL 量差异。
    Synthesis 轴中，sum_CL 与轴效应呈轻度负相关（斜率约 −4.46×10⁸，r ≈ −0.37，p ≈ 0.63，n = 4），
    方向上暗示 HO 中“合成轴越偏离 WT，总 CL 越低”，但统计上并不显著。
    Transport 轴中，仅有 3 个批次的数据点可用于回归，sum_CL 随轴效应升高略有下降（斜率约 −1.16×10⁸，r ≈ −0.29，p ≈ 0.81，n = 3），
    整体趋势同样较弱。
  stats_summary: >
    对 sum_CL 的 HO−WT 差值与各机制轴 combined Z（HO−WT）进行线性回归，
    Membrane context/sum_CL 的斜率为 −6.67×10⁸（r = −0.97，p = 0.035，n = 4），
    是所有轴中相关性绝对值最高的一对组合。
    Oxidation/sum_CL 的斜率为 6.82×10⁷（r = 0.09，p = 0.912，n = 4），几乎无相关；
    Remodeling/sum_CL 的斜率为 −3.21×10⁸（r = −0.18，p = 0.817，n = 4），
    Supply/sum_CL 的斜率为 3.32×10⁵（r = 0.00，p = 0.9996，n = 4），
    Synthesis/sum_CL 的斜率为 −4.46×10⁸（r = −0.37，p = 0.625，n = 4）。
    Transport/sum_CL 的数据点数较少（n = 3），斜率为 −1.16×10⁸（r = −0.29，p = 0.811，n = 3），
    整体相关性较弱。
  key_numbers: >
    Membrane context/sum_CL: n = 4，slope = −6.67×10⁸，r = −0.97，p = 0.035；
    Oxidation/sum_CL: n = 4，slope = 6.82×10⁷，r = 0.09，p = 0.912；
    Remodeling/sum_CL: n = 4，slope = −3.21×10⁸，r = −0.18，p = 0.817；
    Supply/sum_CL: n = 4，slope = 3.32×10⁵，r = 0.00，p = 0.9996；
    Synthesis/sum_CL: n = 4，slope = −4.46×10⁸，r = −0.37，p = 0.625；
    Transport/sum_CL: n = 3，slope = −1.16×10⁸，r = −0.29，p = 0.811。
  group_difference_statement: >
    总体来看，sum_CL 的 HO−WT 差值在各机制轴和批次之间大多围绕 0 波动，
    绝对值主要落在 10⁸–10⁹ 的量级，未出现“所有批次 HO 显著高于或显著低于 WT”的单向模式。
    在 Membrane context、Remodeling、Synthesis 与 Transport 轴上，回归斜率均为负值，
    提示在这些轴上 HO 的轴效应越偏离 WT，总 CL 量整体更倾向于降低；
    而 Oxidation 与 Supply 轴的斜率接近 0 或略微为正，说明在当前数据集中，氧化与底物供应的综合轴效应
    很难在总量层面拉开 HO 与 WT 的差距。
  robustness_and_qc: >
    绝大多数轴 × 表型组合仅包含 4 个批次（Transport 轴为 3 个批次），
    在如此小样本量下，即便 Membrane context/sum_CL 的 r 接近 −0.97，p 值也仅达到约 0.035，
    其余轴的 p 值均明显大于 0.6，提示统计置信度有限。
    回归残差未见异常极端离群点，但由于 sum_CL 的跨批次变化幅度本身较小，
    线性模型对斜率的估计容易受到单个批次波动的影响；
    此外，Transport 轴缺失一个批次的数据，使得该轴的相关系数与斜率更加不稳定，应谨慎解读。
  anomalies_or_limits: >
    与前一部分分析的 CL_PG_ratio、MLCL_CL_ratio 或 PA mismatch 不同，sum_CL 作为总量 readout 的动态范围有限，
    在一些批次中 HO−WT 差值接近 0，这本身限制了回归分析的分辨率，
    也使得即便相关系数在个别组合（如 Membrane context/sum_CL）中较高，其生物学意义仍需谨慎评估。
    此外，当前回归仅基于 3–4 个批次的数据，尚无法排除批次性技术噪声或未记录协变量
    对斜率和相关系数的影响，因此这些结果更适合作为探索性线索，而非严格的定量验证。

# ---------- 5. Interpretation & Role in Chapter：怎么理解 + 在整章中的作用 ----------
interpretation:
  minimal_bio_interpretation: >
    在本图中，纵轴的 sum_CL 代表心磷脂总量在 HO 与 WT 之间的差值（HO−WT），
    因此每一个点都可以被直接解读为“在该批次、该轴效应水平下，HO 的心磷脂总量是略高还是略低于 WT”。
    结果显示，多数组学机制轴与 sum_CL 之间的线性相关性整体较弱，
    仅在 Membrane context 轴上可以观察到“轴效应越偏离 WT，总 CL 越低”的负相关趋势（r 接近 −0.97），
    与“膜环境/线粒体容量受损时，心磷脂总池难以维持”的直觉相符；
    其他轴（氧化、重塑、供应、合成、转运）与 sum_CL 之间的相关性则接近于 0 或仅为轻度负相关，
    提示这些轴在当前数据集中更多反映的是 CL 的分布、比例关系或质量状态的改变，
    而不是简单的总量增减。
  alternative_explanations: >
    一种可能的解释是：在稳态条件下，细胞倾向于维持心磷脂总量在相对窄的范围内，
    即使合成、重塑或转运轴在 HO 中发生了显著扰动，也可以通过其他代偿机制（如脂肪酸组成调整、
    其他膜磷脂的替代等）部分对冲总池量的变化，从而削弱了 sum_CL 与机制轴之间的线性耦合；
    另一方面，sum_CL 作为多个 CL 分子种类的合并 readout，本身会平均掉部分物种特异性的变化，
    相比 MLCL_CL_ratio、CL_PG_ratio 或 PA mismatch 这类“结构/通路更特异”的指标，
    更难直接映射到单一机制轴的方向上；
    再者，本分析仅包含 3–4 个批次，且未对潜在的批次协变量进行显式建模，
    也可能低估了真实的轴–表型耦合强度。
  claim_supported: >
    综合来看，多组学机制轴在方向上并未与 sum_CL 的 HO−WT 差值产生系统性矛盾，
    但除 Membrane context 轴外，其余轴与总 CL 量之间的相关性较弱且不显著，
    支持这样一个观点：这些轴更适合作为描述“合成、重塑、转运和膜环境等不同类型 CL 瓶颈”的整合维度，
    而不是用来精确预测心磷脂总量本身的读数；
    换言之，EphB1 缺失所引发的 CL 代谢重编程，更主要体现在结构比例与亚细胞分布层面的失衡，
    而不是简单的 CL 池大小变化。
  link_to_previous: >
    在前一节中，我们通过 CL_PG_ratio、MLCL_CL_ratio、PA mismatch 等更“结构特异”的指标，
    证明合成、重塑与转运轴的 Z 分数在方向上与其设计对应的 CL 表型基本自洽；
    本节进一步将视角扩展到 sum_CL 这一总量 readout，显示除了 Membrane context 轴外，
    大多数轴与总 CL 量之间并无强相关，
    从而强调这些机制轴主要刻画的是 CL 代谢网络内部的瓶颈类型与流向偏移，而非单一总量变化。
  transition_to_next: >
    接下来，我们将不再局限于单一 readout，而是综合各条机制轴及其代表性 CL 表型（包括总量与比例类指标），
    构建 EphB1 缺失条件下心磷脂合成、重塑与转运失衡的整体调控模型，
    并进一步与功能 readout（如 NLRP3 激活和 IL-1β 释放）进行对照，以评估这些代谢瓶颈在炎症表型中的贡献。
# ---------- 6. AI Writing Hints（可选）：给 LLM 的写作风格提示 ----------
ai_hints:
  target_section: ["Results", "Discussion_mini", "Methods_diff"] 
    # 你希望从这个 schema 主要生成哪些部分的正文？
    # 可选值： "Results" / "Discussion_mini" / "Methods_diff"
  tone: "neutral"     
    # 写作语气： "neutral"（默认科研语气）/ "cautious"（更谨慎）/ "confident"（偏肯定）
  target_journal_style: "" 
    # 若有心仪期刊的写作风格，可以在此填入名称，仅作为“风格参考”
    # 例如："Cell Metabolism", "Nature Immunology"
  language: "zh_en_mix"
    # 你希望生成何种语言： "zh"（中文）/ "en"（英文）/ "zh_en_mix"（中英混排方便你润色）