# ============================================================
# schema.yaml v2  ——  单个 panel 的结构化写作模版
# 目标：让 AI 在几乎不需要补充信息的前提下，生成：
#   - 结果段（Results）
#   - 简短讨论/过渡段（Mini Discussion / Transition）
#   - Methods 中本实验的“差异性信息”
# ============================================================

# ---------- 0. Meta & Assets：基本信息 ----------
meta:
  figure: "Figure 3"              # 如 "Figure 3"
  figure_id: "3k"              # 如 "Figure 3"
  short_title: "EphB1 缺失降低 GSDMD-NT 在线粒体早期富集"         # 1 句以内，本 panel 做了什么（如："EphB1 缺失抑制 NLRP3 介导的 IL-1β 释放"）
  chapter: "3.3 EphB1 缺失降低 GSDMD 的线粒体结合"             # 属于哪一章/小节，如 "3.2 Mitochondrial damage during pyroptosis"
  experiment_id: "figure_3_a"       # 选填，用于和你的实验记录/脚本对应，如 "2025-03-21_NLRP3_IL1b_ELISA"
  version: 1              # 整数，用来追踪修改
  claim: 
  evidence_level: #existence / association / positioning / necessity / sufficiency / rescue
  causal_strength: #correlational / suggestive / causal
  scope: #cell type、stimulus、time window
  alt explanations: 
assets:
  main_figure_file: ""    # 主图文件路径，如 "figures/F3/F3A_IL1b_ELISA.pdf"
  raw_data_files:         # 原始数据/整理后数据的文件路径列表
    - ""
  stats_files:            # 统计分析结果文件（R/Python 脚本输出）
    - ""
  analysis_scripts:       # 用于生成图/做统计的脚本
    - ""
  supplementary_items:    # 对应的补充图/表（若有）
    - ""                  # 如 "Figure S3B", "Table S2"

# ---------- 1. Scientific Question：本节要回答什么 ----------
question:
  context_from_previous: "上一节显示 EphB1 缺失减缓细胞质 ROS 上升并维持线粒体膜电位、减少炎症小体激活过程中的胞质 mtDNA 释放，提示更好的线粒体膜完整性。同时需要进一步排除 EphB1 缺失是否通过改变线粒体数量而间接影响上述膜相关 readouts。"  # 与上一节的衔接（1 句）：上一节发现/提出了什么问题？
                             # 例如：“前一节结果提示 EphB1 缺失可能限制 NLRP3 炎性小体的完全激活。”
  core_question: "炎症小体激活过程中，线粒体膜完整性取决于GSDMD-NT与线粒体的结合。EphB1 缺失是否影响炎症小体激活早期 GSDMD-NT 与线粒体膜的结合与富集？"          # 本 panel 的核心科学问题（1 句，用“是否”、“如何”、“在多大程度上”等）
                             # 例如：“本节检验 EphB1 缺失是否降低 NLRP3 激活后 IL-1β 的分泌水平。”
  hypothesis_or_expectation: "若 EphB1 调节膜脂微环境或线粒体相关纳米结构，则 GSDMD-NT 的线粒体富集应下降。"  # 你的假设或预期结果（1 句）
                             # 例如：“如果 EphB1 促进 NLRP3 炎性小体的效应端活性，则 EphB1 缺失应降低 IL-1β 的释放。”
  importance_reason: "GSDMD-NT 在线粒体早期定向富集是执行端膜事件的关键步骤，可用于定位差异发生节点。"      # 为什么这个问题重要/值得单列一节（1 句即可）
                             # 例如：“IL-1β 是 NLRP3 炎性小体的关键功能 readout，用于评估效应端活性。”

# ---------- 2. Rationale / Design Logic：为什么这样设计 ----------
rationale:
  model_and_system: "使用 WT 与 Ephb1-deficient 原代腹腔巨噬细胞，因为其对 LPS+Nigericin 的响应能可靠诱导早期 GSDMD-NT 线粒体富集。"       # 使用的模型/系统 + 选择理由
                             # 例如：“选用原代腹腔巨噬细胞，因为其对 NLRP3 激活高度敏感，且能反映体内炎症状态。”
  key_variables: "检测炎症小体激活后不同时间点线粒体分级中的 GSDMD-NT 变化，并比较 WT vs KO 在峰值时间的富集指数。"          # 本实验关注的关键变量 + 操纵方式
                             # 例如：“操纵基因型（WT vs Ephb1-deficient）和刺激条件（LPS 预处理 + ATP/Nigericin 激活）。”
  control_logic: "Total lysate 中 pro-GSDMD/NT 比例用于排除切割不足；线粒体分级用于检测定位差异。"          # 对照设置背后的逻辑（为什么这些对照足以回答问题）
                             # 例如：“未刺激组用于定义基线 IL-1β 水平，WT 作为 Ephb1-deficient 的参照组。”
  core_justification: "若 KO 组在线粒体中的 NT 峰值降低，则说明差异定位于‘GSDMD 与膜结合/稳定’步骤，并结合线粒体数量评估，以避免将丰度变化误判为膜结合效率差异。"     # 最关键的一句“设计理由”（可直接当自动摘要用）
                             # 例如：“如果 EphB1 促进炎性小体效应端活性，则 Ephb1-deficient 细胞在相同刺激下应释放更少 IL-1β。”

# ---------- 3. Methods（差异性信息）：只写本 panel 特有的 ----------
methods:
  inherits_from_protocol: "default_peritoneal_macrophage_NLRP3_activation"   # 引用全章或整篇论文的通用 protocol 名称，如 "default_peritoneal_macrophage_NLRP3_activation"
                               # 之后可在 Methods 总节详细描述该 protocol。
  biological_material: "8–12 周龄 C57BL/6 WT 与 Ephb1-deficient 原代腹腔巨噬细胞。"      # 使用的生物材料/模型：动物/原代/细胞系 + 关键信息
                               # 例如：“8–12 周龄雄性 C57BL/6 WT 与 Ephb1-deficient 小鼠来源的原代腹腔巨噬细胞。”
  experimental_groups: "WT vs Ephb1-deficient；均接受 LPS priming + Nigericin 激活。"      # 组别及核心差异：基因型、处理、时间点
                               # 例如：“按基因型分为 WT 和 Ephb1-deficient，均接受 LPS 预处理 + ATP 激活。”
  stimuli_and_treatment: "LPS 100 ng/mL 4 h → Nigericin 10 μM；于 0、7.5、15、30、60 min 内按时间梯度快速收集线粒体分级与全裂解组分。"    # 刺激/药物/处理的关键信息（种类 + 浓度 + 时间）
                               # 例如：“LPS 100 ng/mL 预处理 4 h，随后 ATP 5 mM 处理 30 min。”
  time_points: "0、7.5、15、30、60 min ；7.5 min 为 WT 峰值时间。"              # 关键测定时间点（如果不在上面已写清）
  dose_info: "Nigericin 10 μM；无剂量梯度。"                # 若有剂量梯度，在此简要说明（如 “Alexidine 0, 1, 5, 10 μM”）
  readout_and_assay: "WB 检测 GSDMD-NT 在total/线粒体分级中的含量。作为补充对照（Figure 4B / Figure S3E），在相同细胞来源下通过 HK2 与线粒体 16S rRNA 的 qPCR 表达量评估线粒体数量。"        # 读出方式（ELISA/WB/IF/plate reader）及关键差异信息
                               # 例如：“使用 IL-1β ELISA 测定上清中 IL-1β，按厂商说明书操作。”
  replicates: "每组 n ≥ 3；≥3 批次独立重复。"               # 生物学重复数 n，以及是否合并多次实验
                               # 例如：“每组 n = 4 生物学重复，结果合并自两次独立实验。”
  analysis_notes: ""           # 本 panel 特有的分析方法/统计模型（如 normalization、配对 vs 非配对）
                               # 例如：“采用非配对双尾 t 检验；ELISA 结果按蛋白浓度归一化。”
  minimal_methods_summary: "LPS+Nigericin 激活后按时间梯度分离线粒体组分，WB 检测 GSDMD-NT 富集，以比较 WT 与 KO 的线粒体结合差异。"  # 1–2 句，把上面内容压缩成将来写 Methods 时可以直接用的一小段。

# ---------- 4. Results：把图变成结构化文字 ----------
results:
  data_direction: >
    在 WT 细胞中，LPS+nigericin 激活后，
    GSDMD-NT 在线粒体分级中于约 7.5 min 出现明显富集峰值，
    随后逐渐减弱。
    相比之下，Ephb1-deficient 细胞在相同刺激条件下，
    线粒体分级中的 GSDMD-NT 水平显著降低，
    而 total lysate 中 GSDMD 的切割程度与 WT 相当。
    与此一致，线粒体数量相关的 HK2 与 16S rRNA 在 KO 与 WT 间未见显著差异（Figure 4B / S3E）。
  stats_summary: >
    在 7.5 min 时间点，
    mito-GSDMD-NT 在 KO 中显著低于 WT
    而 total lysate 中 GSDMD-NT / GSDMD-FL 比例无显著差异。
    HK2 与 16S rRNA 的基因型比较均为 ns（双尾 t 检验）。

  key_numbers: >
    KO 的线粒体 GSDMD-NT 富集水平相较 WT 下降约 30–50%，
    具体幅度在不同批次中保持一致。
  group_difference_statement: >
    EphB1 缺失选择性降低 GSDMD-NT 在线粒体分级中的早期富集，
    而不影响其剪切生成。
  robustness_and_qc: "趋势在 ≥3 批次中一致；线粒体纯度与 total lysate 质量稳定。"        # 是否在多批次实验中重复、是否排除了明显 outlier 等
  anomalies_or_limits: "高时间分辨的 2.5–5 min 点可能存在轻微批次波动，但不影响峰值判断。"      # 若有“怪点/边缘显著/批间差异”，在此简短记录（便于 Discussion）

# ---------- 5. Interpretation & Role in Chapter：怎么理解 + 在整章中的作用 ----------
interpretation:
  minimal_bio_interpretation: "EphB1 缺失削弱 GSDMD-NT 在线粒体水平的早期富集，提示膜结合/稳定性是主要受影响环节。该结论不依赖于线粒体总量变化。" # 在不过度拔高的前提下，用 1–2 句解释结果“生物学含义”
                                 # 例如：“这些结果提示 EphB1 对 NLRP3 介导的 IL-1β 释放是促进性的。”
  alternative_explanations: >
    虽不能排除极早期（<2–3 min）瞬态定位差异未被捕获，
    但 total lysate 中切割指数正常，
    排除了 GSDMD 生成不足作为主要原因。
    因此，GSDMD-NT 在线粒体富集降低不太可能由线粒体数量减少所致。
  summary_type: "supportive, elimination"               # 从下列类型中选一个或多个，用逗号分隔：
                                 #   "supportive"   支持前一节/主假设
                                 #   "descriptive"  纯描述现象
                                 #   "elimination"  排除某种机制或可能性
                                 #   "negative"     未见显著差异/阴性结果
                                 #   "exploratory"  探索性发现
                                 # 例如："supportive"
  claim_supported: "EphB1 缺失降低 GSDMD-NT 在线粒体分级中的富集，而不影响其切割。"            # 本 panel 主要想支持/反驳的“文字命题”
                                 # 例如：“EphB1 是 NLRP3 炎性小体效应端活性的正调控因子。”
  link_to_previous: "前文显示执行端产物外排受限，本节将差异进一步定位至 GSDMD 与膜结合的早期步骤。结合 Figure 4B 中线粒体数量未变的结果，进一步将差异限定于膜结合/稳定性层面。"           # 承接上一节的句子（1 句）：上一节结果如何被本节进一步验证/延伸/修正？
                                 # 例如：“在观察到 EphB1 缺失缓解线粒体损伤后，我们进一步评估其对下游 IL-1β 释放的影响。”
  transition_to_next: "下一节将检测GSDMD 与膜结合早期步骤异常的具体机制。"         # 引出下一节（1 句）：下一步要看什么/为什么自然过渡到下一节？
                                 # 例如：“为了明确这种效应是否依赖于线粒体 ROS，我们随后检测了 NLRP3 激活过程中 mtROS 的变化。”

# ---------- 6. AI Writing Hints（可选）：给 LLM 的写作风格提示 ----------
ai_hints:
  target_section: ["Results", "Discussion_mini", "Methods_diff"] 
    # 你希望从这个 schema 主要生成哪些部分的正文？
    # 可选值： "Results" / "Discussion_mini" / "Methods_diff"
  tone: "neutral"     
    # 写作语气： "neutral"（默认科研语气）/ "cautious"（更谨慎）/ "confident"（偏肯定）
  target_journal_style: "" 
    # 若有心仪期刊的写作风格，可以在此填入名称，仅作为“风格参考”
    # 例如："Cell Metabolism", "Nature Immunology"
  language: "zh_en_mix"
    # 你希望生成何种语言： "zh"（中文）/ "en"（英文）/ "zh_en_mix"（中英混排方便你润色）


# ---------- 6. figure_legend (shared; multi-panel record: 3k + S3e) ----------
figure_legend:
  one_sentence_en: >
    GSDMD-NT abundance in mitochondrial fractions and total lysates from primary peritoneal macrophages at the indicated early time points during NLRP3 inflammasome activation, comparing WT and EphB1-deficient cells. Mitochondrial abundance controls were assessed in parallel.
  system_and_design:
    model: "Primary murine peritoneal macrophages (8–12-week-old C57BL/6 WT and Ephb1-deficient mice)"
    genotype_or_groups: "WT versus Ephb1-deficient"
    key_treatments: >
      LPS priming (100 ng/mL, 4 h) followed by nigericin (10 μM), with rapid collection at
      0, 7.5, 15, 30, and 60 min for mitochondrial fractionation and total lysate analysis
    time_window: "0–60 min after nigericin; 7.5 min corresponds to the WT peak enrichment time point"

  readouts_and_assays:
    primary_readout: "GSDMD-NT abundance in mitochondrial fractions versus total lysates; mitochondrial abundance controls"
    assay: >
      Immunoblotting of GSDMD-NT in total lysates and mitochondrial fractions across time points;
      HK2 protein (immunoblot) and mitochondrial 16S rRNA (qPCR) as mitochondrial abundance controls
    normalization: >
      Immunoblot band intensities were quantified by densitometry and normalized to loading controls;
      mitochondrial enrichment was evaluated at the WT peak time point (7.5 min)

  stats:
    n_definition: "n indicates biologically independent experiments"
    n: "n ≥ 3 per genotype; results reproduced in ≥3 independent batches"
    summary: "mean ± SEM"
    test: "two-tailed unpaired t-test"
    multiple_comparisons: "none"

  significance:
    symbols: "* P < 0.05, ** P < 0.01, *** P < 0.001; ns, not significant"

  extra_notes: >
    
    Comparisons focus on mitochondrial GSDMD-NT enrichment at the peak time point, while total-lysate cleavage
    controls exclude differences in substrate generation. HK2 and mitochondrial 16S rRNA are used to assess
    mitochondrial abundance and exclude organelle-quantity confounding.


# ---------- panel-specific overrides ----------
panel_overrides:
  k:
    panel_title_en: "Early mitochondrial enrichment of GSDMD-NT"
    panel_title_cn: "GSDMD-NT 在线粒体早期富集"
    displayed_targets:
      - "Mitochondrial-fraction GSDMD-NT time course (0, 7.5, 15, 30, 60 min)"
      - "Total-lysate GSDMD cleavage control (GSDMD-NT / FL)"

    # ---------- 8. English ----------

results_skeleton_en:
  extra_figure_refs:
    - "s2b"

  stage: T3
  purpose: "panel-level Results skeleton (pre-reduction, bilingual)"
  panel_level: results
  results_logic_type: localization

  modules:
    M1_motivation:
      en: "we next asked whether EphB1 affects the early association of GSDMD-NT with mitochondria during inflammasome activation."
      cn: "我们进一步检验 EphB1 是否影响炎症小体激活早期 GSDMD-NT 与线粒体的结合。"
      logic_source: "question.context_from_previous + question.core_question"

    M2_level_definition:
      en: "WT and Ephb1-deficient primary peritoneal macrophages were primed and activated with LPS and Nigericin, followed by rapid isolation of mitochondrial fractions at defined early time points and immunoblot analysis of GSDMD-NT in total lysates and mitochondrial fractions."
      cn: "在 WT 与 Ephb1-deficient 原代腹腔巨噬细胞中进行 LPS 预激并以 Nigericin 激活后，于早期时间点快速分离线粒体分级，并通过免疫印迹分别检测 total 裂解液与线粒体分级中的 GSDMD-NT。"
      logic_source: "methods.readout_and_assay + question.core_question"

    M3_directional_result:
      en: "In WT macrophages, GSDMD-NT accumulated in the mitochondrial fraction at approximately 7.5 min after inflammasome activation, whereas this early mitochondrial enrichment was markedly reduced in Ephb1-deficient macrophages."
      cn: "在 WT 巨噬细胞中，炎症小体激活后约 7.5 min，GSDMD-NT 在线粒体分级中出现明显的瞬时富集峰值；而在 Ephb1-deficient 细胞中，该早期线粒体富集显著降低。"
      logic_source: "results.data_direction"

    M4_robustness:
      en: "By contrast, the extent of GSDMD cleavage in total cell lysates was comparable between genotypes, and mitochondrial abundance—as assessed by HK2 protein levels and mitochondrial 16S rRNA content—did not differ significantly, supporting a selective defect in mitochondrial targeting rather than substrate generation or organelle quantity."
      cn: "相比之下，不同基因型间 total 裂解液中的 GSDMD 剪切程度保持相当，且以 HK2 蛋白与线粒体 16S rRNA 评估的线粒体数量亦未见显著差异，支持差异特异发生于线粒体靶向而非底物生成或细胞器丰度。"
      logic_source: "results.robustness_and_qc + results.stats_summary"

    M5_panel_conclusion:
      en: "Together, these results indicate that EphB1 promotes early mitochondrial enrichment of GSDMD-NT during inflammasome activation."
      cn: "综上，这些结果将 EphB1 缺失的效应定位于炎症小体激活过程中 GSDMD-NT 的早期线粒体富集阶段，表明 EphB1 促进执行端阶段 GSDMD 与线粒体的有效结合。"
      logic_source: "results.group_difference_statement"