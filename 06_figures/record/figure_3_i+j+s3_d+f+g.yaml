# ============================================================
# schema.yaml v2  ——  单个 panel 的结构化写作模版
# 目标：让 AI 在几乎不需要补充信息的前提下，生成：
#   - 结果段（Results）
#   - 简短讨论/过渡段（Mini Discussion / Transition）
#   - Methods 中本实验的“差异性信息”
# ============================================================

# ---------- 0. Meta & Assets：基本信息 ----------
meta:
  figure: "3_i+j+s3_d+f+g"              # 如 "Figure 3"
  short_title: "EphB1 缺失减少炎症小体激活诱导的胞质 mtDNA 释放"         # 1 句以内，本 panel 做了什么（如："EphB1 缺失抑制 NLRP3 介导的 IL-1β 释放"）
  chapter: "3.3 EphB1 缺失降低 GSDMD 的线粒体结合"             # 属于哪一章/小节，如 "3.2 Mitochondrial damage during pyroptosis"
  experiment_id: "figure_3_a"       # 选填，用于和你的实验记录/脚本对应，如 "2025-03-21_NLRP3_IL1b_ELISA"
  version: 1              # 整数，用来追踪修改

assets:
  main_figure_file: ""    # 主图文件路径，如 "figures/F3/F3A_IL1b_ELISA.pdf"
  raw_data_files:         # 原始数据/整理后数据的文件路径列表
    - ""
  stats_files:            # 统计分析结果文件（R/Python 脚本输出）
    - ""
  analysis_scripts:       # 用于生成图/做统计的脚本
    - ""
  supplementary_items:    # 对应的补充图/表（若有）
    - ""                  # 如 "Figure S3B", "Table S2"

# ---------- 1. Scientific Question：本节要回答什么 ----------
question:
  context_from_previous: "前一节显示 EphB1 缺失减弱 GSDMD-NT 线粒体结合与 ROS/Δψm 损伤指标，提示线粒体破损可能受限。"  # 与上一节的衔接（1 句）：上一节发现/提出了什么问题？
                             # 例如：“前一节结果提示 EphB1 缺失可能限制 NLRP3 炎性小体的完全激活。”
  core_question: "EphB1 缺失是否减少炎症小体激活诱导的胞质 mtDNA 脉冲式释放？"          # 本 panel 的核心科学问题（1 句，用“是否”、“如何”、“在多大程度上”等）
                             # 例如：“本节检验 EphB1 缺失是否降低 NLRP3 激活后 IL-1β 的分泌水平。”
  hypothesis_or_expectation: "若 KO 线粒体破损程度降低，则胞质 mtDNA 峰值应明显低于 WT。"  # 你的假设或预期结果（1 句）
                             # 例如：“如果 EphB1 促进 NLRP3 炎性小体的效应端活性，则 EphB1 缺失应降低 IL-1β 的释放。”
  importance_reason: "mtDNA 释放是线粒体膜破损与 NLRP3 激活的重要 readout，用于定位执行端损伤程度。"      # 为什么这个问题重要/值得单列一节（1 句即可）
                             # 例如：“IL-1β 是 NLRP3 炎性小体的关键功能 readout，用于评估效应端活性。”

# ---------- 2. Rationale / Design Logic：为什么这样设计 ----------
rationale:
  model_and_system: "使用 WT 与 Ephb1−/− 原代腹腔巨噬细胞，因其对 NLRP3 激活的 mtDNA 释放动力学可稳定复现。"       # 使用的模型/系统 + 选择理由
                             # 例如：“选用原代腹腔巨噬细胞，因为其对 NLRP3 激活高度敏感，且能反映体内炎症状态。”
  key_variables: "分离细胞质、线粒体、全细胞组分后测定 mtDNA（16S、ND1）含量，并比较 KO vs WT 的脉冲释放幅度。"          # 本实验关注的关键变量 + 操纵方式
                             # 例如：“操纵基因型（WT vs Ephb1−/−）和刺激条件（LPS 预处理 + ATP/Nigericin 激活）。”
  control_logic: "全细胞 mtDNA 作为内参排除 mtDNA 总量差异；统一基因校正（16S/ND1）保证不同分级可比性。"          # 对照设置背后的逻辑（为什么这些对照足以回答问题）
                             # 例如：“未刺激组用于定义基线 IL-1β 水平，WT 作为 Ephb1−/− 的参照组。”
  core_justification: "若 KO 线粒体破损减少，则在相同激活条件下，胞质 mtDNA 峰值应下降而 total mtDNA 无变化。"     # 最关键的一句“设计理由”（可直接当自动摘要用）
                             # 例如：“如果 EphB1 促进炎性小体效应端活性，则 Ephb1−/− 细胞在相同刺激下应释放更少 IL-1β。”

# ---------- 3. Methods（差异性信息）：只写本 panel 特有的 ----------
methods:
  inherits_from_protocol: "default_peritoneal_macrophage_fractionation_qPCR"   # 引用全章或整篇论文的通用 protocol 名称，如 "default_peritoneal_macrophage_NLRP3_activation"
                               # 之后可在 Methods 总节详细描述该 protocol。
  biological_material: "8–12 周龄 C57BL/6 WT 与 Ephb1−/− 原代腹腔巨噬细胞。"      # 使用的生物材料/模型：动物/原代/细胞系 + 关键信息
                               # 例如：“8–12 周龄雄性 C57BL/6 WT 与 Ephb1−/− 小鼠来源的原代腹腔巨噬细胞。”
  experimental_groups: "WT vs Ephb1−/−；均进行 LPS priming + Nigericin 激活。"      # 组别及核心差异：基因型、处理、时间点
                               # 例如：“按基因型分为 WT 和 Ephb1−/−，均接受 LPS 预处理 + ATP 激活。”
  stimuli_and_treatment: "LPS 100 ng/mL 4 h；随后 Nigericin 10 μM；按 0、7.5、15、30、60 min 进行时间梯度分级取样。"    # 刺激/药物/处理的关键信息（种类 + 浓度 + 时间）
                               # 例如：“LPS 100 ng/mL 预处理 4 h，随后 ATP 5 mM 处理 30 min。”
  time_points: "0、7.5、15、30、60 min 为峰值对比时间。"              # 关键测定时间点（如果不在上面已写清）
  dose_info: "Nigericin 10 μM；qPCR 引物针对 16S、ND1。"                # 若有剂量梯度，在此简要说明（如 “Alexidine 0, 1, 5, 10 μM”）
  readout_and_assay: "分离细胞核、线粒体与细胞质组分；提取 DNA；qPCR 计算 ΔCt，并以 total 组分 mtGene 作为最终内参；输出 log2FC。"        # 读出方式（ELISA/WB/IF/plate reader）及关键差异信息
                               # 例如：“使用 IL-1β ELISA 测定上清中 IL-1β，按厂商说明书操作。”
  replicates: "每组 n ≥ 2；≥3 批次独立重复。"               # 生物学重复数 n，以及是否合并多次实验
                               # 例如：“每组 n = 4 生物学重复，结果合并自两次独立实验。”
  analysis_notes: "ΔCt 使用 total mtGene（16S/ND1）作为参考；采用 WT 均值为基准计算 ΔΔCt；双尾 t 检验比较组间差异。"           # 本 panel 特有的分析方法/统计模型（如 normalization、配对 vs 非配对）
                               # 例如：“采用非配对双尾 t 检验；ELISA 结果按蛋白浓度归一化。”
  minimal_methods_summary: "LPS+Nigericin 激活后快速分级，检测细胞质/线粒体/全细胞中的 mtDNA，比较 KO 与 WT 的胞质 mtDNA 释放强度。"  # 1–2 句，把上面内容压缩成将来写 Methods 时可以直接用的一小段。

# ---------- 4. Results：把图变成结构化文字 ----------
results:
  data_direction: >
    在 nigericin 激活后，WT 细胞中 胞质 mtRNA（16S、ND1）出现
    短暂而显著的脉冲式升高，升高峰值出现在7.5min时间点
    在7.5min时间点，Ephb1−/− 细胞中该峰值明显降低。
    相比之下，total 组分中 mtRNA 整体保持相对稳定，
    其中 16S 未见显著差异，ND1 在激活条件下出现轻度增加。
  stats_summary: "胞质 16S/ND1：KO 7.5 min 显著降低（p < 0.05）；total 16S/ND1：ns。"            # 统计显著性信息（检验方法、p 值区间即可）
                               # 例如：“非配对 t 检验，p < 0.01。”
  key_numbers: "KO 胞质 mtDNA 峰值较 WT 约下降 30–50%；total mtDNA 波动 <5%。"              # 可选：fold change、均值±SEM、效应量（方便你之后查）
                               # 例如：“WT: 850 ± 120 pg/mL；Ephb1−/−: 410 ± 90 pg/mL；约下降 50%。”
  group_difference_statement: >
    在相同炎症小体激活条件下，
    Ephb1−/− 细胞中胞质 mtRNA 的显著下降
    并未伴随 total mtRNA 的同步降低，
    且两种线粒体标记（16S、ND1）在胞质中呈一致变化，
    支持差异主要来源于线粒体内容物外泄过程的改变。
  robustness_and_qc: >
    胞质 mtRNA 的瞬时峰值在多个独立实验中
    均稳定出现在激活早期时间窗，
    支持其作为炎症小体激活诱导的
    短暂性外泄事件的功能 readout。
  anomalies_or_limits: "15 min 后下降阶段存在轻微批间变异，但峰值时间点差异稳定。"      # 若有“怪点/边缘显著/批间差异”，在此简短记录（便于 Discussion）
                               # 例如：“一批实验中 WT 绝对值略低，可能与细胞密度偏低有关。”

# ---------- 5. Interpretation & Role in Chapter：怎么理解 + 在整章中的作用 ----------
interpretation:
  minimal_bio_interpretation: "EphB1 缺失降低炎症小体激活引发的线粒体到胞质的 mtDNA 外泄，提示线粒体膜破损程度下降。" # 在不过度拔高的前提下，用 1–2 句解释结果“生物学含义”
                                 # 例如：“这些结果提示 EphB1 对 NLRP3 介导的 IL-1β 释放是促进性的。”
  alternative_explanations: >
    虽然 ND1 在 total 组分中于 nigericin 条件下出现轻度差异，
    但该变化方向相反，并且幅度明显小于胞质组分中的下降，
    且 16S 在 total 中保持稳定，
    因此不足以解释胞质 mtRNA 的显著减少。
  summary_type: "supportive, elimination"               # 从下列类型中选一个或多个，用逗号分隔：
                                 #   "supportive"   支持前一节/主假设
                                 #   "descriptive"  纯描述现象
                                 #   "elimination"  排除某种机制或可能性
                                 #   "negative"     未见显著差异/阴性结果
                                 #   "exploratory"  探索性发现
                                 # 例如："supportive"
  claim_supported: "EphB1 缺失减少炎症小体激活过程中的胞质 mtDNA 释放。"            # 本 panel 主要想支持/反驳的“文字命题”
                                 # 例如：“EphB1 是 NLRP3 炎性小体效应端活性的正调控因子。”
  link_to_previous: "在观察到 ROS/Δψm 损伤减轻后，本节进一步从 mtDNA 外泄角度确认线粒体破损减少。"           # 承接上一节的句子（1 句）：上一节结果如何被本节进一步验证/延伸/修正？
                                 # 例如：“在观察到 EphB1 缺失缓解线粒体损伤后，我们进一步评估其对下游 IL-1β 释放的影响。”
  transition_to_next: "下一步将结合膜脂组学评估 CL 环境变化是否驱动 GSDMD-NT 结合减少与线粒体损伤减弱的表型。"         # 引出下一节（1 句）：下一步要看什么/为什么自然过渡到下一节？
                                 # 例如：“为了明确这种效应是否依赖于线粒体 ROS，我们随后检测了 NLRP3 激活过程中 mtROS 的变化。”

# ---------- 6. AI Writing Hints（可选）：给 LLM 的写作风格提示 ----------
ai_hints:
  target_section: ["Results", "Discussion_mini", "Methods_diff"] 
    # 你希望从这个 schema 主要生成哪些部分的正文？
    # 可选值： "Results" / "Discussion_mini" / "Methods_diff"
  tone: "neutral"     
    # 写作语气： "neutral"（默认科研语气）/ "cautious"（更谨慎）/ "confident"（偏肯定）
  target_journal_style: "" 
    # 若有心仪期刊的写作风格，可以在此填入名称，仅作为“风格参考”
    # 例如："Cell Metabolism", "Nature Immunology"
  language: "zh_en_mix"
    # 你希望生成何种语言： "zh"（中文）/ "en"（英文）/ "zh_en_mix"（中英混排方便你润色）

    # ---------- 8. English ----------

results_skeleton_en:
  stage: T3
  purpose: "panel-level Results skeleton (pre-reduction, bilingual)"
  panel_level: framework | results
  results_logic_type: discovery | elimination | localization | perturbation_response | mechanistic_integration | null

  modules:
    M1_motivation:
      en: ""
      cn: ""
      logic_source: "question.context_from_previous + question.core_question"

    M2_level_definition:
      en: ""
      cn: ""
      logic_source: "methods.readout_and_assay + question.core_question"

    M3_directional_result:
      en: ""
      cn: ""
      logic_source: "results.data_direction"

    M4_robustness:
      en: ""
      cn: ""
      logic_source: "results.robustness_and_qc + results.stats_summary"

    M5_panel_conclusion:
      en: ""
      cn: ""
      logic_source: "results.group_difference_statement"