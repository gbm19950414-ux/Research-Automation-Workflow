# ============================================================
# schema.yaml v2  ——  单个 panel 的结构化写作模版
# 目标：让 AI 在几乎不需要补充信息的前提下，生成：
#   - 结果段（Results）
#   - 简短讨论/过渡段（Mini Discussion / Transition）
#   - Methods 中本实验的“差异性信息”
# ============================================================

# ---------- 0. Meta & Assets：基本信息 ----------
meta:
  figure: "Figure 4"              # 如 "Figure 3"
  figure_id: "4c/d"              # 如 "A"
  short_title: "脂质组学显示心磷脂（CL）总量下降"         # 1 句以内，本 panel 做了什么（如："EphB1 缺失抑制 NLRP3 介导的 IL-1β 释放"）
  chapter: "3.4 EphB1 缺失影响线粒体心磷脂环境"             # 属于哪一章/小节，如 "3.2 Mitochondrial damage during pyroptosis"
  experiment_id: "figure_4_d"       # 选填，用于和你的实验记录/脚本对应，如 "2025-03-21_NLRP3_IL1b_ELISA"
  version: 1              # 整数，用来追踪修改
  claim: 
  evidence_level: #existence / association / positioning / necessity / sufficiency / rescue
  causal_strength: #correlational / suggestive / causal
  scope: #cell type、stimulus、time window
  alt_explanations: 
assets:
  main_figure_file: ""    # 主图文件路径，如 "figures/F3/F3A_IL1b_ELISA.pdf"
  raw_data_files:         # 原始数据/整理后数据的文件路径列表
    - ""
  stats_files:            # 统计分析结果文件（R/Python 脚本输出）
    - ""
  analysis_scripts:       # 用于生成图/做统计的脚本
    - ""
  supplementary_items:    # 对应的补充图/表（若有）
    - ""                  # 如 "Figure S3B", "Table S2"

# ---------- 1. Scientific Question：本节要回答什么 ----------
question:
  context_from_previous: "上一节显示 NAO 可染 CL 池减少，提示线粒体膜脂环境可能发生改变。"  # 与上一节的衔接（1 句）：上一节发现/提出了什么问题？
                             # 例如：“前一节结果提示 EphB1 缺失可能限制 NLRP3 炎性小体的完全激活。”
  core_question: "EphB1 缺失是否导致线粒体心磷脂（CL）总量下降？"          # 本 panel 的核心科学问题（1 句，用“是否”、“如何”、“在多大程度上”等）
                             # 例如：“本节检验 EphB1 缺失是否降低 NLRP3 激活后 IL-1β 的分泌水平。”
  hypothesis_or_expectation: "若 NAO 信号下降源于 CL 池减少，则脂质组学应呈现 CL 总量下调。"  # 你的假设或预期结果（1 句）
                             # 例如：“如果 EphB1 促进 NLRP3 炎性小体的效应端活性，则 EphB1 缺失应降低 IL-1β 的释放。”
  importance_reason: "CL 是维持线粒体膜结构与 GSDMD-NT 孔形成的重要膜脂，其改变是解释膜阶段瓶颈的重要依据。"      # 为什么这个问题重要/值得单列一节（1 句即可）
                             # 例如：“IL-1β 是 NLRP3 炎性小体的关键功能 readout，用于评估效应端活性。”

# ---------- 2. Rationale / Design Logic：为什么这样设计 ----------
rationale:
  model_and_system: "使用 WT 与 Ephb1−/− 原代腹腔巨噬细胞，能真实反映基因缺失在基础状态下对线粒体膜脂组分的影响。"       # 使用的模型/系统 + 选择理由
                             # 例如：“选用原代腹腔巨噬细胞，因为其对 NLRP3 激活高度敏感，且能反映体内炎症状态。”
  key_variables: "总 CL 含量变化（nmol/10^6 cells）与 113 个 CL 分子物种的丰度及 fold change。"          # 本实验关注的关键变量 + 操纵方式
                             # 例如：“操纵基因型（WT vs Ephb1−/−）和刺激条件（LPS 预处理 + ATP/Nigericin 激活）。”
  control_logic: "统一使用 MTBE/MeOH 抽提、BHT 抗氧化处理、内标与数量归一化，以保证跨样本可比性。"          # 对照设置背后的逻辑（为什么这些对照足以回答问题）
                             # 例如：“未刺激组用于定义基线 IL-1β 水平，WT 作为 Ephb1−/− 的参照组。”
  core_justification: "若 EphB1 缺失影响 CL 生物合成/重塑，则 CL 总量下降与组成重排应在脂质组学中得到直接体现。"     # 最关键的一句“设计理由”（可直接当自动摘要用）
                             # 例如：“如果 EphB1 促进炎性小体效应端活性，则 Ephb1−/− 细胞在相同刺激下应释放更少 IL-1β。”

# ---------- 3. Methods（差异性信息）：只写本 panel 特有的 ----------
methods:
  inherits_from_protocol: "default_lipidomics_LC-MS_MS"   # 引用全章或整篇论文的通用 protocol 名称，如 "default_peritoneal_macrophage_NLRP3_activation"
                               # 之后可在 Methods 总节详细描述该 protocol。
  biological_material: "8–12 周龄 C57BL/6 WT 与 Ephb1−/− 原代腹腔巨噬细胞。"      # 使用的生物材料/模型：动物/原代/细胞系 + 关键信息
                               # 例如：“8–12 周龄雄性 C57BL/6 WT 与 Ephb1−/− 小鼠来源的原代腹腔巨噬细胞。”
  experimental_groups: "WT vs Ephb1−/−；均在静息状态下采集以避免激活引起的次级变化。"      # 组别及核心差异：基因型、处理、时间点
                               # 例如：“按基因型分为 WT 和 Ephb1−/−，均接受 LPS 预处理 + ATP 激活。”
  stimuli_and_treatment: "样本加入 BHT 后立即以 MTBE/MeOH 抽提。"    # 刺激/药物/处理的关键信息（种类 + 浓度 + 时间）
                               # 例如：“LPS 100 ng/mL 预处理 4 h，随后 ATP 5 mM 处理 30 min。”
  time_points: "单一采样时间点（静息状态）。"              # 关键测定时间点（如果不在上面已写清）
  dose_info: "无处理梯度；采用相同细胞当量进行定量。"                # 若有剂量梯度，在此简要说明（如 “Alexidine 0, 1, 5, 10 μM”）
  readout_and_assay: "LC–MS/MS 同时采集正/负离子模式；MS/MS 确认 CL 物种；峰识别统一至分子物种水平；归一化为 nmol/10^6 cells。"        # 读出方式（ELISA/WB/IF/plate reader）及关键差异信息
                               # 例如：“使用 IL-1β ELISA 测定上清中 IL-1β，按厂商说明书操作。”
  replicates: "每组 n ≥ 3；≥2 批次独立实验重复。"               # 生物学重复数 n，以及是否合并多次实验
                               # 例如：“每组 n = 4 生物学重复，结果合并自两次独立实验。”
  analysis_notes: "计算各物种 fold change；丰度加权统计下降比例；使用双尾 t 检验和 FDR（q 值）校正。"           # 本 panel 特有的分析方法/统计模型（如 normalization、配对 vs 非配对）
                               # 例如：“采用非配对双尾 t 检验；ELISA 结果按蛋白浓度归一化。”
  minimal_methods_summary: "采用 LC–MS/MS 对 WT 与 KO 巨噬细胞进行 CL 脂质组学定量，比较总量与物种组成差异。"  # 1–2 句，把上面内容压缩成将来写 Methods 时可以直接用的一小段。

# ---------- 4. Results：把图变成结构化文字 ----------
results:
  data_direction: "KO 的 CL 总量显著下降，约为 WT 的 70%，并伴随广泛的分子物种下调。"           # 纯“趋势描述”，不解释机制（↑/↓/无变化 + 相对谁）
                               # 例如：“在 LPS+ATP 刺激下，Ephb1−/− 巨噬细胞释放的 IL-1β 显著低于 WT。”
  stats_summary: "总 CL：KO/WT ≈ 0.70，95% CI [0.60, 0.82]，q < 0.01；物种水平约 60% 物种下调。"            # 统计显著性信息（检验方法、p 值区间即可）
                               # 例如：“非配对 t 检验，p < 0.01。”
  key_numbers: "CL 总量下降约 30%；113 个物种中 ~60% 下调；少数长链/高不饱和 CL 有轻微上升但贡献有限。"              # 可选：fold change、均值±SEM、效应量（方便你之后查）
                               # 例如：“WT: 850 ± 120 pg/mL；Ephb1−/−: 410 ± 90 pg/mL；约下降 50%。”
  group_difference_statement: "与 WT 相比，KO 细胞的 CL 总量显著下降，且分子组成呈系统性重排。" # 用一两句把组间差异说清楚（可直接作为结果段主句）
                                 # 例如：“与 WT 相比，Ephb1−/− 巨噬细胞在相同刺激强度下产生的 IL-1β 减少。”
  robustness_and_qc: "趋势在 ≥2 独立批次中复现；内标与归一化流程稳定；无异常 outlier。"        # 是否在多批次实验中重复、是否排除了明显 outlier 等
                               # 例如：“该趋势在两批独立实验中均一致，排除 1 个基于预设准则的 outlier 后结果不变。”
  anomalies_or_limits: "轻微上升的长链物种对总量贡献小，不影响主结论。"      # 若有“怪点/边缘显著/批间差异”，在此简短记录（便于 Discussion）
                               # 例如：“一批实验中 WT 绝对值略低，可能与细胞密度偏低有关。”

# ---------- 5. Interpretation & Role in Chapter：怎么理解 + 在整章中的作用 ----------
interpretation:
  minimal_bio_interpretation: "EphB1 缺失导致 CL 总量减少并伴随组成改变，为 NAO 信号下调与 GSDMD-NT 结合减少提供直接膜脂基础。" # 在不过度拔高的前提下，用 1–2 句解释结果“生物学含义”
                                 # 例如：“这些结果提示 EphB1 对 NLRP3 介导的 IL-1β 释放是促进性的。”
  alternative_explanations: "不能排除部分变化来自 CL 重塑途径的代偿，但整体下调趋势一致支持膜脂环境改变。"   # 可能的其他解释/局限（方便之后写 Discussion）
                                 # 例如：“不能排除 EphB1 缺失影响前炎性细胞因子转录的可能。”
  summary_type: "supportive, exploratory"               # 从下列类型中选一个或多个，用逗号分隔：
                                 #   "supportive"   支持前一节/主假设
                                 #   "descriptive"  纯描述现象
                                 #   "elimination"  排除某种机制或可能性
                                 #   "negative"     未见显著差异/阴性结果
                                 #   "exploratory"  探索性发现
                                 # 例如："supportive"
  claim_supported: "EphB1 缺失显著降低 CL 总量并改变其分子组成。"            # 本 panel 主要想支持/反驳的“文字命题”
                                 # 例如：“EphB1 是 NLRP3 炎性小体效应端活性的正调控因子。”
  link_to_previous: "继 NAO 可染 CL 池减少后，本节直接证明 CL 总量与组成发生系统性改变。"           # 承接上一节的句子（1 句）：上一节结果如何被本节进一步验证/延伸/修正？
                                 # 例如：“在观察到 EphB1 缺失缓解线粒体损伤后，我们进一步评估其对下游 IL-1β 释放的影响。”
  transition_to_next: "下一节将进一步评估 CL 重塑与氧化相关指标以定位脂质变化的来源。"         # 引出下一节（1 句）：下一步要看什么/为什么自然过渡到下一节？
                                 # 例如：“为了明确这种效应是否依赖于线粒体 ROS，我们随后检测了 NLRP3 激活过程中 mtROS 的变化。”

# ---------- 6. AI Writing Hints（可选）：给 LLM 的写作风格提示 ----------
ai_hints:
  target_section: ["Results", "Discussion_mini", "Methods_diff"] 
    # 你希望从这个 schema 主要生成哪些部分的正文？
    # 可选值： "Results" / "Discussion_mini" / "Methods_diff"
  tone: "neutral"     
    # 写作语气： "neutral"（默认科研语气）/ "cautious"（更谨慎）/ "confident"（偏肯定）
  target_journal_style: "" 
    # 若有心仪期刊的写作风格，可以在此填入名称，仅作为“风格参考”
    # 例如："Cell Metabolism", "Nature Immunology"
  language: "zh_en_mix"
    # 你希望生成何种语言： "zh"（中文）/ "en"（英文）/ "zh_en_mix"（中英混排方便你润色）

# ---------- 6. figure_legend (shared; Figure 4c/d) ----------
figure_legend:
  one_sentence_en: >
    LC–MS/MS lipidomics quantification of total cardiolipin abundance and molecular species composition
    in resting WT and Ephb1−/− primary peritoneal macrophages.

  system_and_design:
    model: "Primary murine peritoneal macrophages"
    genotype_or_groups: "WT versus Ephb1−/−"
    key_treatments: "Resting (unstimulated) condition; samples extracted immediately with BHT-containing MTBE/MeOH"
    time_window: "Single endpoint (baseline, no inflammasome stimulation)"

  readouts_and_assays:
    primary_readout: "Total cardiolipin (CL) content and abundance of individual CL molecular species"
    assay: "LC–MS/MS lipidomics (positive/negative ion modes with MS/MS confirmation of CL species)"
    normalization: "Absolute abundances normalized to cell number using internal standards (nmol per 10^6 cells)"

  stats:
    n_definition: "n indicates biologically independent samples"
    n: "n ≥ 3 per group; reproduced in ≥2 independent experimental batches"
    summary: "mean ± SEM"
    test: "two-tailed unpaired t-test"
    multiple_comparisons: "FDR correction (q values) for species-level comparisons"

  significance:
    symbols: "* P < 0.05, ** P < 0.01, *** P < 0.001; ns, not significant"

  extra_notes: >
    Species-level fold changes were calculated relative to WT; broad downregulation across the CL species pool
    was evaluated using abundance-weighted summaries.


# ---------- panel-specific overrides ----------
panel_overrides:
  c:
    panel_title_en: "Reduced total cardiolipin abundance"
    panel_title_cn: "心磷脂总量下降"
    displayed_targets:
      - "Total CL abundance (nmol per 10^6 cells) in WT vs Ephb1−/−"

  d:
    panel_title_en: "Cardiolipin species remodeling"
    panel_title_cn: "心磷脂物种组成重排"
    displayed_targets:
      - "Fold-change distribution across detected CL molecular species (e.g., 113 species)"
      - "Species-level differential abundance summary with FDR (q values)"

    # ---------- 8. English ----------

results_skeleton_en:
  stage: T3
  purpose: "panel-level Results skeleton (pre-reduction, bilingual)"
  panel_level: results
  results_logic_type: localization

  modules:
    M1_motivation:
      en: "Having observed a reduction in the NAO-detectable cardiolipin pool, we next asked whether this change reflects an overall decrease in cardiolipin abundance and accompanying alterations in molecular species composition."
      cn: "在观察到 NAO 可染心磷脂池减少后，我们进一步检验这一变化是否源于心磷脂总量的整体下降，并伴随分子物种组成的改变。"
      logic_source: "question.context_from_previous + question.core_question"

    M2_level_definition:
      en: "Total cardiolipin content and molecular species composition were quantified by LC–MS/MS–based lipidomics in resting WT and Ephb1−/− primary peritoneal macrophages, with abundances normalized to cell number using internal standards."
      cn: "在静息状态下的 WT 与 Ephb1−/− 原代腹腔巨噬细胞中，采用 LC–MS/MS 脂质组学定量检测心磷脂总量及分子物种组成，并通过内标按细胞数量进行归一化。"
      logic_source: "methods.readout_and_assay + question.core_question"

    M3_directional_result:
      en: "Compared with WT cells, Ephb1−/− macrophages exhibited a significant reduction in total cardiolipin abundance, reaching approximately 70% of WT levels, accompanied by broad downregulation across a majority of cardiolipin molecular species."
      cn: "与 WT 相比，Ephb1−/− 巨噬细胞的心磷脂总量显著下降，约为 WT 的 70%，并伴随大多数心磷脂分子物种的整体下调。"
      logic_source: "results.data_direction"

    M4_robustness:
      en: "This decrease was reproducible across independent experimental batches and remained significant after multiple-testing correction, with roughly 60% of detected cardiolipin species showing reduced abundance."
      cn: "该下降趋势在多批次独立实验中均可重复，并在多重检验校正后仍保持显著性，约 60% 的检测到的心磷脂物种呈现丰度下降。"
      logic_source: "results.robustness_and_qc + results.stats_summary"

    M5_panel_conclusion:
      en: "Together, these lipidomic data show that EphB1 deficiency not only reduces the NAO-accessible cardiolipin pool but also decreases total cardiolipin abundance, providing a quantitative membrane lipid basis for the attenuated mitochondrial damage observed in EphB1-deficient peritoneal macrophages."
      cn: "综上，这些脂质组学结果表明 EphB1 缺失不仅显著降低 NAO 可及的心磷脂池，还减少了心磷脂总量，为 EphB1 缺失腹腔巨噬细胞中线粒体损伤减弱的模型提供了定量的膜脂学基础。"
      logic_source: "results.group_difference_statement"

      