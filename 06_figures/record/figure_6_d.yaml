question:
  context_from_previous: "Fig6A-C已经介绍多组学整合的概念图、指标选择与数据处理流程。"
  core_question: "EphB1 缺失是否在 RNA 与脂质组中呈现一致且可重复的机制轴效应？"
  hypothesis_or_expectation: "预期找到一个在多个批次、两种组学中方向一致的机制轴。"
  importance_reason: "判断哪些机制轴具有跨批次、组学一致性，是后续提出最终机制模型（Fig6E）的前提。"

rationale:
  model_and_system: "整合 RNA-seq（3 批次）与脂质组学 LC–MS（4 批次）的机制轴效应。"
  key_variables: "对比 EphB1 KO vs WT 在六条机制轴上的 batch-level effect_z。"
  control_logic: "同一机制轴在不同组学/不同批次的方向是否一致，是判断其生物学稳健性的核心。"
  core_justification: "若某机制轴是 EphB1 缺失的主要受影响路径，则应在不同组学、不同批次中呈现一致方向的 effect_z。"

methods:
  inherits_from_protocol: "default_transcriptomic_lipidomic_mechanistic_axis_pipeline"
  biological_material: "C57BL/6 WT 与 Ephb1−/− 小鼠来源腹腔巨噬细胞（RNA 3 批次、脂质组 4 批次）。"
  experimental_groups: "按基因型分为 WT 与 Ephb1−/−，每个 batch 独立建模。"
  stimuli_and_treatment: "RNA 与脂质组均来自 steady-state 条件，不含额外刺激。"
  time_points: "单一时间点收集。"
  dose_info: "无剂量处理。"
  readout_and_assay: "RNA：DESeq2 LFC shrinkage；Lipid：PQN+z-score；机制轴按 Fig6B/C 的指标集计算。"
  replicates: "RNA 各批次 n≈4–6；脂质组各批次 n≈6–8。"
  analysis_notes: "effect_z = batch 内 KO vs WT 的方向性效应；不跨批次合并，仅作方向比较。"
  minimal_methods_summary: "RNA 与脂质组分别在每个 batch 内计算机制轴效应（effect_z），再整合成 axis×batch×omics 矩阵用于方向一致性分析。"

results:
  data_direction: >
    六条机制轴的 effect_z 具体数值如下：
    - **Membrane context**：RNA 显著为负（−1.71, −1.52），脂质组显著为正（+2.24, +1.79, +1.05, +0.55），方向完全相反。
    - **Oxidation**：RNA 一致为正（+1.08, +1.11, −0.00）；脂质组多数为正（+0.67, +0.27），但存在轻度负值（−0.51, −0.73）。
    - **Remodeling**：RNA 在三批次交替为正/负（+0.80, −1.21, +1.23）；脂质组亦出现强烈正负交替（+1.14, −1.16 等）。
    - **Supply**：RNA（+0.98, −0.42, +0.63）与脂质组（+1.57, −1.02 等）均呈现大幅度的方向混杂。
    - **Synthesis**：RNA 接近零（−0.17 到 +0.09）；脂质组除 batch2（−1.45）外均接近零，整体效应弱。
    - **Transport**：RNA 冲突明显（+0.32, −1.03, +1.23）；脂质组在两批中呈强正（+1.55, +1.60），但亦存在负值（−0.70）。

  stats_summary: >
    effect_z 的绝对值超过 1 的情况主要发生在：Membrane context（|z|=1.52–2.24）、Oxidation（RNA |z|≈1.1）、
    Transport（lipid |z|≈1.6）及部分 Remodeling/Supply 批次，但方向不一致。未进行跨批次合并的显著性检验。

  key_numbers: >
    - Oxidation（RNA）：+1.08, +1.11, −0.00；（Lipid）：−0.51, +0.27, +0.67, −0.73。
    - Membrane context（RNA）：−1.71, −1.52；（Lipid）：+2.24, +1.79, +1.05, +0.55。
    - Transport（Lipid）：+1.55, +1.60（两批次强正）。

  group_difference_statement: >
    各机制轴在 RNA 与脂质组中呈现多样化、批次依赖的方向性变化，其中 Membrane context 轴在两种组学中均表现出
    KO 相对 WT 的总体相同变化趋势且zscore最大，而其他轴方向批次内不稳定或呈组学矛盾。

  robustness_and_qc: >
    Membrane context 轴在三个 RNA 批次和脂质组中的方向完全一致（分别为负、正）且zscore分数最大，显示出高度稳健性；
    其他轴均呈显著 batch effect，方向在不同批次间经常翻转。

  anomalies_or_limits: >
    Membrane context 轴在 RNA 与脂质组中方向相反，提示存在组学矛盾，这一问题可以通过加深轴机制理解、更新gene set进行进一步探索解决；
    Remodeling 与 Supply 轴方向高度不稳定，限制了解释力度。

interpretation:
  minimal_bio_interpretation: >
    这些结果表明，在 EphB1 缺失条件下，跨组学最一致的变化集中在 Membrane context 轴，而氧化、运输相关变化在脂质组中亦有较强表现，
    其余机制轴并不表现为稳定的跨批次效应。

  alternative_explanations: >
    RNA 与脂质组在部分轴上的矛盾方向可能来自技术噪音、batch effect 或不同层级调控（转录层与代谢层）的时间差异。

  summary_type: "exploratory, supportive"

  claim_supported: "EphB1 缺失主要影响 Membrane context 相关机制轴，而非 CL 合成或供应轴。"

  link_to_previous: "此前的 Fig6A-C已经介绍多组学整合的概念图、指标选择与数据处理流程，本节将其整合并评估方向一致性。"

  transition_to_next: "基于此，我们在 Fig6E 中构建跨组学、跨轴的最终机制模型，重点关注Membrane context 机制轴。"

