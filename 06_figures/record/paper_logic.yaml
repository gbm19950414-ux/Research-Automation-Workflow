          机制轴上形成统计学上显著的综合异常，还是呈现多轴温和偏移、缺乏单一主导瓶颈？
        micro_answer: >
          将各批次、各组学的轴级 Z 分数进行等权聚合（如 Stouffer 方法），
          用于评估 EphB1 缺失在各机制轴上的综合偏移程度，
          并判断是否呈现单一主导轴或多轴分布式扰动的情形。

        focuses_on_axes: []
        depends_on_panels: []

      - figure_id: "5F"
        experiment_id: 6
        story_role: "多机制轴与心磷脂含量的回归分析"
        micro_question: >
          这些机制轴的 combined Z 分数在跨批次层面，能在多大程度上预测cl总量的变化？
        micro_answer: >
          通过跨批次回归分析，检验各机制轴的综合分数与预先定义的 CL 表型指标之间的关联程度，
          用于评估哪些轴在统计上最接近 CL 含量变化；
          同时明确该分析可能涉及成分–整体相关，因此需要设计去除重叠特征的对照版本以验证稳健性。

          需要注意的是，回归不显著并不推翻 A/B；它只说明“该轴对 CL_total 这个 Y 不敏感/不直接”，
          轴设计围绕cl的可及、可用性。
        focuses_on_axes: []
        depends_on_panels: []

    
  - id: "Figure 6"
    title: "候选通路优先级排序：RNA 机制路径（X–M–Z）与 lipid 表型一致性验证"
    section: ""
    role_in_story: "Pathway prioritization: X–M–Z framework + validation hooks"
    one_sentence_purpose: >
      在 Figure 5 确定优先机制轴（Z）后，以文献支持的 EphB1 下游转录足迹作为候选中介（M），在多批次 RNA 内评估 X→M 的一致效应与 M↔Z 的耦合关系以形成候选通路优先级排序，并以 lipid 表型一致性作为方向性 sanity check。
      本图的逻辑任务是：
      （1）将“EphB1 下游信号通路状态”操作化为一组有文献依据的转录足迹基因集（M），并明确计分方向；
      （2）在多批次 RNA 中检验候选通路分数对 EphB1 缺失（X）的效应是否方向一致、可重复；
      （3）在 RNA 内部检验候选通路（M）与优先机制轴（Z；membrane context 的 RNA 代理）之间的耦合关系；
      （4）综合一致性、效应量与稳健性（如 LOO）形成候选通路排序，输出少数优先验证对象；
      （5）将 Z 与 lipid 表型作为独立重复的一致性对齐，用于支撑“RNA 机制轴可作为 lipid 表型的转录代理层”。
    panel_transitions:
      skeleton: Having established [the inference scaffold], we next asked whether [candidate module behavior] supports [prioritization and testability].
      skeleton_cn: 在建立“[推断框架]”后，我们进一步检验：[候选模块的行为] 是否支撑“[优先级排序与可检验性]”。
      between_panels:
        - from: "6a"
          to: "6b"
          en: >
            Having defined the X–M–Z inference scaffold and the role of orthogonal lipid alignment, we next specified a minimal, literature-anchored set of EphB1-linked candidate signaling programs and their scoring rules.
          cn: >
            在明确 X–M–Z 推断框架及脂质一致性验证的角色后，我们进一步给出：一组最小但有文献锚定的 EphB1 相关候选信号程序，以及其计分规则与方向约定。

        - from: "6b"
          to: "6c"
          en: >
            Having defined candidate programs and scoring directionality, we next asked which programs show reproducible EphB1-dependent shifts across RNA batches, qualifying them as plausible mediators (X→M).
          cn: >
            在明确候选程序及计分方向后，我们进一步检验：哪些程序在不同 RNA 批次中呈现可重复的 EphB1 相关偏移，从而具备作为候选中介（X→M）的基本资格。

        - from: "6c"
          to: "6d"
          en: >
            Having filtered candidates by cross-batch X→M consistency, we next asked which programs are mechanistically coupled to the prioritized membrane-context axis within RNA (M↔Z), strengthening chain coherence.
          cn: >
            在以跨批次 X→M 一致性筛选候选后，我们进一步检验：哪些程序在 RNA 内部与优先机制轴呈现稳健耦合（M↔Z），从而增强证据链的机制连贯性。

        - from: "6d"
          to: "6e"
          en: >
            Having identified RNA-internal coupling candidates, we next asked whether the prioritized RNA axis aligns with lipid phenotypic space in independent repeats, providing orthogonal support without relying on paired-sample mediation.
          cn: >
            在识别 RNA 内部耦合候选后，我们进一步检验：优先 RNA 机制轴是否能在独立重复中与脂质表型空间对齐，从而在不依赖配对样本中介回归的前提下获得正交支撑。

        - from: "6e"
          to: "6g/h"
          en: >
            Having established transcript–lipid alignment, we next designed a functionally testable perturbation to discriminate Eph–ephrin signaling directions, converting prioritized inferences into validation-ready experiments.
          cn: >
            在建立转录轴与脂质表型的一致性对齐后，我们进一步设计可检验的功能操控，用于区分 Eph–ephrin 的正向/反向信号贡献，从而将推断结果转化为可验证实验。

        - from: "6g/h"
          to: "6i"
          en: >
            Having specified the perturbation logic, we next asked how to project its membrane/lipid consequences back onto the terminal inflammasome output readout, closing the causal loop.
          cn: >
            在明确操控设计逻辑后，我们进一步将其膜脂后果投影回末端炎症小体输出 readout，以闭合“信号—膜环境—输出端”的可检验因果环。


    panels:
      - figure_id: "6a"
        experiment_id: 1
        story_role: "分析框架示意：X–M–Z（RNA-only） + lipid 一致性验证"
        micro_question: >
          在配对组学样本量受限的前提下，如何以可辩护、可复现的方式连接 EphB1 缺失（X）、
          下游通路状态（M）与 membrane context 机制轴（Z），并将其与 lipid 表型建立一致性对齐？
        micro_answer: >
          采用分层证据链：主分析在 RNA 内部进行，定义 X=EphB1 缺失、M=候选下游通路分数、
          Z=membrane context 的 RNA 机制轴分数，评估 X→M 的跨批次一致效应及 M↔Z 的机制耦合；
          lipidomics 层面不作为回归中介的主要因果推断输入，而用于验证 Z 与 lipid 表型（如 CL/磷脂库）
          在独立重复中的方向一致性。

      - figure_id: "6b"
        experiment_id: 2
        story_role: "EphB1 下游信号通路候选集与计分原则"
        micro_question: >
          如何从文献与通路知识中构建一组最小但可辩护的 EphB1 下游候选模块（M），并确保
          这些模块的转录足迹计分具有明确方向与可解释性？
        micro_answer: >
          展示候选通路模块清单（例如 PI3K–AKT–mTOR、Rho/FAK/Src、Integrin/microdomain 等），
          说明每个模块的 footprint 与 capacity 子模块的生物学含义、与信号活性可能解耦的部分
          及其在计分中如何处理（例如更偏向足迹/响应与阀门型节点），并给出统一的计分规则：
          分数越高表示通路状态越“激活/更强”的转录证据（在必要时通过 gene_effect_sign 处理刹车基因）。
        focuses_on_axes: []
        depends_on_panels: []

      - figure_id: "6c"
        experiment_id: 3
        story_role: "跨批次候选通路分数的一致性与稳健性评估（X→M）"
        micro_question: >
          作为候选中介的 EphB1 下游通路分数（M），在不同 RNA 批次中对 EphB1 缺失（X）的
          方向与效应量是否一致，从而具备进入机制链条推断的基本可重复性？
        micro_answer: >
          对每个批次分别计算候选通路分数，并以批内标准化后的组间差异（KO−WT）作为效应量；
          通过方向投票、效应量汇总与 LOO 等稳健性指标，对候选通路进行初筛与排序，输出可重复的候选集合。
        focuses_on_axes: []
        depends_on_panels: []

      - figure_id: "6d"
        experiment_id: 4
        story_role: "RNA 内部机制耦合：候选通路与 membrane context 轴（M↔Z）"
        micro_question: >
          在 RNA 内部，哪些 EphB1 下游候选通路（M）与优先机制轴（Z；membrane context 的 RNA 代理）
          表现出方向一致、稳健的耦合关系，从而更可能位于“EphB1 → 膜环境障碍”的上游解释链条中？
        micro_answer: >
          在每个批次内，以样本层面的相关/回归与稳健性检查刻画 M 与 Z 的耦合方向与强度，并与 X→M 的
          方向一致性共同用于优先级排序；该步骤强调“候选排序与机制连贯性”，而非在小样本条件下做严格中介推断。
          Z 分数定义为“障碍强度”（↑=更差），M 分数定义为“通路激活证据”（↑=更强）；因此“保护性解释链条”的期望方向通常为：KO 使 M↓（ΔM<0），且 M 与 Z 负相关（β_M<0），即通路越弱障碍越重。
          B/C 仅展示综合排序最高的 top-k 通路；排序分数由 X→M 的跨批次一致性（方向投票/效应量）与 M↔Z 的批内回归系数及 LOO 稳健性共同构成。
        focuses_on_axes: ["membrane_context"]
        depends_on_panels: []

      - figure_id: "6e"
        experiment_id: 5
        story_role: "RNA 机制轴与 lipid 表型的一致性对齐（Z ↔ lipid-Y）"
        micro_question: >
          在不依赖配对样本回归的前提下，如何将 RNA 层面的 membrane context 机制轴（Z）与 lipid 表型
          建立最小但可辩护的连接，从而支持“Z 可作为 lipid 表型的转录代理层”？
        micro_answer: >
          在各自独立重复中分别估计 Z（RNA）与 lipid 表型指标（lipid-Y）的组间效应方向与大小，并进行
          方向一致性/等级一致性对齐；若存在配对样本，则仅以方向性散点/LOO 检查作为 sanity check，
          不将其作为主要统计推断来源。
        focuses_on_axes: ["membrane_context"]
        depends_on_panels: []

      - figure_id: "6g/h"
        experiment_id: 6
        story_role: "反向/正向信号区分的功能验证设计（EphB1–Fc 聚簇化）"
        micro_question: >
          考虑 Eph–ephrin 具备正向（Eph 受体）与反向（ephrin 配体）信号的双向特性，如何通过
          外源操控设计区分“EphB1 受体下游”与“ephrin-B 反向信号”对 CL 可及性表型的贡献？
        micro_answer: >
          使用可溶性 EphB1 胞外结构域融合蛋白（EphB1–Fc）并配合二抗聚簇化，在细胞表面富集/占位 ephrin-B，
          作为操控 Eph–ephrin 交互构型的手段；通过比较该操控对 NAO（CL 可及池代理）与炎症小体输出 readout 的影响方向，
          为区分正向/反向信号在膜脂阀门中的相对贡献提供可检验的实验设计。
        focuses_on_axes: []
        depends_on_panels: []

      - figure_id: "6i"
        experiment_id: 7
        story_role: "配套功能 readout：操控后 IL-1β 外排"
        micro_question: >
          在上述正向/反向信号区分的操控设计下，如何用与主线一致的功能 readout 将膜脂表型变化
          投影回炎症小体输出端，从而形成可检验的因果链条？
        micro_answer: >
          在同一操控条件下并行评估 IL-1β 裂解性外排等输出端 readout，作为膜脂阀门变化的功能后果检验；
          该面板的逻辑角色是为后续“候选通路 → 膜环境/CL → 输出端限幅”的实验验证链条提供一致的功能映射。
        focuses_on_axes: []
        depends_on_panels: []

  
  # =================== english ====================
anchors:
  core_question: 
    Does EphB1 tune the lipid membrane environment
    ——encompassing cardiolipin abundance and accessibility——
    to set the threshold for GSDMD pore formation and 
    thereby modulate NLRP3 inflammasome–driven IL-1β release and pyroptotic lysis 
    in LPS-primed primary murine peritoneal macrophages?

english_projection:
  scientific_question: "How does EphB1 control the mitochondrial cardiolipin pool and its accessibility to set the threshold for GSDMD pore–mediated inflammasome output?"
  results_one_sentence_line:
    We show that EphB1, acting through a PI3K–AKT–mTOR–linked signaling network, 
    remodels mitochondrial cardiolipin abundance and accessibility
    to curb GSDMD–mitochondria engagement and pore function, 
    thereby limiting inflammasome-driven IL-1β release and pyroptotic cell lysis.

  section_transitions:
  skeleton: Having established [what level is addressed / what ambiguity is resolved], we next ask whether [next causal layer / interface / gating factor] explains [the bottleneck].
  skeleton_cn: "在完成“[上一图解决的层级定位]”后，下一步需要回答：[更靠近因果链上游/更机制化的问题]，以解释/检验“[瓶颈/阀门]”。"
  between_figures:
    - from: "Figure 1"
      to: "Figure 2"
      en: >
        Having established a reproducible output-limited inflammasome phenotype upon EphB1 loss, 
        we next asked whether the defect reflects impaired upstream priming/assembly 
        or instead a restriction at the terminal, GSDMD pore–driven execution step.
      cn: >
        在确立 EphB1 缺失导致炎症小体输出端被稳健限幅的表型后，
        我们进一步追问：该差异源于上游 priming/装配受损，
        还是发生在末端由 GSDMD 成孔所驱动的执行层。

    - from: "Figure 2"
      to: "Figure 3"
      en: >
        Having mapped the bottleneck downstream of inflammasome assembly and caspase-1 activation, 
        we next asked whether EphB1 specifically gates the early engagement of GSDMD-NT with mitochondria that precedes pore function and organelle injury.
      cn: >
        在将瓶颈定位到炎症小体装配与 caspase-1 激活之后的执行阶段后，我们进一步追问：EphB1 是否特异性地调控 GSDMD-NT 与线粒体的早期对接，从而影响后续成孔与线粒体损伤。

    - from: "Figure 3"
      to: "Figure 4"
      en: >
        Having localized the execution defect to the GSDMD–mitochondria interface, 
        we next asked whether a defined lipid gate at the mitochondrial membrane—cardiolipin abundance and accessibility—accounts for the altered engagement efficiency.
      cn: >
        在将执行缺陷锁定到 GSDMD–线粒体界面后，我们进一步追问：线粒体膜上是否存在一个可定义的脂质阀门——心磷脂（CL）的总量与可及池——能够解释该界面效率的改变。

    - from: "Figure 4"
      to: "Figure 5"
      en: >
        Having established cardiolipin abundance and accessibility as the execution interface governing inflammasome output, we next operationalized the multiple, parallel processes that collectively shape cardiolipin state—including synthesis, supply, transport, oxidation, remodeling, and membrane context itself—into a set of separable, quantifiable mechanistic axes, enabling cross-batch integration of transcriptomic and lipidomic data to delineate how EphB1 loss coordinately perturbs these axes and thereby tunes GSDMD–mitochondria engagement.
      cn: >
        在确立 CL 总量与可及性是调控炎症小体输出的关键执行界面后，我们进一步将塑造 CL 状态与膜环境的多个并行机制过程——包括合成、供给、转运、氧化、重塑与膜环境本身——操作化为一组可区分、可量化的机制轴，并在转录组与脂质组层面进行跨批次整合比较，以刻画 EphB1 缺失如何通过多轴协同扰动，重塑 GSDMD–线粒体结合的可能性。


    - from: "Figure 5"
      to: "Figure 6"
      en: >
        Having defined and prioritized a membrane-context mechanistic axis from integrated multi-omics, we next asked which EphB1-linked candidate signaling programs most consistently couple to this axis (X→M→Z), yielding a short, testable set of upstream mediators and validation hooks.
      cn: >
        在通过多组学整合界定并筛选出优先的 membrane context 机制轴后，我们进一步追问：哪些与 EphB1 相关的候选信号程序最稳定地与该机制轴耦合（X→M→Z），从而收敛出少数可检验的上游中介与验证钩子。
