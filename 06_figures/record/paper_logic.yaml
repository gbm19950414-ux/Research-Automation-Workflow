    one_sentence_purpose: >
      证明 EphB1 缺失确实改变了线粒体心磷脂总量和 NAO 可染/可及的 CL 池，
      figure_3中，我们已经排除线粒体数量或ΔΨm 变化作为主因，
      这里，我们为“CL–线粒体界面决定 GSDMD 成孔效率”的模型提供表型与因果证据。
    key_message: >
      在基线条件下，EphB1 缺失并未引起线粒体数量或膜电位的巨大改变，
      但 NAO 标记的心磷脂池和脂质组学测得的KO的 CL 总量均下调，
      使用重塑轴关键酶 iPLA₂ 抑制剂 BEL 在 WT 巨噬细胞中模拟“CL 可结合池下降”时，
      显著降低 CL含量、IL-1β 释放，而在 EphB1 缺失
      说明 EphB1 通过调控线粒体 CL 含量，为 GSDMD–线粒体界面提供关键膜脂环境。
