# RULES FOR LOGIC-LAYER CONTENT
# --------------------------------------------
# 1. 逻辑层只描述“图要解决的问题、逻辑角色与分析目的”，
#    不记录任何实验观察、数据数值、具体结果或显著性。
#
# 2. 若一句话是在回答“图为什么存在/要回答什么问题”，→ 放在 logic 层。
#    若一句话是在回答“图最终发现了什么观察”，→ 必须放到 figure/panel 层。
#
# 3. logic 层允许任务级、方向级、推理级的抽象表达（不依赖具体数据），
#    但禁止出现可因数据更新而改变的具体结论。
#
# 4. logic 层永远是分析流程的上游，不得被 panel 或结果反向污染；
#    内容必须在数据重跑、批次变化时仍保持有效。
#
# 5. 简而言之：logic = purpose，不写 facts。
meta:
  paper_title: "EphB1调控线粒体心磷脂含量减轻NLRP3炎症小体引发的焦亡"

main_question:
  one_sentence: >
    在 LPS 激活的小鼠腹腔巨噬细胞中，EphB1 是否通过调控线粒体心磷脂
    含量及其可结合池，改变线粒体–膜脂环境，从而限幅 NLRP3 炎症小体
    介导的 GSDMD 焦亡输出？
  background_gap: >
    系统性炎症和焦亡相关疾病负担持续攀升，临床真正需求是“在不削弱抗感染
    能力的前提下，对孔形成–裂解性外排环节做限幅”，但目前多数策略仍停留在
    抑制 NLRP3 激活而非精细调节输出。已有研究提示 GSDMD-NT 对带负电膜脂、
    尤其是线粒体心磷脂（CL）具有高亲和力，线粒体状态与 CL 动态被视为
    焦亡执行效率的关键阀门；然而，“质膜受体/外源信号 → CL 含量/重塑 →
    线粒体炎症平台 → GSDMD 成孔”这一链条的上游模块仍然几乎空白，尤其缺乏
    将 Eph 受体家族与 CL–焦亡轴直接相连的实验证据。
  central_claim: >
    本研究在巨噬细胞–线粒体–炎症小体轴上证明：EphB1 通过维持线粒体心磷脂
    含量及其可结合池，决定 GSDMD-NT 早期线粒体对接与孔功能，从而调节
    NLRP3 诱导焦亡和 IL-1β 释放的阈值。EphB1 缺失降低 CL 可及性，限制
    GSDMD-NT 线粒体结合并削弱裂解性外排；药理性抑制 CL 可结合池（BEL）
    在 IL-1β 释放上与 EphB1 缺失呈遮蔽关系，而上游 LYCAT 下调将 EphB1
    与 CL 生物合成直接连接，构成 “EphB1–LYCAT–CL–GSDMD–焦亡” 的可逆调控轴，
    将受体酪氨酸激酶信号与膜脂重塑–线粒体孔化置于同一因果序列之中。

hypotheses:
  - id: "H1"
    text: >
      EphB1 是维持线粒体心磷脂含量及可结合池的正向调控因子；
      EphB1 缺失将导致线粒体 CL 总量和 GSDMD 可及的 CL 池下降。

  - id: "H2"
    text: >
      EphB1 缺失主要通过改变线粒体 CL–膜脂环境，降低 GSDMD-NT 对线粒体的
      结合与成孔效率，从而在不影响 NLRP3 priming、ASC 斑点和 caspase-1
      激活的前提下，选择性减弱焦亡和 IL-1β 释放。

  - id: "H3"
    text: >
      药理性抑制线粒体 CL 可结合池（如 BEL 处理）可在功能上模拟 EphB1 缺失
      对 IL-1β 释放的效应，并与 EphB1 缺失呈同阶遮蔽关系，证明 EphB1 的
      主要作用通路是通过 CL 轴而非其他独立下游。

  - id: "H4"
    text: >
      EphB1 通过转录调控心磷脂再酰化酶 LYCAT，从而控制线粒体 CL 合成与
      可结合池大小；EphB1–LYCAT–CL 轴是连接受体激酶信号与焦亡执行效率的
      关键上游模块。

mechanistic_axes:
  - id: "AX1"
    name: "CL 含量与可结合池（EphB1–LYCAT–CL 轴）"
    summary: >
      描述 EphB1 及其下游 LYCAT 对线粒体心磷脂总量、脂肪酸谱和
      GSDMD 可及 CL 池的调控，是从受体信号到膜脂环境的代谢接口。

  - id: "AX2"
    name: "GSDMD–线粒体界面与成孔效率"
    summary: >
      聚焦 GSDMD-NT 在线粒体外膜上的富集、寡聚和成孔，强调其对
      线粒体 CL 与膜电性状态的依赖，是“执行层”物理阈值的体现。

  - id: "AX3"
    name: "NLRP3–GSDMD–IL-1β 焦亡输出"
    summary: >
      覆盖 NLRP3 priming、ASC 装配、caspase-1 裂解、GSDMD 成孔、
      IL-1β/IL-18 释放以及裂解性死亡等 readout，是临床相关炎症输出的综合表型。

sections:
  - id: "S1"
    title: "EphB1 缺失限幅 NLRP3 诱导的焦亡与 IL-1β 释放，但不影响上游激活"
    question: >
      EphB1 缺失在 NLRP3 炎症小体通路的“priming–装配–执行”各层级中，
      究竟改变了哪一环，是否表现为选择性降低焦亡输出？
    core_message: >
      在 LPS+NLRP3 激活条件下，EphB1 缺失显著降低巨噬细胞焦亡和 IL-1β 释放，
      但不影响 NF-κB 依赖 priming、ASC 斑点形成或 caspase-1 裂解，说明
      差异集中在 GSDMD 成孔/内容物外排这一末端执行层。
    figures: ["Figure 1", "Figure 2"]

  - id: "S2"
    title: "EphB1 缺失降低 GSDMD 的线粒体结合"
    question: >
      EphB1 缺失是否改变了 GSDMD 与线粒体的空间耦合，从而影响成孔效率？
    core_message: >
      通过亚细胞分离、线粒体富集及共定位分析，证明 EphB1 缺失显著降低
      GSDMD-NT 在线粒体上的富集与结合，提示 GSDMD–线粒体界面是 EphB1
      调控焦亡的直接执行接口。
    figures: ["Figure 3"]

  - id: "S3"
    title: "EphB1 缺失降低线粒体心磷脂含量及可结合池，并被 BEL 遮蔽"
    question: >
      EphB1 缺失是否改变线粒体 CL 含量及 GSDMD 可及的 CL 池，
      以及 CL 轴是否在功能上位于 EphB1 下游？
    core_message: >
      NAO 染色和 LC-MS 脂质组学显示 EphB1 缺失显著降低线粒体 CL 含量和
      可结合池；抑制 CL 再酰化/可结合池的 BEL 处理可在 WT 中下调 IL-1β 释放，
      且在 EphB1 缺失背景下不再叠加，呈现遗传学×药理的同阶遮蔽关系，
      支持 EphB1 主要通过 CL 轴限幅焦亡输出。
    figures: ["Figure 4", "Figure 5"]

  - id: "S4"
    title: "EphB1 下调 LYCAT 形成 EphB1–LYCAT–CL–焦亡调控轴"
    question: >
      EphB1 如何在转录/信号层面连接到 CL 合成与可结合池调控，是否存在
      可操作的上游“单一酶节点”？
    core_message: >
      通过转录组与 qPCR 证实 EphB1 缺失下调心磷脂再酰化酶 LYCAT 的表达，
      配合 CL 含量、GSDMD 结合与 IL-1β 释放数据，提出 EphB1–LYCAT–CL–焦亡
      这一纵向调控轴，为从受体激酶到膜脂阈值的因果链提供分子支点。
    figures: ["Figure 6"]

figures:
  - id: "Figure 1"
    title: "EphB1 缺失降低炎症小体激活诱导的巨噬细胞焦亡与 IL-1β 释放"
    section: "S1"
    role_in_story: "表型"
    one_sentence_purpose: >
      回答"表型从何而来"的问题,
      建立 EphB1 缺失在多种炎症小体激活条件下“焦亡输出被限幅”的功能表型,

    key_message: >
      ephb1是维持炎症小体功能的关键因素
      其缺失在 NLRP3/NLRC4/AIM2 等
      炎症小体激活条件下稳定降低 LDH 外排和 IL-1β 释放，确立其作为炎症小体依赖性焦亡
      负向调节因子的功能表型。
    panels:
      - figure_id: "1a"
        experiment_id: "000"
        story_role: "炎症小体遗传筛选流程示意图"
        micro_question: >
          我们是如何发现ephb1表型的？
        micro_answer: >
          通过对20个pb品系进行炎症小体nlrp3信号通路遗传筛选
        focuses_on_axes: []
        depends_on_panels: []
      
      - figure_id: "1b"
        experiment_id: "001"
        story_role: "EphB1 在多品系中表现为显著候选基因"
        micro_question: >
          ephb1在遗传筛选中的表现如何？
        micro_answer: >
          20个pb品系进行炎症小体nlrp3信号通路遗传筛选结果，突出展示ephb1
        focuses_on_axes: []
        depends_on_panels: []

      - figure_id: "1c"
        experiment_id: "figure_2_d"
        story_role: "EphB1 表型不依赖单一 NLRP3 激动剂"
        micro_question: >
          ephb1的nlrp3炎症小体表型，是否与nigericin特异相关？
        micro_answer: >
          ephb1的nlrp3炎症小体表型，在多种炎症小体激活条件下均表现出一致性
        focuses_on_axes: []
        depends_on_panels: []

      - figure_id: "1d"
        experiment_id: 2
        story_role: "EphB1 缺失一致降低炎症小体相关膜裂解（LDH）"
        micro_question: >
          在不同炎症小体感受器被激活的条件下，EphB1 缺失是否一致降低焦亡相关的膜裂解/
          LDH 外排，确立其在炎症小体依赖性细胞裂解中的功能表型？
        micro_answer: >
          在 NLRP3、NLRC4 与 AIM2 被激活时，KO 巨噬细胞的 LDH 外排在早晚两个时间窗口内均
          持续低于 WT，提示 EphB1 缺失在多条炎症小体通路下都压低焦亡强度，而非仅推迟裂解
          时间或只影响单一路径。
        focuses_on_axes: ["AX3"]
        depends_on_panels: ["1A_apoptosis_control"]

      - figure_id: "s1a"
        experiment_id: 1
        story_role: "EphB1 缺失不改变经典凋亡敏感性（Staurosporine）"
        micro_question: >
          在解释炎症小体依赖性焦亡表型之前，是否需要排除 EphB1 缺失引起的“广义细胞死亡敏感性改变”
          （例如经典凋亡通路的普遍耐受或易感），以避免将非特异性的存活差异误判为焦亡特异表型？
        micro_answer: >
          设置一个与炎症小体无关的经典凋亡刺激作为阴性对照通路，用于检验 EphB1 缺失是否存在
          “全局性死亡通路敏感性偏移”。该对照的逻辑目的在于：若凋亡通路并未显示系统性差异，
          则主文中观察到的差异更有理由被定位为炎症小体/焦亡相关执行环节的特异改变。
        focuses_on_axes: []
        depends_on_panels: []

      - figure_id: "s1b"
        experiment_id: 3
        story_role: "炎症输出与孔形成相关标记提供补充证据"
        micro_question: >
          为了将“膜裂解/细胞死亡”与“炎症因子外排”在同一执行层级上对齐，是否需要同时评估
          NLRP3 依赖的 IL-1β 释放读出以及与之对应的执行器加工/孔形成相关分子标记，
          从而验证该表型属于“输出端环节”而非单一 readout 的偶然偏差？
        micro_answer: >
          在相同的 NLRP3 激活条件下，采用两类互补证据对“执行层输出”进行并行刻画：
          （1）功能读出：上清 IL-1β 释放（反映依赖孔形成的外排输出）；（2）分子标记：与
          caspase-1 激活及 GSDMD 孔形成相关的加工产物（用于表征执行器链路是否被触发并进入输出阶段）。
          该面板的逻辑目的在于：将细胞裂解性表型与炎症输出表型建立同层级对应关系，
          并为后续定位瓶颈发生在“上游激活”还是“末端外排/孔功能”提供方向性依据。
        focuses_on_axes: []
        depends_on_panels: []

  - id: "Figure 2"
    title: "EphB1 缺失不影响 NLRP3 上游激活，差异集中于 GSDMD 执行层外排"
    section: "S1"
    role_in_story: "机制轴"
    one_sentence_purpose: >
      通过逐层排除经典分泌、转录性 priming、priming 蛋白丰度及 ASC 组装的差异，将 EphB1
      的作用定位在炎症小体第二信号之后、GSDMD 孔介导的内容物外排这一执行层。
    key_message: >
      EphB1 缺失不影响 LPS 诱导的 TNF-α/IL-6 经典分泌，也不削弱炎症小体相关基因的转录性
      priming、pro-IL-1β/NLRP3 的胞内丰度或 ASC 寡聚化；在相同刺激下，caspase-1 激活及其对
      GSDMD/IL-1β 的切割基本保留，但成熟片段的胞外释放受限，提示瓶颈位于 GSDMD 孔与膜裂解
      步骤，而非炎症小体的组装或酶活本身。
    panels:
      - figure_id: "2a/b"
        experiment_id: "figure_2_b"
        story_role: "EphB1 缺失未影响转录性 priming"
        micro_question: >
          在 TLR4–NF-κB 介导的第一信号阶段，EphB1 缺失是否改变了炎症小体相关细胞因子和
          Nlrp3 本身的转录性 priming？
        micro_answer: >
          LPS 诱导下 TNF-α、IL-1β mRNA 随时间上升，但 WT 与 KO 之间上升幅度一致，
          表明 EphB1 缺失未明显影响第一信号驱动的转录性 priming。
        focuses_on_axes: []
        depends_on_panels: []

      - figure_id: "2c"
        experiment_id: "figure_2_a"
        story_role: "EphB1 缺失未造成 LPS 诱导的经典细胞因子分泌缺陷"
        micro_question: >
          EphB1 缺失是否造成巨噬细胞对 LPS 诱导的经典分泌途径（TNF-α/IL-6）的普遍释放缺陷，
          从而混淆对 IL-1β 变化的解读？
        micro_answer: >
          在 LPS 单独刺激下，WT 与 KO 巨噬细胞释放的 TNF-α 上升且幅度相近，
          提示 EphB1 缺失并未普遍削弱细胞因子分泌途径，为后续将分泌差异特异性归因于炎症小体/
          焦亡相关释放提供了基础。
        focuses_on_axes: []
        depends_on_panels: []

      - figure_id: "2d"
        experiment_id: "figure_1_c_a"
        story_role: "EphB1 缺失造成 炎症小体诱导的IL-1β 释放缺陷"
        micro_question: >
          EphB1 缺失导致的 IL-1β 释放是否具有浓度依赖特性？
        micro_answer: >
          在 LPS nigericin 刺激下，WT 与 KO 巨噬细胞释放的 IL-1β 上升，KO 幅度小于 WT，且具有浓度依赖特性，
          提示 EphB1 缺失造成的分泌差异集中于炎症小体特异性通路。
        focuses_on_axes: []
        depends_on_panels: []

      - figure_id: "2e"
        experiment_id: "figure_2_e"
        story_role: "EphB1 缺失未在炎症小体装配层面影响 ASC 寡聚化"
        micro_question: >
          在第二信号触发后，EphB1 缺失是否影响 ASC 的寡聚化和 speck 形成，从而在装配层面阻断
          炎症小体？
        micro_answer: >
          DSS 交联结合亚细胞分级显示，EphB1 缺失并未明显改变 ASC 高分子复合物与单体在可溶/
          不溶组分中的分布，提示炎症小体的装配步骤在 KO 中基本保留。
        focuses_on_axes: []
        depends_on_panels: []

      - figure_id: "2f"
        experiment_id: "figure_2_f"
        story_role: "EphB1 缺失未在炎症小体功能层面影响 caspase-1 的激活及其成熟片段生成"
        micro_question: >
          在 ASC 平台完好组装的前提下，EphB1 缺失对 caspase-1 的激活产生了怎样的影响，
          从而帮助定位差异所在的执行层级
        micro_answer: >
          全细胞裂解物中 cleaved caspase-1 p20 在 WT 与 KO 之间相近，
          说明 caspase-1 激活基本保留；但这些成熟片段在上清中的丰度在 KO 中明显降低，
          提示瓶颈主要位于 GSDMD 孔介导的跨膜外排/膜裂解阶段，而非 caspase-1 激活本身。
        focuses_on_axes: []
        depends_on_panels: []

      - figure_id: "2g"
        experiment_id: "figure_2_g"
        story_role: "EphB1 缺失未在炎症小体功能层面影响IL—1β 与 GSDMD 的切割"
        micro_question: >
          在完成转录后，关键 priming 蛋白（pro-IL-1β）的胞内丰度是否受到 EphB1 缺失影响，
          从而在蛋白层面限制炎症小体装配？
          进一步，
          在 ASC 平台完好组装、casp1激活完整保留的前提下，EphB1 缺失对 caspase-1 底物 GSDMD/pro-IL-1β 的
          切割与胞外释放分别产生了怎样的影响，从而帮助定位差异所在的执行层级

        micro_answer: >
          LPS 预激 4 h 后，WT 与 KO 巨噬细胞中 pro-IL-1β与gsdmd的胞内条带强度相当，说明在给定
          条件下，EphB1 缺失并未通过降低 priming 蛋白含量来削弱炎症小体组装能力。
          进一步，
          全细胞裂解物中 GSDMD/IL-1β 的切割指数在 WT 与 KO 之间相近，
          说明 caspase-1 激活及底物加工基本保留；
          但这些成熟片段在上清中的丰度在 KO 中明显降低，
          提示瓶颈主要位于 GSDMD 孔介导的跨膜外排/膜裂解阶段，
          而非 caspase-1 底物切割本身。

        focuses_on_axes: []
        depends_on_panels: []

      - figure_id: "s2a"
        experiment_id: 2
        story_role: "EphB1 缺失未影响转录性 priming的补充分析"
        micro_question: >
          在 TLR4–NF-κB 介导的第一信号阶段，EphB1 缺失是否改变了炎症小体相关细胞因子和
          Nlrp3 本身的转录性 priming？
        micro_answer: >
          LPS 诱导下 IL-6 mRNA 随时间上升，但 WT 与 KO 之间上升幅度一致，
          表明 EphB1 缺失未明显影响第一信号驱动的转录性 priming。
        focuses_on_axes: []
        depends_on_panels: []

