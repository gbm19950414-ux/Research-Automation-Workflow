      - figure_id: "5C"
        experiment_id: 3
        story_role: "方法管线"
        micro_question: >
          z分数是“观测值距离该组均值有多少个“标准差单位”
          回答：“相对于正常状态，它偏离得有多异常？”，而不是回答数值多大
          通过z分数，我们可以把不同量级的指标拉到同一水平线，并显化方向信息

          多批次的 RNA-seq、非靶向脂质组和靶向 CL panel 原始数据，是如何被处理、
          归一化为z分数，并投影到这些机制轴和 CL 指标上的？
        micro_answer: >
          通过一张流程型示意图，把 RNA-seq（3 批次）、脂质组（3 批次）
          各自的 质量控制（QC）、对齐/峰表处理、批内归一化（如 PQN）、必要的批间校正，以及从
          基因/脂质特征到机制轴 Z、从 CL 物种到 CL/PG、MLCL/CL、oxCL/CL 等指标的计算
          路径串联起来，最终收束到 “axis-level scores + CL indicators” 的统一输出节点，
          作为后续多组学整合与机制分析的输入。
        focuses_on_axes: []
        depends_on_panels: []

      - figure_id: "5D"
        experiment_id: 4
        story_role: "（批次+组学）*机制轴z分数热图"
        micro_question: >
          在每个 batch 内分别计算 RNA 与脂质层面的机制轴效应后，EphB1 缺失在这些轴上
          的方向是否在不同组学、不同批次之间保持一致，从而指向潜在的主导轴？
        micro_answer: >
          通过 axis × batch × omics 的效应热图，用于评估各机制轴在不同组学与批次中
          是否呈现方向一致或系统性偏移，从而为“优先轴”的筛选提供直观判据。

          在基因集设置中：
            考虑capacity与footprint
            footprint：通路被驱动后留下的“响应痕迹”（靶基因、转录程序、反馈调节、代谢适应）
            capacity：通路/机制的“器材、库存、结构、可供调度的潜力”（例如合成酶、转运机器、骨架组件）
            如果你的目标是“样品收样时处于什么状态”，那科学界更常把 footprint 当作更直接的证据
            但是cl的代谢周期很长，这些信号通路对cl的影响是累积的
            我们的目标是检测“这些信号通路长期影响下，cl的可及性受到的影响”
            所以capacity为主的基因集降低，说明的是该机制/通路的“配置能力或长期供给/维护潜能下降”而不是“通路活性↓”
        focuses_on_axes: []
        depends_on_panels: []

