        micro_answer: >
          通过“通路 × 批次”的热图，展示各 Eph 下游通路得分在不同批次/小鼠中的变化方向与效应大小，
          突出那些在 HO vs WT 中跨批次一致上调或下调的通路，剔除批次特异噪音，
          从而说明 Figure 7 后续用于中介分析的通路是真正稳定的 EphB1 下游模式，
