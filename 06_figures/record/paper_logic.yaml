        micro_answer: >
          展示基于文献与通路数据库整理的 Eph 下游信号通路设定集：
          列出每个通路的核心基因、上下游定位以及其对膜脂组成与线粒体膜环境的预期影响（figure中只展示基因数量，因为篇幅太大），
          并标注哪些通路在 Figure 6 中已被 membrane context 轴富集或提示关联，
