        micro_answer: >
          将各批次、各组学的轴级 Z 分数进行等权聚合（如 Stouffer 方法），
          用于评估 EphB1 缺失在各机制轴上的综合偏移程度，
          并判断是否呈现单一主导轴或多轴分布式扰动的情形。

        focuses_on_axes: []
        depends_on_panels: []

      - figure_id: "5F"
        experiment_id: 6
        story_role: "多机制轴与心磷脂含量的回归分析"
        micro_question: >
          这些机制轴的 combined Z 分数在跨批次层面，能在多大程度上预测cl总量的变化？
        micro_answer: >
          通过跨批次回归分析，检验各机制轴的综合分数与预先定义的 CL 表型指标之间的关联程度，
          用于评估哪些轴在统计上最接近 CL 含量变化；
          同时明确该分析可能涉及成分–整体相关，因此需要设计去除重叠特征的对照版本以验证稳健性。

          需要注意的是，回归不显著并不推翻 A/B；它只说明“该轴对 CL_total 这个 Y 不敏感/不直接”，
          轴设计围绕cl的可及、可用性。
        focuses_on_axes: []
        depends_on_panels: []

    
