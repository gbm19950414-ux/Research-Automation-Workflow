    one_sentence_purpose: >
      通过多批次转录组与脂质组的统一机制轴框架，评估 EphB1 缺失在 CL 相关代谢与膜环境轴上的
      一致性扰动模式，并确定哪一条机制轴最适合作为后续通路分解与中介分析的锚定对象（priority axis）。

    key_message: >
      本图的逻辑任务是：
      （1）在概念层面将复杂的 CL 代谢与膜环境过程拆分为若干可定量的机制轴；
      （2）用明确的特征方向与权重规则，将 RNA 与脂质特征压缩为轴级分数；
      （3）在不同组学与批次中评估 EphB1 缺失对各轴的方向一致性与稳健性；
      （4）据此确定一条在多证据维度上最适合作为后续通路级分析与中介建模的锚定机制轴。

    panels:
      - figure_id: "5A"
        experiment_id: 1
        story_role: "概念图"
        micro_question: >
          如何在概念层面把复杂的 CL 相关代谢与膜环境拆分为若干可被定量评估的机制轴，
          作为后续多组学分析的坐标系？
        micro_answer: >
          通过一张 ER–线粒体界面的概念图，将心磷脂代谢和相关膜环境拆分为若干功能轴
          （合成、重塑、转运、供给、氧化、膜成分），在图中标出关键结构
          （线粒体、ER、CL）及各轴的作用方向，为后续轴级 Z 分数与基因/脂质指标的解读
          提供统一的机制框架。
        focuses_on_axes: []
        depends_on_panels: []

      - figure_id: "5B"
        experiment_id: 2
        story_role: "轴定义表格"
        micro_question: >
          在上述机制轴框架下，每条轴具体由哪些基因和脂质指标构成，这些指标的方向
          （bottleneck_sign）和权重是如何被系统定义的？
        micro_answer: >
          以表格形式系统整理六条 CL 机制轴（supply / transport / synthesis /
          remodeling / oxidation / membrane_context）的关键基因与脂质 readout，给出每个
          feature 的生物学含义、bottleneck_sign（+1/−1）和轴内
