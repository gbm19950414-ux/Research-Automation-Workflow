# RULES FOR LOGIC-LAYER CONTENT
# --------------------------------------------
# 1. 逻辑层只描述“图要解决的问题、逻辑角色与分析目的”，
#    不记录任何实验观察、数据数值、具体结果或显著性。
#
# 2. 若一句话是在回答“图为什么存在/要回答什么问题”，→ 放在 logic 层。
#    若一句话是在回答“图最终发现了什么观察”，→ 必须放到 figure/panel 层。
#
# 3. logic 层允许任务级、方向级、推理级的抽象表达（不依赖具体数据），
#    但禁止出现可因数据更新而改变的具体结论。
#
# 4. logic 层永远是分析流程的上游，不得被 panel 或结果反向污染；
#    内容必须在数据重跑、批次变化时仍保持有效。
#
# 5. 简而言之：logic = purpose，不写 facts。
meta:
  paper_title: "EphB1 通过重塑线粒体心磷脂介导的膜环境限幅炎症小体焦亡输出"

main_question:
  one_sentence: >
    在 LPS 预激的原代小鼠腹腔巨噬细胞中，EphB1 是否通过调控线粒体心磷脂（CL）的
    总量与可及池，重塑膜环境并平移 GSDMD 成孔阈值，从而限幅 NLRP3 炎症小体介导的
    IL-1β 裂解性外排与焦亡？
  background_gap: >
    炎症小体相关疾病的治疗需求更偏向“保留抗感染能力前提下，对末端孔形成—裂解性外排
    做精细限幅”，但现有策略多聚焦于抑制 NLRP3 的上游激活。已有证据提示 GSDMD 成孔
    依赖膜脂环境，尤其受线粒体富集心磷脂（CL）状态影响；然而，“受体/外源信号 → CL
    代谢与膜环境 → 线粒体炎症平台 → GSDMD 成孔/外排”这一可检验链条的上游调控模块
    仍缺乏系统阐明。
  central_claim: >
    EphB1 作为上游信号输入，通过下游网络调控线粒体 CL 的总量与可及池，进而改变
    GSDMD-NT 的线粒体对接与成孔效率，最终限幅炎症小体的裂解性外排与焦亡强度；
    多组学机制轴与通路级中介分析指向 PI3K–AKT–mTOR 为连接 EphB1 与膜环境重塑的
    关键中介模块。

hypotheses:
  - id: H1
    one_sentence: >
      EphB1 缺失通过降低线粒体 CL 总量/可及池，削弱 GSDMD-NT 的早期线粒体对接，导致
      IL-1β 裂解性外排与焦亡被限幅。
  - id: H2
    one_sentence: >
      EphB1 对 CL–膜环境的调控主要经由 PI3K–AKT–mTOR 等下游信号模块中介。

mechanistic_axes:
  - id: AX1
    name: baseline_mito_state
    one_sentence: >
      排除线粒体数量与基础膜电位等背景差异对后续 CL/输出读数的混杂。
  - id: AX2
    name: gsdmd_mito_interface
    one_sentence: >
      将执行瓶颈定位到 GSDMD-NT 与线粒体膜的早期相互作用与孔功能。
  - id: AX3
    name: inflammasome_output
    one_sentence: >
      用 IL-1β 裂解性外排与膜裂解读出刻画“输出端强度”，并与上游激活步骤区分。
  - id: AX4
    name: cl_accessibility
    one_sentence: >
      以 NAO/脂质组学与药理操控刻画并验证“CL 可及性/可结合池”作为膜环境阀门。
  - id: AX5
    name: membrane_context
    one_sentence: >
      通过多组学轴级整合与中介分析，将膜环境变化回溯到可解释的上游信号网络。

sections:
  - id: S1
    title: 表型与层级定位：输出端限幅而非上游激活缺陷
  - id: S2
    title: 执行界面：GSDMD-NT 的线粒体对接与早期损伤读出
  - id: S3
    title: 膜脂阀门：CL 总量/可及池变化及其因果验证
  - id: S4
    title: 多组学机制轴与通路中介：连接 EphB1 信号与膜环境重塑
figures:
  - id: "Figure 1"
    title: "EphB1 缺失降低炎症小体激活诱导的巨噬细胞焦亡与 IL-1β 释放"
    section: "S1"
    role_in_story: "表型"
    one_sentence_purpose: >
      回答"表型从何而来"的问题,
      建立 EphB1 缺失在多种炎症小体激活条件下“焦亡输出被限幅”的功能表型,

    key_message: >
      ephb1是维持炎症小体功能的关键因素
      其缺失在 NLRP3/NLRC4/AIM2 等
      炎症小体激活条件下稳定降低 LDH 外排和 IL-1β 释放，确立其作为炎症小体依赖性焦亡
      负向调节因子的功能表型。
    panels:
      - figure_id: "1a"
        experiment_id: "000"
        story_role: "炎症小体遗传筛选流程示意图"
        micro_question: >
          我们是如何发现ephb1表型的？
        micro_answer: >
          通过对20个pb品系进行炎症小体nlrp3信号通路遗传筛选
        focuses_on_axes: []
        depends_on_panels: []
      
      - figure_id: "1b"
        experiment_id: "001"
        story_role: "EphB1 在多品系中表现为显著候选基因"
        micro_question: >
          ephb1在遗传筛选中的表现如何？
        micro_answer: >
          20个pb品系进行炎症小体nlrp3信号通路遗传筛选结果，突出展示ephb1
        focuses_on_axes: []
        depends_on_panels: []

      - figure_id: "1c"
        experiment_id: "figure_2_d"
        story_role: "EphB1 表型不依赖单一 NLRP3 激动剂"
        micro_question: >
          ephb1的nlrp3炎症小体表型，是否与nigericin特异相关？
        micro_answer: >
          ephb1的nlrp3炎症小体表型，在多种炎症小体激活条件下均表现出一致性
        focuses_on_axes: []
        depends_on_panels: []

      - figure_id: "1d"
        experiment_id: 2
        story_role: "EphB1 缺失一致降低炎症小体相关膜裂解（LDH）"
        micro_question: >
          在不同炎症小体感受器被激活的条件下，EphB1 缺失是否一致降低焦亡相关的膜裂解/
          LDH 外排，确立其在炎症小体依赖性细胞裂解中的功能表型？
        micro_answer: >
          在 NLRP3、NLRC4 与 AIM2 被激活时，KO 巨噬细胞的 LDH 外排在早晚两个时间窗口内均
          持续低于 WT，提示 EphB1 缺失在多条炎症小体通路下都压低焦亡强度，而非仅推迟裂解
          时间或只影响单一路径。
        focuses_on_axes: ["AX3"]
        depends_on_panels: ["1A_apoptosis_control"]

      - figure_id: "s1a"
        experiment_id: 1
        story_role: "EphB1 缺失不改变经典凋亡敏感性（Staurosporine）"
        micro_question: >
          在解释炎症小体依赖性焦亡表型之前，是否需要排除 EphB1 缺失引起的“广义细胞死亡敏感性改变”
          （例如经典凋亡通路的普遍耐受或易感），以避免将非特异性的存活差异误判为焦亡特异表型？
        micro_answer: >
          设置一个与炎症小体无关的经典凋亡刺激作为阴性对照通路，用于检验 EphB1 缺失是否存在
          “全局性死亡通路敏感性偏移”。该对照的逻辑目的在于：若凋亡通路并未显示系统性差异，
          则主文中观察到的差异更有理由被定位为炎症小体/焦亡相关执行环节的特异改变。
        focuses_on_axes: []
        depends_on_panels: []

      - figure_id: "s1b"
        experiment_id: 3
        story_role: "炎症输出与孔形成相关标记提供补充证据"
        micro_question: >
          为了将“膜裂解/细胞死亡”与“炎症因子外排”在同一执行层级上对齐，是否需要同时评估
          NLRP3 依赖的 IL-1β 释放读出以及与之对应的执行器加工/孔形成相关分子标记，
          从而验证该表型属于“输出端环节”而非单一 readout 的偶然偏差？
        micro_answer: >
          在相同的 NLRP3 激活条件下，采用两类互补证据对“执行层输出”进行并行刻画：
          （1）功能读出：上清 IL-1β 释放（反映依赖孔形成的外排输出）；（2）分子标记：与
          caspase-1 激活及 GSDMD 孔形成相关的加工产物（用于表征执行器链路是否被触发并进入输出阶段）。
          该面板的逻辑目的在于：将细胞裂解性表型与炎症输出表型建立同层级对应关系，
          并为后续定位瓶颈发生在“上游激活”还是“末端外排/孔功能”提供方向性依据。
        focuses_on_axes: []
        depends_on_panels: []

  - id: "Figure 2"
    title: "EphB1 缺失不影响 NLRP3 上游激活，差异集中于 GSDMD 执行层外排"
    section: "S1"
    role_in_story: "机制轴"
    one_sentence_purpose: >
      通过逐层排除经典分泌、转录性 priming、priming 蛋白丰度及 ASC 组装的差异，将 EphB1
      的作用定位在炎症小体第二信号之后、GSDMD 孔介导的内容物外排这一执行层。
    key_message: >
      EphB1 缺失不影响 LPS 诱导的 TNF-α/IL-6 经典分泌，也不削弱炎症小体相关基因的转录性
      priming、pro-IL-1β/NLRP3 的胞内丰度或 ASC 寡聚化；在相同刺激下，caspase-1 激活及其对
      GSDMD/IL-1β 的切割基本保留，但成熟片段的胞外释放受限，提示瓶颈位于 GSDMD 孔与膜裂解
      步骤，而非炎症小体的组装或酶活本身。
    panels:
      - figure_id: "2a/b"
        experiment_id: "figure_2_b"
        story_role: "EphB1 缺失未影响转录性 priming"
        micro_question: >
          在 TLR4–NF-κB 介导的第一信号阶段，EphB1 缺失是否改变了炎症小体相关细胞因子和
          Nlrp3 本身的转录性 priming？
        micro_answer: >
          LPS 诱导下 TNF-α、IL-1β mRNA 随时间上升，但 WT 与 KO 之间上升幅度一致，
          表明 EphB1 缺失未明显影响第一信号驱动的转录性 priming。
        focuses_on_axes: []
        depends_on_panels: []

      - figure_id: "2c"
        experiment_id: "figure_2_a"
        story_role: "EphB1 缺失未造成 LPS 诱导的经典细胞因子分泌缺陷"
        micro_question: >
          EphB1 缺失是否造成巨噬细胞对 LPS 诱导的经典分泌途径（TNF-α/IL-6）的普遍释放缺陷，
          从而混淆对 IL-1β 变化的解读？
        micro_answer: >
          在 LPS 单独刺激下，WT 与 KO 巨噬细胞释放的 TNF-α 上升且幅度相近，
          提示 EphB1 缺失并未普遍削弱细胞因子分泌途径，为后续将分泌差异特异性归因于炎症小体/
          焦亡相关释放提供了基础。
        focuses_on_axes: []
        depends_on_panels: []

      - figure_id: "2d"
        experiment_id: "figure_1_c_a"
        story_role: "EphB1 缺失造成 炎症小体诱导的IL-1β 释放缺陷"
        micro_question: >
          EphB1 缺失导致的 IL-1β 释放是否具有浓度依赖特性？
        micro_answer: >
          在 LPS nigericin 刺激下，WT 与 KO 巨噬细胞释放的 IL-1β 上升，KO 幅度小于 WT，且具有浓度依赖特性，
          提示 EphB1 缺失造成的分泌差异集中于炎症小体特异性通路。
        focuses_on_axes: []
        depends_on_panels: []

      - figure_id: "2e"
        experiment_id: "figure_2_e"
        story_role: "EphB1 缺失未在炎症小体装配层面影响 ASC 寡聚化"
        micro_question: >
          在第二信号触发后，EphB1 缺失是否影响 ASC 的寡聚化和 speck 形成，从而在装配层面阻断
          炎症小体？
        micro_answer: >
          DSS 交联结合亚细胞分级显示，EphB1 缺失并未明显改变 ASC 高分子复合物与单体在可溶/
          不溶组分中的分布，提示炎症小体的装配步骤在 KO 中基本保留。
        focuses_on_axes: []
        depends_on_panels: []

      - figure_id: "2f"
        experiment_id: "figure_2_f"
        story_role: "EphB1 缺失未在炎症小体功能层面影响 caspase-1 的激活及其成熟片段生成"
        micro_question: >
          在 ASC 平台完好组装的前提下，EphB1 缺失对 caspase-1 的激活产生了怎样的影响，
          从而帮助定位差异所在的执行层级
        micro_answer: >
          全细胞裂解物中 cleaved caspase-1 p20 在 WT 与 KO 之间相近，
          说明 caspase-1 激活基本保留；但这些成熟片段在上清中的丰度在 KO 中明显降低，
          提示瓶颈主要位于 GSDMD 孔介导的跨膜外排/膜裂解阶段，而非 caspase-1 激活本身。
        focuses_on_axes: []
        depends_on_panels: []

      - figure_id: "2g"
        experiment_id: "figure_2_g"
        story_role: "EphB1 缺失未在炎症小体功能层面影响IL—1β 与 GSDMD 的切割"
        micro_question: >
          在完成转录后，关键 priming 蛋白（pro-IL-1β）的胞内丰度是否受到 EphB1 缺失影响，
          从而在蛋白层面限制炎症小体装配？
          进一步，
          在 ASC 平台完好组装、casp1激活完整保留的前提下，EphB1 缺失对 caspase-1 底物 GSDMD/pro-IL-1β 的
          切割与胞外释放分别产生了怎样的影响，从而帮助定位差异所在的执行层级

        micro_answer: >
          LPS 预激 4 h 后，WT 与 KO 巨噬细胞中 pro-IL-1β与gsdmd的胞内条带强度相当，说明在给定
          条件下，EphB1 缺失并未通过降低 priming 蛋白含量来削弱炎症小体组装能力。
          进一步，
          全细胞裂解物中 GSDMD/IL-1β 的切割指数在 WT 与 KO 之间相近，
          说明 caspase-1 激活及底物加工基本保留；
          但这些成熟片段在上清中的丰度在 KO 中明显降低，
          提示瓶颈主要位于 GSDMD 孔介导的跨膜外排/膜裂解阶段，
          而非 caspase-1 底物切割本身。

        focuses_on_axes: []
        depends_on_panels: []

      - figure_id: "s2a"
        experiment_id: 2
        story_role: "EphB1 缺失未影响转录性 priming的补充分析"
        micro_question: >
          在 TLR4–NF-κB 介导的第一信号阶段，EphB1 缺失是否改变了炎症小体相关细胞因子和
          Nlrp3 本身的转录性 priming？
        micro_answer: >
          LPS 诱导下 IL-6 mRNA 随时间上升，但 WT 与 KO 之间上升幅度一致，
          表明 EphB1 缺失未明显影响第一信号驱动的转录性 priming。
        focuses_on_axes: []
        depends_on_panels: []

      - figure_id: "s2b"
        experiment_id: 1
        story_role: "EphB1 缺失未造成 LPS 诱导的经典细胞因子分泌缺陷的补充分析"
        micro_question: >
          EphB1 缺失是否造成巨噬细胞对 LPS 诱导的经典分泌途径（IL-6）的普遍释放缺陷，
          从而混淆对 IL-1β 变化的解读？
        micro_answer: >
          在 LPS 单独刺激下，WT 与 KO 巨噬细胞释放的 IL-6 上升且幅度相近，
          提示 EphB1 缺失并未普遍削弱细胞因子分泌途径，为后续将分泌差异特异性归因于炎症小体/
          焦亡相关释放提供了基础.


        focuses_on_axes: []
        depends_on_panels: []

  - id: "Figure 3"
    title: "EphB1 缺失降低 GSDMD 与线粒体膜的结合"
    section: "S2"
    role_in_story: "机制轴"
    one_sentence_purpose: >
      将 EphB1 的作用具体定位到 GSDMD–线粒体界面，检验焦亡执行瓶颈是否发生在
      GSDMD-NT 对线粒体膜的早期结合及其所触发的线粒体损伤与线粒体内容物外泄阶段。
    key_message: >
      本图旨在区分 GSDMD 执行过程中的“剪切激活”与“线粒体结合/孔化”两个阶段，
      并检验 EphB1 缺失是否将焦亡执行瓶颈定位于 GSDMD-NT 与线粒体膜的早期相互作用。
      通过并行评估线粒体功能状态与线粒体内容物外泄读数，
      为后续追问“线粒体膜环境因素如何决定该界面效率”提供逻辑依据。
    panels:

      - figure_id: "3a/b/c/d/e/f/g/h"
        experiment_id: figure_3_b
        story_role: "炎症小体激活过程中，线粒体功能监测"
        micro_question: >
          在上个figure中我们将问题定位到了gsdmd执行功能环节。
          gsdmd切割后的第一步是与线粒体结合
          于是提出假设：
          EphB1 缺失是否伴随炎症小体激活过程中更轻的线粒体损伤与 ROS 应激？
        micro_answer: >
          通过对细胞质 ROS、线粒体 ROS 及线粒体膜电位的动力学监测，
          用于判别 EphB1 缺失条件下线粒体在炎症小体激活过程中的应激响应方式，
          以及这些变化是否更符合“线粒体内容物外泄受限”而非“上游激活不足”的模型。
        focuses_on_axes: []
        depends_on_panels: []

      - figure_id: "s3a/b/c"
        experiment_id: figure_3_b
        story_role: "炎症小体激活过程中，线粒体功能监测"
        micro_question: >
          H2DCFDA/MitoSOX/TMRM 动力学检测是否具有批次间可重复性？
        micro_answer: >
          通过多批次聚合展示线粒体与细胞质 ROS 及线粒体膜电位的变化模式，
          用于评估上述判别逻辑在不同实验批次中的可重复性。
        focuses_on_axes: []
        depends_on_panels: []

      - figure_id: "s3d"
        experiment_id: figure_3_a
        story_role: "gsdmd线粒体结合峰值时间点 mRNA释放读数"
        micro_question: >
          在小鼠原代腹腔巨噬细胞中，GSDMD-NT 对线粒体的快速富集峰值发生在哪个时间点？
        micro_answer: >
          时间梯度的线粒体分级 qpcr 显示，Nigericin 刺激后 mtRNA释放 在 WT 线粒体组分中
          7.5min内出现明显峰值。
