  - id: "Figure 5"

    title: "多组学机制轴分析指向 membrane context 与心磷脂含量下降相关"
    section: ""   # 若你之后重新划分章节，可再改
    role_in_story: "机制轴"

    one_sentence_purpose: >
      figure4中，我们发现了心磷脂是EphB1 缺失降低炎症小体通路激活的重要因素
      但是，心磷脂的变化是动态复杂的多机制过程
      为了明确心磷脂含量的变化来源于哪个机制
      需要从 批次一致性、方向一致性、批次间回归分析 三个方面共同确定
      我们以线粒体心磷脂（CL）相关机制轴为坐标系，
      从概念图、指标表、数据处理流程到轴级效应矩阵、跨组学综合得分及 CL 表型关联，
      系统回答 “EphB1 缺失与哪条机制轴密切相关”。

    key_message: >
      Figure 6 先在概念上将 CL 代谢拆分为若干机制轴，并用表格明确每条轴包含的基因/脂质指标的方向与权重（6A–6B），
      展示通过多批次 RNA-seq、脂质组的统一 pipeline，将原始数据压缩为轴级 Z 分数的流程图（6C），
      随后展示 EphB1 缺失在不同组学、不同批次中的轴级z分数矩阵，通过人工观察批次间、组学间一致性，进行方向一致性分析，寻找在所有批次、所有轴上都一致性改变的轴（6D），
      之后，每个组学、每个批次先算轴级 Z，再做 Stouffer meta，判断“EphB1 缺失导致 CL 代谢呈现多轴失衡，其中以 membrane context 轴的改变最为集中且多组学一致。”（6E），
      完成相关性分析后，进行因果分析。对轴机制分数（x轴）和 sum CL表型值（y轴）在批次间进行回归分析，筛选出与CL含量最相关的轴为membrane_context（6F）。
      - 但是该方法设计属于典型的成分-整体相关，需要将cl从轴中抽离出来，再做一次回归分析。

      具体分析membrane_context轴指标 total mito mass 和cl fraction，可以发现pc、pe、cl都呈现下降趋势，其中pc下降量级最大
      这说明，HO 更像发生了“整体膜磷脂供给/膜生物发生能力下降（global phospholipid depletion）”，CL 的下降很可能是这个全局缺口中的一部分

    panels:
      - figure_id: "5A"
        experiment_id: 1
        story_role: "概念图"
        micro_question: >
          如何在概念层面把复杂的 CL 相关代谢与膜环境拆分为若干可被定量评估的机制轴，
          作为后续多组学分析的坐标系？
        micro_answer: >
          通过一张 ER–线粒体界面的概念图，将心磷脂代谢和相关膜环境拆分为若干功能轴
          （合成、重塑、转运、供给、氧化、膜成分），在图中标出关键结构
          （线粒体、ER、CL）及各轴的作用方向，为后续轴级 Z 分数与基因/脂质指标的解读
          提供统一的机制框架。
        focuses_on_axes: []
        depends_on_panels: []

      - figure_id: "5B"
        experiment_id: 2
        story_role: "轴定义表格"
        micro_question: >
          在上述机制轴框架下，每条轴具体由哪些基因和脂质指标构成，这些指标的方向
          （bottleneck_sign）和权重是如何被系统定义的？
        micro_answer: >
          以表格形式系统整理六条 CL 机制轴（supply / transport / synthesis /
          remodeling / oxidation / membrane_context）的关键基因与脂质 readout，给出每个
          feature 的生物学含义、bottleneck_sign（+1/−1）和轴内
          权重，为 Fig6C–6F 的轴级分析提供可追溯的定义基础。
        focuses_on_axes: []
        depends_on_panels: []
        supplementary_files: []

      - figure_id: "5C"
        experiment_id: 3
        story_role: "方法管线"
        micro_question: >
          z分数是“观测值距离该组均值有多少个“标准差单位”
          回答：“相对于正常状态，它偏离得有多异常？”，而不是回答数值多大
          通过z分数，我们可以把不同量级的指标拉到同一水平线，并显化方向信息

          多批次的 RNA-seq、非靶向脂质组和靶向 CL panel 原始数据，是如何被处理、
          归一化为z分数，并投影到这些机制轴和 CL 指标上的？
        micro_answer: >
          通过一张流程型示意图，把 RNA-seq（3 批次）、脂质组（3 批次）
          各自的 质量控制（QC）、对齐/峰表处理、批内归一化（如 PQN）、必要的批间校正，以及从
          基因/脂质特征到机制轴 Z、从 CL 物种到 CL/PG、MLCL/CL、oxCL/CL 等指标的计算
          路径串联起来，最终收束到 “axis-level scores + CL indicators” 的统一输出节点，
          作为后续多组学整合与机制分析的输入。
        focuses_on_axes: []
        depends_on_panels: []

      - figure_id: "5D"
        experiment_id: 4
        story_role: "（批次+组学）*机制轴z分数热图"
        micro_question: >
          在每个 batch 内分别计算 RNA 与脂质层面的机制轴效应后，EphB1 缺失在这些轴上
          的方向是否在不同组学、不同批次之间保持一致，从而指向潜在的主导轴？
        micro_answer: >
          以 axis×batch×omics 的热图展示六条机制轴的 effect_z，肉眼观察是否有一个机制轴在多批次、多组学中稳定变化
          发现membrane context轴转录组与脂质组在不同批次间稳定变化（转录组中升高，脂质组中降低）
          - 转录组中的升高，可能是来自补偿效应，或者基因集选择问题。

        focuses_on_axes: []
        depends_on_panels: []

      - figure_id: "5E"
        experiment_id: 5
        story_role: "（组学+批次）聚合z分数"
        micro_question: >
          将各批次、各组学的轴级 Z 分数通过 Stouffer 等权合并后，EphB1 缺失是否在某一条
          机制轴上形成统计学上显著的综合异常，还是呈现多轴温和偏移、缺乏单一主导瓶颈？
        micro_answer: >
          条形图给出六条机制轴跨 RNA 与脂质组、多批次整合后的 Z_multiomics_overall 及
          p_multiomics_overall，显示所有轴的综合效应均为 |Z|<2 且 p>0.05，其中 Transport、
          Membrane context、Oxidation 等轴略偏正向，Synthesis 轴略偏负，Supply 接近 0，
          但均未达到显著。
          结合单一组学 meta 结果（如 membrane context 轴在脂质组 Z_lipid
          ≈ +2.8、在 RNA 中为负），结果支持 “多轴分布式、温和偏移” 而非 “单一极端瓶颈”
          的图景。
        focuses_on_axes: []
        depends_on_panels: []

      - figure_id: "5F"
        experiment_id: 6
        story_role: "多机制轴与心磷脂含量的回归分析"
        micro_question: >
          这些机制轴的 combined Z 分数在跨批次层面，能在多大程度上预测cl总量的变化？
        micro_answer: >
          以批次为单位，将各机制轴的 combined Z 与 CL panel 中预先挑选的 CL 指标
          HO–WT 差值做线性回归：
          membrane context 轴下 CL_fraction 与轴效应呈强负相关、
          mito_lipid_mass 与轴效应呈中度正相关；
          transport 轴下 PA_CL_mismatch 与
          PA_PG_mismatch 与轴 Z 呈较强正相关；
          其他轴与其对应 CL readout 的相关性较弱、
          方向不稳定且 p 值大多 >0.3。
          整体上，membrane context 轴 是与总心磷脂含量最具趋势性关联的轴
        focuses_on_axes: []
        depends_on_panels: []

    
  - id: "Figure 6"
    title: "EphB1 下游信号通路中介 membrane context 机制轴改变的因果模型"
    section: ""
    role_in_story: "机制"

    one_sentence_purpose: >
      在确认 membrane context 机制轴与sum CL之间的强关联（Figure 5）后，
      Figure 6 的目的在于进一步回答：哪些 EphB1 下游信号通路（M）在多大程度上
      中介了 EphB1 缺失 (X) 对 membrane context 轴分数及其关键脂质成分 (Y) 的影响，
      从而将轴级别的表型变化锚定到具体的分子路径。

    key_message: >
      Figure 6 通过 X–M–Y 中介模型，

      
      预期结果显示：
      一组跨批次稳定的 Eph 下游信号通路不仅在 HO 中系统性改变，
      其活性变化同时显著中介了 membrane context 轴分数的扰动（a×b 显著且方向一致），
      并进一步在脂质层面指向membrane context 轴相关指标的重构。
      因此，EphB1 干预通过特定下游通路驱动线粒体膜环境轴的改变，
      建立了从基因缺失 → 信号通路变化 → 膜结构重塑的因果链条。

      但是，转录组学的批次间结果并无某个信号通路统一变化，这说明该实验需要被qPCR验证，而接下来的中介分析基于batch1的2*3实验样本

    panels:
      - figure_id: "6a"
        experiment_id: 1
        story_role: "概念图"
        micro_question: >
          我们在 Figure 5 已经看到 EphB1 缺失与 membrane context 轴的变化相关，
          Figure 6 想回答哪些 EphB1 下游信号通路（M）在多大程度上
          中介了 EphB1 缺失 (X) 对 membrane context 轴分数及其关键脂质成分 (Y) 的影响
          在这里展示一个概念图，说明我们的 X–M–Y 中介模型设计思路：
        micro_answer: >
          将因素分解为 基因敲除（x）；信号通路转录水平变化（m）；机制轴z分数/脂质组学指标（y）
          将 membrane context 轴的变化分解为“EphB1 缺失对下游通路的效应 (a)” 与 “下游通路对机制轴z分数 / 脂质组学指标的效应 (b)”。

      - figure_id: "6b"
        experiment_id: 2
        story_role: "基因集定义表"
        micro_question: >
