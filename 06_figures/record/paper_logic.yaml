          NAO总荧光下降提示线粒体CL相关信号降低，但该读出同时受线粒体质量、膜电位/通透性、膜结构与CL可及性影响，不能单独等同于总CL含量下降。
          为此，我们在figure3中，我们检测了线粒体膜电位、线粒体mtRNA含量，均未发现显著差异，提示线粒体质量与膜电位变化并非主因。
          所以，我们认为nao的结果体现了心磷脂含量的降低
        focuses_on_axes: []
