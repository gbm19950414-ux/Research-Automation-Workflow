  - id: "Figure 4"
    title: "心磷脂是EphB1 缺失降低炎症小体通路激活的重要因素"
    section: "S3"
    role_in_story: "Lipid gate: cardiolipin abundance/accessibility and causality"
    one_sentence_purpose: >
      在排除线粒体数量与基础 ΔΨm 等混杂因素后，检验 EphB1 是否通过改变线粒体心磷脂（CL）的总量与可及/可结合池来重塑 GSDMD–线粒体界面，并用药理学操控建立“CL 可及性 → 炎症小体输出”的因果链。
      本图的逻辑任务是把 EphB1 的效应从“线粒体界面瓶颈”（Figure 3）进一步上溯到“CL–膜脂环境”：
      （1）先用静息条件下的ΔΨm/线粒体数量对照排除基础线粒体状态差异；
      （2）再用 NAO 读出刻画“NAO 可染/可及的 CL 池”这一功能性脂质状态；
      （3）随后用脂质组学在独立测量层面检验 CL 总量/亚型的改变是否能支撑 NAO 所指向的脂质差异；
      （4）最后用两条独立药理轴（AD、BEL）分别在“脂质状态操控（NAO）”与“功能后果（IL-1β 释放）”层面建立因果关联与遮蔽关系，
      从而将 EphB1 的主要作用阶层定位到 CL 可及性/可结合池这一膜脂阀门。
    panel_transitions:
      skeleton: Having excluded [a confounder], we next asked whether [lipid-state measure or perturbation] supports [the lipid-gate logic].
      skeleton_cn: 在排除“[混杂因素]”后，我们进一步检验：[脂质状态读数/操控] 是否支持“[脂质阀门逻辑]”。
      between_panels:
        - from: "4A_mito_potential_and_mass_baseline"
          to: "4a/b"
          en: >
            Having excluded baseline differences in mitochondrial state as a dominant confounder, we next asked whether EphB1 loss alters the functionally accessible cardiolipin pool measured by NAO.
          cn: >
            在排除基础线粒体状态差异作为主要混杂因素后，我们进一步检验：EphB1 缺失是否改变 NAO 所反映的“功能性可及/可结合”CL 池。

        - from: "4a/b"
          to: "4c/d"
          en: >
            Having observed a change in an accessibility-proxy readout, we next asked whether independent chemical quantification supports a shift in cardiolipin abundance and/or species composition.
          cn: >
            在获得可及性代理读数的线索后，我们进一步检验：独立的化学定量是否支持 CL 总量与/或物种谱的改变，以增强膜脂归因的稳健性。

        - from: "4c/d"
          to: "4e/f"
          en: >
            Having established a lipid-state framework, we next asked whether an independent upstream pharmacologic perturbation can experimentally and controllably tune the NAO-defined accessible cardiolipin pool, providing a manipulable entry point for causal testing.
          cn: >
            在建立脂质状态框架后，我们进一步检验：一条独立的上游药理操控是否能够在实验上、可控地调节 NAO 所定义的可及 CL 池，从而提供一个可操控的因果检验入口。

        - from: "4e/f"
          to: "4g"
          en: >
            Having implemented a lipid-state perturbation, we next asked whether inflammasome output shifts in the predicted direction—specifically, whether reduced accessible cardiolipin is sufficient to lower IL-1β release—thereby linking cardiolipin accessibility to terminal execution strength.
          cn: >
            在实现对 CL 可及池的药理操控后，我们进一步检验：炎症小体输出是否按预期方向变化——具体而言，可及 CL 的下降是否足以下调 IL-1β 裂解性外排——从而将“CL 可及性”与末端执行强度建立因果对应。

        - from: "4g"
          to: "s4a/b"
          en: >
            Having linked one perturbation axis to functional output, we next asked whether a mechanistically distinct perturbation converges on the same accessible-cardiolipin logic, reducing single-agent interpretive risk.
          cn: >
            在将第一条药理轴与功能输出对齐后，我们进一步检验：机制上独立的第二条药理轴是否同样收敛到“可及 CL 池”的逻辑，以降低单一药物解释风险。

        - from: "s4a/b"
          to: "s4c"
          en: >
            Having established a second, independent lipid-state manipulation, we next asked whether its functional consequence on inflammasome output aligns with the same lipid-gate model.
          cn: >
            在建立第二条独立的脂质状态操控后，我们进一步检验：其对炎症小体输出的功能后果是否与同一脂质阀门模型一致。

    panels:
      - figure_id: "4A_mito_potential_and_mass_baseline"
        experiment_id: 1
        story_role: "baseline_mito_state"
        micro_question: >
          在未激活炎症小体时，EphB1 缺失是否导致线粒体膜电位或数量发生明显改变，从而成为后续
          CL 读数的主要驱动因素？
        micro_answer: >
          以静息条件下的线粒体膜电位（TMRM 动力学）与线粒体数量（线粒体标志基因 qPCR）作为背景对照，
          用于判断后续 CL/NAO 差异是否可能被“线粒体丢失或严重去极化”等基础状态偏移所解释，从而为脂质层面的归因提供前提。
        focuses_on_axes: ["AX1"]
        depends_on_panels: []

      - figure_id: "4a/b"
        experiment_id: 2
        story_role: "心磷脂nao染色示意图/量化统计"
        micro_question: >
          在控制线粒体膜电位与数量后，EphB1 缺失是否仍然表现为 NAO 可染心磷脂池的下降，从而提示
          CL 可及性/质量的改变？
        micro_answer: >
          在控制细胞当量与基础线粒体状态的前提下，使用 NAO 作为“NAO 可染/可及的 CL 池”的功能性读出，
          用于检验 EphB1 缺失是否伴随 CL 可达性/可结合池层面的改变，并为解释 GSDMD–线粒体结合效率差异提供膜脂学线索。
          同时强调 NAO 属于可及性读出，需与独立 CL 定量（脂质组学）共同解释。
        focuses_on_axes: []
        depends_on_panels: []

      - figure_id: "4c/d"
        experiment_id: 3
        story_role: "心磷脂含量脂质组学检测亚型/总量变化"
        micro_question: >
          为了进一步排除nao染色的非特异性影响，
          非靶向脂质组学层面，EphB1 缺失是否确实导致 CL 总量下降，
          从而支持NAO 信号差异反映的是 CL 池本身而非技术伪影？
        micro_answer: >
          采用脂质组学对 CL 总量与亚型谱进行独立测量，用于验证 NAO 所提示的“CL 池改变”是否能在化学定量层面得到支撑，
          并将“可及性变化”与“总量/谱系变化”区分开来，从而提高对膜脂机制归因的稳健性。
        focuses_on_axes: []
        depends_on_panels: []

      - figure_id: "4e/f"
        experiment_id: 1
        story_role: "ad处理心磷脂nao染色/量化统计"
        micro_question: >
          通过ad，富集到线粒体心磷脂富含区域，起到占位作用，另一方面，抑制ptpmt1，阻断心磷脂合成通路，
          导致心磷脂含量减少、可结合性降低
          是否可以在人为条件下降低 NAO 可染 CL 池，并部分
          重现 EphB1 缺失的 CL 表型？
        micro_answer: >
          通过 AD 作为上游药理学操控，在脂质状态层面人为降低 NAO 可染/可及的 CL 池，
          用于检验“CL 可及性下降”是否可被外源手段复制，并为后续功能 readout（IL-1β）提供明确的上游操控起点。
        focuses_on_axes: []
        depends_on_panels: []

      - figure_id: "4g"
        experiment_id: 2
        story_role: "ad处理后il1b释放"
        micro_question: >
          在功能 readout 上，AD 诱导的 CL 结合与合成障碍，
          是否足以下调 IL-1β 释放，并与 EphB1 缺失形成遮蔽
          关系，从而将 EphB1 作用路径定位到 CL 轴？
        micro_answer: >
          在功能 readout 上评估 AD 诱导的“CL 可及性下降”是否足以抑制 NLRP3 炎症小体输出（以 IL-1β 释放表征），
          并进一步检验其与 EphB1 缺失之间是否呈现遮蔽/同阶关系，从而将 EphB1 的主要作用路径定位到 CL 轴。
        focuses_on_axes: []
        depends_on_panels: []

      - figure_id: "s4a/b"
        experiment_id: 1
        story_role: "bel处理心磷脂nao染色/量化统计"
        micro_question: >
          通过bel药理抑制 iPLA₂–介导的 CL 去酰基/重塑，
          导致的cl积累/氧化cl清除受阻
          是否可以在人为条件下降低 NAO 可染 CL 池，并部分
          重现 EphB1 缺失的 CL 表型？
        micro_answer: >
          通过 BEL 抑制 iPLA₂ 相关的脂质重塑过程，在脂质状态层面降低 NAO 可染/可及的 CL 池，
          作为第二条独立药理轴用于复现“CL 可及性操控”，并与 AD 轴形成相互印证，降低单一药物解释风险。
        focuses_on_axes: []
        depends_on_panels: []

      - figure_id: "s4c"
        experiment_id: 2
        story_role: "bel处理后il1b释放"
        micro_question: >
          在功能 readout 上，BEL 诱导的 CL 重塑障碍，导致的cl积累/氧化cl清除受阻
          是否足以下调 IL-1β 释放，并与 EphB1 缺失形成遮蔽
          关系，从而将 EphB1 作用路径定位到 CL 轴？
        micro_answer: >
          在功能 readout 上评估 BEL 诱导的“CL 可及性下降”是否足以限制 NLRP3 炎症小体输出（IL-1β 释放），
          并检验其与 EphB1 缺失之间的遮蔽/同阶关系，从而巩固“CL 可及性 → GSDMD 孔/外排 → IL-1β 释放”的因果序列。
        focuses_on_axes: []
        depends_on_panels: []

  - id: "Figure 5"
    title: "多组学机制轴分析指向 membrane context 阻碍严重"
    section: ""   
    role_in_story: "Omics synthesis: define and prioritize a mechanistic axis"
    one_sentence_purpose: >
      在统一机制轴框架下整合多批次转录组与脂质组数据，量化 EphB1 缺失对各 CL/膜环境相关机制轴的方向一致性与稳健性，并据此确定最适合作为后续通路分解与中介建模锚点的优先机制轴（priority axis）。
      本图的逻辑任务是：
      （1）在概念层面将复杂的 CL 代谢与膜环境过程拆分为若干可定量的机制轴；
      （2）用明确的特征方向与权重规则，将 RNA 与脂质特征压缩为轴级分数；
      （3）在不同组学与批次中评估 EphB1 缺失对各轴的方向一致性与稳健性；
      （4）据此确定一条在多证据维度上最适合作为后续通路级分析与中介建模的锚定机制轴。
    panel_transitions:
      skeleton: Having defined [the axis framework], we next asked whether [the scoring and integration step] enables [cross-batch, cross-omics inference].
