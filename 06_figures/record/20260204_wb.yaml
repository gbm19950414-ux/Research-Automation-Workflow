  stats:
    n_definition: ""
    n: ""
    summary: ""
    test: ""
    multiple_comparisons: ""

  significance:
    symbols: ""

  extra_notes: ""

# ---------- 7. AI Writing Hints（可选）：给 LLM 的写作风格提示 ----------
ai_hints:
  target_section: ["Results", "Discussion_mini", "Methods_diff"]
  tone: "neutral"
  target_journal_style: ""
  language: "zh_en_mix"

