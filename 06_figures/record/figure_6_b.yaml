meta:
  panel_type: "table"
  title: "Cardiolipin 机制轴的关键基因脂质指标整理"
  role_in_paper: >
    系统整理心磷脂相关六个机制轴（supply / transport / synthesis /
    remodeling / oxidation / membrane_context）中使用的关键基因脂质指标，
    明确每个 feature 的轴归属与选择理由，用于支持 Fig6A 的机制示意、
    后续的的定量比较以及多组学 Z 分数计算的可解释性。

    轴级转录基因集的构建逻辑（不含数据驱动筛选版）
    在本研究的多轴机制框架中，转录组学基因集的构建采用分层、带排除规则的策略，以在保证轴级特异性的前提下，适当扩展每个轴的代表基因数目，使其能够在多组学整合中与脂质组信号大致等权重参与分析，而不牺牲机制清晰度。
      1.	Tier-1：核心执行基因（essential executors）
    对每个轴（合成、重塑、氧化、转运、供给、膜环境），首先定义一组“最小充分”的核心执行基因。
    选择标准为：
      •	在遗传或功能缺失时，可直接阻断或显著削弱该轴对应的生物过程；
      •	作用点位于该轴路径的关键“硬节点”（例如 PA→CDP-DAG→PG→CL 合成链、CL↔MLCL 重塑反应、PA/磷脂跨膜转运、MICOS 介导的嵴结构维持等）；
      •	尽量具有相对轴内特异性，而非普遍参与多条代谢或信号通路。
    这些基因为每个轴的“种子集”，在后续分析中给予最高权重，定义轴级转录信号的主体方向。
      2.	Tier-2：路径近邻执行基因（proximal pathway components）
    在核心执行基因的基础上，为了增加基因集的代表性与稳定性，对每个轴允许适度扩展一小圈“路径近邻”基因：
      •	直接位于核心反应上下游的一至两步（例如合成轴中紧邻 CDP-DAG/PG 步骤的相关酶，重塑轴中与 CL/MLCL 脱酰–再酰化密切相关的酶）；
      •	或属于与核心执行子同一功能复合体/结构模块（例如 MICOS 复合体内的关键亚基，与 cristae 结构及 CL niche 直接相关）。
    这些基因在生物化学和结构层面与该轴紧密相连，但单独缺失不一定完全阻断该过程，因此在轴级评分中给予中等权重，作为对核心执行层的“轴内扩展”和“缓冲层”，增加多基因集下 Z-score 的稳定性。
      3.	Tier-3：条件性贡献者（conditional contributors / direct regulators）
    最外层仅在存在明确文献证据的前提下，纳入少量可以直接调节核心执行层活性或表达的调控因子，作为条件性贡献者，而非轴的定义成分：
      •	包括可直接抑制或激活核心合成/重塑酶转录的特定转录因子（如 CHOP 对 Crls1 的抑制）；
      •	或以蛋白修饰方式显著影响核心酶复合体稳定性或功能的线粒体调节因子（如 SIRT3–PPARγ–CRLS1 轴等）。
    这类基因不用于定义轴本身，而是在轴级转录信号评分中以低权重引入，用于提示“该轴在调控层是否存在协同证据”，并在多轴比较时辅助排序“主导瓶颈轴”的可能性。
      4.	统一排除规则（cross-axis exclusion rules）
    为避免基因集在扩展过程中丧失轴特异性，本研究对所有轴统一设定排除规则：
      •	不将全局代谢/线粒体 master regulators 纳入任何轴的核心集或路径近邻集，如 PGC-1 家族、PPAR 家族、AMPK、mTOR、NRF 等，仅在必要时作为调控背景在文本中解释，而不参与轴分数计算；
      •	不将广义前体供应或能量代谢的背景基因（如大部分 FA 合成、β-氧化、OXPHOS 复合体大集合）直接并入任一轴的核心集，以避免 Supply 轴、Membrane context 轴与其他轴过度重叠；
      •	对同时清晰参与多个轴过程、缺乏方向性特异性的基因（例如既强烈影响 ROS 又决定前体供应者），不纳入任何单一轴的核心执行层，而仅在必要时作为“全局背景”出现在讨论中。

    在上述分层纳入与统一排除规则下，每个轴的转录基因集由少量核心执行基因（Tier-1）、有限数量的路径近邻执行基因（Tier-2）以及极少数条件性贡献者（Tier-3）构成。该结构既保证了基因集在功能上的轴级特异性与机制清晰度，又通过适度扩容提高了轴级 RNA Z-score 的稳定性，使其在与脂质 readouts（如 CL_PG_ratio、MLCL_CL_ratio、oxCL_CL_ratio、PA–PG mismatch 等）进行 5:5 权重多组学整合时，能够提供有分量且可解释的转录层证据，而不被全局代谢重编程信号所主导。
  related_figures:
    - "Fig6A"

# 这张表的“列”（供你生成真正的 Word/LaTeX 表格用）
columns:
  - name: "axis"
    description: "脂质组学指标与关键基因所属机制轴（supply / transport / synthesis / remodeling / oxidation / membrane_context）"
  - name: "feature_type"
    description: "区分关键基因与脂质组学指标"
  - name: "name"
    description: "关键基因符号或脂质指标名称，如 Pgs1、sum_PG、CL_PG_ratio等"
  - name: "formula"
    description: "脂质组学指标的具体计算过程，关键基因中此列为NA"
  - name: "description"
    description: "脂质组学指标的生物学含义，以及关键基因的生物学功能"
  - name: "raw_increase_means"
    description: "该脂质组学指标/关键基因转录水平升高，对该轴来说意味着什么？"
  - name: "effect_on_CL"
    description: "该脂质组学指标/关键基因转录水平升高，对心磷脂来说意味着什么？"
  - name: "bottleneck_sign"
    description: "数值方向定义；+1 表示该指标升高为该轴瓶颈加重的正向证据，-1 表示该指标升高 either 反映该轴功能改善，或作为支持其他轴更可能为 primary 的反向证据（用于排序优先级而非排除该轴异常）。"
  - name: "weight"
    description: "轴内贡献系数；用于调节该指标对 axis_score 的相对影响大小，1.0 表示核心强证据，较低数值用于次要、共享或反向指标，仅改变排序权重而不改变方向判读。"
  - name: "note"
    description: "补充解释该指标的判读条件或特殊使用方式（例如仅在低值时作为反向证据、与其他指标联合解释、或依赖前提假设），用于确保跨轴解读的一致性与可追溯性。"

# 每一行是一个最小“feature”记录
entries:

  # =========================
  # Synthesis axis
  # =========================
  - axis: "synthesis"
    feature_name: "CL_PG_ratio"
    text: >
      CL_PG_ratio（sum(CL)/sum(PG)）是合成轴核心 readout，用于量化 PG → CL 的转化效率。
      指标升高表示合成能力增强，因此设为 bottleneck_sign = -1，weight = 1。
      通过与 z 分数相乘反转方向，使不同轴的瓶颈程度可比较，用于合成轴的主判读依据。

  - axis: "synthesis"
    feature_name: "sum_PG"
    text: >
      sum_PG（sum(PG)）升高反映 PG 前体堆积，在 PA 未显著不足时提示合成轴受限。
      设为 bottleneck_sign = +1、weight = 0.7，作为合成轴的重要辅助指标。
      与 supply 共享，为避免串味降低权重，用于支持 CL_PG_ratio 的判读。

  - axis: "synthesis"
    feature_name: "sum_CL"
    text: >
      sum_CL（sum(CL)）为合成结果 readout，受多轴共同影响，仅作辅助解释。
      指标升高通常提示 CL 状态较好，因此设 bottleneck_sign = -1、weight = 0.5。
      必须结合 CL_PG_ratio 与 MLCL_CL_ratio 才能避免误判单一轴。

  - axis: "synthesis"
    feature_name: "MLCL_CL_ratio"
    text: >
      MLCL_CL_ratio 在重塑轴是核心指标，在合成轴中作为反向证据使用。
      升高提示问题更偏重塑而非 PG→CL 转化受限，因此 bottleneck_sign = -1、weight = 0.3。
      作用是下调合成轴作为 primary 的概率，而非否定合成轴异常本身。

  - axis: "synthesis"
    feature_name: "oxCL_CL_ratio"
    text: >
      oxCL_CL_ratio 在氧化轴是核心 readout，在合成轴中用于反向排序。
      升高提示 CL 损伤更可能来自氧化而非合成效率降低，因此设为 -1、weight = 0.3。
      用于多轴同时异常时重新排序，而非排除合成异常。

  # =========================
  # Oxidation axis
  # =========================
  - axis: "oxidation"
    feature_name: "oxCL_CL_ratio"
    text: >
      oxCL_CL_ratio（sum(oxCL)/sum(CL)）是氧化轴核心 readout，直接量化 CL 氧化负荷。
      升高代表氧化压力增强与功能性 CL 损失，因此设 bottleneck_sign = +1、weight = 1。
      是 Fig6B 氧化轴解释的主要依据。

  - axis: "oxidation"
    feature_name: "sum_oxCL"
    text: >
      sum_oxCL 为氧化 CL 的绝对总量，受总 CL pool 影响，是辅助 readout。
      升高表示氧化损伤加剧，因此设 bottleneck_sign = +1、weight = 0.5。
      与 oxCL_CL_ratio 联用区分氧化强度与暴露量。

  - axis: "oxidation"
    feature_name: "MLCL_CL_ratio"
    text: >
      MLCL_CL_ratio 升高更符合重塑轴瓶颈，因此在氧化轴中为反向证据。
      设 bottleneck_sign = -1、weight = 0.3，仅用于降低氧化作为 primary 的可能性。
      不用于否定氧化参与，而是调整多轴的排序优先级。

  - axis: "oxidation"
    feature_name: "CL_PG_ratio"
    text: >
      CL_PG_ratio 下降更典型对应合成瓶颈，因此在氧化轴中作为反向指标。
      使用 bottleneck_sign = +1、weight = 0.3，主要在 CL_PG_ratio 明显下降时产生负贡献。
      用于弱化“氧化 primary”的解释，而非支持氧化改善。

  # =========================
  # Transport axis
  # =========================
  - axis: "transport"
    feature_name: "PA_PG_mismatch"
    text: >
      PA_PG_mismatch（z(PA) − z(PG)）升高表示 PA 正常或增高而 PG 未同步上升。
      指向 PA → PG 转运或局部利用受阻，因此设 bottleneck_sign = +1、weight = 1。
      是 transport 轴最直接、最稳定的核心指标。

  - axis: "transport"
    feature_name: "PA_CL_mismatch"
    text: >
      PA_CL_mismatch 升高代表 PA 充足但 CL 未建立，提示通路中部受阻。
      因此设 bottleneck_sign = +1、weight = 1，作为更综合的 transport readout。
      与 PA_PG_mismatch 联用提高定位特异性。

  - axis: "transport"
    feature_name: "sum_PA"
    text: >
      在 transport 轴中，sum_PA 用作反向证据而非供应 readout。
      若 PA 本身已很低，更符合 supply 原发，因此设 bottleneck_sign = +1、weight = 0.3。
      仅用于下调 transport primary 的可能性，而非支持运输改善。

  - axis: "transport"
    feature_name: "CL_PG_ratio"
    text: >
      CL_PG_ratio 下降更典型对应合成瓶颈，因此在 transport 轴中为反向指标。
      使用 bottleneck_sign = +1、weight = 0.3，使下降方向产生负贡献。
      用于弱化“transport primary”，避免误将合成轴归因给运输。

  # =========================
  # Supply axis
  # =========================
  - axis: "supply"
    feature_name: "sum_PA"
    text: >
      sum_PA 是 supply 轴核心 readout，直接反映 PA 前体池充足性。
      升高通常有利于 CL 合成，因此 bottleneck_sign = -1、weight = 1。
      是判定 supply 是否受限的首选指标。

  - axis: "supply"
    feature_name: "sum_PG"
    text: >
      sum_PG 升高可提示下游受限，因此为 supply/synthesis 共享指标。
      设 bottleneck_sign = +1、weight = 0.3，用于辅助解释而非独立归因。
      需结合 PA 与 CL_PG_ratio 才具判读意义。

  - axis: "supply"
    feature_name: "PG_PA_ratio"
    text: >
      PG_PA_ratio 升高表示 PA 更多流入 PG，是供给链路改善的信号。
      因此设 bottleneck_sign = -1、weight = 0.5，为 supply 辅助 readout。
      同时受 transport 与 synthesis 影响，需联合解释。

  - axis: "supply"
    feature_name: "PA_PG_mismatch"
    text: >
      在 supply 轴中，PA_PG_mismatch 为反向证据而非瓶颈 readout。
      升高更符合 transport 问题，因此设 bottleneck_sign = -1、weight = 0.3。
      用于下调 supply primary 的置信度，而非支持供应改善。

  - axis: "supply"
    feature_name: "MLCL_CL_ratio"
    text: >
      MLCL_CL_ratio 升高典型对应重塑受阻，与 supply 无直接因果关系。
      因此作为反向指标设 bottleneck_sign = -1、weight = 0.3。
      仅在重塑信号显著时用于弱化 supply 解释。

  - axis: "supply"
    feature_name: "oxCL_CL_ratio"
    text: >
      oxCL_CL_ratio 升高更符合氧化主导，而非供应不足。
      因此作为反向证据设 bottleneck_sign = -1、weight = 0.3。
      用于调整排序，而非否定 supply 轴异常。

  # =========================
  # Membrane context axis
  # =========================
  - axis: "membrane_context"
    feature_name: "mito_lipid_mass"
    text: >
      mito_lipid_mass（sum(PC+PE+CL)）近似线粒体膜容量 proxy。
      升高提示膜面积增加与 CL niche 扩展，因此 bottleneck_sign = -1、weight = 1。
      为结果轴 readout，不用于区分具体原发机制。

  - axis: "membrane_context"
    feature_name: "CL_fraction"
    text: >
      CL_fraction 量化 CL 在膜中的相对占比，反映 cristae 与 CL niche 完整性。
      升高对应结构性可用性改善，因此 bottleneck_sign = -1、weight = 1。
      下降方向（z 为负）提示“CL 可用性瓶颈”而非特定通路障碍。

  # =========================
  # Remodeling axis
  # =========================
  - axis: "remodeling"
    feature_name: "MLCL_CL_ratio"
    text: >
      MLCL_CL_ratio 升高是重塑轴最经典瓶颈表型，反映 MLCL → CL 转换不足。
      因此设 bottleneck_sign = +1、weight = 1，为重塑轴核心 readout。
      是 Fig6B 判断重塑轴受损的主要依据。

  - axis: "remodeling"
    feature_name: "sum_MLCL"
    text: >
      sum_MLCL 升高代表未完成重塑的中间体堆积，是重塑轴辅助 readout。
      设 bottleneck_sign = +1、weight = 0.5，与 MLCL_CL_ratio 联用增强稳定性。
      在 MLCL_CL_ratio 已升高前提下提供额外支持。

  - axis: "remodeling"
    feature_name: "CL_PG_ratio"
    text: >
      CL_PG_ratio 下降更符合合成瓶颈，因此在重塑轴中作为反向指标。
      使用 bottleneck_sign = +1、weight = 0.3，使下降方向产生负贡献。
      用于弱化“重塑 primary”而非支持重塑改善。

  - axis: "remodeling"
    feature_name: "oxCL_CL_ratio"
    text: >
      oxCL_CL_ratio 升高更符合氧化轴主导，因此在重塑轴中为反向证据。
      设 bottleneck_sign = -1、weight = 0.3，仅用于降低重塑 primary 的概率。
      不用于排除重塑贡献，而是优化多轴排序。
      
  # =========================
  # Key genes for each axis
  # =========================

  - axis: "synthesis"
    feature_name: "Pgs1"
    text: >
      Pgs1 是 PG 合成起始酶，催化 CDP-DAG → PGP，是 CL 合成链路的入口。
      转录下降可直接限制 PG 与 CL 生成，被视为合成轴最核心的执行层证据。
      在 CL_PG_ratio 降低同时下调时，显著增强合成轴 primary 的可能性。

  - axis: "synthesis"
    feature_name: "Crls1"
    text: >
      Crls1 催化 PG → CL，是 CL 合成的关键硬节点。
      表达下降对应 CL_PG_ratio 明显下降，是判定合成轴受阻的最直接转录证据。
      与 Pgs1 联合下调时，可基本确认 PG→CL 转换瓶颈。

  - axis: "synthesis"
    feature_name: "Cds1"
    text: >
      Cds1 将 PA → CDP-DAG，是进入 PG/CL 合成链的上游关键步骤。
      在 sum_PA 正常而 Cds1 下调时，提示前体无法进入合成通路。
      属路径近邻执行层，用于增强合成轴转录信号的稳定性。

  - axis: "synthesis"
    feature_name: "Tam41"
    text: >
      Tam41 是线粒体内膜定位的 CDP-DAG 合成因子，维持 PG/CL 合成底物流入。
      下调在 CL_PG_ratio 降低背景下支持合成轴障碍，而非 supply 或 transport。
      可作为合成轴的扩展执行层证据，不单独用于 primary 判定。
  - axis: "remodeling"
    feature_name: "Taz"
    text: >
      Taz 催化 MLCL → CL 再酰化，是重塑轴唯一不可替代的核心酶。
      下调与 MLCL_CL_ratio 升高高度一致，是重塑轴最强转录证据。
      在 MLCL_CL_ratio 升高时共同异常，可直接指向重塑 primary。

  - axis: "remodeling"
    feature_name: "Lclat1"
    text: >
      Lclat1 参与 MLCL/DLCL 的再酰化，是 Taz 的功能性补充酶。
      下调支持 MLCL 累积由重塑不足驱动，而非氧化或合成障碍。
      用于增强重塑轴方向性，不单独定义瓶颈。

  - axis: "remodeling"
    feature_name: "Pla2g6"
    text: >
      Pla2g6 参与 CL/MLCL 脱酰，在重塑停滞时可放大 MLCL 生成。
      上调需结合 Taz/Lclat1 判断，否则可能反映氧化后脱酰。
      用作路径近邻执行层，提高重塑轴 RNA score 稳定性。

  - axis: "remodeling"
    feature_name: "Pnpla8"
    text: >
      Pnpla8 为线粒体定位脱酰酶，可影响 MLCL 生成速率。
      表达变化需依赖 MLCL_CL_ratio 联合解释，避免误读为氧化背景。
      属低权重扩展层，仅用于信号平滑而非独立判定。
  - axis: "oxidation"
    feature_name: "Alox15"
    text: >
      Alox15 可直接催化多不饱和磷脂过氧化，是 CL 氧化最明确驱动因子。
      上调与 oxCL_CL_ratio 升高一致时，可显著强化氧化轴的方向性。
      为氧化轴最典型执行层 gene，用于支持 primary 判断。

  - axis: "oxidation"
    feature_name: "Cybb"
    text: >
      Cybb（NOX2）在 OMM 产生 ROS，可导致次级 CL 氧化。
      上调在巨噬细胞背景尤其具有解释力，但需结合 oxCL_CL_ratio。
      属路径近邻执行层，提高氧化轴特异性支持。

  - axis: "oxidation"
    feature_name: "Cyp2e1"
    text: >
      Cyp2e1 可生成 ROS 并促进磷脂氧化，但轴特异性中等。
      上调仅在 oxCL_CL_ratio 升高时提供支持性证据。
      不单独用于 primary 判定，而用于增强趋势稳定性。

  - axis: "oxidation"
    feature_name: "Pla2g6"
    text: >
      在氧化轴中，Pla2g6 参与氧化 CL 的裂解释放。
      上调可能放大氧化损伤，但需结合 Alox15/Cybb 共同解释。
      属路径近邻层，不单独定义氧化 status。
  - axis: "transport"
    feature_name: "Prelid1"
    text: >
      Prelid1 将 PA 从膜间隙转运至内膜，是运输轴最直接执行节点。
      下调与 PA_PG_mismatch 升高一致时，强烈支持运输瓶颈。
      为 transport 轴核心基因之一，用于定位 PA→IMM 阶段障碍。

  - axis: "transport"
    feature_name: "Triap1"
    text: >
      Triap1 与 Prelid1 形成复合体共同完成 PA 转运。
      表达下降在 CL_PG_ratio 降低缺乏时更提示运输原发。
      属 transport 轴核心执行层，与 Prelid1 等价。

  - axis: "transport"
    feature_name: "Stard7"
    text: >
      Stard7 输送 PC 至线粒体，影响膜背景与 CL niche 稳定。
      上调不表示运输瓶颈改善，仅在 Prelid1/Triap1 缺失下辅助解释。
      属扩展层 gene，提高轴内信号覆盖度而非决定方向。
  - axis: "supply"
    feature_name: "Acly"
    text: >
      Acly 生成 acetyl-CoA，是 de novo FA 合成的关键碳源接口。
      下调在 sum_PA 降低时支持 supply 原发，而非合成或运输受阻。
      为 supply 轴核心执行层，用于定义前体供给能力。

  - axis: "supply"
    feature_name: "Acaca"
    text: >
      Acaca 催化 acetyl-CoA → malonyl-CoA，是 FA 合成限速步骤。
      下调提示前体无法进入 PA 生成链路，与 sum_PA 下降一致时支持 supply。
      属核心执行层 gene，用于判断前体不足型瓶颈。

  - axis: "supply"
    feature_name: "Fasn"
    text: >
      Fasn 负责 FA 骨架生成，是所有甘油磷脂前体的直接来源。
      下降在 sum_PA 同向降低时支持 supply 轴受限。
      属核心执行层，与 lipid supply readout 机制一致。

  - axis: "supply"
    feature_name: "Gpam"
    text: >
      Gpam 催化 G3P → LPA，是进入 PA 路径的关键入口。
      下调在 CL_PG_ratio 正常但 sum_PA 降低时提示 supply 原发。
      属核心执行层，用于定位 glycerol backbone 起始瓶颈。

  - axis: "supply"
    feature_name: "Agpat1"
    text: >
      Agpat1 催化 LPA → PA，是 PA 生成的关键步骤之一。
      下调可降低 PA 池，与 PG_PA_ratio 同向变化时支持 supply。
      属 supply 轴核心执行层，用于增强定位精度。

  - axis: "supply"
    feature_name: "Acacb"
    text: >
      Acacb 调节 FA 合成与氧化平衡，对 PA 供应起辅助作用。
      作为扩展层用于稳定 RNA score，不单独用于 primary 判定。

  - axis: "supply"
    feature_name: "Agpat2"
    text: >
      Agpat2 为 LPA → PA 的家族成员，组织特异性较强。
      上下调需结合 sum_PA 才有解释意义，属扩展层基因。

  - axis: "supply"
    feature_name: "Gpat2"
    text: >
      Gpat2 参与 G3P → LPA，贡献度依组织背景不同。
      用于扩大 gene set 稳定性，而非独立方向证据。

  - axis: "supply"
    feature_name: "Gpat3"
    text: >
      Gpat3 属非线粒体 dominant GPAT，轴特异性较弱。
      仅用于平滑信息，不用于 primary 判断。

  - axis: "supply"
    feature_name: "Gpat4"
    text: >
      Gpat4 可参与 glycerolipid 起始步骤，对 PA 池有背景性贡献。
      作为扩展层基因使用，避免过度解释。

  - axis: "supply"
    feature_name: "Tfam"
    text: >
      Tfam 维持 mtDNA 复制与线粒体容量，影响可容纳 CL 的膜面积。
      下调在 mito_lipid_mass 降低时支持 supply 相关容量限制。
      属扩展层 gene，用于补充结构性 supply 信息。

  - axis: "supply"
    feature_name: "Polg"
    text: >
      Polg 参与 mtDNA 复制，对长期线粒体容量有贡献。
      仅作为低权重扩展，不用于短期瓶颈判定。

  - axis: "supply"
    feature_name: "Tomm20"
    text: >
      Tomm20 是线粒体量 marker，与膜面积高度相关。
      下调在 sum_PA 正常时不指向 supply 原发，需联合解释。
      用于稳定 gene set，而非决定方向。
  - axis: "membrane_context"
    feature_name: "Opa1"
    text: >
      Opa1 维持 cristae junction，是 CL 富集 microdomain 的结构核心。
      下调在 CL_fraction 下降时支持膜环境轴受损，而非 supply 或合成。
      为膜环境轴最核心执行层基因。

  - axis: "membrane_context"
    feature_name: "Immt"
    text: >
      Immt（MIC60）是 MICOS 架构核心，决定 cristae 组织与 CL niche 稳定。
      下调可导致 CL 定位异常，与 Opa1 联用增强膜环境轴判读。
      属核心执行层，用于定义该轴本体。

  - axis: "membrane_context"
    feature_name: "Chchd3"
    text: >
      Chchd3（MIC19）参与 MICOS 稳定，支持 cristae 结构。
      用于扩展膜环境轴 gene set，提高 RNA score 稳定性。
      不单独作为 primary 证据。

  - axis: "membrane_context"
    feature_name: "Chchd2"
    text: >
      Chchd2 为 MICOS 相关因子，影响 cristae 维持与 OXPHOS 状态。
      作为扩展层基因，仅在 Opa1/Immt 异常时辅助解释。

  - axis: "membrane_context"
    feature_name: "Atp5mc1"
    text: >
      Atp5mc1 参与 ATP 合酶装配与二聚体形成，依赖 CL 稳定 cristae 曲率。
      上调提示成熟 cristae 需求增加，用于补充膜环境轴功能 readout。

  - axis: "membrane_context"
    feature_name: "Cox4i1"
    text: >
      Cox4i1 代表 CL 依赖的呼吸复合体负荷，属功能性扩展 readout。
      需结合结构性指标解释，不用于 primary 判定。

  - axis: "membrane_context"
    feature_name: "Oma1"
    text: >
      Oma1 剪切 OPA1，可在应激下破坏 cristae 结构。
      升高不排除膜环境异常，而是提示调控层恶化，仅作低权重提示信号。
