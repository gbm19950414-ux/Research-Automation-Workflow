# ============================================================
# schema.yaml v2  ——  单个 panel 的结构化写作模版
# 目标：让 AI 在几乎不需要补充信息的前提下，生成：
#   - 结果段（Results）
#   - 简短讨论/过渡段（Mini Discussion / Transition）
#   - Methods 中本实验的“差异性信息”
# ============================================================

# ---------- 0. Meta & Assets：基本信息 ----------
meta:
  figure: "Figure 1"              # 如 "Figure 3"

  figure_id: "1c"
  experiment_id: "figure_2_d"
  short_title: "EphB1 缺失在多感受器第二信号触发下均降低 IL-1β 释放"         # 1 句以内，本 panel 做了什么（如："EphB1 缺失抑制 NLRP3 介导的 IL-1β 释放"）
  hypothesis: Ephb1调控炎症小体激活的共同下游通路
  claim: "在 LPS 预激后，无论通过 NLRP3（Nigericin）、NLRC4（胞质递送 Flagellin）还是 AIM2（胞质递送 poly(dA:dT)）通路触发第二信号，Ephb1 pb/pb 原代腹腔巨噬细胞的 IL-1β 释放均显著低于 WT，提示该表型并非 Nigericin 特异，而更可能涉及炎症小体下游的共同执行步骤。"
  evidence_level: positioning
  causal_strength: suggestive
  scope: "C57BL/6 WT 与 Ephb1 pb/pb 小鼠原代腹腔巨噬细胞；LPS 预激 4 h 后分别给予 Nigericin（10 μM, 60 min）、flagellin/LFn 胞质递送（0.5 μg/mL, 2 h）或 poly(dA:dT) 胞质递送（0.1 μg/mL, 8 h）；检测上清 IL-1β（ELISA，双背景扣除并按 MTT 细胞数标准化）。"
  alt_explanations: "仍不能排除 Ephb1 缺失影响 LPS 预激/前体 IL-1β 产生、整体细胞应激与存活、或对胞质递送效率（Flagellin、poly(dA:dT)）的间接影响；此外，不同通路刺激强度与时间窗差异也可能影响绝对释放量与效应量的可比性。"

# ---------- 1. Scientific Question：本节要回答什么 ----------
question:
  context_from_previous: "我们已经进行了炎症表型的遗传筛选，结果显示在nigericin刺激下，EphB1具有显著的IL-1β释放水平下降"  # 与上一节的衔接（1 句）：上一节发现/提出了什么问题？
                             # 例如：“前一节结果提示 EphB1 缺失可能限制 NLRP3 炎性小体的完全激活。”
  core_question: "EphB1 缺失是否广泛影响炎症小体导致的IL-1B释放水平下降，而不是影响nigericin刺激特异性事件？"          # 本 panel 的核心科学问题（1 句，用“是否”、“如何”、“在多大程度上”等）
                             # 例如：“本节检验 EphB1 缺失是否降低 NLRP3 激活后 IL-1β 的分泌水平。”
  hypothesis_or_expectation: "若 EphB1 在炎症小体执行阶段发挥作用，则其缺失应导致多种第二信号通路下 IL-1β 释放下降。"  # 你的假设或预期结果（1 句）
                             # 例如：“如果 EphB1 促进 NLRP3 炎性小体的效应端活性，则 EphB1 缺失应降低 IL-1β 的释放。”
  importance_reason: "通过跨感受器检测可以判断 EphB1 作用是否为通路特异性，或定位于炎症小体下游的共同执行步骤。"      # 为什么这个问题重要/值得单列一节（1 句即可）
                             # 例如：“IL-1β 是 NLRP3 炎性小体的关键功能 readout，用于评估效应端活性。”

# ---------- 2. Rationale / Design Logic：为什么这样设计 ----------
rationale:
  model_and_system: "使用 WT 与 Ephb1 pb/pb 原代腹腔巨噬细胞，因其对各类炎症小体第二信号均具备典型反应特性。"       # 使用的模型/系统 + 选择理由
                             # 例如：“选用原代腹腔巨噬细胞，因为其对 NLRP3 激活高度敏感，且能反映体内炎症状态。”
  key_variables: "操纵基因型（WT vs Ephb1 pb/pb）并分别给予三类炎症小体激活剂：nigericin（NLRP3 通路）、flagellin 胞质递送（NLRC4 通路）、poly(dA:dT）胞质递送（AIM2 通路）。"          # 本实验关注的关键变量 + 操纵方式
                             # 例如：“操纵基因型（WT vs Ephb1 pb/pb）和刺激条件（LPS 预处理 + ATP/Nigericin 激活）。”
  control_logic: "通过在不同感受器通路下比较 IL-1β 释放，判断差异是否为感受器特异性。WT 为阴阳性对照。control组为lps刺激后未使用任何激活剂的组，为阴性对照。"          # 对照设置背后的逻辑（为什么这些对照足以回答问题）
                             # 例如：“未刺激组用于定义基线 IL-1β 水平，WT 作为 Ephb1 pb/pb 的参照组。”
  core_justification: "若 EphB1 缺失在所有感受器通路中均降低焦亡，则说明其作用点位于执行端的共同步骤。"     # 最关键的一句“设计理由”（可直接当自动摘要用）
                             # 例如：“如果 EphB1 促进炎性小体效应端活性，则 Ephb1 pb/pb 细胞在相同刺激下应释放更少 IL-1β。”

# ---------- 3. Methods（差异性信息）：只写本 panel 特有的 ----------
methods:
  inherits_from_protocol: "default_peritoneal_macrophage_NLRP3_activation"   # 引用全章或整篇论文的通用 protocol 名称，如 "default_peritoneal_macrophage_NLRP3_activation"
                               # 之后可在 Methods 总节详细描述该 protocol。
  biological_material: "6–12 周龄 C57BL/6 WT 与 Ephb1 pb/pb 小鼠原代腹腔巨噬细胞。"      # 使用的生物材料/模型：动物/原代/细胞系 + 关键信息
                               # 例如：“8–12 周龄雄性 C57BL/6 WT 与 Ephb1 pb/pb 小鼠来源的原代腹腔巨噬细胞。”
  experimental_groups: "WT vs Ephb1 pb/pb；分别接受 nigericin、flagellin 胞质递送、poly(dA:dT) 胞质递送。"      # 组别及核心差异：基因型、处理、时间点
                               # 例如：“按基因型分为 WT 和 Ephb1 pb/pb，均接受 LPS 预处理 + ATP 激活。”
  stimuli_and_treatment: "LPS 预激 4 h 后，分别用 nigericin（10 μM, 60 min）、flagellin/LFn 递送体系（0.5 μg/mL，2h）、或 poly(dA:dT)（0.1 μg/mL, 8h）激活各通路。"    # 刺激/药物/处理的关键信息（种类 + 浓度 + 时间）
                               # 例如：“LPS 100 ng/mL 预处理 4 h，随后 ATP 5 mM 处理 30 min。”
  time_points: "所有第二信号处理均在 LPS 4 h 后进行，处理激活剂对应时间后采集上清用于 IL-1β ELISA。"              # 关键测定时间点（如果不在上面已写清）
  dose_info: "无剂量梯度，使用标准激活剂浓度。"                # 若有剂量梯度，在此简要说明（如 “Alexidine 0, 1, 5, 10 μM”）
  readout_and_assay: "IL-1β ELISA；信号经空白孔与 480 nm 背景双重扣除，并根据 MTT 结果对细胞数量进行标准化矫正。"        # 读出方式（ELISA/WB/IF/plate reader）及关键差异信息
                               # 例如：“使用 IL-1β ELISA 测定上清中 IL-1β，按厂商说明书操作。”
  replicates: "每组 n ≥ 3，数据来自 ≥3 次独立实验。"               # 生物学重复数 n，以及是否合并多次实验
                               # 例如：“每组 n = 4 生物学重复，结果合并自两次独立实验。”
  analysis_notes: "采用非配对双尾 t 检验统计显著性；ELISA 信号经背景扣除与 MTT 修正。"           # 本 panel 特有的分析方法/统计模型（如 normalization、配对 vs 非配对）
                               # 例如：“采用非配对双尾 t 检验；ELISA 结果按蛋白浓度归一化。”
  minimal_methods_summary: "WT 与 Ephb1 pb/pb 原代巨噬细胞 LPS 预激后分别给予 nigericin、flagellin 或 poly(dA:dT) 激活不同炎症小体通路，通过 IL-1β ELISA（含背景扣除与 MTT 标准化）比较组间差异。"

# ---------- 4. Results：把图变成结构化文字 ----------
results:
  data_direction: "Ephb1 pb/pb 巨噬细胞在 NLRP3、NLRC4 与 AIM2 三条炎症小体通路下的 IL-1β 释放均显著下降。"           # 纯“趋势描述”，不解释机制（↑/↓/无变化 + 相对谁）
                               # 例如：“在 LPS+ATP 刺激下，Ephb1 pb/pb 巨噬细胞释放的 IL-1β 显著低于 WT。”
  stats_summary: "nigericin: ↓40% (Δ = −45.4 pg/mL, p = 0.0097)；flagellin: ↓21% (Δ = −48.4 pg/mL, p = 0.023)；poly(dA:dT): ↓49% (Δ = −119.2 pg/mL, p = 3.4×10⁻⁴)。"            # 统计显著性信息（检验方法、p 值区间即可）
                               # 例如：“非配对 t 检验，p < 0.01。”
  key_numbers: "Ephb1 pb/pb 巨噬细胞在三类第二信号刺激下的 IL-1β 释放分别下降约 21%（flagellin）、40%（nigericin）和 49%（poly(dA:dT)），差异在各条件下均具有统计学显著性。"             # 可选：fold change、均值±SEM、效应量（方便你之后查）
                               # 例如：“WT: 850 ± 120 pg/mL；Ephb1 pb/pb: 410 ± 90 pg/mL；约下降 50%。”
  group_difference_statement: "无论激活 NLRP3、NLRC4 或 AIM2，EphB1 pb/pb 细胞的 IL-1β 释放均显著低于 WT。" # 用一两句把组间差异说清楚（可直接作为结果段主句）
                                 # 例如：“与 WT 相比，Ephb1 pb/pb 巨噬细胞在相同刺激强度下产生的 IL-1β 减少。”
  robustness_and_qc: "结果在 ≥3 次独立实验中一致；ELISA 信号经双背景扣除与 MTT 校正后仍保持稳固趋势。"        # 是否在多批次实验中重复、是否排除了明显 outlier 等
                               # 例如：“该趋势在两批独立实验中均一致，排除 1 个基于预设准则的 outlier 后结果不变。”
  anomalies_or_limits: "未观察到单一感受器通路中特殊的逆转或偏离。"      # 若有“怪点/边缘显著/批间差异”，在此简短记录（便于 Discussion）
                               # 例如：“一批实验中 WT 绝对值略低，可能与细胞密度偏低有关。”

# ---------- 5. Interpretation & Role in Chapter：怎么理解 + 在整章中的作用 ----------
interpretation:
  minimal_bio_interpretation: "EphB1 缺失在多种炎症小体第二信号刺激下均降低 IL-1β 分泌，提示其调控位点位于执行端的共同步骤。" # 在不过度拔高的前提下，用 1–2 句解释结果“生物学含义”
                                 # 例如：“这些结果提示 EphB1 对 NLRP3 介导的 IL-1β 释放是促进性的。”
  alternative_explanations: "不能排除 EphB1 影响膜脂微环境、GSDMD 打孔效率、ASC 聚集或 caspase-1 激活的可能。"   # 可能的其他解释/局限（方便之后写 Discussion）
                                 # 例如：“不能排除 EphB1 缺失影响前炎性细胞因子转录的可能。”
  summary_type: "supportive, elimination"               # 从下列类型中选一个或多个，用逗号分隔：
                                 #   "supportive"   支持前一节/主假设
                                 #   "descriptive"  纯描述现象
                                 #   "elimination"  排除某种机制或可能性
                                 #   "negative"     未见显著差异/阴性结果
                                 #   "exploratory"  探索性发现
                                 # 例如："supportive"
  claim_supported: "EphB1 的作用不是感受器特异性的，而是影响炎症小体执行端的共有机制。"            # 本 panel 主要想支持/反驳的“文字命题”
                                 # 例如：“EphB1 是 NLRP3 炎性小体效应端活性的正调控因子。”
  link_to_previous: "在确认ephb1缺失后具有il1b释放水平降低表型后，本节进一步证明该差异来自炎症小体激活执行阶段。"           # 承接上一节的句子（1 句）：上一节结果如何被本节进一步验证/延伸/修正？
                                 # 例如：“在观察到 EphB1 缺失缓解线粒体损伤后，我们进一步评估其对下游 IL-1β 释放的影响。”
  transition_to_next: "下一节将直接检测 ASC speck、caspase-1 p20、GSDMD-NT 与成熟 IL-1β p17，以定位差异所在的具体执行环节。"         # 引出下一节（1 句）：下一步要看什么/为什么自然过渡到下一节？
                                 # 例如：“为了明确这种效应是否依赖于线粒体 ROS，我们随后检测了 NLRP3 激活过程中 mtROS 的变化。”

# ---------- 6. AI Writing Hints（可选）：给 LLM 的写作风格提示 ----------# ---------- 6. figure_legend ----------

# ---------- 6. figure_legend（每个 panel 一份：用于最终拼接 Figure Legends） ----------
# 设计原则：
# - 这是“投稿层”信息（允许事实：系统/条件/n/统计/归一化），但不写讨论式推理。
# - 每个 panel 只写“这个 panel 自己需要的 legend 信息”。
# - 脚本在 figure 层汇总时：
#     - Figure title 由 figure-level yaml 提供（若你之后有）；
#     - Panel legend 由这里提供并按 (a)(b)(c) 顺序拼接。
figure_legend:
  panel: "c"
  panel_title_en: "Cross-pathway inflammasome activation"
  panel_title_cn: "跨通路炎症小体激活"

  one_sentence_en: >
    IL-1β release from primary peritoneal macrophages following activation of distinct inflammasome pathways via different secondary stimuli.

  system_and_design:
    model: "Primary murine peritoneal macrophages"
    genotype_or_groups: "WT versus Ephb1 pb/pb (PB−/−)"
    key_treatments: >
      LPS priming followed by nigericin (NLRP3),
      cytosolic flagellin delivery (NLRC4),
      or cytosolic poly(dA:dT) delivery (AIM2)
    time_window: "Supernatants collected after the indicated secondary stimulation periods"

  readouts_and_assays:
    primary_readout: "IL-1β release in culture supernatants"
    assay: "ELISA"
    normalization: >
      ELISA signals were background-subtracted (blank wells and 480 nm)
      and normalized to cell number based on MTT measurements

  stats:
    n_definition: "n indicates biologically independent samples"
    n: "n ≥ 3 per group; results reproduced in ≥3 independent experiments"
    summary: "mean ± SEM"
    test: "two-tailed unpaired t-test"
    multiple_comparisons: "none"

  significance:
    symbols: "* P < 0.05, ** P < 0.01, *** P < 0.001; ns, not significant"

  extra_notes: ""

# ---------- 7. AI Writing Hints（可选）：给 LLM 的写作风格提示 ----------
ai_hints:
  target_section: ["Results", "Discussion_mini", "Methods_diff"] 
    # 你希望从这个 schema 主要生成哪些部分的正文？
    # 可选值： "Results" / "Discussion_mini" / "Methods_diff"
  tone: "neutral"     
    # 写作语气： "neutral"（默认科研语气）/ "cautious"（更谨慎）/ "confident"（偏肯定）
  target_journal_style: "" 
    # 若有心仪期刊的写作风格，可以在此填入名称，仅作为“风格参考”
    # 例如："Cell Metabolism", "Nature Immunology"
  language: "zh_en_mix"
    # 你希望生成何种语言： "zh"（中文）/ "en"（英文）/ "zh_en_mix"（中英混排方便你润色）

    # ---------- 8. English ----------

results_skeleton_en:
  stage: T3
  purpose: "panel-level Results skeleton (pre-reduction, bilingual)"
  panel_level: results
  results_logic_type: perturbation_response
  modules:
    M1_motivation:
      en: "Having identified Ephb1 as a candidate strain with reduced IL-1β output upon Nigericin stimulation, we next asked whether this phenotype generalizes across distinct inflammasome receptor pathways rather than reflecting a Nigericin-specific effect."
      cn: "在观察到 Ephb1 pb/pb 细胞在 Nigericin 刺激下 IL-1β 释放降低后，我们进一步检验该表型是否可推广至不同炎症小体感受器通路，而非 Nigericin 特异性效应。"
      logic_source: "question.context_from_previous + question.core_question"

    M2_level_definition:
      en: "WT and Ephb1 pb/pb primary peritoneal macrophages were LPS-primed and then activated via NLRP3 (Nigericin), NLRC4 (cytosolic flagellin delivery), or AIM2 (cytosolic poly(dA:dT) delivery), and IL-1β release was quantified by ELISA with background subtraction and MTT-based normalization."
      cn: "采用 WT 与 Ephb1 pb/pb 原代腹腔巨噬细胞经 LPS 预激后分别通过 NLRP3（Nigericin）、NLRC4（胞质递送 flagellin）或 AIM2（胞质递送 poly(dA:dT)）激活通路，并以 IL-1β ELISA（含背景扣除与 MTT 标准化）量化释放水平。"
      logic_source: "methods.readout_and_assay + question.core_question"

    M3_directional_result:
      en: "Across all three activation routes, Ephb1 pb/pb macrophages released significantly less IL-1β than WT controls."
      cn: "在三种通路的第二信号激活条件下，Ephb1 pb/pb 巨噬细胞的 IL-1β 释放均显著低于 WT 对照。"
      logic_source: "results.data_direction"

    M4_robustness:
      en: "The reduction was statistically significant for each stimulus and remained consistent across independent experiments after dual background correction and cell-number normalization."
      cn: "该下降在各刺激条件下均达到统计学显著性，并在经双背景扣除与细胞数标准化后于多次独立实验中保持一致。"
      logic_source: "results.robustness_and_qc + results.stats_summary"

    M5_panel_conclusion:
      en: "These data indicate that the diminished IL-1β output in Ephb1 pb/pb macrophages is not restricted to a single receptor pathway, supporting a role for EphB1 in receptor downstream pathway."
      cn: "综上，Ephb1 pb/pb 细胞 IL-1β 输出受限并非局限于单一感受器通路，支持 EphB1 作用于炎症小体下游的共同执行过程。"
      logic_source: "results.group_difference_statement"