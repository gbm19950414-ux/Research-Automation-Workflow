# ============================================================
# schema.yaml v2  ——  单个 panel 的结构化写作模版
# 目标：让 AI 在几乎不需要补充信息的前提下，生成：
#   - 结果段（Results）
#   - 简短讨论/过渡段（Mini Discussion / Transition）
#   - Methods 中本实验的“差异性信息”
# ============================================================

meta:
  figure: "Figure 1"              # 如 "Figure 3"

  figure_id: "s1b"
  short_title: "NLRP3 激活条件下炎症输出与裂解产物的补充分析"
  chapter: "3.1 EphB1 缺失降低炎症小体诱导的巨噬细胞焦亡与 IL‑1β 释放"
  experiment_id: "figure_1_c"
  version: 1

assets:
  main_figure_file: "figures/F1/F1C_IL1b_WB.pdf"
  raw_data_files:
    - "data/IL1b_ELISA_raw.xlsx"
    - "data/WB_GSDMD_p20_IL1b_raw.tif"
  stats_files:
    - "stats/F1C_IL1b_stats.csv"
  analysis_scripts:
    - "scripts/figure_1_c_IL1b_ELISA_analysis.R"
    - "scripts/figure_1_c_WB_quantification.py"
  supplementary_items:
    - "Figure S1C"
    - "Table S1C"

question:
  context_from_previous: >
    Figure 1 主文中已基于 LDH 外排读出建立 EphB1 缺失与炎症小体依赖性焦亡输出减弱之间的关联，
    因此有必要进一步评估该表型是否在其他执行端相关 readout 中保持一致。
  core_question: >
    EphB1 缺失是否在 NLRP3 激活条件下抑制焦亡相关内容物（IL‑1β、caspase‑1 p20、GSDMD‑NT）的释放？
  hypothesis_or_expectation: >
    如果 EphB1 促进焦亡执行端活性，则其缺失应导致 IL‑1β 及相关裂解产物的胞外释放减少。
  importance_reason: >
    IL‑1β 的成熟和释放是炎症小体效应端活性的核心 readout，是判定焦亡执行效率的重要指标。

rationale:
  model_and_system: >
    采用 WT 与 EphB1 PB−/− 小鼠原代腹腔巨噬细胞，可准确反映体内 NLRP3 激活后的 IL‑1β 分泌能力。
  key_variables: >
    操纵基因型（WT vs KO），并在一致的 priming + 激活条件下比较 IL‑1β / GSDMD‑NT / casp‑1 p20 的变化。
  control_logic: >
    使用空白孔信号与 480 nm 背景进行双重扣除，并以 MTT 校正细胞数量，确保差异来自分泌能力本身而非细胞密度差异。
  core_justification: >
    若 EphB1 缺失抑制焦亡执行端，则 IL‑1β 及其上游裂解产物（GSDMD‑NT、casp‑1 p20）应同步降低。

methods:
  inherits_from_protocol: "default_peritoneal_macrophage_NLRP3_activation"
  biological_material: >
    8–12 周龄 C57BL/6 背景 WT 与 EphB1 PB−/− 小鼠原代腹腔巨噬细胞，贴壁后统一密度处理。
  experimental_groups: >
    两组：WT 与 KO。均经 LPS 100 ng/mL 预处理 4 h；随后加入 nigericin 处理 1 h 激活 NLRP3。
  stimuli_and_treatment: >
    LPS 100 ng/mL 预处理 4 h；nigericin 10 µM 处理 1 h（ELISA 与 WB 均使用此条件）。
  time_points: >
    激活时间为 1 h；无时间梯度。
  dose_info: >
    IL‑1β ELISA 使用 10 µg/mL 与 20 µg/mL 标准曲线区间进行比对，结果均稳定。
  readout_and_assay: >
    上清用于 IL‑1β ELISA；全细胞裂解与上清蛋白用于 WB（GSDMD‑NT、casp‑1 p20、IL‑1β）。ELISA 信号进行双重背景扣除并按 MTT 结果归一化。
  replicates: >
    每组 n ≥ 3，所有数据均来自 ≥3 次独立实验。
  analysis_notes: >
    WT vs KO 使用双尾 t 检验。WB 灰度归一化至 GAPDH；ELISA 校正细胞当量后进行比较。
  minimal_methods_summary: >
    WT/KO 原代巨噬细胞经 LPS 预处理与 nigericin 激活后，测定上清 IL‑1β（ELISA）与裂解/上清中的 GSDMD‑NT、casp‑1 p20、IL‑1β（WB），结果经背景扣除与细胞数量校正。

results:
  data_direction: >
    EphB1 缺失显著降低 NLRP3 激活后上清中的 IL‑1β 水平，并同步降低 GSDMD‑NT、casp‑1 p20、成熟 IL‑1β 的 WB 信号。
  stats_summary: >
    IL‑1β ELISA：10 µg/mL 条件下降约 32.5%，p=0.0004；20 µg/mL 条件下降约 35.2%，p=0.0008。WB 中 GSDMD‑NT、casp‑1 p20、IL‑1β 条带均呈 KO < WT 的显著趋势。
  key_numbers: >
    ELISA（1 h）——WT → KO：  
    • 10 µg/mL：下降 32.5%，p=0.0004  
    • 20 µg/mL：下降 35.2%，p=0.0008  
    WB：GSDMD‑NT、casp‑1 p20、IL‑1β 全部同步下降（定量比值 WT≈1.0 → KO≈0.55–0.70）。
  group_difference_statement: >
    与 WT 相比，KO 巨噬细胞在相同 NLRP3 激活条件下显著减少 IL‑1β 释放，并在 WB 中体现为 GSDMD‑NT、casp‑1 p20、IL‑1β 的一致性降低。
  robustness_and_qc: >
    结果在 ≥3 次独立实验中重复；ELISA 采用双重背景扣除与 MTT 校正确保差异不受细胞密度影响。
  anomalies_or_limits: >
    IL‑1β 绝对值随批次略有波动，但 KO 显著下降的趋势在所有批次均保持一致。

interpretation:
  minimal_bio_interpretation: >
    EphB1 缺失削弱 NLRP3 炎症小体效应端活性，从而降低 IL‑1β 成熟并限制其跨膜释放。
  alternative_explanations: >
    虽然 IL‑1β 减少通常反映效应端削弱，但不能完全排除膜脂重塑或膜孔稳定性差异对其外排路径的影响。
  summary_type: "supportive,descriptive"
  claim_supported: >
    本补充结果支持主文中基于 LDH 外排建立的表型，即 EphB1 缺失所对应的变化
    同样体现在多种炎症小体执行端相关 readout 中。
  link_to_previous: >
    在观察到 KO 的 LDH 外排下降后，本节进一步表明焦亡相关内容物（IL‑1β、casp‑1 p20、GSDMD‑NT）也同步减少。
  transition_to_next: >
    相关机制层面的分析已在主文后续章节中展开讨论。

ai_hints:
  target_section: ["Results", "Discussion_mini", "Methods_diff"]
  tone: "neutral"
  target_journal_style: ""
  language: "zh_en_mix"


figure_legend:
  panel: "b"
  panel_title_en: "Execution-associated cleavage products under NLRP3 activation"
  panel_title_cn: "NLRP3 激活条件下的执行端裂解产物"

  one_sentence_en: >
    IL-1β release and the presence of inflammasome execution-associated cleavage products in WT and EphB1-deficient primary peritoneal macrophages following NLRP3 activation.

  system_and_design:
    model: "Primary murine peritoneal macrophages"
    genotype_or_groups: "WT versus EphB1 PB−/− (KO)"
    key_treatments: "LPS priming (100 ng/mL, 4 h) followed by nigericin stimulation (10 μM, 1 h)"
    time_window: "Supernatants and cell lysates collected after 1 h of NLRP3 activation"

  readouts_and_assays:
    primary_readout: >
      IL-1β release in culture supernatants and the abundance of GSDMD-NT,
      caspase-1 p20, and mature IL-1β
    assay: "ELISA for IL-1β; immunoblotting for GSDMD-NT, caspase-1 p20, and IL-1β"
    normalization: >
      ELISA signals were background-subtracted and normalized to cell number based on MTT measurements;
      immunoblot band intensities were normalized to GAPDH

  stats:
    n_definition: "n indicates biologically independent samples"
    n: "n ≥ 3 per group; results reproduced in ≥3 independent experiments"
    summary: "mean ± SEM"
    test: "two-tailed unpaired t-test"
    multiple_comparisons: "none"

  significance:
    symbols: "* P < 0.05, ** P < 0.01, *** P < 0.001; ns, not significant"

  extra_notes: ""

results_skeleton_en:
  stage: T3
  purpose: "panel-level Results skeleton (pre-reduction, bilingual)"
  panel_level: results
  results_logic_type: perturbation_response

  modules:
    M1_motivation:
      en: "Following the observation that EphB1 deficiency attenuates inflammasome-dependent pyroptotic lysis as measured by LDH release, we next examined whether this phenotype is reflected in additional execution-associated readouts under NLRP3 activation."
      cn: "在基于 LDH 外排观察到 EphB1 缺失削弱炎症小体依赖性焦亡后，我们进一步检验该表型是否同样体现在 NLRP3 激活条件下的其他执行端相关读出中。"
      logic_source: "question.context_from_previous + question.core_question"

    M2_level_definition:
      en: "WT and EphB1-deficient primary peritoneal macrophages were primed and activated via the NLRP3 inflammasome, and IL-1β release as well as the presence of execution-related cleavage products (GSDMD-NT and caspase-1 p20) were assessed by ELISA and immunoblotting."
      cn: "在 WT 与 EphB1 缺失原代腹腔巨噬细胞中诱导 NLRP3 炎症小体激活后，分别通过 ELISA 与免疫印迹检测 IL-1β 的释放以及执行端相关裂解产物（GSDMD-NT 与 caspase-1 p20）。"
      logic_source: "methods.readout_and_assay + question.core_question"

    M3_directional_result:
      en: "Upon NLRP3 activation, EphB1-deficient macrophages released significantly less IL-1β into the supernatant and exhibited concomitantly reduced levels of GSDMD-NT, caspase-1 p20, and mature IL-1β by immunoblot analysis."
      cn: "在 NLRP3 激活条件下，EphB1 缺失巨噬细胞上清中 IL-1β 释放显著降低，同时在免疫印迹中表现为 GSDMD-NT、caspase-1 p20 及成熟 IL-1β 水平均同步下降。"
      logic_source: "results.data_direction"

    M4_robustness:
      en: "These reductions were consistently observed across independent experiments and remained significant after background subtraction and normalization to cell number, indicating that the effect is not attributable to differences in cell density or assay variability."
      cn: "上述下降趋势在多次独立实验中均可重复，并在完成背景扣除与细胞数量归一化后仍保持显著性，提示该效应并非由细胞密度差异或检测波动所致。"
      logic_source: "results.robustness_and_qc + results.stats_summary"

    M5_panel_conclusion:
      en: "Together, these supplemental analyses demonstrate that EphB1 deficiency suppresses multiple NLRP3 inflammasome execution-associated outputs, extending the LDH-based phenotype to IL-1β release and its upstream cleavage events."
      cn: "综上，这些补充分析表明 EphB1 缺失可抑制多项 NLRP3 炎症小体执行端相关输出，将基于 LDH 的表型进一步扩展至 IL-1β 释放及其上游裂解事件。"
      logic_source: "results.group_difference_statement"