# figure_4_b_violin.yaml

title: "Figure 5a — NAO intensity violin plot"
out: "figure_5_a_violin"
out_dir: "06_figures/figure_5"

size:
  width_mm: 84
  high_mm: 60


layout:
  axis_outer_frac:
    left: 0.05
    right: 0.00
    bottom: 0.05
    top: 0.00
  axis_gap_pt:
    x_title_to_ticks: 5
    x_ticks_to_axis: 2
    y_title_to_ticks: 5
    y_ticks_to_axis: 2

panels:
  - id: "a"
    type: "violin"
    data: "04_data/interim/imaging_if/E36_statistic_IntDen_stats.xlsx"
    sheet: 2

    mapping:
      x: "group"
      x_interaction: ["treatment", "genotype"]
      x_sep: "_"
      "y": "IntDen"
      hue: "genotype"

    order: ["control_WT", "control_HO", "ephb1_fc(500ng/ml)+anti_fc_WT", "ephb1_fc(500ng/ml)+anti_fc_HO"]
    hue_order: ["WT", "HO"]

    rename_x:
      control_WT: "Control"
      control_HO: "Ctrl HO"
      ephb1_fc(500ng/ml)+anti_fc_WT: "EpHB1_FC"
      ephb1_fc(500ng/ml)+anti_fc_HO: "Trt HO"

    x_label: ""
    y_label: "NAO intensity after Ephb1_FC treated (IntDen)"

    strip: true

    stats:
      enabled: true
      source: "04_data/interim/imaging_if/E36_statistic_IntDen_stats.xlsx"
      sheet: 6
      column: "p_value"
      pairs:
        - ["control_WT", "control_HO"]
        - ["ephb1_fc(500ng/ml)+anti_fc_WT", "ephb1_fc(500ng/ml)+anti_fc_HO"]
      pair_groups: ["control", "ephb1_fc(500ng/ml)+anti_fc"]
      level: "cell"
      contrast: "WT_vs_HO"
    ylim: [0, null]


  - id: "b"
    type: "violin"
    data: "04_data/interim/imaging_if/E39_statistic_Mean_stats.xlsx"
    sheet: 2

    mapping:
      x: "group"
      x_interaction: ["treatment", "genotype"]
      x_sep: "_"
      "y": "Mean"
      hue: "genotype"

    order: ["control_WT", "bel(2µm)_WT"]
    hue_order: ["WT", "HO"]
    keep_hue: ["WT"]
    rename_x:
      control_WT: "Control"
      bel(2µm)_WT: "BEL"

    x_label: ""
    y_label: "NAO intensity after BEL treated (mean)"

    strip: true

    stats:
      enabled: true
      source: "04_data/interim/imaging_if/E39_statistic_Mean_stats.xlsx"
      sheet: "treatment_pair_stats"
      column: "p_value"
      pairs:
        - ["control_WT", "bel(2µm)_WT"]

      level: "cell"

    ylim: [50, 200]

  - id: "c"
    type: "violin"
    data: "04_data/interim/imaging_if/E39_statistic_Mean_stats.xlsx"
    sheet: 2

    mapping:
      x: "group"
      x_interaction: ["treatment", "genotype"]
      x_sep: "_"
      "y": "Mean"
      hue: "genotype"

    order: ["control_WT", "ad(2µm)_WT"]
    hue_order: ["WT", "HO"]
    keep_hue: ["WT"]

    rename_x:
      control_WT: "Control"
      ad(2µm)_WT: "AD"

    x_label: ""
    y_label: "NAO intensity after AD treated (Mean)"

    strip: true

    stats:
      enabled: true
      source: "04_data/interim/imaging_if/E39_statistic_Mean_stats.xlsx"
      sheet: "treatment_pair_stats"
      column: "p_value"
      pairs:
        - ["control_WT", "ad(2µm)_WT"]
      level: "cell"
    ylim: [50, 200]