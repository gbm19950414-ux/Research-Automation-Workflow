title: "PI3K假设"
out: "results/20260206_qPCR"

size:
  width_mm: 42
  high_mm: 60
constrained_layout: true

layout:
  axis_outer_frac:
    left: 0.05
    right: 0.00
    bottom: 0.05
    top: 0.00
  axis_gap_pt:
    x_title_to_ticks: 5
    x_ticks_to_axis: 2
    y_title_to_ticks: 5
    y_ticks_to_axis: 2

panels:
  # a: Il1b
  - id: 1
    type: box
    data: 
      - path: "04_data/interim/qpcr/ddct_analysis_001a+003a_split/64_20260206_qPCR_001a+003a_E62_Inpp4b_stats.xlsx"
        keep_x: ["ctrl"]
    sheet: "data"
    mapping:
      x: "treatment"
      "y": "fold_change"
      hue: "genetype"       # WT / HO

    # 只画 ctrl 与 lps，跳过 "-" 那些占位行
    order:
      - "ctrl"
    rename_x:
      "ctrl": "Control"
    hue_order: ["WT", "HO"]
    x_label: ""
    y_label: "PI3K capacity_Inpp4b mRNA expression (fold change)"
    x_tick_rotation: 0
    strip: true

    stats:
      enabled: true
      source:
        - path: "04_data/interim/qpcr/ddct_analysis_001a+003a_split/64_20260206_qPCR_001a+003a_E62_Inpp4b_stats.xlsx"
          keep_x: ["ctrl"]
      sheet: "pair_stats"
      column: p_value
      pairs: [["WT", "HO"]]
