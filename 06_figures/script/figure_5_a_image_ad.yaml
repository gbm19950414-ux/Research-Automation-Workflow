# figure_4_b_image.yaml
title: "Figure 4b — Representative NAO staining images"
out: "figure_5_a_image_ad"
out_dir: "06_figures/figure_5"

size:
  width_mm: 84
  high_mm: 60
constrained_layout: true

layout:
  axis_outer_frac:
    left: 0.05
    right: 0.00
    bottom: 0.05
    top: 0.00
  axis_gap_pt:
    x_title_to_ticks: 5
    x_ticks_to_axis: 2
    y_title_to_ticks: 5
    y_ticks_to_axis: 2

curve:
  enable: true
  type: sigmoid
  strength: 0.75   # 0..1, 越大曲线越“弯”
  mid: 0.5        # 0..1, 曲线拐点（类似把中灰往哪边推）

grid:
  n_rows: 2        # 例如：上行 WT，下行 HO（后面可以改）
  n_cols: 2        # 比如三种处理 / 部位

  image_size_mm:
    width: 35
    height: 35

  label_height_mm: 4   # 列标题那一行有多高
  gap_mm: 2

  # 行标题（左侧）
  row_labels:
    - "Control"
    - "AD"


  # 列标题（上方）
  col_labels:
    - "WT"
    - "HO"

  # 每个单元格的配置：
  # row / col 为 1-based 索引
  # images 是相对于 project_root 的路径
  # blend: "single" | "lighten"
