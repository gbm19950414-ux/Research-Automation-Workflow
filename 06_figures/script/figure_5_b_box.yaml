title: "EphB1 细胞因子il1b释放水平降低"
out: "figure_5_b"
size:
  width_mm: 84   # 多类别时建议双栏；如需单栏就 89
  high_mm: 60
constrained_layout: true
layout:
  # 以“画布整体 size” 为基准，用比例控制绘图区与四周留白的关系
  # 下面这些值都是占总宽度/总高度的比例（0–1 之间）
  axis_outer_frac:
    left: 0.05    # 占总宽度的 20% 作为 y 轴标题 + 刻度标签 + 与轴线之间的空间
    right: 0.00   # 占总宽度的 5% 作为右侧空白
    bottom: 0.05  # 占总高度的 25% 作为 x 轴标题 + 刻度标签 + 与轴线之间的空间
    top: 0.0     # 占总高度的 10% 作为顶部空白（panel 标识等）

  # 剩余的区域 (1 - left - right, 1 - top - bottom) 将作为“坐标轴绘图区”
  # 这样当整体 size 变化时，坐标轴与画布的比例保持不变

  # 在“外边距内部”控制轴标题与刻度标签、刻度标签与坐标轴之间的距离（pt）
  # 后续脚本将用这些值转成 theme(axis.title.margin, axis.text.margin) 等
  axis_gap_pt:
    x_title_to_ticks: 5   # x 轴标题与 x 轴刻度标签之间的距离
    x_ticks_to_axis: 2    # x 轴刻度标签与 x 轴轴线之间的距离
    y_title_to_ticks: 5   # y 轴标题与 y 轴刻度标签之间的距离
    y_ticks_to_axis: 2    # y 轴刻度标签与 y 轴轴线之间的距离
panels:
  - id: a
    type: box
    data: "04_data/interim/microplate_reader/ELISA检测细胞因子/ELISA_statistic_E42_summary.xlsx"
    sheet: "final_values"
    mapping:
      x: "drug"
      "y": "final_value"
      hue: "genotype"         # WT/HO
    # 写“真实存在且拼写一致”的类别值；大小写/空格要与数据一致
    order:
      - "untreated"
      - "lps+nigeiricin"
      - "lps+nigeiricin+bel(1µm,4h)"
      - "lps+nigeiricin+bel(2µm,4h)"
      - "lps+nigeiricin+bel(4µm,4h)"
    rename_x:
      "untreated": "Control"
      "lps+nigeiricin": "0µm"
      "lps+nigeiricin+bel(1µm,4h)": "1µm"
      "lps+nigeiricin+bel(2µm,4h)": "2µm"
      "lps+nigeiricin+bel(4µm,4h)": "4µm"
    hue_order: ["WT", "HO"]
    x_label: ""
    y_label: "IL-1β release after BEL treated"

    x_tick_rotation: 0    # 只针对这一张图，将 x 轴刻度标签旋转 30°
      
    strip: true            # 叠加散点
    stats:                 # 可选：显著性标注
      enabled: true
      source: "04_data/interim/microplate_reader/ELISA检测细胞因子/ELISA_statistic_E42_summary.xlsx"   # ✅ 指向存有 p 值的文件
      sheet: "pair_stats"
      column: p_value                 # ✅ 指明哪一列存 p 值
      pairs: [["WT", "HO"]]           # ✅ 仍指明需要比较的组
  - id: b
    type: box
    data: "04_data/interim/microplate_reader/ELISA检测细胞因子/ELISA_statistic_E38_summary.xlsx"
    sheet: "final_values"
    mapping:
      x: "drug"
      "y": "final_value"
      hue: "genotype"         # WT/HO
    # 写“真实存在且拼写一致”的类别值；大小写/空格要与数据一致
    order:
      - "lps+nigeiricin_1.5h+ephb1_fc_0.5µg/ml+anti_fc"
      - "lps+nigeiricin"
      - "lps+nigeiricin_1.5h+ephb1_fc_5µg/ml+anti_fc"
      - "lps+nigeiricin_1.5h+ephb1_fc_50µg/ml+anti_fc"
      - "lps+nigeiricin_1h+ephb1_fc_500µg/ml+anti_fc"

    rename_x:
      "lps+nigeiricin_1.5h+ephb1_fc_0.5µg/ml+anti_fc": "0µg"
      "lps+nigeiricin": "0.5µg"
      "lps+nigeiricin_1.5h+ephb1_fc_5µg/ml+anti_fc": "5µg"
      "lps+nigeiricin_1.5h+ephb1_fc_50µg/ml+anti_fc": "50µg"
      "lps+nigeiricin_1h+ephb1_fc_500µg/ml+anti_fc": "500µg"
    hue_order: ["WT", "HO"]
    x_label: ""
    y_label: "IL-1β release after Ephb-FC treated"

    x_tick_rotation: 0    # 只针对这一张图，将 x 轴刻度标签旋转 30°
      
    strip: true            # 叠加散点
    stats:                 # 可选：显著性标注
      enabled: true
      source: "04_data/interim/microplate_reader/ELISA检测细胞因子/ELISA_statistic_E38_summary.xlsx"   # ✅ 指向存有 p 值的文件
      sheet: "pair_stats"
      column: p_value                 # ✅ 指明哪一列存 p 值
      pairs: [["WT", "HO"]]           # ✅ 仍指明需要比较的组
    ylimits: [5,25]
  - id: c
    type: box
    data: "04_data/interim/microplate_reader/ELISA检测细胞因子/ELISA_statistic_E39_summary.xlsx"
    sheet: "final_values"
    mapping:
      x: "drug"
      "y": "final_value"
      hue: "genotype"         # WT/HO
    # 写“真实存在且拼写一致”的类别值；大小写/空格要与数据一致
    order:
      - "untreated"
      - "lps+nigeiricin"
      - "lps+nigeiricin_1h+ad(2µm)"


    rename_x:
      "untreated": "control"
      "lps+nigeiricin": "lps+nigeiricin"
      "lps+nigeiricin_1h+ad(2µm)": "AD(2µm)"

    hue_order: ["WT", "HO"]
    x_label: ""
    y_label: "IL-1β release after AD treated"

    x_tick_rotation: 0    # 只针对这一张图，将 x 轴刻度标签旋转 30°
      
    strip: true            # 叠加散点
    stats:                 # 可选：显著性标注
      enabled: true
      source: "04_data/interim/microplate_reader/ELISA检测细胞因子/ELISA_statistic_E39_summary.xlsx"   # ✅ 指向存有 p 值的文件
      sheet: "pair_stats"
      column: p_value                 # ✅ 指明哪一列存 p 值
      pairs: [["WT", "HO"]]           # ✅ 仍指明需要比较的组

